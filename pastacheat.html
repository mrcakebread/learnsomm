*{box-sizing:border-box}html,body{margin:0}body{background:var(--bg);color:var(--text);font-family:'Charter','Bitstream Charter','Cambria','Iowan Old Style',Georgia,serif;line-height:1.5;}

#searchWrap{display:flex;align-items:center;gap:.4rem;padding:.5rem .75rem .25rem;position:sticky;top:0;z-index:10;background:var(--bg,#fff8ec);}

<script>
const TC={"Includes":"#7a6a55","Best For":"#7a5a2a","Pairing Logic":"#7a5a2a","Use It For":"#7a5a2a","Tasting Cue":"#7a5a2a"};
const DATA = {"sections": [{"label": null, "cards": [{"title": "Long & Thin Pasta", "title_es": "Pasta Larga Y Fina", "badge": "4", "badge_es": "4", "color": "#c9a13a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Spaghetti, Bucatini, Linguine, Capellini", "text_es": "Spaghetti, Bucatini, Linguine, Capellini (Cabello de Ángel)", "color": "#c9a13a"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Best with oil-based, light tomato, or seafood sauces that coat without weighing the strands down.", "text_es": "Mejor con salsas a base de aceite, tomate ligero o mariscos que cubran sin pesar demasiado los hilos."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Spaghetti's ancestor, itriya, was first recorded in 12th-century Arab-ruled Sicily — making dried long pasta one of Italy's oldest culinary technologies, not a later invention.", "text_es": "El antecesor del spaghetti, itriya, se registró por primera vez en la Sicilia árabe del siglo XII — lo que convierte a la pasta larga seca en una de las tecnologías culinarias más antiguas de Italia, no en una invención posterior.", "pair": true}]}, {"title": "Ribbon Pasta", "title_es": "Pasta En Cinta", "badge": "4", "badge_es": "4", "color": "#b07a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Tagliatelle, Fettuccine, Pappardelle, Mafaldine", "text_es": "Tagliatelle, Fettuccine, Pappardelle, Mafaldine", "color": "#b07a3a"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Built for rich, slow-cooked meat ragùs that cling to the wide, flat surface.", "text_es": "Pensada para ragús de carne ricos y de cocción lenta que se adhieren a su superficie ancha y plana."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "According to legend, tagliatelle's dough should be rolled so thin that, held up to a window, you could see Bologna's hilltop basilica through it.", "text_es": "Según la leyenda, la masa de la tagliatelle debe estirarse tan fina que, al sostenerla frente a una ventana, se pudiera ver a través de ella la basílica en la colina de Bolonia.", "pair": true}]}, {"title": "Short Tubes", "title_es": "Tubos Cortos", "badge": "4", "badge_es": "4", "color": "#8a5a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Penne, Rigatoni, Paccheri, Ziti", "text_es": "Penne, Rigatoni, Paccheri, Ziti", "color": "#8a5a3a"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Hollow centers and ridges trap chunky sauces, baked cheese, and vodka sauce.", "text_es": "Sus centros huecos y estrías atrapan salsas con trozos, queso horneado y salsa vodka."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The ridges on pasta like rigatoni and penne rigate aren't just decorative — they exist specifically to trap more sauce per bite than a smooth surface ever could.", "text_es": "Las estrías de pastas como el rigatoni y el penne rigate no son solo decorativas — existen específicamente para retener más salsa por bocado de lo que lograría una superficie lisa.", "pair": true}]}, {"title": "Twists & Shells", "title_es": "Espirales Y Conchas", "badge": "4", "badge_es": "4", "color": "#a8653a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Fusilli, Cavatappi, Conchiglie, Trofie", "text_es": "Fusilli, Cavatappi, Conchiglie (Caracolas), Trofie", "color": "#a8653a"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Nooks and curves grab pesto, vegetable sauces, and pasta salad dressings.", "text_es": "Sus rincones y curvas atrapan pesto, salsas de verduras y aderezos de ensaladas de pasta."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Fusilli were traditionally shaped by hand-rolling dough around a thin rod or knitting needle, giving each twist a slightly different, handmade character.", "text_es": "El fusilli se moldeaba tradicionalmente enrollando la masa a mano alrededor de una varilla fina o una aguja de tejer, dando a cada espiral un carácter ligeramente distinto y artesanal.", "pair": true}]}, {"title": "Hand-Shaped & Stuffed", "title_es": "Rellenas Y Hechas A Mano", "badge": "4", "badge_es": "4", "color": "#c98a4a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Orecchiette, Cavatelli, Tortellini, Ravioli", "text_es": "Orecchiette, Cavatelli, Tortellini, Ravioli", "color": "#c98a4a"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Simple butter, broth, or light sauces let the pasta (or filling) be the star.", "text_es": "Salsas simples de mantequilla, caldo o ligeras dejan que la pasta (o el relleno) sea el protagonista."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Tortellini were once considered such a luxury that they were reserved for Sunday lunch — a single bowl of 'little pies' represented a special occasion.", "text_es": "El tortellini se consideraba en su momento un lujo tan grande que se reservaba para el almuerzo del domingo — un solo plato de estas 'pequeñas empanadas' representaba una ocasión especial.", "pair": true}]}, {"title": "Tomato-Based Sauces", "title_es": "Salsas De Tomate", "badge": "4", "badge_es": "4", "color": "#b03a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Marinara, Arrabbiata, Puttanesca, Amatriciana", "text_es": "Marinara, Arrabbiata, Puttanesca, Amatriciana", "color": "#b03a3a"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Pair with long strands or short tubes — the acidity cuts through pasta's starch.", "text_es": "Combinan con hilos largos o tubos cortos — la acidez corta el almidón de la pasta."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Tomatoes didn't arrive in Italy until the 1800s — meaning every 'classic' tomato pasta sauce is, in the scope of Italian history, a relatively recent invention.", "text_es": "Los tomates no llegaron a Italia hasta el siglo XIX — lo que significa que toda salsa de tomate 'clásica' es, en la escala de la historia italiana, una invención relativamente reciente.", "pair": true}]}, {"title": "Meat Ragùs", "title_es": "Ragús De Carne", "badge": "4", "badge_es": "4", "color": "#7a3a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Ragù alla Bolognese, Ragù Toscano, Ragù Napoletano, Ragù di Cinghiale", "text_es": "Ragú a la Boloñesa, Ragú Toscano, Ragú Napolitano, Ragú de Jabalí", "color": "#7a3a3a"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Pair with wide ribbons or large tubes that can carry chunks of meat.", "text_es": "Combinan con cintas anchas o tubos grandes que pueden llevar trozos de carne."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Many Italian families cook ragù in huge batches and freeze it in portions, turning what looks like an all-day project into a 20-minute dinner on a weeknight.", "text_es": "Muchas familias italianas preparan el ragú en grandes cantidades y lo congelan en porciones, convirtiendo lo que parece un proyecto de todo el día en una cena de 20 minutos en cualquier noche entre semana.", "pair": true}]}, {"title": "Cream, Egg & Cheese", "title_es": "Crema, Huevo Y Queso", "badge": "4", "badge_es": "4", "color": "#d4b276", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Carbonara, Cacio e Pepe, Besciamella, Salsa al Limone", "text_es": "Carbonara, Cacio e Pepe, Besciamella, Salsa al Limón", "color": "#d4b276"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Pair with long strands or ribbons — the silky sauce coats every inch.", "text_es": "Combinan con hilos largos o cintas — la salsa sedosa cubre cada centímetro."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Traditional carbonara contains no cream at all — its silky texture comes purely from emulsifying egg yolks and cheese with the starchy heat of the pasta itself.", "text_es": "La carbonara tradicional no contiene nada de crema — su textura sedosa proviene únicamente de emulsionar yemas de huevo y queso con el calor almidonado de la propia pasta.", "pair": true}]}, {"title": "Herb, Oil & Nut Sauces", "title_es": "Salsas De Hierbas Y Frutos Secos", "badge": "4", "badge_es": "4", "color": "#5a6b3b", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Pesto Genovese, Aglio e Olio, Sugo di Noci, Bagna Cauda", "text_es": "Pesto Genovés, Aglio e Olio, Salsa de Nueces, Bagna Cauda", "color": "#5a6b3b"}, {"tag": "Pairing Logic", "tag_es": "Lógica de Maridaje", "text": "Pair with twists, shells, or long pasta — texture grabs the sauce's solid bits.", "text_es": "Combinan con espirales, conchas o pasta larga — la textura atrapa los trocitos sólidos de la salsa."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Pesto's name comes from 'pestare,' to pound or crush — a reminder that, before blenders, this vivid green sauce was made entirely by hand with a mortar and pestle.", "text_es": "El nombre del pesto viene de 'pestare', machacar o triturar — un recordatorio de que, antes de las licuadoras, esta vibrante salsa verde se hacía completamente a mano con mortero y maja.", "pair": true}]}]}]};
const UI={"en":{"sub":"Shapes, sauces & pairings — pocket reference","use":"How to use","useText":"Tap a card to see what's in each category, how to use it, and a fun fact. The full Pasta & Sauces Wheel (pasta-sauces-wheel.html) has detailed notes for every individual item.","wheel":"The Wheel","scan":"Companion wheel file","cover":"Pocket guide","fold":"<b>Tip:</b> hit <b>Print fold-up</b> for a one-page pocket card — print one side, fold into eighths, one short center cut, and it becomes a little booklet.","byline":"Curated by Mark Lenington · Certified Sommelier · © 2026 LearnSomm.com"},"es":{"sub":"Formas, salsas y maridajes — referencia de bolsillo","use":"Cómo usarla","useText":"Toca una tarjeta para ver qué incluye cada categoría, cómo usarla y un dato curioso. La Rueda de Pastas y Salsas completa (pasta-sauces-wheel.html) tiene notas detalladas de cada elemento.","wheel":"La Rueda","scan":"Archivo de la rueda complementaria","cover":"Guía de bolsillo","fold":"<b>Tip:</b> pulsa <b>Imprimir plegable</b> para una tarjeta de bolsillo — imprime un lado, dobla en octavos, un corte corto al centro y se vuelve un folletito.","byline":"Creado por Mark Lenington · Sommelier Certificado · © 2026 LearnSomm.com"}};
const TITLE_EN="Pasta & Sauces";const TITLE_ES="Pastas y Salsas";
const $=id=>document.getElementById(id);let lang="en";
function tc(t){return TC[t]||"#7a6a55";}
function L(o,k){return lang==="es"&&o[k+"_es"]!=null?o[k+"_es"]:o[k];}
function rowHTML(r){const pc=r.pair?" pair":"";const tag=lang==="es"?(r.tag_es||r.tag):r.tag;const txt=lang==="es"?(r.text_es||r.text):r.text;const st=r.pair?"":`style="background:${r.color||tc(r.tag)}"`;return `<div class="row${pc}"><span class="tag" ${st}>${tag}</span><span>${txt}</span></div>`;}
function renderScreen(){const t=UI[lang];$("langBtn").textContent=lang==="es"?"EN":"ES";$("docTitle").textContent=lang==="es"?TITLE_ES:TITLE_EN;$("docSub").textContent=t.sub;$("foldHint").innerHTML=t.fold;$("byline").innerHTML=t.byline;
$("sections").innerHTML=DATA.sections.map(s=>{const label=s.label?L(s,"label"):null;const cards=s.cards.map(c=>{const title=L(c,"title");const badge=c.badge?(lang==="es"?(c.badge_es||c.badge):c.badge):null;return `<div class="card" data-slug="${((c.slug)||L(c,'title')||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}" data-title="${title}"><div class="card-header"><span class="card-title">${title}${badge?`<span class="badge" style="background:${c.color||'var(--gold)'}">${badge}</span>`:""}</span><span class="chevron">\u25bc</span></div><div class="card-body"><div class="card-inner">${c.rows.map(rowHTML).join("")}</div></div></div>`;}).join("");return label?`<div class="section-label">${label}</div>${cards}`:cards;}).join("");
$("sections").onclick=ev=>{const c=ev.target.closest(".card");if(c)c.classList.toggle("active");};}
const FLAT=[];DATA.sections.forEach(s=>s.cards.forEach(c=>FLAT.push({sec:s,c})));
function sizes(n){const b=Math.floor(n/5),r=n%5;return Array.from({length:5},(_,i)=>b+(i<r?1:0));}
function pcard(f){const rows=f.c.rows.filter(r=>!r.pair).slice(0,2).map(r=>`<span class="pl">${lang==="es"?(r.text_es||r.text):r.text}</span>`).join("; ");return `<div class="pc"><span class="pn">${L(f.c,"title")}</span> — ${rows}</div>`;}
function renderPrint(){const t=UI[lang];const sz=sizes(FLAT.length);const packs=[];let i=0;sz.forEach(s=>{packs.push(FLAT.slice(i,i+s));i+=s;});const TT=lang==="es"?TITLE_ES:TITLE_EN;
function cp(arr,cls){let html="";arr.forEach(f=>{html+=pcard(f);});return `<div class="panel ${cls}"><h4>${TT}</h4>${html}</div>`;}
const panels={1:`<div class="panel p1 pcover"><div class="ck">LearnSomm · Cheat Sheet</div><div class="ct">${TT}</div><div style="font-size:6pt;color:#a87f3d;margin-top:.05in">${t.cover}</div><div style="font-size:5.4pt;color:#888;margin-top:.5in">© 2026 LearnSomm.com</div></div>`,
2:cp(packs[0],"p2"),3:cp(packs[1],"p3"),4:cp(packs[2],"p4"),5:cp(packs[3],"p5"),6:cp(packs[4],"p6"),
7:`<div class="panel p7"><h4>${t.use}</h4><div class="pl">${t.useText}</div></div>`,

$("printsheet").innerHTML=[1,2,3,4,5,6,7,8].map(n=>panels[n]).join("");}
function renderAll(){renderScreen();renderPrint();}
$("langBtn").onclick=()=>{lang=lang==="es"?"en":"es";renderAll();};
$("themeBtn").onclick=()=>{const dk=document.body.getAttribute("data-theme")==="dark";document.body.setAttribute("data-theme",dk?"light":"dark");$("themeBtn").textContent=dk?"\u263e":"\u2600";};

function initSearch(){
  const inp=document.getElementById("searchInput");
  const clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){
    const q=inp.value.trim().toLowerCase();
    clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");
    if(!sect)return;
    let anyVisible=false;
    sect.querySelectorAll(".card").forEach(card=>{
      const txt=(card.textContent||"").toLowerCase();
      const show=!q||txt.includes(q);
      card.style.display=show?"":"none";
      if(show)anyVisible=true;
    });
    sect.querySelectorAll(".section-label").forEach(lbl=>{
      let next=lbl.nextElementSibling;let vis=false;
      while(next&&!next.classList.contains("section-label")){
        if(next.style.display!=="none")vis=true;
        next=next.nextElementSibling;
      }
      lbl.style.display=vis?"":"none";
    });
    let nr=document.querySelector(".no-results");
    if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}
    nr.style.display=anyVisible||!q?"none":"block";
  }
  inp.addEventListener("input",doFilter);
  clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});
}

initSearch();

/* ── click-to-spin ── */
(function(){
  function norm(s){return (''+s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,'');}
  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}
  document.addEventListener('click',function(e){
    var card=e.target.closest&&e.target.closest('.card[data-slug],.card[data-title]');
    if(!card)return;
    var slug=card.getAttribute('data-slug')||'';
    var title=card.getAttribute('data-title')||'';
    send(slug||title);
    if(title&&title!==slug)send(title);
  });
  try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SHEET_READY'},'*');}}catch(e){}
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='LS_WHEEL_NAMES')return;
    var names=d.names||{};
    document.querySelectorAll('.card[data-slug],.card[data-title]').forEach(function(card){
      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */

</script><script id="lsNoRightClick">
(function(){
  document.addEventListener('contextmenu',function(e){ e.preventDefault(); return false; },{capture:true});
  // also discourage drag-saving of images
  document.addEventListener('dragstart',function(e){ if(e.target&&e.target.tagName==='IMG'){ e.preventDefault(); } },{capture:true});
})();
</script>

(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
