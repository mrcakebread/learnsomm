/* geometry */
function polarToCart(r,a){return[r*Math.cos(a),r*Math.sin(a)];}
function arcRing(r1,r2,a1,a2){const[sx1,sy1]=polarToCart(r1,a1),[ex1,ey1]=polarToCart(r1,a2),[sx2,sy2]=polarToCart(r2,a1),[ex2,ey2]=polarToCart(r2,a2);const lg=a2-a1>Math.PI?1:0;return `M ${sx1} ${sy1} A ${r1} ${r1} 0 ${lg} 1 ${ex1} ${ey1} L ${ex2} ${ey2} A ${r2} ${r2} 0 ${lg} 0 ${sx2} ${sy2} Z`;}
function arcLabelPath(r,a1,a2,rev){const lg=Math.abs(a2-a1)>Math.PI?1:0;if(rev){const[sx,sy]=polarToCart(r,a2),[ex,ey]=polarToCart(r,a1);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 0 ${ex} ${ey}`;}const[sx,sy]=polarToCart(r,a1),[ex,ey]=polarToCart(r,a2);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 1 ${ex} ${ey}`;}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function textOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)>150?'#1c2118':'#f3f3ee';}
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

const REGISTRY={};
const R_IN=62,R_CAT=140,R_SUB=210,R_OUT=300;
let defsEl,gEl;
function buildWheel(){
  const total=DATA.categories.reduce((n,c)=>n+c.sub.reduce((m,s)=>m+s.descriptors.length,0),0);
  const perItem=TWO_PI/total;
  defsEl=el('defs',{});svg.appendChild(defsEl);
  gEl=el('g',{id:'wheelG'});
  let a=-Math.PI/2,gradN=0;
  DATA.categories.forEach((cat,ci)=>{
    const catItems=cat.sub.reduce((m,s)=>m+s.descriptors.length,0);
    const catSpan=catItems*perItem,catStart=a,catEnd=a+catSpan,catMid=catStart+catSpan/2;
    gEl.appendChild(el('path',{d:arcRing(R_IN,R_CAT,catStart,catEnd),fill:cat.color,'class':'cell'}));
    cat._mid=catMid;cat._span=catSpan;
    cat.sub.forEach(sub=>{
      const subSpan=sub.descriptors.length*perItem,subStart=a,subEnd=a+subSpan,subMid=subStart+subSpan/2;
      var _subEl=el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:(sub._implicit?lighten(cat.color,8):sub.color),'class':'cell sub-cell'});
      gEl.appendChild(_subEl);
      (function(se,nm){ try{
        se.addEventListener('mouseenter',function(){ try{ var t=(typeof tx==='function'?tx(sub,'name'):(sub.name||nm)); if(typeof echoMsg==='function')echoMsg(t); else { var be=document.getElementById('bgEcho'); if(be){be.textContent=t; if(typeof sizeEcho==='function')sizeEcho(t); be.classList.add('show');} } }catch(e){} });
        se.addEventListener('mouseleave',function(){ try{ var be=document.getElementById('bgEcho'); if(be)be.classList.remove('show'); }catch(e){} });
      }catch(e){} })(_subEl, tx(sub,'name'));
      sub._mid=subMid;sub._span=subSpan;sub._cat=cat;
      sub.descriptors.forEach(desc=>{
        const s1=a,s2=a+perItem,m=a+perItem/2;
        const gid='pg'+(gradN++);
        const grad=el('radialGradient',{id:gid,gradientUnits:'userSpaceOnUse',cx:'0',cy:'0',r:R_OUT});
        grad.appendChild(el('stop',{offset:'55%','stop-color':lighten(sub.color,20)}));
        grad.appendChild(el('stop',{offset:'100%','stop-color':lighten(sub.color,44)}));
        defsEl.appendChild(grad);
        const p=el('path',{d:arcRing(R_SUB,R_OUT,s1,s2),fill:`url(#${gid})`,'class':'cell desc-seg','data-slug':desc.slug});
        p.addEventListener('click',()=>selectItem(desc.slug));
        gEl.appendChild(p);
        REGISTRY[desc.slug]={desc,sub,cat,segEl:p,chipEl:null,_mid:m,_fill:lighten(sub.color,30)};
        a+=perItem;
      });
    });
  });
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_IN,'class':'hub'}));
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_OUT+4,'class':'rim'}));
  const ys=['-19','-5','8','22'],fs=['7.5','10','7','6'];
  HUB.forEach((txt,i)=>{const a={'text-anchor':'middle',y:ys[i],'font-size':fs[i],'class':'hub-text','font-family':"var(--display)",'letter-spacing':i===3?'2.4':'.5'};if(i===0)a['font-style']='italic';if(i===1||i===2)a['font-weight']='bold';const tt=el('text',a);tt.textContent=txt;tt.style.pointerEvents='none';gEl.appendChild(tt);});
  svg.appendChild(gEl);
  renderLabels();
}

let labelEls=[];let descLabels=[];var READ_SIDE='right';
function renderLabels(){
  labelEls.forEach(e=>e.remove());labelEls=[];descLabels=[];
  DATA.categories.forEach((cat,ci)=>{
    const name=tx(cat,'name').toUpperCase();
    const labR=(R_IN+R_CAT)/2,arcLen=cat._span*labR,estW=name.length*5.0;
    if(arcLen>estW+8){
      const flip=Math.sin(cat._mid)>0,pid='catArc'+ci;
      const existing=defsEl.querySelector('#'+pid);if(existing)existing.remove();
      defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?labR-2:labR+2,cat._mid-cat._span/2,cat._mid+cat._span/2,flip)}));
      const tt=el('text',{'font-size':'7','letter-spacing':'1','font-family':"var(--display)",'font-weight':'bold',fill:cat.textColor||'#fff','dominant-baseline':'middle'});
      const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=name;
      tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }else{
      let deg=cat._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
      const[lx,ly]=polarToCart(labR,cat._mid);
      const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'5','letter-spacing':'.3',fill:cat.textColor||'#fff','font-family':"var(--display)",'font-weight':'bold',transform:`rotate(${deg},${lx},${ly})`});
      const w=name.split(' ');
      if(w.length>1){const t1=el('tspan',{x:lx,dy:'-2.6'});t1.textContent=w[0];const t2=el('tspan',{x:lx,dy:'5.2'});t2.textContent=w.slice(1).join(' ');tt.appendChild(t1);tt.appendChild(t2);}else tt.textContent=name;
      tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }
    cat.sub.forEach((sub,si)=>{
      if(!sub._implicit){
        const subName=tx(sub,'name').toUpperCase(),subLabR=(R_CAT+R_SUB)/2,subArc=sub._span*subLabR;
        if(subArc>subName.length*4+6){
          const flip=Math.sin(sub._mid)>0,pid='subArc'+ci+'_'+si;
          const ex=defsEl.querySelector('#'+pid);if(ex)ex.remove();
          defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?subLabR-1.5:subLabR+1.5,sub._mid-sub._span/2,sub._mid+sub._span/2,flip)}));
          const tt=el('text',{'font-size':'6.3','font-family':"var(--display)",fill:textOn(sub.color),'dominant-baseline':'middle'});
          const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=subName;
          tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }else{
          let deg=sub._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
          const[lx,ly]=polarToCart(subLabR,sub._mid);
          const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'4.2',fill:textOn(sub.color),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
          tt.textContent=subName;tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }
      }
      sub.descriptors.forEach(desc=>{
        const reg=REGISTRY[desc.slug];const m=reg._mid;
        const theta=m*180/Math.PI;                 // raw radial angle (0=3 o'clock)
        const deg=(READ_SIDE==='left')?theta+180:theta;  // flip whole wheel for left-read; reading side stays upright
        const[lx,ly]=polarToCart((R_SUB+R_OUT)/2,m);
        const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'6','letter-spacing':'.2',fill:textOn(reg._fill),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
        const nm=tx(desc,'name').toUpperCase();
        const availR=(R_OUT-R_SUB)-12;
        const fitFs=Math.max(3.4,Math.min(6,availR/(nm.length*0.56)));
        tt.setAttribute('font-size',fitFs.toFixed(2));
        tt.textContent=nm;
        tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        descLabels.push({el:tt,lx:lx,ly:ly,theta:theta});
      });
    });
  });
}

/* === FUN FACTS — beginner intro per category (sub-level for wine). Prefer descriptor>sub>category. === */
const FUN_FACTS = {"AROMATIC, FRUITY, FLORAL": {"en": "These are the <b>good smells</b> beer is supposed to have — esters from yeast (banana, pear), hops (citrus, pine, floral), and gentle alcohols. In small doses they're the soul of the beer; in big doses they can mean a stressed, too-warm fermentation.", "es": "Estos son los <b>buenos aromas</b> que la cerveza debe tener — ésteres de la levadura (plátano, pera), lúpulo (cítrico, pino, floral) y alcoholes suaves. En dosis pequeñas son el alma de la cerveza; en exceso pueden indicar una fermentación estresada o demasiado cálida."}, "VEGETAL": {"en": "Grassy, hay-like, or cooked-veg notes. A little fresh-cut grass from hops is fine; <b>cooked corn or cabbage usually points to a process fault</b> (DMS from a weak boil, or oxidation).", "es": "Notas a pasto, heno o verdura cocida. Un poco de pasto recién cortado del lúpulo está bien; <b>el elote o la col cocida suele señalar un defecto de proceso</b> (DMS por un hervor débil, u oxidación)."}, "CEREAL": {"en": "The bready, grainy, malty backbone — raw grain, malt, wort, even cooked-corn adjunct. This is the <b>foundation flavor</b> every beer is built on before hops and yeast add their layers.", "es": "La columna a pan, grano y malta — grano crudo, malta, mosto, incluso elote de adjuntos. Es el <b>sabor base</b> sobre el que se construye toda cerveza antes de que el lúpulo y la levadura añadan sus capas."}, "MAILLARD": {"en": "Toast, caramel, toffee, coffee, chocolate, roast — all from the <b>Maillard browning</b> of malt in the kiln and kettle. The darker the malt, the deeper these go; they define amber ales, stouts, and porters.", "es": "Tostado, caramelo, toffee, café, chocolate, torrefacto — todo del <b>dorado de Maillard</b> de la malta en el horno y la olla. Cuanto más oscura la malta, más profundo; definen las ales ámbar, las stouts y las porters."}, "PHENOLIC": {"en": "Clove, smoke, spice, medicinal, or band-aid. <b>Clove and pepper are prized in Belgians and Hefeweizens</b> (the yeast makes them on purpose); plastic or medicinal phenols are a fault from wild yeast or chlorinated water.", "es": "Clavo, humo, especia, medicinal o curita. <b>El clavo y la pimienta se aprecian en belgas y Hefeweizens</b> (la levadura los crea a propósito); los fenoles a plástico o medicinales son un defecto de levadura silvestre o agua clorada."}, "FATTY": {"en": "Buttery, cheesy, soapy, or oily textures. <b>Diacetyl (movie-theater butter) is the classic one</b> — a normal fermentation byproduct that good yeast cleans up; if it lingers, the beer was rushed off the yeast.", "es": "Texturas mantecosas, a queso, jabonosas o aceitosas. <b>El diacetilo (mantequilla de cine) es el clásico</b> — un subproducto normal de la fermentación que la buena levadura limpia; si persiste, la cerveza se separó de la levadura demasiado pronto."}, "SULFURY": {"en": "Rotten egg, struck match, cooked veg, or canned corn. Trace sulfur is normal in fresh lager and blows off; <b>strong or lasting sulfur is usually a fermentation or DMS fault</b>.", "es": "Huevo podrido, cerillo encendido, verdura cocida o elote enlatado. El azufre traza es normal en la lager fresca y se disipa; <b>el azufre fuerte o persistente suele ser un defecto de fermentación o DMS</b>."}, "STALE": {"en": "Cardboard, papery, sherry-like, leathery. This is <b>oxidation — the #1 sign of an old or badly stored beer</b>. Trans-2-nonenal gives the wet-cardboard note; light + heat + air speed it up.", "es": "Cartón, papel, tipo jerez, cuero. Esto es <b>oxidación — la señal #1 de una cerveza vieja o mal almacenada</b>. El trans-2-nonenal da la nota a cartón mojado; luz, calor y aire la aceleran."}, "ACIDIC": {"en": "Sour, tart, vinegary, or acetic. <b>Deliberate and delicious in sours, lambics, and goses</b> (lactic & acetic bacteria); an unwelcome vinegar tang in any other style means contamination.", "es": "Ácido, agrio, avinagrado o acético. <b>Deliberado y delicioso en sours, lambics y goses</b> (bacterias lácticas y acéticas); un toque a vinagre en cualquier otro estilo significa contaminación."}, "SWEET": {"en": "Honey, candy, syrupy, or just plain sugary. Comes from <b>unfermented residual malt sugar</b>. Balanced by hop bitterness and carbonation; too much with no balance reads as cloying or under-attenuated.", "es": "Miel, dulce, jarabe o simplemente azucarado. Viene del <b>azúcar de malta residual sin fermentar</b>. Se equilibra con el amargor del lúpulo y la carbonatación; demasiado sin equilibrio resulta empalagoso o poco atenuado."}, "MOUTHFEEL": {"en": "Not a taste at all — what the beer <b>physically feels like</b>: carbonation prickle, warming alcohol, astringency (that tea-like grip), body, and creaminess. Often what separates a great beer from a good one.", "es": "No es un sabor — es lo que la cerveza <b>se siente físicamente</b>: el cosquilleo de la carbonatación, el calor del alcohol, la astringencia (ese agarre tipo té), el cuerpo y la cremosidad. A menudo es lo que separa una gran cerveza de una buena."}, "FULLNESS": {"en": "How <b>big or thin the beer feels</b> on the palate — from watery to full and chewy. Driven by unfermented dextrins, proteins, and glycerol. A light lager and an imperial stout sit at opposite ends.", "es": "Qué tan <b>grande o ligera se siente la cerveza</b> en el paladar — de aguada a llena y masticable. Impulsada por dextrinas sin fermentar, proteínas y glicerol. Una lager ligera y una imperial stout están en extremos opuestos."}};
function funFactFor(slug){
  const reg=REGISTRY[slug]; if(!reg) return null;
  const tryKeys=[reg.cat&&reg.cat.name, reg.sub&&reg.sub.name];
  for(const k of tryKeys){ if(k&&FUN_FACTS[k]) return FUN_FACTS[k]; }
  return null;
}

const wheelWrap=document.getElementById('wheelWrap'),listView=document.getElementById('listView'),listBody=document.getElementById('listBody'),listSearch=document.getElementById('listSearch'),noResults=document.getElementById('noResults'),sizeCtl=document.getElementById('sizeCtl'),viewWheelBtn=document.getElementById('viewWheel'),viewListBtn=document.getElementById('viewList');
function rebuildList(){listBody.innerHTML='';for(const k in REGISTRY)REGISTRY[k].chipEl=null;buildList();const q=listSearch.value;if(q){listSearch.dispatchEvent(new Event('input'));}}
function liveCatColor(idx){
    try{ var cats=document.querySelectorAll('#wheelSvg .cell:not(.sub-cell):not(.desc-seg)');
      if(cats[idx]){ return cats[idx].getAttribute('fill')||cats[idx].__base; } }catch(e){}
    return null;
  }
  function buildList(){

      const cells=document.createElement('div');cells.className='cs-cells';
      cat.sub.forEach(sub=>{

          if(window.__lsListTierSkip && window.__lsListTierSkip(desc.name)){return;}
          const chip=document.createElement('button');chip.type='button';chip.className='list-chip';
          chip.textContent=tx(desc,'name');chip.dataset.slug=desc.slug;
          chip.dataset.search=(tx(desc,'name')+' '+tx(sub,'name')+' '+tx(cat,'name')).toLowerCase();

          chip.addEventListener('click',()=>selectItem(desc.slug));

          if(currentSlug===desc.slug){chip.classList.add('selected');}
          cells.appendChild(chip);

    });
  }
  listSearch.addEventListener('input',()=>{
  const q=listSearch.value.trim().toLowerCase();let any=false;
  listBody.classList.toggle('searching',!!q);
  listBody.querySelectorAll('.cat-block').forEach(block=>{let bHas=false;
    block.querySelectorAll('.sub-group').forEach(grp=>{let gHas=false;
      grp.querySelectorAll('.list-chip').forEach(ch=>{const show=!q||ch.dataset.search.includes(q);ch.style.display=show?'':'none';if(show)gHas=true;});
      grp.classList.toggle('hit',!!q&&gHas);
      grp.style.display=(q&&!gHas)?'none':'';if(gHas)bHas=true;});
    block.style.display=bHas?'':'none';if(bHas)any=true;});
  noResults.style.display=any?'none':'block';
});
function setView(v){
  const list=(v==='list');
  document.body.dataset.view=v;
  listView.classList.toggle('active',list);
  wheelWrap.style.display=list?'none':'';
  sizeCtl.style.display=list?'none':'flex';
  viewListBtn.classList.toggle('active',list);
  viewWheelBtn.classList.toggle('active',!list);
  
  // Set attribute on body to trigger the correct Fog Overlay
  document.body.setAttribute('data-view', v);

  if(list)listSearch.focus();
  try{localStorage.setItem(SUBJECT+'View',v);}catch(e){}
}
viewWheelBtn.addEventListener('click',()=>setView('wheel'));
viewListBtn.addEventListener('click',()=>setView('list'));

/* spin */
function getAngle(e,rect){const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;const x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;return Math.atan2(y-cy,x-cx);}
function applyRotation(){if(gEl)gEl.setAttribute('transform',`rotate(${rotation*180/Math.PI})`);}
function momentum(){
  if(!isDragging&&Math.abs(velocity)>0.001){
    rotation+=velocity;
    velocity*=0.96;
    applyRotation();
    animFrame=requestAnimationFrame(momentum);
  }
}

// User dragging/spinning is totally free! No point consumption.
svg.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('desc-seg'))return; 
  isDragging=true;
  const r=svg.getBoundingClientRect();lastAngle=getAngle(e,r);lastTime=Date.now();velocity=0;if(animFrame)cancelAnimationFrame(animFrame);
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const r=svg.getBoundingClientRect();const an=getAngle(e,r),dl=an-lastAngle,now=Date.now();velocity=dl/Math.max(1,now-lastTime)*16;
  rotation+=dl;lastAngle=an;lastTime=now;
  applyRotation();
});
window.addEventListener('mouseup',()=>{
  if(!isDragging)return;
  isDragging=false;
  animFrame=requestAnimationFrame(momentum);
});

svg.addEventListener('touchstart',e=>{
  if(e.touches.length===2){e.preventDefault();isDragging=false;pinching=true;pinchDist0=touchDist(e);pinchSize0=wheelSize;if(animFrame)cancelAnimationFrame(animFrame);return;}
  if(e.target.classList.contains('desc-seg'))return;
  e.preventDefault();
  isDragging=true;
  const r=svg.getBoundingClientRect();lastAngle=getAngle(e,r);lastTime=Date.now();velocity=0;if(animFrame)cancelAnimationFrame(animFrame);
},{passive:false});
svg.addEventListener('touchmove',e=>{
  if(pinching&&e.touches.length===2){e.preventDefault();setWheelSize(pinchSize0*touchDist(e)/Math.max(1,pinchDist0));return;}
  if(!isDragging)return;
  e.preventDefault();const r=svg.getBoundingClientRect();const an=getAngle(e,r),dl=an-lastAngle,now=Date.now();velocity=dl/Math.max(1,now-lastTime)*16;
  rotation+=dl;lastAngle=an;lastTime=now;
  applyRotation();
},{passive:false});
svg.addEventListener('touchend',e=>{
  if(e.touches.length<2)pinching=false;
  if(!isDragging)return;
  isDragging=false;
  animFrame=requestAnimationFrame(momentum);
});

/* sizing */
const zoomSlider=document.getElementById('zoomSlider');let wheelSize=1360,pinching=false,pinchDist0=1,pinchSize0=560;
function touchDist(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
function setWheelSize(px){wheelSize=Math.min(2200,Math.max(280,Math.round(px)));svg.setAttribute('width',wheelSize);svg.setAttribute('height',wheelSize);zoomSlider.value=wheelSize;}
document.getElementById('zoomIn').addEventListener('click',()=>setWheelSize(wheelSize*1.12));
document.getElementById('zoomOut').addEventListener('click',()=>setWheelSize(wheelSize*0.9));
document.getElementById('zoomReset').addEventListener('click',()=>setWheelSize(Math.max(980,Math.min(1520,Math.round(window.innerWidth*1.05)))));
zoomSlider.addEventListener('input',()=>setWheelSize(+zoomSlider.value));
svg.addEventListener('wheel',e=>{e.preventDefault();setWheelSize(wheelSize*(e.deltaY<0?1.07:0.93));},{passive:false});

/* movable panel */
const grip=document.getElementById('panelGrip'),dockBtn=document.getElementById('panelDock');let pDrag=null;
grip.addEventListener('pointerdown',e=>{if(e.target===dockBtn)return;const r=panel.getBoundingClientRect();if(!panel.classList.contains('floating')){panel.classList.add('floating');panel.style.left=r.left+'px';panel.style.top=r.top+'px';}pDrag={dx:e.clientX-r.left,dy:e.clientY-r.top};grip.setPointerCapture(e.pointerId);e.preventDefault();});
grip.addEventListener('pointermove',e=>{if(!pDrag)return;const w=panel.offsetWidth;const x=Math.min(Math.max(4,e.clientX-pDrag.dx),Math.max(4,window.innerWidth-w-4));const y=Math.min(Math.max(4,e.clientY-pDrag.dy),window.innerHeight-56);panel.style.left=x+'px';panel.style.top=y+'px';});
grip.addEventListener('pointerup',()=>{pDrag=null;});grip.addEventListener('pointercancel',()=>{pDrag=null;});
dockBtn.addEventListener('click',()=>{panel.classList.remove('floating');panel.style.left='';panel.style.top='';});
window.addEventListener('resize',()=>{if(panel.classList.contains('floating')){const r=panel.getBoundingClientRect();if(r.right>window.innerWidth||r.bottom>window.innerHeight){panel.style.left=Math.max(4,window.innerWidth-panel.offsetWidth-4)+'px';panel.style.top=Math.max(4,Math.min(parseFloat(panel.style.top)||4,window.innerHeight-80))+'px';}}});

function applyLogo(){
  const th=document.documentElement.getAttribute('data-theme');
  const srcL=(th==='dark')?(LOGO_DARK||LOGO_DARK_FILE):(LOGO_LIGHT||LOGO_LIGHT_FILE);
  if(srcL){hubLogoImg.src=srcL;hubLogoImg.style.display='block';document.getElementById('svgContainer').classList.add('has-logo');}

function splitTwo(n){
  const w=n.split(' ');if(w.length<2)return[n];
  const mid=Math.ceil(w.length/2);return[w.slice(0,mid).join(' '),w.slice(mid).join(' ')];
}

function showMirror(slug){
  const reg=REGISTRY[slug];if(!reg)return;
  const nm=tx(reg.desc,'name');
  bgEcho.textContent=nm;sizeEcho(nm);bgEcho.classList.add('show');
}
function hideMirror(){
  if(currentSlug){showMirror(currentSlug);return;}
  bgEcho.classList.remove('show');
}

#npGrid .ng-preview{position:relative;border:1px solid #2e2820;border-radius:10px;overflow:hidden;margin-bottom:.9rem;}
#npGrid .ng-faux{filter:blur(3.5px);opacity:.5;padding:.7rem .8rem;user-select:none;pointer-events:none;}
#npGrid .ng-row{display:flex;gap:.5rem;margin:.32rem 0;font-size:.78rem;}
#npGrid .ng-row b{font-family:'Optima',sans-serif;color:#d4b276;min-width:84px;text-transform:uppercase;letter-spacing:.06em;font-size:.66rem;}
#npGrid .ng-lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;background:rgba(20,16,11,.35);}
#npGrid .ng-lock span{font-size:1.5rem;}
#npGrid .ng-cta{display:block;text-align:center;text-decoration:none;background:linear-gradient(135deg,#a87f3d,#d4b276);color:#191510;font-family:'Optima',sans-serif;font-weight:700;font-size:.84rem;letter-spacing:.08em;text-transform:uppercase;border-radius:10px;padding:.85rem 1rem;}

#npSaved{font-size:.72rem;color:#7d9a6a;padding:0 1.1rem .55rem;min-height:1rem;flex-shrink:0;}
#npFoot{display:flex;gap:.5rem;padding:.65rem 1.1rem;border-top:1px solid #2e2820;flex-shrink:0;}
#npFoot button{flex:1;font-family:inherit;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;border:1px solid #a87f3d;background:none;color:#d4b276;border-radius:9px;padding:.58rem;cursor:pointer;}
#npFoot button:hover{background:rgba(168,127,61,.18);}

/* ─── Resize handles ─── */
.np-resize{position:absolute;z-index:9610;}
.np-resize.n {top:-4px;left:12px;right:12px;height:8px;cursor:n-resize;}
.np-resize.s {bottom:-4px;left:12px;right:12px;height:8px;cursor:s-resize;}
.np-resize.w {left:-4px;top:12px;bottom:12px;width:8px;cursor:w-resize;}
.np-resize.e {right:-4px;top:12px;bottom:12px;width:8px;cursor:e-resize;}
.np-resize.nw{top:-4px;left:-4px;width:16px;height:16px;cursor:nw-resize;}
.np-resize.ne{top:-4px;right:-4px;width:16px;height:16px;cursor:ne-resize;}
.np-resize.sw{bottom:-4px;left:-4px;width:16px;height:16px;cursor:sw-resize;}
.np-resize.se{bottom:-4px;right:-4px;width:16px;height:16px;cursor:se-resize;}

to{width:100%}}

</style>
<div id="dgSheet">
  <div id="dgSheetBar">
    <span class="t">📑 <span id="dgSheetTitle">Cheat Sheet</span>
      <small id="dgSheetHint">drag · click an aroma</small></span>
    <span id="dgSheetOpacity">
      <span>opacity</span>
      <input type="range" id="dgSheetOpacitySlider" min="20" max="100" value="96" step="1">
    </span>
    <button id="dgSheetClose">Close ✕</button>
  </div>
  <iframe id="dgSheetFrame" title="Cheat Sheet"></iframe>
</div>
<script>


(function(){
  var $=function(id){return document.getElementById(id);};
  var ES=function(){var b=$('langBtn');return (document.documentElement.getAttribute('lang')==='es')||(b&&b.textContent.trim().toUpperCase()==='EN');};

  // ── Dark mode persistence ────────────────────────────────────────
  (function(){
    var KEY='ls_theme';
    try{var saved=localStorage.getItem(KEY);
      if(saved){document.documentElement.setAttribute('data-theme',saved);
        var tb=$('themeBtn');if(tb)tb.textContent=saved==='dark'?'☾':'☀';}}catch(e){}
    var tb=$('themeBtn');
    if(tb)tb.addEventListener('click',function(){
      setTimeout(function(){try{localStorage.setItem(KEY,document.documentElement.getAttribute('data-theme')||'dark');}catch(e){}},50);
    });
  })();

  // ── Dropdown menus ───────────────────────────────────────────────
  var dropdowns=document.querySelectorAll('.ls-drop');
  document.addEventListener('click',function(e){
    dropdowns.forEach(function(d){
      var btn=d.querySelector('.ls-drop-btn');
      var menu=d.querySelector('.ls-menu');
      if(!menu)return;
      if(d.contains(e.target)){
        var isOpen=menu.classList.contains('open');
        document.querySelectorAll('.ls-menu').forEach(function(m){m.classList.remove('open');m.previousElementSibling&&m.previousElementSibling.classList.remove('open');});
        if(!isOpen){menu.classList.add('open');btn&&btn.classList.add('open');}
      }else{menu.classList.remove('open');btn&&btn.classList.remove('open');}
    });
  });

  // ── Random F&B ───────────────────────────────────────────────────
  var ALL_WHEELS=["wine-live.html","beer-wheel.html","brandy-wheel.html","bubbles-wheel.html",
    "cocktail-wheel.html","coffee-wheel.html","cordials-wheel.html","gin-wheel.html","rum-wheel.html",
    "sake-wheel.html","scotch-wheel.html","tea-wheel.html","tequila-wheel.html","vodka-wheel.html",
    "water-wheel.html","beef-wheel.html","bread-wheel.html","charcuterie-wheel.html","dairy-wheel.html",
    "fish-wheel.html","fruitandveg-wheel.html","grains-wheel.html","nuts-berries-wheel.html",
    "oyster-wheel.html","pasta-wheel.html","seafood-wheel.html","soups-wheel.html",
    "spiceherb-wheel.html","sushi-wheel.html"];
  var randBtn=$('lsRandFnb');
  if(randBtn)randBtn.addEventListener('click',function(){
    var cur=window.location.pathname.split('/').pop()||'wine-live.html';
    var opts=ALL_WHEELS.filter(function(w){return w!==cur;});
    try{sessionStorage.setItem('ls_auto_spin','1');}catch(e){}
    window.location.href=opts[Math.floor(Math.random()*opts.length)];
  });
  try{if(sessionStorage.getItem('ls_auto_spin')==='1'){
    sessionStorage.removeItem('ls_auto_spin');
    window.addEventListener('load',function(){setTimeout(function(){
      var slugs=window.REGISTRY?Object.keys(window.REGISTRY):[];
      if(!slugs.length){var sb=$('spinBtn');if(sb)sb.click();return;}
      var pick=slugs[Math.floor(Math.random()*slugs.length)];
      if(window.spinToSlug){window.spinToSlug(pick);
        setTimeout(function(){
          var np=$('npPanel');if(np&&!np.classList.contains('on')){var o=$('npOpen');if(o)o.click();}
          try{var c=$('npCapBtn');if(c&&!c.classList.contains('on'))c.click();}catch(e){}
        },1400);}
    },600);});
  }}catch(e){}

  // ── Mic ──────────────────────────────────────────────────────────
  var micBtn=$('npMic');
  if(micBtn&&('SpeechRecognition' in window||'webkitSpeechRecognition' in window)){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    var rec=new SR();rec.continuous=true;rec.interimResults=true;var active=false;
    rec.addEventListener('result',function(e){
      var fin='';for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;}
      if(fin){var ta=$('npRawText');if(ta)ta.value=(ta.value?ta.value.replace(/\s*$/,'')+', ':'')+fin.trim();}
    });
    micBtn.addEventListener('click',function(){
      if(!active){rec.start();active=true;micBtn.textContent='🔴 Stop';micBtn.classList.add('on');}
      else{rec.stop();active=false;micBtn.textContent='🎤 Mic';micBtn.classList.remove('on');}
    });
  }else if(micBtn){micBtn.style.display='none';}

  })();


</script>
<script>

(function(){
  var SUBJ='beerst', SHEET='beercheat.html';

  var $=function(id){return document.getElementById(id);};
  var ES=function(){var b=$('langBtn');return (document.documentElement.getAttribute('lang')==='es')||(b&&b.textContent.trim().toUpperCase()==='EN');};

  // ── Cheat sheet modal ─────────────────────────────────────────────
  var sheetFrame=$('dgSheetFrame');
  function positionSheet(){
    var win=$('dgSheet');win.style.top='76px';
    var mode=document.body.getAttribute('data-mode')||'free';
    if(mode==='dock-right'){win.style.left='24px';win.style.right='auto';}
    else{win.style.right='24px';win.style.left='auto';}
  }
  var sheetBtn=$('dgSheetBtn');
  if(sheetBtn)sheetBtn.addEventListener('click',function(){
    if(!sheetFrame.src)sheetFrame.src=SHEET;positionSheet();$('dgSheet').classList.add('on');});
  var sheetClose=$('dgSheetClose');
  if(sheetClose)sheetClose.addEventListener('click',function(){$('dgSheet').classList.remove('on');});
  function sendNames(){var msg={type:'LS_WHEEL_NAMES',names:window.WHEEL_NAMES||{}};try{sheetFrame.contentWindow.postMessage(msg,'*');}catch(e){}try{if(window.parent&&window.parent!==window)window.parent.postMessage(msg,'*');}catch(e){}}
  sheetFrame.addEventListener('load',function(){setTimeout(sendNames,150);});
  window.addEventListener('message',function(e){var d=e.data;if(!d)return;
    if(d.type==='LS_SHEET_READY')sendNames();
    if(d.type==='LS_SPIN_TO'&&window.spinToSlug)window.spinToSlug(d.slug);
    var _th=(d.type==='LS_THEME'||d.ls==='theme')?d.theme:null;
    if(d.type==='LS_HINT'){ try{ if(d.text){ if(typeof echoMsg==='function')echoMsg(d.text);} else { if(typeof echoClear==='function')echoClear(); } }catch(_e){} }
    if(_th){ try{ if(typeof setTheme==='function') setTheme(_th); else document.documentElement.setAttribute('data-theme',_th); }catch(_e){ document.documentElement.setAttribute('data-theme',_th); } }});

  // Drag sheet by bar
  (function(){
    var bar=$('dgSheetBar'),win=$('dgSheet'),drag=false,sx,sy,ox,oy;
    function down(e){drag=true;bar.classList.add('drag');var p=e.touches?e.touches[0]:e;
      sx=p.clientX;sy=p.clientY;var r=win.getBoundingClientRect();ox=r.left;oy=r.top;
      win.style.right='auto';win.style.left=ox+'px';win.style.top=oy+'px';e.preventDefault();}
    function move(e){if(!drag)return;var p=e.touches?e.touches[0]:e;
      var nx=Math.max(4,Math.min(window.innerWidth-80,ox+(p.clientX-sx)));
      var ny=Math.max(4,Math.min(window.innerHeight-40,oy+(p.clientY-sy)));
      win.style.left=nx+'px';win.style.top=ny+'px';}
    function up(){drag=false;bar.classList.remove('drag');}
    bar.addEventListener('mousedown',down);document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    bar.addEventListener('touchstart',down,{passive:false});document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
  })();

  // Sheet opacity slider
  var sheetOp=$('dgSheetOpacitySlider');
  var sheetEl=$('dgSheet');
  if(sheetOp&&sheetEl){
    var savedSheetOp;try{savedSheetOp=localStorage.getItem('ls_sheet_opacity');}catch(e){}
    if(savedSheetOp){sheetOp.value=savedSheetOp;sheetEl.style.opacity=(savedSheetOp/100);}
    sheetOp.addEventListener('input',function(){
      sheetEl.style.opacity=(sheetOp.value/100);
      try{localStorage.setItem('ls_sheet_opacity',sheetOp.value);}catch(e){};
    });
  }

  // ── Notepad ───────────────────────────────────────────────────────
  var GFIELDS=[['appearance','Appearance','Aspecto'],['aroma','Aroma','Aroma'],['flavor','Flavor','Sabor'],['finish','Finish','Final'],['verdict','Verdict','Veredicto']];
  var KEY=SUBJ+'Notes',state={mode:'raw',raw:'',guided:{},rating:0},capture=false;
  try{var saved=JSON.parse(localStorage.getItem(KEY));if(saved)state=Object.assign(state,saved);}catch(e){}

  function persist(){
    try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}
    var s=$('npSaved');if(s){s.textContent=ES()?'Guardado ✓':'Saved ✓';clearTimeout(persist._t);persist._t=setTimeout(function(){s.textContent='';},1200);}
  }
  function buildGuided(){
    var es=ES(),h='';
    GFIELDS.forEach(function(f){
      h+='<div class="np-field" data-f="'+f[0]+'"><label>'+(es?f[2]:f[1])+'</label><textarea data-f="'+f[0]+'">'+(state.guided[f[0]]||'').replace(/</g,'&lt;')+'</textarea></div>';
    });
    h+='<div class="np-field"><label>'+(es?'Puntuación':'Rating')+'</label><div id="npStars">'+[1,2,3,4,5].map(function(n){return '<b data-n="'+n+'">★</b>';}).join('')+'</div></div>';
    $('npGuided').innerHTML=h;
    var sel=$('npCapTarget');
    sel.innerHTML=GFIELDS.map(function(f){return '<option value="'+f[0]+'">'+(es?f[2]:f[1])+'</option>';}).join('');
    sel.value=GFIELDS[1][0];
    $('npGuided').querySelectorAll('textarea').forEach(function(ta){
      ta.addEventListener('input',function(){state.guided[ta.getAttribute('data-f')]=ta.value;persist();});
      ta.addEventListener('focus',function(){
        $('npGuided').querySelectorAll('.np-field').forEach(function(x){x.classList.remove('active');});
        ta.closest('.np-field').classList.add('active');var _ct=$('npCapTarget');if(_ct)_ct.value=ta.getAttribute('data-f');
      });
    });
    paintStars();
    $('npStars').querySelectorAll('b').forEach(function(b){
      b.addEventListener('click',function(){state.rating=parseInt(b.getAttribute('data-n'),10);paintStars();persist();});
    });
  }
  function paintStars(){var st=$('npStars');if(!st)return;st.querySelectorAll('b').forEach(function(b){b.classList.toggle('on',parseInt(b.getAttribute('data-n'),10)<=state.rating);});}
  function setMode(m){
    var grid=(m==='grid');if(!grid)state.mode=m;
    $('npModeRaw').classList.toggle('cur',m==='raw');
    $('npModeGuided').classList.toggle('cur',m==='guided');
    $('npModeGrid').classList.toggle('cur',grid);
    $('npRaw').style.display=m==='raw'?'':'none';
    $('npGuided').style.display=m==='guided'?'':'none';
    $('npGrid').style.display=grid?'':'none';
    var cap=document.querySelector('.np-cap');if(cap)cap.style.display=grid?'none':'';
    var foot=$('npFoot');if(foot)foot.style.display=grid?'none':'flex';
    if(!grid)persist();
  }
  var _nr=$('npRawText');if(!_nr)return;_nr.value=state.raw||'';
  $('npRawText').addEventListener('input',function(){state.raw=$('npRawText').value;persist();});

  function buildGrid(){var es=ES();
    $('npGrid').innerHTML='<div class="ng-lede">'+(es?'Pon a prueba tu cata a ciegas: completa una cuadrícula deductiva estilo CMS.':'Test your blind tasting: run a full CMS-style deductive grid — Sight, Nose, Palate, Initial & Final Conclusion — and get a structured check on your call.')+'</div>'+
    '<div class="ng-preview"><div class="ng-faux">'+
    '<div class="ng-row"><b>'+(es?'Vista':'Sight')+'</b><span>'+(es?'claridad · color · ribete':'clarity · color · rim')+'</span></div>'+
    '<div class="ng-row"><b>'+(es?'Nariz':'Nose')+'</b><span>'+(es?'fruta · no-fruta · roble':'fruit · non-fruit · oak')+'</span></div>'+
    '<div class="ng-row"><b>'+(es?'Boca':'Palate')+'</b><span>'+(es?'dulzor · acidez · taninos':'sweetness · acid · tannin')+'</span></div>'+
    '<div class="ng-row"><b>'+(es?'Inicial':'Initial')+'</b><span>'+(es?'Viejo/Nuevo Mundo · clima':'Old/New World · climate')+'</span></div>'+
    '<div class="ng-row"><b>'+(es?'Final':'Final')+'</b><span>'+(es?'uva · país · región':'grape · country · region')+'</span></div>'+
    '</div><div class="ng-lock"><span>🔒</span></div></div>'+
    '<a class="ng-cta" href="deductive.html" target="_blank" rel="noopener">'+(es?'Abre el CMS Deductive Grid':'Open CMS Deductive Grid')+'</a>'+
    '<div class="ng-foot">'+(es?'Incluido en el Vault · LearnSomm.com':'Included in the Vault · LearnSomm.com')+'</div>';
  }

  $('npModeGrid').addEventListener('click',function(){buildGrid();setMode('grid');});
  $('npModeRaw').addEventListener('click',function(){setMode('raw');});
  $('npModeGuided').addEventListener('click',function(){if(!$('npGuided').innerHTML)buildGuided();setMode('guided');});

  $('npOpen').addEventListener('click',function(){
    $('npPanel').classList.add('on');$('npPanel').setAttribute('aria-hidden','false');
    $('npPanel').classList.add('free');positionNpFree();
    var es=ES();
    var _nt=$('npTitle');if(_nt)_nt.textContent=es?'Diario de Cata':'Tasting Journal';
    var _nm=$('npModeRaw');if(_nm)_nm.textContent=es?'Notas libres':'Raw notes';
    (function(_e){return _e?_e:{};})($('npModeGuided')).textContent=es?'Formulario':'Guided form';
    (function(_e){return _e?_e:{};})($('npModeGrid')).textContent=es?'Cuadrícula':'Blind Grid';
    (function(_e){return _e?_e:{};})($('npOpenLbl')).textContent=es?'Diario de Cata':'Tasting Journal';
    var _dl=$('dgSheetLbl');if(_dl)_dl.textContent=es?'Hoja':'Cheat Sheet';
    if($('dgSheetHint'))$('dgSheetHint').textContent=es?'arrastra · clic en un aroma':'drag · click an aroma';
    if(state.mode==='guided'){if(!$('npGuided').innerHTML)buildGuided();setMode('guided');}else setMode('raw');
  });
  $('npClose').addEventListener('click',function(){$('npPanel').classList.remove('on');$('npPanel').setAttribute('aria-hidden','true');});
  $('npCapBtn').addEventListener('click',function(){
    capture=!capture;var es=ES();
    this.classList.toggle('on',capture);
    this.textContent=(es?'🎯 Capturar: ':'🎯 Capture: ')+(capture?(es?'Sí':'On'):(es?'No':'Off'));
  });
  $('npCopy').addEventListener('click',function(){
    var txt=state.mode==='raw'?state.raw:GFIELDS.map(function(f){return (f[1]+': '+(state.guided[f[0]]||'')).trim();}).join('\n')+(state.rating?'\nRating: '+state.rating+'/5':'');
    try{navigator.clipboard.writeText(txt);}catch(e){}
    var s=$('npSaved');if(s){s.textContent=ES()?'Copiado ✓':'Copied ✓';setTimeout(function(){s.textContent='';},1200);}
  });
  $('npClear').addEventListener('click',function(){
    if(!confirm(ES()?'¿Borrar todas las notas?':'Clear all notes?'))return;
    state={mode:state.mode,raw:'',guided:{},rating:0};
    var _nr2=$('npRawText');if(_nr2)_nr2.value='';if($('npGuided').innerHTML)buildGuided();persist();
  });

  // ── npPanel drag from header + resize from all corners/edges ──────
  var panel=$('npPanel');
  function positionNpFree(){
    if(!panel.classList.contains('free')){return;}
    var saved;try{saved=JSON.parse(localStorage.getItem('ls_np_pos'));}catch(e){}
    if(saved&&saved.left!=null){
      panel.style.left=saved.left+'px';panel.style.top=saved.top+'px';
      panel.style.width=saved.w+'px';panel.style.height=saved.h+'px';
      panel.style.right='auto';panel.style.bottom='auto';
    }else{
      var w=Math.min(380,window.innerWidth*0.92);
      var h=Math.min(window.innerHeight-80,600);
      panel.style.width=w+'px';panel.style.height=h+'px';
      panel.style.left=(window.innerWidth-w-16)+'px';panel.style.top='60px';
      panel.style.right='auto';panel.style.bottom='auto';
    }
  }
  function saveNpPos(){
    try{localStorage.setItem('ls_np_pos',JSON.stringify({
      left:parseInt(panel.style.left),top:parseInt(panel.style.top),
      w:panel.offsetWidth,h:panel.offsetHeight}));}catch(e){}
  }

  // Header drag
  var header=panel.querySelector('header');
  var hDrag=null;
  header.addEventListener('pointerdown',function(e){
    if(e.target.closest('#npClose,#npOpacityRow,#npOpacitySlider'))return;
    panel.classList.add('free');positionNpFree();
    var r=panel.getBoundingClientRect();
    hDrag={ox:r.left,oy:r.top,sx:e.clientX,sy:e.clientY};
    header.setPointerCapture(e.pointerId);e.preventDefault();
  });
  header.addEventListener('pointermove',function(e){
    if(!hDrag)return;
    var nx=Math.max(0,Math.min(window.innerWidth-80,hDrag.ox+(e.clientX-hDrag.sx)));
    var ny=Math.max(0,Math.min(window.innerHeight-40,hDrag.oy+(e.clientY-hDrag.sy)));
    panel.style.left=nx+'px';panel.style.top=ny+'px';
  });
  header.addEventListener('pointerup',function(){if(hDrag){saveNpPos();hDrag=null;}});

  // Corner/edge resize handles
  panel.querySelectorAll('.np-resize').forEach(function(handle){
    var rDrag=null;
    handle.addEventListener('pointerdown',function(e){
      var r=panel.getBoundingClientRect();
      rDrag={dir:handle.getAttribute('data-dir'),
        ox:r.left,oy:r.top,ow:r.width,oh:r.height,sx:e.clientX,sy:e.clientY};
      handle.setPointerCapture(e.pointerId);e.preventDefault();e.stopPropagation();
    });
    handle.addEventListener('pointermove',function(e){
      if(!rDrag)return;
      var dx=e.clientX-rDrag.sx,dy=e.clientY-rDrag.sy;
      var d=rDrag.dir,nl=rDrag.ox,nt=rDrag.oy,nw=rDrag.ow,nh=rDrag.oh;
      var MIN_W=220,MIN_H=200;
      if(d.includes('e'))nw=Math.max(MIN_W,rDrag.ow+dx);
      if(d.includes('s'))nh=Math.max(MIN_H,rDrag.oh+dy);
      if(d.includes('w')){nw=Math.max(MIN_W,rDrag.ow-dx);nl=rDrag.ox+rDrag.ow-nw;}
      if(d.includes('n')){nh=Math.max(MIN_H,rDrag.oh-dy);nt=rDrag.oy+rDrag.oh-nh;}
      panel.style.left=nl+'px';panel.style.top=nt+'px';
      panel.style.width=nw+'px';panel.style.height=nh+'px';
      panel.style.right='auto';panel.style.bottom='auto';
    });
    handle.addEventListener('pointerup',function(){if(rDrag){saveNpPos();rDrag=null;}});
  });

  // Opacity slider for npPanel
  function setNpAlpha(v){var a=(v/100);var dark=document.documentElement.getAttribute('data-theme')!=='light';var rgb=dark?'22,19,14':'247,242,224';panel.style.background='rgba('+rgb+','+a+')';panel.style.backdropFilter='blur(6px)';}
  var npOp=$('npOpacitySlider');
  if(npOp){
    var savedOp;try{savedOp=localStorage.getItem('ls_np_opacity');}catch(e){}
    if(savedOp){npOp.value=savedOp;}setNpAlpha(npOp.value);
    npOp.addEventListener('input',function(){
      setNpAlpha(npOp.value);
      try{localStorage.setItem('ls_np_opacity',npOp.value);}catch(e){};
    });

<script>


/* Hub center drag in free/detached mode */
(function(){
  var svgC=document.getElementById('svgContainer'),hub=document.getElementById('hubCenter');
  if(!svgC||!hub)return;
  var wDrag=null;
  function onDown(e){
    var mode=document.body.getAttribute('data-mode')||'';
    if(mode==='dock-left'||mode==='dock-right')return;
    var r=svgC.getBoundingClientRect();
    wDrag={dx:e.clientX-r.left,dy:e.clientY-r.top};
    hub.setPointerCapture(e.pointerId);e.preventDefault();e.stopPropagation();
  }
  function onMove(e){if(!wDrag)return;
    var __hw=(svgC.getBoundingClientRect().width||300)/2;var L=Math.max(-__hw,Math.min(e.clientX-wDrag.dx,window.innerWidth-__hw));
    var T=Math.max(58,Math.min(e.clientY-wDrag.dy,window.innerHeight-80));
    svgC.style.left=L+'px';svgC.style.top=T+'px';
    var wm=document.getElementById('wheelMove'),wm2=document.getElementById('wheelMove2');
    if(wm){wm.style.left=L+'px';wm.style.top=Math.max(58,T-22)+'px';}
    if(wm2){wm2.style.left=(L+svgC.offsetWidth-46)+'px';wm2.style.top=Math.max(58,T-22)+'px';}
  }
  function onUp(){wDrag=null;}
  hub.style.cursor='grab';
  hub.addEventListener('pointerdown',onDown);
  hub.addEventListener('pointermove',onMove);
  hub.addEventListener('pointerup',onUp);
  hub.addEventListener('pointercancel',onUp);
  document.body.addEventListener('click',function(){
    var mode=document.body.getAttribute('data-mode')||'';
    hub.style.cursor=(mode==='dock-left'||mode==='dock-right')?'default':'grab';
  });
})();


</script>

<script>
/* user font-size control for wheel ring text (bounded) */
(function(){
  var MIN=0.8, MAX=1.7, STEP=0.12, KEY='ls_wheel_fontscale';
  var scale=1; try{ scale=parseFloat(localStorage.getItem(KEY))||1; }catch(e){}
  scale=Math.max(MIN,Math.min(MAX,scale));
  var svg=document.getElementById('wheelSvg');
  function applyScale(){
    if(!svg)return;
    svg.querySelectorAll('text').forEach(function(t){
      var base=t.getAttribute('data-basefs');
      if(base===null){
        // capture original size once (attribute or computed)
        var fs=t.getAttribute('font-size'); if(!fs){ try{fs=getComputedStyle(t).fontSize;}catch(e){fs='';} }
        base=parseFloat(fs)||0; if(!base)return;
        t.setAttribute('data-basefs',base);
      }
      base=parseFloat(base); if(!base)return;
      t.setAttribute('font-size',(base*scale).toFixed(2));
    });
  }
  // re-apply after the engine redraws the wheel
  if(svg){
    var mo=new MutationObserver(function(){ // new text nodes have no data-basefs yet
      applyScale();
    });
    mo.observe(svg,{childList:true,subtree:true});
  }
  function setScale(s){ scale=Math.max(MIN,Math.min(MAX,s)); try{localStorage.setItem(KEY,scale);}catch(e){}
    // reset captured bases so new factor applies cleanly off the ORIGINAL size
    if(svg) svg.querySelectorAll('text[data-basefs]').forEach(function(t){
      t.setAttribute('font-size',(parseFloat(t.getAttribute('data-basefs'))*scale).toFixed(2)); });
  }
  window.__lsBumpFont=function(dir){ setScale(scale+(dir||1)*STEP); };
  // build control into the bar
  function build(){
    var bar=document.getElementById('topctl')||document.querySelector('.topctl')||document.querySelector('.controls');
    if(!bar||document.getElementById('lsFontWrap'))return;
    var es=false; try{es=document.documentElement.getAttribute('lang')==='es';}catch(e){}
    var w=document.createElement('span'); w.id='lsFontWrap'; w.title=es?'Tamaño de texto de la rueda':'Wheel text size';
    var minus=document.createElement('button'); minus.textContent='A'; minus.style.fontSize='.7rem'; minus.setAttribute('aria-label',es?'Reducir texto':'Smaller text');
    var ico=document.createElement('span'); ico.className='lsF-ico'; ico.textContent='A';
    var plus=document.createElement('button'); plus.textContent='A'; plus.style.fontSize='1.05rem'; plus.setAttribute('aria-label',es?'Agrandar texto':'Larger text');
    minus.addEventListener('click',function(){ setScale(scale-STEP); });
    plus.addEventListener('click',function(){ setScale(scale+STEP); });
    w.appendChild(minus); w.appendChild(ico); w.appendChild(plus); bar.appendChild(w);
  }
  function init(){ build(); setTimeout(applyScale,400); }
  if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded',init);
})();
</script>

<script id="lsCmdBridge">
/* command bridge v2: dashboard drives the wheel. Calls globals when present, else clicks controls. */
(function(){
  function $(id){return document.getElementById(id);}
  function clk(id){var e=$(id); if(e){e.click(); return true;} return false;}
  function gfn(name){ try{ return (typeof window[name]==='function')?window[name]:null; }catch(e){ return null; } }
  var curTheme='light', curLang='en';
  try{ curTheme=document.documentElement.getAttribute('data-theme')||'light'; }catch(e){}
  try{ curLang=document.documentElement.getAttribute('lang')||'en'; }catch(e){}

  function handle(cmd,value){
    switch(cmd){
      case 'spin': clk('spinBtn'); break;
      case 'dock-left': clk('modeDockL'); break;
      case 'dock-right': clk('modeDockR'); break;
      case 'free': clk('modeFree'); break;
      case 'theme': {
        var th=(value==='dark'||value==='light')?value:(curTheme==='dark'?'light':'dark');
        var f=gfn('setTheme'); if(f){f(th);} else { clk('themeBtn'); }
        curTheme=th; break;
      }
      case 'lang': {
        var l=(value==='en'||value==='es')?value:(curLang==='en'?'es':'en');
        var f2=gfn('setLang'); if(f2){f2(l);} else { clk('langBtn'); }
        curLang=l; break;
      }
      case 'glow': case 'logo': clk('glowBtn'); break;
      case 'focus': if(!clk('fsBtn')){ try{ (document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()); }catch(e){} } break;
      case 'reset': clk('zoomReset'); break;
      case 'size-up': clk('zoomIn'); break;
      case 'size-down': clk('zoomOut'); break;
      case 'font-up': if(window.__lsBumpFont)window.__lsBumpFont(1); break;
      case 'font-down': if(window.__lsBumpFont)window.__lsBumpFont(-1); break;
    }
  }
  window.addEventListener('message',function(ev){
    var d=ev.data; if(!d||d.type!=='LS_CMD')return;
    handle(d.cmd,d.value);
  });
  try{ if(window.parent&&window.parent!==window) window.parent.postMessage({type:'LS_WHEEL_READY'},'*'); }catch(e){}
})();
</script>

<script id="lsPanelFollow">
(function(){
  var GAP=48; /* ~half inch */
  var panel=document.getElementById('detailPanel');
  var svg=document.getElementById('wheelSvg')||document.getElementById('svgContainer');
  if(!panel||!svg) return;
  var detached=false;

  // add a drag grip
  var grip=document.createElement('div'); grip.className='ls-pan-grip'; grip.innerHTML='⠿'; grip.title='Drag to detach';
  panel.appendChild(grip);

  function wheelRect(){
    var el=document.getElementById('svgContainer')||svg;
    return el.getBoundingClientRect();
  }
  function place(){
    if(detached) return;
    var r=wheelRect();
    panel.classList.add('ls-bound'); panel.classList.remove('ls-free');
    var left=r.right+GAP;
    var top=r.top;
    // keep on screen
    var maxLeft=window.innerWidth-Math.min(panel.offsetWidth||320,window.innerWidth*0.5)-12;
    if(left>maxLeft) left=Math.max(12,maxLeft);
    panel.style.left=left+'px';
    panel.style.top=Math.max(12,top)+'px';
    panel.style.width=''; /* default width from CSS */
  }
  // re-place on resize of window or wheel (observe the wheel container size)
  window.addEventListener('resize',place);
  try{
    var ro=new ResizeObserver(function(){ place(); });
    ro.observe(document.getElementById('svgContainer')||svg);
  }catch(e){}
  // also re-place shortly after any size command / spin settle
  document.addEventListener('click',function(){ if(!detached) setTimeout(place,60); });
  // re-place when wheel transform changes (size adjust) — poll lightly
  var lastW=0;
  setInterval(function(){ if(detached)return; var w=(document.getElementById('svgContainer')||svg).getBoundingClientRect().width; if(Math.abs(w-lastW)>2){ lastW=w; place(); } },400);

  function detach(){ detached=true; panel.classList.remove('ls-bound'); panel.classList.add('ls-free'); grip.title='Detached — drag to move'; }

  // drag to move (and detach on first drag)
  var dragging=false,sx,sy,ox,oy;
  grip.addEventListener('pointerdown',function(e){
    dragging=true; if(!detached) detach();
    var r=panel.getBoundingClientRect(); ox=r.left; oy=r.top; sx=e.clientX; sy=e.clientY;
    grip.setPointerCapture(e.pointerId); e.preventDefault();
  });
  grip.addEventListener('pointermove',function(e){
    if(!dragging)return;
    panel.style.left=(ox+(e.clientX-sx))+'px';
    panel.style.top=(oy+(e.clientY-sy))+'px';
  });
  grip.addEventListener('pointerup',function(e){ dragging=false; try{grip.releasePointerCapture(e.pointerId);}catch(_e){} });

  // detach when the user manually resizes (the CSS resize handle on .ls-free); also allow resize after detach
  panel.addEventListener('mousedown',function(e){
    // bottom-right resize zone
    var r=panel.getBoundingClientRect();
    if(e.clientX>r.right-18 && e.clientY>r.bottom-18){ if(!detached) detach(); }
  });

  // initial placement once layout settles
  setTimeout(place,300); setTimeout(place,900);
})();
</script>

<script id="lsHubSpin">
(function(){
  function ready(fn){ if(document.readyState!=='loading')fn(); else document.addEventListener('DOMContentLoaded',fn); }
  ready(function(){
    var tries=0;
    (function arm(){
      var disc=document.getElementById('lsHubDisc');
      if(!disc){ if(tries++<30) return setTimeout(arm,200); return; }
      disc.classList.add('ls-spinnable');
      function inFree(){
        try{ return document.body.getAttribute('data-mode')==='detached'; }catch(e){ return false; }
      }
      function doSpin(){
        var sb=document.getElementById('spinBtn');
        if(sb && !sb.disabled){ sb.click(); }
      }
      // Tap-to-spin with drag detection (so free-mode dragging the hub doesn't fire a spin)
      var downX=0, downY=0, moved=false, downT=0;
      disc.addEventListener('pointerdown', function(e){
        downX=e.clientX; downY=e.clientY; moved=false; downT=Date.now();
      }, true);
      disc.addEventListener('pointermove', function(e){
        if(Math.abs(e.clientX-downX)>6 || Math.abs(e.clientY-downY)>6) moved=true;
      }, true);
      disc.addEventListener('pointerup', function(e){
        // Spin on ANY tap that isn't a drag, regardless of how long it was held.
        // Drag (moved > 6px) = move the wheel in free mode; everything else spins.
        if(!moved){ doSpin(); }
      }, true);
      // keyboard / accessibility
      disc.setAttribute('role','button'); disc.setAttribute('tabindex','0');
      disc.setAttribute('aria-label','Spin the wheel');
      disc.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); doSpin(); } });
    })();
  });
})();
</script>

<script id="lsWheelDesign">
(function(){
  function el(id){return document.getElementById(id);}
  function hexLighten(hex,amt){ // amt -100..100
    try{ var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255;
      var f=amt/100; if(f>=0){ r=Math.round(r+(255-r)*f); g=Math.round(g+(255-g)*f); b=Math.round(b+(255-b)*f); }
      else { f=-f; r=Math.round(r*(1-f)); g=Math.round(g*(1-f)); b=Math.round(b*(1-f)); }
      return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
    }catch(e){ return hex; }
  }
  function textOnHex(hex){ try{ var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    return (0.299*r+0.587*g+0.114*b)>150?'#2a211c':'#fff'; }catch(e){ return '#2a211c'; } }

  // Recolor categories from a palette: assign one palette color per category, derive sub/descriptor shades.
  function applyPalette(palette){
    try{
      if(!palette||!palette.length) return;
      var svg=document.getElementById('wheelSvg'); if(!svg) return;
      // category cells (innermost solid ring, not sub, not desc)
      var cats=[].slice.call(svg.querySelectorAll('.cell:not(.sub-cell):not(.desc-seg)'));
      // map each category cell to a palette color, in document order
      var catColor={};
      cats.forEach(function(c,i){ var base=palette[i%palette.length]; c.setAttribute('fill',base); c.__base=base; catColor[i]=base; });
      // sub cells: lighten parent base. Group subs by nearest preceding category via angular midpoint.
      // Simpler robust approach: walk siblings — subs follow their category in DOM creation order grouped per category.
      // We re-derive by matching each sub to the category whose angular span contains the sub's midpoint.
      function midAngle(el){ try{ var bb=el.getBBox(); var cx=bb.x+bb.width/2, cy=bb.y+bb.height/2; return Math.atan2(cy,cx); }catch(e){ return 0; } }
      var catSpans=cats.map(function(c){ try{var bb=c.getBBox(); return {el:c, a:Math.atan2(bb.y+bb.height/2, bb.x+bb.width/2), base:c.__base};}catch(e){return {el:c,a:0,base:c.__base};} });
      function nearestBase(el){ var a=midAngle(el); var best=catSpans[0], bd=999; catSpans.forEach(function(s){ var d=Math.abs(Math.atan2(Math.sin(a-s.a),Math.cos(a-s.a))); if(d<bd){bd=d;best=s;} }); return best?best.base:palette[0]; }
      var subs=[].slice.call(svg.querySelectorAll('.sub-cell'));
      subs.forEach(function(s,j){ var base=nearestBase(s); s.setAttribute('fill', _hl(base, 12)); });
      // descriptor gradients: each desc-seg uses url(#pgN); rewrite the gradient stops to its category base
      var descs=[].slice.call(svg.querySelectorAll('.desc-seg'));
      descs.forEach(function(d){
        var base=nearestBase(d);
        var f=d.getAttribute('fill')||''; var m=f.match(/url\(#([^)]+)\)/);
        if(m){ var g=document.getElementById(m[1]); if(g){ var stops=g.querySelectorAll('stop'); if(stops[0])stops[0].setAttribute('stop-color',_hl(base,22)); if(stops[1])stops[1].setAttribute('stop-color',_hl(base,46)); } }
        else { d.setAttribute('fill', _hl(base,22)); }
      });
      // refresh hub glow ring colors if present
      try{ if(typeof setRing==='function'){ var rc=palette.slice(); setRing(rc); } }catch(e){}
    }catch(e){}
  }
  function _hl(hex,amt){ try{ if(hex[0]!=='#')return hex; var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255; var f=amt/100; if(f>=0){r=Math.round(r+(255-r)*f);g=Math.round(g+(255-g)*f);b=Math.round(b+(255-b)*f);}else{f=-f;r=Math.round(r*(1-f));g=Math.round(g*(1-f));b=Math.round(b*(1-f));} return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;} }

  function applyGlow(opt){
    var disc=el('lsHubDisc'); if(!disc) return;
    disc.classList.remove('ls-glow-solid','ls-glow-pulse','ls-glow-breathe','ls-glow-rainbow');
    if(!opt || !opt.mode || opt.mode==='off'){ return; }
    if(opt.color){ disc.style.setProperty('--ls-glow', opt.color); }
    if(opt.mode==='rainbow'){ disc.classList.add('ls-glow-rainbow'); }
    else if(opt.mode==='pulse'){ disc.classList.add('ls-glow-pulse'); }
    else if(opt.mode==='breathe'){ disc.classList.add('ls-glow-breathe'); }
    else { disc.classList.add('ls-glow-solid'); }
  }

  window.addEventListener('message',function(ev){
    var d=ev.data; if(!d) return;
    if(d.type==='LS_PALETTE'){ applyPalette(d.palette); try{ if(document.getElementById('listView') && document.getElementById('listView').classList.contains('active') && typeof rebuildList==='function') rebuildList(); }catch(e){} }
    if(d.type==='LS_GLOW'){ applyGlow(d.glow); }
  });
})();
</script>

/* bgEcho position by dock side: dock-left → top-right, dock-right → top-left */
body[data-view="wheel"][data-mode="dock-left"] #bgEcho{ left:auto !important; right:4% !important; top:10% !important; bottom:auto !important; transform:none !important; text-align:right !important; }
body[data-view="wheel"][data-mode="dock-right"] #bgEcho{ right:auto !important; left:4% !important; top:10% !important; bottom:auto !important; transform:none !important; text-align:left !important; }
</style>
<script id="lsWheelExtras">
(function(){
  // 1) transparent background when embedded (parent shows through → more visual room)
  try{
    if(window.parent && window.parent!==window){
      var s=document.createElement('style');
      s.textContent='html,body{background:transparent !important;} #bgEcho{z-index:0;}';
      document.head.appendChild(s);
    }
  }catch(e){}
  // 2) font-family cycling via LS_CMD 'font-family'
  var FONTS=[
    {ui:"'IBM Plex Sans',sans-serif", disp:"'IBM Plex Serif',Georgia,serif"},
    {ui:"'Helvetica Neue',Arial,sans-serif", disp:"Georgia,'Times New Roman',serif"},
    {ui:"'Trebuchet MS',sans-serif", disp:"'Palatino Linotype',Palatino,serif"},
    {ui:"system-ui,sans-serif", disp:"system-ui,sans-serif"},
    {ui:"'Courier New',monospace", disp:"'Courier New',monospace"}
  ];
  var fi=0;
  window.__lsCycleFont=function(){
    fi=(fi+1)%FONTS.length; var f=FONTS[fi];
    document.documentElement.style.setProperty('--ui', f.ui);
    document.documentElement.style.setProperty('--serif', f.ui);
    document.documentElement.style.setProperty('--display', f.disp);
    // apply to ring text directly
    try{ document.querySelectorAll('#wheelSvg text').forEach(function(t){ t.style.fontFamily=f.disp; }); }catch(e){}
  };
  // hook into the existing LS_CMD listener by adding our own
  window.addEventListener('message',function(ev){
    var d=ev.data; if(!d||d.type!=='LS_CMD')return;
    if(d.cmd==='font-family'){ window.__lsCycleFont(); }
  });
})();
</script>
<script id="lsFontApply">
(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
</body>
</html>
