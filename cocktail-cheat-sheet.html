<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8"><meta charset="utf-8">
<!-- LearnSomm Cheat Sheet — cocktail — companion to craft-cocktail-wheel.html -->
<meta name="viewport" content="width=device-width,initial-scale=1"><title>LearnSomm · Craft Cocktails Cheat Sheet</title><style>
:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#6b4a2f;--gold:#9a7344;--shadow:0 8px 30px rgba(80,60,30,.14);}
[data-theme="dark"]{--bg:#16130e;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;--accent:#cba47a;--gold:#d8b88a;--shadow:0 10px 34px rgba(0,0,0,.55);}
*{box-sizing:border-box}html,body{margin:0}body{background:var(--bg);color:var(--text);font-family:'Charter','Bitstream Charter','Cambria','Iowan Old Style',Georgia,serif;line-height:1.5;}
.topctl{position:fixed;top:0;right:0;z-index:50;display:flex;gap:.45rem;padding:.55rem .8rem;background:linear-gradient(to left,var(--bg) 72%,transparent);}
.topctl button{font-family:'Optima','Candara','Gill Sans','Segoe UI',sans-serif;font-size:.82rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.45rem .7rem;cursor:pointer;color:var(--text);}
.topctl button:hover{border-color:var(--gold);color:var(--accent);}.topctl .big{font-size:1.25rem;padding:.35rem .55rem;line-height:1;}
.topctl .print{background:var(--accent);color:#fff;border-color:var(--accent);}[data-theme="dark"] .topctl .print{color:#1a1410;}
.screen{max-width:720px;margin:0 auto;padding:3.4rem 1rem 4rem;}.head{text-align:center;margin-bottom:1rem;}
.kicker{font-family:'Optima',sans-serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.title{font-family:'Optima',sans-serif;font-weight:700;font-size:2.1rem;color:var(--accent);margin:.1rem 0;}.sub{color:var(--muted);font-style:italic;}
.section-label{font-family:'Optima',sans-serif;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:.6rem;margin:1.5rem 0 .7rem;}.section-label::after{content:'';flex:1;height:1px;background:var(--line);}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);margin-bottom:.55rem;overflow:hidden;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;cursor:pointer;gap:.5rem;}
.card-title{font-family:'Optima',sans-serif;font-weight:600;color:var(--accent);font-size:1.06rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.badge{font-family:'Optima',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.12rem .5rem;border-radius:20px;background:var(--gold);color:#1a1410;}
.chevron{color:var(--muted);transition:transform .2s;flex-shrink:0;}.card.active .chevron{transform:rotate(180deg);}
.card-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}.card.active .card-body{max-height:640px;}.card-inner{padding:0 1rem 1rem;}
.row{margin:.42rem 0;font-size:.95rem;display:flex;gap:.55rem;align-items:baseline;}
.tag{font-family:'Optima',sans-serif;font-size:.62rem;letter-spacing:.05em;text-transform:uppercase;font-weight:700;color:#fff;border-radius:5px;padding:.12rem .45rem;white-space:nowrap;flex-shrink:0;}
.pair .tag{background:transparent!important;color:var(--gold);border:1px solid var(--gold);}
.byline{text-align:center;color:var(--muted);font-size:.78rem;margin-top:1.6rem;font-family:'Optima',sans-serif;}.license{text-align:center;color:var(--muted);font-size:.7rem;margin-top:.3rem;font-family:'Optima',sans-serif;}
.foldhint{text-align:center;margin-top:1rem;font-family:'Optima',sans-serif;font-size:.82rem;color:var(--muted);}.foldhint b{color:var(--accent);}
.printsheet{display:none;}
@media print{@page{size:letter landscape;margin:0;}.topctl,.screen{display:none!important;}body{background:#fff;color:#000;}
.printsheet{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);width:11in;height:8.5in;}
.panel{border:1px dashed #bbb;padding:.16in .18in;overflow:hidden;position:relative;font-size:7pt;line-height:1.26;color:#1a1a1a;}
.p1{grid-column:4;grid-row:2}.p2{grid-column:3;grid-row:2}.p3{grid-column:2;grid-row:2}.p4{grid-column:1;grid-row:2}
.p5{grid-column:1;grid-row:1;transform:rotate(180deg)}.p6{grid-column:2;grid-row:1;transform:rotate(180deg)}.p7{grid-column:3;grid-row:1;transform:rotate(180deg)}.p8{grid-column:4;grid-row:1;transform:rotate(180deg)}
.panel h4{font-family:'Optima',sans-serif;font-size:8pt;color:#7b2035;margin:.02in 0 .05in;border-bottom:.5pt solid #ddd;padding-bottom:.02in;}
.pc{margin:.05in 0;break-inside:avoid;}.pc .pn{font-family:'Optima',sans-serif;font-weight:700;font-size:7.2pt;color:#5a3a18;}.pc .pl{color:#333;}
.pcover{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#7b2035;}.pcover .ct{font-family:'Optima',sans-serif;font-weight:700;font-size:15pt;}.pcover .ck{font-family:'Optima',sans-serif;font-size:6pt;letter-spacing:.16em;text-transform:uppercase;color:#a87f3d;}
.pback{font-size:6.6pt;color:#444;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}.pback .wt{font-family:'Optima',sans-serif;font-weight:700;font-size:9pt;color:#7b2035;margin-bottom:.06in;}}

#searchWrap{display:flex;align-items:center;gap:.4rem;padding:.5rem .75rem .25rem;position:sticky;top:0;z-index:10;background:var(--bg,#fff8ec);}
#searchInput{flex:1;padding:.45rem .7rem;border:1px solid var(--line,#c8b89a);border-radius:8px;font-size:.88rem;background:var(--card,#fff);color:var(--text,#2a1a0e);outline:none;font-family:inherit;}
#searchInput:focus{border-color:var(--accent,#7b2035);}
#searchClear{background:none;border:none;cursor:pointer;font-size:1rem;color:var(--muted,#8a7a6a);padding:0 .2rem;display:none;}
.no-results{text-align:center;color:var(--muted,#8a7a6a);padding:1.5rem;font-size:.9rem;display:none;}

.card[data-slug]{cursor:default;}
.card.spinnable{cursor:pointer;transition:transform .12s ease,box-shadow .12s ease;}
.card.spinnable:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(123,32,53,.25);}
.card.spinnable .card-title::after{content:" ↻";opacity:.45;font-size:.8em;}

<script>
const TC={"Includes":"#7a6a55","Best For":"#7a5a2a","Pairing Logic":"#7a5a2a","Use It For":"#7a5a2a","Tasting Cue":"#7a5a2a"};
const DATA = {"sections": [{"label": null, "cards": [{"title": "Old Fashioned Family", "title_es": "Familia Old Fashioned", "badge": "6", "badge_es": "6", "color": "#8a5a2a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Old Fashioned, Sazerac, Mint Julep, Champagne Cocktail, Rum Old Fashioned, Oaxaca Old Fashioned", "text_es": "Old Fashioned, Sazerac, Mint Julep, Champagne Cocktail, Rum Old Fashioned, Oaxaca Old Fashioned", "color": "#8a5a2a"}, {"tag": "Defining Trait", "tag_es": "Rasgo Definitorio", "text": "Spirit-forward and stirred — built around a base spirit, sugar, and bitters.", "text_es": "Con protagonismo del licor y revueltos — construidos sobre un licor base, azúcar y amargos."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The word 'cocktail' first appeared in print in an 1806 New York newspaper, defined as spirits, sugar, water, and bitters — which is to say the Old Fashioned is the original cocktail, and every other drink is a variation on it.", "text_es": "La palabra 'cocktail' apareció impresa por primera vez en un periódico de Nueva York de 1806, definida como destilado, azúcar, agua y amargos — es decir, el Old Fashioned es el cóctel original, y todo otro trago es una variación de él.", "pair": true}]}, {"title": "Sour Family", "title_es": "Familia Sour", "badge": "6", "badge_es": "6", "color": "#d6b53c", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Whiskey Sour, Daiquiri, Pisco Sour, Gimlet, Bee's Knees, Clover Club", "text_es": "Whiskey Sour, Daiquiri, Pisco Sour, Gimlet, Bee's Knees, Clover Club", "color": "#d6b53c"}, {"tag": "Defining Trait", "tag_es": "Rasgo Definitorio", "text": "The classic balance of spirit, citrus, and sweetener, shaken with ice.", "text_es": "El equilibrio clásico de licor, cítrico y endulzante, agitado con hielo."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Bartenders treat the Daiquiri as a litmus test — order one at a new bar, and how well they balance three simple ingredients (rum, lime, sugar) tells you whether to trust the rest of the menu.", "text_es": "Los bartenders usan el Daiquiri como prueba de fuego — pide uno en un bar nuevo, y lo bien que equilibren tres ingredientes simples (ron, lima, azúcar) te dice si confiar en el resto de la carta.", "pair": true}]}, {"title": "Daisy Family", "title_es": "Familia Daisy", "badge": "6", "badge_es": "6", "color": "#d97a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Margarita, Sidecar, Cosmopolitan, Aviation, Last Word, Corpse Reviver No. 2", "text_es": "Margarita, Sidecar, Cosmopolitan, Aviation, Last Word, Corpse Reviver No. 2", "color": "#d97a3a"}, {"tag": "Defining Trait", "tag_es": "Rasgo Definitorio", "text": "A sour built with a liqueur instead of plain sugar — often served over ice or up.", "text_es": "Un sour construido con un licor en lugar de azúcar simple — a menudo servido con hielo o 'up'."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "A Margarita and a Sidecar are the same drink in different clothes — both are 'daisies,' a sour where orange liqueur replaces the sugar; swap tequila-and-lime for brandy-and-lemon and you've crossed from one to the other.", "text_es": "Una Margarita y un Sidecar son el mismo trago con distinta ropa — ambos son 'daisies', un sour donde el licor de naranja sustituye al azúcar; cambia tequila-y-lima por brandy-y-limón y has pasado de uno al otro.", "pair": true}]}, {"title": "Martini & Stirred", "title_es": "Martini Y Removidos", "badge": "7", "badge_es": "7", "color": "#5a7a8a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Dry Martini, Manhattan, Martinez, Negroni, Boulevardier, Vieux Carré, Vesper", "text_es": "Dry Martini, Manhattan, Martinez, Negroni, Boulevardier, Vieux Carré, Vesper", "color": "#5a7a8a"}, {"tag": "Defining Trait", "tag_es": "Rasgo Definitorio", "text": "Spirit-forward and stirred, never shaken — clarity and chill are the point.", "text_es": "Con protagonismo del licor y revueltos, nunca agitados — la claridad y el frío son el objetivo."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The Negroni was reputedly born when Count Camillo Negroni asked a Florence bartender to stiffen his Americano with gin in place of the soda — one swap, and a bitter icon was made.", "text_es": "Se dice que el Negroni nació cuando el conde Camillo Negroni pidió a un bartender de Florencia reforzar su Americano con ginebra en lugar de la soda — un solo cambio, y nació un icono amargo.", "pair": true}]}, {"title": "Highball Family", "title_es": "Familia Highball", "badge": "7", "badge_es": "7", "color": "#3a9aa4", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Gin & Tonic, Tom Collins, Moscow Mule, Dark 'n' Stormy, Paloma, Mojito, Bloody Mary", "text_es": "Gin & Tonic, Tom Collins, Moscow Mule, Dark 'n' Stormy, Paloma, Mojito, Bloody Mary", "color": "#3a9aa4"}, {"tag": "Defining Trait", "tag_es": "Rasgo Definitorio", "text": "Spirit plus a larger volume of mixer, served long over ice — easy-drinking and refreshing.", "text_es": "Licor más una mayor cantidad de mezclador, servido en vaso alto con hielo — fácil de beber y refrescante."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The gin and tonic exists because of malaria — British colonials took bitter quinine tonic as medicine and softened it with gin, lime, and sugar until the cure became the cocktail.", "text_es": "El gin-tonic existe gracias a la malaria — los colonos británicos tomaban tónica amarga de quinina como medicina y la suavizaban con ginebra, lima y azúcar hasta que la cura se convirtió en el cóctel.", "pair": true}]}, {"title": "Sparkling & Fizz", "title_es": "Espumosos Y Fizz", "badge": "6", "badge_es": "6", "color": "#c9a0c0", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "French 75, Aperol Spritz, Gin Fizz, Ramos Gin Fizz, Mimosa, Bellini", "text_es": "French 75, Aperol Spritz, Gin Fizz, Ramos Gin Fizz, Mimosa, Bellini", "color": "#c9a0c0"}, {"tag": "Defining Trait", "tag_es": "Rasgo Definitorio", "text": "Topped with sparkling wine or soda for lift — best made just before serving.", "text_es": "Completados con vino espumoso o soda para darles ligereza — mejor prepararlos justo antes de servir."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The Ramos Gin Fizz is shaken so long — five minutes or more — that its New Orleans creator hired a relay line of 'shaker boys' to pass the tin down the bar.", "text_es": "El Ramos Gin Fizz se agita tanto tiempo — cinco minutos o más — que su creador de Nueva Orleans contrataba una hilera de 'chicos del agitador' para pasarse la coctelera por la barra.", "pair": true}]}, {"title": "Tiki & Tropical", "title_es": "Tiki Y Tropicales", "badge": "5", "badge_es": "5", "color": "#e05a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Mai Tai, Piña Colada, Zombie, Jungle Bird, Hurricane", "text_es": "Mai Tai, Piña Colada, Zombie, Jungle Bird, Hurricane", "color": "#e05a3a"}, {"tag": "Defining Trait", "tag_es": "Rasgo Definitorio", "text": "Multiple rums, fresh juices, and bold garnishes — built for warm weather and big flavor.", "text_es": "Varios rones, jugos frescos y guarniciones llamativas — pensados para climas cálidos y sabores intensos."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Tiki's two founding fathers, Don the Beachcomber and Trader Vic, both claimed to have invented the Mai Tai — and the recipe was guarded so jealously that the true spec was argued over for decades.", "text_es": "Los dos padres fundadores del tiki, Don the Beachcomber y Trader Vic, afirmaron ambos haber inventado el Mai Tai — y la receta se guardó con tanto celo que la fórmula verdadera se discutió durante décadas.", "pair": true}]}, {"title": "Coffee & Dessert", "title_es": "Café Y Postre", "badge": "4", "badge_es": "4", "color": "#5a3a2a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Espresso Martini, Irish Coffee, White Russian, Brandy Alexander", "text_es": "Espresso Martini, Irish Coffee, White Russian, Brandy Alexander", "color": "#5a3a2a"}, {"tag": "Defining Trait", "tag_es": "Rasgo Definitorio", "text": "After-dinner sippers that double as dessert — rich, sweet, and often layered.", "text_es": "Tragos de sobremesa que funcionan como postre — ricos, dulces y a menudo en capas."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The Espresso Martini was invented in 1980s London when a customer asked Dick Bradsell for something to wake her up — and the coffee-and-vodka pick-me-up went on to define the after-dinner drink.", "text_es": "El Espresso Martini se inventó en el Londres de los años 80 cuando una clienta pidió a Dick Bradsell algo para despertarse — y el estimulante de café y vodka acabó definiendo el trago de sobremesa.", "pair": true}]}]}]};
const UI={"en":{"sub":"Cocktail families & builds — pocket reference","use":"How to use","useText":"Tap a card to see what's in each category, how to use it, and a fun fact. The full Craft Cocktails Wheel (craft-cocktail-wheel.html) has detailed notes for every individual item.","wheel":"The Wheel","scan":"Companion wheel file","cover":"Pocket guide","fold":"<b>Tip:</b> hit <b>Print fold-up</b> for a one-page pocket card — print one side, fold into eighths, one short center cut, and it becomes a little booklet.","byline":"Curated by Mark Lenington · Certified Sommelier · © 2026 LearnSomm.com"},"es":{"sub":"Familias de cócteles y preparación — referencia de bolsillo","use":"Cómo usarla","useText":"Toca una tarjeta para ver qué incluye cada categoría, cómo usarla y un dato curioso. La Rueda de Cócteles de Autor completa (craft-cocktail-wheel.html) tiene notas detalladas de cada elemento.","wheel":"La Rueda","scan":"Archivo de la rueda complementaria","cover":"Guía de bolsillo","fold":"<b>Tip:</b> pulsa <b>Imprimir plegable</b> para una tarjeta de bolsillo — imprime un lado, dobla en octavos, un corte corto al centro y se vuelve un folletito.","byline":"Creado por Mark Lenington · Sommelier Certificado · © 2026 LearnSomm.com"}};
const TITLE_EN="Craft Cocktails";const TITLE_ES="Cócteles de Autor";
const $=id=>document.getElementById(id);let lang="en";
function tc(t){return TC[t]||"#7a6a55";}
function L(o,k){return lang==="es"&&o[k+"_es"]!=null?o[k+"_es"]:o[k];}
function rowHTML(r){const pc=r.pair?" pair":"";const tag=lang==="es"?(r.tag_es||r.tag):r.tag;const txt=lang==="es"?(r.text_es||r.text):r.text;const st=r.pair?"":`style="background:${r.color||tc(r.tag)}"`;return `<div class="row${pc}"><span class="tag" ${st}>${tag}</span><span>${txt}</span></div>`;}
function renderScreen(){const t=UI[lang];$("langBtn").textContent=lang==="es"?"EN":"ES";$("docTitle").textContent=lang==="es"?TITLE_ES:TITLE_EN;$("docSub").textContent=t.sub;$("foldHint").innerHTML=t.fold;$("byline").innerHTML=t.byline;
$("sections").innerHTML=DATA.sections.map(s=>{const label=s.label?L(s,"label"):null;const cards=s.cards.map(c=>{const title=L(c,"title");const badge=c.badge?(lang==="es"?(c.badge_es||c.badge):c.badge):null;return `<div class="card" data-slug="${((c.slug)||L(c,'title')||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}" data-title="${title}"><div class="card-header"><span class="card-title">${title}${badge?`<span class="badge" style="background:${c.color||'var(--gold)'}">${badge}</span>`:""}</span><span class="chevron">\u25bc</span></div><div class="card-body"><div class="card-inner">${c.rows.map(rowHTML).join("")}</div></div></div>`;}).join("");return label?`<div class="section-label">${label}</div>${cards}`:cards;}).join("");
$("sections").onclick=ev=>{const c=ev.target.closest(".card");if(c)c.classList.toggle("active");};}
const FLAT=[];DATA.sections.forEach(s=>s.cards.forEach(c=>FLAT.push({sec:s,c})));
function sizes(n){const b=Math.floor(n/5),r=n%5;return Array.from({length:5},(_,i)=>b+(i<r?1:0));}
function pcard(f){const rows=f.c.rows.filter(r=>!r.pair).slice(0,2).map(r=>`<span class="pl">${lang==="es"?(r.text_es||r.text):r.text}</span>`).join("; ");return `<div class="pc"><span class="pn">${L(f.c,"title")}</span> — ${rows}</div>`;}
function renderPrint(){const t=UI[lang];const sz=sizes(FLAT.length);const packs=[];let i=0;sz.forEach(s=>{packs.push(FLAT.slice(i,i+s));i+=s;});const TT=lang==="es"?TITLE_ES:TITLE_EN;
function cp(arr,cls){let html="";arr.forEach(f=>{html+=pcard(f);});return `<div class="panel ${cls}"><h4>${TT}</h4>${html}</div>`;}
const panels={1:`<div class="panel p1 pcover"><div class="ck">LearnSomm · Cheat Sheet</div><div class="ct">${TT}</div><div style="font-size:6pt;color:#a87f3d;margin-top:.05in">${t.cover}</div><div style="font-size:5.4pt;color:#888;margin-top:.5in">© 2026 LearnSomm.com</div></div>`,
2:cp(packs[0],"p2"),3:cp(packs[1],"p3"),4:cp(packs[2],"p4"),5:cp(packs[3],"p5"),6:cp(packs[4],"p6"),
7:`<div class="panel p7"><h4>${t.use}</h4><div class="pl">${t.useText}</div></div>`,
8:`<div class="panel p8 pback"><div class="wt">${TT}</div><div>${t.scan}:</div><div style="font-family:'Optima',sans-serif;font-weight:700;margin:.05in 0">craft-cocktail-wheel.html</div><div style="margin-top:.15in;font-size:5.4pt;color:#888">{{USER_EMAIL}}<br>© 2026 LearnSomm.com</div></div>`};
$("printsheet").innerHTML=[1,2,3,4,5,6,7,8].map(n=>panels[n]).join("");}
function renderAll(){renderScreen();renderPrint();}
$("langBtn").onclick=()=>{lang=lang==="es"?"en":"es";renderAll();};
$("themeBtn").onclick=()=>{const dk=document.body.getAttribute("data-theme")==="dark";document.body.setAttribute("data-theme",dk?"light":"dark");$("themeBtn").textContent=dk?"\u263e":"\u2600";};
$("printBtn").onclick=()=>window.print();renderAll();

function initSearch(){
  const inp=document.getElementById("searchInput");
  const clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){
    const q=inp.value.trim().toLowerCase();
    clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");
    if(!sect)return;
    let anyVisible=false;
    sect.querySelectorAll(".card").forEach(card=>{
      const txt=(card.textContent||"").toLowerCase();
      const show=!q||txt.includes(q);
      card.style.display=show?"":"none";
      if(show)anyVisible=true;
    });
    sect.querySelectorAll(".section-label").forEach(lbl=>{
      let next=lbl.nextElementSibling;let vis=false;
      while(next&&!next.classList.contains("section-label")){
        if(next.style.display!=="none")vis=true;
        next=next.nextElementSibling;
      }
      lbl.style.display=vis?"":"none";
    });
    let nr=document.querySelector(".no-results");
    if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}
    nr.style.display=anyVisible||!q?"none":"block";
  }
  inp.addEventListener("input",doFilter);
  clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});
}

initSearch();

/* ── click-to-spin ── */
(function(){
  function norm(s){return (''+s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,'');}
  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}
  document.addEventListener('click',function(e){
    var card=e.target.closest&&e.target.closest('.card[data-slug],.card[data-title]');
    if(!card)return;
    var slug=card.getAttribute('data-slug')||'';
    var title=card.getAttribute('data-title')||'';
    send(slug||title);
    if(title&&title!==slug)send(title);
  });
  try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SHEET_READY'},'*');}}catch(e){}
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='LS_WHEEL_NAMES')return;
    var names=d.names||{};
    document.querySelectorAll('.card[data-slug],.card[data-title]').forEach(function(card){
      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */

</script><script id="lsNoRightClick">

  // also discourage drag-saving of images
  document.addEventListener('dragstart',function(e){ if(e.target&&e.target.tagName==='IMG'){ e.preventDefault(); } },{capture:true});
})();
