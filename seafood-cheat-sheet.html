:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#6b4a2f;--gold:#9a7344;--shadow:0 8px 30px rgba(80,60,30,.14);}

.topctl button{font-family:'Optima','Candara','Gill Sans','Segoe UI',sans-serif;font-size:.82rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.45rem .7rem;cursor:pointer;color:var(--text);}

.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);margin-bottom:.55rem;overflow:hidden;}

@media print{@page{size:letter landscape;margin:0;}.topctl,.screen{display:none!important;}body{background:#fff;color:#000;}
.printsheet{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);width:11in;height:8.5in;}

#searchWrap{display:flex;align-items:center;gap:.4rem;padding:.5rem .75rem .25rem;position:sticky;top:0;z-index:10;background:var(--bg,#fff8ec);}

<script>
const TC={"Includes":"#7a6a55","Best For":"#7a5a2a","Pairing Logic":"#7a5a2a","Use It For":"#7a5a2a","Tasting Cue":"#7a5a2a"};
const DATA = {"sections": [{"label": null, "cards": [{"title": "Shrimp & Prawns", "title_es": "Camarones Y Langostinos", "badge": "6", "badge_es": "6", "color": "#e08a6a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Whiteleg (Farmed) Shrimp, Wild Gulf Shrimp, Tiger Prawn, Spot Prawn, Rock Shrimp, Royal Red Shrimp", "text_es": "Camarón Patiblanco (de Cultivo), Camarón Salvaje del Golfo, Langostino Tigre, Camarón Manchado, Camarón de Roca, Camarón Rojo Real", "color": "#e08a6a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Quick-cooking and versatile — grill, sauté, boil, or use raw in crudo.", "text_es": "De cocción rápida y versátiles — a la parrilla, salteados, hervidos o crudos en crudo."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Shrimp is the most-eaten seafood in the United States — and the line between 'shrimp' and 'prawn' is mostly about size and biology, not flavor; cooks use the words almost interchangeably.", "text_es": "El camarón es el marisco más consumido en EE. UU. — y la diferencia entre 'camarón' y 'langostino' es sobre todo de tamaño y biología, no de sabor; en la cocina las palabras se usan casi indistintamente.", "pair": true}]}, {"title": "Lobster & Crayfish", "title_es": "Langosta Y Cangrejo De Río", "badge": "5", "badge_es": "5", "color": "#c8503a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "American (Maine) Lobster, Spiny (Rock) Lobster, Langoustine, Crawfish, Slipper Lobster", "text_es": "Langosta Americana (de Maine), Langosta Espinosa, Cigala, Cangrejo de Río, Langosta Zapatilla", "color": "#c8503a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Simple preparations — steaming or boiling lets the sweet, delicate meat shine.", "text_es": "Preparaciones simples — al vapor o hervidos dejan brillar la carne dulce y delicada."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Lobster was once so common it was fed to prisoners and servants, who reportedly complained — it only became a luxury in the 20th century as it grew scarce and fashionable.", "text_es": "La langosta fue tan común que se daba a presos y sirvientes, que según los relatos se quejaban — solo se volvió un lujo en el siglo XX, al escasear y ponerse de moda.", "pair": true}]}, {"title": "Crabs", "title_es": "Cangrejos", "badge": "7", "badge_es": "7", "color": "#d97a4a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "King Crab, Dungeness Crab, Snow Crab, Blue Crab, Soft-Shell Crab, Stone Crab, Peekytoe Crab", "text_es": "Cangrejo Real, Cangrejo Dungeness, Cangrejo de las Nieves, Cangrejo Azul, Cangrejo de Caparazón Blando, Cangrejo de Piedra, Cangrejo Peekytoe", "color": "#d97a4a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Sweet and delicate — best with light seasoning that doesn't mask the natural flavor.", "text_es": "Dulces y delicados — mejor con sazón ligero que no enmascare el sabor natural."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "A stone crab is one of the few sustainable seafoods you can harvest without killing the animal — fishermen take a single claw and return the crab, which regrows the missing claw within about 18 months.", "text_es": "El cangrejo de piedra es uno de los pocos mariscos sostenibles que puedes capturar sin matar al animal — los pescadores toman una sola pinza y devuelven el cangrejo, que regenera la pinza en unos 18 meses.", "pair": true}]}, {"title": "Oysters", "title_es": "Ostras", "badge": "6", "badge_es": "6", "color": "#8a9a7a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Pacific Oyster, Atlantic (Eastern) Oyster, Kumamoto Oyster, Olympia Oyster, European Flat (Belon), Sydney Rock Oyster", "text_es": "Ostra del Pacífico, Ostra del Atlántico (Oriental), Ostra Kumamoto, Ostra Olympia, Ostra Plana Europea (Belon), Ostra de Roca de Sídney", "color": "#8a9a7a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Served raw on the half shell, or lightly cooked — minimal handling preserves their character.", "text_es": "Servidas crudas sobre la concha, o ligeramente cocidas — un manejo mínimo preserva su carácter."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "An oyster's flavor comes from its 'merroir' — the marine version of terroir — which is why a single species can taste sweet and mild in one bay and intensely briny in another.", "text_es": "El sabor de una ostra viene de su 'merroir' — la versión marina del terruño — por eso una misma especie puede saber dulce y suave en una bahía e intensamente salina en otra.", "pair": true}]}, {"title": "Clams", "title_es": "Almejas", "badge": "6", "badge_es": "6", "color": "#b0a080", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Littleneck Clam, Cherrystone Clam, Quahog, Manila Clam, Razor Clam, Geoduck", "text_es": "Almeja Littleneck, Almeja Cherrystone, Quahog (Almeja de Chowder), Almeja Manila, Navaja, Geoduck (Almeja Gigante)", "color": "#b0a080"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Steamed in broth, wine, or sauce — the cooking liquid becomes part of the dish.", "text_es": "Al vapor en caldo, vino o salsa — el líquido de cocción se convierte en parte del plato."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The old rule to eat shellfish only in 'R' months (September–April) comes from warm-weather 'red tides,' algal blooms that make wild shellfish unsafe; modern farmed clams in monitored waters are safe year-round.", "text_es": "La vieja regla de comer marisco solo en los meses con 'R' (septiembre–abril) viene de las 'mareas rojas' del calor, floraciones de algas que vuelven inseguro el marisco salvaje; las almejas de cultivo en aguas vigiladas son seguras todo el año.", "pair": true}]}, {"title": "Mussels & Scallops", "title_es": "Mejillones Y Vieiras", "badge": "6", "badge_es": "6", "color": "#5a7a8a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Blue Mussel, Green-Lipped Mussel, Mediterranean Mussel, Sea Scallop, Bay Scallop, Cockle", "text_es": "Mejillón Azul, Mejillón de Labio Verde, Mejillón Mediterráneo, Vieira (Grande), Vieira de Bahía, Berberecho", "color": "#5a7a8a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Mussels steam quickly in flavorful liquid; scallops sear best in a hot, dry pan.", "text_es": "Los mejillones se cuecen rápido al vapor en líquido sabroso; las vieiras se sellan mejor en sartén caliente y seca."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "With seared scallops, dryness is everything — 'dry' (untreated) scallops brown into a golden crust, while 'wet' ones soaked in preservative just steam and never sear.", "text_es": "Con las vieiras a la plancha, la sequedad lo es todo — las 'secas' (sin tratar) doran en una costra dorada, mientras que las 'húmedas' remojadas en conservante solo se cuecen al vapor y nunca se sellan.", "pair": true}]}, {"title": "Cephalopods", "title_es": "Cefalópodos", "badge": "4", "badge_es": "4", "color": "#9a6a8a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Squid (Calamari), Octopus, Cuttlefish, Baby Octopus", "text_es": "Calamar, Pulpo, Sepia (Choco), Pulpito", "color": "#9a6a8a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Quick high-heat searing or long slow braising — anything in between turns them rubbery.", "text_es": "Sellado rápido a fuego alto o cocción lenta y larga — cualquier punto intermedio los vuelve gomosos."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Squid and octopus have a narrow cooking window — cook them either very fast (seconds) or very slow (a long braise); anything in between turns them to rubber.", "text_es": "El calamar y el pulpo tienen una ventana de cocción estrecha — cocínalos muy rápido (segundos) o muy lento (un guiso largo); cualquier punto intermedio los vuelve goma.", "pair": true}]}, {"title": "Snails & Specialties", "title_es": "Caracoles Y Especialidades", "badge": "6", "badge_es": "6", "color": "#4a8a8a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Abalone, Conch, Whelk, Periwinkle, Sea Urchin (Uni), Sea Cucumber", "text_es": "Abulón (Oreja de Mar), Caracol Marino (Cobo), Buccino, Bígaro, Erizo de Mar (Uni), Pepino de Mar", "color": "#4a8a8a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Adventurous textures — often slow-cooked, tenderized, or served in small, intensely flavored bites.", "text_es": "Texturas para aventureros — a menudo cocidas lento, ablandadas o servidas en bocados pequeños e intensos."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Sea urchin is technically neither a fish nor a shellfish but an echinoderm — a spiny relative of the starfish — and the buttery 'uni' prized on sushi is actually its reproductive organs.", "text_es": "El erizo de mar técnicamente no es ni pez ni marisco, sino un equinodermo — un pariente espinoso de la estrella de mar — y el mantecoso 'uni' apreciado en el sushi son en realidad sus órganos reproductores.", "pair": true}]}]}]};
const UI={"en":{"sub":"Shellfish & specialties — pocket reference","use":"How to use","useText":"Tap a card to see what's in each category, how to use it, and a fun fact. The full Seafood Wheel (seafood-wheel.html) has detailed notes for every individual item.","wheel":"The Wheel","scan":"Companion wheel file","cover":"Pocket guide","fold":"<b>Tip:</b> hit <b>Print fold-up</b> for a one-page pocket card — print one side, fold into eighths, one short center cut, and it becomes a little booklet.","byline":"Curated by Mark Lenington · Certified Sommelier · © 2026 LearnSomm.com"},"es":{"sub":"Mariscos y especialidades — referencia de bolsillo","use":"Cómo usarla","useText":"Toca una tarjeta para ver qué incluye cada categoría, cómo usarla y un dato curioso. La Rueda de Mariscos completa (seafood-wheel.html) tiene notas detalladas de cada elemento.","wheel":"La Rueda","scan":"Archivo de la rueda complementaria","cover":"Guía de bolsillo","fold":"<b>Tip:</b> pulsa <b>Imprimir plegable</b> para una tarjeta de bolsillo — imprime un lado, dobla en octavos, un corte corto al centro y se vuelve un folletito.","byline":"Creado por Mark Lenington · Sommelier Certificado · © 2026 LearnSomm.com"}};
const TITLE_EN="Seafood";const TITLE_ES="Mariscos";
const $=id=>document.getElementById(id);let lang="en";
function tc(t){return TC[t]||"#7a6a55";}
function L(o,k){return lang==="es"&&o[k+"_es"]!=null?o[k+"_es"]:o[k];}
function rowHTML(r){const pc=r.pair?" pair":"";const tag=lang==="es"?(r.tag_es||r.tag):r.tag;const txt=lang==="es"?(r.text_es||r.text):r.text;const st=r.pair?"":`style="background:${r.color||tc(r.tag)}"`;return `<div class="row${pc}"><span class="tag" ${st}>${tag}</span><span>${txt}</span></div>`;}
function renderScreen(){const t=UI[lang];$("langBtn").textContent=lang==="es"?"EN":"ES";$("docTitle").textContent=lang==="es"?TITLE_ES:TITLE_EN;$("docSub").textContent=t.sub;$("foldHint").innerHTML=t.fold;$("byline").innerHTML=t.byline;
$("sections").innerHTML=DATA.sections.map(s=>{const label=s.label?L(s,"label"):null;const cards=s.cards.map(c=>{const title=L(c,"title");const badge=c.badge?(lang==="es"?(c.badge_es||c.badge):c.badge):null;return `<div class="card" data-slug="${((c.slug)||L(c,'title')||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}" data-title="${title}"><div class="card-header"><span class="card-title">${title}${badge?`<span class="badge" style="background:${c.color||'var(--gold)'}">${badge}</span>`:""}</span><span class="chevron">\u25bc</span></div><div class="card-body"><div class="card-inner">${c.rows.map(rowHTML).join("")}</div></div></div>`;}).join("");return label?`<div class="section-label">${label}</div>${cards}`:cards;}).join("");
$("sections").onclick=ev=>{const c=ev.target.closest(".card");if(c)c.classList.toggle("active");};}
const FLAT=[];DATA.sections.forEach(s=>s.cards.forEach(c=>FLAT.push({sec:s,c})));
function sizes(n){const b=Math.floor(n/5),r=n%5;return Array.from({length:5},(_,i)=>b+(i<r?1:0));}
function pcard(f){const rows=f.c.rows.filter(r=>!r.pair).slice(0,2).map(r=>`<span class="pl">${lang==="es"?(r.text_es||r.text):r.text}</span>`).join("; ");return `<div class="pc"><span class="pn">${L(f.c,"title")}</span> — ${rows}</div>`;}
function renderPrint(){const t=UI[lang];const sz=sizes(FLAT.length);const packs=[];let i=0;sz.forEach(s=>{packs.push(FLAT.slice(i,i+s));i+=s;});const TT=lang==="es"?TITLE_ES:TITLE_EN;
function cp(arr,cls){let html="";arr.forEach(f=>{html+=pcard(f);});return `<div class="panel ${cls}"><h4>${TT}</h4>${html}</div>`;}
const panels={1:`<div class="panel p1 pcover"><div class="ck">LearnSomm · Cheat Sheet</div><div class="ct">${TT}</div><div style="font-size:6pt;color:#a87f3d;margin-top:.05in">${t.cover}</div><div style="font-size:5.4pt;color:#888;margin-top:.5in">© 2026 LearnSomm.com</div></div>`,
2:cp(packs[0],"p2"),3:cp(packs[1],"p3"),4:cp(packs[2],"p4"),5:cp(packs[3],"p5"),6:cp(packs[4],"p6"),
7:`<div class="panel p7"><h4>${t.use}</h4><div class="pl">${t.useText}</div></div>`,
8:`<div class="panel p8 pback"><div class="wt">${TT}</div><div>${t.scan}:</div><div style="font-family:'Optima',sans-serif;font-weight:700;margin:.05in 0">seafood-wheel.html</div><div style="margin-top:.15in;font-size:5.4pt;color:#888">{{USER_EMAIL}}<br>© 2026 LearnSomm.com</div></div>`};
$("printsheet").innerHTML=[1,2,3,4,5,6,7,8].map(n=>panels[n]).join("");}
function renderAll(){renderScreen();renderPrint();}
$("langBtn").onclick=()=>{lang=lang==="es"?"en":"es";renderAll();};
$("themeBtn").onclick=()=>{const dk=document.body.getAttribute("data-theme")==="dark";document.body.setAttribute("data-theme",dk?"light":"dark");$("themeBtn").textContent=dk?"\u263e":"\u2600";};
$("printBtn").onclick=()=>window.print();renderAll();

function initSearch(){
  const inp=document.getElementById("searchInput");
  const clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){
    const q=inp.value.trim().toLowerCase();
    clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");
    if(!sect)return;
    let anyVisible=false;
    sect.querySelectorAll(".card").forEach(card=>{
      const txt=(card.textContent||"").toLowerCase();
      const show=!q||txt.includes(q);
      card.style.display=show?"":"none";
      if(show)anyVisible=true;
    });
    sect.querySelectorAll(".section-label").forEach(lbl=>{
      let next=lbl.nextElementSibling;let vis=false;
      while(next&&!next.classList.contains("section-label")){
        if(next.style.display!=="none")vis=true;
        next=next.nextElementSibling;
      }
      lbl.style.display=vis?"":"none";
    });
    let nr=document.querySelector(".no-results");
    if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}
    nr.style.display=anyVisible||!q?"none":"block";
  }
  inp.addEventListener("input",doFilter);
  clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});
}

initSearch();

/* ── click-to-spin ── */
(function(){
  function norm(s){return (''+s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,'');}
  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}
  document.addEventListener('click',function(e){
    var card=e.target.closest&&e.target.closest('.card[data-slug],.card[data-title]');
    if(!card)return;
    var slug=card.getAttribute('data-slug')||'';
    var title=card.getAttribute('data-title')||'';
    send(slug||title);
    if(title&&title!==slug)send(title);
  });
  try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SHEET_READY'},'*');}}catch(e){}
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='LS_WHEEL_NAMES')return;
    var names=d.names||{};
    document.querySelectorAll('.card[data-slug],.card[data-title]').forEach(function(card){
      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */

</script><script id="lsNoRightClick">
(function(){
  document.addEventListener('contextmenu',function(e){ e.preventDefault(); return false; },{capture:true});
  // also discourage drag-saving of images
  document.addEventListener('dragstart',function(e){ if(e.target&&e.target.tagName==='IMG'){ e.preventDefault(); } },{capture:true});
})();
</script>

(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
