 "text_es": "El St-Germain se prensa de flores de saúco recogidas a mano en los Alpes franceses cada primavera — y al principio las flores bajaban de la montaña en bicicleta.", "pair": true}]}, {"title": "Nutty & Spice Liqueurs", "title_es": "Licores De Frutos Secos Y Especias", "badge": "6", "badge_es": "6", "color": "#9a6a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Amaretto, Frangelico, Nocino, Crème de Noyaux, Fireball, Allspice Dram", "text_es": "Amaretto, Frangelico, Nocino, Crème de Noyaux, Fireball, Allspice Dram", "color": "#9a6a3a"}, {"tag": "Use It In", "tag_es": "Úsalo En", "text": "Add warmth and richness to dessert cocktails, coffee drinks, and baking.", "text_es": "Añaden calidez y riqueza a cócteles de postre, bebidas de café y repostería."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Amaretto often tastes of almond without containing a single nut — the flavor comes from apricot kernels, whose pits share the same aromatic compound as almonds.", "text_es": "El amaretto a menudo sabe a almendra sin contener un solo fruto seco — el sabor viene de los huesos de albaricoque, que comparten el mismo compuesto aromático que la almendra.", "pair": true}]}, {"title": "Coffee, Chocolate & Cream", "title_es": "Café, Chocolate Y Crema", "badge": "6", "badge_es": "6", "color": "#5a3a2a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Kahlúa, Tia Maria, Espresso Liqueur, Crème de Cacao, Baileys Irish Cream, Advocaat", "text_es": "Kahlúa, Tía María, Licor de Espresso, Crème de Cacao, Baileys Irish Cream, Advocaat", "color": "#5a3a2a"}, {"tag": "Use It In", "tag_es": "Úsalo En", "text": "Dessert in a glass — shake into cream-based cocktails or pour over ice cream.", "text_es": "Postre en un vaso — agítalos en cócteles cremosos o sírvelos sobre helado."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Baileys had to invent a way to stop cream and whiskey from separating — once they cracked that emulsion in 1974, the entire cream-liqueur category was born.", "text_es": "Baileys tuvo que inventar cómo evitar que la nata y el whiskey se separaran — cuando lograron esa emulsión en 1974, nació toda la categoría de licores de crema.", "pair": true}]}]}]};
const UI={"en":{"sub":"Styles & uses — pocket reference","use":"How to use","useText":"Tap a card to see what's in each category, how to use it, and a fun fact. The full Cordials & Liqueurs Wheel (cordials-liqueurs-wheel.html) has detailed notes for every individual item.","wheel":"The Wheel","scan":"Companion wheel file","cover":"Pocket guide","fold":"<b>Tip:</b> hit <b>Print fold-up</b> for a one-page pocket card — print one side, fold into eighths, one short center cut, and it becomes a little booklet.","byline":"Curated by Mark Lenington · Certified Sommelier · © 2026 LearnSomm.com"},"es":{"sub":"Estilos y usos — referencia de bolsillo","use":"Cómo usarla","useText":"Toca una tarjeta para ver qué incluye cada categoría, cómo usarla y un dato curioso. La Rueda de Cordiales y Licores completa (cordials-liqueurs-wheel.html) tiene notas detalladas de cada elemento.","wheel":"La Rueda","scan":"Archivo de la rueda complementaria","cover":"Guía de bolsillo","fold":"<b>Tip:</b> pulsa <b>Imprimir plegable</b> para una tarjeta de bolsillo — imprime un lado, dobla en octavos, un corte corto al centro y se vuelve un folletito.","byline":"Creado por Mark Lenington · Sommelier Certificado · © 2026 LearnSomm.com"}};

function initSearch(){
  const inp=document.getElementById("searchInput");
  const clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){
    const q=inp.value.trim().toLowerCase();
    clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");
    if(!sect)return;
    let anyVisible=false;
    sect.querySelectorAll(".card").forEach(card=>{
      const txt=(card.textContent||"").toLowerCase();
      const show=!q||txt.includes(q);
      card.style.display=show?"":"none";
      if(show)anyVisible=true;
    });
    sect.querySelectorAll(".section-label").forEach(lbl=>{
      let next=lbl.nextElementSibling;let vis=false;
      while(next&&!next.classList.contains("section-label")){
        if(next.style.display!=="none")vis=true;
        next=next.nextElementSibling;
      }
      lbl.style.display=vis?"":"none";
    });
    let nr=document.querySelector(".no-results");
    if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}
    nr.style.display=anyVisible||!q?"none":"block";
  }
  inp.addEventListener("input",doFilter);
  clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});
}

initSearch();

(function(){
  function norm(s){return (''+s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,'');}
  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}
  document.addEventListener('click',function(e){
    var card=e.target.closest&&e.target.closest('.card[data-slug],.card[data-title]');
    if(!card)return;
    var slug=card.getAttribute('data-slug')||'';
    var title=card.getAttribute('data-title')||'';
    send(slug||title);
    if(title&&title!==slug)send(title);
  });
  try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SHEET_READY'},'*');}}catch(e){}
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='LS_WHEEL_NAMES')return;
    var names=d.names||{};
    document.querySelectorAll('.card[data-slug],.card[data-title]').forEach(function(card){
      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */

</script><script id="lsNoRightClick">
(function(){
  document.addEventListener('contextmenu',function(e){ e.preventDefault(); return false; },{capture:true});
  // also discourage drag-saving of images
  document.addEventListener('dragstart',function(e){ if(e.target&&e.target.tagName==='IMG'){ e.preventDefault(); } },{capture:true});
})();
</script>
<script id="lsFontApply">
(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
</body></html>
