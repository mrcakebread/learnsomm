const TC={"Includes":"#7a6a55","Best For":"#7a5a2a","Pairing Logic":"#7a5a2a","Use It For":"#7a5a2a","Tasting Cue":"#7a5a2a"};
const DATA = {"sections": [{"label": null, "cards": [{"title": "Briny & Saline", "title_es": "Salado Y Salino", "badge": "4", "badge_es": "4", "color": "#3f6b8a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Sea Salt, Briny Liquor, Salinity Pop, Saline Finish", "text_es": "Sal Marina, Licor Salobre, Estallido Salino, Final Salino", "color": "#3f6b8a"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "A hallmark of high-salinity oceanic waters — often the first impression on the palate.", "text_es": "Un sello distintivo de aguas oceánicas de alta salinidad — a menudo la primera impresión en el paladar."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The clear liquid pooled in a freshly shucked oyster — called the 'liquor' — is filtered seawater from the oyster's own habitat, and tasting it (never pour it out!) is one of the best ways to gauge an oyster's salinity.", "text_es": "El líquido transparente que queda en una ostra recién abierta — llamado 'licor' — es agua de mar filtrada del propio hábitat de la ostra, y probarlo (¡nunca lo tires!) es una de las mejores formas de evaluar su salinidad.", "pair": true}]}, {"title": "Sweet & Melon", "title_es": "Dulce Y Melón", "badge": "4", "badge_es": "4", "color": "#c98a4a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Honeyed Sweetness, Melon, Honeydew, Watermelon Rind", "text_es": "Dulzura a Miel, Melón, Melón Verde, Cáscara de Sandía", "color": "#c98a4a"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "Often signals a lower-salinity, nutrient-rich growing environment.", "text_es": "A menudo indica un entorno de cultivo de menor salinidad y rico en nutrientes."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "An oyster's subtle sweetness isn't from sugar — it's glycogen, an energy-storage molecule, released as you chew. That's why tasting etiquette calls for three to four chews before swallowing.", "text_es": "La sutil dulzura de una ostra no viene del azúcar — es glucógeno, una molécula de reserva de energía, que se libera al masticar. Por eso la etiqueta de cata recomienda masticar tres o cuatro veces antes de tragar.", "pair": true}]}, {"title": "Vegetal & Cucumber", "title_es": "Vegetal Y Pepino", "badge": "4", "badge_es": "4", "color": "#5a6b3b", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Cucumber, Fresh Grass, Green Apple Skin, Celery", "text_es": "Pepino, Pasto Fresco, Cáscara de Manzana Verde, Apio", "color": "#5a6b3b"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "A fresh, green character common in oysters from cooler, cleaner waters.", "text_es": "Un carácter fresco y verde común en ostras de aguas más frías y limpias."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Pacific Ocean water is generally milder and less salty than the Atlantic, which is why West Coast oysters tend toward cucumber, melon, and butter notes rather than the brinier, mineral character of East Coast oysters.", "text_es": "El agua del Pacífico suele ser más suave y menos salada que la del Atlántico, por lo que las ostras de la Costa Oeste tienden a notas de pepino, melón y mantequilla en lugar del carácter más salino y mineral de las ostras de la Costa Este.", "pair": true}]}, {"title": "Mineral & Metallic", "title_es": "Mineral Y Metálico", "badge": "4", "badge_es": "4", "color": "#6a6a55", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Wet Stone, Flint, Copper, Iodine", "text_es": "Piedra Mojada, Pedernal, Cobre, Yodo", "color": "#6a6a55"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "Reflects the geology of the bay or estuary where the oyster grew.", "text_es": "Refleja la geología de la bahía o estuario donde creció la ostra."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The Belon (European Flat) oyster's strong copper-mineral finish is so distinctive that oyster lovers tend to either love it or hate it — there's rarely a middle ground.", "text_es": "El intenso final a cobre y mineral de la ostra Belon (plana europea) es tan distintivo que a los amantes de las ostras suele encantarles o disgustarles — rara vez hay un punto medio.", "pair": true}]}, {"title": "Earthy & Mushroom", "title_es": "Terroso Y Champiñón", "badge": "4", "badge_es": "4", "color": "#7b5a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Mushroom, Mollusky / Earthy, Forest Floor, Smoke", "text_es": "Champiñón, A Molusco / Terroso, Suelo de Bosque, Humo", "color": "#7b5a3a"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "Can develop with time on the half shell or in oysters from muddier bottoms.", "text_es": "Puede desarrollarse con el tiempo sobre la concha o en ostras de fondos más fangosos."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Atlantic oysters are more prone to earthy, mushroomy, and mollusky notes than their Pacific cousins — a direct reflection of the colder, often more nutrient-rich waters where Virginica oysters are grown.", "text_es": "Las ostras del Atlántico son más propensas a notas terrosas, de champiñón y a molusco que sus primas del Pacífico — un reflejo directo de las aguas más frías y a menudo más ricas en nutrientes donde se cultivan las ostras Virginica.", "pair": true}]}, {"title": "Buttery & Creamy", "title_es": "Mantecoso Y Cremoso", "badge": "4", "badge_es": "4", "color": "#c9a13a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Butter, Cream, Custard, Brioche", "text_es": "Mantequilla, Crema, Natilla, Brioche", "color": "#c9a13a"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "A sign of a plump, well-fed oyster, often at peak condition.", "text_es": "Una señal de una ostra rellena y bien alimentada, a menudo en su mejor momento."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "A Blue Point oyster's finish is famously described as 'almost buttery, woody' — proof that an oyster's flavor can echo descriptors usually reserved for wine and whiskey.", "text_es": "El final de una ostra Blue Point se describe famosamente como 'casi mantecoso, amaderado' — prueba de que el sabor de una ostra puede recordar descriptores normalmente reservados para el vino y el whisky.", "pair": true}]}, {"title": "Seaweed & Umami", "title_es": "Algas Y Umami", "badge": "4", "badge_es": "4", "color": "#3f7a5a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Seaweed, Ocean Breeze, Umami, Nutty", "text_es": "Algas, Brisa Marina, Umami, A Frutos Secos", "color": "#3f7a5a"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "The savory backbone of oyster flavor, tied to algae in the water column.", "text_es": "La base sabrosa del perfil de la ostra, ligada a las algas presentes en el agua."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Wellfleet oysters are famous for a 'distinctive seaweed finish,' while Olympia oysters are prized for 'surprisingly savory' umami — two ends of the marine flavor spectrum from a single coastline.", "text_es": "Las ostras Wellfleet son famosas por su 'distintivo final a algas', mientras que las Olympia se valoran por su umami 'sorprendentemente sabroso' — dos extremos del espectro de sabor marino de una misma costa.", "pair": true}]}, {"title": "Texture & Mouthfeel", "title_es": "Textura Y Sensación En Boca", "badge": "4", "badge_es": "4", "color": "#6b4a8a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Crisp / Firm, Plump & Meaty, Creamy / Custardy, Silky & Smooth", "text_es": "Crujiente / Firme, Carnoso y Suculento, Cremoso / Tipo Natilla, Sedoso y Suave", "color": "#6b4a8a"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "Texture is as telling as flavor — firmness and plumpness signal freshness.", "text_es": "La textura dice tanto como el sabor — la firmeza y el relleno indican frescura."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Cold water slows an oyster's metabolism, producing the crisp, firm texture typical of East Coast oysters — while the milder Pacific produces a creamier, custardier bite.", "text_es": "El agua fría ralentiza el metabolismo de la ostra, produciendo la textura crujiente y firme típica de las ostras de la Costa Este — mientras que el Pacífico, más templado, produce un bocado más cremoso, tipo natilla.", "pair": true}]}, {"title": "Species & Merroir", "title_es": "Especies Y Merroir", "badge": "12", "badge_es": "12", "color": "#8a3a4a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Wellfleet, Blue Point, Beau Soleil, Fanny Bay, Shigoku, Hammersley, Kumamoto, Hog Island Kumamoto, Bodega Bay Kumamoto, Olympia, Belon (Maine), Belon (France)", "text_es": "Wellfleet, Blue Point, Beau Soleil, Fanny Bay, Shigoku, Hammersley, Kumamoto, Hog Island Kumamoto, Bodega Bay Kumamoto, Olympia, Belon (Maine), Belon (Francia)", "color": "#8a3a4a"}, {"tag": "Tasting Cue", "tag_es": "Pista de Cata", "text": "Where an oyster grows shapes its flavor as much as which species it is.", "text_es": "Dónde crece una ostra moldea su sabor tanto como la especie a la que pertenece."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Just five oyster species account for the hundreds of named varieties found in North America — the differences between a Wellfleet and a Kumamoto come almost entirely from where and how each is grown, a concept oyster experts call 'merroir.'", "text_es": "Solo cinco especies de ostras dan origen a los cientos de variedades con nombre que se encuentran en Norteamérica — las diferencias entre una Wellfleet y una Kumamoto provienen casi por completo de dónde y cómo se cultiva cada una, un concepto que los expertos llaman 'merroir.'", "pair": true}]}]}]};
const UI={"en":{"sub":"Flavor categories & tasting cues — pocket reference","use":"How to use","useText":"Tap a card to see what's in each category, how to use it, and a fun fact. The full Oyster Tasting Wheel (oyster-tasting-wheel.html) has detailed notes for every individual item.","wheel":"The Wheel","scan":"Companion wheel file","cover":"Pocket guide","fold":"<b>Tip:</b> hit <b>Print fold-up</b> for a one-page pocket card — print one side, fold into eighths, one short center cut, and it becomes a little booklet.","byline":"Curated by Mark Lenington · Certified Sommelier · © 2026 LearnSomm.com"},"es":{"sub":"Categorías de sabor y pistas de cata — referencia de bolsillo","use":"Cómo usarla","useText":"Toca una tarjeta para ver qué incluye cada categoría, cómo usarla y un dato curioso. La Rueda de Cata de Ostras completa (oyster-tasting-wheel.html) tiene notas detalladas de cada elemento.","wheel":"La Rueda","scan":"Archivo de la rueda complementaria","cover":"Guía de bolsillo","fold":"<b>Tip:</b> pulsa <b>Imprimir plegable</b> para una tarjeta de bolsillo — imprime un lado, dobla en octavos, un corte corto al centro y se vuelve un folletito.","byline":"Creado por Mark Lenington · Sommelier Certificado · © 2026 LearnSomm.com"}};
const TITLE_EN="Oyster Tasting";const TITLE_ES="Cata de Ostras";
const $=id=>document.getElementById(id);let lang="en";
function tc(t){return TC[t]||"#7a6a55";}
function L(o,k){return lang==="es"&&o[k+"_es"]!=null?o[k+"_es"]:o[k];}
function rowHTML(r){const pc=r.pair?" pair":"";const tag=lang==="es"?(r.tag_es||r.tag):r.tag;const txt=lang==="es"?(r.text_es||r.text):r.text;const st=r.pair?"":`style="background:${r.color||tc(r.tag)}"`;return `<div class="row${pc}"><span class="tag" ${st}>${tag}</span><span>${txt}</span></div>`;}
function renderScreen(){const t=UI[lang];$("langBtn").textContent=lang==="es"?"EN":"ES";$("docTitle").textContent=lang==="es"?TITLE_ES:TITLE_EN;$("docSub").textContent=t.sub;$("foldHint").innerHTML=t.fold;$("byline").innerHTML=t.byline;
$("sections").innerHTML=DATA.sections.map(s=>{const label=s.label?L(s,"label"):null;const cards=s.cards.map(c=>{const title=L(c,"title");const badge=c.badge?(lang==="es"?(c.badge_es||c.badge):c.badge):null;return `<div class="card" data-slug="${((c.slug)||L(c,'title')||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}" data-title="${title}"><div class="card-header"><span class="card-title">${title}${badge?`<span class="badge" style="background:${c.color||'var(--gold)'}">${badge}</span>`:""}</span><span class="chevron">\u25bc</span></div><div class="card-body"><div class="card-inner">${c.rows.map(rowHTML).join("")}</div></div></div>`;}).join("");return label?`<div class="section-label">${label}</div>${cards}`:cards;}).join("");
$("sections").onclick=ev=>{const c=ev.target.closest(".card");if(c)c.classList.toggle("active");};}
const FLAT=[];DATA.sections.forEach(s=>s.cards.forEach(c=>FLAT.push({sec:s,c})));
function sizes(n){const b=Math.floor(n/5),r=n%5;return Array.from({length:5},(_,i)=>b+(i<r?1:0));}
function pcard(f){const rows=f.c.rows.filter(r=>!r.pair).slice(0,2).map(r=>`<span class="pl">${lang==="es"?(r.text_es||r.text):r.text}</span>`).join("; ");return `<div class="pc"><span class="pn">${L(f.c,"title")}</span> — ${rows}</div>`;}
function renderPrint(){const t=UI[lang];const sz=sizes(FLAT.length);const packs=[];let i=0;sz.forEach(s=>{packs.push(FLAT.slice(i,i+s));i+=s;});const TT=lang==="es"?TITLE_ES:TITLE_EN;
function cp(arr,cls){let html="";arr.forEach(f=>{html+=pcard(f);});return `<div class="panel ${cls}"><h4>${TT}</h4>${html}</div>`;}
const panels={1:`<div class="panel p1 pcover"><div class="ck">LearnSomm · Cheat Sheet</div><div class="ct">${TT}</div><div style="font-size:6pt;color:#a87f3d;margin-top:.05in">${t.cover}</div><div style="font-size:5.4pt;color:#888;margin-top:.5in">© 2026 LearnSomm.com</div></div>`,
2:cp(packs[0],"p2"),3:cp(packs[1],"p3"),4:cp(packs[2],"p4"),5:cp(packs[3],"p5"),6:cp(packs[4],"p6"),
7:`<div class="panel p7"><h4>${t.use}</h4><div class="pl">${t.useText}</div></div>`,
8:`<div class="panel p8 pback"><div class="wt">${TT}</div><div>${t.scan}:</div><div style="font-family:'Optima',sans-serif;font-weight:700;margin:.05in 0">oyster-tasting-wheel.html</div><div style="margin-top:.15in;font-size:5.4pt;color:#888">{{USER_EMAIL}}<br>© 2026 LearnSomm.com</div></div>`};
$("printsheet").innerHTML=[1,2,3,4,5,6,7,8].map(n=>panels[n]).join("");}
function renderAll(){renderScreen();renderPrint();}
$("langBtn").onclick=()=>{lang=lang==="es"?"en":"es";renderAll();};
$("themeBtn").onclick=()=>{const dk=document.body.getAttribute("data-theme")==="dark";document.body.setAttribute("data-theme",dk?"light":"dark");$("themeBtn").textContent=dk?"\u263e":"\u2600";};
$("printBtn").onclick=()=>window.print();renderAll();

function initSearch(){
  const inp=document.getElementById("searchInput");
  const clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){
    const q=inp.value.trim().toLowerCase();
    clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");
    if(!sect)return;
    let anyVisible=false;
    sect.querySelectorAll(".card").forEach(card=>{
      const txt=(card.textContent||"").toLowerCase();
      const show=!q||txt.includes(q);
      card.style.display=show?"":"none";
      if(show)anyVisible=true;
    });
    sect.querySelectorAll(".section-label").forEach(lbl=>{
      let next=lbl.nextElementSibling;let vis=false;
      while(next&&!next.classList.contains("section-label")){
        if(next.style.display!=="none")vis=true;
        next=next.nextElementSibling;
      }
      lbl.style.display=vis?"":"none";
    });
    let nr=document.querySelector(".no-results");
    if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}
    nr.style.display=anyVisible||!q?"none":"block";
  }
  inp.addEventListener("input",doFilter);
  clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});
}

initSearch();

/* ── click-to-spin ── */
(function(){
  function norm(s){return (''+s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,'');}
  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}
  document.addEventListener('click',function(e){
    var card=e.target.closest&&e.target.closest('.card[data-slug],.card[data-title]');
    if(!card)return;
    var slug=card.getAttribute('data-slug')||'';
    var title=card.getAttribute('data-title')||'';
    send(slug||title);
    if(title&&title!==slug)send(title);
  });
  try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SHEET_READY'},'*');}}catch(e){}
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='LS_WHEEL_NAMES')return;
    var names=d.names||{};
    document.querySelectorAll('.card[data-slug],.card[data-title]').forEach(function(card){
      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */

(function(){
  document.addEventListener('contextmenu',function(e){ e.preventDefault(); return false; },{capture:true});
  // also discourage drag-saving of images
  document.addEventListener('dragstart',function(e){ if(e.target&&e.target.tagName==='IMG'){ e.preventDefault(); } },{capture:true});
})();
