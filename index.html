<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudySpinners — Dashboard</title>
<!-- Universal host. A wheel = a .json (data + per-descriptor panels + per-wheel ui labels).
     2D mode drives an EMBEDDED engine (base64 → srcdoc, no separate file) via postMessage and OWNS the info panel (no fun-fact;
     field labels come from each wheel's ui[lang]). 3D mode hosts the world opener (its own loader). -->
<style>
  :root{
    --display:'Optima','Candara','Gill Sans','Gill Sans MT','Segoe UI',sans-serif;
    --ui:'IBM Plex Sans','Optima','Segoe UI',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --rail-w:248px;
  }
  :root,[data-theme="light"]{
    --bg:#faf8f3;--bg2:#f2ece0;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;
    --accent:#8a5a2a;--gold:#a87f3d;--garnet:#6E1B2E;--badge-bg:#f4eee2;--badge-line:#d8cdb8;
    --shadow:0 8px 30px rgba(80,60,30,.14);--grid:rgba(110,27,46,.045);
  }
  [data-theme="dark"]{
    --display:'Baskerville','Hoefler Text','Palatino Linotype',serif;
    --bg:#16130e;--bg2:#1b1710;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;
    --accent:#c9a96e;--gold:#d4b276;--garnet:#c25266;--badge-bg:#2a241a;--badge-line:#4a4030;
    --shadow:0 10px 34px rgba(0,0,0,.55);--grid:rgba(212,178,118,.05);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:var(--ui);color:var(--text);background:var(--bg);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:26px 26px;display:flex;flex-direction:column;min-height:100vh;overflow:hidden;
  }
  svg.ic{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}
  .nav{
    position:relative;z-index:40;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:9px 14px;background:color-mix(in srgb,var(--panel) 90%,transparent);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line);box-shadow:var(--shadow);
  }
  .brand{display:flex;flex-direction:column;line-height:1.04;margin:0 4px 0 2px}
  .brand b{font-family:var(--display);font-size:18px;letter-spacing:.5px;color:var(--garnet)}
  .brand small{font-size:9.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
  .nav .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid var(--badge-line);border-radius:10px;overflow:hidden;background:var(--panel)}
  .seg button{display:flex;align-items:center;gap:6px;font-family:var(--ui);font-size:12.5px;color:var(--muted);background:none;border:0;padding:7px 12px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--garnet);color:#fff}
  .seg button:not(.on):hover{color:var(--text);background:var(--badge-bg)}
  select,.btn{font-family:var(--ui);font-size:13px;color:var(--text);background:var(--panel);border:1px solid var(--badge-line);border-radius:9px;padding:8px 11px;cursor:pointer;transition:border-color .15s,background .15s,transform .05s}
  select{min-width:172px}
  #langPick{min-width:64px}
  .navgrp{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap}
  #ringDrops{display:inline-flex}
  #ctl3d select,#ctl2d select{min-width:150px}
  .btn:hover,select:hover{border-color:var(--accent)}
  .btn:active{transform:translateY(1px)}
  .btn.ico-btn{display:inline-flex;align-items:center;gap:7px}
  .btn.on{background:var(--garnet);color:#fff;border-color:var(--garnet)}
  .btn.tip{background:var(--gold);color:#241a08;border-color:var(--gold);font-weight:600}
  .switch{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:12.5px;color:var(--text)}
  .switch input{display:none}
  .track{width:40px;height:22px;border-radius:99px;background:var(--badge-bg);border:1px solid var(--badge-line);position:relative;transition:.18s}
  .track::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--muted);transition:.18s}
  .switch input:checked + .track{background:color-mix(in srgb,var(--garnet) 32%,var(--panel));border-color:var(--garnet)}
  .switch input:checked + .track::after{transform:translateX(18px);background:var(--garnet)}
  .body{flex:1;display:flex;min-height:0;position:relative}
  
  
  
  .rail-top{display:flex;align-items:center;gap:8px;padding:12px 12px 8px 56px;font-family:var(--display);color:var(--garnet);font-size:15px}
  .rail-scroll{flex:1;overflow-y:auto;padding:4px 8px 24px}
  .grp{margin-top:6px}
  .grp-head{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border:0;background:none;cursor:pointer;color:var(--muted);font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border-radius:7px}
  .grp-head:hover{background:var(--panel);color:var(--text)}
  .grp-head .chev{margin-left:auto;transition:transform .2s}
  .grp.collapsed .chev{transform:rotate(-90deg)}
  .grp.collapsed .grp-items{display:none}
  .grp-items{display:flex;flex-direction:column;gap:1px;padding:2px 0 4px}
  .item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;color:var(--text);font-size:13px;border:0;background:none;text-align:left;width:100%;text-decoration:none}
  .item:hover{background:var(--panel)}
  .item.active{background:color-mix(in srgb,var(--garnet) 14%,var(--panel));color:var(--garnet);font-weight:600}
  .item .ic{color:var(--accent);flex:none}
  .item.active .ic{color:var(--garnet)}
  .stage-wrap{flex:1;min-width:0;position:relative}
  .stage{position:absolute;inset:0;display:flex;gap:14px;padding:14px;min-height:0}
  .stage.hidden{display:none}
  .stage.single .slot.s2{display:none}
  .slot{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
  .slot.drop{outline:2px dashed var(--gold);outline-offset:-6px}
  .slot-head{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--badge-bg) 55%,var(--panel));flex-wrap:wrap}
  .slot-head .nm{font-family:var(--display);font-size:15px;color:var(--garnet);margin-right:auto;max-width:42%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slot-head select{min-width:140px;font-size:12px;padding:6px 8px}
  .slot-head .btn{font-size:11.5px;padding:6px 9px}
  .frame-wrap{position:relative;flex:1;min-height:0}
  iframe{width:100%;height:100%;border:0;display:block;background:transparent}
  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;text-align:center;color:var(--muted);padding:24px;pointer-events:none}
  .empty b{font-family:var(--display);color:var(--text);font-size:17px}
  .empty.hidden{display:none}
  .pill{font-family:var(--mono);font-size:11px;background:var(--badge-bg);border:1px solid var(--badge-line);border-radius:99px;padding:3px 9px;color:var(--muted)}
  .pairtag{align-self:center;writing-mode:vertical-rl;font-family:var(--display);font-size:12px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;user-select:none}
  .stage.single .pairtag{display:none}
  .info{position:absolute;left:0;right:0;bottom:0;max-height:74%;display:flex;flex-direction:column;background:var(--panel);border-top:2px solid var(--gold);border-radius:16px 16px 0 0;box-shadow:0 -10px 30px rgba(40,25,10,.18);transform:translateY(102%);transition:transform .26s cubic-bezier(.22,.7,.3,1);z-index:8}
  .info.open{transform:translateY(0)}
  /* 2D desktop: embed the wheel on the LEFT, dock the info panel on the right
     (instead of the bottom sheet that covers the wheel). Mobile (<=880) keeps the sheet. */
  @media(min-width:881px){
    .frame-wrap{ display:block; position:relative; }
    .frame-wrap>iframe.frame{ position:absolute; inset:0; width:100%; height:100%; }
    .frame-wrap>.info{
      position:absolute; top:0; right:0; bottom:0; left:auto;
      width:min(440px,46%); height:auto; max-height:none; overflow:hidden;
      transform:translateX(101%); will-change:transform;
      border-top:none; border-left:2px solid var(--gold); border-radius:0;
      box-shadow:-8px 0 22px rgba(40,25,10,.12);
      transition:transform .28s cubic-bezier(.22,.7,.3,1);
    }
    .frame-wrap>.info.open{ transform:translateX(0); }
  }
  .info-head{display:flex;align-items:flex-start;gap:10px;padding:13px 16px 8px;border-bottom:1px solid var(--line)}
  .info-head .kicker{font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);font-weight:600}
  .info-head h3{margin:1px 0 0;font-family:var(--display);font-size:22px;color:var(--garnet);line-height:1.05}
  .info-head .x{margin-left:auto;background:none;border:1px solid var(--badge-line);color:var(--muted);border-radius:8px;width:30px;height:30px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center}
  .info-head .x:hover{border-color:var(--accent);color:var(--text)}
  .info-body{overflow:auto;padding:6px 16px 18px}
  .fld-block{padding:11px 0;border-bottom:1px solid var(--line)}
  .fld-block:last-child{border-bottom:0}
  .fld-block .lab{font-size:10.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:3px}
  .fld-block .val{font-size:14px;line-height:1.5;color:var(--text)}
  .info-foot{font-family:var(--mono);font-size:10.5px;color:var(--muted);padding:0 16px 12px}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:60;max-width:600px;background:var(--panel);border:1px solid var(--badge-line);border-left:4px solid var(--garnet);border-radius:11px;box-shadow:var(--shadow);padding:11px 15px;font-size:13px;color:var(--text);opacity:0;pointer-events:none;transition:opacity .2s}
  .toast.on{opacity:1;pointer-events:auto}
  #navToggle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;flex:0 0 auto;order:-1;margin:0 8px 0 0;padding:0;border:1px solid var(--badge-line);border-radius:10px;background:var(--panel);color:var(--text);cursor:pointer}
#navItems{display:none}
.nav{position:relative}
.nav.open #navItems{display:flex;flex-wrap:wrap;align-items:center;gap:8px;position:absolute;left:0;right:0;top:100%;z-index:60;margin:0;padding:10px;background:var(--panel);border-bottom:1px solid var(--badge-line);box-shadow:0 14px 30px rgba(0,0,0,.34);max-height:78vh;overflow:auto}
@media(min-width:761px){.nav{flex-wrap:nowrap}#navToggle{display:none!important}#navItems{display:flex!important;position:static!important;inset:auto!important;flex-wrap:nowrap;align-items:center;gap:7px;margin:0;padding:0;background:none!important;border:0!important;box-shadow:none!important;max-height:none!important;overflow-x:auto;overflow-y:visible;flex:1 1 auto;min-width:0}#navItems .navgrp{flex-wrap:nowrap;min-width:0}}
@media(max-width:880px){ .stage{flex-direction:column}.pairtag{writing-mode:horizontal-tb}.brand small{display:none}.info{max-height:86%} }
@media(max-width:880px) and (orientation:landscape){ .stage{flex-direction:row;gap:8px;padding:8px} .stage .slot{min-width:0} .pairtag{writing-mode:vertical-rl} }
@media(max-width:760px){
  .nav{ position:relative; gap:8px; padding:8px 10px; flex-wrap:wrap; align-items:center; background:var(--panel); backdrop-filter:none; -webkit-backdrop-filter:none; }
  .brand{ flex:0 0 auto; margin:0 2px 0 0; }
  .brand b{ font-size:15px; }
  .brand small{ display:none; }
  #navToggle{ display:inline-flex; align-items:center; justify-content:center; width:42px; height:42px; flex:0 0 auto; order:-1; padding:0; border:1px solid var(--badge-line); border-radius:10px; background:var(--panel); color:var(--text); cursor:pointer; }
  #navItems{ display:none; }
  .nav.open #navItems{ display:flex; flex-direction:column; align-items:stretch; gap:8px; position:absolute; left:0; right:0; top:100%; z-index:60; margin:0; padding:10px; background:var(--panel); border-bottom:1px solid var(--badge-line); box-shadow:0 14px 30px rgba(0,0,0,.34); max-height:74vh; overflow:auto; }
  #navItems .spacer{ display:none; }
  .seg button{ flex:1 1 0; justify-content:center; padding:10px 8px; }
  #ctl2d,#ctl3d{ flex-wrap:wrap; gap:8px; width:100%; }
  #ctl2d select,#ctl3d>select{ flex:1 1 100%; height:42px; min-width:0; box-sizing:border-box; }
  #wow3dSearch{ flex:1 1 100%; width:100%!important; height:42px!important; box-sizing:border-box; }
  #ringDrops{ flex:1 1 100%; flex-wrap:wrap; gap:8px; }
  #ringDrops select{ flex:1 1 calc(50% - 4px); height:42px; min-width:0; box-sizing:border-box; }
  #ctl3d .btn,#ctl3d .ico-btn{ flex:1 1 calc(50% - 4px); justify-content:center; height:42px; }
  .switch{ justify-content:center; height:42px; border:1px solid var(--badge-line); border-radius:10px; }
  #langPick{ height:42px; box-sizing:border-box; }
  #navItems .btn,#navItems .ico-btn,#navItems .tip{ flex:1 1 calc(50% - 4px); justify-content:center; height:42px; padding:0 10px; }
  #navItems #themeBtn{ flex:0 0 auto; width:42px; padding:0; }
}
#ringBtns{display:inline-flex;gap:6px;align-items:center}
.ring-btn{display:inline-flex;align-items:center;gap:5px;height:34px;padding:0 10px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--text);cursor:pointer;font-weight:700;font-size:13px;line-height:1}
.ring-btn:hover{border-color:var(--accent)}
.ring-btn.set{border-color:var(--gold)}
.ring-pop-dev{color:var(--gold);font-weight:700}
.ring-pro{font-size:9px;font-weight:800;background:var(--gold);color:#1a1208;border-radius:4px;padding:1px 5px;margin-left:6px;letter-spacing:.5px}
.ring-ic{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.3;opacity:.85}
.ring-pop{position:fixed;z-index:9500;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 14px 40px rgba(0,0,0,.4);max-height:60vh;overflow:auto;min-width:190px;padding:5px}
.ring-pop-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:7px 9px 2px}
.ring-pop-i{padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text);white-space:nowrap}
.ring-pop-i:hover{background:rgba(127,127,127,.14)}
.ring-pop-i.on{color:var(--garnet);font-weight:700}
#wheel1,#wheel2,#ringA,#ringB,#ringC,#ringD{display:none!important}
#dockBtns{display:inline-flex;gap:6px;align-items:center}
.dock-btn{font-size:15px;padding:0 9px}

/* ===== Design panel ===== */
.dz-overlay{position:fixed;inset:0;background:rgba(10,12,20,.55);backdrop-filter:blur(3px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px}
.dz-overlay[hidden]{display:none}
.dz-card{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:16px;max-width:440px;width:100%;box-shadow:0 18px 50px rgba(0,0,0,.4);overflow:hidden}
.dz-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
.dz-head b{font-family:var(--display);font-size:18px;color:var(--garnet)}
.dz-x{background:none;border:1px solid var(--line);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--muted)}
.dz-x:hover{color:var(--text);border-color:var(--accent)}
.dz-body{padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.dz-row{display:flex;align-items:center;gap:12px}
.dz-row>label{flex:0 0 92px;font-size:13px;color:var(--muted)}
.dz-row select{flex:1;padding:7px 8px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text)}
.dz-row input[type=color]{flex:1;height:34px;border:1px solid var(--line);border-radius:8px;background:var(--card);padding:2px;cursor:pointer}
.dz-presets-row{align-items:flex-start}
.dz-presets{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.dz-preset{border:1px solid var(--line);border-radius:10px;padding:5px;cursor:pointer;background:var(--card);display:flex;flex-direction:column;gap:4px;align-items:center}
.dz-preset:hover{border-color:var(--accent)}
.dz-preset.on{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold) inset}
.dz-swatches{display:flex;width:100%;height:18px;border-radius:5px;overflow:hidden}
.dz-swatches span{flex:1}
.dz-preset small{font-size:9.5px;color:var(--muted);letter-spacing:.3px}
.dz-note{font-size:11.5px;color:var(--muted);font-style:italic}
</style>
</head>
<body>
<style id="ss-gate-css">
#ss-gate{position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;
 background:radial-gradient(circle at 50% 30%, #2a141b 0%, #140a0e 70%, #0a0608 100%);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
#ss-gate *{box-sizing:border-box;}
.ss-gate-card{width:min(360px,90vw);background:rgba(22,16,18,.92);border:1px solid rgba(212,178,118,.35);
 border-radius:16px;padding:30px 26px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6);}
.ss-gate-title{font-size:26px;font-weight:800;letter-spacing:.5px;color:#f3ead6;margin-bottom:4px;}
.ss-gate-sub{font-size:13px;color:#b89c84;margin-bottom:22px;}
#ss-gate input{width:100%;padding:12px 14px;margin:7px 0;border-radius:10px;border:1px solid rgba(212,178,118,.3);
 background:rgba(10,7,8,.8);color:#f3ead6;font-size:15px;outline:none;}
#ss-gate input:focus{border-color:#d4b276;box-shadow:0 0 0 3px rgba(212,178,118,.18);}
#ss-gate button{width:100%;margin-top:14px;padding:12px;border:none;border-radius:10px;cursor:pointer;
 background:linear-gradient(180deg,#a8202f,#7a1020);color:#fff;font-size:15px;font-weight:700;letter-spacing:.5px;}
#ss-gate button:hover{filter:brightness(1.08);}
#ss-gate-err{min-height:18px;margin-top:12px;font-size:13px;color:#ff8a8a;}
@keyframes ssShake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
</style>
<div id="ss-gate" role="dialog" aria-modal="true" aria-label="Login required">
  <div class="ss-gate-card">
    <div class="ss-gate-title">StudySpinners</div>
    <div class="ss-gate-sub">Please sign in to continue</div>
    <div style="font-size:11px;color:#7a6a58;margin-bottom:14px">build r8 · 2026-06-30</div>
    <input id="ss-gate-user" type="text" placeholder="Username" autocomplete="off" autocapitalize="none" spellcheck="false">
    <input id="ss-gate-pass" type="password" placeholder="Password" autocomplete="off">
    <button id="ss-gate-go" type="button">Unlock</button>
    <div id="ss-gate-err" aria-live="polite"></div>
  </div>
</div>
<script id="ss-gate-js">
(function(){
  var html=document.documentElement; html.style.overflow='hidden';
  function gate(){return document.getElementById('ss-gate');}
  function fail(){var g=gate();if(!g)return;var e=document.getElementById('ss-gate-err');e.textContent='Incorrect username or password.';var c=g.querySelector('.ss-gate-card');c.style.animation='none';void c.offsetWidth;c.style.animation='ssShake .4s';var p=document.getElementById('ss-gate-pass');p.value='';p.focus();}
  function tryUnlock(){
    var u=(document.getElementById('ss-gate-user').value||'').trim().toLowerCase();
    var p=(document.getElementById('ss-gate-pass').value||'');
    if(u==='coffeelady'&&p==='lisa'){var g=gate();if(g&&g.parentNode)g.parentNode.removeChild(g);html.style.overflow='';}
    else fail();
  }
  function wire(){
    var go=document.getElementById('ss-gate-go'); if(go)go.addEventListener('click',tryUnlock);
    ['ss-gate-user','ss-gate-pass'].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('keydown',function(ev){if(ev.key==='Enter'){ev.preventDefault();tryUnlock();}});});
    var u=document.getElementById('ss-gate-user'); if(u)setTimeout(function(){u.focus();},60);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wire);else wire();
})();
</script>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></symbol>

/* ===== MOBILE RING PERFORMANCE OPTIMIZATION ===== */
/* On touch/coarse-pointer devices, animated SVG drop-shadow filters force per-frame CPU
   re-rasterization (the lag) and repeated GPU-layer create/destroy (the blink). We strip the
   always-on filter when glow is 0, drop filter from transitions, and add compositing hints. */
@media (hover: none), (pointer: coarse) {
  /* kill the per-segment drop-shadow unless glow is explicitly turned up */
  #ringA-wheel .desc-seg, #ringB-wheel .desc-seg, #ringC-wheel .desc-seg, #ringD-wheel .desc-seg,
  #ringA-wheel .cell:not(.cat-seg), #ringB-wheel .cell:not(.cat-seg), #ringC-wheel .cell:not(.cat-seg), #ringD-wheel .cell:not(.cat-seg) {
    filter: none !important;
    transition: fill-opacity .25s ease, stroke-width .25s ease !important;
  }
  /* only re-enable the glow filter when the user has dialed glow above 0 (body flag set in JS) */
  body.ring-glow-on #ringA-wheel .desc-seg { filter: drop-shadow(0 0 var(--A-bglow,0px) var(--A-bcol,#fff)); }
body.ring-glow-on #ringC-wheel .desc-seg { filter: drop-shadow(0 0 var(--C-bglow,0px) var(--C-bcol,#fff)); }
  body.ring-glow-on #ringB-wheel .desc-seg { filter: drop-shadow(0 0 var(--B-bglow,0px) var(--B-bcol,#fff)); }
body.ring-glow-on #ringD-wheel .desc-seg { filter: drop-shadow(0 0 var(--D-bglow,0px) var(--D-bcol,#fff)); }
  /* promote the wheels to their own stable compositor layers so they stop re-painting/blinking.
     IMPORTANT: must preserve the rotation transform — translateZ alone would override it and freeze
     the ring. Keep rotate(var(--spin)) and append translateZ for the GPU layer hint. */
  #ringA-wheel { transform: rotate(var(--ringA-spin)); }
  #ringB-wheel { transform: rotate(var(--ringB-spin)); }
  #ringC-wheel { transform: rotate(var(--ringC-spin)); }
  #ringD-wheel { transform: rotate(var(--ringD-spin)); }
  /* rainbow border/bg animations are the heaviest; keep them but hint the compositor */
  body.A-rbborder #ringA-wheel .desc-seg, body.B-rbborder #ringB-wheel .desc-seg,
  body.A-rbbg #ringA-wheel .desc-seg, body.B-rbbg #ringB-wheel .desc-seg { will-change: filter, fill; }
}
/* ===== END MOBILE RING OPTIMIZATION ===== */
</style>

<script id="panel-drag-engine">
(function(){
  function $(id){ return document.getElementById(id); }
  function makeDraggable(panel, handle){
    if(!panel||!handle) return;
    var dg=false,sx=0,sy=0,ox=0,oy=0;
    function curOffset(){
      var m=(panel.style.transform||'').match(/translate\(([-\d.]+)px,\s*([-\d.]+)px\)/);
      return m? [parseFloat(m[1]),parseFloat(m[2])] : [0,0];
    }
    handle.style.cursor='grab';
    handle.addEventListener('pointerdown',function(e){
      if(e.target.closest && e.target.closest('button,input,select,textarea,.x')) return;
      dg=true; sx=e.clientX; sy=e.clientY; var o=curOffset(); ox=o[0]; oy=o[1];
      handle.style.cursor='grabbing'; try{handle.setPointerCapture(e.pointerId);}catch(_){}
      e.preventDefault();
    });
    window.addEventListener('pointermove',function(e){
      if(!dg) return; if(e.buttons===0){ dg=false; handle.style.cursor='grab'; return; }
      panel.style.transform='translate('+(ox+(e.clientX-sx))+'px,'+(oy+(e.clientY-sy))+'px)';
    });
    window.addEventListener('pointerup',function(){ dg=false; handle.style.cursor='grab'; });
  }
  function init(){
    var menu=$('menu'); if(menu){ var mh=menu.querySelector('.hd'); if(mh) makeDraggable(menu, mh); }

<script id="layer-forward-engine">
(function(){
  function $(id){ return document.getElementById(id); }
  function rootVar(k,v){ document.documentElement.style.setProperty(k,v); }
  
  var LAYER_IDS=['layer-ringA','layer-ringB','layer-ringC','layer-ringD','layer-logo','layer-cf'];
  var LAYER_VAR={'layer-ringA':'--layer-ringA','layer-ringB':'--layer-ringB','layer-ringC':'--layer-ringC','layer-ringD':'--layer-ringD','layer-logo':'--layer-logo','layer-cf':'--layer-cf'};
  var LAYER_DEFAULT={'layer-ringA':30,'layer-ringB':31,'layer-ringC':32,'layer-ringD':33,'layer-logo':40,'layer-cf':20};
  function applyLayer(id){ var el=$(id); if(!el) return; rootVar(LAYER_VAR[id], el.value); }
  function applyAllLayers(){ LAYER_IDS.forEach(applyLayer); }
  /* push one element above all the others by giving it (max+1), clamped to the slider max */
  function bringForward(which){
    var map={A:'layer-ringA',B:'layer-ringB',logo:'layer-logo',cf:'layer-cf'};
    var target=map[which]; if(!target||!$(target)) return;
    var max=0; LAYER_IDS.forEach(function(id){ var e=$(id); if(e) max=Math.max(max, parseInt(e.value,10)||0); });
    var nv=Math.min(parseInt(($(target).max)||100,10), max+1);
    $(target).value=nv; applyLayer(target);
    /* reflect active state on quick buttons */
    ['lf-a','lf-b','lf-logo','lf-cf'].forEach(function(id){ var b=$(id); if(b) b.classList.remove('lf-active'); });
    var act={A:'lf-a',B:'lf-b',logo:'lf-logo',cf:'lf-cf'}[which];
    if(act && $(act)) $(act).classList.add('lf-active');
  }
  function init(){
    /* live slider wiring */
    LAYER_IDS.forEach(function(id){ var e=$(id); if(e){ e.addEventListener('input',function(){ applyLayer(id); }); e.addEventListener('change',function(){ applyLayer(id); }); } });
    applyAllLayers();
    var a=$('lf-a'), b=$('lf-b'), lg=$('lf-logo'), cf=$('lf-cf'), r=$('lf-reset');
    if(a) a.addEventListener('click', function(){ bringForward('A'); });
    if(b) b.addEventListener('click', function(){ bringForward('B'); });
    if(lg) lg.addEventListener('click', function(){ bringForward('logo'); });
    if(cf) cf.addEventListener('click', function(){ bringForward('cf'); });
    if(r) r.addEventListener('click', function(){
      LAYER_IDS.forEach(function(id){ var e=$(id); if(e){ e.value=LAYER_DEFAULT[id]; applyLayer(id); } });
      ['lf-a','lf-b','lf-logo','lf-cf'].forEach(function(id){ var x=$(id); if(x) x.classList.remove('lf-active'); });
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
<\/script>

<script id="study-log-engine">
(function(){
  function $(id){ return document.getElementById(id); }
  /* in-memory only — nothing persisted offline. cleared when the tab closes. */
  var LOG=[];
  function stamp(){ var d=new Date(); return d.toLocaleTimeString(); }
  window.WOW_LOG=function(name, kind, source){
    if(!name) return;
    name=(''+name).trim(); if(!name) return;
    var last=LOG[LOG.length-1];
    /* skip immediate duplicate (same name+source within 1.5s) to avoid click+voice doubles */
    if(last && last.name.toLowerCase()===name.toLowerCase() && (Date.now()-last._t)<1500) return;
    LOG.push({ name:name, kind:kind||'descriptor', source:source||'click', time:stamp(), _t:Date.now() });
    render();
  };
  function render(){
    var box=$('studylog-list'); if(!box) return;
    var c=$('studylog-count'); if(c) c.textContent=LOG.length;
    if(!LOG.length){ box.innerHTML='<div style="opacity:.6;font-size:11px;padding:6px">Nothing yet — click or speak a descriptor.</div>'; return; }
    var html='';
    for(var i=LOG.length-1;i>=0;i--){ var e=LOG[i];
      var icon = e.source==='voice'?'🎤':'👆';
      var tag = e.kind==='varietal'?'varietal':'aroma';
      html+='<div style="display:flex;gap:7px;align-items:center;padding:4px 6px;border-bottom:1px solid rgba(150,170,220,.12);font-size:12px">'
          +'<span>'+icon+'</span>'
          +'<span style="flex:1;color:#e9f2ff">'+escapeHtml(e.name)+'</span>'
          +'<span style="font-size:9px;color:#8fb0d8;text-transform:uppercase">'+tag+'</span>'
          +'<span style="font-size:9px;color:#6f86b0">'+e.time+'</span></div>';
    }
    box.innerHTML=html;
  }
  function escapeHtml(s){ return (''+s).replace(/[&<>"]/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function exportLog(){
    if(!LOG.length){ return; }
    var lines=['World of Wine — Study Log','Exported '+new Date().toLocaleString(),''];
    LOG.forEach(function(e,i){ lines.push((i+1)+'. ['+e.time+'] '+e.name+'  ('+e.kind+' via '+e.source+')'); });
    var blob=new Blob([lines.join('\n')],{type:'text/plain'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='wow-study-log-'+new Date().toISOString().slice(0,10)+'.txt'; a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },800);
  }
  function init(){
    var ex=$('studylog-export'); if(ex) ex.addEventListener('click', exportLog);
    var cl=$('studylog-clear'); if(cl) cl.addEventListener('click', function(){ LOG.length=0; render(); });
    var tog=$('studylog-tab'), panel=$('studylog'), close=$('studylog-close');
    if(tog&&panel){ tog.addEventListener('click', function(){ panel.classList.remove('hidden'); tog.style.display='none'; render(); }); }
    if(close&&panel&&tog){ close.addEventListener('click', function(){ panel.classList.add('hidden'); tog.style.display='block'; }); }
    render();
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
<\/script>

<script id="wow-search-engine">
(function(){
  function $(id){ return document.getElementById(id); }
  function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim(); }
  function lev(a,b){ var m=a.length,n=b.length,dp=[];for(var i=0;i<=m;i++)dp[i]=[i];for(var j=0;j<=n;j++)dp[0][j]=j;
    for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return dp[m][n]; }

  function searchDescriptor(q){
    var segs=(window.WOW&&window.WOW.segs)?window.WOW.segs():[];
    var best=null,bestScore=1e9;
    for(var i=0;i<segs.length;i++){
      var nm=norm(segs[i].__name); if(!nm) continue;
      var sc; if(nm===q) sc=0; else if(nm.indexOf(q)>=0||q.indexOf(nm)>=0) sc=0.3; else sc=lev(q,nm)/Math.max(q.length,nm.length);
      if(sc<bestScore){ bestScore=sc; best=segs[i]; }
    }
    return (best && bestScore<=0.34)? best : null;
  }
  function run(){
    var inp=$('wow-search-input'); if(!inp) return;
    var q=norm(inp.value); if(!q) return;
    
    
    /* then descriptor / varietal title */
    var seg=searchDescriptor(q);
    if(seg && window.WOW){
      window.WOW.select(seg, { speak:false, highlight:true });
      if(window.WOW_LOG) window.WOW_LOG(seg.__name, (seg.__ring==='ringB'?'varietal':'aroma'), 'search');
    }
    inp.blur();
  }
  function init(){
    var inp=$('wow-search-input'), btn=$('wow-search-btn');
    if(btn) btn.addEventListener('click', run);
    if(inp) inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); run(); } });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
<\/script>

    Object.keys(o.controls).forEach(function(id){

      var v=o.controls[id];
      if(el.type==='checkbox'){ el.checked=!!v; } else { el.value=v; }
      el.dispatchEvent(new Event('input',{bubbles:true}));
      el.dispatchEvent(new Event('change',{bubbles:true}));
    });
    if(o.positions){
      /* on phones, don't apply the saved desktop offset for the info window — the mobile layout
         anchors it near the top, and the baked --cf-dy (~220px) would push it ~1.5in down.
         Everything else (sizes, other objects) still applies; dragging on mobile still works
         because the drag handler writes --cf-dx/--cf-dy inline afterward. */
      var _isPhone = (window.matchMedia && window.matchMedia('(max-width:560px)').matches);
      Object.keys(o.positions).forEach(function(v){
        if(_isPhone && (v==='--cf-dx' || v==='--cf-dy')) return;
        if(o.positions[v]) document.documentElement.style.setProperty(v,o.positions[v]);
      });
    }
    if(o.windows){
      if(typeof o.windows.cfCircle!=='undefined'){ var cs=document.getElementById('cf-shape'); if(cs){ cs.checked=!!o.windows.cfCircle; cs.dispatchEvent(new Event('change',{bubbles:true})); } }

<script id="universal-right-drag">
/* ---- Universal "right-click + drag = move" for every movable object ----
   Each object is positioned by a pair of CSS translate vars. Right-drag reads the
   object's current offset and updates it as the pointer moves. This adds right-drag
   to objects that previously only moved via a small grip (logo, info window, panels),
   while leaving each object's existing grip/handle drag untouched. */
(function(){
  function $(id){ return document.getElementById(id); }
  /* movable registry: selector to match the element (or any ancestor) under the cursor,
     the CSS vars to update, and where to write them (:root or the element itself). */
  var MOVABLES = [
    { sel:'#logo-wrap',    vx:'--logo-dx',  vy:'--logo-dy',  scope:'root',
      blocked:function(){ var l=$('logo-lock'); return l && l.checked; } },     /* respect "Lock logo in place" */
    { sel:'#centerfield',  vx:'--cf-dx',    vy:'--cf-dy',    scope:'root' },
    
    { sel:'#safezone',     vx:'--sz-dx',    vy:'--sz-dy',    scope:'root' }
  ];
  /* rings move via their own engine when Adjust is ON; the universal mover handles them
     too (right-drag) so they're movable even when Adjust is OFF, matching every other object. */
  var RINGS = [
    { tilt:'ringA-tilt', vx:'--ringA-ox', vy:'--ringA-oy', adj:'A-adjust' },
    { tilt:'ringB-tilt', vx:'--ringB-ox', vy:'--ringB-oy', adj:'B-adjust' }
  ];
  function cssNum(target, v){
    var s = (target===document.documentElement)
      ? getComputedStyle(document.documentElement).getPropertyValue(v)
      : (target.style.getPropertyValue(v) || getComputedStyle(target).getPropertyValue(v));
    return parseFloat(s) || 0;
  }
  function inAnnulus(K, x, y){
    try{ var m=window.__ringAnnulus||{}; return !!(m[K] && m[K](x,y)); }catch(_){ return false; }
  }
  /* decide what (if anything) this right-press should grab */
  function pick(e){
    var t = e.target;
    /* never hijack the dev menu / controls */
    if(t && t.closest && t.closest('#menu,.menu-tab,input,select,button,label,textarea')) return null;
    /* rings first (geometry-based, since they spin and have masked gaps) */
    for(var i=0;i<RINGS.length;i++){
      var R=RINGS[i], tilt=$(R.tilt); if(!tilt) continue;
      var K=(R.tilt==='ringA-tilt')?'ringA':'ringB';
      var ownsPath = t && t.closest && t.closest('#'+R.tilt);
      if(ownsPath || inAnnulus(K, e.clientX, e.clientY)){
        var adj=$(R.adj);
        /* if Adjust is ON, the ring's own engine already moves it on right-drag — defer to it */
        if(adj && adj.checked) return null;
        return { target:document.documentElement, vx:R.vx, vy:R.vy };
      }
    }
    /* then the registered DOM objects */
    for(var j=0;j<MOVABLES.length;j++){
      var M=MOVABLES[j], el = t && t.closest && t.closest(M.sel);
      if(el){
        if(M.blocked && M.blocked()) return null;
        var target = (M.scope==='self') ? el : document.documentElement;
        return { target:target, vx:M.vx, vy:M.vy };
      }
    }
    return null;
  }
  var active=null, sx=0, sy=0, x0=0, y0=0;
  function setVar(target, name, val){
    if(target===document.documentElement) target.style.setProperty(name, val);
    else target.style.setProperty(name, val);
  }
  window.addEventListener('pointerdown', function(e){
    if(e.button!==2) return;                 /* right button only */
    if(document.body.classList.contains('client-mode')) return;  /* clients can't move anything */
    var got = pick(e);
    if(!got) return;
    active = got;
    sx=e.clientX; sy=e.clientY;
    x0=cssNum(active.target, active.vx);
    y0=cssNum(active.target, active.vy);
    e.preventDefault(); e.stopPropagation();
  }, true);
  window.addEventListener('pointermove', function(e){
    if(!active) return;
    if(e.pointerType==='mouse' && !(e.buttons & 2)){ active=null; return; }  /* button released */
    setVar(active.target, active.vx, (x0+(e.clientX-sx))+'px');
    setVar(active.target, active.vy, (y0+(e.clientY-sy))+'px');
    e.preventDefault();
  }, true);
  function endDrag(){ active=null; }
  window.addEventListener('pointerup', endDrag, true);
  window.addEventListener('pointercancel', endDrag, true);
  window.addEventListener('blur', endDrag);
  /* suppress the browser context menu anywhere a right-drag could start, so the gesture is reliable.
     In locked client mode, suppress it EVERYWHERE so clients can't right-click to grab source,
     save images, or inspect. */
  window.addEventListener('contextmenu', function(e){
    if(document.body.classList.contains('client-mode')){ e.preventDefault(); return; }
    var t=e.target;
    if(t && t.closest && t.closest('#menu,.menu-tab,input,select,button,label,textarea')) return;
    e.preventDefault();
  });
})();
<\/script>

/* geometry */
function polarToCart(r,a){return[r*Math.cos(a),r*Math.sin(a)];}
function arcRing(r1,r2,a1,a2){const[sx1,sy1]=polarToCart(r1,a1),[ex1,ey1]=polarToCart(r1,a2),[sx2,sy2]=polarToCart(r2,a1),[ex2,ey2]=polarToCart(r2,a2);const lg=a2-a1>Math.PI?1:0;return `M ${sx1} ${sy1} A ${r1} ${r1} 0 ${lg} 1 ${ex1} ${ey1} L ${ex2} ${ey2} A ${r2} ${r2} 0 ${lg} 0 ${sx2} ${sy2} Z`;}
function arcLabelPath(r,a1,a2,rev){const lg=Math.abs(a2-a1)>Math.PI?1:0;if(rev){const[sx,sy]=polarToCart(r,a2),[ex,ey]=polarToCart(r,a1);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 0 ${ex} ${ey}`;}const[sx,sy]=polarToCart(r,a1),[ex,ey]=polarToCart(r,a2);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 1 ${ex} ${ey}`;}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function textOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)>150?'#1c2118':'#f3f3ee';}
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

const REGISTRY={};
const R_IN=62,R_CAT=140,R_SUB=210,R_OUT=300;
let defsEl,gEl;
function buildWheel(){
  /* idempotent rebuild: wipe prior wheel state so a swapped payload leaves no ghosts */
  try{ for(var __rk in REGISTRY){ if(REGISTRY.hasOwnProperty(__rk)) delete REGISTRY[__rk]; } }catch(e){}
  try{ if(typeof svg!=='undefined'&&svg){ svg.querySelectorAll('g#wheelG').forEach(function(n){n.remove();}); svg.querySelectorAll('defs').forEach(function(n){n.remove();}); } }catch(e){}
  try{ labelEls=[]; }catch(e){}
  try{ descLabels=[]; }catch(e){}
  const total=DATA.categories.reduce((n,c)=>n+c.sub.reduce((m,s)=>m+s.descriptors.length,0),0);
  const perItem=TWO_PI/total;
  defsEl=el('defs',{});svg.appendChild(defsEl);
  gEl=el('g',{id:'wheelG'});
  let a=-Math.PI/2,gradN=0;
  DATA.categories.forEach((cat,ci)=>{
    const catItems=cat.sub.reduce((m,s)=>m+s.descriptors.length,0);
    const catSpan=catItems*perItem,catStart=a,catEnd=a+catSpan,catMid=catStart+catSpan/2;
    gEl.appendChild(el('path',{d:arcRing(R_IN,R_CAT,catStart,catEnd),fill:(cat.baked&&cat.baked.facetRing)||cat.color,'class':'cell'}));
    cat._mid=catMid;cat._span=catSpan;
    cat.sub.forEach(sub=>{
      const subSpan=sub.descriptors.length*perItem,subStart=a,subEnd=a+subSpan,subMid=subStart+subSpan/2;
      var _subEl=el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:((sub.baked&&sub.baked.subRing)||(sub._implicit?lighten(cat.color,8):sub.color)),'class':'cell sub-cell'});
      gEl.appendChild(_subEl);
      (function(se,nm){ try{
        se.addEventListener('mouseenter',function(){ try{ var t=(typeof tx==='function'?tx(sub,'name'):(sub.name||nm)); if(typeof echoMsg==='function')echoMsg(t); else { var be=document.getElementById('bgEcho'); if(be){be.textContent=t; if(typeof sizeEcho==='function')sizeEcho(t); be.classList.add('show');} } }catch(e){} });
        se.addEventListener('mouseleave',function(){ try{ var be=document.getElementById('bgEcho'); if(be)be.classList.remove('show'); }catch(e){} });
      }catch(e){} })(_subEl, tx(sub,'name'));
      sub._mid=subMid;sub._span=subSpan;sub._cat=cat;
      sub.descriptors.forEach(desc=>{
        const s1=a,s2=a+perItem,m=a+perItem/2;
        const gid='pg'+(gradN++);
        const grad=el('radialGradient',{id:gid,gradientUnits:'userSpaceOnUse',cx:'0',cy:'0',r:R_OUT});
        grad.appendChild(el('stop',{offset:'55%','stop-color':lighten(sub.color,20)}));
        grad.appendChild(el('stop',{offset:'100%','stop-color':lighten(sub.color,44)}));
        defsEl.appendChild(grad);
        const p=el('path',{d:arcRing(R_SUB,R_OUT,s1,s2),fill:`url(#${gid})`,'class':'cell desc-seg','data-slug':desc.slug});
        p.addEventListener('click',()=>selectItem(desc.slug));
        gEl.appendChild(p);
        REGISTRY[desc.slug]={desc,sub,cat,segEl:p,chipEl:null,_mid:m,_fill:((desc.baked&&desc.baked.wedge)||lighten(sub.color,30))};
        a+=perItem;
      });
    });
  });
  gEl.appendChild(el('circle',{cx:0,cy:0,r:(R_IN*0.67),'class':'hub'}));
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_OUT+4,'class':'rim'}));
  const ys=['1','15'],fs=['16.5','8'];
  HUB.forEach((txt,i)=>{const a={'text-anchor':'middle',y:ys[i],'font-size':fs[i],'class':'hub-text','font-family':"var(--hub-font,'Brush Script MT','Snell Roundhand','Segoe Script',cursive)",'letter-spacing':'.3'};const tt=el('text',a);tt.textContent=txt;tt.style.pointerEvents='none';gEl.appendChild(tt);});
  svg.appendChild(gEl);
  renderLabels();
}

let labelEls=[];let descLabels=[];var READ_SIDE='right';
function renderLabels(){
  labelEls.forEach(e=>e.remove());labelEls=[];descLabels=[];
  DATA.categories.forEach((cat,ci)=>{
    const name=tx(cat,'name').toUpperCase();
    // skip the inner (center-most) ring label when it merely duplicates the single sub-ring label
    const _redInner=(cat.sub.length===1 && tx(cat.sub[0],'name').toUpperCase()===name);
    const labR=(R_IN+R_CAT)/2,arcLen=cat._span*labR,estW=name.length*5.0;
    if(!_redInner && arcLen>estW+8){
      const flip=Math.sin(cat._mid)>0,pid='catArc'+ci;
      const existing=defsEl.querySelector('#'+pid);if(existing)existing.remove();
      defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?labR-2:labR+2,cat._mid-cat._span/2,cat._mid+cat._span/2,flip)}));
      const tt=el('text',{'font-size':'7','letter-spacing':'1','font-family':"var(--display)",'font-weight':'bold',fill:cat.textColor||'#fff','dominant-baseline':'middle'});
      const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=name;
      tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }else if(!_redInner){
      let deg=cat._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
      const[lx,ly]=polarToCart(labR,cat._mid);
      const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'5','letter-spacing':'.3',fill:cat.textColor||'#fff','font-family':"var(--display)",'font-weight':'bold',transform:`rotate(${deg},${lx},${ly})`});
      const w=name.split(' ');
      if(w.length>1){const t1=el('tspan',{x:lx,dy:'-2.6'});t1.textContent=w[0];const t2=el('tspan',{x:lx,dy:'5.2'});t2.textContent=w.slice(1).join(' ');tt.appendChild(t1);tt.appendChild(t2);}else tt.textContent=name;
      tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }
    cat.sub.forEach((sub,si)=>{
      if(!sub._implicit){
        const subName=tx(sub,'name').toUpperCase(),subLabR=(R_CAT+R_SUB)/2,subArc=sub._span*subLabR;
        if(subArc>subName.length*4+6){
          const flip=Math.sin(sub._mid)>0,pid='subArc'+ci+'_'+si;
          const ex=defsEl.querySelector('#'+pid);if(ex)ex.remove();
          defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?subLabR-1.5:subLabR+1.5,sub._mid-sub._span/2,sub._mid+sub._span/2,flip)}));
          const tt=el('text',{'font-size':'6.3','font-family':"var(--display)",fill:textOn(sub.color),'dominant-baseline':'middle'});
          const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=subName;
          tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }else{
          let deg=sub._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
          const[lx,ly]=polarToCart(subLabR,sub._mid);
          const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'4.2',fill:textOn(sub.color),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
          tt.textContent=subName;tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }
      }
      sub.descriptors.forEach(desc=>{
        const reg=REGISTRY[desc.slug];const m=reg._mid;
        const theta=m*180/Math.PI;                 // raw radial angle (0=3 o'clock)
        const deg=(READ_SIDE==='left')?theta+180:theta;  // flip whole wheel for left-read; reading side stays upright
        const[lx,ly]=polarToCart((R_SUB+R_OUT)/2,m);
        const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'6','letter-spacing':'.2',fill:textOn(reg._fill),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
        const nm=tx(desc,'name').toUpperCase();
        const availR=(R_OUT-R_SUB)-12;
        const fitFs=Math.max(3.4,Math.min(6,availR/(nm.length*0.56)));
        tt.setAttribute('font-size',fitFs.toFixed(2));
        tt.textContent=nm;
        tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        descLabels.push({el:tt,lx:lx,ly:ly,theta:theta});
      });
    });
  });
}

/* wiki */
function wikiUrl(slug,name){const t=WIKI_TITLES[name]||WIKI_TITLES[slug]||(name.charAt(0).toUpperCase()+name.slice(1).toLowerCase());const host=lang+'.wikipedia.org';return 'https://'+host+'/wiki/'+encodeURIComponent(t.replace(/ /g,'_'));}
function headingHtml(slug,name){return `<h2><a href="${wikiUrl(slug,name)}" target="_blank" rel="noopener noreferrer">${name}<span class="wiki-mark">↗</span></a></h2>`;}


function funFactFor(slug){
  const reg=REGISTRY[slug]; if(!reg) return null;
  const tryKeys=[reg.cat&&reg.cat.name, reg.sub&&reg.sub.name];
  for(const k of tryKeys){ if(k&&FUN_FACTS[k]) return FUN_FACTS[k]; }
  return null;
}

window.__lsVoiceSpeak=function(s){try{lsSpeak(s||currentSlug);}catch(e){}};
function showDetail(slug){
  currentSlug=slug;

function snapSlugToPoint(slug){
  var reg=REGISTRY[slug]; if(!reg) return;
  if(typeof spinning!=='undefined' && spinning) return;
  var twoPi=2*Math.PI, end=readAngle()-reg._mid;
  while(end-rotation> Math.PI) end-=twoPi;
  while(end-rotation<-Math.PI) end+=twoPi;
  var start=rotation, dur=600, t0=Date.now();
  if(typeof spinning!=='undefined') spinning=true;
  function ease(p){return 1-Math.pow(1-p,3);}
  function step(){var p=Math.min(1,(Date.now()-t0)/dur); rotation=start+(end-start)*ease(p); applyRotation();
    if(p<1){requestAnimationFrame(step);} else {rotation=end; applyRotation(); if(typeof spinning!=='undefined') spinning=false; selectItem(slug);}}
  step();
}

var __lsVoices=[];
function __lsLoadVoices(){ try{ __lsVoices=window.speechSynthesis.getVoices()||[]; }catch(e){ __lsVoices=[]; } }
if(window.speechSynthesis){ __lsLoadVoices(); try{ window.speechSynthesis.onvoiceschanged=__lsLoadVoices; }catch(e){} }
var __LS_LANG_BCP={ en:'en', es:'es', fr:'fr', it:'it', de:'de', pt:'pt' };
function __lsPickVoice(langCode){
  if(!__lsVoices.length) __lsLoadVoices();
  var want=(__LS_LANG_BCP[langCode]||langCode||'en').toLowerCase();
  var byLang=__lsVoices.filter(function(v){return (v.lang||'').toLowerCase().indexOf(want)===0;});
  if(!byLang.length) byLang=__lsVoices.filter(function(v){return (v.lang||'').toLowerCase().indexOf(want.slice(0,2))===0;});
  if(!byLang.length) return null;
  function score(v){ var n=(v.name||'').toLowerCase(), s=0;
    if(/natural|neural|premium|enhanced|siri|google|wavenet/.test(n)) s+=3;
    if(v.localService) s+=1;
    if(/^es-es|^fr-fr|^it-it|^en-us|^en-gb/.test((v.lang||'').toLowerCase())) s+=1;
    return s; }
  byLang.sort(function(a,b){return score(b)-score(a);});
  return byLang[0];
}
function __lsTTS(nm,reg){
  if(!window.speechSynthesis) return;
  try{
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(nm);
    u.rate=0.9; u.pitch=1.0; u.volume=1.0;
    var lc = (reg && reg.desc && reg.desc.audioLang) || window.__LS_AUDIO_LANG || (typeof lang!=='undefined'?lang:'en');
    var v=__lsPickVoice(lc);
    if(v){ u.voice=v; u.lang=v.lang; } else { u.lang=(__LS_LANG_BCP[lc]||lc||'en'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function lsSpeak(slug){
  try{
    var reg=REGISTRY[slug]; if(!reg) return;
    var nm=(typeof tx==='function' && reg.desc)? tx(reg.desc,'name') : (reg.desc&&reg.desc.name?reg.desc.name:slug);
    if(typeof nm!=='string') nm=String(nm);
    if(reg.desc && reg.desc.audio){
      try{
        var a=new Audio(reg.desc.audio);
        a.addEventListener('error',function(){ __lsTTS(nm,reg); });
        var pr=a.play(); if(pr && pr.catch) pr.catch(function(){ __lsTTS(nm,reg); });
        return;
      }catch(e){}
    }
    __lsTTS(nm,reg);
  }catch(e){}
}

function momentum(){

<script>
/* user font-size control for wheel ring text (bounded) */
(function(){
  var MIN=0.8, MAX=1.7, STEP=0.12, KEY='ls_wheel_fontscale';
  var scale=1; try{ scale=parseFloat(localStorage.getItem(KEY))||1; }catch(e){}
  scale=Math.max(MIN,Math.min(MAX,scale));
  var svg=document.getElementById('wheelSvg');
  function applyScale(){
    if(!svg)return;
    svg.querySelectorAll('text').forEach(function(t){
      var base=t.getAttribute('data-basefs');
      if(base===null){
        // capture original size once (attribute or computed)
        var fs=t.getAttribute('font-size'); if(!fs){ try{fs=getComputedStyle(t).fontSize;}catch(e){fs='';} }
        base=parseFloat(fs)||0; if(!base)return;
        t.setAttribute('data-basefs',base);
      }
      base=parseFloat(base); if(!base)return;
      t.setAttribute('font-size',(base*scale).toFixed(2));
    });
  }
  // re-apply after the engine redraws the wheel
  if(svg){
    var mo=new MutationObserver(function(){ // new text nodes have no data-basefs yet
      applyScale();
    });
    mo.observe(svg,{childList:true,subtree:true});
  }
  function setScale(s){ scale=Math.max(MIN,Math.min(MAX,s)); try{localStorage.setItem(KEY,scale);}catch(e){}
    // reset captured bases so new factor applies cleanly off the ORIGINAL size
    if(svg) svg.querySelectorAll('text[data-basefs]').forEach(function(t){
      t.setAttribute('font-size',(parseFloat(t.getAttribute('data-basefs'))*scale).toFixed(2)); });
  }
  window.__lsBumpFont=function(dir){ setScale(scale+(dir||1)*STEP); }; try{window.__lsSetFontScale=setScale;}catch(_e){}
  // build control into the bar
  function build(){
    var bar=document.getElementById('topctl')||document.querySelector('.topctl')||document.querySelector('.controls');
    if(!bar||document.getElementById('lsFontWrap'))return;
    var es=false; try{es=document.documentElement.getAttribute('lang')==='es';}catch(e){}
    var w=document.createElement('span'); w.id='lsFontWrap'; w.title=es?'Tamaño de texto de la rueda':'Wheel text size';
    var minus=document.createElement('button'); minus.textContent='A'; minus.style.fontSize='.7rem'; minus.setAttribute('aria-label',es?'Reducir texto':'Smaller text');
    var ico=document.createElement('span'); ico.className='lsF-ico'; ico.textContent='A';
    var plus=document.createElement('button'); plus.textContent='A'; plus.style.fontSize='1.05rem'; plus.setAttribute('aria-label',es?'Agrandar texto':'Larger text');
    minus.addEventListener('click',function(){ setScale(scale-STEP); });
    plus.addEventListener('click',function(){ setScale(scale+STEP); });
    w.appendChild(minus); w.appendChild(ico); w.appendChild(plus); bar.appendChild(w);
  }
  function init(){ build(); setTimeout(applyScale,400); }
  if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded',init);
})();

<script id="lsCmdBridge">
/* command bridge v2: dashboard drives the wheel. Calls globals when present, else clicks controls. */
(function(){
  function $(id){return document.getElementById(id);}
  function clk(id){var e=$(id); if(e){e.click(); return true;} return false;}
  function gfn(name){ try{ return (typeof window[name]==='function')?window[name]:null; }catch(e){ return null; } }
  var curTheme='light', curLang='en';
  try{ curTheme=document.documentElement.getAttribute('data-theme')||'light'; }catch(e){}
  try{ curLang=document.documentElement.getAttribute('lang')||'en'; }catch(e){}

  function handle(cmd,value){
    switch(cmd){
      case 'spin': clk('spinBtn'); break;
      case 'dock-left': window.__lsSetMode&&window.__lsSetMode('dock-left'); break;
      case 'dock-right': window.__lsSetMode&&window.__lsSetMode('dock-right'); break;
      case 'free': window.__lsSetMode&&window.__lsSetMode('detached'); break;
      case 'theme': {
        var th=(value==='dark'||value==='light')?value:(curTheme==='dark'?'light':'dark');
        var f=gfn('setTheme'); if(f){f(th);} else { clk('themeBtn'); }
        curTheme=th; break;
      }
      case 'lang': {
        var l=(value==='en'||value==='es')?value:(curLang==='en'?'es':'en');
        var f2=gfn('setLang'); if(f2){f2(l);} else { clk('langBtn'); }
        curLang=l; break;
      }
      case 'glow': case 'logo': clk('glowBtn'); break;
      case 'voice': window.__lsVoiceOn=!window.__lsVoiceOn; if(window.__lsVoiceOn){ if(window.__lsVoiceSpeak)window.__lsVoiceSpeak(); } else { try{window.speechSynthesis&&window.speechSynthesis.cancel();}catch(_){} } break;

      case 'textSize': try{ if(value!=null && window.__lsSetFontScale) window.__lsSetFontScale(parseFloat(value)); }catch(e){} break;
      case 'segBorderColor': try{ if(value){ document.documentElement.style.setProperty('--dz-segb',value); var wsb=document.getElementById('wheelSvg'); if(wsb) wsb.classList.add('dz-segb'); } }catch(e){} break;
      case 'focus': if(!clk('fsBtn')){ try{ (document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()); }catch(e){} } break;
      case 'reset': clk('zoomReset'); break;
      case 'size-up': clk('zoomIn'); break;
      case 'size-down': clk('zoomOut'); break;
      case 'font-up': if(window.__lsBumpFont)window.__lsBumpFont(1); break;
      case 'font-down': if(window.__lsBumpFont)window.__lsBumpFont(-1); break;
    }
  }
  window.addEventListener('message',function(ev){
    var d=ev.data; if(!d||d.type!=='LS_CMD')return;
    handle(d.cmd,d.value);
  });
  try{ if(window.parent&&window.parent!==window) window.parent.postMessage({type:'LS_WHEEL_READY'},'*'); }catch(e){}
})();

    var el=document.getElementById('svgContainer')||svg;
    return el.getBoundingClientRect();
  }
  function place(){
    if(detached) return;
    var r=wheelRect();
    panel.classList.add('ls-bound'); panel.classList.remove('ls-free');
    var left=r.right+GAP;
    var top=r.top;
    // keep on screen
    var maxLeft=window.innerWidth-Math.min(panel.offsetWidth||320,window.innerWidth*0.5)-12;
    if(left>maxLeft) left=Math.max(12,maxLeft);
    panel.style.left=left+'px';
    panel.style.top=Math.max(12,top)+'px';
    panel.style.width=''; /* default width from CSS */
  }

  window.addEventListener('resize',place);
  try{
    var ro=new ResizeObserver(function(){ place(); });
    ro.observe(document.getElementById('svgContainer')||svg);
  }catch(e){}
  // also re-place shortly after any size command / spin settle
  document.addEventListener('click',function(){ if(!detached) setTimeout(place,60); });
  // re-place when wheel transform changes (size adjust) — poll lightly
  var lastW=0;
  setInterval(function(){ if(detached)return; var w=(document.getElementById('svgContainer')||svg).getBoundingClientRect().width; if(Math.abs(w-lastW)>2){ lastW=w; place(); } },400);

  function detach(){ detached=true; panel.classList.remove('ls-bound'); panel.classList.add('ls-free'); grip.title='Detached — drag to move'; }

  // drag to move (and detach on first drag)
  var dragging=false,sx,sy,ox,oy;
  grip.addEventListener('pointerdown',function(e){
    dragging=true; if(!detached) detach();
    var r=panel.getBoundingClientRect(); ox=r.left; oy=r.top; sx=e.clientX; sy=e.clientY;
    grip.setPointerCapture(e.pointerId); e.preventDefault();
  });
  grip.addEventListener('pointermove',function(e){
    if(!dragging)return;
    panel.style.left=(ox+(e.clientX-sx))+'px';
    panel.style.top=(oy+(e.clientY-sy))+'px';
  });
  grip.addEventListener('pointerup',function(e){ dragging=false; try{grip.releasePointerCapture(e.pointerId);}catch(_e){} });

  // detach when the user manually resizes (the CSS resize handle on .ls-free); also allow resize after detach
  panel.addEventListener('mousedown',function(e){
    // bottom-right resize zone
    var r=panel.getBoundingClientRect();
    if(e.clientX>r.right-18 && e.clientY>r.bottom-18){ if(!detached) detach(); }
  });

  // initial placement once layout settles
  setTimeout(place,300); setTimeout(place,900);
})();

<script id="lsHubSpin">
(function(){
  function ready(fn){ if(document.readyState!=='loading')fn(); else document.addEventListener('DOMContentLoaded',fn); }
  ready(function(){
    var tries=0;
    (function arm(){
      var disc=document.getElementById('lsHubDisc');
      if(!disc){ if(tries++<30) return setTimeout(arm,200); return; }
      disc.classList.add('ls-spinnable');
      function inFree(){
        try{ return document.body.getAttribute('data-mode')==='detached'; }catch(e){ return false; }
      }
      function doSpin(){
        var sb=document.getElementById('spinBtn');
        if(sb && !sb.disabled){ sb.click(); }
      }
      // Tap-to-spin with drag detection (so free-mode dragging the hub doesn't fire a spin)
      var downX=0, downY=0, moved=false, downT=0;

        downX=e.clientX; downY=e.clientY; moved=false; downT=Date.now();
      }, true);
      disc.addEventListener('pointermove', function(e){
        if(Math.abs(e.clientX-downX)>6 || Math.abs(e.clientY-downY)>6) moved=true;
      }, true);
      disc.addEventListener('pointerup', function(e){
        // Spin on ANY tap that isn't a drag, regardless of how long it was held.
        // Drag (moved > 6px) = move the wheel in free mode; everything else spins.
        if(!moved){ doSpin(); }
      }, true);

      disc.setAttribute('role','button'); disc.setAttribute('tabindex','0');
      disc.setAttribute('aria-label','Spin the wheel');
      disc.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); doSpin(); } });
    })();
  });

<script id="lsWheelDesign">
(function(){
  function el(id){return document.getElementById(id);}
  function hexLighten(hex,amt){ // amt -100..100
    try{ var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255;
      var f=amt/100; if(f>=0){ r=Math.round(r+(255-r)*f); g=Math.round(g+(255-g)*f); b=Math.round(b+(255-b)*f); }
      else { f=-f; r=Math.round(r*(1-f)); g=Math.round(g*(1-f)); b=Math.round(b*(1-f)); }
      return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
    }catch(e){ return hex; }
  }
  function textOnHex(hex){ try{ var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    return (0.299*r+0.587*g+0.114*b)>150?'#2a211c':'#fff'; }catch(e){ return '#2a211c'; } }

  // Recolor categories from a palette: assign one palette color per category, derive sub/descriptor shades.
  function applyPalette(palette){
    try{
      if(!palette||!palette.length) return;
      var svg=document.getElementById('wheelSvg'); if(!svg) return;
      // category cells (innermost solid ring, not sub, not desc)
      var cats=[].slice.call(svg.querySelectorAll('.cell:not(.sub-cell):not(.desc-seg)'));
      // map each category cell to a palette color, in document order
      var catColor={};
      cats.forEach(function(c,i){ var base=palette[i%palette.length]; c.setAttribute('fill',base); c.__base=base; catColor[i]=base; });
      // sub cells: lighten parent base. Group subs by nearest preceding category via angular midpoint.
      // Simpler robust approach: walk siblings — subs follow their category in DOM creation order grouped per category.
      // We re-derive by matching each sub to the category whose angular span contains the sub's midpoint.
      function midAngle(el){ try{ var bb=el.getBBox(); var cx=bb.x+bb.width/2, cy=bb.y+bb.height/2; return Math.atan2(cy,cx); }catch(e){ return 0; } }
      var catSpans=cats.map(function(c){ try{var bb=c.getBBox(); return {el:c, a:Math.atan2(bb.y+bb.height/2, bb.x+bb.width/2), base:c.__base};}catch(e){return {el:c,a:0,base:c.__base};} });
      function nearestBase(el){ var a=midAngle(el); var best=catSpans[0], bd=999; catSpans.forEach(function(s){ var d=Math.abs(Math.atan2(Math.sin(a-s.a),Math.cos(a-s.a))); if(d<bd){bd=d;best=s;} }); return best?best.base:palette[0]; }
      var subs=[].slice.call(svg.querySelectorAll('.sub-cell'));
      subs.forEach(function(s,j){ var base=nearestBase(s); s.setAttribute('fill', _hl(base, 12)); });
      // descriptor gradients: each desc-seg uses url(#pgN); rewrite the gradient stops to its category base
      var descs=[].slice.call(svg.querySelectorAll('.desc-seg'));
      descs.forEach(function(d){
        var base=nearestBase(d);
        var f=d.getAttribute('fill')||''; var m=f.match(/url\(#([^)]+)\)/);
        if(m){ var g=document.getElementById(m[1]); if(g){ var stops=g.querySelectorAll('stop'); if(stops[0])stops[0].setAttribute('stop-color',_hl(base,22)); if(stops[1])stops[1].setAttribute('stop-color',_hl(base,46)); } }
        else { d.setAttribute('fill', _hl(base,22)); }
      });
      // refresh hub glow ring colors if present
      try{ if(typeof setRing==='function'){ var rc=palette.slice(); setRing(rc); } }catch(e){}
    }catch(e){}
  }
  function _hl(hex,amt){ try{ if(hex[0]!=='#')return hex; var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255; var f=amt/100; if(f>=0){r=Math.round(r+(255-r)*f);g=Math.round(g+(255-g)*f);b=Math.round(b+(255-b)*f);}else{f=-f;r=Math.round(r*(1-f));g=Math.round(g*(1-f));b=Math.round(b*(1-f));} return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;} }

  function applyGlow(opt){
    var disc=el('lsHubDisc'); if(!disc) return;
    disc.classList.remove('ls-glow-solid','ls-glow-pulse','ls-glow-breathe','ls-glow-rainbow');
    if(!opt || !opt.mode || opt.mode==='off'){ return; }
    if(opt.color){ disc.style.setProperty('--ls-glow', opt.color); }
    if(opt.mode==='rainbow'){ disc.classList.add('ls-glow-rainbow'); }
    else if(opt.mode==='pulse'){ disc.classList.add('ls-glow-pulse'); }
    else if(opt.mode==='breathe'){ disc.classList.add('ls-glow-breathe'); }
    else { disc.classList.add('ls-glow-solid'); }
  }

  window.addEventListener('message',function(ev){
    var d=ev.data; if(!d) return;
    if(d.type==='LS_PALETTE'){ applyPalette(d.palette); try{ if(document.getElementById('listView') && document.getElementById('listView').classList.contains('active') && typeof rebuildList==='function') rebuildList(); }catch(e){} }
    if(d.type==='LS_GLOW'){ applyGlow(d.glow); }
  });
})();
<\/script>

<script id="lsTierLogic">
(function(){
  var LS_TIER_INTRO=[]; var LS_TIER_NEXT=[];
  var TIER=2;
  var TIERNAME={1:'Intro',2:'Next Level',3:'Master'};
  function rank(name){ if(LS_TIER_INTRO.indexOf(name)>=0)return 1; if(LS_TIER_NEXT.indexOf(name)>=0)return 2; return 3; }
  function nameOf(slug){ try{ var e=REGISTRY[slug]; return (e&&e.desc&&e.desc.name)?e.desc.name:slug; }catch(e){ return slug; } }

  function counts(){ var c={1:0,2:0,3:0}; try{ for(var s in REGISTRY){ c[rank(nameOf(s))]++; } }catch(e){} return c; }

  // CLEAN (paid) mode: rebuild the wheel with ONLY tier<=t items, re-proportioned, no ghosts/legend/upsell
  // safe deep-copy of just the data fields (DATA gains circular runtime refs after build)
  function cloneData(src){
    var out={categories:[]};
    (src.categories||[]).forEach(function(c){
      var nc={name:c.name,name_es:c.name_es,color:c.color,sub:[]};
      (c.sub||[]).forEach(function(s){
        var ns={name:s.name,name_es:s.name_es,color:s.color,_implicit:s._implicit,descriptors:[]};
        (s.descriptors||[]).forEach(function(d){ ns.descriptors.push({name:d.name,name_es:d.name_es,slug:d.slug}); });
        nc.sub.push(ns);
      });
      out.categories.push(nc);
    });
    return out;
  }
  function masterData(){
    if(window.__LS_FULL_DATA && window.__LS_FULL_DATA.categories && window.__LS_FULL_DATA.categories.length) return window.__LS_FULL_DATA;
    var src=window.DATA||(typeof DATA!=='undefined'?DATA:null);
    if(src && src.categories && src.categories.length){ try{ window.__LS_FULL_DATA=cloneData(src); }catch(e){} }
    return window.__LS_FULL_DATA||null;
  }
  function cleanRebuild(t){
    var full=masterData(); var live=window.DATA||(typeof DATA!=='undefined'?DATA:null);
    if(!full||!live){ return; }
    live.categories.length=0;
    full.categories.forEach(function(c){
      var keptSubs=[];
      (c.sub||[]).forEach(function(s){
        var kept=(s.descriptors||[]).filter(function(d){ return rank(d.name)<=t; });
        if(kept.length){ var ns={}; for(var k in s)ns[k]=s[k]; ns.descriptors=kept.map(function(d){var nd={};for(var kk in d)nd[kk]=d[kk];return nd;}); keptSubs.push(ns); }
      });
      if(keptSubs.length){ var nc={}; for(var k in c)nc[k]=c[k]; nc.sub=keptSubs; live.categories.push(nc); }
    });
    try{ var svg=document.getElementById('wheelSvg'); if(svg){ svg.querySelectorAll('g#wheelG').forEach(function(n){n.remove();}); svg.querySelectorAll('defs').forEach(function(n){n.remove();}); } }catch(e){}
    if(typeof window.__lsRedraw==='function'){ try{ window.__lsRedraw(); }catch(e){} }
  }

  /* WHEEL_LOAD inside the engine closure: owns DATA/DESCRIPTIONS/tier lists so a payload renders */
  window.WHEEL_LOAD=function(payload){
    if(!payload||!payload.categories){console.warn('WHEEL_LOAD: bad payload');return false;}
    try{
      var names=[];
      for(var k in DESCRIPTIONS){delete DESCRIPTIONS[k];}
      payload.categories.forEach(function(cat){(cat.sub||[]).forEach(function(s){(s.descriptors||[]).forEach(function(d){
        var p=d.panel||{};
        var e={cat:s.name||cat.name,cat_fr:s.name_fr||cat.name_fr,cat_it:s.name_it||cat.name_it,cat_es:s.name_es||cat.name_es,
          origin:p.origin||p.basics||'',chemistry:p.chemistry||p.level2||'',pairing:p.pairing||p.why||'',mixology:p.mixology||p.remember||'',examples:p.examples||''};
        for(var pk in p){ if(p.hasOwnProperty(pk) && e[pk]===undefined) e[pk]=p[pk]; }
        DESCRIPTIONS[d.slug]=e; names.push(d.name);
      });});});

/* === cheat-sheet auto-load for the 3D center-field pane (manifest-driven, sibling fallback, silent on 404) === */
let _cheatMap=null, _cheatMapP=null;
function _loadCheatManifest(){
  if(_cheatMapP) return _cheatMapP;
  _cheatMapP = fetch('CHEAT_PAIR_MANIFEST.json',{cache:'no-store'})
    .then(r=> r.ok ? r.json() : null)
    .then(j=>{ _cheatMap=new Map();
      try{
        var arr = j ? (Array.isArray(j) ? j : (j.pairs||j.cheats||j.wheels||[])) : [];
        if(arr && arr.length){ arr.forEach(function(p){ var wj=p.wheel||p.wheel_json||p.json||p.w; var cj=p.cheat||p.cheat_json||p.c; if(wj&&cj){ _cheatMap.set(wj,cj); _cheatMap.set(String(wj).split('/').pop(),cj); } }); }
        else if(j && typeof j==='object'){ Object.keys(j).forEach(function(k){ var cj=j[k]; if(typeof cj==='string'){ _cheatMap.set(k,cj); _cheatMap.set(k.split('/').pop(),cj); } }); }
      }catch(e){}
      return _cheatMap;
    })
    .catch(function(){ _cheatMap=new Map(); return _cheatMap; });
  return _cheatMapP;
}
function _cheatPathFor(wheelJson){
  var m=_cheatMap;
  if(m){ if(m.has(wheelJson)) return m.get(wheelJson); var b=wheelJson.split('/').pop(); if(m.has(b)) return m.get(b); }
  return wheelJson.replace(/\.json(\?|$)/, '-cheat.json$1');
}
async function _autoLoadCheat(f, wheelJson){
  try{ await _loadCheatManifest(); }catch(e){}
  var url=_cheatPathFor(wheelJson), cj=null;
  try{ var r=await fetch(url,{cache:'no-store'}); if(!r.ok) return; cj=await r.json(); }catch(e){ return; }
  var n=0; (function push(){ try{ if(f && f.contentWindow && f.contentWindow.WOW_SET_CHEATSHEET){ f.contentWindow.WOW_SET_CHEATSHEET(cj); return; } }catch(e){} if(n++<40) setTimeout(push,150); })();
}

function broadcast(msg){ [slots[0].iframe, slots[1].iframe, document.getElementById('frame3d')].forEach(f=>{ try{ if(f.contentWindow) f.contentWindow.postMessage(msg,'*'); }catch(e){} }); }
document.getElementById('themeBtn').addEventListener('click', ()=>{
  const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.querySelector('#themeBtn use').setAttribute('href', t==='dark'?'#i-moon':'#i-sun');
  slots.forEach(s=> applyThemeToFrame(s.iframe)); applyThemeToFrame(document.getElementById('frame3d'));
  broadcast({type:'ls:theme', theme:t});
});

/* design/dev, arcade, tip */
let DEV=false;
document.getElementById('designBtn').addEventListener('click', ()=>{ var __dm=document.getElementById('designModal'); if(__dm) __dm.hidden=false; });
var DZ_PALETTES=[{n:'Garnet',c:['#6E1B2E','#9E3B4E','#C46B78','#E3A9B0']},{n:'Gold',c:['#9A6B12','#C28A1E','#D9A93F','#EAC97A']},{n:'Forest',c:['#1E5631','#2E7D4F','#5BA877','#93C9A8']},{n:'Royal',c:['#1E3A6E','#2E5AA0','#5B82C4','#9DB6E0']},{n:'Slate',c:['#3A4452','#566273','#7E8A9B','#AAB4C2']},{n:'Copper',c:['#8C4A2F','#B26A47','#CE9070','#E3BBA3']},{n:'Teal',c:['#1C4F52','#2E7479','#4F9DA2','#8AC4C8']},{n:'Charcoal',c:['#2B2B2F','#44444A','#6A6A72','#9A9AA2']}];
var DZ_FONTS=[{n:'Default',v:"'IBM Plex Sans',system-ui,sans-serif"},{n:'System Sans',v:'system-ui,-apple-system,Segoe UI,Roboto,sans-serif'},{n:'Serif',v:"Georgia,'Times New Roman',serif"},{n:'Humanist',v:'Optima,Candara,"Segoe UI",sans-serif'},{n:'Slab',v:'Rockwell,"Roboto Slab",Georgia,serif'},{n:'Mono',v:'"IBM Plex Mono",ui-monospace,monospace'},{n:'Rounded',v:'"SF Pro Rounded","Segoe UI",system-ui,sans-serif'}];
(function(){ var modal=document.getElementById('designModal'); if(!modal) return;
  function closeDz(){ modal.hidden=true; }
  document.getElementById('dzClose').addEventListener('click', closeDz);
  modal.addEventListener('click', function(e){ if(e.target===modal) closeDz(); });
  var fsel=document.getElementById('dzFont');
  DZ_FONTS.forEach(function(f){ var o=document.createElement('option'); o.value=f.v; o.textContent=f.n; fsel.appendChild(o); });
  fsel.addEventListener('change', function(){ var v=fsel.value; broadcast({type:'LS_CMD',cmd:'fontStack',value:v}); wowSend('WOW_DESIGN',{font:v}); });
  var col=document.getElementById('dzColor');
  col.addEventListener('input', function(){ var v=col.value; broadcast({type:'LS_CMD',cmd:'textColor',value:v}); wowSend('WOW_DESIGN',{tcol:v}); });
  var dsz=document.getElementById('dzSize'); if(dsz){ dsz.addEventListener('input', function(){ var v=parseFloat(dsz.value)||1; broadcast({type:'LS_CMD',cmd:'textSize',value:v}); wowSend('WOW_DESIGN',{tsize:v}); }); }
  var dsb=document.getElementById('dzSegBorder'); if(dsb){ dsb.addEventListener('input', function(){ var v=dsb.value; broadcast({type:'LS_CMD',cmd:'segBorderColor',value:v}); wowSend('WOW_DESIGN',{segbcol:v}); }); }
  var pwrap=document.getElementById('dzPresets');
  DZ_PALETTES.forEach(function(p){ var b=document.createElement('button'); b.className='dz-preset'; b.type='button';
    b.innerHTML='<span class="dz-swatches">'+p.c.map(function(c){return '<span style="background:'+c+'"></span>';}).join('')+'</span><small>'+p.n+'</small>';
    b.addEventListener('click', function(){ pwrap.querySelectorAll('.dz-preset').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); broadcast({type:'LS_PALETTE',palette:p.c}); wowSend('WOW_DESIGN_PALETTE',p.c); });
    pwrap.appendChild(b); });
})();
document.getElementById('arcadeBtn').addEventListener('click', ()=> toast('Arcade — games & quizzes will live here.'));
document.getElementById('tipBtn').addEventListener('click', e=>{ e.preventDefault(); toast('Tip the Somm — support link goes here.'); });

/* toast */
let toastT; function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),5600); }

/* boot empty: no auto-load — wheels load by entitlement / JSON picker (we don't know what the client purchased) */
setMode('2d');
</script>
