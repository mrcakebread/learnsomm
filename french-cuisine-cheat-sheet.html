<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LearnSomm · French Cuisine Cheat Sheet</title>
<style>
:root{--bg:#faf8f3;--panel:#fffdf7;--ink:#2b2118;--muted:#8a7c66;--line:#e2dacb;--line2:#c9bfa6;--garnet:#6E1B2E;--gold:#C49A4A;--ui:'Jost',system-ui,sans-serif;--serif:'Cormorant Garamond',Georgia,serif;}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--ui);background:var(--bg);color:var(--ink);}
button,input,select,textarea,.card,.ct,.cn,.gcard,.ghead,#tierBar,.viewseg{font-family:var(--ui)!important;}
.wrap{max-width:1100px;margin:0 auto;padding:14px 14px 60px;}
.top{display:flex;flex-wrap:wrap;align-items:center;gap:.8rem;padding:.4rem 0 .8rem;}
h1{font-family:var(--serif);font-size:1.5rem;margin:0;font-weight:600;}
.sub{color:var(--muted);font-size:.82rem;}
#tierBar{display:inline-flex;align-items:center;gap:.4rem;background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:.32rem .5rem;}
#tierBar .tl{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:0 .3rem;}
#tierBar button{border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:14px;padding:.3rem .7rem;font-family:var(--ui);font-size:.8rem;cursor:pointer;}
#tierBar button.active{background:var(--garnet);color:#fff;border-color:var(--garnet);}
.viewseg{display:inline-flex;border:1px solid var(--line2);border-radius:14px;overflow:hidden;}
.viewseg button{border:none;background:transparent;color:var(--ink);font-size:.78rem;padding:.3rem .7rem;cursor:pointer;font-family:var(--ui);}
.viewseg button.active{background:var(--gold);color:#3a2a20;}
#search{flex:1 1 200px;min-width:160px;}
#search input{width:100%;padding:.5rem .7rem;border:1px solid var(--line2);border-radius:10px;font-family:var(--ui);font-size:.9rem;background:var(--panel);color:var(--ink);}
.grid{column-width:250px;column-gap:14px;}
.gcard{display:inline-block;width:100%;break-inside:avoid;margin:0 0 14px;background:var(--panel);border:1.5px solid var(--g);border-top:5px solid var(--g);border-radius:10px;padding:.6rem .7rem;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ghead{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g);margin:0 0 .5rem;}
.card{display:block;width:100%;text-align:left;border:1px solid color-mix(in srgb,var(--g) 35%,transparent);border-left:3px solid var(--g);background:color-mix(in srgb,var(--g) 8%,var(--bg));border-radius:7px;padding:.45rem .55rem;margin:0 0 .35rem;cursor:pointer;}
.card:hover{background:color-mix(in srgb,var(--g) 18%,var(--bg));}
.card .ct{font-weight:600;font-size:.9rem;}
.card .cn{font-size:.8rem;color:var(--muted);margin-top:.15rem;line-height:1.35;}
.card .badge{float:right;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line2);border-radius:8px;padding:.05rem .35rem;}
.card.spinnable .ct::after{content:' ↻';color:var(--gold);font-size:.8rem;}
.empty{color:var(--muted);font-style:italic;padding:1rem;}
#tierNote{font-size:.8rem;color:var(--muted);margin:.2rem 0 .8rem;}
</style></head>
<body><div class="wrap">
<div class="top">
  <div><h1>French Cuisine</h1><div class="sub">Sauces, dishes & techniques · the all-in-one French cuisine reference</div></div>
  <div id="tierBar"><span class="tl">Tier</span>
    <button data-tier="1">Intro</button>
    <button data-tier="2" class="active">Next Level</button>
    <button data-tier="3">Master</button>
  </div>
  <div class="viewseg"><button data-view="all" class="active">All</button><button data-view="type">Types</button><button data-view="aroma">Aromas</button></div>
  <div id="search"><input id="q" type="search" placeholder="Search styles, terms, aromas…" autocomplete="off"></div>
</div>
<div id="tierNote"></div>
<div class="grid" id="grid"></div>
</div>
<script>
var CARDS=[{"name": "Soupe à l'Oignon", "tier": 1, "group": "Soupes & Entrées", "note": "Caramelized-onion soup under a raft of bread and gratinéed Gruyère.", "wheel": "type", "color": "#3a6b8a", "slug": "soupe-oignon"}, {"name": "Consommé", "tier": 1, "group": "Soupes & Entrées", "note": "Crystal-clear clarified broth — the test of classical technique.", "wheel": "type", "color": "#3a6b8a", "slug": "consomme"}, {"name": "Bisque", "tier": 1, "group": "Soupes & Entrées", "note": "Silky shellfish soup (lobster, crab) thickened with cream and rice.", "wheel": "type", "color": "#3a6b8a", "slug": "bisque"}, {"name": "Vichyssoise", "tier": 1, "group": "Soupes & Entrées", "note": "Cold leek-and-potato soup finished with cream; served chilled.", "wheel": "type", "color": "#3a6b8a", "slug": "vichyssoise"}, {"name": "Pâté", "tier": 1, "group": "Soupes & Entrées", "note": "Seasoned ground meat or liver, baked or potted; served with bread.", "wheel": "type", "color": "#3a6b8a", "slug": "pate"}, {"name": "Terrine", "tier": 1, "group": "Soupes & Entrées", "note": "Coarse forcemeat pressed in a mold and sliced cold.", "wheel": "type", "color": "#3a6b8a", "slug": "terrine"}, {"name": "Escargots", "tier": 1, "group": "Soupes & Entrées", "note": "Snails baked in garlic-parsley butter, a Burgundian classic.", "wheel": "type", "color": "#3a6b8a", "slug": "escargots"}, {"name": "Soufflé", "tier": 1, "group": "Soupes & Entrées", "note": "Egg-white-lofted savory or sweet dish that must be served at once.", "wheel": "type", "color": "#3a6b8a", "slug": "souffle"}, {"name": "Béchamel", "tier": 1, "group": "Sauces Mères", "note": "Milk thickened with a white roux — base of Mornay and gratins.", "wheel": "type", "color": "#8a1f2e", "slug": "bechamel"}, {"name": "Velouté", "tier": 1, "group": "Sauces Mères", "note": "Light stock thickened with a blond roux; base of many white sauces.", "wheel": "type", "color": "#8a1f2e", "slug": "veloute"}, {"name": "Espagnole", "tier": 1, "group": "Sauces Mères", "note": "Brown stock and roux with tomato — the base of demi-glace.", "wheel": "type", "color": "#8a1f2e", "slug": "espagnole"}, {"name": "Hollandaise", "tier": 1, "group": "Sauces Mères", "note": "Warm emulsion of egg yolk, butter, and lemon; for eggs and fish.", "wheel": "type", "color": "#8a1f2e", "slug": "hollandaise"}, {"name": "Sauce Tomate", "tier": 1, "group": "Sauces Mères", "note": "Classical tomato mother sauce, traditionally roux-thickened.", "wheel": "type", "color": "#8a1f2e", "slug": "sauce-tomate"}, {"name": "Béarnaise", "tier": 1, "group": "Sauces Mères", "note": "Hollandaise's sibling with tarragon and shallot reduction; for steak.", "wheel": "type", "color": "#8a1f2e", "slug": "bearnaise"}, {"name": "Beurre Blanc", "tier": 1, "group": "Sauces Mères", "note": "Emulsified butter sauce on a wine-shallot reduction; for fish.", "wheel": "type", "color": "#8a1f2e", "slug": "beurre-blanc"}, {"name": "Coq au Vin", "tier": 1, "group": "Plats — Viandes", "note": "Chicken braised in red wine with lardons, mushrooms, and onions.", "wheel": "type", "color": "#6e3b2a", "slug": "coq-au-vin"}, {"name": "Bœuf Bourguignon", "tier": 1, "group": "Plats — Viandes", "note": "Beef stewed slowly in red Burgundy with bacon and pearl onions.", "wheel": "type", "color": "#6e3b2a", "slug": "boeuf-bourguignon"}, {"name": "Confit de Canard", "tier": 1, "group": "Plats — Viandes", "note": "Duck legs cured then cooked and preserved in their own fat.", "wheel": "type", "color": "#6e3b2a", "slug": "confit-canard"}, {"name": "Cassoulet", "tier": 1, "group": "Plats — Viandes", "note": "Slow white-bean casserole with sausage, duck confit, and pork.", "wheel": "type", "color": "#6e3b2a", "slug": "cassoulet"}, {"name": "Blanquette de Veau", "tier": 1, "group": "Plats — Viandes", "note": "Veal in a white velouté sauce — gentle, ivory, no browning.", "wheel": "type", "color": "#6e3b2a", "slug": "blanquette"}, {"name": "Pot-au-Feu", "tier": 1, "group": "Plats — Viandes", "note": "Boiled beef and vegetables; the broth and meat served apart.", "wheel": "type", "color": "#6e3b2a", "slug": "pot-au-feu"}, {"name": "Steak Frites", "tier": 1, "group": "Plats — Viandes", "note": "Pan-seared steak with crisp fries — the bistro standard.", "wheel": "type", "color": "#6e3b2a", "slug": "steak-frites"}, {"name": "Cassolette", "tier": 1, "group": "Plats — Viandes", "note": "Small individual baked dish of meat or seafood in sauce.", "wheel": "type", "color": "#6e3b2a", "slug": "cassolette"}, {"name": "Moules Marinières", "tier": 1, "group": "Fruits De Mer", "note": "Mussels steamed in white wine, shallots, and parsley.", "wheel": "type", "color": "#2f6b6b", "slug": "moules"}, {"name": "Bouillabaisse", "tier": 1, "group": "Fruits De Mer", "note": "Provençal fish stew with saffron and rouille; from Marseille.", "wheel": "type", "color": "#2f6b6b", "slug": "bouillabaisse"}, {"name": "Sole Meunière", "tier": 1, "group": "Fruits De Mer", "note": "Sole dredged in flour, pan-fried in brown butter with lemon.", "wheel": "type", "color": "#2f6b6b", "slug": "sole-meuniere"}, {"name": "Coquilles St-Jacques", "tier": 1, "group": "Fruits De Mer", "note": "Scallops gratinéed in a creamy sauce, served in the shell.", "wheel": "type", "color": "#2f6b6b", "slug": "coquilles"}, {"name": "Plateau de Fruits de Mer", "tier": 1, "group": "Fruits De Mer", "note": "Iced tower of raw and cooked shellfish; the brasserie centerpiece.", "wheel": "type", "color": "#2f6b6b", "slug": "plateau"}, {"name": "Baguette", "tier": 1, "group": "Pain & Pâtisserie", "note": "Lean crusty wheat loaf; the everyday French bread, by law simple.", "wheel": "type", "color": "#caa23b", "slug": "baguette"}, {"name": "Croissant", "tier": 1, "group": "Pain & Pâtisserie", "note": "Laminated butter pastry, flaky and crescent-shaped.", "wheel": "type", "color": "#caa23b", "slug": "croissant"}, {"name": "Pain au Chocolat", "tier": 1, "group": "Pain & Pâtisserie", "note": "Laminated dough rolled around dark chocolate batons.", "wheel": "type", "color": "#caa23b", "slug": "pain-chocolat"}, {"name": "Brioche", "tier": 1, "group": "Pain & Pâtisserie", "note": "Rich egg-and-butter enriched bread; tender, golden crumb.", "wheel": "type", "color": "#caa23b", "slug": "brioche"}, {"name": "Pâte Feuilletée", "tier": 1, "group": "Pain & Pâtisserie", "note": "Puff pastry — hundreds of butter-and-dough layers that lift.", "wheel": "type", "color": "#caa23b", "slug": "pate-feuilletee"}, {"name": "Pâte à Choux", "tier": 1, "group": "Pain & Pâtisserie", "note": "Twice-cooked paste that puffs hollow; éclairs, profiteroles, gougères.", "wheel": "type", "color": "#caa23b", "slug": "choux"}, {"name": "Brie", "tier": 1, "group": "Fromage & Charcuterie", "note": "Soft bloomy-rind cow's-milk cheese; buttery and mild.", "wheel": "type", "color": "#7a8b3a", "slug": "brie"}, {"name": "Camembert", "tier": 1, "group": "Fromage & Charcuterie", "note": "Bloomy Norman cheese, earthier and more pungent than Brie.", "wheel": "type", "color": "#7a8b3a", "slug": "camembert"}, {"name": "Roquefort", "tier": 1, "group": "Fromage & Charcuterie", "note": "Sheep's-milk blue aged in Combalou caves; sharp and salty.", "wheel": "type", "color": "#7a8b3a", "slug": "roquefort"}, {"name": "Comté", "tier": 1, "group": "Fromage & Charcuterie", "note": "Aged Alpine cow's-milk cheese; nutty, with crystalline crunch.", "wheel": "type", "color": "#7a8b3a", "slug": "comte"}, {"name": "Chèvre", "tier": 1, "group": "Fromage & Charcuterie", "note": "Fresh or aged goat cheese; tangy, bright, chalky when young.", "wheel": "type", "color": "#7a8b3a", "slug": "chevre"}, {"name": "Jambon de Bayonne", "tier": 1, "group": "Fromage & Charcuterie", "note": "Air-dried salted ham from the Basque southwest.", "wheel": "type", "color": "#7a8b3a", "slug": "jambon"}, {"name": "Rillettes", "tier": 1, "group": "Fromage & Charcuterie", "note": "Meat (often pork or duck) slow-cooked and shredded into a spread.", "wheel": "type", "color": "#7a8b3a", "slug": "rillettes"}, {"name": "Crème Brûlée", "tier": 1, "group": "Desserts", "note": "Vanilla custard under a torched, crackable caramel crust.", "wheel": "type", "color": "#9c5a8f", "slug": "creme-brulee"}, {"name": "Tarte Tatin", "tier": 1, "group": "Desserts", "note": "Upside-down caramelized-apple tart, baked then flipped.", "wheel": "type", "color": "#9c5a8f", "slug": "tarte-tatin"}, {"name": "Profiteroles", "tier": 1, "group": "Desserts", "note": "Choux puffs filled with ice cream under warm chocolate.", "wheel": "type", "color": "#9c5a8f", "slug": "profiteroles"}, {"name": "Macaron", "tier": 1, "group": "Desserts", "note": "Almond-meringue shells sandwiching ganache or buttercream.", "wheel": "type", "color": "#9c5a8f", "slug": "macaron"}, {"name": "Mousse au Chocolat", "tier": 1, "group": "Desserts", "note": "Airy chocolate mousse lightened with whipped egg or cream.", "wheel": "type", "color": "#9c5a8f", "slug": "mousse-chocolat"}, {"name": "Crêpes", "tier": 1, "group": "Desserts", "note": "Thin pancakes, sweet (Suzette) or savory (galettes).", "wheel": "type", "color": "#9c5a8f", "slug": "crepes"}, {"name": "Mille-Feuille", "tier": 1, "group": "Desserts", "note": "'Thousand sheets' — puff pastry layered with pastry cream.", "wheel": "type", "color": "#9c5a8f", "slug": "mille-feuille"}, {"name": "Éclair", "tier": 1, "group": "Desserts", "note": "Choux fingers filled with cream and glazed on top.", "wheel": "type", "color": "#9c5a8f", "slug": "eclair"}, {"name": "Mise en Place", "tier": 1, "group": "Techniques & Terroir", "note": "'Everything in its place' — prep organized before cooking.", "wheel": "type", "color": "#4f6b7a", "slug": "mise-en-place"}, {"name": "Sous Vide", "tier": 1, "group": "Techniques & Terroir", "note": "Vacuum-sealed food cooked precisely in a temperature bath.", "wheel": "type", "color": "#4f6b7a", "slug": "sous-vide"}, {"name": "Flambé", "tier": 1, "group": "Techniques & Terroir", "note": "Igniting added spirit to burn off alcohol and add aroma.", "wheel": "type", "color": "#4f6b7a", "slug": "flambe"}, {"name": "Déglacer", "tier": 1, "group": "Techniques & Terroir", "note": "Deglazing — dissolving pan fond with liquid to build a sauce.", "wheel": "type", "color": "#4f6b7a", "slug": "deglacer"}, {"name": "Terroir", "tier": 1, "group": "Techniques & Terroir", "note": "The taste of place — soil, climate, and tradition in a product.", "wheel": "type", "color": "#4f6b7a", "slug": "terroir"}, {"name": "AOC", "tier": 1, "group": "Techniques & Terroir", "note": "Appellation d'Origine Contrôlée — France's protected-origin label.", "wheel": "type", "color": "#4f6b7a", "slug": "aoc"}];
var TIER=2, VIEW='all', Q='';
var TIERNAME={1:'Intro',2:'Next Level',3:'Master'};
function visible(c){
  if(c.tier>TIER) return false;
  if(VIEW!=='all' && c.wheel!==VIEW) return false;
  if(Q){ var s=(c.name+' '+c.group+' '+c.note).toLowerCase(); if(s.indexOf(Q)<0) return false; }
  return true;
}
function slugify(s){ return s.toLowerCase().replace(/\(.*?\)/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function render(){
  var grid=document.getElementById('grid'); grid.innerHTML='';
  // group visible cards by group
  var groups={};
  CARDS.filter(visible).forEach(function(c){ (groups[c.group]=groups[c.group]||[]).push(c); });
  // Aromas & tasting notes always come first, then the other (type/style/service) groups.
  var order=Object.keys(groups).sort(function(a,b){
    var aw=(groups[a][0].wheel==='aroma')?0:1, bw=(groups[b][0].wheel==='aroma')?0:1;
    return aw-bw; // stable-ish: aroma groups (0) before type groups (1)
  });
  if(!order.length){ grid.innerHTML='<div class="empty">Nothing at this tier/filter.</div>'; updateNote(0); return; }
  var shown=0;
  order.forEach(function(g){
    var color=groups[g][0].color;
    var block=document.createElement('div'); block.className='gcard'; block.style.setProperty('--g',color);
    var head=document.createElement('div'); head.className='ghead'; head.textContent=g; block.appendChild(head);
    groups[g].forEach(function(c){
      shown++;
      var card=document.createElement('button'); card.type='button'; card.className='card';
      card.style.setProperty('--g',color);
      card.setAttribute('data-title', c.name); card.setAttribute('data-slug', slugify(c.name)); if(c.slug)card.setAttribute('data-wheelslug', c.slug);
      // per-card tier label removed — the tier toggle already conveys this
      card.innerHTML='<div class="ct">'+c.name+'</div><div class="cn">'+c.note+'</div>';
      block.appendChild(card);
    });
    grid.appendChild(block);
  });
  updateNote(shown);
  applyWheelNames();
}
function updateNote(n){
  var locked=CARDS.filter(function(c){return c.tier>TIER;}).length;
  var t=document.getElementById('tierNote');
  t.textContent=TIERNAME[TIER]+' view · '+n+' entries shown'+(locked? ' · '+locked+' more unlock at higher tiers':'');
}
// tier + view + search wiring
document.querySelectorAll('#tierBar button').forEach(function(b){ b.addEventListener('click',function(){
  document.querySelectorAll('#tierBar button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
  TIER=parseInt(b.getAttribute('data-tier')); render();
}); });
document.querySelectorAll('.viewseg button').forEach(function(b){ b.addEventListener('click',function(){
  document.querySelectorAll('.viewseg button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
  VIEW=b.getAttribute('data-view'); render();
}); });
document.getElementById('q').addEventListener('input',function(e){ Q=e.target.value.trim().toLowerCase(); render(); });

// ---- click-to-spin: tell the parent wheel to spin to this term (by NAME; wheel resolves) ----
function postSpin(name){ try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_SPIN_TO',slug:name},'*'); } }catch(e){} }
document.addEventListener('click',function(e){
  var card=e.target.closest&&e.target.closest('.card');
  if(card){ postSpin(card.getAttribute('data-wheelslug')||card.getAttribute('data-title')); }
});
// announce ready; receive wheel names to mark spinnable + resolve
try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_SHEET_READY'},'*'); } }catch(e){}
var WHEEL_NAMES={};
window.addEventListener('message',function(e){ var d=e.data; if(!d)return;
  if(d.type==='LS_WHEEL_NAMES'){ WHEEL_NAMES=d.names||{}; applyWheelNames(); }
  if(d.type==='LS_CMD' && d.cmd==='tier'){ var bt=document.querySelector('#tierBar [data-tier="'+(d.value||2)+'"]'); if(bt)bt.click(); }
});
function applyWheelNames(){
  document.querySelectorAll('.card').forEach(function(card){
    var title=(card.getAttribute('data-title')||'').toLowerCase().trim();
    var ws=null;
    if(WHEEL_NAMES[title]) ws=WHEEL_NAMES[title];
    else for(var nm in WHEEL_NAMES){ if(nm===title||(title&&(nm.indexOf(title)>=0||title.indexOf(nm)>=0))){ ws=WHEEL_NAMES[nm]; break; } }
    if(ws){ card.setAttribute('data-wheelslug',ws); card.classList.add('spinnable'); }
  });
}
render();
</script><script id="lsFontApply">
(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
</body></html>
