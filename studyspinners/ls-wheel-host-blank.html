<!DOCTYPE html>
<!-- StudySpinners blank wheel host — renders any payload posted via {type:'wheel:load'} -->
<html lang="en" data-theme="light">
<head>
<script>window.__LS_DEPTH=2;window.__lsTierDepth=function(){return 2;};</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudySpinners — Wheel Host</title>


<style>
:root{--display:'Optima','Candara','Gill Sans','Gill Sans MT','Segoe UI',sans-serif;--serif:'Avenir Next','Avenir','Century Gothic','Futura','Trebuchet MS',sans-serif;}
[data-theme="dark"]{--display:'Baskerville','Baskerville Old Face','Hoefler Text','Big Caslon','Palatino Linotype',serif;--serif:'Iowan Old Style','Palatino Linotype','Palatino','Book Antiqua','Cambria',Georgia,serif;}

*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#8a5a2a;--gold:#a87f3d;--sep:#faf8f3;--hub:#fffdf8;--hub-text:#6b573a;--badge-bg:#f4eee2;--badge-line:#d8cdb8;--shadow:0 8px 30px rgba(80,60,30,.14);}
[data-theme="dark"]{--bg:#16130e;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;--accent:#c9a96e;--gold:#d4b276;--sep:#16130e;--hub:#211c14;--hub-text:#d8c294;--badge-bg:#2a241a;--badge-line:#4a4030;--shadow:0 10px 34px rgba(0,0,0,.55);}
html{background:var(--bg);}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .25s,color .25s;}

.topbar{width:100%;max-width:1100px;display:flex;justify-content:flex-end;gap:.5rem;padding:.7rem 1rem 0;}
.topbar button{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:.75rem;border-radius:6px;padding:.35rem .7rem;cursor:pointer;}
.topbar button:hover{color:var(--text);border-color:var(--muted);}
h1{font-size:1.4rem;font-weight:400;letter-spacing:.04em;padding:.2rem 1rem .15rem;text-align:center;}
.byline{display:none;font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.2rem;}
.byline em{color:var(--accent);font-style:italic;}
.spin-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:.55rem;}
.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;justify-content:center;border:1px solid var(--line);border-radius:8px;padding:.4rem .9rem;margin-bottom:1rem;max-width:96vw;background:var(--panel);}
.controls .ctl-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.controls button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.9rem;line-height:1;border-radius:6px;padding:.32rem .65rem;cursor:pointer;min-width:2.1rem;min-height:2.1rem;}
.controls button:hover{border-color:var(--gold);color:var(--accent);}
.controls button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.controls input[type=range]{width:150px;accent-color:var(--gold);cursor:pointer;}
.size-ctl{display:flex;align-items:center;gap:.55rem;}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.view-toggle button{border:none;border-radius:0;min-width:3.4rem;}
.view-toggle button.active{background:var(--badge-bg);color:var(--accent);font-weight:bold;}
.layout{display:flex;gap:0;width:100%;max-width:1180px;align-items:center;padding:0 1rem 2.5rem;justify-content:center; position:relative;}
.wheel-wrap{flex:0 0 auto;display:flex;justify-content:center;}
#svgContainer { position: relative; line-height: 0; }

#wheelSvg{cursor:grab;user-select:none;touch-action:none;filter:drop-shadow(var(--shadow));}
#wheelSvg:active{cursor:grabbing;}
#wheelSvg .cell{stroke:var(--sep);stroke-width:1.5;}
#wheelSvg .desc-seg{cursor:pointer;transition:filter .15s;}
#wheelSvg .desc-seg:hover{filter:brightness(1.12) saturate(1.05);}
#wheelSvg .desc-seg.selected{stroke:var(--gold);stroke-width:2.4;}
#wheelSvg .hub{fill:var(--hub);stroke:var(--gold);stroke-width:1.4;}
#wheelSvg .hub-text{fill:var(--hub-text);}
#wheelSvg .rim{fill:none;stroke:var(--line);stroke-width:1;}
@media (prefers-reduced-motion:reduce){#wheelSvg .desc-seg{transition:none;}}

#listView{position: relative; display:none; flex:0 1 auto; width:min(720px,94vw); transition: opacity 0.3s, filter 0.3s;}
#listBody{column-width:230px;column-gap:14px;}
.cat-block{display:inline-block;width:100%;break-inside:avoid;margin:0 0 14px;background:var(--panel);
  border:1.5px solid var(--cat,#bbb);border-top:5px solid var(--cat,#bbb);border-radius:10px;padding:.55rem .65rem;
  box-shadow:0 1px 3px rgba(0,0,0,.07);}
.cat-head{display:flex;align-items:center;gap:.45rem;font-size:.72rem;font-weight:bold;letter-spacing:.08em;text-transform:uppercase;color:var(--cat,#666);margin:0 0 .5rem;}
.cs-cells{display:flex;flex-direction:column;gap:.28rem;}
.list-chip{display:block;width:100%;text-align:left;font-size:.83rem;font-family:inherit;
  background:color-mix(in srgb, var(--cat,#888) 9%, var(--bg));border:1px solid color-mix(in srgb, var(--cat,#888) 35%, transparent);
  border-left:3px solid var(--cat,#888);border-radius:6px;padding:.34rem .55rem;cursor:pointer;color:var(--text);transition:background .15s;}
.list-chip:hover{background:color-mix(in srgb, var(--cat,#888) 20%, var(--bg));}
.list-chip.selected{background:color-mix(in srgb, var(--cat,#888) 28%, var(--bg));font-weight:600;}
/* glowing category borders when glow is on */
#listView.list-glow .cat-block{box-shadow:0 0 0 1px var(--cat,#bbb), 0 0 12px -2px var(--cat,#bbb);}
#listView{width:min(940px,96vw)!important;}

#listView.active{display:block;}
#listSearch{width:100%;padding:.55rem .85rem;font-family:inherit;font-size:.92rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);margin-bottom:1rem;}
#listSearch:focus{outline:none;border-color:var(--gold);}
.cat-block{margin-bottom:1rem;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.7rem .9rem;}
.cat-head{display:flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.cat-dot{width:.7rem;height:.7rem;border-radius:3px;flex:0 0 auto;}
.sub-group{margin-bottom:.5rem;}
.sub-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);opacity:.8;margin-bottom:.3rem;}
.chip-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.list-chip{font-size:.82rem;font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.32rem .62rem;cursor:pointer;color:var(--text);}
.list-chip:hover{border-color:var(--gold);color:var(--accent);}
.list-chip:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.list-chip.selected{border-color:var(--gold);background:var(--badge-bg);color:var(--accent);font-weight:bold;}
#noResults{display:none;color:var(--muted);font-style:italic;font-size:.88rem;padding:.4rem 0;}

.detail-panel{flex:1;min-width:280px;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:1.3rem 1.5rem;min-height:360px;margin-left:1.4rem; transition: opacity 0.3s; z-index:60; position:relative;}
.panel-header{display:flex;align-items:center;justify-content:space-between;gap:.6rem;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin:-1.3rem -1.5rem 1rem;padding:.5rem .9rem .45rem;border-bottom:1px solid var(--line);border-radius:9px 9px 0 0;}
.panel-header:active{cursor:grabbing;}
.panel-header .grip-title{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
.panel-header .grip-dots{color:var(--line);letter-spacing:2px;margin-right:.4rem;}
.panel-header button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.66rem;border-radius:5px;padding:.22rem .5rem;cursor:pointer;display:none;}
.panel-header button:hover{border-color:var(--gold);color:var(--accent);}
.detail-panel.floating{position:fixed;z-index:60;margin:0;width:min(380px,92vw);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow);border-color:var(--gold);}
.detail-panel.floating .panel-header{position:sticky;top:0;z-index:2;background:var(--panel);}
.detail-panel.floating .panel-header button{display:inline-block;}
.detail-panel h2{font-size:1.3rem;margin-bottom:.15rem;font-weight:400;font-style:italic;color:var(--accent);}
.detail-panel h2 a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--gold);}
.detail-panel h2 a:hover,.detail-panel h2 a:focus-visible{border-bottom-style:solid;color:var(--gold);outline:none;}
.wiki-mark{font-size:.6em;margin-left:.28rem;font-style:normal;color:var(--gold);vertical-align:super;}
.img-mark{font-size:.78em;margin-left:.5rem;text-decoration:none;vertical-align:middle;opacity:.7;transition:opacity .15s;cursor:pointer;}
.img-mark:hover{opacity:1;}
.detail-panel .category-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.section-title{font-size:.66rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .25rem;font-weight:bold;border-bottom:1px solid var(--line);padding-bottom:2px;}
.body-text{font-size:.85rem;line-height:1.65;color:var(--text);}
.flag-note{font-size:.74rem;color:var(--gold);background:var(--badge-bg);border:1px solid var(--gold);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;line-height:1.5;}
.grid-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;}
.grid-badge{font-size:.74rem;background:var(--badge-bg);border:1px solid var(--gold);padding:.18rem .5rem;border-radius:4px;}
.placeholder{color:var(--muted);font-size:.95rem;margin-top:2.5rem;text-align:center;font-style:italic;}
@media(max-width:800px){.layout{flex-direction:column;align-items:center;}.detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}h1{font-size:1.15rem;}}

/* Hub center: logo + hover mirror */
#hubCenter{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18.5%;height:18.5%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
#hubLogo{max-width:88%;max-height:88%;opacity:1;transition:opacity .18s;display:none;}
#hubMirror{position:absolute;inset:-30% -55%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:var(--display);font-weight:bold;color:var(--hub-text);line-height:1.08;opacity:0;transition:opacity .15s;text-shadow:0 1px 6px var(--hub);}
#hubMirror.show{opacity:1;}
#hubCenter.mirroring #hubLogo{opacity:0;}
#svgContainer.has-logo .hub-text{opacity:0;}
/* Background echo: giant readable mirror, desktop only */
#bgEcho{position:fixed;top:.4rem;left:1rem;font-family:var(--ui,var(--display));font-weight:bold;font-size:clamp(1.2rem,3.5vw,2.9rem);color:var(--hub-text);opacity:0;transition:opacity .2s;pointer-events:none;z-index:0;line-height:1;max-width:55vw;letter-spacing:.02em;}
#bgEcho.show{opacity:.13;}
@media(max-width:800px){#bgEcho{display:none;}}

/* deploy: selection lockdown */
body{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
input,textarea{user-select:text;-webkit-user-select:text;-moz-user-select:text;}
#lsSpinTip{position:absolute;top:-2px;left:50%;transform:translateX(-50%);z-index:6;
  font-family:var(--ui,sans-serif);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink,#1A1714);opacity:.32;pointer-events:none;white-space:nowrap;transition:opacity .4s;
  background:rgba(255,255,255,.0);}
#lsSpinTip.gone{opacity:0;}
[data-theme="cellar"] #lsSpinTip{color:var(--ink,#f0e8da);opacity:.4;}
#readPoint{background:transparent!important;border:none!important;box-shadow:none!important;text-shadow:0 1px 2px rgba(0,0,0,.55),0 0 7px rgba(255,255,255,.6);}[data-theme="dark"] #readPoint{text-shadow:0 1px 3px rgba(0,0,0,.92),0 0 9px rgba(0,0,0,.75);}#lsTierBar,#lsTierLegend{display:none!important}#detailPanel,.detail-panel{display:none!important}/* customizable hub: ring + glow vars; no permanent glow */.hub{fill:transparent!important;stroke:none!important;}#lsHubGlow{opacity:0!important;}.hub-glow-on #lsHubGlow{opacity:.92!important;background:radial-gradient(circle,var(--hub-glow,#ffd76a) 0%,rgba(0,0,0,0) 70%)!important;animation:none!important;}/* eliminate engine disc circle; your logo IS the circle */#lsHubDisc{background:transparent!important;box-shadow:none!important;border:none!important;}#lsHubDisc::after,#lsHubDisc::before{display:none!important;content:none!important;background:none!important;box-shadow:none!important;}#lsHubDisc.ls-glow-solid,#lsHubDisc.ls-glow-pulse,#lsHubDisc.ls-glow-breathe,#lsHubDisc.ls-glow-rainbow{box-shadow:none!important;animation:none!important;}#lsHubMark{width:95%!important;height:95%!important;object-fit:contain!important;filter:none!important;box-shadow:none!important;}#hubLogo{filter:none!important;}html,body{background:var(--bg)!important}body{padding-bottom:0!important}.contact-bar{display:none!important}#wheelWrap{position:fixed!important;top:0!important;left:0!important;right:0!important;bottom:0!important;width:100vw!important;max-width:100vw!important;height:auto!important;overflow:visible!important;justify-content:center!important;align-items:center!important;}#svgContainer{overflow:visible!important;}#readPoint{background:transparent!important;border:none!important;box-shadow:none!important;text-shadow:none!important;padding:0!important;font-size:0!important;z-index:9999!important;}#readPoint::before{content:""!important;}#readPoint::after{content:""!important;}@keyframes lsArrowBounce{0%,100%{transform:translateX(0);}50%{transform:translateX(7px);}}#readPoint svg{filter:drop-shadow(0 0 4px #d9b14a) drop-shadow(0 0 9px rgba(201,162,58,.75));animation:lsArrowBounce .85s ease-in-out infinite;will-change:transform;}</style>

<style id="enhancements">
/* pill controls */
.pill-btn{font-family:inherit;font-size:.82rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.32rem .7rem;cursor:pointer;color:var(--text);}
.pill-btn.on{background:var(--badge-bg);color:var(--accent);border-color:var(--gold);font-weight:bold;}
.mode-toggle button{min-width:2.7rem;}
/* label glow toggle */
#wheelSvg.label-glow text{filter:drop-shadow(0 0 1.3px var(--gold)) drop-shadow(0 0 3px var(--gold));}
/* hub-mirror glow (center hover) handled inline */
#hubMirror.glow{filter:drop-shadow(0 0 4px currentColor) drop-shadow(0 0 9px currentColor);}
/* ── docked wheel modes (desktop) ── */
body[data-view="wheel"][data-mode="dock-left"] .layout,
body[data-view="wheel"][data-mode="dock-right"] .layout{display:block;max-width:none;padding:0;}
body[data-view="wheel"][data-mode="dock-bottom"] .layout{display:block;max-width:none;padding:0;}
body[data-view="wheel"][data-mode="dock-bottom"] #svgContainer{transform:translateY(30%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:fixed;top:6px;bottom:0px;width:60vw;display:flex;align-items:center;overflow:hidden;pointer-events:none;z-index:15;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap{left:0;justify-content:flex-start;}
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{right:0;justify-content:flex-end;}
body[data-view="wheel"][data-mode="dock-left"] #svgContainer{transform:translateX(-30%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:translateX(30%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel{position:fixed;top:130px;right:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:10px 0 0 10px;}
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:fixed;top:130px;left:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:0 10px 10px 0;}
/* read-point chip */
#readPoint{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:.3rem .65rem;font-weight:bold;font-family:var(--display);letter-spacing:.05em;box-shadow:var(--shadow);cursor:pointer;pointer-events:auto;max-width:26vw;text-align:center;transform:translate(-50%,-50%);}
#readPoint::before{content:"\25c0";opacity:.5;margin-right:.3rem;}
body[data-view="wheel"][data-mode="dock-right"] #readPoint::before{content:"\25b6";}
body[data-view="wheel"][data-mode="dock-left"] #readPoint,
body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:block;}
/* detached move handle */
#wheelMove,#wheelMove2{display:none !important;}
#wheelMove{position:fixed;display:none !important;z-index:28;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.22rem .6rem;font-size:.74rem;color:var(--muted);cursor:move;pointer-events:auto;user-select:none;}
body[data-view="wheel"][data-mode="detached"] .wheel-move{display:block;}
#wheelMove2{padding:.22rem .5rem;}
/* ── collapsible list ── */
.sub-toggle{display:flex;align-items:center;gap:.45rem;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.34rem .6rem;cursor:pointer;color:var(--text);font-family:inherit;font-size:.82rem;margin:.18rem 0;}
.sub-toggle:hover{border-color:var(--gold);}
.sub-caret{display:inline-block;transition:transform .15s;color:var(--accent);font-size:.7rem;}
.sub-group.expanded .sub-caret{transform:rotate(90deg);}
.sub-group .chip-row{display:none;margin:.35rem 0 .2rem;}
.sub-group.expanded .chip-row{display:flex;}
#listBody.searching .sub-group .chip-row{display:flex;}
#listBody.searching .sub-caret{transform:rotate(90deg);}
#listBody.cols{column-width:250px;column-gap:1rem;}
#listBody.cols .cat-block{break-inside:avoid;}
/* contact */
.contact-bar{max-width:1100px;margin:0 auto 1.4rem;padding:.7rem 1rem;text-align:center;font-size:.85rem;color:var(--muted);border-top:1px solid var(--line);}
.contact-bar a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--gold);margin:0 .55rem;white-space:nowrap;}
.contact-bar a:hover{color:var(--gold);}
.contact-bar .lead{display:block;margin-bottom:.35rem;color:var(--text);font-style:italic;}
.detail-panel .contact{margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--line);font-size:.8rem;}
.detail-panel .contact a{display:inline-block;margin:.1rem .5rem .1rem 0;color:var(--accent);border-bottom:1px dotted var(--gold);text-decoration:none;}
.noob-fact{font-size:.92rem;line-height:1.5;}
/* responsive: docked falls back to centered/stacked on narrow screens */
@media (max-width:820px){
  body[data-view="wheel"][data-mode="dock-left"] .layout,
  body[data-view="wheel"][data-mode="dock-right"] .layout{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2.5rem;}
  body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
  body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:static;width:auto;overflow:visible;pointer-events:auto;}
  body[data-view="wheel"][data-mode="dock-left"] #svgContainer,
  body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:none;}
  body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
  body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:static;width:100%;max-width:95vw;margin-top:1rem;max-height:none;}
  body[data-view="wheel"][data-mode="dock-left"] #readPoint,
  body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:none;}
}
</style>

<style id="rev2">
.detail-panel h2{font-size:1.62rem;}
.detail-panel .category-tag{font-size:.8rem;}
.section-title{font-size:.82rem !important;}
.body-text{font-size:1.06rem;line-height:1.62;}
.noob-fact{font-size:1.0rem;}
.funfact{font-size:1.04rem;line-height:1.55;background:var(--badge-bg);border:1px solid var(--gold);border-left-width:4px;border-radius:8px;padding:.6rem .8rem;margin:.2rem 0 .9rem;}
.funfact .ff-label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:bold;margin-bottom:.25rem;}
/* bgEcho hover text: lighter in dark, darker in light */
[data-theme="dark"] #bgEcho{color:#efe6d4;opacity:.16;}
[data-theme="light"] #bgEcho{color:#3a2f20;opacity:.13;}
#bgEcho.show{opacity:var(--echo-op,.15);}
[data-theme="dark"] #bgEcho.show{opacity:.17;}
[data-theme="light"] #bgEcho.show{opacity:.14;}
/* center: logo only, mirror text removed */
#hubMirror{display:none !important;}
#hubLogo{display:block;}
/* spin tally chip */
#spinTally{font-size:.72rem;color:var(--muted);margin-left:.1rem;white-space:nowrap;}
/* context-sensitive control visibility handled by JS adding body[data-view] scoping */
body[data-view="list"] #spinBtn,
body[data-view="list"] #glowBtn,
body[data-view="list"] .mode-toggle,
body[data-view="list"] #spinTally{display:none;}
body[data-view="wheel"] #listLayoutBtn{display:none;}
</style>

<style id="rev3">
/* contact links pinned bottom-middle at all times */
.contact-bar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:70;
  margin:0;border-top:none;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;
  background:var(--panel);box-shadow:0 -2px 10px rgba(0,0,0,.08);padding:.45rem 1.1rem;max-width:96vw;white-space:nowrap;overflow-x:auto;}
.contact-bar .lead{display:inline;margin:0 .6rem 0 0;font-style:italic;color:var(--muted);font-size:.82rem;}
.contact-bar a{margin:0 .5rem;}
/* keep docked wheel + panel clear of the pinned contact bar */
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{bottom:0px;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{max-height:calc(100vh - 196px);}
.layout{padding-bottom:64px;}
/* topbar: lighter controls, larger focus button */
.topbar button{color:var(--muted);opacity:.72;border-color:var(--line);transition:opacity .15s,color .15s;}
.topbar button:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
#fsBtn{font-size:1.35rem !important;padding:.28rem .6rem !important;line-height:1;}
</style>

<style id="rev4">
/* hide old h1/title space; logo carries the name */
#h1title{display:none !important;}
.byline{text-align:center;font-size:.74rem;color:var(--muted);padding:.2rem 1rem .4rem;margin-top:2px;}
/* clear fixed top cluster */
body{padding-top:0px;}
/* ===== unified fixed top-right control cluster ===== */
.topctl{position:fixed;top:0;right:0;z-index:200;display:flex;flex-wrap:wrap;justify-content:flex-end;align-items:center;
  gap:.4rem;padding:.5rem .7rem;background:transparent;max-width:100vw;}
.topctl button{font-family:inherit;font-size:.8rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:.3rem .6rem;cursor:pointer;color:var(--text);}
.topctl .view-toggle button{border:none;border-radius:0;}
.topctl #langBtn,.topctl #themeBtn{color:var(--muted);opacity:.72;}
.topctl #langBtn:hover,.topctl #themeBtn:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
.topctl-div{width:1px;height:22px;background:var(--line);margin:0 .15rem;}
.size-ctl{display:flex;align-items:center;gap:.25rem;}
#zoomSlider{width:120px;}
/* Wheel Format dropdown */
.wf-wrap{position:relative;}
#wfMenu{position:absolute;top:calc(100% + 4px);right:0;background:var(--panel);border:1px solid var(--gold);border-radius:8px;
  box-shadow:var(--shadow);display:none;flex-direction:column;min-width:150px;overflow:hidden;z-index:210;}
#wfMenu.open{display:flex;}
#wfMenu button{border:none;border-radius:0;text-align:left;padding:.55rem .8rem;background:var(--panel);}
#wfMenu button:hover,#wfMenu button.on{background:var(--badge-bg);color:var(--accent);}
#wheelFormat.on{border-color:var(--gold);color:var(--accent);}
/* focus button (injected) sizing already handled; ensure it lands in cluster */
.topctl #fsBtn{font-size:1.3rem !important;padding:.2rem .55rem !important;line-height:1;}
/* ===== spins counter — top-right background ===== */
#spinsBg{position:fixed;top:3.2rem;right:1rem;z-index:0;pointer-events:none;font-family:var(--display);font-weight:bold;
  font-size:clamp(1.6rem,4.4vw,3.4rem);line-height:1;text-align:right;letter-spacing:.02em;opacity:0;transition:opacity .25s;}
#spinsBg.show{opacity:1;}
[data-theme="dark"] #spinsBg{color:#efe6d4;opacity:.13;}
[data-theme="light"] #spinsBg{color:#3a2f20;opacity:.11;}
[data-theme="dark"] #spinsBg.show{opacity:.16;}
[data-theme="light"] #spinsBg.show{opacity:.13;}
#spinsBg .sc-num{font-size:1.5em;}
[data-theme="dark"] #spinsBg.flash{opacity:.3 !important;}
[data-theme="light"] #spinsBg.flash{opacity:.26 !important;}
#spinsBg.flash{transition:opacity .12s;}
#spinsBg .sc-lab{display:block;font-size:.4em;letter-spacing:.18em;text-transform:uppercase;opacity:.8;}
/* ===== read-point magnifier +50% ===== */
#readPoint{font-size:1.5rem;padding:.45rem 1rem;border-width:2px;max-width:34vw;}
#readPoint::before{font-size:.8em;}
/* show read-point in FREE mode too (default right side) */
body[data-view="wheel"][data-mode="detached"] #readPoint{display:block;}
/* ===== tasting-notes card: larger by default + resizable when floating ===== */
.detail-panel{max-width:440px;min-width:320px;}
.body-text{font-size:1.14rem;line-height:1.66;}
.detail-panel h2{font-size:1.78rem;}
.funfact{font-size:1.1rem;}
.detail-panel.floating{resize:both;overflow:auto;width:min(440px,94vw);min-width:300px;min-height:280px;max-height:90vh;}
.detail-panel.floating::after{content:"\21F2";position:absolute;right:4px;bottom:2px;color:var(--muted);font-size:.85rem;pointer-events:none;}
/* docked panels start below the fixed cluster */
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{top:6px;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{top:118px;}
@media(max-width:820px){ body{padding-top:96px;} }
</style>

<style id="rev5">
/* bgEcho: wrap + length-based sizing so any message fits */
#bgEcho{white-space:normal;max-width:46vw;line-height:1.05;}
#bgEcho.len-s{font-size:clamp(2.2rem,6.5vw,5.4rem);}      /* <=12 chars: big */
#bgEcho.len-m{font-size:clamp(1.5rem,4.2vw,3.3rem);}      /* 13-24 */
#bgEcho.len-l{font-size:clamp(1.05rem,2.8vw,2.1rem);}     /* 25-40 */
#bgEcho.len-xl{font-size:clamp(.85rem,2.1vw,1.5rem);}     /* >40 */
/* spins counter: always visible + proportionate (never huge, never clipped) */
#spinsBg{font-size:clamp(1.3rem,3vw,2.4rem);max-width:30vw;overflow:visible;}
[data-theme="dark"] #spinsBg{opacity:.26;}
[data-theme="light"] #spinsBg{opacity:.22;}
[data-theme="dark"] #spinsBg.show{opacity:.28;}
[data-theme="light"] #spinsBg.show{opacity:.24;}
#spinsBg .sc-num{font-size:1.35em;}
#spinsBg .sc-line{display:block;}
#spinsBg .sc-lab{display:block;font-size:.34em;letter-spacing:.16em;text-transform:uppercase;opacity:.85;margin-top:.1em;}
/* doubled-size controls: Reset, Language, Theme, Focus */
.topctl #zoomReset,.topctl #langBtn,.topctl #themeBtn,.topctl #fsBtn{
  font-size:1.5rem !important;padding:.5rem .85rem !important;line-height:1;border-radius:8px;}
.topctl #fsBtn{font-size:1.7rem !important;}
/* wheel-format menu separator */
.wf-sep{height:1px;background:var(--line);margin:.25rem 0;}
#freeSideBtn{font-size:.82rem;color:var(--accent);}
</style>
<style id="hubStyle">
/* ── LearnSomm glowing hub v3 ── */
#hubCenter{ z-index:6; overflow:visible; }
#hubLogo{ display:none !important; }
#lsHubDisc{
  position:absolute; left:50%; top:50%; width:182%; height:182%;
  transform:translate(-50%,-50%); border-radius:50%;
  background:radial-gradient(circle at 50% 42%, #241d14 0%, #16110b 70%, #0e0a06 100%);
  box-shadow:0 4px 22px rgba(0,0,0,.45), inset 0 0 26px rgba(0,0,0,.5);
  z-index:1; display:flex; align-items:center; justify-content:center;
}
#lsHubDisc::after{ content:""; position:absolute; inset:0; border-radius:50%;
  border:2px solid rgba(184,154,69,.85); box-shadow:inset 0 0 12px rgba(184,154,69,.22); pointer-events:none; }
#lsHubMark{ width:62%; height:auto; z-index:2; position:relative;
  filter:drop-shadow(0 0 7px rgba(255,240,200,.55)) drop-shadow(0 0 2px rgba(255,245,220,.8));
  pointer-events:none; user-select:none; }
#lsHubGlow{
  position:absolute; left:50%; top:50%; width:212%; height:212%;
  transform:translate(-50%,-50%); border-radius:50%; z-index:0; opacity:0;
  background:conic-gradient(from 0deg, var(--g1,#b89a45),var(--g2,#d4b276),var(--g3,#b89a45),
    var(--g4,#d4b276),var(--g5,#b89a45),var(--g6,#d4b276),var(--g1,#b89a45));
  filter:blur(14px) saturate(1.25); transition:opacity .6s ease; pointer-events:none;
}
#lsHubGlow2{  /* second layer for shimmer/breathe/aurora */
  position:absolute; left:50%; top:50%; width:230%; height:230%;
  transform:translate(-50%,-50%); border-radius:50%; z-index:0; opacity:0;
  background:radial-gradient(circle, var(--g3,#d4b276) 0%, transparent 68%);
  filter:blur(20px); transition:opacity .6s ease; pointer-events:none;
}
#svgContainer.hub-on #lsHubGlow{ opacity:.9; }
#svgContainer.hub-spin #lsHubGlow{ animation:lsHubSpin 7s linear infinite; }
#svgContainer.hub-spin-fast #lsHubGlow{ animation:lsHubSpin 2.6s linear infinite; }
#svgContainer.hub-wave #lsHubGlow{ animation:lsHubWave 4.5s ease-in-out infinite; }
#svgContainer.hub-pulse #lsHubGlow{ animation:lsHubPulse 2.8s ease-in-out infinite; }
#svgContainer.hub-breathe #lsHubGlow{ animation:lsHubBreathe 5s ease-in-out infinite; }
#svgContainer.hub-flicker #lsHubGlow{ animation:lsHubFlicker 3.4s steps(1) infinite; }
#svgContainer.hub-radiate #lsHubGlow{ background:radial-gradient(circle, var(--g1,#ffd76a) 0%, rgba(255,215,106,0) 70%); animation:lsHubRadiate 3.2s ease-in-out infinite; }
#svgContainer.hub-aurora #lsHubGlow{ animation:lsHubSpin 11s linear infinite; }
#svgContainer.hub-aurora #lsHubGlow2{ opacity:.7; animation:lsHubBreathe 6s ease-in-out infinite; }
#svgContainer.hub-halo #lsHubGlow2{ opacity:.85; }
#svgContainer.hub-halo #lsHubGlow{ opacity:.4; }
@keyframes lsHubSpin{ to{ transform:translate(-50%,-50%) rotate(360deg);} }
@keyframes lsHubWave{ 0%{transform:translate(-50%,-50%) rotate(0) scale(1);}50%{transform:translate(-50%,-50%) rotate(18deg) scale(1.06);}100%{transform:translate(-50%,-50%) rotate(0) scale(1);} }
@keyframes lsHubPulse{ 0%,100%{opacity:.45;filter:blur(14px) saturate(1.1);}50%{opacity:1;filter:blur(18px) saturate(1.5);} }
@keyframes lsHubBreathe{ 0%,100%{opacity:.4;width:200%;height:200%;}50%{opacity:.92;width:236%;height:236%;} }
@keyframes lsHubFlicker{ 0%,100%{opacity:.9;}8%{opacity:.4;}12%{opacity:.95;}40%{opacity:.85;}44%{opacity:.5;}48%{opacity:.95;} }
@keyframes lsHubRadiate{ 0%,100%{opacity:.5;width:200%;height:200%;}50%{opacity:.95;width:230%;height:230%;} }
@media (prefers-reduced-motion:reduce){ #lsHubGlow,#lsHubGlow2{ animation:none !important; } }

/* glowing cursive wheel name under the logo */
#lsHubName{ position:absolute; left:50%; top:108%; transform:translateX(-50%);

  font-size:clamp(1rem,1.1em,1.7rem); white-space:nowrap; pointer-events:none; z-index:3;
  color:#f0e2c8; text-align:center; letter-spacing:.01em;

#svgContainer.hub-on #lsHubName{ animation:lsNameGlow 4.5s ease-in-out infinite; }
@keyframes lsNameGlow{ 0%,100%{text-shadow:0 0 6px rgba(255,238,200,.5),0 0 12px rgba(212,178,118,.4),0 1px 2px rgba(0,0,0,.6);}
  50%{text-shadow:0 0 12px rgba(255,238,200,.9),0 0 22px rgba(212,178,118,.7),0 1px 2px rgba(0,0,0,.6);} }
@media (prefers-reduced-motion:reduce){ #lsHubName{animation:none!important;} }
</style>

/* geometry */
function polarToCart(r,a){return[r*Math.cos(a),r*Math.sin(a)];}
function arcRing(r1,r2,a1,a2){const[sx1,sy1]=polarToCart(r1,a1),[ex1,ey1]=polarToCart(r1,a2),[sx2,sy2]=polarToCart(r2,a1),[ex2,ey2]=polarToCart(r2,a2);const lg=a2-a1>Math.PI?1:0;return `M ${sx1} ${sy1} A ${r1} ${r1} 0 ${lg} 1 ${ex1} ${ey1} L ${ex2} ${ey2} A ${r2} ${r2} 0 ${lg} 0 ${sx2} ${sy2} Z`;}
function arcLabelPath(r,a1,a2,rev){const lg=Math.abs(a2-a1)>Math.PI?1:0;if(rev){const[sx,sy]=polarToCart(r,a2),[ex,ey]=polarToCart(r,a1);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 0 ${ex} ${ey}`;}const[sx,sy]=polarToCart(r,a1),[ex,ey]=polarToCart(r,a2);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 1 ${ex} ${ey}`;}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function textOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)>150?'#1c2118':'#f3f3ee';}
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

const REGISTRY={};
const R_IN=62,R_CAT=140,R_SUB=210,R_OUT=300;
let defsEl,gEl;
function buildWheel(){
  /* idempotent rebuild: wipe prior wheel state so a swapped payload leaves no ghosts */
  try{ for(var __rk in REGISTRY){ if(REGISTRY.hasOwnProperty(__rk)) delete REGISTRY[__rk]; } }catch(e){}
  try{ if(typeof svg!=='undefined'&&svg){ svg.querySelectorAll('g#wheelG').forEach(function(n){n.remove();}); svg.querySelectorAll('defs').forEach(function(n){n.remove();}); } }catch(e){}
  try{ labelEls=[]; }catch(e){}
  try{ descLabels=[]; }catch(e){}
  const total=DATA.categories.reduce((n,c)=>n+c.sub.reduce((m,s)=>m+s.descriptors.length,0),0);
  const perItem=TWO_PI/total;
  defsEl=el('defs',{});svg.appendChild(defsEl);
  gEl=el('g',{id:'wheelG'});
  let a=-Math.PI/2,gradN=0;
  DATA.categories.forEach((cat,ci)=>{
    const catItems=cat.sub.reduce((m,s)=>m+s.descriptors.length,0);
    const catSpan=catItems*perItem,catStart=a,catEnd=a+catSpan,catMid=catStart+catSpan/2;
    gEl.appendChild(el('path',{d:arcRing(R_IN,R_CAT,catStart,catEnd),fill:(cat.baked&&cat.baked.facetRing)||cat.color,'class':'cell'}));
    cat._mid=catMid;cat._span=catSpan;
    cat.sub.forEach(sub=>{
      const subSpan=sub.descriptors.length*perItem,subStart=a,subEnd=a+subSpan,subMid=subStart+subSpan/2;
      var _subEl=el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:((sub.baked&&sub.baked.subRing)||(sub._implicit?lighten(cat.color,8):sub.color)),'class':'cell sub-cell'});
      gEl.appendChild(_subEl);
      (function(se,nm){ try{
        se.addEventListener('mouseenter',function(){ try{ var t=(typeof tx==='function'?tx(sub,'name'):(sub.name||nm)); if(typeof echoMsg==='function')echoMsg(t); else { var be=document.getElementById('bgEcho'); if(be){be.textContent=t; if(typeof sizeEcho==='function')sizeEcho(t); be.classList.add('show');} } }catch(e){} });
        se.addEventListener('mouseleave',function(){ try{ var be=document.getElementById('bgEcho'); if(be)be.classList.remove('show'); }catch(e){} });
      }catch(e){} })(_subEl, tx(sub,'name'));
      sub._mid=subMid;sub._span=subSpan;sub._cat=cat;
      sub.descriptors.forEach(desc=>{
        const s1=a,s2=a+perItem,m=a+perItem/2;
        const gid='pg'+(gradN++);
        const grad=el('radialGradient',{id:gid,gradientUnits:'userSpaceOnUse',cx:'0',cy:'0',r:R_OUT});
        grad.appendChild(el('stop',{offset:'55%','stop-color':lighten(sub.color,20)}));
        grad.appendChild(el('stop',{offset:'100%','stop-color':lighten(sub.color,44)}));
        defsEl.appendChild(grad);
        const p=el('path',{d:arcRing(R_SUB,R_OUT,s1,s2),fill:`url(#${gid})`,'class':'cell desc-seg','data-slug':desc.slug});
        p.addEventListener('click',()=>selectItem(desc.slug));
        gEl.appendChild(p);
        REGISTRY[desc.slug]={desc,sub,cat,segEl:p,chipEl:null,_mid:m,_fill:((desc.baked&&desc.baked.wedge)||lighten(sub.color,30))};
        a+=perItem;
      });
    });
  });
  gEl.appendChild(el('circle',{cx:0,cy:0,r:(R_IN*0.67),'class':'hub'}));
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_OUT+4,'class':'rim'}));
  const ys=['1','15'],fs=['16.5','8'];
  HUB.forEach((txt,i)=>{const a={'text-anchor':'middle',y:ys[i],'font-size':fs[i],'class':'hub-text','font-family':"var(--hub-font,'Brush Script MT','Snell Roundhand','Segoe Script',cursive)",'letter-spacing':'.3'};const tt=el('text',a);tt.textContent=txt;tt.style.pointerEvents='none';gEl.appendChild(tt);});
  svg.appendChild(gEl);
  renderLabels();
}

let labelEls=[];let descLabels=[];var READ_SIDE='right';
function renderLabels(){
  labelEls.forEach(e=>e.remove());labelEls=[];descLabels=[];
  DATA.categories.forEach((cat,ci)=>{
    const name=tx(cat,'name').toUpperCase();
    // skip the inner (center-most) ring label when it merely duplicates the single sub-ring label
    const _redInner=(cat.sub.length===1 && tx(cat.sub[0],'name').toUpperCase()===name);
    const labR=(R_IN+R_CAT)/2,arcLen=cat._span*labR,estW=name.length*5.0;
    if(!_redInner && arcLen>estW+8){
      const flip=Math.sin(cat._mid)>0,pid='catArc'+ci;
      const existing=defsEl.querySelector('#'+pid);if(existing)existing.remove();
      defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?labR-2:labR+2,cat._mid-cat._span/2,cat._mid+cat._span/2,flip)}));
      const tt=el('text',{'font-size':'7','letter-spacing':'1','font-family':"var(--display)",'font-weight':'bold',fill:cat.textColor||'#fff','dominant-baseline':'middle'});
      const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=name;
      tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }else if(!_redInner){
      let deg=cat._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
      const[lx,ly]=polarToCart(labR,cat._mid);
      const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'5','letter-spacing':'.3',fill:cat.textColor||'#fff','font-family':"var(--display)",'font-weight':'bold',transform:`rotate(${deg},${lx},${ly})`});
      const w=name.split(' ');
      if(w.length>1){const t1=el('tspan',{x:lx,dy:'-2.6'});t1.textContent=w[0];const t2=el('tspan',{x:lx,dy:'5.2'});t2.textContent=w.slice(1).join(' ');tt.appendChild(t1);tt.appendChild(t2);}else tt.textContent=name;
      tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }
    cat.sub.forEach((sub,si)=>{
      if(!sub._implicit){
        const subName=tx(sub,'name').toUpperCase(),subLabR=(R_CAT+R_SUB)/2,subArc=sub._span*subLabR;
        if(subArc>subName.length*4+6){
          const flip=Math.sin(sub._mid)>0,pid='subArc'+ci+'_'+si;
          const ex=defsEl.querySelector('#'+pid);if(ex)ex.remove();
          defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?subLabR-1.5:subLabR+1.5,sub._mid-sub._span/2,sub._mid+sub._span/2,flip)}));
          const tt=el('text',{'font-size':'6.3','font-family':"var(--display)",fill:textOn(sub.color),'dominant-baseline':'middle'});
          const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=subName;
          tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }else{
          let deg=sub._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
          const[lx,ly]=polarToCart(subLabR,sub._mid);
          const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'4.2',fill:textOn(sub.color),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
          tt.textContent=subName;tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }
      }
      sub.descriptors.forEach(desc=>{
        const reg=REGISTRY[desc.slug];const m=reg._mid;
        const theta=m*180/Math.PI;                 // raw radial angle (0=3 o'clock)
        const deg=(READ_SIDE==='left')?theta+180:theta;  // flip whole wheel for left-read; reading side stays upright
        const[lx,ly]=polarToCart((R_SUB+R_OUT)/2,m);
        const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'6','letter-spacing':'.2',fill:textOn(reg._fill),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
        const nm=tx(desc,'name').toUpperCase();
        const availR=(R_OUT-R_SUB)-12;
        const fitFs=Math.max(3.4,Math.min(6,availR/(nm.length*0.56)));
        tt.setAttribute('font-size',fitFs.toFixed(2));
        tt.textContent=nm;
        tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        descLabels.push({el:tt,lx:lx,ly:ly,theta:theta});
      });
    });
  });
}

/* wiki */
function wikiUrl(slug,name){const t=WIKI_TITLES[name]||WIKI_TITLES[slug]||(name.charAt(0).toUpperCase()+name.slice(1).toLowerCase());const host=lang+'.wikipedia.org';return 'https://'+host+'/wiki/'+encodeURIComponent(t.replace(/ /g,'_'));}
/* Wikimedia Commons image search for the term — free-licensed media, always resolves. */
function commonsUrl(slug,name){var t=WIKI_TITLES[name]||WIKI_TITLES[slug]||name;return 'https://commons.wikimedia.org/w/index.php?search='+encodeURIComponent(t)+'&title=Special:MediaSearch&type=image';}
function headingHtml(slug,name){return `<h2><a href="${wikiUrl(slug,name)}" target="_blank" rel="noopener noreferrer">${name}<span class="wiki-mark">↗</span></a><a class="img-mark" href="${commonsUrl(slug,name)}" target="_blank" rel="noopener noreferrer" title="See images on Wikimedia Commons" aria-label="See images of ${name} on Wikimedia Commons">📷</a></h2>`;}


function funFactFor(slug){
  const reg=REGISTRY[slug]; if(!reg) return null;
  const tryKeys=[reg.cat&&reg.cat.name, reg.sub&&reg.sub.name];
  for(const k of tryKeys){ if(k&&FUN_FACTS[k]) return FUN_FACTS[k]; }
  return null;
}

function showDetail(slug){
  currentSlug=slug;
  const d=DESCRIPTIONS[slug],reg=REGISTRY[slug];
  const name=reg?tx(reg.desc,'name'):slug;
  if(!d){detail.innerHTML=`${headingHtml(slug,name)}<div class="category-tag"></div><div class="body-text">${t('inProgress').replace('{n}',name)}</div>`;return;}
  const tag=tx(d,'cat');
  let html=headingHtml(slug,name)+`<div class="category-tag">${tag}</div>`;
  const ff=funFactFor(slug);
  if(ff){const fft=(ff[lang])?ff[lang]:ff.en;html+=`<div class="funfact"><span class="ff-label">${lang==='es'?'Dato':'Fun Fact'}</span>${fft}</div>`;}
  const sec=(key,field)=>{const v=tx(d,field);if(v)html+=`<div class="section-title">${t(key)}</div><div class="body-text">${v}</div>`;};
  /* 2-tier model: tier gates which descriptors appear on the wheel, NOT which panel
     sections show. Every node renders all the content it has; empty fields self-hide. */
  sec('origin','origin');
  sec('chemistry','chemistry');
  sec('pairing','pairing');
  sec('mixology','mixology');
  sec('examples','examples');
  const fl=tx(d,'flag');if(fl)html+=`<div class="flag-note">${fl}</div>`;

  detail.innerHTML=html;
}


/* ---- LS double-click snap + double-right-click pronounce ---- */
function snapSlugToPoint(slug){
  var reg=REGISTRY[slug]; if(!reg) return;
  if(typeof spinning!=='undefined' && spinning) return;
  var twoPi=2*Math.PI, end=readAngle()-reg._mid;
  while(end-rotation> Math.PI) end-=twoPi;
  while(end-rotation<-Math.PI) end+=twoPi;
  var start=rotation, dur=600, t0=Date.now();
  if(typeof spinning!=='undefined') spinning=true;
  function ease(p){return 1-Math.pow(1-p,3);}
  function step(){var p=Math.min(1,(Date.now()-t0)/dur); rotation=start+(end-start)*ease(p); applyRotation();
    if(p<1){requestAnimationFrame(step);} else {rotation=end; applyRotation(); if(typeof spinning!=='undefined') spinning=false; selectItem(slug);}}
  step();
}
// ---- pronunciation audio: recorded file first, smart browser-TTS fallback ----
var __lsVoices=[];
function __lsLoadVoices(){ try{ __lsVoices=window.speechSynthesis.getVoices()||[]; }catch(e){ __lsVoices=[]; } }
if(window.speechSynthesis){
  __lsLoadVoices();
  // voices often load async; refresh when the browser signals they're ready
  try{ window.speechSynthesis.onvoiceschanged=__lsLoadVoices; }catch(e){}
}
// Map our short lang codes / wheel audioLang to BCP-47 prefixes for voice matching.
var __LS_LANG_BCP={ en:'en', es:'es', fr:'fr', it:'it', de:'de', pt:'pt' };
// Pick the best installed voice for a language: prefer local, "natural/premium/enhanced"
// named voices, then any voice whose lang matches; fall back to default.
function __lsPickVoice(langCode){
  if(!__lsVoices.length) __lsLoadVoices();
  var want=(__LS_LANG_BCP[langCode]||langCode||'en').toLowerCase();
  var byLang=__lsVoices.filter(function(v){return (v.lang||'').toLowerCase().indexOf(want)===0;});
  if(!byLang.length) byLang=__lsVoices.filter(function(v){return (v.lang||'').toLowerCase().indexOf(want.slice(0,2))===0;});
  if(!byLang.length) return null;
  // rank: prefer higher-quality named voices and local service
  function score(v){
    var n=(v.name||'').toLowerCase(), s=0;
    if(/natural|neural|premium|enhanced|siri|google|wavenet/.test(n)) s+=3;
    if(v.localService) s+=1;

function lsSpeak(slug){

    //    load/play, fall through to TTS so the button never goes silent.
    if(reg.desc && reg.desc.audio){
      try{
        var a=new Audio(reg.desc.audio);
        a.addEventListener('error',function(){ __lsTTS(nm,reg); });   // 404/decode error -> TTS

<div id="dgSheet">
  <div id="dgSheetBar">
    <span class="t">📑 <span id="dgSheetTitle">Cheat Sheet</span>
      <small id="dgSheetHint">drag · click an aroma</small></span>
    <span id="dgSheetOpacity">
      <span>opacity</span>
      <input type="range" id="dgSheetOpacitySlider" min="20" max="100" value="96" step="1">
    </span>
    <button id="dgSheetClose">Close ✕</button>
  </div>
  <iframe id="dgSheetFrame" title="Cheat Sheet"></iframe>

<script>


(function(){
  var $=function(id){return document.getElementById(id);};
  var ES=function(){var b=$('langBtn');return (document.documentElement.getAttribute('lang')==='es')||(b&&b.textContent.trim().toUpperCase()==='EN');};

  // ── Dark mode persistence ────────────────────────────────────────
  (function(){
    var KEY='ls_theme';
    try{var saved=localStorage.getItem(KEY);
      if(saved){document.documentElement.setAttribute('data-theme',saved);
        var tb=$('themeBtn');if(tb)tb.textContent=saved==='dark'?'☾':'☀';}}catch(e){}
    var tb=$('themeBtn');
    if(tb)tb.addEventListener('click',function(){
      setTimeout(function(){try{localStorage.setItem(KEY,document.documentElement.getAttribute('data-theme')||'dark');}catch(e){}},50);
    });
  })();

  // ── Dropdown menus ───────────────────────────────────────────────
  var dropdowns=document.querySelectorAll('.ls-drop');
  document.addEventListener('click',function(e){
    dropdowns.forEach(function(d){
      var btn=d.querySelector('.ls-drop-btn');
      var menu=d.querySelector('.ls-menu');
      if(!menu)return;
      if(d.contains(e.target)){
        var isOpen=menu.classList.contains('open');
        document.querySelectorAll('.ls-menu').forEach(function(m){m.classList.remove('open');m.previousElementSibling&&m.previousElementSibling.classList.remove('open');});
        if(!isOpen){menu.classList.add('open');btn&&btn.classList.add('open');}
      }else{menu.classList.remove('open');btn&&btn.classList.remove('open');}
    });
  });

  // ── Random F&B ───────────────────────────────────────────────────
  var ALL_WHEELS=[];
  var randBtn=$('lsRandFnb');
  if(randBtn)randBtn.style.display='none';
  if(randBtn)randBtn.addEventListener('click',function(){
    var cur=window.location.pathname.split('/').pop()||'wine-live.html';
    var opts=ALL_WHEELS.filter(function(w){return w!==cur;});
    try{sessionStorage.setItem('ls_auto_spin','1');}catch(e){}
    if(!opts.length){return;}window.location.href=opts[Math.floor(Math.random()*opts.length)];
  });
  try{if(sessionStorage.getItem('ls_auto_spin')==='1'){
    sessionStorage.removeItem('ls_auto_spin');
    window.addEventListener('load',function(){setTimeout(function(){
      var slugs=window.REGISTRY?Object.keys(window.REGISTRY):[];
      if(!slugs.length){var sb=$('spinBtn');if(sb)sb.click();return;}
      var pick=slugs[Math.floor(Math.random()*slugs.length)];
      if(window.spinToSlug){window.spinToSlug(pick);
        setTimeout(function(){
          var np=$('npPanel');if(np&&!np.classList.contains('on')){var o=$('npOpen');if(o)o.click();}
          try{var c=$('npCapBtn');if(c&&!c.classList.contains('on'))c.click();}catch(e){}
        },1400);}
    },600);});
  }}catch(e){}

  // ── Mic ──────────────────────────────────────────────────────────
  var micBtn=$('npMic');
  if(micBtn&&('SpeechRecognition' in window||'webkitSpeechRecognition' in window)){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    var rec=new SR();rec.continuous=true;rec.interimResults=true;var active=false;
    rec.addEventListener('result',function(e){
      var fin='';for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;}
      if(fin){var ta=$('npRawText');if(ta)ta.value=(ta.value?ta.value.replace(/\s*$/,'')+', ':'')+fin.trim();}
    });
    micBtn.addEventListener('click',function(){
      if(!active){rec.start();active=true;micBtn.textContent='🔴 Stop';micBtn.classList.add('on');}
      else{rec.stop();active=false;micBtn.textContent='🎤 Mic';micBtn.classList.remove('on');}
    });
  }else if(micBtn){micBtn.style.display='none';}

  })();


</script>
<script>

(function(){
  var SUBJ='wheel', SHEET='';

  var $=function(id){return document.getElementById(id);};
  var ES=function(){var b=$('langBtn');return (document.documentElement.getAttribute('lang')==='es')||(b&&b.textContent.trim().toUpperCase()==='EN');};

  // ── Cheat sheet modal ─────────────────────────────────────────────
  var sheetFrame=$('dgSheetFrame');
  function positionSheet(){
    var win=$('dgSheet');win.style.top='76px';
    var mode=document.body.getAttribute('data-mode')||'free';
    if(mode==='dock-right'){win.style.left='24px';win.style.right='auto';}
    else{win.style.right='24px';win.style.left='auto';}
  }
  var sheetBtn=$('dgSheetBtn');
  if(sheetBtn)sheetBtn.addEventListener('click',function(){
    if(!sheetFrame.src)sheetFrame.src=SHEET;positionSheet();$('dgSheet').classList.add('on');});
  var sheetClose=$('dgSheetClose');
  if(sheetClose)sheetClose.addEventListener('click',function(){$('dgSheet').classList.remove('on');});
  function sendNames(){var msg={type:'LS_WHEEL_NAMES',names:window.WHEEL_NAMES||{}};try{sheetFrame.contentWindow.postMessage(msg,'*');}catch(e){}try{if(window.parent&&window.parent!==window)window.parent.postMessage(msg,'*');}catch(e){}}
  sheetFrame.addEventListener('load',function(){setTimeout(sendNames,150);});
  window.addEventListener('message',function(e){var d=e.data;if(!d)return;
    if(d.type==='LS_SHEET_READY')sendNames();
    if(d.type==='LS_SPIN_TO'&&window.spinToSlug)window.spinToSlug(d.slug);
    var _th=(d.type==='LS_THEME'||d.ls==='theme')?d.theme:null;
    if(d.type==='LS_HINT'){ try{ if(d.text){ if(typeof echoMsg==='function')echoMsg(d.text);} else { if(typeof echoClear==='function')echoClear(); } }catch(_e){} }
    if(_th){ try{ if(typeof setTheme==='function') setTheme(_th); else document.documentElement.setAttribute('data-theme',_th); }catch(_e){ document.documentElement.setAttribute('data-theme',_th); } }});

  // Drag sheet by bar
  (function(){
    var bar=$('dgSheetBar'),win=$('dgSheet'),drag=false,sx,sy,ox,oy;
    function down(e){drag=true;bar.classList.add('drag');var p=e.touches?e.touches[0]:e;
      sx=p.clientX;sy=p.clientY;var r=win.getBoundingClientRect();ox=r.left;oy=r.top;
      win.style.right='auto';win.style.left=ox+'px';win.style.top=oy+'px';e.preventDefault();}
    function move(e){if(!drag)return;var p=e.touches?e.touches[0]:e;
      var nx=Math.max(4,Math.min(window.innerWidth-80,ox+(p.clientX-sx)));
      var ny=Math.max(4,Math.min(window.innerHeight-40,oy+(p.clientY-sy)));
      win.style.left=nx+'px';win.style.top=ny+'px';}
    function up(){drag=false;bar.classList.remove('drag');}
    bar.addEventListener('mousedown',down);document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    bar.addEventListener('touchstart',down,{passive:false});document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
  })();

  // Sheet opacity slider
  var sheetOp=$('dgSheetOpacitySlider');
  var sheetEl=$('dgSheet');
  if(sheetOp&&sheetEl){
    var savedSheetOp;try{savedSheetOp=localStorage.getItem('ls_sheet_opacity');}catch(e){}
    if(savedSheetOp){sheetOp.value=savedSheetOp;sheetEl.style.opacity=(savedSheetOp/100);}
    sheetOp.addEventListener('input',function(){
      sheetEl.style.opacity=(sheetOp.value/100);
      try{localStorage.setItem('ls_sheet_opacity',sheetOp.value);}catch(e){};
    });
  }

  // ── Notepad ───────────────────────────────────────────────────────
  var GFIELDS=[['appearance','Appearance','Aspecto'],['aroma','Aroma','Aroma'],['flavor','Flavor','Sabor'],['finish','Finish','Final'],['verdict','Verdict','Veredicto']];
  var KEY=SUBJ+'Notes',state={mode:'raw',raw:'',guided:{},rating:0},capture=false;
  try{var saved=JSON.parse(localStorage.getItem(KEY));if(saved)state=Object.assign(state,saved);}catch(e){}

  function persist(){
    try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}
    var s=$('npSaved');if(s){s.textContent=ES()?'Guardado ✓':'Saved ✓';clearTimeout(persist._t);persist._t=setTimeout(function(){s.textContent='';},1200);}
  }
  function buildGuided(){
    var es=ES(),h='';
    GFIELDS.forEach(function(f){
      h+='<div class="np-field" data-f="'+f[0]+'"><label>'+(es?f[2]:f[1])+'</label><textarea data-f="'+f[0]+'">'+(state.guided[f[0]]||'').replace(/</g,'&lt;')+'</textarea></div>';
    });
    h+='<div class="np-field"><label>'+(es?'Puntuación':'Rating')+'</label><div id="npStars">'+[1,2,3,4,5].map(function(n){return '<b data-n="'+n+'">★</b>';}).join('')+'</div></div>';
    $('npGuided').innerHTML=h;
    var sel=$('npCapTarget');
    sel.innerHTML=GFIELDS.map(function(f){return '<option value="'+f[0]+'">'+(es?f[2]:f[1])+'</option>';}).join('');
    sel.value=GFIELDS[1][0];
    $('npGuided').querySelectorAll('textarea').forEach(function(ta){
      ta.addEventListener('input',function(){state.guided[ta.getAttribute('data-f')]=ta.value;persist();});
      ta.addEventListener('focus',function(){
        $('npGuided').querySelectorAll('.np-field').forEach(function(x){x.classList.remove('active');});
        ta.closest('.np-field').classList.add('active');var _ct=$('npCapTarget');if(_ct)_ct.value=ta.getAttribute('data-f');
      });
    });
    paintStars();
    $('npStars').querySelectorAll('b').forEach(function(b){
      b.addEventListener('click',function(){state.rating=parseInt(b.getAttribute('data-n'),10);paintStars();persist();});
    });
  }
  function paintStars(){var st=$('npStars');if(!st)return;st.querySelectorAll('b').forEach(function(b){b.classList.toggle('on',parseInt(b.getAttribute('data-n'),10)<=state.rating);});}
  function setMode(m){
    var grid=(m==='grid');if(!grid)state.mode=m;
    $('npModeRaw').classList.toggle('cur',m==='raw');
    $('npModeGuided').classList.toggle('cur',m==='guided');
    $('npModeGrid').classList.toggle('cur',grid);
    $('npRaw').style.display=m==='raw'?'':'none';
    $('npGuided').style.display=m==='guided'?'':'none';
    $('npGrid').style.display=grid?'':'none';
    var cap=document.querySelector('.np-cap');if(cap)cap.style.display=grid?'none':'';
    var foot=$('npFoot');if(foot)foot.style.display=grid?'none':'flex';
    if(!grid)persist();
  }
  var _nr=$('npRawText');if(!_nr)return;_nr.value=state.raw||'';
  $('npRawText').addEventListener('input',function(){state.raw=$('npRawText').value;persist();});

  function buildGrid(){var es=ES();
    $('npGrid').innerHTML='<div class="ng-lede">'+(es?'Pon a prueba tu cata a ciegas: completa una cuadrícula deductiva estilo CMS.':'Test your blind tasting: run a full CMS-style deductive grid — Sight, Nose, Palate, Initial & Final Conclusion — and get a structured check on your call.')+'</div>'+
    '<div class="ng-preview"><div class="ng-faux">'+
    '<div class="ng-row"><b>'+(es?'Vista':'Sight')+'</b><span>'+(es?'claridad · color · ribete':'clarity · color · rim')+'</span></div>'+
    '<div class="ng-row"><b>'+(es?'Nariz':'Nose')+'</b><span>'+(es?'fruta · no-fruta · roble':'fruit · non-fruit · oak')+'</span></div>'+
    '<div class="ng-row"><b>'+(es?'Boca':'Palate')+'</b><span>'+(es?'dulzor · acidez · taninos':'sweetness · acid · tannin')+'</span></div>'+
    '<div class="ng-row"><b>'+(es?'Inicial':'Initial')+'</b><span>'+(es?'Viejo/Nuevo Mundo · clima':'Old/New World · climate')+'</span></div>'+
    '<div class="ng-row"><b>'+(es?'Final':'Final')+'</b><span>'+(es?'uva · país · región':'grape · country · region')+'</span></div>'+
    '</div><div class="ng-lock"><span>🔒</span></div></div>'+
    '<a class="ng-cta" href="deductive.html" target="_blank" rel="noopener">'+(es?'Abre el CMS Deductive Grid':'Open CMS Deductive Grid')+'</a>'+
    '<div class="ng-foot">'+(es?'Incluido en el Vault · LearnSomm.com':'Included in the Vault · LearnSomm.com')+'</div>';
  }

  $('npModeGrid').addEventListener('click',function(){buildGrid();setMode('grid');});
  $('npModeRaw').addEventListener('click',function(){setMode('raw');});
  $('npModeGuided').addEventListener('click',function(){if(!$('npGuided').innerHTML)buildGuided();setMode('guided');});

  $('npOpen').addEventListener('click',function(){
    $('npPanel').classList.add('on');$('npPanel').setAttribute('aria-hidden','false');
    $('npPanel').classList.add('free');positionNpFree();
    var es=ES();
    var _nt=$('npTitle');if(_nt)_nt.textContent=es?'Diario de Cata':'Tasting Journal';
    var _nm=$('npModeRaw');if(_nm)_nm.textContent=es?'Notas libres':'Raw notes';
    (function(_e){return _e?_e:{};})($('npModeGuided')).textContent=es?'Formulario':'Guided form';
    (function(_e){return _e?_e:{};})($('npModeGrid')).textContent=es?'Cuadrícula':'Blind Grid';
    (function(_e){return _e?_e:{};})($('npOpenLbl')).textContent=es?'Diario de Cata':'Tasting Journal';
    var _dl=$('dgSheetLbl');if(_dl)_dl.textContent=es?'Hoja':'Cheat Sheet';
    if($('dgSheetHint'))$('dgSheetHint').textContent=es?'arrastra · clic en un aroma':'drag · click an aroma';
    if(state.mode==='guided'){if(!$('npGuided').innerHTML)buildGuided();setMode('guided');}else setMode('raw');
  });
  $('npClose').addEventListener('click',function(){$('npPanel').classList.remove('on');$('npPanel').setAttribute('aria-hidden','true');});
  $('npCapBtn').addEventListener('click',function(){
    capture=!capture;var es=ES();
    this.classList.toggle('on',capture);
    this.textContent=(es?'🎯 Capturar: ':'🎯 Capture: ')+(capture?(es?'Sí':'On'):(es?'No':'Off'));
  });
  $('npCopy').addEventListener('click',function(){
    var txt=state.mode==='raw'?state.raw:GFIELDS.map(function(f){return (f[1]+': '+(state.guided[f[0]]||'')).trim();}).join('\n')+(state.rating?'\nRating: '+state.rating+'/5':'');
    try{navigator.clipboard.writeText(txt);}catch(e){}
    var s=$('npSaved');if(s){s.textContent=ES()?'Copiado ✓':'Copied ✓';setTimeout(function(){s.textContent='';},1200);}
  });
  $('npClear').addEventListener('click',function(){
    if(!confirm(ES()?'¿Borrar todas las notas?':'Clear all notes?'))return;
    state={mode:state.mode,raw:'',guided:{},rating:0};
    var _nr2=$('npRawText');if(_nr2)_nr2.value='';if($('npGuided').innerHTML)buildGuided();persist();
  });

  // ── npPanel drag from header + resize from all corners/edges ──────
  var panel=$('npPanel');
  function positionNpFree(){
    if(!panel.classList.contains('free')){return;}
    var saved;try{saved=JSON.parse(localStorage.getItem('ls_np_pos'));}catch(e){}
    if(saved&&saved.left!=null){
      panel.style.left=saved.left+'px';panel.style.top=saved.top+'px';
      panel.style.width=saved.w+'px';panel.style.height=saved.h+'px';
      panel.style.right='auto';panel.style.bottom='auto';
    }else{
      var w=Math.min(380,window.innerWidth*0.92);
      var h=Math.min(window.innerHeight-80,600);
      panel.style.width=w+'px';panel.style.height=h+'px';
      panel.style.left=(window.innerWidth-w-16)+'px';panel.style.top='60px';
      panel.style.right='auto';panel.style.bottom='auto';
    }
  }
  function saveNpPos(){
    try{localStorage.setItem('ls_np_pos',JSON.stringify({
      left:parseInt(panel.style.left),top:parseInt(panel.style.top),
      w:panel.offsetWidth,h:panel.offsetHeight}));}catch(e){}
  }

  // Header drag
  var header=panel.querySelector('header');
  var hDrag=null;
  header.addEventListener('pointerdown',function(e){
    if(e.target.closest('#npClose,#npOpacityRow,#npOpacitySlider'))return;
    panel.classList.add('free');positionNpFree();
    var r=panel.getBoundingClientRect();
    hDrag={ox:r.left,oy:r.top,sx:e.clientX,sy:e.clientY};
    header.setPointerCapture(e.pointerId);e.preventDefault();
  });
  header.addEventListener('pointermove',function(e){
    if(!hDrag)return;
    var nx=Math.max(0,Math.min(window.innerWidth-80,hDrag.ox+(e.clientX-hDrag.sx)));
    var ny=Math.max(0,Math.min(window.innerHeight-40,hDrag.oy+(e.clientY-hDrag.sy)));
    panel.style.left=nx+'px';panel.style.top=ny+'px';
  });
  header.addEventListener('pointerup',function(){if(hDrag){saveNpPos();hDrag=null;}});

  // Corner/edge resize handles
  panel.querySelectorAll('.np-resize').forEach(function(handle){
    var rDrag=null;
    handle.addEventListener('pointerdown',function(e){
      var r=panel.getBoundingClientRect();
      rDrag={dir:handle.getAttribute('data-dir'),
        ox:r.left,oy:r.top,ow:r.width,oh:r.height,sx:e.clientX,sy:e.clientY};
      handle.setPointerCapture(e.pointerId);e.preventDefault();e.stopPropagation();
    });
    handle.addEventListener('pointermove',function(e){
      if(!rDrag)return;
      var dx=e.clientX-rDrag.sx,dy=e.clientY-rDrag.sy;
      var d=rDrag.dir,nl=rDrag.ox,nt=rDrag.oy,nw=rDrag.ow,nh=rDrag.oh;
      var MIN_W=220,MIN_H=200;
      if(d.includes('e'))nw=Math.max(MIN_W,rDrag.ow+dx);
      if(d.includes('s'))nh=Math.max(MIN_H,rDrag.oh+dy);
      if(d.includes('w')){nw=Math.max(MIN_W,rDrag.ow-dx);nl=rDrag.ox+rDrag.ow-nw;}
      if(d.includes('n')){nh=Math.max(MIN_H,rDrag.oh-dy);nt=rDrag.oy+rDrag.oh-nh;}
      panel.style.left=nl+'px';panel.style.top=nt+'px';
      panel.style.width=nw+'px';panel.style.height=nh+'px';
      panel.style.right='auto';panel.style.bottom='auto';
    });
    handle.addEventListener('pointerup',function(){if(rDrag){saveNpPos();rDrag=null;}});
  });

  // Opacity slider for npPanel
  function setNpAlpha(v){var a=(v/100);var dark=document.documentElement.getAttribute('data-theme')!=='light';var rgb=dark?'22,19,14':'247,242,224';panel.style.background='rgba('+rgb+','+a+')';panel.style.backdropFilter='blur(6px)';}
  var npOp=$('npOpacitySlider');
  if(npOp){
    var savedOp;try{savedOp=localStorage.getItem('ls_np_opacity');}catch(e){}
    if(savedOp){npOp.value=savedOp;}setNpAlpha(npOp.value);
    npOp.addEventListener('input',function(){
      setNpAlpha(npOp.value);
      try{localStorage.setItem('ls_np_opacity',npOp.value);}catch(e){};
    });
  }

  // ── Capture descriptor names into notes ──────────────────────────
  function captureName(){
    var a=document.querySelector('#detailContent h2 a, #detailContent h2');
    if(!a)return;var name=a.textContent.replace('↗','').trim();if(!name)return;
    if(state.mode==='raw'){state.raw=(state.raw?state.raw.replace(/\s*$/,'')+', ':'')+name;var _nr3=$('npRawText');if(_nr3)_nr3.value=state.raw;}
    else{var tgt=$('npCapTarget').value||'aroma';
      state.guided[tgt]=(state.guided[tgt]?state.guided[tgt].replace(/\s*$/,'')+', ':'')+name;
      var ta=$('npGuided').querySelector('textarea[data-f="'+tgt+'"]');if(ta)ta.value=state.guided[tgt];}
    persist();
  }
  if(typeof window.showDetail==='function'){
    var _sd=window.showDetail;
    window.showDetail=function(){var r=_sd.apply(this,arguments);if(capture){try{captureName();}catch(e){}}return r;};
  }
})();


</script>
<script>


/* Hub center drag in free/detached mode */
(function(){
  var svgC=document.getElementById('svgContainer'),hub=document.getElementById('hubCenter');
  if(!svgC||!hub)return;
  var wDrag=null;
  function onDown(e){
    var mode=document.body.getAttribute('data-mode')||'';
    if(mode==='dock-left'||mode==='dock-right')return;
    var r=svgC.getBoundingClientRect();
    wDrag={dx:e.clientX-r.left,dy:e.clientY-r.top};
    hub.setPointerCapture(e.pointerId);e.preventDefault();e.stopPropagation();
  }
  function onMove(e){if(!wDrag)return;
    var __hw=(svgC.getBoundingClientRect().width||300)/2;var L=Math.max(-__hw,Math.min(e.clientX-wDrag.dx,window.innerWidth-__hw));
    var T=Math.max(58,Math.min(e.clientY-wDrag.dy,window.innerHeight-80));

<script>
/* user font-size control for wheel ring text (bounded) */
(function(){
  var MIN=0.8, MAX=1.7, STEP=0.12, KEY='ls_wheel_fontscale';
  var scale=1; try{ scale=parseFloat(localStorage.getItem(KEY))||1; }catch(e){}
  scale=Math.max(MIN,Math.min(MAX,scale));
  var svg=document.getElementById('wheelSvg');
  function applyScale(){
    if(!svg)return;
    svg.querySelectorAll('text').forEach(function(t){
      var base=t.getAttribute('data-basefs');
      if(base===null){
        // capture original size once (attribute or computed)
        var fs=t.getAttribute('font-size'); if(!fs){ try{fs=getComputedStyle(t).fontSize;}catch(e){fs='';} }
        base=parseFloat(fs)||0; if(!base)return;
        t.setAttribute('data-basefs',base);
      }
      base=parseFloat(base); if(!base)return;
      t.setAttribute('font-size',(base*scale).toFixed(2));
    });
  }
  // re-apply after the engine redraws the wheel
  if(svg){
    var mo=new MutationObserver(function(){ // new text nodes have no data-basefs yet
      applyScale();
    });
    mo.observe(svg,{childList:true,subtree:true});
  }
  function setScale(s){ scale=Math.max(MIN,Math.min(MAX,s)); try{localStorage.setItem(KEY,scale);}catch(e){}
    // reset captured bases so new factor applies cleanly off the ORIGINAL size
    if(svg) svg.querySelectorAll('text[data-basefs]').forEach(function(t){
      t.setAttribute('font-size',(parseFloat(t.getAttribute('data-basefs'))*scale).toFixed(2)); });
  }
  window.__lsBumpFont=function(dir){ setScale(scale+(dir||1)*STEP); };
  // build control into the bar
  function build(){
    var bar=document.getElementById('topctl')||document.querySelector('.topctl')||document.querySelector('.controls');
    if(!bar||document.getElementById('lsFontWrap'))return;
    var es=false; try{es=document.documentElement.getAttribute('lang')==='es';}catch(e){}
    var w=document.createElement('span'); w.id='lsFontWrap'; w.title=es?'Tamaño de texto de la rueda':'Wheel text size';
    var minus=document.createElement('button'); minus.textContent='A'; minus.style.fontSize='.7rem'; minus.setAttribute('aria-label',es?'Reducir texto':'Smaller text');
    var ico=document.createElement('span'); ico.className='lsF-ico'; ico.textContent='A';
    var plus=document.createElement('button'); plus.textContent='A'; plus.style.fontSize='1.05rem'; plus.setAttribute('aria-label',es?'Agrandar texto':'Larger text');
    minus.addEventListener('click',function(){ setScale(scale-STEP); });
    plus.addEventListener('click',function(){ setScale(scale+STEP); });
    w.appendChild(minus); w.appendChild(ico); w.appendChild(plus); bar.appendChild(w);
  }
  function init(){ build(); setTimeout(applyScale,400); }
  if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded',init);
})();
</script>

<script id="lsCmdBridge">
/* command bridge v2: dashboard drives the wheel. Calls globals when present, else clicks controls. */
(function(){
  function $(id){return document.getElementById(id);}
  function clk(id){var e=$(id); if(e){e.click(); return true;} return false;}
  function gfn(name){ try{ return (typeof window[name]==='function')?window[name]:null; }catch(e){ return null; } }
  var curTheme='light', curLang='en';
  try{ curTheme=document.documentElement.getAttribute('data-theme')||'light'; }catch(e){}
  try{ curLang=document.documentElement.getAttribute('lang')||'en'; }catch(e){}

  function handle(cmd,value){
    switch(cmd){
      case 'spin': clk('spinBtn'); break;
      case 'dock-left': clk('modeDockL'); break;
      case 'dock-right': clk('modeDockR'); break;
      case 'free': clk('modeFree'); break;
      case 'theme': {
        var th=(value==='dark'||value==='light')?value:(curTheme==='dark'?'light':'dark');
        var f=gfn('setTheme'); if(f){f(th);} else { clk('themeBtn'); }
        curTheme=th; break;
      }
      case 'lang': {
        var l=(value==='en'||value==='es')?value:(curLang==='en'?'es':'en');
        var f2=gfn('setLang'); if(f2){f2(l);} else { clk('langBtn'); }
        curLang=l; break;
      }
      case 'glow': case 'logo': clk('glowBtn'); break;
      case 'focus': if(!clk('fsBtn')){ try{ (document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()); }catch(e){} } break;
      case 'reset': clk('zoomReset'); break;
      case 'size-up': clk('zoomIn'); break;
      case 'size-down': clk('zoomOut'); break;
      case 'font-up': if(window.__lsBumpFont)window.__lsBumpFont(1); break;
      case 'font-down': if(window.__lsBumpFont)window.__lsBumpFont(-1); break;
    }
  }
  window.addEventListener('message',function(ev){
    var d=ev.data; if(!d||d.type!=='LS_CMD')return;
    handle(d.cmd,d.value);
  });
  try{ if(window.parent&&window.parent!==window) window.parent.postMessage({type:'LS_WHEEL_READY'},'*'); }catch(e){}
})();

<script id="lsPanelFollow">
(function(){
  var GAP=48; /* ~half inch */
  var panel=document.getElementById('detailPanel');
  var svg=document.getElementById('wheelSvg')||document.getElementById('svgContainer');
  if(!panel||!svg) return;
  var detached=false;

  // add a drag grip
  var grip=document.createElement('div'); grip.className='ls-pan-grip'; grip.innerHTML='⠿'; grip.title='Drag to detach';
  panel.appendChild(grip);

  function wheelRect(){
    var el=document.getElementById('svgContainer')||svg;
    return el.getBoundingClientRect();
  }
  function place(){
    if(detached) return;
    var r=wheelRect();
    panel.classList.add('ls-bound'); panel.classList.remove('ls-free');
    var left=r.right+GAP;
    var top=r.top;
    // keep on screen
    var maxLeft=window.innerWidth-Math.min(panel.offsetWidth||320,window.innerWidth*0.5)-12;
    if(left>maxLeft) left=Math.max(12,maxLeft);
    panel.style.left=left+'px';
    panel.style.top=Math.max(12,top)+'px';
    panel.style.width=''; /* default width from CSS */
  }
  // re-place on resize of window or wheel (observe the wheel container size)
  window.addEventListener('resize',place);
  try{
    var ro=new ResizeObserver(function(){ place(); });
    ro.observe(document.getElementById('svgContainer')||svg);
  }catch(e){}
  // also re-place shortly after any size command / spin settle
  document.addEventListener('click',function(){ if(!detached) setTimeout(place,60); });
  // re-place when wheel transform changes (size adjust) — poll lightly
  var lastW=0;
  setInterval(function(){ if(detached)return; var w=(document.getElementById('svgContainer')||svg).getBoundingClientRect().width; if(Math.abs(w-lastW)>2){ lastW=w; place(); } },400);

  function detach(){ detached=true; panel.classList.remove('ls-bound'); panel.classList.add('ls-free'); grip.title='Detached — drag to move'; }

  // drag to move (and detach on first drag)
  var dragging=false,sx,sy,ox,oy;
  grip.addEventListener('pointerdown',function(e){
    dragging=true; if(!detached) detach();
    var r=panel.getBoundingClientRect(); ox=r.left; oy=r.top; sx=e.clientX; sy=e.clientY;
    grip.setPointerCapture(e.pointerId); e.preventDefault();
  });
  grip.addEventListener('pointermove',function(e){
    if(!dragging)return;
    panel.style.left=(ox+(e.clientX-sx))+'px';
    panel.style.top=(oy+(e.clientY-sy))+'px';
  });
  grip.addEventListener('pointerup',function(e){ dragging=false; try{grip.releasePointerCapture(e.pointerId);}catch(_e){} });

  // detach when the user manually resizes (the CSS resize handle on .ls-free); also allow resize after detach
  panel.addEventListener('mousedown',function(e){
    // bottom-right resize zone
    var r=panel.getBoundingClientRect();
    if(e.clientX>r.right-18 && e.clientY>r.bottom-18){ if(!detached) detach(); }
  });

  // initial placement once layout settles
  setTimeout(place,300); setTimeout(place,900);
})();
</script>

<script id="lsHubSpin">
(function(){

  ready(function(){
    var tries=0;
    (function arm(){
      var disc=document.getElementById('lsHubDisc');
      if(!disc){ if(tries++<30) return setTimeout(arm,200); return; }
      disc.classList.add('ls-spinnable');
      function inFree(){
        try{ return document.body.getAttribute('data-mode')==='detached'; }catch(e){ return false; }
      }
      function doSpin(){
        var sb=document.getElementById('spinBtn');
        if(sb && !sb.disabled){ sb.click(); }
      }
      // Tap-to-spin with drag detection (so free-mode dragging the hub doesn't fire a spin)
      var downX=0, downY=0, moved=false, downT=0;
      disc.addEventListener('pointerdown', function(e){
        downX=e.clientX; downY=e.clientY; moved=false; downT=Date.now();
      }, true);
      disc.addEventListener('pointermove', function(e){
        if(Math.abs(e.clientX-downX)>6 || Math.abs(e.clientY-downY)>6) moved=true;
      }, true);
      disc.addEventListener('pointerup', function(e){
        // Spin on ANY tap that isn't a drag, regardless of how long it was held.
        // Drag (moved > 6px) = move the wheel in free mode; everything else spins.
        if(!moved){ doSpin(); }
      }, true);
      // keyboard / accessibility
      disc.setAttribute('role','button'); disc.setAttribute('tabindex','0');
      disc.setAttribute('aria-label','Spin the wheel');
      disc.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); doSpin(); } });
    })();
  });
})();
</script>

<script id="lsWheelDesign">
(function(){
  function el(id){return document.getElementById(id);}
  function hexLighten(hex,amt){ // amt -100..100
    try{ var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255;
      var f=amt/100; if(f>=0){ r=Math.round(r+(255-r)*f); g=Math.round(g+(255-g)*f); b=Math.round(b+(255-b)*f); }
      else { f=-f; r=Math.round(r*(1-f)); g=Math.round(g*(1-f)); b=Math.round(b*(1-f)); }
      return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
    }catch(e){ return hex; }
  }
  function textOnHex(hex){ try{ var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    return (0.299*r+0.587*g+0.114*b)>150?'#2a211c':'#fff'; }catch(e){ return '#2a211c'; } }

  // Recolor categories from a palette: assign one palette color per category, derive sub/descriptor shades.
  function applyPalette(palette){
    try{
      if(!palette||!palette.length) return;
      var svg=document.getElementById('wheelSvg'); if(!svg) return;
      // category cells (innermost solid ring, not sub, not desc)
      var cats=[].slice.call(svg.querySelectorAll('.cell:not(.sub-cell):not(.desc-seg)'));
      // map each category cell to a palette color, in document order
      var catColor={};
      cats.forEach(function(c,i){ var base=palette[i%palette.length]; c.setAttribute('fill',base); c.__base=base; catColor[i]=base; });
      // sub cells: lighten parent base. Group subs by nearest preceding category via angular midpoint.
      // Simpler robust approach: walk siblings — subs follow their category in DOM creation order grouped per category.
      // We re-derive by matching each sub to the category whose angular span contains the sub's midpoint.
      function midAngle(el){ try{ var bb=el.getBBox(); var cx=bb.x+bb.width/2, cy=bb.y+bb.height/2; return Math.atan2(cy,cx); }catch(e){ return 0; } }
      var catSpans=cats.map(function(c){ try{var bb=c.getBBox(); return {el:c, a:Math.atan2(bb.y+bb.height/2, bb.x+bb.width/2), base:c.__base};}catch(e){return {el:c,a:0,base:c.__base};} });
      function nearestBase(el){ var a=midAngle(el); var best=catSpans[0], bd=999; catSpans.forEach(function(s){ var d=Math.abs(Math.atan2(Math.sin(a-s.a),Math.cos(a-s.a))); if(d<bd){bd=d;best=s;} }); return best?best.base:palette[0]; }
      var subs=[].slice.call(svg.querySelectorAll('.sub-cell'));
      subs.forEach(function(s,j){ var base=nearestBase(s); s.setAttribute('fill', _hl(base, 12)); });
      // descriptor gradients: each desc-seg uses url(#pgN); rewrite the gradient stops to its category base
      var descs=[].slice.call(svg.querySelectorAll('.desc-seg'));
      descs.forEach(function(d){
        var base=nearestBase(d);
        var f=d.getAttribute('fill')||''; var m=f.match(/url\(#([^)]+)\)/);
        if(m){ var g=document.getElementById(m[1]); if(g){ var stops=g.querySelectorAll('stop'); if(stops[0])stops[0].setAttribute('stop-color',_hl(base,22)); if(stops[1])stops[1].setAttribute('stop-color',_hl(base,46)); } }
        else { d.setAttribute('fill', _hl(base,22)); }
      });
      // refresh hub glow ring colors if present
      try{ if(typeof setRing==='function'){ var rc=palette.slice(); setRing(rc); } }catch(e){}
    }catch(e){}
  }
  function _hl(hex,amt){ try{ if(hex[0]!=='#')return hex; var n=parseInt(hex.slice(1),16); var r=(n>>16)&255,g=(n>>8)&255,b=n&255; var f=amt/100; if(f>=0){r=Math.round(r+(255-r)*f);g=Math.round(g+(255-g)*f);b=Math.round(b+(255-b)*f);}else{f=-f;r=Math.round(r*(1-f));g=Math.round(g*(1-f));b=Math.round(b*(1-f));} return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;} }

  function applyGlow(opt){
    var disc=el('lsHubDisc'); if(!disc) return;
    disc.classList.remove('ls-glow-solid','ls-glow-pulse','ls-glow-breathe','ls-glow-rainbow');
    if(!opt || !opt.mode || opt.mode==='off'){ return; }
    if(opt.color){ disc.style.setProperty('--ls-glow', opt.color); }
    if(opt.mode==='rainbow'){ disc.classList.add('ls-glow-rainbow'); }
    else if(opt.mode==='pulse'){ disc.classList.add('ls-glow-pulse'); }
    else if(opt.mode==='breathe'){ disc.classList.add('ls-glow-breathe'); }
    else { disc.classList.add('ls-glow-solid'); }
  }

  window.addEventListener('message',function(ev){
    var d=ev.data; if(!d) return;
    if(d.type==='LS_PALETTE'){ applyPalette(d.palette); try{ if(document.getElementById('listView') && document.getElementById('listView').classList.contains('active') && typeof rebuildList==='function') rebuildList(); }catch(e){} }
    if(d.type==='LS_GLOW'){ applyGlow(d.glow); }
  });
})();
</script>
