<script id="lsTierLogic">
(function(){
  var LS_TIER_INTRO=[]; var LS_TIER_NEXT=[];
  var TIER=3;
  var TIERNAME={1:'Intro',2:'Next Level',3:'Master'};
  function rank(name){ return 1; }  /* unlocked: every item always available */
  function nameOf(slug){ try{ var e=REGISTRY[slug]; return (e&&e.desc&&e.desc.name)?e.desc.name:slug; }catch(e){ return slug; } }

  function counts(){ var c={1:0,2:0,3:0}; try{ for(var s in REGISTRY){ c[rank(nameOf(s))]++; } }catch(e){} return c; }

  // CLEAN (paid) mode: rebuild the wheel with ONLY tier<=t items, re-proportioned, no ghosts/legend/upsell
  // safe deep-copy of just the data fields (DATA gains circular runtime refs after build)
  function cloneData(src){
    var out={categories:[]};
    (src.categories||[]).forEach(function(c){
      var nc={name:c.name,name_es:c.name_es,color:c.color,sub:[]};
      (c.sub||[]).forEach(function(s){
        var ns={name:s.name,name_es:s.name_es,color:s.color,_implicit:s._implicit,descriptors:[]};
        (s.descriptors||[]).forEach(function(d){ ns.descriptors.push({name:d.name,name_es:d.name_es,slug:d.slug}); });
        nc.sub.push(ns);
      });
      out.categories.push(nc);
    });
    return out;
  }
  function masterData(){
    if(window.__LS_FULL_DATA && window.__LS_FULL_DATA.categories && window.__LS_FULL_DATA.categories.length) return window.__LS_FULL_DATA;
    var src=window.DATA||(typeof DATA!=='undefined'?DATA:null);
    if(src && src.categories && src.categories.length){ try{ window.__LS_FULL_DATA=cloneData(src); }catch(e){} }
    return window.__LS_FULL_DATA||null;
  }
  function cleanRebuild(t){
    var full=masterData(); var live=window.DATA||(typeof DATA!=='undefined'?DATA:null);
    if(!full||!live){ return; }
    live.categories.length=0;
    full.categories.forEach(function(c){
      var keptSubs=[];
      (c.sub||[]).forEach(function(s){
        var kept=(s.descriptors||[]).filter(function(d){ return rank(d.name)<=t; });
        if(kept.length){ var ns={}; for(var k in s)ns[k]=s[k]; ns.descriptors=kept.map(function(d){var nd={};for(var kk in d)nd[kk]=d[kk];return nd;}); keptSubs.push(ns); }
      });
      if(keptSubs.length){ var nc={}; for(var k in c)nc[k]=c[k]; nc.sub=keptSubs; live.categories.push(nc); }
    });
    try{ var svg=document.getElementById('wheelSvg'); if(svg){ svg.querySelectorAll('g#wheelG').forEach(function(n){n.remove();}); svg.querySelectorAll('defs').forEach(function(n){n.remove();}); } }catch(e){}
    if(typeof window.__lsRedraw==='function'){ try{ window.__lsRedraw(); }catch(e){} }
  }

  /* WHEEL_LOAD inside the engine closure: owns DATA/DESCRIPTIONS/tier lists so a payload renders */
  window.WHEEL_LOAD=function(payload){
    if(!payload||!payload.categories){console.warn('WHEEL_LOAD: bad payload');return false;}
    try{
      var names=[];
      for(var k in DESCRIPTIONS){delete DESCRIPTIONS[k];}
      payload.categories.forEach(function(cat){(cat.sub||[]).forEach(function(s){(s.descriptors||[]).forEach(function(d){
        var p=d.panel||{};
        var e={cat:s.name||cat.name,cat_fr:s.name_fr||cat.name_fr,cat_it:s.name_it||cat.name_it,cat_es:s.name_es||cat.name_es,
          origin:p.origin||p.basics||'',chemistry:p.chemistry||p.level2||'',pairing:p.pairing||p.why||'',mixology:p.mixology||p.remember||'',examples:p.examples||''};
        for(var pk in p){ if(p.hasOwnProperty(pk) && e[pk]===undefined) e[pk]=p[pk]; }
        DESCRIPTIONS[d.slug]=e; names.push(d.name);
      });});});
      DATA.categories.length=0; payload.categories.forEach(function(c){DATA.categories.push(c);});
      window.__LS_FULL_DATA=JSON.parse(JSON.stringify({categories:payload.categories}));
      // ingest per-wheel fun facts (category-keyed: {CATEGORY:{en,es,fr,it}} or {CATEGORY:"text"})
      try{ if(payload.funFacts && typeof FUN_FACTS==='object'){ for(var fk in FUN_FACTS){delete FUN_FACTS[fk];} for(var ffk in payload.funFacts){ var fv=payload.funFacts[ffk]; FUN_FACTS[ffk]=(typeof fv==='string')?{en:fv}:fv; } } }catch(e){}
      // ingest per-wheel UI (field labels, search text, etc.): merge per-lang over defaults
      try{ if(payload.ui && typeof UI==='object'){ for(var lg in payload.ui){ if(!UI[lg])UI[lg]={}; var usrc=payload.ui[lg]; for(var uk in usrc){ UI[lg][uk]=usrc[uk]; } } } }catch(e){}
      // optional: per-wheel hub logo (data-URI or URL); falls back to engine default if absent
      try{ if(payload.logo){ window.__LS_HUB_LOGO=payload.logo; var hl=document.getElementById('hubLogoImg')||document.querySelector('#hubLogo img,#lsHubMark img'); if(hl){hl.src=payload.logo;} } }catch(e){}
      // per-wheel pronunciation language (e.g. a Spanish wheel speaks Spanish regardless of UI lang)
      try{ window.__LS_AUDIO_LANG = payload.audioLang || payload.lang || null; }catch(e){}
      LS_TIER_INTRO.length=0; names.forEach(function(n){LS_TIER_INTRO.push(n);});
      LS_TIER_NEXT.length=0;
      window.__LS_PAID=true; window.__LS_DEPTH=2;
      if(typeof cleanRebuild==='function'){cleanRebuild(2);} else if(typeof buildWheel==='function'){buildWheel();}
      try{ if(typeof renderLabels==='function')renderLabels(); }catch(e){}
      try{ if(typeof buildList==='function')buildList(); }catch(e){}
      try{ if(payload.title){ if(typeof window.__lsSetWheelName==='function')window.__lsSetWheelName(payload.title); if(typeof WheelName==='function')WheelName(payload.title); try{document.title=payload.title+' · LearnSomm';}catch(e){} } }catch(e){}
      try{ window.WHEEL_NAMES={}; window._LS_NAME2SLUG={}; for(var __rk in REGISTRY){ var __e=REGISTRY[__rk]; window.WHEEL_NAMES[__rk]=1; var __nm=(__e&&__e.desc&&__e.desc.name)?__e.desc.name:__rk; var __nn=(''+__nm).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,''); window._LS_NAME2SLUG[__nn]=__rk; window.WHEEL_NAMES[__nn]=__rk; if(__e&&__e.desc&&__e.desc.name_es){window.WHEEL_NAMES[(''+__e.desc.name_es).toLowerCase().trim()]=__rk;} } }catch(e){}
      document.dispatchEvent(new CustomEvent('wheel:loaded',{detail:{n:DATA.categories.length}}));
      try{ if(window.parent&&window.parent!==window) window.parent.postMessage({type:'wheel:loaded',n:DATA.categories.length},'*'); }catch(e){}
      return true;
    }catch(e){console.warn('WHEEL_LOAD failed',e);return false;}
  };
  window.addEventListener('message',function(ev){var d=ev&&ev.data||{}; if(d.type==='wheel:load'&&d.payload){window.WHEEL_LOAD(d.payload);}});

  function apply(t){
    TIER=t; window.__LS_DEPTH=t;
    if(window.__LS_PAID && !window.__LS_PREVIEW){
      // paid (normal): clean wheel, hide tease chrome
      cleanRebuild(t);
      var leg=document.getElementById('lsTierLegend'); if(leg)leg.hidden=true;
      return;
    }
    if(window.__LS_PAID && window.__LS_PREVIEW){
      // paid PREVIEW: restore full wheel, then show the tease so they can see the progression
      try{ var full=masterData(); var live=window.DATA; if(full&&live){ live.categories.length=0; full.categories.forEach(function(c){ var keptSubs=[]; (c.sub||[]).forEach(function(s){ var ns={}; for(var k in s)ns[k]=s[k]; ns.descriptors=(s.descriptors||[]).map(function(d){var nd={};for(var kk in d)nd[kk]=d[kk];return nd;}); keptSubs.push(ns); }); var nc={}; for(var k in c)nc[k]=c[k]; nc.sub=keptSubs; live.categories.push(nc); }); var svg=document.getElementById('wheelSvg'); if(svg){ svg.querySelectorAll('g#wheelG').forEach(function(n){n.remove();}); svg.querySelectorAll('defs').forEach(function(n){n.remove();}); } if(typeof window.__lsRedraw==='function')window.__lsRedraw(); } }catch(e){}
      // fall through to the tease rendering below
    }
    try{
      if(typeof REGISTRY==='undefined')return;
      for(var slug in REGISTRY){
        var e=REGISTRY[slug]; if(!e||!e.segEl)continue;
        var locked=rank(nameOf(slug))>t;
        e.segEl.classList.toggle('ls-tier-locked', locked);
      }
      // labels lack data-slug; match by text content against item names
      var lockedNames={};
      for(var s2 in REGISTRY){ var nm=nameOf(s2); if(rank(nm)>t) lockedNames[nm.toUpperCase()]=1; }
      document.querySelectorAll('#wheelSvg text').forEach(function(tx){
        var txt=(tx.textContent||'').trim().toUpperCase();
        var lock=!!lockedNames[txt];
        tx.classList.toggle('ls-tier-locked-label', lock);
        // shrink locked labels a real step below their own base size (never larger)
        if(lock){
          if(!tx.getAttribute('data-basefs')){ var f=parseFloat(tx.getAttribute('font-size')||getComputedStyle(tx).fontSize)||7; tx.setAttribute('data-basefs',f); }
          var base=parseFloat(tx.getAttribute('data-basefs'))||7;
          tx.setAttribute('font-size',(base*0.8).toFixed(2));
        } else if(tx.getAttribute('data-basefs')){
          tx.setAttribute('font-size',tx.getAttribute('data-basefs'));
        }
      });
      renderLegend();
    }catch(err){}
  }
  window.__lsTierDepth=function(){ return window.__LS_DEPTH||TIER; };

  function renderLegend(){
    var leg=document.getElementById('lsTierLegend'); if(!leg)return;
    var c=counts(); var lockedNext=(TIER<2)?c[2]:0; var lockedMaster=(TIER<3)?c[3]:0;
    if(lockedNext+lockedMaster===0){ leg.hidden=true; return; }
    leg.hidden=false;
    var bits=[];
    if(TIER<2 && c[2]) bits.push('<b>'+c[2]+'</b> more at Next Level');
    if(TIER<3 && c[3]) bits.push('<b>'+c[3]+'</b> at Master');
    leg.querySelector('.leg-txt').innerHTML='🔒 '+bits.join(' · ');
    var nextTier=(TIER<2)?2:3;
    leg.querySelector('.leg-unlock').textContent='Unlock '+TIERNAME[nextTier];
    leg.querySelector('.leg-unlock').onclick=function(){ upsell(null, nextTier); };
  }

  // upsell card shown in the detail panel when a locked wedge (or legend) is clicked
  function upsell(slug, forceTier){
    var panel=document.getElementById('detailContent')||document.getElementById('detailPanel'); if(!panel)return;
    var tier = forceTier || (slug?rank(nameOf(slug)):2);
    var c=counts();
    var sampleNames=[];
    try{ for(var s in REGISTRY){ if(rank(nameOf(s))===tier){ sampleNames.push(nameOf(s)); } } }catch(e){}
    var sample=sampleNames.slice(0,6).join(', ');
    var added = tier===2 ? c[2] : c[3];
    var title = slug ? nameOf(slug) : (TIERNAME[tier]+' Sparkling');
    var html='<div class="section-title" style="color:var(--garnet,#6E1B2E)">🔒 '+title+'</div>'+
      '<div class="body-text">This is a <b>'+TIERNAME[tier]+'</b> pour. Unlock '+TIERNAME[tier]+' to add it and explore <b>'+added+'</b> sparkling styles like '+sample+'.</div>'+
      '<div class="body-text" style="margin-top:.6rem"><button id="lsUpsellGo" style="background:var(--gold,#C49A4A);color:#3a2a20;border:none;border-radius:9px;padding:.55rem 1rem;font-weight:600;cursor:pointer;font-family:var(--ui)">Unlock '+TIERNAME[tier]+'</button></div>';
    panel.innerHTML=html;
    var g=document.getElementById('lsUpsellGo'); if(g){ g.addEventListener('click',function(){
      try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_UPSELL',tier:tier,category:'sparkling'},'*'); } }catch(e){}
    }); }
  }

  // intercept clicks on locked wedges (capture phase, before the seg's own selectItem)
  function installInterceptor(){
    var svg=document.getElementById('wheelSvg'); if(!svg)return;
    svg.addEventListener('click',function(ev){
      var seg=ev.target.closest && ev.target.closest('.desc-seg'); if(!seg)return;
      var slug=seg.getAttribute('data-slug'); if(!slug)return;
      if(rank(nameOf(slug))>TIER){ ev.stopPropagation(); ev.preventDefault(); upsell(slug); }
    }, true);
  }

  function setActive(btn){ document.querySelectorAll('#lsTierBar .lt-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); }
  function wire(){
    var bar=document.getElementById('lsTierBar'); if(!bar)return;
    masterData(); // snapshot full data now (cloneData strips circular runtime refs)
    bar.querySelectorAll('.lt-btn').forEach(function(b){ b.addEventListener('click',function(){ setActive(b); apply(parseInt(b.getAttribute('data-tier'))); }); });
    installInterceptor();
    var pv=document.getElementById('lsPreviewBtn');
    if(pv){
      if(window.__LS_PAID){ pv.hidden=false; }
      pv.addEventListener('click',function(){
        window.__LS_PREVIEW=!window.__LS_PREVIEW;
        pv.classList.toggle('on',window.__LS_PREVIEW);
        var bar=document.getElementById('lsTierBar'); if(bar){ bar.style.display=window.__LS_PREVIEW?'':( window.__LS_PAID?'none':'' ); }
        apply(TIER);
      });
    }
    setTimeout(function(){ hideToggleIfPaid(); apply(TIER); var btn=bar.querySelector('[data-tier="'+TIER+'"]'); if(btn)setActive(btn); },500);
  }
  // mode + tier from URL
  (function(){
    try{
      var qs=new URLSearchParams(location.search);
      var paid=qs.get('paid'); var mode=qs.get('mode');
      if(paid==='1'||mode==='paid'){ window.__LS_PAID=true; }
      // bilingual entitlement: subscribers, 90-day challenge, or purchased add-on
      if(qs.get('bilingual')==='1'||qs.get('subscriber')==='1'||qs.get('challenge')==='1'){ window.__LS_BILINGUAL=true; }
      var tq=(qs.get('tier')||'').toLowerCase();
      if(tq==='intro') TIER=1; else if(tq==='next'||tq==='nextlevel') TIER=2; else if(tq==='master'||tq==='max') TIER=3;
    }catch(e){}
  })();
  // in paid mode hide the tier toggle (they bought one tier) unless ?showtiers=1
  function hideToggleIfPaid(){
    if(window.__LS_PAID){ try{ var bar=document.getElementById('lsTierBar'); var qs=new URLSearchParams(location.search); if(bar && qs.get('showtiers')!=='1') bar.style.display='none'; }catch(e){} }
  }
  // allow dashboard to switch modes live
  window.addEventListener('message',function(ev){ var d=ev.data; if(!d||d.type!=='LS_CMD')return;
    if(d.cmd==='mode'){ window.__LS_PAID=(d.value==='paid'); hideToggleIfPaid(); apply(TIER); }
    if(d.cmd==='bilingual'){ window.__LS_BILINGUAL=!!d.value; }
  });
  if(document.readyState!=='loading')wire(); else document.addEventListener('DOMContentLoaded',wire);
  window.addEventListener('message',function(ev){ var d=ev.data; if(d&&d.type==='LS_CMD'&&d.cmd==='tier'){ apply(d.value||2); var bar=document.getElementById('lsTierBar'); if(bar){var btn=bar.querySelector('[data-tier="'+(d.value||2)+'"]'); if(btn)setActive(btn);} } });
  // List Mode: in FREE mode, inaccessible items simply DON'T appear (no frost). In paid mode DATA is already filtered.
  window.__lsListTierSkip=function(name){ if(window.__LS_PAID)return false; return rank(name)>TIER; };
  // rebuild list whenever tier changes so the list reflects accessible items
  var _origApply=apply;
  apply=function(t){ _origApply(t); try{ if(typeof rebuildList==='function' && document.getElementById('listView') && document.getElementById('listView').classList.contains('active')) rebuildList(); }catch(e){} };
  // expose view switch for the dashboard Format dropdown (LS_CMD {cmd:'view', value:'wheel'|'list'})
  window.addEventListener('message',function(ev){ var d=ev.data; if(!d||d.type!=='LS_CMD')return;
    if(d.cmd==='view'){ try{ var vb=(d.value==='list')?document.getElementById('viewList'):document.getElementById('viewWheel'); if(vb){ vb.click(); } if(d.value==='list' && typeof rebuildList==='function') setTimeout(rebuildList,60); }catch(e){} }
  });
  window.__lsSlugAvailable=function(slug){ try{ if(window.__LS_PAID)return true; return rank(nameOf(slug))<=TIER; }catch(e){ return true; } };
  window.LSWheelTier={apply:apply, depth:function(){return TIER;}, setView:function(v){ var vb=(v==='list')?document.getElementById('viewList'):document.getElementById('viewWheel'); if(vb)vb.click(); if(v==='list'&&typeof rebuildList==='function')setTimeout(rebuildList,60); }};
})();
</script>
<script id="lsFontApply">
(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
<script id="lsSpinTipLogic">(function(){
  var tip=document.getElementById('lsSpinTip'); if(!tip) return;
  function txt(){ try{ return (window.__lsLang==='es'||document.documentElement.getAttribute('lang')==='es')?'Toca para girar':'Click / Press to Spin'; }catch(e){ return 'Click / Press to Spin'; } }
  tip.textContent=txt();
  function hideFor(ms){ tip.classList.add('gone'); clearTimeout(tip.__t); tip.__t=setTimeout(function(){ tip.textContent=txt(); tip.classList.remove('gone'); }, ms||1300); }
  // any spin trigger hides the hint, then it returns once the wheel settles
  var sb=document.getElementById('spinBtn'); if(sb) sb.addEventListener('click',function(){ hideFor(1900); });
  var disc=document.getElementById('wheelSvg')||document.getElementById('svgContainer');
  if(disc) disc.addEventListener('pointerup',function(){ hideFor(1900); }, true);
  // refresh language if toggled
  setInterval(function(){ if(!tip.classList.contains('gone')) tip.textContent=txt(); }, 1000);
})();</script>
<style id="lsFooterKill">#contactBar{display:none!important}.leg-unlock{display:none!important}#lsTierBar{display:none!important}#lsPreviewBtn{display:none!important}#lsTierLegend{display:none!important}</style><script id="wheelPayloadHost">
window.__WHEEL_LOAD_LEGACY=function(payload){
  if(!payload||!payload.categories){console.warn('WHEEL_LOAD: bad payload');return false;}
  try{
    var names=[];
    if(typeof DESCRIPTIONS!=='undefined'){
      for(var k in DESCRIPTIONS){delete DESCRIPTIONS[k];}
      payload.categories.forEach(function(cat){(cat.sub||[]).forEach(function(s){(s.descriptors||[]).forEach(function(d){
        var p=d.panel||{};
        var __e={cat:s.name||cat.name,cat_fr:s.name_fr||cat.name_fr,cat_it:s.name_it||cat.name_it,cat_es:s.name_es||cat.name_es,
          origin:p.origin||p.basics||'',chemistry:p.chemistry||p.level2||'',pairing:p.pairing||p.why||'',mixology:p.mixology||p.remember||'',examples:p.examples||''};
        for(var __pk in p){ if(p.hasOwnProperty(__pk) && __e[__pk]===undefined) __e[__pk]=p[__pk]; }  /* carry _es/_fr/_it panel variants */
        DESCRIPTIONS[d.slug]=__e;
        names.push(d.name);
      });});});
    }
    var live=window.DATA||DATA; live.categories.length=0;
    payload.categories.forEach(function(c){live.categories.push(c);});
    window.__LS_FULL_DATA=JSON.parse(JSON.stringify({categories:payload.categories}));
    if(typeof LS_TIER_INTRO!=='undefined'){LS_TIER_INTRO.length=0;names.forEach(function(n){LS_TIER_INTRO.push(n);});}
    if(typeof LS_TIER_NEXT!=='undefined'){LS_TIER_NEXT.length=0;}
    window.__LS_PAID=true; window.__LS_DEPTH=2;
    if(typeof cleanRebuild==='function'){cleanRebuild(2);}
    else if(typeof window.lsRedraw==='function'){window.lsRedraw();}
    if(payload.title){try{(window.WheelName||function(){})(payload.title);}catch(e){}}
    document.dispatchEvent(new CustomEvent('wheel:loaded',{detail:{n:live.categories.length}}));
    return true;
  }catch(e){console.warn('WHEEL_LOAD failed',e);return false;}
};
// dashboard can also push a payload in via postMessage (shell -> 2D surface)
window.addEventListener('message',function(ev){var d=ev&&ev.data||{};
  if(d.type==='wheel:load'&&d.payload){window.WHEEL_LOAD(d.payload);}});
</script>
<script>window.HUB_STYLE=function(o){o=o||{};var r=document.documentElement.style;if(o.bg)r.setProperty('--hub',o.bg);if(o.text)r.setProperty('--hub-text',o.text);if(o.ring)r.setProperty('--hub-ring',o.ring);if(o.glow)r.setProperty('--hub-glow',o.glow);if(o.font)r.setProperty('--hub-font',o.font);if('glowOn' in o)document.body.classList.toggle('hub-glow-on',!!o.glowOn);return true;};</script>
<script>try{window.addEventListener('DOMContentLoaded',function(){setTimeout(function(){try{if(window.parent&&window.parent!==window)window.parent.postMessage({type:'wheel:ready'},'*');}catch(e){}},120);});}catch(e){}</script>
