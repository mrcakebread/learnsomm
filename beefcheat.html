const TC={"Includes":"#7a6a55","Best For":"#7a5a2a","Pairing Logic":"#7a5a2a","Use It For":"#7a5a2a","Tasting Cue":"#7a5a2a"};
const DATA = {"sections": [{"label": null, "cards": [{"title": "Chuck (Shoulder)", "title_es": "Paleta (Hombro)", "badge": "4", "badge_es": "4", "color": "#8a4a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Chuck Roast, Flat Iron Steak, Denver Steak, Blade Steak", "text_es": "Chuck Roast (Paleta), Flat Iron Steak, Denver Steak, Blade Steak (Aguja)", "color": "#8a4a3a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Low-and-slow braising and pot roasts — collagen melts into rich gelatin over hours.", "text_es": "Estofado y cocción lenta — el colágeno se convierte en gelatina rica tras horas de cocción."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The chuck primal contains some of the most well-exercised muscles on the cow, which is why cuts like chuck roast are so flavorful — but also why they need long, slow cooking to become tender.", "text_es": "El primal de la paleta contiene algunos de los músculos más ejercitados de la vaca, por lo que cortes como el chuck roast son tan sabrosos — pero también necesitan cocción larga y lenta para volverse tiernos.", "pair": true}]}, {"title": "Rib (Upper Back)", "title_es": "Costilla (Lomo Alto)", "badge": "3", "badge_es": "3", "color": "#b03a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Ribeye Steak, Prime Rib (Standing Rib Roast), Back Ribs", "text_es": "Ribeye (Ojo de Costilla), Prime Rib (Costillar Entero), Costillas Back Ribs", "color": "#b03a3a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "High-heat grilling or roasting — exceptional marbling bastes the meat as it cooks.", "text_es": "Asado a fuego alto o al horno — el marmoleo excepcional riega la carne mientras se cocina."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The rib primal supplies only about 10 ribs total per side, and the prized ribeye comes from this small section — explaining why it commands such a premium price.", "text_es": "El primal de la costilla aporta solo unas 10 costillas por lado, y el codiciado ribeye proviene de esta pequeña sección — lo que explica su elevado precio.", "pair": true}]}, {"title": "Loin (Mid-Back)", "title_es": "Lomo (Lomo Medio)", "badge": "4", "badge_es": "4", "color": "#c9533a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Tenderloin (Filet Mignon), New York Strip, T-Bone, Porterhouse", "text_es": "Solomillo (Filet Mignon), New York Strip, T-Bone, Porterhouse", "color": "#c9533a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Quick, high-heat searing to medium-rare — the most tender cuts on the animal.", "text_es": "Sellado rápido a fuego alto hasta término medio — los cortes más tiernos del animal."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The tenderloin muscle does so little work in a living cow that it accounts for less than 2% of the animal's total weight, yet it's often the most expensive cut at the butcher counter.", "text_es": "El músculo del solomillo trabaja tan poco en una vaca viva que representa menos del 2% del peso total del animal, y sin embargo suele ser el corte más caro de la carnicería.", "pair": true}]}, {"title": "Sirloin (Rump)", "title_es": "Cadera (Lomo Bajo)", "badge": "2", "badge_es": "2", "color": "#a8653a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Sirloin Steak, Tri-Tip", "text_es": "Bife de Cadera, Tri-Tip", "color": "#a8653a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Marinate, then grill or reverse-sear — leaner cuts that reward a flavor boost.", "text_es": "Marinar y luego asar o cocinar a baja temperatura — cortes magros que se benefician de un toque extra de sabor."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Tri-tip was largely unknown outside of California until the 1950s, when a Santa Maria butcher began selling it as a steak instead of grinding it into hamburger.", "text_es": "El tri-tip era prácticamente desconocido fuera de California hasta los años 1950, cuando un carnicero de Santa Maria comenzó a venderlo como bistec en lugar de molerlo para hamburguesa.", "pair": true}]}, {"title": "Round (Hind Leg)", "title_es": "Pierna (Cuarto Trasero)", "badge": "4", "badge_es": "4", "color": "#6b4a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Top Round, Bottom Round, Eye of Round, Rump Roast", "text_es": "Top Round (Bola de Lomo), Bottom Round (Carnaza), Eye of Round (Peceto), Rump Roast (Cuadrada)", "color": "#6b4a3a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Roast to medium-rare and slice thin, or braise for tenderness — the leanest primal.", "text_es": "Hornear hasta término medio y cortar fino, o estofar para mayor ternura — el primal más magro."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Because the round primal does so much work supporting the animal's weight, its muscles are some of the leanest on the cow — making them popular for health-conscious cuts like London broil.", "text_es": "Como el primal de la pierna sostiene gran parte del peso del animal, sus músculos son de los más magros de la vaca — lo que los hace populares para cortes saludables como el London broil.", "pair": true}]}, {"title": "Brisket (Chest)", "title_es": "Pecho (Brisket)", "badge": "3", "badge_es": "3", "color": "#7a3a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Whole Brisket, Flat Cut, Point Cut", "text_es": "Brisket Entero, Corte Flat, Corte Point", "color": "#7a3a3a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Low-and-slow smoking for 10+ hours — collagen breaks down into tender, sliceable meat.", "text_es": "Ahumado lento durante 10+ horas — el colágeno se descompone en una carne tierna y rebanable."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "A whole brisket can take 10-14 hours to smoke properly, and during that time it passes through a tough 'stall' phase before the collagen finally breaks down into tender gelatin.", "text_es": "Un brisket entero puede tardar 10-14 horas en ahumarse correctamente, y durante ese tiempo pasa por una dura fase de 'estancamiento' antes de que el colágeno se convierta en gelatina tierna.", "pair": true}]}, {"title": "Short Plate (Belly)", "title_es": "Falda Corta (Vientre)", "badge": "3", "badge_es": "3", "color": "#9a5a4a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Skirt Steak, Hanger Steak, Short Ribs", "text_es": "Entraña, Solomillo de Pulmón (Hanger), Costillas Short Ribs", "color": "#9a5a4a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Marinate and grill hot and fast, or braise low and slow — always slice against the grain.", "text_es": "Marinar y asar fuerte y rápido, o estofar a fuego lento — siempre cortar en contra de la fibra."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Hanger steak gets its name because it 'hangs' from the diaphragm, and there's only one per animal — for years, butchers kept it for themselves rather than selling it.", "text_es": "El hanger steak recibe su nombre porque 'cuelga' del diafragma, y solo hay uno por animal — durante años, los carniceros lo guardaban para ellos en lugar de venderlo.", "pair": true}]}, {"title": "Flank (Lower Belly)", "title_es": "Falda (Vientre Bajo)", "badge": "1", "badge_es": "1", "color": "#b3724a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Flank Steak", "text_es": "Vacío (Flank Steak)", "color": "#b3724a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Marinate, grill hot and fast to medium-rare, slice thin against the grain.", "text_es": "Marinar, asar fuerte y rápido hasta término medio, cortar fino en contra de la fibra."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Flank steak's muscle fibers run in one direction the entire length of the cut, which is why slicing against the grain makes such a dramatic difference in tenderness.", "text_es": "Las fibras musculares del flank steak corren en una sola dirección a lo largo de todo el corte, por lo que cortarlo en contra de la fibra marca una diferencia dramática en la ternura.", "pair": true}]}, {"title": "Shank (Legs)", "title_es": "Morcillo (Piernas)", "badge": "3", "badge_es": "3", "color": "#5a3a2a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Soup Bones, Osso Buco, Stew Meat", "text_es": "Huesos para Caldo, Osso Buco, Carne para Guiso", "color": "#5a3a2a"}, {"tag": "Best For", "tag_es": "Mejor Para", "text": "Long, moist cooking — simmering or braising turns collagen into rich gelatin and stock.", "text_es": "Cocción larga y húmeda — hervir o estofar convierte el colágeno en gelatina rica y caldo."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The shank is so rich in collagen that simmering it for hours is one of the oldest methods humans have used to make gelatin — the same substance found in gummy candy.", "text_es": "El morcillo es tan rico en colágeno que cocerlo a fuego lento durante horas es uno de los métodos más antiguos para producir gelatina — la misma sustancia de los caramelos gomosos.", "pair": true}]}]}]};
const UI={"en":{"sub":"Primal cuts, texture & cooking — pocket reference","use":"How to use","useText":"Tap a card to see what's in each category, how to use it, and a fun fact. The full Beef Cuts Wheel (beef-cuts-wheel.html) has detailed notes for every individual item.","wheel":"The Wheel","scan":"Companion wheel file","cover":"Pocket guide","fold":"<b>Tip:</b> hit <b>Print fold-up</b> for a one-page pocket card — print one side, fold into eighths, one short center cut, and it becomes a little booklet.","byline":"Curated by Mark Lenington · Certified Sommelier · © 2026 LearnSomm.com"},"es":{"sub":"Cortes primales, textura y cocción — referencia de bolsillo","use":"Cómo usarla","useText":"Toca una tarjeta para ver qué incluye cada categoría, cómo usarla y un dato curioso. La Rueda de Cortes de Res completa (beef-cuts-wheel.html) tiene notas detalladas de cada elemento.","wheel":"La Rueda","scan":"Archivo de la rueda complementaria","cover":"Guía de bolsillo","fold":"<b>Tip:</b> pulsa <b>Imprimir plegable</b> para una tarjeta de bolsillo — imprime un lado, dobla en octavos, un corte corto al centro y se vuelve un folletito.","byline":"Creado por Mark Lenington · Sommelier Certificado · © 2026 LearnSomm.com"}};
const TITLE_EN="Beef Cuts";const TITLE_ES="Cortes de Res";
const $=id=>document.getElementById(id);let lang="en";

function renderScreen(){const t=UI[lang];$("langBtn").textContent=lang==="es"?"EN":"ES";$("docTitle").textContent=lang==="es"?TITLE_ES:TITLE_EN;$("docSub").textContent=t.sub;$("foldHint").innerHTML=t.fold;$("byline").innerHTML=t.byline;
$("sections").innerHTML=DATA.sections.map(s=>{const label=s.label?L(s,"label"):null;const cards=s.cards.map(c=>{const title=L(c,"title");const badge=c.badge?(lang==="es"?(c.badge_es||c.badge):c.badge):null;return `<div class="card" data-slug="${((c.slug)||L(c,'title')||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}" data-title="${title}"><div class="card-header"><span class="card-title">${title}${badge?`<span class="badge" style="background:${c.color||'var(--gold)'}">${badge}</span>`:""}</span><span class="chevron">\u25bc</span></div><div class="card-body"><div class="card-inner">${c.rows.map(rowHTML).join("")}</div></div></div>`;}).join("");return label?`<div class="section-label">${label}</div>${cards}`:cards;}).join("");

function initSearch(){
  const inp=document.getElementById("searchInput");
  const clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){
    const q=inp.value.trim().toLowerCase();
    clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");
    if(!sect)return;
    let anyVisible=false;
    sect.querySelectorAll(".card").forEach(card=>{
      const txt=(card.textContent||"").toLowerCase();
      const show=!q||txt.includes(q);
      card.style.display=show?"":"none";
      if(show)anyVisible=true;
    });
    sect.querySelectorAll(".section-label").forEach(lbl=>{
      let next=lbl.nextElementSibling;let vis=false;
      while(next&&!next.classList.contains("section-label")){
        if(next.style.display!=="none")vis=true;
        next=next.nextElementSibling;
      }
      lbl.style.display=vis?"":"none";
    });
    let nr=document.querySelector(".no-results");
    if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}
    nr.style.display=anyVisible||!q?"none":"block";
  }
  inp.addEventListener("input",doFilter);
  clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});
}

initSearch();

/* ── click-to-spin ── */
(function(){
  function norm(s){return (''+s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,'');}
  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}
  document.addEventListener('click',function(e){
    var card=e.target.closest&&e.target.closest('.card[data-slug],.card[data-title]');
    if(!card)return;
    var slug=card.getAttribute('data-slug')||'';
    var title=card.getAttribute('data-title')||'';
    send(slug||title);
    if(title&&title!==slug)send(title);
  });
  try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SHEET_READY'},'*');}}catch(e){}
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='LS_WHEEL_NAMES')return;
    var names=d.names||{};
    document.querySelectorAll('.card[data-slug],.card[data-title]').forEach(function(card){
      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */

  document.addEventListener('dragstart',function(e){ if(e.target&&e.target.tagName==='IMG'){ e.preventDefault(); } },{capture:true});
})();
