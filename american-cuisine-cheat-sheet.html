<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LearnSomm · American Cuisine Cheat Sheet</title>
<style>
:root{--bg:#faf8f3;--panel:#fffdf7;--ink:#2b2118;--muted:#8a7c66;--line:#e2dacb;--line2:#c9bfa6;--garnet:#6E1B2E;--gold:#C49A4A;--ui:'Jost',system-ui,sans-serif;--serif:'Cormorant Garamond',Georgia,serif;}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--ui);background:var(--bg);color:var(--ink);}
button,input,select,textarea,.card,.ct,.cn,.gcard,.ghead,#tierBar,.viewseg{font-family:var(--ui)!important;}
.wrap{max-width:1100px;margin:0 auto;padding:14px 14px 60px;}
.top{display:flex;flex-wrap:wrap;align-items:center;gap:.8rem;padding:.4rem 0 .8rem;}
h1{font-family:var(--serif);font-size:1.5rem;margin:0;font-weight:600;}
.sub{color:var(--muted);font-size:.82rem;}
#tierBar{display:inline-flex;align-items:center;gap:.4rem;background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:.32rem .5rem;}
#tierBar .tl{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:0 .3rem;}
#tierBar button{border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:14px;padding:.3rem .7rem;font-family:var(--ui);font-size:.8rem;cursor:pointer;}
#tierBar button.active{background:var(--garnet);color:#fff;border-color:var(--garnet);}
.viewseg{display:inline-flex;border:1px solid var(--line2);border-radius:14px;overflow:hidden;}
.viewseg button{border:none;background:transparent;color:var(--ink);font-size:.78rem;padding:.3rem .7rem;cursor:pointer;font-family:var(--ui);}
.viewseg button.active{background:var(--gold);color:#3a2a20;}
#search{flex:1 1 200px;min-width:160px;}
#search input{width:100%;padding:.5rem .7rem;border:1px solid var(--line2);border-radius:10px;font-family:var(--ui);font-size:.9rem;background:var(--panel);color:var(--ink);}
.grid{column-width:250px;column-gap:14px;}
.gcard{display:inline-block;width:100%;break-inside:avoid;margin:0 0 14px;background:var(--panel);border:1.5px solid var(--g);border-top:5px solid var(--g);border-radius:10px;padding:.6rem .7rem;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ghead{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g);margin:0 0 .5rem;}
.card{display:block;width:100%;text-align:left;border:1px solid color-mix(in srgb,var(--g) 35%,transparent);border-left:3px solid var(--g);background:color-mix(in srgb,var(--g) 8%,var(--bg));border-radius:7px;padding:.45rem .55rem;margin:0 0 .35rem;cursor:pointer;}
.card:hover{background:color-mix(in srgb,var(--g) 18%,var(--bg));}
.card .ct{font-weight:600;font-size:.9rem;}
.card .cn{font-size:.8rem;color:var(--muted);margin-top:.15rem;line-height:1.35;}
.card .badge{float:right;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line2);border-radius:8px;padding:.05rem .35rem;}
.card.spinnable .ct::after{content:' ↻';color:var(--gold);font-size:.8rem;}
.empty{color:var(--muted);font-style:italic;padding:1rem;}
#tierNote{font-size:.8rem;color:var(--muted);margin:.2rem 0 .8rem;}
</style></head>
<body><div class="wrap">
<div class="top">
  <div><h1>American Cuisine</h1><div class="sub">Dishes, sauces & techniques · the all-in-one Italian cuisine reference</div></div>
  <div id="tierBar"><span class="tl">Tier</span>
    <button data-tier="1">Intro</button>
    <button data-tier="2" class="active">Next Level</button>
    <button data-tier="3">Master</button>
  </div>
  <div class="viewseg"><button data-view="all" class="active">All</button><button data-view="type">Types</button><button data-view="aroma">Aromas</button></div>
  <div id="search"><input id="q" type="search" placeholder="Search styles, terms, aromas…" autocomplete="off"></div>
</div>
<div id="tierNote"></div>
<div class="grid" id="grid"></div>
</div>
<script>
var CARDS=[{"name": "Texas Brisket", "tier": 1, "group": "Bbq & Smoke", "note": "Salt-pepper smoked beef brisket, low & slow.", "wheel": "type", "color": "#8e44ad", "slug": "us-brisket"}, {"name": "Carolina Pulled Pork", "tier": 1, "group": "Bbq & Smoke", "note": "Smoked shoulder, vinegar or mustard sauce.", "wheel": "type", "color": "#8e44ad", "slug": "us-pulledpork"}, {"name": "Memphis Ribs", "tier": 1, "group": "Bbq & Smoke", "note": "Dry-rubbed or wet pork ribs.", "wheel": "type", "color": "#8e44ad", "slug": "us-ribs"}, {"name": "Kansas City BBQ", "tier": 2, "group": "Bbq & Smoke", "note": "Sweet-thick tomato-molasses sauce, varied meats.", "wheel": "type", "color": "#8e44ad", "slug": "us-kcbbq"}, {"name": "Burnt Ends", "tier": 2, "group": "Bbq & Smoke", "note": "Crispy-tender brisket-point cubes.", "wheel": "type", "color": "#8e44ad", "slug": "us-burntends"}, {"name": "Smoked Sausage", "tier": 2, "group": "Bbq & Smoke", "note": "Hot links & smoked links.", "wheel": "type", "color": "#8e44ad", "slug": "us-sausage"}, {"name": "Cheeseburger", "tier": 1, "group": "Diner & Comfort", "note": "Griddled patty with cheese, the icon.", "wheel": "type", "color": "#c0392b", "slug": "us-cheeseburger"}, {"name": "Hot Dog", "tier": 1, "group": "Diner & Comfort", "note": "Grilled/steamed frank in a bun, regional styles.", "wheel": "type", "color": "#c0392b", "slug": "us-hotdog"}, {"name": "Mac and Cheese", "tier": 1, "group": "Diner & Comfort", "note": "Baked or stovetop cheesy pasta.", "wheel": "type", "color": "#c0392b", "slug": "us-macncheese"}, {"name": "Meatloaf", "tier": 2, "group": "Diner & Comfort", "note": "Baked seasoned ground-meat loaf.", "wheel": "type", "color": "#c0392b", "slug": "us-meatloaf"}, {"name": "Fried Chicken", "tier": 1, "group": "Diner & Comfort", "note": "Buttermilk-brined, crisp-fried.", "wheel": "type", "color": "#c0392b", "slug": "us-friedchicken"}, {"name": "Buffalo Wings", "tier": 1, "group": "Diner & Comfort", "note": "Fried wings in cayenne-butter sauce.", "wheel": "type", "color": "#c0392b", "slug": "us-wings"}, {"name": "Chicken Fried Steak", "tier": 2, "group": "Diner & Comfort", "note": "Battered fried steak with cream gravy.", "wheel": "type", "color": "#c0392b", "slug": "us-cfs"}, {"name": "Gumbo", "tier": 1, "group": "Regional — South", "note": "Louisiana roux-based stew, the Creole-Cajun soul.", "wheel": "type", "color": "#d4a017", "slug": "us-gumbo"}, {"name": "Jambalaya", "tier": 1, "group": "Regional — South", "note": "Rice cooked with meat, seafood, trinity.", "wheel": "type", "color": "#d4a017", "slug": "us-jambalaya"}, {"name": "Shrimp and Grits", "tier": 1, "group": "Regional — South", "note": "Lowcountry shrimp over creamy grits.", "wheel": "type", "color": "#d4a017", "slug": "us-shrimpgrits"}, {"name": "Biscuits and Gravy", "tier": 1, "group": "Regional — South", "note": "Buttermilk biscuits, sausage cream gravy.", "wheel": "type", "color": "#d4a017", "slug": "us-biscuits"}, {"name": "Collard Greens", "tier": 2, "group": "Regional — South", "note": "Slow-braised greens with pork.", "wheel": "type", "color": "#d4a017", "slug": "us-collards"}, {"name": "Crawfish Boil", "tier": 3, "group": "Regional — South", "note": "Spiced boiled crawfish, corn, potato.", "wheel": "type", "color": "#d4a017", "slug": "us-crawfish"}, {"name": "New England Clam Chowder", "tier": 1, "group": "Regional — Coasts & Midwest", "note": "Creamy potato-clam soup.", "wheel": "type", "color": "#16a085", "slug": "us-chowder"}, {"name": "Lobster Roll", "tier": 1, "group": "Regional — Coasts & Midwest", "note": "Buttered or mayo-dressed lobster in a split bun.", "wheel": "type", "color": "#16a085", "slug": "us-lobsterroll"}, {"name": "Deep-Dish Pizza", "tier": 2, "group": "Regional — Coasts & Midwest", "note": "Chicago thick-crust, cheese-under-sauce.", "wheel": "type", "color": "#16a085", "slug": "us-deepdish"}, {"name": "Cioppino", "tier": 2, "group": "Regional — Coasts & Midwest", "note": "SF Italian-American seafood tomato stew.", "wheel": "type", "color": "#16a085", "slug": "us-cioppino"}, {"name": "Hatch Chile", "tier": 3, "group": "Regional — Coasts & Midwest", "note": "New Mexico green chili, regional obsession.", "wheel": "type", "color": "#16a085", "slug": "us-hatch"}, {"name": "Cheesesteak", "tier": 2, "group": "Regional — Coasts & Midwest", "note": "Philly thin beef & cheese on a roll.", "wheel": "type", "color": "#16a085", "slug": "us-cheesesteak"}, {"name": "Pancakes", "tier": 1, "group": "Breakfast & Brunch", "note": "Fluffy stacks with maple syrup.", "wheel": "type", "color": "#e67e22", "slug": "us-pancakes"}, {"name": "Eggs Benedict", "tier": 2, "group": "Breakfast & Brunch", "note": "Poached eggs, ham, hollandaise on muffin.", "wheel": "type", "color": "#e67e22", "slug": "us-benedict"}, {"name": "Hash Browns", "tier": 1, "group": "Breakfast & Brunch", "note": "Crispy shredded fried potato.", "wheel": "type", "color": "#e67e22", "slug": "us-hashbrowns"}, {"name": "Biscuit", "tier": 1, "group": "Breakfast & Brunch", "note": "Flaky buttermilk quick-bread.", "wheel": "type", "color": "#e67e22", "slug": "us-biscuit"}, {"name": "Grits", "tier": 2, "group": "Breakfast & Brunch", "note": "Stone-ground corn porridge.", "wheel": "type", "color": "#e67e22", "slug": "us-grits"}, {"name": "Cornbread", "tier": 1, "group": "Breakfast & Brunch", "note": "Skillet corn quick-bread.", "wheel": "type", "color": "#e67e22", "slug": "us-cornbread"}, {"name": "Ranch", "tier": 1, "group": "Sauces & Staples", "note": "Buttermilk-herb dressing, national obsession.", "wheel": "type", "color": "#2980b9", "slug": "us-ranch"}, {"name": "BBQ Sauce", "tier": 1, "group": "Sauces & Staples", "note": "Regional: tomato, vinegar, mustard, white.", "wheel": "type", "color": "#2980b9", "slug": "us-bbqsauce"}, {"name": "Ketchup", "tier": 1, "group": "Sauces & Staples", "note": "Sweet-tangy tomato condiment.", "wheel": "type", "color": "#2980b9", "slug": "us-ketchup"}, {"name": "Maple Syrup", "tier": 1, "group": "Sauces & Staples", "note": "Boiled tree sap, Northeast.", "wheel": "type", "color": "#2980b9", "slug": "us-maple"}, {"name": "Cajun Seasoning", "tier": 2, "group": "Sauces & Staples", "note": "Paprika-cayenne-garlic blend.", "wheel": "type", "color": "#2980b9", "slug": "us-cajun"}, {"name": "Old Bay", "tier": 2, "group": "Sauces & Staples", "note": "Chesapeake celery-salt-spice blend.", "wheel": "type", "color": "#2980b9", "slug": "us-oldbay"}, {"name": "Holy Trinity", "tier": 2, "group": "Aromatics & Produce", "note": "Onion, celery, bell pepper — Cajun base.", "wheel": "type", "color": "#27ae60", "slug": "us-trinity"}, {"name": "Sweet Corn", "tier": 1, "group": "Aromatics & Produce", "note": "Summer staple, grilled or boiled.", "wheel": "type", "color": "#27ae60", "slug": "us-corn"}, {"name": "Sweet Potato", "tier": 1, "group": "Aromatics & Produce", "note": "Pies, fries, casseroles.", "wheel": "type", "color": "#27ae60", "slug": "us-sweetpotato"}, {"name": "Pecan", "tier": 2, "group": "Aromatics & Produce", "note": "Southern native nut.", "wheel": "type", "color": "#27ae60", "slug": "us-pecan"}, {"name": "Cranberry", "tier": 2, "group": "Aromatics & Produce", "note": "Tart berry, Thanksgiving fixture.", "wheel": "type", "color": "#27ae60", "slug": "us-cranberry"}, {"name": "Bourbon", "tier": 3, "group": "Aromatics & Produce", "note": "Corn whiskey used in glazes & desserts.", "wheel": "type", "color": "#27ae60", "slug": "us-bourbon"}, {"name": "Apple Pie", "tier": 1, "group": "Desserts", "note": "The all-American double-crust pie.", "wheel": "type", "color": "#c39bd3", "slug": "us-applepie"}, {"name": "Pecan Pie", "tier": 1, "group": "Desserts", "note": "Gooey nut pie, Southern.", "wheel": "type", "color": "#c39bd3", "slug": "us-pecanpie"}, {"name": "Cheesecake", "tier": 1, "group": "Desserts", "note": "New York dense baked style.", "wheel": "type", "color": "#c39bd3", "slug": "us-cheesecake"}, {"name": "Brownie", "tier": 1, "group": "Desserts", "note": "Fudgy chocolate bar.", "wheel": "type", "color": "#c39bd3", "slug": "us-brownie"}, {"name": "Key Lime Pie", "tier": 2, "group": "Desserts", "note": "Tart Florida citrus pie.", "wheel": "type", "color": "#c39bd3", "slug": "us-keylime"}, {"name": "Banana Pudding", "tier": 2, "group": "Desserts", "note": "Layered custard, wafers, banana.", "wheel": "type", "color": "#c39bd3", "slug": "us-bananapudding"}, {"name": "Cobbler", "tier": 2, "group": "Desserts", "note": "Baked fruit under biscuit topping.", "wheel": "type", "color": "#c39bd3", "slug": "us-cobbler"}];
var TIER=2, VIEW='all', Q='';
var TIERNAME={1:'Intro',2:'Next Level',3:'Master'};
function visible(c){
  if(c.tier>TIER) return false;
  if(VIEW!=='all' && c.wheel!==VIEW) return false;
  if(Q){ var s=(c.name+' '+c.group+' '+c.note).toLowerCase(); if(s.indexOf(Q)<0) return false; }
  return true;
}
function slugify(s){ return s.toLowerCase().replace(/\(.*?\)/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function render(){
  var grid=document.getElementById('grid'); grid.innerHTML='';
  // group visible cards by group
  var groups={};
  CARDS.filter(visible).forEach(function(c){ (groups[c.group]=groups[c.group]||[]).push(c); });
  // Aromas & tasting notes always come first, then the other (type/style/service) groups.
  var order=Object.keys(groups).sort(function(a,b){
    var aw=(groups[a][0].wheel==='aroma')?0:1, bw=(groups[b][0].wheel==='aroma')?0:1;
    return aw-bw; // stable-ish: aroma groups (0) before type groups (1)
  });
  if(!order.length){ grid.innerHTML='<div class="empty">Nothing at this tier/filter.</div>'; updateNote(0); return; }
  var shown=0;
  order.forEach(function(g){
    var color=groups[g][0].color;
    var block=document.createElement('div'); block.className='gcard'; block.style.setProperty('--g',color);
    var head=document.createElement('div'); head.className='ghead'; head.textContent=g; block.appendChild(head);
    groups[g].forEach(function(c){
      shown++;
      var card=document.createElement('button'); card.type='button'; card.className='card';
      card.style.setProperty('--g',color);
      card.setAttribute('data-title', c.name); card.setAttribute('data-slug', slugify(c.name)); if(c.slug)card.setAttribute('data-wheelslug', c.slug);
      // per-card tier label removed — the tier toggle already conveys this
      card.innerHTML='<div class="ct">'+c.name+'</div><div class="cn">'+c.note+'</div>';
      block.appendChild(card);
    });
    grid.appendChild(block);
  });
  updateNote(shown);
  applyWheelNames();
}
function updateNote(n){
  var locked=CARDS.filter(function(c){return c.tier>TIER;}).length;
  var t=document.getElementById('tierNote');
  t.textContent=TIERNAME[TIER]+' view · '+n+' entries shown'+(locked? ' · '+locked+' more unlock at higher tiers':'');
}
// tier + view + search wiring
document.querySelectorAll('#tierBar button').forEach(function(b){ b.addEventListener('click',function(){
  document.querySelectorAll('#tierBar button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
  TIER=parseInt(b.getAttribute('data-tier')); render();
}); });
document.querySelectorAll('.viewseg button').forEach(function(b){ b.addEventListener('click',function(){
  document.querySelectorAll('.viewseg button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
  VIEW=b.getAttribute('data-view'); render();
}); });
document.getElementById('q').addEventListener('input',function(e){ Q=e.target.value.trim().toLowerCase(); render(); });

// ---- click-to-spin: tell the parent wheel to spin to this term (by NAME; wheel resolves) ----
function postSpin(name){ try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_SPIN_TO',slug:name},'*'); } }catch(e){} }
document.addEventListener('click',function(e){
  var card=e.target.closest&&e.target.closest('.card');
  if(card){ postSpin(card.getAttribute('data-wheelslug')||card.getAttribute('data-title')); }
});
// announce ready; receive wheel names to mark spinnable + resolve
try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_SHEET_READY'},'*'); } }catch(e){}
var WHEEL_NAMES={};
window.addEventListener('message',function(e){ var d=e.data; if(!d)return;
  if(d.type==='LS_WHEEL_NAMES'){ WHEEL_NAMES=d.names||{}; applyWheelNames(); }
  if(d.type==='LS_CMD' && d.cmd==='tier'){ var bt=document.querySelector('#tierBar [data-tier="'+(d.value||2)+'"]'); if(bt)bt.click(); }
});
function applyWheelNames(){
  document.querySelectorAll('.card').forEach(function(card){
    var title=(card.getAttribute('data-title')||'').toLowerCase().trim();
    var ws=null;
    if(WHEEL_NAMES[title]) ws=WHEEL_NAMES[title];
    else for(var nm in WHEEL_NAMES){ if(nm===title||(title&&(nm.indexOf(title)>=0||title.indexOf(nm)>=0))){ ws=WHEEL_NAMES[nm]; break; } }
    if(ws){ card.setAttribute('data-wheelslug',ws); card.classList.add('spinnable'); }
  });
}
render();
</script><script id="lsFontApply">
(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
</body></html>
