const DATA = {"sections": [{"label": null, "cards": [{"title": "Dry-Cured Hams", "title_es": "Jamones Curados", "badge": "8", "badge_es": "8", "color": "#b5566a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Prosciutto di Parma, Prosciutto di San Daniele, Jamón Serrano, Jamón Ibérico, Speck, Jambon de Bayonne, Culatello, Country Ham", "text_es": "Prosciutto di Parma, Prosciutto di San Daniele, Jamón Serrano, Jamón Ibérico, Speck, Jambon de Bayonne, Culatello, Jamón de Campo", "color": "#b5566a"}, {"tag": "Best Paired With", "tag_es": "Mejor Con", "text": "Sliced paper-thin and served simply — let the cure's flavor speak for itself.", "text_es": "Cortados muy finos y servidos simples — deja que el sabor de la curación hable por sí mismo."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The finest Jamón Ibérico comes from black-hoofed pigs fattened on acorns — 'pata negra' — and a single leg can age for years before it's ready to slice.", "text_es": "El mejor Jamón Ibérico viene de cerdos de pezuña negra cebados con bellota — 'pata negra' — y una sola pierna puede curarse años antes de estar lista para cortar.", "pair": true}]}, {"title": "Cured Whole-Muscle Cuts", "title_es": "Cortes Enteros Curados", "badge": "7", "badge_es": "7", "color": "#9a3b4a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Coppa, Lomo, Pancetta, Guanciale, Bresaola, Cecina, Lardo", "text_es": "Coppa, Lomo, Pancetta, Guanciale, Bresaola, Cecina, Lardo", "color": "#9a3b4a"}, {"tag": "Best Paired With", "tag_es": "Mejor Con", "text": "Sliced thin as a starter — pairs beautifully with crusty bread and pickles.", "text_es": "Cortados finos como entrante — combinan muy bien con pan crujiente y encurtidos."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Guanciale — not bacon or pancetta — is the traditional cut for a real carbonara or amatriciana: cured pork jowl, richer and more delicate than belly.", "text_es": "El guanciale — no el bacon ni la pancetta — es el corte tradicional de una carbonara o amatriciana de verdad: carrillada curada, más rica y delicada que la panza.", "pair": true}]}, {"title": "Italian Salami", "title_es": "Salamis Italianos", "badge": "6", "badge_es": "6", "color": "#8c2f3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Milano Salami, Napoli Salami, Genoa Salami, Soppressata, Finocchiona, Ventricina", "text_es": "Salami Milano, Salami Napoli, Salami Génova, Soppressata, Finocchiona, Ventricina", "color": "#8c2f3a"}, {"tag": "Best Paired With", "tag_es": "Mejor Con", "text": "A board staple — their fat content means they pair well with acidic pickles and wine.", "text_es": "Un básico de la tabla — su contenido graso combina bien con encurtidos ácidos y vino."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Finocchiona was born of thrift — when black pepper was rare and costly in Tuscany, makers reached for cheap, local fennel, and the fennel salami became a classic.", "text_es": "La finocchiona nació del ahorro — cuando la pimienta negra era rara y cara en Toscana, los productores recurrieron al hinojo local y barato, y el salami de hinojo se hizo un clásico.", "pair": true}]}, {"title": "Spanish Sausages", "title_es": "Embutidos Españoles", "badge": "4", "badge_es": "4", "color": "#b5502a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Chorizo, Fuet, Salchichón, Sobrasada", "text_es": "Chorizo, Fuet, Salchichón, Sobrasada", "color": "#b5502a"}, {"tag": "Best Paired With", "tag_es": "Mejor Con", "text": "Often grilled or pan-fried (fresh varieties) or sliced thin (cured) — bold, paprika-forward flavors.", "text_es": "A menudo a la parrilla o sartén (frescos) o en lonchas finas (curados) — sabores intensos con protagonismo del pimentón."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "What makes chorizo red isn't chili but pimentón — Spanish smoked paprika — which arrived from the New World in the 16th century and reinvented Spanish curing.", "text_es": "Lo que da el rojo al chorizo no es el chile sino el pimentón — pimentón ahumado español — que llegó del Nuevo Mundo en el siglo XVI y reinventó el curado español.", "pair": true}]}, {"title": "French Sausages", "title_es": "Embutidos Franceses", "badge": "4", "badge_es": "4", "color": "#7a4a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Saucisson Sec, Rosette de Lyon, Saucisse de Morteau, Saucisse de Montbéliard", "text_es": "Saucisson Sec, Rosette de Lyon, Salchicha de Morteau, Salchicha de Montbéliard", "color": "#7a4a3a"}, {"tag": "Best Paired With", "tag_es": "Mejor Con", "text": "Air-dried and ready to slice — a classic apéritif companion with cornichons and mustard.", "text_es": "Secados al aire y listos para cortar — un acompañante clásico del aperitivo con pepinillos y mostaza."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Morteau sausage is smoked in a 'tuyé,' a tall pyramid farmhouse chimney, over conifer wood — and sealed at one end with a little wooden peg that proves it's the real thing.", "text_es": "La salchicha de Morteau se ahúma en un 'tuyé', una alta chimenea piramidal de granja, sobre madera de conífera — y se sella en un extremo con una clavija de madera que prueba que es auténtica.", "pair": true}]}, {"title": "Pâtés, Terrines & Spreads", "title_es": "Patés, Terrinas Y Untables", "badge": "6", "badge_es": "6", "color": "#9a7a4a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Pâté de Campagne, Rillettes, Nduja, Pâté en Croûte, Terrine, Fromage de Tête", "text_es": "Paté de Campaña, Rillettes, Nduja, Paté en Croûte, Terrina, Queso de Cabeza", "color": "#9a7a4a"}, {"tag": "Best Paired With", "tag_es": "Mejor Con", "text": "Spread on toasted bread or crackers — pair with something acidic to cut the richness.", "text_es": "Para untar sobre pan tostado o galletas — combina con algo ácido para contrarrestar la untuosidad."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "'Fromage de tête' — head cheese — contains no cheese at all; it's meat from a whole simmered pig's head set in its own savory jelly.", "text_es": "El 'fromage de tête' — queso de cabeza — no contiene queso alguno; es carne de una cabeza de cerdo cocida entera, cuajada en su propia gelatina sabrosa.", "pair": true}]}, {"title": "Cooked & Smoked", "title_es": "Cocidos Y Ahumados", "badge": "6", "badge_es": "6", "color": "#6a4a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Mortadella, Bacon, Galantine, Boudin Noir, Kielbasa, Frankfurter", "text_es": "Mortadela, Bacon, Galantina, Morcilla (Boudin Noir), Kielbasa, Salchicha Frankfurt", "color": "#6a4a3a"}, {"tag": "Best Paired With", "tag_es": "Mejor Con", "text": "Ready to eat as-is or with minimal cooking — the most approachable entry point on the board.", "text_es": "Listos para comer tal cual o con poca cocción — el punto de entrada más accesible de la tabla."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The word 'charcuterie' comes from the French for 'cooked flesh,' and the humble hot dog is a direct descendant — a finely emulsified, smoked sausage in the grand charcutier tradition.", "text_es": "La palabra 'charcuterie' viene del francés 'carne cocida', y el humilde hot dog es un descendiente directo — una salchicha fina, emulsionada y ahumada en la gran tradición charcutera.", "pair": true}]}]}]};
const UI={"en":{"sub":"Cured meats & boards — pocket reference","use":"How to use","useText":"Tap a card to see what's in each category, how to use it, and a fun fact. The full Charcuterie Wheel (charcuterie-wheel.html) has detailed notes for every individual item.","wheel":"The Wheel","scan":"Companion wheel file","cover":"Pocket guide","fold":"<b>Tip:</b> hit <b>Print fold-up</b> for a one-page pocket card — print one side, fold into eighths, one short center cut, and it becomes a little booklet.","byline":"Curated by Mark Lenington · Certified Sommelier · © 2026 LearnSomm.com"},"es":{"sub":"Carnes curadas y tablas — referencia de bolsillo","use":"Cómo usarla","useText":"Toca una tarjeta para ver qué incluye cada categoría, cómo usarla y un dato curioso. La Rueda de Charcutería completa (charcuterie-wheel.html) tiene notas detalladas de cada elemento.","wheel":"La Rueda","scan":"Archivo de la rueda complementaria","cover":"Guía de bolsillo","fold":"<b>Tip:</b> pulsa <b>Imprimir plegable</b> para una tarjeta de bolsillo — imprime un lado, dobla en octavos, un corte corto al centro y se vuelve un folletito.","byline":"Creado por Mark Lenington · Sommelier Certificado · © 2026 LearnSomm.com"}};

function rowHTML(r){const pc=r.pair?" pair":"";const tag=lang==="es"?(r.tag_es||r.tag):r.tag;const txt=lang==="es"?(r.text_es||r.text):r.text;const st=r.pair?"":`style="background:${r.color||tc(r.tag)}"`;return `<div class="row${pc}"><span class="tag" ${st}>${tag}</span><span>${txt}</span></div>`;}
function renderScreen(){const t=UI[lang];$("langBtn").textContent=lang==="es"?"EN":"ES";$("docTitle").textContent=lang==="es"?TITLE_ES:TITLE_EN;$("docSub").textContent=t.sub;$("foldHint").innerHTML=t.fold;$("byline").innerHTML=t.byline;
$("sections").innerHTML=DATA.sections.map(s=>{const label=s.label?L(s,"label"):null;const cards=s.cards.map(c=>{const title=L(c,"title");const badge=c.badge?(lang==="es"?(c.badge_es||c.badge):c.badge):null;return `<div class="card" data-slug="${((c.slug)||L(c,'title')||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}" data-title="${title}"><div class="card-header"><span class="card-title">${title}${badge?`<span class="badge" style="background:${c.color||'var(--gold)'}">${badge}</span>`:""}</span><span class="chevron">\u25bc</span></div><div class="card-body"><div class="card-inner">${c.rows.map(rowHTML).join("")}</div></div></div>`;}).join("");return label?`<div class="section-label">${label}</div>${cards}`:cards;}).join("");

function initSearch(){
  const inp=document.getElementById("searchInput");
  const clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){
    const q=inp.value.trim().toLowerCase();
    clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");
    if(!sect)return;
    let anyVisible=false;
    sect.querySelectorAll(".card").forEach(card=>{
      const txt=(card.textContent||"").toLowerCase();
      const show=!q||txt.includes(q);
      card.style.display=show?"":"none";
      if(show)anyVisible=true;
    });
    sect.querySelectorAll(".section-label").forEach(lbl=>{
      let next=lbl.nextElementSibling;let vis=false;
      while(next&&!next.classList.contains("section-label")){
        if(next.style.display!=="none")vis=true;
        next=next.nextElementSibling;
      }
      lbl.style.display=vis?"":"none";
    });
    let nr=document.querySelector(".no-results");
    if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}
    nr.style.display=anyVisible||!q?"none":"block";
  }
  inp.addEventListener("input",doFilter);
  clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});
}

initSearch();

(function(){

  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}

      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */

</script><script id="lsNoRightClick">

  document.addEventListener('contextmenu',function(e){ e.preventDefault(); return false; },{capture:true});

  document.addEventListener('dragstart',function(e){ if(e.target&&e.target.tagName==='IMG'){ e.preventDefault(); } },{capture:true});
})();
