<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LearnSomm · Italian Cuisine Cheat Sheet</title>
<style>
:root{--bg:#faf8f3;--panel:#fffdf7;--ink:#2b2118;--muted:#8a7c66;--line:#e2dacb;--line2:#c9bfa6;--garnet:#6E1B2E;--gold:#C49A4A;--ui:'Jost',system-ui,sans-serif;--serif:'Cormorant Garamond',Georgia,serif;}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--ui);background:var(--bg);color:var(--ink);}
button,input,select,textarea,.card,.ct,.cn,.gcard,.ghead,#tierBar,.viewseg{font-family:var(--ui)!important;}
.wrap{max-width:1100px;margin:0 auto;padding:14px 14px 60px;}
.top{display:flex;flex-wrap:wrap;align-items:center;gap:.8rem;padding:.4rem 0 .8rem;}
h1{font-family:var(--serif);font-size:1.5rem;margin:0;font-weight:600;}
.sub{color:var(--muted);font-size:.82rem;}
#tierBar{display:inline-flex;align-items:center;gap:.4rem;background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:.32rem .5rem;}
#tierBar .tl{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:0 .3rem;}
#tierBar button{border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:14px;padding:.3rem .7rem;font-family:var(--ui);font-size:.8rem;cursor:pointer;}
#tierBar button.active{background:var(--garnet);color:#fff;border-color:var(--garnet);}
.viewseg{display:inline-flex;border:1px solid var(--line2);border-radius:14px;overflow:hidden;}
.viewseg button{border:none;background:transparent;color:var(--ink);font-size:.78rem;padding:.3rem .7rem;cursor:pointer;font-family:var(--ui);}
.viewseg button.active{background:var(--gold);color:#3a2a20;}
#search{flex:1 1 200px;min-width:160px;}
#search input{width:100%;padding:.5rem .7rem;border:1px solid var(--line2);border-radius:10px;font-family:var(--ui);font-size:.9rem;background:var(--panel);color:var(--ink);}
.grid{column-width:250px;column-gap:14px;}
.gcard{display:inline-block;width:100%;break-inside:avoid;margin:0 0 14px;background:var(--panel);border:1.5px solid var(--g);border-top:5px solid var(--g);border-radius:10px;padding:.6rem .7rem;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ghead{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g);margin:0 0 .5rem;}
.card{display:block;width:100%;text-align:left;border:1px solid color-mix(in srgb,var(--g) 35%,transparent);border-left:3px solid var(--g);background:color-mix(in srgb,var(--g) 8%,var(--bg));border-radius:7px;padding:.45rem .55rem;margin:0 0 .35rem;cursor:pointer;}
.card:hover{background:color-mix(in srgb,var(--g) 18%,var(--bg));}
.card .ct{font-weight:600;font-size:.9rem;}
.card .cn{font-size:.8rem;color:var(--muted);margin-top:.15rem;line-height:1.35;}
.card .badge{float:right;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line2);border-radius:8px;padding:.05rem .35rem;}
.card.spinnable .ct::after{content:' ↻';color:var(--gold);font-size:.8rem;}
.empty{color:var(--muted);font-style:italic;padding:1rem;}
#tierNote{font-size:.8rem;color:var(--muted);margin:.2rem 0 .8rem;}
</style></head>
<body><div class="wrap">
<div class="top">
  <div><h1>Italian Cuisine</h1><div class="sub">Dishes, sauces & techniques · the all-in-one Italian cuisine reference</div></div>
  <div id="tierBar"><span class="tl">Tier</span>
    <button data-tier="1">Intro</button>
    <button data-tier="2" class="active">Next Level</button>
    <button data-tier="3">Master</button>
  </div>
  <div class="viewseg"><button data-view="all" class="active">All</button><button data-view="type">Types</button><button data-view="aroma">Aromas</button></div>
  <div id="search"><input id="q" type="search" placeholder="Search styles, terms, aromas…" autocomplete="off"></div>
</div>
<div id="tierNote"></div>
<div class="grid" id="grid"></div>
</div>
<script>
var CARDS=[{"name": "Spaghetti", "tier": 1, "group": "Pasta & Primi", "note": "The most recognized Italian pasta — long, round strands of durum-wheat semolina. The everyday backbone of Italian home cooking.", "wheel": "type", "color": "#b5302e", "slug": "spaghetti"}, {"name": "Lasagna", "tier": 1, "group": "Pasta & Primi", "note": "Layered baked pasta — flat sheets stacked with sauce, cheese, and often ragù or béchamel. A festive, Sunday-table classic.", "wheel": "type", "color": "#b5302e", "slug": "lasagna"}, {"name": "Fettuccine", "tier": 1, "group": "Pasta & Primi", "note": "Flat ribbon egg pasta, wider than tagliatelle; Roman, classic with butter and Parmigiano.", "wheel": "type", "color": "#b5302e", "slug": "fettuccine"}, {"name": "Penne", "tier": 1, "group": "Pasta & Primi", "note": "Quill-shaped tubes with ridges that grab sauce; the workhorse of baked and tossed dishes.", "wheel": "type", "color": "#b5302e", "slug": "penne"}, {"name": "Ravioli", "tier": 1, "group": "Pasta & Primi", "note": "Stuffed pasta pillows — fillings range from ricotta-spinach to meat or squash.", "wheel": "type", "color": "#b5302e", "slug": "ravioli"}, {"name": "Gnocchi", "tier": 1, "group": "Pasta & Primi", "note": "Soft potato-and-flour dumplings; pillowy, served with butter-sage or tomato.", "wheel": "type", "color": "#b5302e", "slug": "gnocchi"}, {"name": "Tortellini", "tier": 1, "group": "Pasta & Primi", "note": "Small ring-shaped stuffed pasta from Emilia, traditionally in capon broth (in brodo).", "wheel": "type", "color": "#b5302e", "slug": "tortellini"}, {"name": "Orecchiette", "tier": 1, "group": "Pasta & Primi", "note": "'Little ears' from Puglia; ideal with broccoli rabe and anchovy.", "wheel": "type", "color": "#b5302e", "slug": "orecchiette"}, {"name": "Bucatini", "tier": 1, "group": "Pasta & Primi", "note": "Thick hollow spaghetti; the canonical shape for amatriciana.", "wheel": "type", "color": "#b5302e", "slug": "bucatini"}, {"name": "Pici", "tier": 1, "group": "Pasta & Primi", "note": "Hand-rolled thick Tuscan noodles, like fat ungainly spaghetti; classic with cacio e pepe.", "wheel": "type", "color": "#b5302e", "slug": "pici"}, {"name": "Pizza Margherita", "tier": 1, "group": "Pizza & Bread", "note": "The defining Neapolitan pizza — tomato, mozzarella, basil. Said to honor Queen Margherita with the colors of the Italian flag.", "wheel": "type", "color": "#c75d2c", "slug": "pizza-margherita"}, {"name": "Pizza Marinara", "tier": 1, "group": "Pizza & Bread", "note": "Naples' purist pie — tomato, garlic, oregano, oil; no cheese.", "wheel": "type", "color": "#c75d2c", "slug": "pizza-marinara"}, {"name": "Calzone", "tier": 1, "group": "Pizza & Bread", "note": "Folded, sealed pizza turnover, typically stuffed with ricotta and salumi.", "wheel": "type", "color": "#c75d2c", "slug": "calzone"}, {"name": "Focaccia", "tier": 1, "group": "Pizza & Bread", "note": "Olive-oil-rich flatbread, dimpled and salted; Ligurian staple.", "wheel": "type", "color": "#c75d2c", "slug": "focaccia"}, {"name": "Piadina", "tier": 1, "group": "Pizza & Bread", "note": "Thin Romagnol griddle flatbread, folded around cured meats and squacquerone.", "wheel": "type", "color": "#c75d2c", "slug": "piadina"}, {"name": "Grissini", "tier": 1, "group": "Pizza & Bread", "note": "Crisp Turinese breadsticks, snapped at the table.", "wheel": "type", "color": "#c75d2c", "slug": "grissini"}, {"name": "Marinara", "tier": 1, "group": "Sauces", "note": "The foundational tomato sauce — tomatoes, garlic, olive oil, basil or oregano. Simple, bright, and the base for countless dishes.", "wheel": "type", "color": "#8a1f2e", "slug": "marinara"}, {"name": "Pesto", "tier": 1, "group": "Sauces", "note": "The famous green sauce — basil, pine nuts, garlic, Parmigiano/Pecorino, and olive oil, pounded together raw.", "wheel": "type", "color": "#8a1f2e", "slug": "pesto"}, {"name": "Bolognese (Ragù)", "tier": 1, "group": "Sauces", "note": "Slow-cooked meat ragù from Bologna; traditionally with tagliatelle, never spaghetti.", "wheel": "type", "color": "#8a1f2e", "slug": "bolognese-rag"}, {"name": "Pomodoro", "tier": 1, "group": "Sauces", "note": "Simple bright tomato sauce with basil and oil — the foundation sauce.", "wheel": "type", "color": "#8a1f2e", "slug": "pomodoro"}, {"name": "Arrabbiata", "tier": 1, "group": "Sauces", "note": "'Angry' tomato sauce spiked with peperoncino; Roman, with penne.", "wheel": "type", "color": "#8a1f2e", "slug": "arrabbiata"}, {"name": "Aglio e Olio", "tier": 1, "group": "Sauces", "note": "Garlic gently fried in olive oil with chili — minimalist, fast, spaghetti.", "wheel": "type", "color": "#8a1f2e", "slug": "aglio-e-olio"}, {"name": "Amatriciana", "tier": 1, "group": "Sauces", "note": "Guanciale, tomato, Pecorino; from Amatrice, classic on bucatini.", "wheel": "type", "color": "#8a1f2e", "slug": "amatriciana"}, {"name": "Carbonara (sauce)", "tier": 1, "group": "Sauces", "note": "Egg, Pecorino, guanciale, black pepper — no cream; emulsified by pasta water.", "wheel": "type", "color": "#8a1f2e", "slug": "carbonara-sauce"}, {"name": "Puttanesca", "tier": 1, "group": "Sauces", "note": "Tomato, olives, capers, anchovy, garlic — pungent and Neapolitan.", "wheel": "type", "color": "#8a1f2e", "slug": "puttanesca"}, {"name": "Cacio e Pepe (sauce)", "tier": 1, "group": "Sauces", "note": "Pecorino Romano and black pepper emulsified with starchy water — three ingredients.", "wheel": "type", "color": "#8a1f2e", "slug": "cacio-e-pepe-sauce"}, {"name": "Risotto", "tier": 1, "group": "Risotto & Rice", "note": "Creamy simmered rice — short-grain rice cooked slowly with broth until it releases its starch into a silky body.", "wheel": "type", "color": "#caa23b", "slug": "risotto"}, {"name": "Risotto alla Milanese", "tier": 1, "group": "Risotto & Rice", "note": "Saffron-gold risotto finished with butter and Parmigiano; the Osso Buco partner.", "wheel": "type", "color": "#caa23b", "slug": "risotto-alla-milanese"}, {"name": "Risotto ai Funghi", "tier": 1, "group": "Risotto & Rice", "note": "Mushroom risotto, often porcini, earthy and creamy.", "wheel": "type", "color": "#caa23b", "slug": "risotto-ai-funghi"}, {"name": "Arancini", "tier": 1, "group": "Risotto & Rice", "note": "Fried stuffed rice balls from Sicily — saffron rice around ragù or mozzarella.", "wheel": "type", "color": "#caa23b", "slug": "arancini"}, {"name": "Risi e Bisi", "tier": 1, "group": "Risotto & Rice", "note": "Venetian rice-and-peas, looser than risotto, a spring dish.", "wheel": "type", "color": "#caa23b", "slug": "risi-e-bisi"}, {"name": "Chicken Parmigiana", "tier": 1, "group": "Secondi (Mains)", "note": "Breaded cutlet baked with tomato sauce and melted cheese. Hugely popular abroad; rooted in the Italian *parmigiana* tradition.", "wheel": "type", "color": "#6e3b2a", "slug": "chicken-parmigiana"}, {"name": "Osso Buco", "tier": 1, "group": "Secondi (Mains)", "note": "Braised veal shank in white wine and broth; served with gremolata and Milanese risotto.", "wheel": "type", "color": "#6e3b2a", "slug": "osso-buco"}, {"name": "Saltimbocca", "tier": 1, "group": "Secondi (Mains)", "note": "Veal scaloppine with prosciutto and sage, pan-fried — 'jumps in the mouth.'", "wheel": "type", "color": "#6e3b2a", "slug": "saltimbocca"}, {"name": "Chicken Piccata", "tier": 1, "group": "Secondi (Mains)", "note": "Pan-seared cutlets in lemon-butter-caper sauce.", "wheel": "type", "color": "#6e3b2a", "slug": "chicken-piccata"}, {"name": "Bistecca alla Fiorentina", "tier": 1, "group": "Secondi (Mains)", "note": "Thick T-bone of Chianina beef, grilled rare over wood.", "wheel": "type", "color": "#6e3b2a", "slug": "bistecca-alla-fiorentina"}, {"name": "Cotoletta alla Milanese", "tier": 1, "group": "Secondi (Mains)", "note": "Bone-in veal cutlet, breaded and fried in butter.", "wheel": "type", "color": "#6e3b2a", "slug": "cotoletta-alla-milanese"}, {"name": "Vitello Tonnato", "tier": 1, "group": "Secondi (Mains)", "note": "Cold sliced veal under a creamy tuna-caper sauce; Piedmontese.", "wheel": "type", "color": "#6e3b2a", "slug": "vitello-tonnato"}, {"name": "Brasato", "tier": 1, "group": "Secondi (Mains)", "note": "Beef braised long in red wine (often Barolo) until spoon-tender.", "wheel": "type", "color": "#6e3b2a", "slug": "brasato"}, {"name": "Bruschetta", "tier": 1, "group": "Antipasti & Salumi", "note": "Grilled bread rubbed with garlic and olive oil — the simplest antipasto, often topped with tomato and basil.", "wheel": "type", "color": "#7a8b3a", "slug": "bruschetta"}, {"name": "Prosciutto", "tier": 1, "group": "Antipasti & Salumi", "note": "Italy's iconic dry-cured ham — salted and air-dried for months to a silky, sweet-savory slice.", "wheel": "type", "color": "#7a8b3a", "slug": "prosciutto"}, {"name": "Caprese", "tier": 1, "group": "Antipasti & Salumi", "note": "Mozzarella, tomato, basil, oil — the colors of the flag; from Capri.", "wheel": "type", "color": "#7a8b3a", "slug": "caprese"}, {"name": "Carpaccio", "tier": 1, "group": "Antipasti & Salumi", "note": "Raw beef sliced paper-thin with oil, lemon, Parmigiano; invented at Harry's Bar.", "wheel": "type", "color": "#7a8b3a", "slug": "carpaccio"}, {"name": "Burrata", "tier": 1, "group": "Antipasti & Salumi", "note": "Fresh mozzarella pouch filled with stracciatella and cream; oozes when cut.", "wheel": "type", "color": "#7a8b3a", "slug": "burrata"}, {"name": "'Nduja", "tier": 1, "group": "Antipasti & Salumi", "note": "Spreadable spicy fermented pork sausage from Calabria.", "wheel": "type", "color": "#7a8b3a", "slug": "nduja"}, {"name": "Giardiniera", "tier": 1, "group": "Antipasti & Salumi", "note": "Crunchy pickled vegetables; antipasto and condiment.", "wheel": "type", "color": "#7a8b3a", "slug": "giardiniera"}, {"name": "Tiramisu", "tier": 1, "group": "Dolci (Sweets)", "note": "The famous coffee-and-mascarpone dessert — espresso-soaked ladyfingers layered with sweet mascarpone cream and cocoa.", "wheel": "type", "color": "#9c5a8f", "slug": "tiramisu"}, {"name": "Gelato", "tier": 1, "group": "Dolci (Sweets)", "note": "Italian frozen custard/sorbet — denser and lower in fat than ice cream, served warmer so flavors read intensely.", "wheel": "type", "color": "#9c5a8f", "slug": "gelato"}, {"name": "Panna Cotta", "tier": 1, "group": "Dolci (Sweets)", "note": "'Cooked cream' set with gelatin; silky, with berry or caramel.", "wheel": "type", "color": "#9c5a8f", "slug": "panna-cotta"}, {"name": "Cannoli", "tier": 1, "group": "Dolci (Sweets)", "note": "Crisp fried Sicilian shells filled with sweet ricotta.", "wheel": "type", "color": "#9c5a8f", "slug": "cannoli"}, {"name": "Affogato", "tier": 1, "group": "Dolci (Sweets)", "note": "Vanilla gelato 'drowned' in a shot of hot espresso.", "wheel": "type", "color": "#9c5a8f", "slug": "affogato"}, {"name": "Zabaglione", "tier": 1, "group": "Dolci (Sweets)", "note": "Warm whipped custard of egg yolks, sugar, and Marsala.", "wheel": "type", "color": "#9c5a8f", "slug": "zabaglione"}, {"name": "Sfogliatella", "tier": 1, "group": "Dolci (Sweets)", "note": "Neapolitan shell pastry of crisp layered dough with citrus-ricotta.", "wheel": "type", "color": "#9c5a8f", "slug": "sfogliatella"}, {"name": "Panettone", "tier": 1, "group": "Dolci (Sweets)", "note": "Tall airy Milanese Christmas bread with candied fruit, long-leavened.", "wheel": "type", "color": "#9c5a8f", "slug": "panettone"}, {"name": "Al Dente", "tier": 1, "group": "Techniques & Traditions", "note": "'To the tooth' — pasta (or rice) cooked until just firm at the center, never mushy. The single most important Italian cooking rule.", "wheel": "type", "color": "#4f6b7a", "slug": "al-dente"}, {"name": "Soffritto", "tier": 1, "group": "Techniques & Traditions", "note": "The aromatic base — onion, carrot, celery slowly sweated in oil; start of countless dishes.", "wheel": "type", "color": "#4f6b7a", "slug": "soffritto"}, {"name": "Mantecatura", "tier": 1, "group": "Techniques & Traditions", "note": "Finishing risotto off-heat with cold butter and cheese for creaminess.", "wheel": "type", "color": "#4f6b7a", "slug": "mantecatura"}, {"name": "Braising", "tier": 1, "group": "Techniques & Traditions", "note": "Slow moist cooking in liquid that turns tough cuts tender (brasato, osso buco).", "wheel": "type", "color": "#4f6b7a", "slug": "braising"}, {"name": "Pasta all'uovo", "tier": 1, "group": "Techniques & Traditions", "note": "Fresh egg pasta of soft flour and eggs; the northern tradition (tagliatelle, ravioli).", "wheel": "type", "color": "#4f6b7a", "slug": "pasta-all-uovo"}, {"name": "La Scarpetta", "tier": 1, "group": "Techniques & Traditions", "note": "'The little shoe' — mopping the last sauce with bread; affectionate, not rude.", "wheel": "type", "color": "#4f6b7a", "slug": "la-scarpetta"}];
var TIER=2, VIEW='all', Q='';
var TIERNAME={1:'Intro',2:'Next Level',3:'Master'};
function visible(c){
  if(c.tier>TIER) return false;
  if(VIEW!=='all' && c.wheel!==VIEW) return false;
  if(Q){ var s=(c.name+' '+c.group+' '+c.note).toLowerCase(); if(s.indexOf(Q)<0) return false; }
  return true;
}
function slugify(s){ return s.toLowerCase().replace(/\(.*?\)/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function render(){
  var grid=document.getElementById('grid'); grid.innerHTML='';
  // group visible cards by group
  var groups={};
  CARDS.filter(visible).forEach(function(c){ (groups[c.group]=groups[c.group]||[]).push(c); });
  // Aromas & tasting notes always come first, then the other (type/style/service) groups.
  var order=Object.keys(groups).sort(function(a,b){
    var aw=(groups[a][0].wheel==='aroma')?0:1, bw=(groups[b][0].wheel==='aroma')?0:1;
    return aw-bw; // stable-ish: aroma groups (0) before type groups (1)
  });
  if(!order.length){ grid.innerHTML='<div class="empty">Nothing at this tier/filter.</div>'; updateNote(0); return; }
  var shown=0;
  order.forEach(function(g){
    var color=groups[g][0].color;
    var block=document.createElement('div'); block.className='gcard'; block.style.setProperty('--g',color);
    var head=document.createElement('div'); head.className='ghead'; head.textContent=g; block.appendChild(head);
    groups[g].forEach(function(c){
      shown++;
      var card=document.createElement('button'); card.type='button'; card.className='card';
      card.style.setProperty('--g',color);
      card.setAttribute('data-title', c.name); card.setAttribute('data-slug', slugify(c.name)); if(c.slug)card.setAttribute('data-wheelslug', c.slug);
      // per-card tier label removed — the tier toggle already conveys this
      card.innerHTML='<div class="ct">'+c.name+'</div><div class="cn">'+c.note+'</div>';
      block.appendChild(card);
    });
    grid.appendChild(block);
  });
  updateNote(shown);
  applyWheelNames();
}
function updateNote(n){
  var locked=CARDS.filter(function(c){return c.tier>TIER;}).length;
  var t=document.getElementById('tierNote');
  t.textContent=TIERNAME[TIER]+' view · '+n+' entries shown'+(locked? ' · '+locked+' more unlock at higher tiers':'');
}
// tier + view + search wiring
document.querySelectorAll('#tierBar button').forEach(function(b){ b.addEventListener('click',function(){
  document.querySelectorAll('#tierBar button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
  TIER=parseInt(b.getAttribute('data-tier')); render();
}); });
document.querySelectorAll('.viewseg button').forEach(function(b){ b.addEventListener('click',function(){
  document.querySelectorAll('.viewseg button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
  VIEW=b.getAttribute('data-view'); render();
}); });
document.getElementById('q').addEventListener('input',function(e){ Q=e.target.value.trim().toLowerCase(); render(); });

// ---- click-to-spin: tell the parent wheel to spin to this term (by NAME; wheel resolves) ----
function postSpin(name){ try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_SPIN_TO',slug:name},'*'); } }catch(e){} }
document.addEventListener('click',function(e){
  var card=e.target.closest&&e.target.closest('.card');
  if(card){ postSpin(card.getAttribute('data-wheelslug')||card.getAttribute('data-title')); }
});
// announce ready; receive wheel names to mark spinnable + resolve
try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_SHEET_READY'},'*'); } }catch(e){}
var WHEEL_NAMES={};
window.addEventListener('message',function(e){ var d=e.data; if(!d)return;
  if(d.type==='LS_WHEEL_NAMES'){ WHEEL_NAMES=d.names||{}; applyWheelNames(); }
  if(d.type==='LS_CMD' && d.cmd==='tier'){ var bt=document.querySelector('#tierBar [data-tier="'+(d.value||2)+'"]'); if(bt)bt.click(); }
});
function applyWheelNames(){
  document.querySelectorAll('.card').forEach(function(card){
    var title=(card.getAttribute('data-title')||'').toLowerCase().trim();
    var ws=null;
    if(WHEEL_NAMES[title]) ws=WHEEL_NAMES[title];
    else for(var nm in WHEEL_NAMES){ if(nm===title||(title&&(nm.indexOf(title)>=0||title.indexOf(nm)>=0))){ ws=WHEEL_NAMES[nm]; break; } }
    if(ws){ card.setAttribute('data-wheelslug',ws); card.classList.add('spinnable'); }
  });
}
render();
</script><script id="lsFontApply">
(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
</body></html>
