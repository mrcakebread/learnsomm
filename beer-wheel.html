/* geometry */
function polarToCart(r,a){return[r*Math.cos(a),r*Math.sin(a)];}
function arcRing(r1,r2,a1,a2){const[sx1,sy1]=polarToCart(r1,a1),[ex1,ey1]=polarToCart(r1,a2),[sx2,sy2]=polarToCart(r2,a1),[ex2,ey2]=polarToCart(r2,a2);const lg=a2-a1>Math.PI?1:0;return `M ${sx1} ${sy1} A ${r1} ${r1} 0 ${lg} 1 ${ex1} ${ey1} L ${ex2} ${ey2} A ${r2} ${r2} 0 ${lg} 0 ${sx2} ${sy2} Z`;}
function arcLabelPath(r,a1,a2,rev){const lg=Math.abs(a2-a1)>Math.PI?1:0;if(rev){const[sx,sy]=polarToCart(r,a2),[ex,ey]=polarToCart(r,a1);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 0 ${ex} ${ey}`;}const[sx,sy]=polarToCart(r,a1),[ex,ey]=polarToCart(r,a2);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 1 ${ex} ${ey}`;}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function textOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)>150?'#1c2118':'#f3f3ee';}
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

const REGISTRY={};
const R_IN=62,R_CAT=140,R_SUB=210,R_OUT=300;
let defsEl,gEl;
function buildWheel(){
  const total=DATA.categories.reduce((n,c)=>n+c.sub.reduce((m,s)=>m+s.descriptors.length,0),0);
  const perItem=TWO_PI/total;
  defsEl=el('defs',{});svg.appendChild(defsEl);
  gEl=el('g',{id:'wheelG'});
  let a=-Math.PI/2,gradN=0;
  DATA.categories.forEach((cat,ci)=>{
    const catItems=cat.sub.reduce((m,s)=>m+s.descriptors.length,0);
    const catSpan=catItems*perItem,catStart=a,catEnd=a+catSpan,catMid=catStart+catSpan/2;
    gEl.appendChild(el('path',{d:arcRing(R_IN,R_CAT,catStart,catEnd),fill:cat.color,'class':'cell'}));
    cat._mid=catMid;cat._span=catSpan;
    cat.sub.forEach(sub=>{
      const subSpan=sub.descriptors.length*perItem,subStart=a,subEnd=a+subSpan,subMid=subStart+subSpan/2;
      if(!sub._implicit)gEl.appendChild(el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:sub.color,'class':'cell'}));
      else gEl.appendChild(el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:lighten(cat.color,8),'class':'cell'}));
      sub._mid=subMid;sub._span=subSpan;sub._cat=cat;
      sub.descriptors.forEach(desc=>{
        const s1=a,s2=a+perItem,m=a+perItem/2;
        const gid='pg'+(gradN++);
        const grad=el('radialGradient',{id:gid,gradientUnits:'userSpaceOnUse',cx:'0',cy:'0',r:R_OUT});
        grad.appendChild(el('stop',{offset:'55%','stop-color':lighten(sub.color,20)}));
        grad.appendChild(el('stop',{offset:'100%','stop-color':lighten(sub.color,44)}));
        defsEl.appendChild(grad);
        const p=el('path',{d:arcRing(R_SUB,R_OUT,s1,s2),fill:`url(#${gid})`,'class':'cell desc-seg','data-slug':desc.slug});
        p.addEventListener('click',()=>selectItem(desc.slug));
        gEl.appendChild(p);
        REGISTRY[desc.slug]={desc,sub,cat,segEl:p,chipEl:null,_mid:m,_fill:lighten(sub.color,30)};
        a+=perItem;
      });
    });
  });
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_IN,'class':'hub'}));
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_OUT+4,'class':'rim'}));
  const ys=['-19','-5','8','22'],fs=['7.5','10','7','6'];
  HUB.forEach((txt,i)=>{const a={'text-anchor':'middle',y:ys[i],'font-size':fs[i],'class':'hub-text','font-family':"var(--display)",'letter-spacing':i===3?'2.4':'.5'};if(i===0)a['font-style']='italic';if(i===1||i===2)a['font-weight']='bold';const tt=el('text',a);tt.textContent=txt;tt.style.pointerEvents='none';gEl.appendChild(tt);});
  svg.appendChild(gEl);
  renderLabels();
}

let labelEls=[];let descLabels=[];var READ_SIDE='right';
function renderLabels(){
  labelEls.forEach(e=>e.remove());labelEls=[];descLabels=[];
  DATA.categories.forEach((cat,ci)=>{
    const name=tx(cat,'name').toUpperCase();
    const labR=(R_IN+R_CAT)/2,arcLen=cat._span*labR,estW=name.length*5.0;
    if(arcLen>estW+8){
      const flip=Math.sin(cat._mid)>0,pid='catArc'+ci;
      const existing=defsEl.querySelector('#'+pid);if(existing)existing.remove();
      defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?labR-2:labR+2,cat._mid-cat._span/2,cat._mid+cat._span/2,flip)}));
      const tt=el('text',{'font-size':'7','letter-spacing':'1','font-family':"var(--display)",'font-weight':'bold',fill:cat.textColor||'#fff','dominant-baseline':'middle'});
      const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=name;
      tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }else{
      let deg=cat._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
      const[lx,ly]=polarToCart(labR,cat._mid);
      const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'5','letter-spacing':'.3',fill:cat.textColor||'#fff','font-family':"var(--display)",'font-weight':'bold',transform:`rotate(${deg},${lx},${ly})`});
      const w=name.split(' ');
      if(w.length>1){const t1=el('tspan',{x:lx,dy:'-2.6'});t1.textContent=w[0];const t2=el('tspan',{x:lx,dy:'5.2'});t2.textContent=w.slice(1).join(' ');tt.appendChild(t1);tt.appendChild(t2);}else tt.textContent=name;
      tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }
    cat.sub.forEach((sub,si)=>{
      if(!sub._implicit){
        const subName=tx(sub,'name').toUpperCase(),subLabR=(R_CAT+R_SUB)/2,subArc=sub._span*subLabR;
        if(subArc>subName.length*4+6){
          const flip=Math.sin(sub._mid)>0,pid='subArc'+ci+'_'+si;
          const ex=defsEl.querySelector('#'+pid);if(ex)ex.remove();
          defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?subLabR-1.5:subLabR+1.5,sub._mid-sub._span/2,sub._mid+sub._span/2,flip)}));
          const tt=el('text',{'font-size':'4.6','font-family':"var(--display)",fill:textOn(sub.color),'dominant-baseline':'middle'});
          const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=subName;
          tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }else{
          let deg=sub._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
          const[lx,ly]=polarToCart(subLabR,sub._mid);
          const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'4.2',fill:textOn(sub.color),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
          tt.textContent=subName;tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }
      }
      sub.descriptors.forEach(desc=>{
        const reg=REGISTRY[desc.slug];const m=reg._mid;
        const theta=m*180/Math.PI;                 // raw radial angle (0=3 o'clock)
        const deg=(READ_SIDE==='left')?theta+180:theta;  // flip whole wheel for left-read; reading side stays upright
        const[lx,ly]=polarToCart((R_SUB+R_OUT)/2,m);
        const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'6','letter-spacing':'.2',fill:textOn(reg._fill),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
        const nm=tx(desc,'name').toUpperCase();
        const availR=(R_OUT-R_SUB)-12;
        const fitFs=Math.max(3.4,Math.min(6,availR/(nm.length*0.56)));
        tt.setAttribute('font-size',fitFs.toFixed(2));
        tt.textContent=nm;
        tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        descLabels.push({el:tt,lx:lx,ly:ly,theta:theta});
      });
    });
  });
}

/* wiki */
function wikiUrl(slug,name){const t=WIKI_TITLES[name]||WIKI_TITLES[slug]||(name.charAt(0).toUpperCase()+name.slice(1).toLowerCase());const host=lang==='es'?'es.wikipedia.org':'en.wikipedia.org';return 'https://'+host+'/wiki/'+encodeURIComponent(t.replace(/ /g,'_'));}
function headingHtml(slug,name){return `<h2><a href="${wikiUrl(slug,name)}" target="_blank" rel="noopener noreferrer">${name}<span class="wiki-mark">↗</span></a></h2>`;}


/* === FUN FACTS — beginner intro per category (sub-level for wine). Prefer descriptor>sub>category. === */
const FUN_FACTS = {"AROMATIC, FRUITY, FLORAL": {"en": "These are the <b>good smells</b> beer is supposed to have — esters from yeast (banana, pear), hops (citrus, pine, floral), and gentle alcohols. In small doses they're the soul of the beer; in big doses they can mean a stressed, too-warm fermentation.", "es": "Estos son los <b>buenos aromas</b> que la cerveza debe tener — ésteres de la levadura (plátano, pera), lúpulo (cítrico, pino, floral) y alcoholes suaves. En dosis pequeñas son el alma de la cerveza; en exceso pueden indicar una fermentación estresada o demasiado cálida."}, "VEGETAL": {"en": "Grassy, hay-like, or cooked-veg notes. A little fresh-cut grass from hops is fine; <b>cooked corn or cabbage usually points to a process fault</b> (DMS from a weak boil, or oxidation).", "es": "Notas a pasto, heno o verdura cocida. Un poco de pasto recién cortado del lúpulo está bien; <b>el elote o la col cocida suele señalar un defecto de proceso</b> (DMS por un hervor débil, u oxidación)."}, "CEREAL": {"en": "The bready, grainy, malty backbone — raw grain, malt, wort, even cooked-corn adjunct. This is the <b>foundation flavor</b> every beer is built on before hops and yeast add their layers.", "es": "La columna a pan, grano y malta — grano crudo, malta, mosto, incluso elote de adjuntos. Es el <b>sabor base</b> sobre el que se construye toda cerveza antes de que el lúpulo y la levadura añadan sus capas."}, "MAILLARD": {"en": "Toast, caramel, toffee, coffee, chocolate, roast — all from the <b>Maillard browning</b> of malt in the kiln and kettle. The darker the malt, the deeper these go; they define amber ales, stouts, and porters.", "es": "Tostado, caramelo, toffee, café, chocolate, torrefacto — todo del <b>dorado de Maillard</b> de la malta en el horno y la olla. Cuanto más oscura la malta, más profundo; definen las ales ámbar, las stouts y las porters."}, "PHENOLIC": {"en": "Clove, smoke, spice, medicinal, or band-aid. <b>Clove and pepper are prized in Belgians and Hefeweizens</b> (the yeast makes them on purpose); plastic or medicinal phenols are a fault from wild yeast or chlorinated water.", "es": "Clavo, humo, especia, medicinal o curita. <b>El clavo y la pimienta se aprecian en belgas y Hefeweizens</b> (la levadura los crea a propósito); los fenoles a plástico o medicinales son un defecto de levadura silvestre o agua clorada."}, "FATTY": {"en": "Buttery, cheesy, soapy, or oily textures. <b>Diacetyl (movie-theater butter) is the classic one</b> — a normal fermentation byproduct that good yeast cleans up; if it lingers, the beer was rushed off the yeast.", "es": "Texturas mantecosas, a queso, jabonosas o aceitosas. <b>El diacetilo (mantequilla de cine) es el clásico</b> — un subproducto normal de la fermentación que la buena levadura limpia; si persiste, la cerveza se separó de la levadura demasiado pronto."}, "SULFURY": {"en": "Rotten egg, struck match, cooked veg, or canned corn. Trace sulfur is normal in fresh lager and blows off; <b>strong or lasting sulfur is usually a fermentation or DMS fault</b>.", "es": "Huevo podrido, cerillo encendido, verdura cocida o elote enlatado. El azufre traza es normal en la lager fresca y se disipa; <b>el azufre fuerte o persistente suele ser un defecto de fermentación o DMS</b>."}, "STALE": {"en": "Cardboard, papery, sherry-like, leathery. This is <b>oxidation — the #1 sign of an old or badly stored beer</b>. Trans-2-nonenal gives the wet-cardboard note; light + heat + air speed it up.", "es": "Cartón, papel, tipo jerez, cuero. Esto es <b>oxidación — la señal #1 de una cerveza vieja o mal almacenada</b>. El trans-2-nonenal da la nota a cartón mojado; luz, calor y aire la aceleran."}, "ACIDIC": {"en": "Sour, tart, vinegary, or acetic. <b>Deliberate and delicious in sours, lambics, and goses</b> (lactic & acetic bacteria); an unwelcome vinegar tang in any other style means contamination.", "es": "Ácido, agrio, avinagrado o acético. <b>Deliberado y delicioso en sours, lambics y goses</b> (bacterias lácticas y acéticas); un toque a vinagre en cualquier otro estilo significa contaminación."}, "SWEET": {"en": "Honey, candy, syrupy, or just plain sugary. Comes from <b>unfermented residual malt sugar</b>. Balanced by hop bitterness and carbonation; too much with no balance reads as cloying or under-attenuated.", "es": "Miel, dulce, jarabe o simplemente azucarado. Viene del <b>azúcar de malta residual sin fermentar</b>. Se equilibra con el amargor del lúpulo y la carbonatación; demasiado sin equilibrio resulta empalagoso o poco atenuado."}, "MOUTHFEEL": {"en": "Not a taste at all — what the beer <b>physically feels like</b>: carbonation prickle, warming alcohol, astringency (that tea-like grip), body, and creaminess. Often what separates a great beer from a good one.", "es": "No es un sabor — es lo que la cerveza <b>se siente físicamente</b>: el cosquilleo de la carbonatación, el calor del alcohol, la astringencia (ese agarre tipo té), el cuerpo y la cremosidad. A menudo es lo que separa una gran cerveza de una buena."}, "FULLNESS": {"en": "How <b>big or thin the beer feels</b> on the palate — from watery to full and chewy. Driven by unfermented dextrins, proteins, and glycerol. A light lager and an imperial stout sit at opposite ends.", "es": "Qué tan <b>grande o ligera se siente la cerveza</b> en el paladar — de aguada a llena y masticable. Impulsada por dextrinas sin fermentar, proteínas y glicerol. Una lager ligera y una imperial stout están en extremos opuestos."}};
function funFactFor(slug){
  const reg=REGISTRY[slug]; if(!reg) return null;
  const tryKeys=[reg.cat&&reg.cat.name, reg.sub&&reg.sub.name];
  for(const k of tryKeys){ if(k&&FUN_FACTS[k]) return FUN_FACTS[k]; }
  return null;
}

function showDetail(slug){
  currentSlug=slug;
  const d=DESCRIPTIONS[slug],reg=REGISTRY[slug];
  const name=reg?tx(reg.desc,'name'):slug;
  if(!d){detail.innerHTML=`${headingHtml(slug,name)}<div class="category-tag"></div><div class="body-text">${t('inProgress').replace('{n}',name)}</div>`;return;}
  const tag=tx(d,'cat');
  let html=headingHtml(slug,name)+`<div class="category-tag">${tag}</div>`;
  const ff=funFactFor(slug);
  if(ff){const fft=(lang==='es'&&ff.es)?ff.es:ff.en;html+=`<div class="funfact"><span class="ff-label">${lang==='es'?'Dato':'Fun Fact'}</span>${fft}</div>`;}
  const sec=(key,field)=>{const v=tx(d,field);if(v)html+=`<div class="section-title">${t(key)}</div><div class="body-text">${v}</div>`;};
  sec('origin','origin');sec('chemistry','chemistry');sec('pairing','pairing');sec('mixology','mixology');sec('examples','examples');
  const fl=tx(d,'flag');if(fl)html+=`<div class="flag-note">${fl}</div>`;

  detail.innerHTML=html;
}

function selectItem(slug){
  const e=REGISTRY[slug];if(!e)return;
  if(selectedPath)selectedPath.classList.remove('selected');
  document.querySelectorAll('.list-chip.selected').forEach(c=>c.classList.remove('selected'));
  if(e.segEl){e.segEl.classList.add('selected');selectedPath=e.segEl;}
  if(e.chipEl)e.chipEl.classList.add('selected');
  showDetail(slug);
}

/* list */
const wheelWrap=document.getElementById('wheelWrap'),listView=document.getElementById('listView'),listBody=document.getElementById('listBody'),listSearch=document.getElementById('listSearch'),noResults=document.getElementById('noResults'),sizeCtl=document.getElementById('sizeCtl'),viewWheelBtn=document.getElementById('viewWheel'),viewListBtn=document.getElementById('viewList');
function rebuildList(){listBody.innerHTML='';for(const k in REGISTRY)REGISTRY[k].chipEl=null;buildList();const q=listSearch.value;if(q){listSearch.dispatchEvent(new Event('input'));}}
function buildList(){
  DATA.categories.forEach(cat=>{
    const block=document.createElement('div');block.className='cat-block';
    const head=document.createElement('div');head.className='cat-head';
    const dot=document.createElement('span');dot.className='cat-dot';dot.style.background=cat.color;
    head.appendChild(dot);head.appendChild(document.createTextNode(tx(cat,'name')));block.appendChild(head);
    cat.sub.forEach(sub=>{
      const grp=document.createElement('div');grp.className='sub-group';
      const hdr=document.createElement('button');hdr.type='button';hdr.className='sub-toggle';
      const cnt=sub.descriptors.length;
      const hname=sub._implicit?(tx(cat,'name')+' \u00b7 '+cnt):(tx(sub,'name')+' \u00b7 '+cnt);
      hdr.innerHTML='<span class="sub-caret">\u25b8</span><span class="sub-name">'+hname+'</span>';
      hdr.addEventListener('click',()=>{grp.classList.toggle('expanded');});
      grp.appendChild(hdr);
      const row=document.createElement('div');row.className='chip-row';
      sub.descriptors.forEach(desc=>{
        const chip=document.createElement('button');chip.type='button';chip.className='list-chip';chip.textContent=tx(desc,'name');chip.dataset.slug=desc.slug;
        chip.dataset.search=(tx(desc,'name')+' '+tx(sub,'name')+' '+tx(cat,'name')).toLowerCase();
        chip.addEventListener('click',()=>selectItem(desc.slug));
        if(REGISTRY[desc.slug])REGISTRY[desc.slug].chipEl=chip;
        if(currentSlug===desc.slug){chip.classList.add('selected');grp.classList.add('expanded');}
        row.appendChild(chip);
      });
      grp.appendChild(row);block.appendChild(grp);
    });
    listBody.appendChild(block);
  });
}
listSearch.addEventListener('input',()=>{
  const q=listSearch.value.trim().toLowerCase();let any=false;
  listBody.classList.toggle('searching',!!q);
  listBody.querySelectorAll('.cat-block').forEach(block=>{let bHas=false;
    block.querySelectorAll('.sub-group').forEach(grp=>{let gHas=false;
      grp.querySelectorAll('.list-chip').forEach(ch=>{const show=!q||ch.dataset.search.includes(q);ch.style.display=show?'':'none';if(show)gHas=true;});
      grp.classList.toggle('hit',!!q&&gHas);
      grp.style.display=(q&&!gHas)?'none':'';if(gHas)bHas=true;});
    block.style.display=bHas?'':'none';if(bHas)any=true;});
  noResults.style.display=any?'none':'block';
});
function setView(v){
  const list=(v==='list');
  document.body.dataset.view=v;
  listView.classList.toggle('active',list);
  wheelWrap.style.display=list?'none':'';
  sizeCtl.style.display=list?'none':'flex';
  viewListBtn.classList.toggle('active',list);
  viewWheelBtn.classList.toggle('active',!list);
  
  // Set attribute on body to trigger the correct Fog Overlay
  document.body.setAttribute('data-view', v);

  if(list)listSearch.focus();
  try{localStorage.setItem(SUBJECT+'View',v);}catch(e){}
}
viewWheelBtn.addEventListener('click',()=>setView('wheel'));
viewListBtn.addEventListener('click',()=>setView('list'));

/* spin */
function getAngle(e,rect){const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;const x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;return Math.atan2(y-cy,x-cx);}
function applyRotation(){if(gEl)gEl.setAttribute('transform',`rotate(${rotation*180/Math.PI})`);}
function momentum(){
  if(!isDragging&&Math.abs(velocity)>0.001){
    rotation+=velocity;
    velocity*=0.96;
    applyRotation();
    animFrame=requestAnimationFrame(momentum);
  }
}

// User dragging/spinning is totally free! No point consumption.
svg.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('desc-seg'))return; 
  isDragging=true;
  const r=svg.getBoundingClientRect();lastAngle=getAngle(e,r);lastTime=Date.now();velocity=0;if(animFrame)cancelAnimationFrame(animFrame);
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const r=svg.getBoundingClientRect();const an=getAngle(e,r),dl=an-lastAngle,now=Date.now();velocity=dl/Math.max(1,now-lastTime)*16;
  rotation+=dl;lastAngle=an;lastTime=now;
  applyRotation();
});
window.addEventListener('mouseup',()=>{
  if(!isDragging)return;
  isDragging=false;
  animFrame=requestAnimationFrame(momentum);
});

svg.addEventListener('touchstart',e=>{
  if(e.touches.length===2){e.preventDefault();isDragging=false;pinching=true;pinchDist0=touchDist(e);pinchSize0=wheelSize;if(animFrame)cancelAnimationFrame(animFrame);return;}
  if(e.target.classList.contains('desc-seg'))return;
  e.preventDefault();
  isDragging=true;
  const r=svg.getBoundingClientRect();lastAngle=getAngle(e,r);lastTime=Date.now();velocity=0;if(animFrame)cancelAnimationFrame(animFrame);
},{passive:false});
svg.addEventListener('touchmove',e=>{
  if(pinching&&e.touches.length===2){e.preventDefault();setWheelSize(pinchSize0*touchDist(e)/Math.max(1,pinchDist0));return;}
  if(!isDragging)return;
  e.preventDefault();const r=svg.getBoundingClientRect();const an=getAngle(e,r),dl=an-lastAngle,now=Date.now();velocity=dl/Math.max(1,now-lastTime)*16;
  rotation+=dl;lastAngle=an;lastTime=now;
  applyRotation();
},{passive:false});

  if(e.touches.length<2)pinching=false;
  if(!isDragging)return;

});

/* sizing */
const zoomSlider=document.getElementById('zoomSlider');let wheelSize=1360,pinching=false,pinchDist0=1,pinchSize0=560;
function touchDist(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
function setWheelSize(px){wheelSize=Math.min(2200,Math.max(280,Math.round(px)));svg.setAttribute('width',wheelSize);svg.setAttribute('height',wheelSize);zoomSlider.value=wheelSize;}
document.getElementById('zoomIn').addEventListener('click',()=>setWheelSize(wheelSize*1.12));
document.getElementById('zoomOut').addEventListener('click',()=>setWheelSize(wheelSize*0.9));
document.getElementById('zoomReset').addEventListener('click',()=>setWheelSize(Math.max(980,Math.min(1520,Math.round(window.innerWidth*1.05)))));
zoomSlider.addEventListener('input',()=>setWheelSize(+zoomSlider.value));
svg.addEventListener('wheel',e=>{e.preventDefault();setWheelSize(wheelSize*(e.deltaY<0?1.07:0.93));},{passive:false});

/* movable panel */
const grip=document.getElementById('panelGrip'),dockBtn=document.getElementById('panelDock');let pDrag=null;
grip.addEventListener('pointerdown',e=>{if(e.target===dockBtn)return;const r=panel.getBoundingClientRect();if(!panel.classList.contains('floating')){panel.classList.add('floating');panel.style.left=r.left+'px';panel.style.top=r.top+'px';}pDrag={dx:e.clientX-r.left,dy:e.clientY-r.top};grip.setPointerCapture(e.pointerId);e.preventDefault();});
grip.addEventListener('pointermove',e=>{if(!pDrag)return;const w=panel.offsetWidth;const x=Math.min(Math.max(4,e.clientX-pDrag.dx),Math.max(4,window.innerWidth-w-4));const y=Math.min(Math.max(4,e.clientY-pDrag.dy),window.innerHeight-56);panel.style.left=x+'px';panel.style.top=y+'px';});
grip.addEventListener('pointerup',()=>{pDrag=null;});grip.addEventListener('pointercancel',()=>{pDrag=null;});
dockBtn.addEventListener('click',()=>{panel.classList.remove('floating');panel.style.left='';panel.style.top='';});
window.addEventListener('resize',()=>{if(panel.classList.contains('floating')){const r=panel.getBoundingClientRect();if(r.right>window.innerWidth||r.bottom>window.innerHeight){panel.style.left=Math.max(4,window.innerWidth-panel.offsetWidth-4)+'px';panel.style.top=Math.max(4,Math.min(parseFloat(panel.style.top)||4,window.innerHeight-80))+'px';}}});

function applyLogo(){
  const th=document.documentElement.getAttribute('data-theme');
  const srcL=(th==='dark')?(LOGO_DARK||LOGO_DARK_FILE):(LOGO_LIGHT||LOGO_LIGHT_FILE);
  if(srcL){hubLogoImg.src=srcL;hubLogoImg.style.display='block';document.getElementById('svgContainer').classList.add('has-logo');}
  else{hubLogoImg.style.display='none';document.getElementById('svgContainer').classList.remove('has-logo');}
}
function splitTwo(n){
  const w=n.split(' ');if(w.length<2)return[n];
  const mid=Math.ceil(w.length/2);return[w.slice(0,mid).join(' '),w.slice(mid).join(' ')];
}
function sizeEcho(txt){var n=(txt||'').length;var e=document.getElementById('bgEcho');if(!e)return;e.classList.remove('len-s','len-m','len-l','len-xl');e.classList.add(n<=12?'len-s':n<=24?'len-m':n<=40?'len-l':'len-xl');}
function showMirror(slug){
  const reg=REGISTRY[slug];if(!reg)return;
  const nm=tx(reg.desc,'name');
  bgEcho.textContent=nm;sizeEcho(nm);bgEcho.classList.add('show');
}
function hideMirror(){
  if(currentSlug){showMirror(currentSlug);return;}
  bgEcho.classList.remove('show');
}

      +'<a href="https://learnsomm.com" target="_blank" rel="noopener noreferrer">LearnSomm.com</a>'
      +'<a href="mailto:mrcakebread@gmail.com">Reach Mark Directly</a>'
      +'<a href="mailto:mrcakebread@gmail.com?subject='+encodeURIComponent('LearnSomm Feedback')+'&body='+fbBody+'">Feedback</a>';
  }
  function showPlaceholder(){
    detail.innerHTML='<div class="section-title">'+t('noobTitle')+'</div>'
      +'<div class="body-text noob-fact">'+t('noobFact')+'</div>'+contactHtml();
  }

  /* ---- GLOW toggle ---- */
  var glowOn=false; try{glowOn=localStorage.getItem(SUBJECT+'Glow')==='1';}catch(e){}
  function applyGlow(){wheelSvg.classList.toggle('label-glow',glowOn);glowBtn.classList.toggle('on',glowOn);}
  glowBtn.addEventListener('click',function(){glowOn=!glowOn;try{localStorage.setItem(SUBJECT+'Glow',glowOn?'1':'0');}catch(e){}applyGlow();});
  applyGlow();

  /* ---- LIST layout toggle (vertical / columns) ---- */
  var cols=false; try{cols=localStorage.getItem(SUBJECT+'ListCols')==='1';}catch(e){}
  function applyCols(){listBody.classList.toggle('cols',cols);llBtn.classList.toggle('on',cols);llBtn.textContent=cols?t('rows'):t('cols');}
  llBtn.addEventListener('click',function(){cols=!cols;try{localStorage.setItem(SUBJECT+'ListCols',cols?'1':'0');}catch(e){}applyCols();});
  applyCols();

  /* ---- VIEWING MODES (dock-left / dock-right / detached) ---- */
  var mode='dock-left'; try{mode=localStorage.getItem(SUBJECT+'Mode')||'dock-left';}catch(e){}
  var freeReadSide='right'; try{freeReadSide=localStorage.getItem(SUBJECT+'FreeSide')||'right';}catch(e){}
  function syncReadSide(){READ_SIDE=(mode==='dock-left')?'right':(mode==='dock-right')?'left':freeReadSide;if(typeof uprightLabels==='function')uprightLabels();}
  var movePos=null; // {left,top} for detached wheel
  function clearWheelInline(){svgC.style.position='';svgC.style.left='';svgC.style.top='';svgC.style.transform='';}
  function clearPanelInline(){panelEl.classList.remove('floating');panelEl.style.left='';panelEl.style.top='';}
  function readAngle(){return READ_SIDE==='left'?Math.PI:0;}
  function setMode(m){
    mode=m;document.body.setAttribute('data-mode',m);
    READ_SIDE=(m==='dock-left')?'right':(m==='dock-right')?'left':freeReadSide;
    try{localStorage.setItem(SUBJECT+'Mode',m);}catch(e){}
    dL.classList.toggle('on',m==='dock-left');dR.classList.toggle('on',m==='dock-right');dF.classList.toggle('on',m==='detached');
    clearWheelInline();clearPanelInline();
    if(m==='detached'){
      svgC.style.position='fixed';
      var p=movePos||{left:Math.round(window.innerWidth*0.06),top:140};
      svgC.style.left=p.left+'px';svgC.style.top=p.top+'px';movePos=p;
      syncMoveHandle();
    }
    updateReadPoint();
    if(typeof uprightLabels==='function')uprightLabels();
  }
  dL.addEventListener('click',function(){setMode('dock-left');});
  dR.addEventListener('click',function(){setMode('dock-right');});
  dF.addEventListener('click',function(){setMode('detached');});

  function syncMoveHandle(){
    if(mode!=='detached'){return;}
    var r=svgC.getBoundingClientRect();var ty=Math.max(58,r.top-22);
    wheelMove.style.left=(r.left)+'px';wheelMove.style.top=ty+'px';
    if(wheelMove2){wheelMove2.style.left=(r.right-46)+'px';wheelMove2.style.top=ty+'px';}
  }
  /* read-point: which descriptor sits at the read angle, drawn upright at the wheel rim */
  function updateReadPoint(){
    if(mode==='detached')syncMoveHandle();
    if(document.body.getAttribute('data-view')!=='wheel'){return;}
    if(window.innerWidth<=820){return;}
    var r=wheelSvg.getBoundingClientRect();if(!r.width){return;}
    var cx=r.left+r.width/2, cy=r.top+r.height/2, unit=r.width/668;
    var rr=((R_SUB+R_OUT)/2)*unit, ang=readAngle();
    readPoint.style.left=(cx+rr*Math.cos(ang))+'px';
    readPoint.style.top=(cy+rr*Math.sin(ang))+'px';
    var best=null,bd=99;
    for(var k in REGISTRY){var dd=Math.abs(norm(REGISTRY[k]._mid+rotation-ang));if(dd<bd){bd=dd;best=k;}}
    if(best){readPoint.textContent=UC(tx(REGISTRY[best].desc,'name'));readPoint.dataset.slug=best;readPoint.style.color=REGISTRY[best]._fill;}
  }
  readPoint.addEventListener('click',function(){if(readPoint.dataset.slug)selectItem(readPoint.dataset.slug);});

  /* hook applyRotation + setWheelSize so the read-point tracks spin & zoom */
  var _applyRotation=applyRotation;
  applyRotation=function(){_applyRotation();updateReadPoint();};
  var _setWheelSize=setWheelSize;
  setWheelSize=function(px){_setWheelSize(px);updateReadPoint();};
  window.addEventListener('resize',function(){updateReadPoint();});

  /* detached: drag the wheel by its handle */
  var wDrag=null;
  function wireMove(handle){ if(!handle)return;
    handle.addEventListener('pointerdown',function(e){var r=svgC.getBoundingClientRect();wDrag={dx:e.clientX-r.left,dy:e.clientY-r.top};handle.setPointerCapture(e.pointerId);e.preventDefault();});
    handle.addEventListener('pointermove',function(e){if(!wDrag)return;var L=Math.max(2,Math.min(e.clientX-wDrag.dx,window.innerWidth-80));var T=Math.max(58,Math.min(e.clientY-wDrag.dy,window.innerHeight-80));svgC.style.left=L+'px';svgC.style.top=T+'px';movePos={left:L,top:T};syncMoveHandle();});
    handle.addEventListener('pointerup',function(){wDrag=null;});
    handle.addEventListener('pointercancel',function(){wDrag=null;});
  }
  wireMove(wheelMove); wireMove(wheelMove2);

  /* ---- SPIN randomizer ---- */
  var spinning=false;
  spinBtn.addEventListener('click',function(){
    if(spinning)return;var keys=Object.keys(REGISTRY);if(!keys.length)return;
    var slug=keys[Math.floor(Math.random()*keys.length)];var reg=REGISTRY[slug];
    var target=readAngle()-reg._mid;                 // rotation that lands _mid at the read angle
    var turns=(3+Math.floor(Math.random()*3))*2*Math.PI;
    var end=target;while(end<rotation+turns)end+=2*Math.PI;
    var start=rotation,dur=1700,t0=Date.now();spinning=true;
    var prevHint=spinHint?spinHint.textContent:'';
    if(spinHint)spinHint.textContent=(lang==='es'?'Gira para aumentar tus probabilidades de aprender.':'Spin to increase your chances of learning.');
    if(typeof velocity!=='undefined')velocity=0;
    function ease(p){return 1-Math.pow(1-p,3);}
    function step(){var p=Math.min(1,(Date.now()-t0)/dur);rotation=start+(end-start)*ease(p);applyRotation();
      if(p<1){requestAnimationFrame(step);}else{rotation=end;applyRotation();spinning=false;selectItem(slug);if(spinHint)spinHint.textContent=prevHint;}}
    requestAnimationFrame(step);
  });

  /* ---- re-localize the new controls + placeholder on language switch ---- */
  function enhApplyLang(){
    spinBtn.textContent=t('spin');glowBtn.textContent=t('glow');llBtn.textContent=cols?t('rows'):t('cols');
    fillContactBar();
    if(!currentSlug)showPlaceholder(); else showDetail(currentSlug);
    updateReadPoint();
  }
  var _setLang=setLang;
  setLang=function(l){_setLang(l);enhApplyLang();};

  /* ---- init ---- */
  fillContactBar();
  if(!currentSlug)showPlaceholder();
  setMode(mode);
  /* keep placeholder when nothing is selected after a language toggle handled above */
  setTimeout(updateReadPoint,60);

  /* ---- F: keep descriptor labels screen-upright while docked (so they read right-side-up at the read side) ---- */
  function uprightLabels(){
    if(typeof descLabels==='undefined')return;
    for(var i=0;i<descLabels.length;i++){var o=descLabels[i];
      var deg=(READ_SIDE==='left')?o.theta+180:o.theta;
      o.el.setAttribute('transform','rotate('+deg+','+o.lx+','+o.ly+')');
    }
  }
  /* labels are glued radial; they rotate with the wheel group automatically */
  /* renderLabels rebuilds descLabels (on lang/theme/size) — re-apply upright after each rebuild */
  (function(){var _rl=renderLabels;renderLabels=function(){_rl();uprightLabels();};})();

  /* ---- H: spin tally (local, per-wheel) ---- */
  var spins=0; try{spins=parseInt(localStorage.getItem(SUBJECT+'Spins')||'0',10)||0;}catch(e){}
  var spinsBg=document.getElementById('spinsBg');
  var spinTally=document.getElementById('spinTally');
  var _scTimer=null;
  function renderTally(){
    if(spinsBg){spinsBg.innerHTML='<span class="sc-line"><span class="sc-num">'+spins+'</span> '+(lang==='es'?'Giros':'Spins')+'</span><span class="sc-lab">'+(lang==='es'?'en el Randomizador':'on the Randomizer')+'</span>';spinsBg.classList.add('show');}
    if(spinTally)spinTally.textContent=spins+(lang==='es'?' giros':' spins');
  }
  function flashSpins(){ if(!spinsBg)return; spinsBg.classList.add('flash'); if(_scTimer)clearTimeout(_scTimer); _scTimer=setTimeout(function(){spinsBg.classList.remove('flash');},900); }
  renderTally();
  spinBtn.addEventListener('click',function(){spins++;try{localStorage.setItem(SUBJECT+'Spins',String(spins));}catch(e){}renderTally();flashSpins();});

  /* ---- H: control visibility tied to view (Cols only in List; Spin/Glow/mode only in Wheel) ---- */
  (function(){var _sv=setView;setView=function(v){_sv(v);uprightLabels();updateReadPoint();};})();

  /* re-localize tally on language switch (chain after existing enhApplyLang via setLang wrap already present) */
  (function(){var _sl2=setLang;setLang=function(l){_sl2(l);renderTally();};})();

  /* apply upright + readpoint once after init settles */
  setMode(mode); syncReadSide(); setTimeout(function(){uprightLabels();updateReadPoint();},80);

  /* ---- Wheel Format dropdown ---- */
  var wfBtn=$('wheelFormat'), wfMenu=$('wfMenu');
  function wfClose(){wfMenu.classList.remove('open');wfBtn.classList.remove('on');wfBtn.setAttribute('aria-expanded','false');}
  function wfToggle(){var open=!wfMenu.classList.contains('open');wfMenu.classList.toggle('open',open);wfBtn.classList.toggle('on',open);wfBtn.setAttribute('aria-expanded',open?'true':'false');}
  wfBtn.addEventListener('click',function(e){e.stopPropagation();wfToggle();});
  document.addEventListener('click',function(e){if(!wfMenu.contains(e.target)&&e.target!==wfBtn)wfClose();});
  function markMode(){
    dL.classList.toggle('on',mode==='dock-left');dR.classList.toggle('on',mode==='dock-right');dF.classList.toggle('on',mode==='detached');
    var lab=mode==='dock-left'?'◧ Dock Left':(mode==='dock-right'?'◨ Dock Right':'⤢ Free Move');
    wfBtn.textContent=(lang==='es'?'\u25d1 Formato':'\u25d1 Format')+': '+lab+' \u25be';
  }
  [dL,dR,dF].forEach(function(b){b.addEventListener('click',function(){wfClose();setTimeout(markMode,0);});});
  var freeSideBtn=$('freeSideBtn');
  function markFreeSide(){var r=freeReadSide==='right';freeSideBtn.textContent=(lang==='es'?('↔ Libre lee: '+(r?'Derecha':'Izquierda')):('↔ Free reads: '+(r?'Right':'Left')));}
  freeSideBtn.addEventListener('click',function(e){e.stopPropagation();freeReadSide=(freeReadSide==='right')?'left':'right';try{localStorage.setItem(SUBJECT+'FreeSide',freeReadSide);}catch(e){}markFreeSide();if(mode==='detached'){syncReadSide();updateReadPoint();}});
  markFreeSide();
  markMode();
  /* re-label format button on language switch */
  (function(){var _sl3=setLang;setLang=function(l){_sl3(l);markMode();markFreeSide();};})();


  /* ---- top-left background message area: hover explanations for lang / theme / focus ---- */
  function echoMsg(txt){bgEcho.textContent=txt;sizeEcho(txt);bgEcho.classList.add('show');}
  function echoClear(){ if(currentSlug){showMirror(currentSlug);} else {bgEcho.classList.remove('show');} }
  function wireEcho(elm,fn){ if(!elm)return;
    elm.addEventListener('mouseenter',function(){echoMsg(fn());});
    elm.addEventListener('mouseleave',echoClear);
    elm.addEventListener('focus',function(){echoMsg(fn());});
    elm.addEventListener('blur',echoClear);
  }
  wireEcho($('langBtn'),function(){return lang==='es'?'Espa\u00f1ol / English':'English / Spanish';});
  wireEcho($('themeBtn'),function(){var dk=document.documentElement.getAttribute('data-theme')==='dark';return dk?'Dark / Light':'Light / Dark';});
  wireEcho($('spinBtn'),function(){return lang==='es'?'Aumenta Tus Probabilidades de Aprender al Azar':'Increase Your Odds of Randomly Learning';});
  wireEcho($('wheelFormat'),function(){return lang==='es'?'Formato de la Rueda':'Wheel Format';});
  (function(){var tries=0;var iv=setInterval(function(){var fb=document.getElementById('fsBtn');tries++;
    if(fb){clearInterval(iv);fb.setAttribute('title','Fully Focused Mode');
      wireEcho(fb,function(){return lang==='es'?'Modo Concentraci\u00f3n Total':'Fully Focused Mode';});}
    if(tries>40)clearInterval(iv);},50);})();

})();

</script>
</body>
</html>
