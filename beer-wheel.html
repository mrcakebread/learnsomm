<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Aroma & Flavor Wheel — Mark Lenington</title>


<style>
:root{--display:'Optima','Candara','Gill Sans','Gill Sans MT','Segoe UI',sans-serif;--serif:'Charter','Bitstream Charter','Cambria','Iowan Old Style',Georgia,serif;}

*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#8a5a2a;--gold:#a87f3d;--sep:#faf8f3;--hub:#fffdf8;--hub-text:#6b573a;--badge-bg:#f4eee2;--badge-line:#d8cdb8;--shadow:0 8px 30px rgba(80,60,30,.14);}
[data-theme="dark"]{--bg:#16130e;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;--accent:#c9a96e;--gold:#d4b276;--sep:#16130e;--hub:#211c14;--hub-text:#d8c294;--badge-bg:#2a241a;--badge-line:#4a4030;--shadow:0 10px 34px rgba(0,0,0,.55);}
html{background:var(--bg);}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .25s,color .25s;}

.topbar{width:100%;max-width:1100px;display:flex;justify-content:flex-end;gap:.5rem;padding:.7rem 1rem 0;}
.topbar button{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:.75rem;border-radius:6px;padding:.35rem .7rem;cursor:pointer;}
.topbar button:hover{color:var(--text);border-color:var(--muted);}
h1{font-size:1.4rem;font-weight:400;letter-spacing:.04em;padding:.2rem 1rem .15rem;text-align:center;}
.byline{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.2rem;}
.byline em{color:var(--accent);font-style:italic;}
.spin-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:.55rem;}
.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;justify-content:center;border:1px solid var(--line);border-radius:8px;padding:.4rem .9rem;margin-bottom:1rem;max-width:96vw;background:var(--panel);}
.controls .ctl-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.controls button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.9rem;line-height:1;border-radius:6px;padding:.32rem .65rem;cursor:pointer;min-width:2.1rem;min-height:2.1rem;}
.controls button:hover{border-color:var(--gold);color:var(--accent);}
.controls button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.controls input[type=range]{width:150px;accent-color:var(--gold);cursor:pointer;}
.size-ctl{display:flex;align-items:center;gap:.55rem;}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.view-toggle button{border:none;border-radius:0;min-width:3.4rem;}
.view-toggle button.active{background:var(--badge-bg);color:var(--accent);font-weight:bold;}
.layout{display:flex;gap:0;width:100%;max-width:1180px;align-items:flex-start;padding:0 1rem 2.5rem;justify-content:center; position:relative;}
.wheel-wrap{flex:0 0 auto;display:flex;justify-content:center;}
#svgContainer { position: relative; line-height: 0; }

#wheelSvg{cursor:grab;user-select:none;touch-action:none;filter:drop-shadow(var(--shadow));}
#wheelSvg:active{cursor:grabbing;}
#wheelSvg .cell{stroke:var(--sep);stroke-width:1.5;}
#wheelSvg .desc-seg{cursor:pointer;transition:filter .15s;}
#wheelSvg .desc-seg:hover{filter:brightness(1.12) saturate(1.05);}
#wheelSvg .desc-seg.selected{stroke:var(--gold);stroke-width:2.4;}
#wheelSvg .hub{fill:var(--hub);stroke:var(--gold);stroke-width:1.4;}
#wheelSvg .hub-text{fill:var(--hub-text);}
#wheelSvg .rim{fill:none;stroke:var(--line);stroke-width:1;}
@media (prefers-reduced-motion:reduce){#wheelSvg .desc-seg{transition:none;}}

#listView{position: relative; display:none; flex:0 1 auto; width:min(720px,94vw); transition: opacity 0.3s, filter 0.3s;}
#listView.active{display:block;}
#listSearch{width:100%;padding:.55rem .85rem;font-family:inherit;font-size:.92rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);margin-bottom:1rem;}
#listSearch:focus{outline:none;border-color:var(--gold);}
.cat-block{margin-bottom:1rem;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.7rem .9rem;}
.cat-head{display:flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.cat-dot{width:.7rem;height:.7rem;border-radius:3px;flex:0 0 auto;}
.sub-group{margin-bottom:.5rem;}
.sub-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);opacity:.8;margin-bottom:.3rem;}
.chip-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.list-chip{font-size:.82rem;font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.32rem .62rem;cursor:pointer;color:var(--text);}
.list-chip:hover{border-color:var(--gold);color:var(--accent);}
.list-chip:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.list-chip.selected{border-color:var(--gold);background:var(--badge-bg);color:var(--accent);font-weight:bold;}
#noResults{display:none;color:var(--muted);font-style:italic;font-size:.88rem;padding:.4rem 0;}

.detail-panel{flex:1;min-width:280px;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:1.3rem 1.5rem;min-height:360px;margin-left:1.4rem; transition: opacity 0.3s; z-index:60; position:relative;}
.panel-header{display:flex;align-items:center;justify-content:space-between;gap:.6rem;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin:-1.3rem -1.5rem 1rem;padding:.5rem .9rem .45rem;border-bottom:1px solid var(--line);border-radius:9px 9px 0 0;}
.panel-header:active{cursor:grabbing;}
.panel-header .grip-title{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
.panel-header .grip-dots{color:var(--line);letter-spacing:2px;margin-right:.4rem;}
.panel-header button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.66rem;border-radius:5px;padding:.22rem .5rem;cursor:pointer;display:none;}
.panel-header button:hover{border-color:var(--gold);color:var(--accent);}
.detail-panel.floating{position:fixed;z-index:60;margin:0;width:min(380px,92vw);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow);border-color:var(--gold);}
.detail-panel.floating .panel-header{position:sticky;top:0;z-index:2;background:var(--panel);}
.detail-panel.floating .panel-header button{display:inline-block;}
.detail-panel h2{font-size:1.3rem;margin-bottom:.15rem;font-weight:400;font-style:italic;color:var(--accent);}
.detail-panel h2 a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--gold);}
.detail-panel h2 a:hover,.detail-panel h2 a:focus-visible{border-bottom-style:solid;color:var(--gold);outline:none;}
.wiki-mark{font-size:.6em;margin-left:.28rem;font-style:normal;color:var(--gold);vertical-align:super;}
.detail-panel .category-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.section-title{font-size:.66rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .25rem;font-weight:bold;border-bottom:1px solid var(--line);padding-bottom:2px;}
.body-text{font-size:.85rem;line-height:1.65;color:var(--text);}
.flag-note{font-size:.74rem;color:var(--gold);background:var(--badge-bg);border:1px solid var(--gold);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;line-height:1.5;}
.grid-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;}
.grid-badge{font-size:.74rem;background:var(--badge-bg);border:1px solid var(--gold);padding:.18rem .5rem;border-radius:4px;}
.placeholder{color:var(--muted);font-size:.95rem;margin-top:2.5rem;text-align:center;font-style:italic;}
@media(max-width:800px){.layout{flex-direction:column;align-items:center;}.detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}h1{font-size:1.15rem;}}

/* Hub center: logo + hover mirror */
#hubCenter{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18.5%;height:18.5%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
#hubLogo{max-width:88%;max-height:88%;opacity:1;transition:opacity .18s;display:none;}
#hubMirror{position:absolute;inset:-30% -55%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:var(--display);font-weight:bold;color:var(--hub-text);line-height:1.08;opacity:0;transition:opacity .15s;text-shadow:0 1px 6px var(--hub);}
#hubMirror.show{opacity:1;}
#hubCenter.mirroring #hubLogo{opacity:0;}
#svgContainer.has-logo .hub-text{opacity:0;}
/* Background echo: giant readable mirror, desktop only */
#bgEcho{position:fixed;top:.4rem;left:1rem;font-family:var(--display);font-weight:bold;font-size:clamp(2.4rem,7vw,5.8rem);color:var(--hub-text);opacity:0;transition:opacity .2s;pointer-events:none;z-index:0;line-height:1;max-width:55vw;letter-spacing:.02em;}
#bgEcho.show{opacity:.13;}
@media(max-width:800px){#bgEcho{display:none;}}

/* deploy: selection lockdown */
body{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
input,textarea{user-select:text;-webkit-user-select:text;-moz-user-select:text;}
</style>

<style id="enhancements">
/* pill controls */
.pill-btn{font-family:inherit;font-size:.82rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.32rem .7rem;cursor:pointer;color:var(--text);}
.pill-btn.on{background:var(--badge-bg);color:var(--accent);border-color:var(--gold);font-weight:bold;}
.mode-toggle button{min-width:2.7rem;}
/* label glow toggle */
#wheelSvg.label-glow text{filter:drop-shadow(0 0 1.3px var(--gold)) drop-shadow(0 0 3px var(--gold));}
/* hub-mirror glow (center hover) handled inline */
#hubMirror.glow{filter:drop-shadow(0 0 4px currentColor) drop-shadow(0 0 9px currentColor);}
/* ── docked wheel modes (desktop) ── */
body[data-view="wheel"][data-mode="dock-left"] .layout,
body[data-view="wheel"][data-mode="dock-right"] .layout{display:block;max-width:none;padding:0;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:fixed;top:130px;bottom:54px;width:60vw;display:flex;align-items:center;overflow:hidden;pointer-events:none;z-index:15;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap{left:0;justify-content:flex-start;}
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{right:0;justify-content:flex-end;}
body[data-view="wheel"][data-mode="dock-left"] #svgContainer{transform:translateX(-40%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:translateX(40%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel{position:fixed;top:130px;right:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:10px 0 0 10px;}
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:fixed;top:130px;left:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:0 10px 10px 0;}
/* read-point chip */
#readPoint{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:.3rem .65rem;font-weight:bold;font-family:var(--display);letter-spacing:.05em;box-shadow:var(--shadow);cursor:pointer;pointer-events:auto;max-width:26vw;text-align:center;transform:translate(-50%,-50%);}
#readPoint::before{content:"\25c0";opacity:.5;margin-right:.3rem;}
body[data-view="wheel"][data-mode="dock-right"] #readPoint::before{content:"\25b6";}
body[data-view="wheel"][data-mode="dock-left"] #readPoint,
body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:block;}
/* detached move handle */
#wheelMove{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.22rem .6rem;font-size:.74rem;color:var(--muted);cursor:move;pointer-events:auto;user-select:none;}
body[data-view="wheel"][data-mode="detached"] .wheel-move{display:block;}
#wheelMove2{padding:.22rem .5rem;}
/* ── collapsible list ── */
.sub-toggle{display:flex;align-items:center;gap:.45rem;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.34rem .6rem;cursor:pointer;color:var(--text);font-family:inherit;font-size:.82rem;margin:.18rem 0;}
.sub-toggle:hover{border-color:var(--gold);}
.sub-caret{display:inline-block;transition:transform .15s;color:var(--accent);font-size:.7rem;}
.sub-group.expanded .sub-caret{transform:rotate(90deg);}
.sub-group .chip-row{display:none;margin:.35rem 0 .2rem;}
.sub-group.expanded .chip-row{display:flex;}
#listBody.searching .sub-group .chip-row{display:flex;}
#listBody.searching .sub-caret{transform:rotate(90deg);}
#listBody.cols{column-width:250px;column-gap:1rem;}
#listBody.cols .cat-block{break-inside:avoid;}
/* contact */
.contact-bar{max-width:1100px;margin:0 auto 1.4rem;padding:.7rem 1rem;text-align:center;font-size:.85rem;color:var(--muted);border-top:1px solid var(--line);}
.contact-bar a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--gold);margin:0 .55rem;white-space:nowrap;}
.contact-bar a:hover{color:var(--gold);}
.contact-bar .lead{display:block;margin-bottom:.35rem;color:var(--text);font-style:italic;}
.detail-panel .contact{margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--line);font-size:.8rem;}
.detail-panel .contact a{display:inline-block;margin:.1rem .5rem .1rem 0;color:var(--accent);border-bottom:1px dotted var(--gold);text-decoration:none;}
.noob-fact{font-size:.92rem;line-height:1.5;}
/* responsive: docked falls back to centered/stacked on narrow screens */
@media (max-width:820px){
  body[data-view="wheel"][data-mode="dock-left"] .layout,
  body[data-view="wheel"][data-mode="dock-right"] .layout{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2.5rem;}
  body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
  body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:static;width:auto;overflow:visible;pointer-events:auto;}
  body[data-view="wheel"][data-mode="dock-left"] #svgContainer,
  body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:none;}
  body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
  body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:static;width:100%;max-width:95vw;margin-top:1rem;max-height:none;}
  body[data-view="wheel"][data-mode="dock-left"] #readPoint,
  body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:none;}
}
</style>

<style id="rev2">
.detail-panel h2{font-size:1.62rem;}
.detail-panel .category-tag{font-size:.8rem;}
.section-title{font-size:.82rem !important;}
.body-text{font-size:1.06rem;line-height:1.62;}
.noob-fact{font-size:1.0rem;}
.funfact{font-size:1.04rem;line-height:1.55;background:var(--badge-bg);border:1px solid var(--gold);border-left-width:4px;border-radius:8px;padding:.6rem .8rem;margin:.2rem 0 .9rem;}
.funfact .ff-label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:bold;margin-bottom:.25rem;}
/* bgEcho hover text: lighter in dark, darker in light */
[data-theme="dark"] #bgEcho{color:#efe6d4;opacity:.16;}
[data-theme="light"] #bgEcho{color:#3a2f20;opacity:.13;}
#bgEcho.show{opacity:var(--echo-op,.15);}
[data-theme="dark"] #bgEcho.show{opacity:.17;}
[data-theme="light"] #bgEcho.show{opacity:.14;}
/* center: logo only, mirror text removed */
#hubMirror{display:none !important;}
#hubLogo{display:block;}
/* spin tally chip */
#spinTally{font-size:.72rem;color:var(--muted);margin-left:.1rem;white-space:nowrap;}
/* context-sensitive control visibility handled by JS adding body[data-view] scoping */
body[data-view="list"] #spinBtn,
body[data-view="list"] #glowBtn,
body[data-view="list"] .mode-toggle,
body[data-view="list"] #spinTally{display:none;}
body[data-view="wheel"] #listLayoutBtn{display:none;}
</style>

<style id="rev3">
/* contact links pinned bottom-middle at all times */
.contact-bar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:70;
  margin:0;border-top:none;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;
  background:var(--panel);box-shadow:0 -2px 10px rgba(0,0,0,.08);padding:.45rem 1.1rem;max-width:96vw;white-space:nowrap;overflow-x:auto;}
.contact-bar .lead{display:inline;margin:0 .6rem 0 0;font-style:italic;color:var(--muted);font-size:.82rem;}
.contact-bar a{margin:0 .5rem;}
/* keep docked wheel + panel clear of the pinned contact bar */
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{bottom:52px;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{max-height:calc(100vh - 196px);}
.layout{padding-bottom:64px;}
/* topbar: lighter controls, larger focus button */
.topbar button{color:var(--muted);opacity:.72;border-color:var(--line);transition:opacity .15s,color .15s;}
.topbar button:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
#fsBtn{font-size:1.35rem !important;padding:.28rem .6rem !important;line-height:1;}
</style>

<style id="rev4">
/* hide old h1/title space; logo carries the name */
#h1title{display:none !important;}
.byline{text-align:center;font-size:.74rem;color:var(--muted);padding:.2rem 1rem .4rem;margin-top:2px;}
/* clear fixed top cluster */
body{padding-top:60px;}
/* ===== unified fixed top-right control cluster ===== */
.topctl{position:fixed;top:0;right:0;z-index:200;display:flex;flex-wrap:wrap;justify-content:flex-end;align-items:center;
  gap:.4rem;padding:.5rem .7rem;background:linear-gradient(to left,var(--panel) 70%,transparent);max-width:100vw;}
.topctl button{font-family:inherit;font-size:.8rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:.3rem .6rem;cursor:pointer;color:var(--text);}
.topctl .view-toggle button{border:none;border-radius:0;}
.topctl #langBtn,.topctl #themeBtn{color:var(--muted);opacity:.72;}
.topctl #langBtn:hover,.topctl #themeBtn:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
.topctl-div{width:1px;height:22px;background:var(--line);margin:0 .15rem;}
.size-ctl{display:flex;align-items:center;gap:.25rem;}
#zoomSlider{width:120px;}
/* Wheel Format dropdown */
.wf-wrap{position:relative;}
#wfMenu{position:absolute;top:calc(100% + 4px);right:0;background:var(--panel);border:1px solid var(--gold);border-radius:8px;
  box-shadow:var(--shadow);display:none;flex-direction:column;min-width:150px;overflow:hidden;z-index:210;}
#wfMenu.open{display:flex;}
#wfMenu button{border:none;border-radius:0;text-align:left;padding:.55rem .8rem;background:var(--panel);}
#wfMenu button:hover,#wfMenu button.on{background:var(--badge-bg);color:var(--accent);}
#wheelFormat.on{border-color:var(--gold);color:var(--accent);}
/* focus button (injected) sizing already handled; ensure it lands in cluster */
.topctl #fsBtn{font-size:1.3rem !important;padding:.2rem .55rem !important;line-height:1;}
/* ===== spins counter — top-right background ===== */
#spinsBg{position:fixed;top:3.2rem;right:1rem;z-index:0;pointer-events:none;font-family:var(--display);font-weight:bold;
  font-size:clamp(1.6rem,4.4vw,3.4rem);line-height:1;text-align:right;letter-spacing:.02em;opacity:0;transition:opacity .25s;}
#spinsBg.show{opacity:1;}
[data-theme="dark"] #spinsBg{color:#efe6d4;opacity:.13;}
[data-theme="light"] #spinsBg{color:#3a2f20;opacity:.11;}
[data-theme="dark"] #spinsBg.show{opacity:.16;}
[data-theme="light"] #spinsBg.show{opacity:.13;}
#spinsBg .sc-num{font-size:1.5em;}
[data-theme="dark"] #spinsBg.flash{opacity:.3 !important;}
[data-theme="light"] #spinsBg.flash{opacity:.26 !important;}
#spinsBg.flash{transition:opacity .12s;}
#spinsBg .sc-lab{display:block;font-size:.4em;letter-spacing:.18em;text-transform:uppercase;opacity:.8;}
/* ===== read-point magnifier +50% ===== */
#readPoint{font-size:1.5rem;padding:.45rem 1rem;border-width:2px;max-width:34vw;}
#readPoint::before{font-size:.8em;}
/* show read-point in FREE mode too (default right side) */
body[data-view="wheel"][data-mode="detached"] #readPoint{display:block;}
/* ===== tasting-notes card: larger by default + resizable when floating ===== */
.detail-panel{max-width:440px;min-width:320px;}
.body-text{font-size:1.14rem;line-height:1.66;}
.detail-panel h2{font-size:1.78rem;}
.funfact{font-size:1.1rem;}
.detail-panel.floating{resize:both;overflow:auto;width:min(440px,94vw);min-width:300px;min-height:280px;max-height:90vh;}
.detail-panel.floating::after{content:"\21F2";position:absolute;right:4px;bottom:2px;color:var(--muted);font-size:.85rem;pointer-events:none;}
/* docked panels start below the fixed cluster */
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{top:118px;}

hing rate, oxygenation, and fermenter geometry.", "mixology": "Sweet, ripe banana flavor, typical of wheat beers.", "origin_es": "Véase Acetato de isoamilo. Modulado por la tasa de inoculación, la oxigenación y la geometría del fermentador.", "mixology_es": "Sabor dulce de plátano maduro, típico de las cervezas de trigo."}, "aromatic-fruity-floral-fruity-black-currant": {"cat": "Aromatic, Fruity, Floral · Fruity", "cat_es": "Aromático, Afrutado, Floral", "origin": "Associated with certain hops (Bramling Cross). Can border on 'catty' (p-mentha-8-thiol-3-one) if heavily oxidized.", "mixology": "A dark, tart berry flavor similar to blackberry.", "origin_es": "Asociado a ciertos lúpulos (Bramling Cross). Puede rozar lo 'a gato' (p-menta-8-tiol-3-ona) si se oxida intensamente.", "mixology_es": "Un sabor de baya oscura y ácido, similar a la zarzamora."}, "aromatic-fruity-floral-fruity-melony": {"cat": "Aromatic, Fruity, Floral · Fruity", "cat_es": "Aromático, Afrutado, Floral", "origin": "Derived from hop compounds and specific yeast esters. Commonly found in hops like Huell Melon or El Dorado.", "mixology": "A sweet, refreshing flavor reminiscent of honeydew or cantaloupe.", "origin_es": "Derivado de compuestos del lúpulo y ésteres específicos de la levadura. Comúnmente presente en lúpulos como Huell Melon o El Dorado.", "mixology_es": "Un sabor dulce y refrescante reminiscente del melón verde o el melón cantalupo."}, "aromatic-fruity-floral-fruity-pear": {"cat": "Aromatic, Fruity, Floral · Fruity", "cat_es": "Aromático, Afrutado, Floral", "origin": "Low-level expression of ethyl acetate. Common in English and Belgian pale ales.", "mixology": "A mild, sweet orchard fruit flavor.", "origin_es": "Expresión de bajo nivel del acetato de etilo. Común en las pale ales inglesas y belgas.", "mixology_es": "Un sabor de fruta de huerto suave y dulce."}, "aromatic-fruity-floral-fruity-raspberry": {"cat": "Aromatic, Fruity, Floral · Fruity", "cat_es": "Aromático, Afrutado, Floral", "origin": "Can be an actual fruit addition, or an ester/ketone profile (like raspberry ketone/frambinone) produced by specific yeasts and wild fermentations.", "mixology": "A tart, vibrant red berry flavor.", "origin_es": "Puede ser una adición real de fruta, o un perfil de éster/cetona (como la cetona de frambuesa/frambinona) producido por levaduras específicas y fermentaciones silvestres.", "mixology_es": "Un sabor de baya roja ácido y vibrante."}, "aromatic-fruity-floral-fruity-strawberry": {"cat": "Aromatic, Fruity, Floral · Fruity", "cat_es": "Aromático, Afrutado, Floral", "origin": "Often derived from ethyl butanoate or naturally present in certain hops (like Strata or Belma).", "mixology": "A sweet, jammy red fruit flavor.", "origin_es": "A menudo derivado del butanoato de etilo o presente de forma natural en ciertos lúpulos (como Strata o Belma).", "mixology_es": "Un sabor de fruta roja dulce y a mermelada."}, "aromatic-fruity-floral-floral-acetaldehyde": {"cat": "Aromatic, Fruity, Floral · Floral", "cat_es": "Aromático, Afrutado, Floral", "origin": "Strictly speaking, it is the direct precursor to ethanol. Displays as green apple, emulsion paint, or cut grass. Categorized curiously under floral in older ASBC wheels.", "mixology": "A sharp, slightly tart flavor like bruised green apples.", "origin_es": "En estricto sentido, es el precursor directo del etanol. Se manifiesta como manzana verde, pintura de emulsión o pasto cortado. Categorizado curiosamente bajo lo floral en las ruedas ASBC más viejas.", "mixology_es": "Un sabor agudo y ligeramente ácido, como manzanas verdes magulladas."}, "aromatic-fruity-floral-floral-2-phenylethanol": {"cat": "Aromatic, Fruity, Floral · Floral", "cat_es": "Aromático, Afrutado, Floral", "origin": "A higher alcohol that imparts a distinct rose-like aroma. Common in some lagers and Belgian ales.", "mixology": "A delicate, perfumey aroma that smells remarkably like fresh roses.", "origin_es": "Un alcohol superior que imparte un aroma distintivo tipo rosa. Común en algunas lagers y ales belgas.", "mixology_es": "Un aroma delicado y perfumado que huele notablemente a rosas frescas."}, "aromatic-fruity-floral-floral-geraniol": {"cat": "Aromatic, Fruity, Floral · Floral", "cat_es": "Aromático, Afrutado, Floral", "origin": "A monoterpenoid alcohol found in hop essential oils (Centennial, Chinook, Citra). Biotransforms into citronellol.", "mixology": "A bright, floral aroma similar to geranium flowers.", "origin_es": "Un alcohol monoterpenoide presente en los aceites esenciales del lúpulo (Centennial, Chinook, Citra). Se biotransforma en citronelol.", "mixology_es": "Un aroma floral brillante, similar a las flores de geranio."}, "aromatic-fruity-floral-floral-perfumy": {"cat": "Aromatic, Fruity, Floral · Floral", "cat_es": "Aromático, Afrutado, Floral", "origin": "A general descriptor for a blend of high-end floral terpenes and esters (linalool, geraniol).", "mixology": "An aromatic, heavily floral scent, almost like a botanical soap or perfume.", "origin_es": "Un descriptor general para una mezcla de terpenos florales y ésteres de gama alta (linalol, geraniol).", "mixology_es": "Un aroma aromático y muy floral, casi como un jabón botánico o un perfume."}, "aromatic-fruity-floral-hoppy-kettle-hop": {"cat": "Aromatic, Fruity, Floral · Hoppy", "cat_es": "Aromático, Afrutado, Floral", "origin": "Aromas resulting from hops boiled in the wort. Often more muted, woody, or spicy due to the volatilization of delicate essential oils.", "mixology": "A traditional, earthy bitterness and aroma from hops cooked into the beer.", "origin_es": "Aromas resultantes de los lúpulos hervidos en el mosto. A menudo más apagados, amaderados o especiados por la volatilización de los delicados aceites esenciales.", "mixology_es": "Un amargor y aroma tradicional y terroso de los lúpulos cocidos en la cerveza."}, "aromatic-fruity-floral-hoppy-dry-hop": {"cat": "Aromatic, Fruity, Floral · Hoppy", "cat_es": "Aromático, Afrutado, Floral", "origin": "Aromas from hops added post-boil/during fermentation. Retains highly volatile myrcene, linalool, and terpenes for bright, pungent aromatics.", "mixology": "A massive, fresh, and raw hop aroma without added bitterness.", "origin_es": "Aromas de los lúpulos añadidos después del hervor/durante la fermentación. Retiene mirceno, linalol y terpenos muy volátiles para aromáticos brillantes y punzantes.", "mixology_es": "Un aroma de lúpulo masivo, fresco y crudo, sin amargor añadido."}, "aromatic-fruity-floral-hoppy-hop-oil": {"cat": "Aromatic, Fruity, Floral · Hoppy", "cat_es": "Aromático, Afrutado, Floral", "origin": "The concentrated essential oils of the hop cone (lupulin glands). Imparts intense resinous, floral, or citrus notes depending on varietal.", "mixology": "A potent, slick, and heavy hop character.", "origin_es": "Los aceites esenciales concentrados del cono del lúpulo (glándulas de lupulina). Imparte notas resinosas, florales o cítricas intensas según la variedad.", "mixology_es": "Un carácter de lúpulo potente, resbaladizo y pesado."}, "aromatic-fruity-floral-resinous-piney": {"cat": "Aromatic, Fruity, Floral · Resinous", "cat_es": "Aromático, Afrutado, Floral", "origin": "Driven by the terpene pinene. A hallmark of classic American 'C-hops' (Cascade, Centennial, Chinook).", "mixology": "A sharp, evergreen flavor that tastes like walking through a pine forest.", "origin_es": "Impulsado por el terpeno pineno. Un sello de los clásicos 'lúpulos C' americanos (Cascade, Centennial, Chinook).", "mixology_es": "Un sabor agudo, a perenne, que sabe a caminar por un bosque de pinos."}, "aromatic-fruity-floral-resinous-woody": {"cat": "Aromatic, Fruity, Floral · Resinous", "cat_es": "Aromático, Afrutado, Floral", "origin": "Can derive from traditional English hops (Fuggles), barrel-aging (oak lactones), or humulene oxidation.", "mixology": "An earthy, rustic flavor reminiscent of cedar or oak bark.", "origin_es": "Puede derivar de los lúpulos ingleses tradicionales (Fuggles), del añejamiento en barrica (lactonas del roble) o de la oxidación del humuleno.", "mixology_es": "Un sabor terroso y rústico reminiscente del cedro o la corteza de roble."}, "vegetal-nutty-walnut": {"cat": "Vegetal · Nutty", "cat_es": "Vegetal", "origin": "Often derived from certain specialty malts (Brown malt, Victory) or yeast autolysis in older ales.", "mixology": "A slightly bitter, earthy nuttiness similar to walnut skins.", "origin_es": "A menudo derivado de ciertas maltas especiales (malta Brown, Victory) o de la autólisis de la levadura en ales más viejas.", "mixology_es": "Una nuez ligeramente amarga y terrosa, similar a la piel de la nuez de Castilla."}, "vegetal-nutty-coconut": {"cat": "Vegetal · Nutty", "cat_es": "Vegetal", "origin": "Driven by oak lactones (specifically in American Oak) or specialty hops like Sabro. Can also come from actual adjunct additions.", "mixology": "A sweet, creamy tropical nuttiness.", "origin_es": "Impulsado por las lactonas del roble (específicamente en el roble americano) o por lúpulos especiales como el Sabro. También puede provenir de adiciones reales de adjuntos.", "mixology_es": "Una nuez tropical dulce y cremosa."}, "vegetal-nutty-beany": {"cat": "Vegetal · Nutty", "cat_es": "Vegetal", "origin": "An off-flavor associated with poor wort boiling or raw adjuncts. Linked to certain aldehydes.", "mixology": "A raw, starchy flavor like raw green beans or unroasted soy.", "origin_es": "Un sabor defectuoso asociado a un mal hervor del mosto o a adjuntos crudos. Vinculado a ciertos aldehídos.", "mixology_es": "Un sabor crudo y almidonado, como ejotes crudos o soya sin tostar."}, "vegetal-nutty-almond": {"cat": "Vegetal · Nutty", "cat_es": "Vegetal", "origin": "Often benzaldehyde. Can be derived from cherry pits in fruit beers, oxidation, or specific specialty malts.", "mixology": "A sweet, marzipan-like nuttiness.", "origin_es": "A menudo benzaldehído. Puede derivar de los huesos de cereza en las cervezas de fruta, de la oxidación o de maltas especiales específicas.", "mixology_es": "Una nuez dulce, tipo mazapán."}, "vegetal-grassy-freshly-cut-grass": {"cat": "Vegetal · Grassy", "cat_es": "Vegetal", "origin": "Derived from hexanal and other aldehydes. Often results from poorly stored hops or heavily dry-hopped beers with excessive vegetative matter.", "mixology": "A raw, green flavor exactly like a freshly mowed lawn.", "origin_es": "Derivado del hexanal y otros aldehídos. A menudo resulta de lúpulos mal almacenados o de cervezas con dry-hopping intenso con materia vegetal excesiva.", "mixology_es": "Un sabor verde y crudo, exactamente como un césped recién podado."}, "vegetal-grassy-straw-like": {"cat": "Vegetal · Grassy", "cat_es": "Vegetal", "origin": "Mild oxidation of malt compounds or derived from very pale pilsner malts.", "mixology": "A dry, rustic flavor reminiscent of a barn or dried hay.", "origin_es": "Oxidación leve de los compuestos de la malta o derivado de maltas pilsner muy pálidas.", "mixology_es": "Un sabor seco y rústico reminiscente de un granero o el heno seco."}, "cereal-grainy-husky": {"cat": "Cereal · Grainy", "cat_es": "Cereal", "origin": "Astringent note extracted from malt husks due to over-sparging, sparging with water too hot (>170°F), or high pH.", "mixology": "A dry, slightly harsh grain flavor, like chewing on raw grain shells.", "origin_es": "Nota astringente extraída de las cascarillas de la malta por sobrelavado, lavado con agua demasiado caliente (>77 °C) o un pH alto.", "mixology_es": "Un sabor de grano seco y ligeramente áspero, como masticar cascarillas de grano crudo."}, "cereal-grainy-corn-grits": {"cat": "Cereal · Grainy", "cat_es": "Cereal", "origin": "Often DMS (Dimethyl Sulfide) at low levels, or directly from the use of flaked maize adjuncts in American lagers.", "mixology": "A sweet, starchy flavor similar to corn flakes or polenta.", "origin_es": "A menudo DMS (sulfuro de dimetilo) a niveles bajos, o directamente del uso de adjuntos de maíz en hojuelas en las lagers americanas.", "mixology_es": "Un sabor dulce y almidonado, similar a las hojuelas de maíz o la polenta."}, "cereal-grainy-mealy": {"cat": "Cereal · Grainy", "cat_es": "Cereal", "origin": "Associated with under-modified malt or unconverted starches left in the beer.", "mixology": "A heavy, flour-like taste.", "origin_es": "Asociado a malta poco modificada o a almidones sin convertir que quedan en la cerveza.", "mixology_es": "Un sabor pesado, tipo harina."}, "cereal-grainy-malty": {"cat": "Cereal · Grainy", "cat_es": "Cereal", "origin": "The foundational flavor of base malts (Pilsner, Pale, Munich). Offers fermentable sugars and backbone.", "mixology": "A pleasant, sweet backbone that tastes like fresh baked crackers or biscuits.", "origin_es": "El sabor fundamental de las maltas base (Pilsner, Pale, Munich). Ofrece azúcares fermentables y columna vertebral.", "mixology_es": "Una columna agradable y dulce que sabe a galletas saladas o bisquets recién horneados."}, "cereal-grainy-worty": {"cat": "Cereal · Grainy", "cat_es": "Cereal", "origin": "Tastes of unfermented wort. Indicates poor attenuation, yeast stalling, or an intentional low-alcohol brewing process.", "mixology": "A very sweet, syrupy, raw-grain flavor like sugary cereal milk.", "origin_es": "Sabe a mosto sin fermentar. Indica una mala atenuación, un estancamiento de la levadura o un proceso intencional de elaboración baja en alcohol.", "mixology_es": "Un sabor muy dulce, almibarado y a grano crudo, como leche azucarada de cereal."}, "maillard-caramel-molasses": {"cat": "Maillard · Caramel", "cat_es": "Maillard", "origin": "Created by high-temperature caramelization. Common in dark candi syrups used in Belgian dark strong ales.", "mixology": "A dark, rich, and slightly bitter sweetness like dark brown sugar or treacle.", "origin_es": "Creado por caramelización a alta temperatura. Común en los jarabes candi oscuros usados en las dark strong ales belgas.", "mixology_es": "Un dulzor oscuro, rico y ligeramente amargo, como el azúcar moreno oscuro o la melaza oscura."}, "maillard-caramel-licorice": {"cat": "Maillard · Caramel", "cat_es": "Maillard", "origin": "Can come from specific roasted malts, star anise additions, or advanced Maillard reactions in high-gravity boiling.", "mixology": "A sharp, sweet, earthy flavor reminiscent of black licorice candy.", "origin_es": "Puede provenir de maltas tostadas específicas, adiciones de anís estrella o reacciones de Maillard avanzadas en el hervor de alta densidad.", "mixology_es": "Un sabor agudo, dulce y terroso reminiscente del dulce de regaliz negro."}, "maillard-burnt-bread-crust": {"cat": "Maillard · Burnt", "cat_es": "Maillard", "origin": "Classic Maillard product, highly associated with Munich and Vienna malts kilned at moderate temperatures.", "mixology": "A warm, toasted flavor exactly like the crust of a hearty loaf of bread.", "origin_es": "Producto clásico de Maillard, muy asociado a las maltas Munich y Vienna malteadas a temperaturas moderadas.", "mixology_es": "Un sabor cálido y tostado, exactamente como la corteza de una hogaza de pan sustanciosa."}, "maillard-burnt-roast-barley": {"cat": "Maillard · Burnt", "cat_es": "Maillard", "origin": "Unmalted, highly roasted barley. Imparts deep color and sharp, coffee-like bitterness without sweetness. Essential for Dry Irish Stout.", "mixology": "A sharp, dry, dark coffee flavor.", "origin_es": "Cebada sin maltear, muy tostada. Imparte un color profundo y un amargor agudo tipo café sin dulzor. Esencial para la Dry Irish Stout.", "mixology_es": "Un sabor agudo, seco y de café oscuro."}, "maillard-burnt-smoky": {"cat": "Maillard · Burnt", "cat_es": "Maillard", "origin": "Phenolic. Derived from malts smoked over wood (beechwood for Rauchbier, peat for some Scotch ales).", "mixology": "A distinct campfire or smoked-meat flavor.", "origin_es": "Fenólico. Derivado de maltas ahumadas sobre madera (haya para la Rauchbier, turba para algunas Scotch ales).", "mixology_es": "Un sabor distintivo de fogata o carne ahumada."}, "phenolic-phenolic-tarry": {"cat": "Phenolic", "cat_es": "Fenólico", "origin": "Extreme manifestation of phenols, often from heavy peat-smoked malt or severe infections.", "mixology": "An acrid, heavy flavor similar to fresh asphalt or pitch.", "origin_es": "Manifestación extrema de fenoles, a menudo de malta muy ahumada con turba o de infecciones severas.", "mixology_es": "Un sabor acre y pesado, similar al asfalto fresco o la brea."}, "phenolic-phenolic-bakelite": {"cat": "Phenolic", "cat_es": "Fenólico", "origin": "An industrial phenolic off-flavor. Suggests a combination of wild yeast infection and oxidation.", "mixology": "A synthetic, retro-plastic flavor.", "origin_es": "Un sabor defectuoso fenólico industrial. Sugiere una combinación de infección por levadura silvestre y oxidación.", "mixology_es": "Un sabor sintético, de plástico retro."}, "phenolic-phenolic-carbolic": {"cat": "Phenolic", "cat_es": "Fenólico", "origin": "Phenol itself. An off-flavor usually derived from wild yeast (Brettanomyces/Saccharomyces diastaticus) or poor sanitization.", "mixology": "A harsh, medicinal flavor reminiscent of throat lozenges.", "origin_es": "El fenol mismo. Un sabor defectuoso usualmente derivado de levadura silvestre (Brettanomyces/Saccharomyces diastaticus) o de una mala sanitización.", "mixology_es": "Un sabor áspero y medicinal reminiscente de las pastillas para la garganta."}, "phenolic-phenolic-chlorophenol": {"cat": "Phenolic", "cat_es": "Fenólico", "origin": "Formed when chlorine/chloramine in brewing water reacts with naturally occurring phenols. Uncorrectable off-flavor.", "mixology": "A strong, unpleasant taste exactly like mouthwash or hospital band-aids.", "origin_es": "Se forma cuando el cloro/cloramina del agua de elaboración reacciona con los fenoles presentes de forma natural. Sabor defectuoso incorregible.", "mixology_es": "Un sabor fuerte y desagradable, exactamente como el enjuague bucal o las curitas de hospital."}, "phenolic-phenolic-isodoform": {"cat": "Phenolic", "cat_es": "Fenólico", "origin": "Derived from iodine-based sanitizers (iodophor) left in high concentrations in equipment.", "mixology": "A medicinal, iodine-like metallic taste.", "origin_es": "Derivado de los sanitizantes a base de yodo (yodóforo) dejados en altas concentraciones en el equipo.", "mixology_es": "Un sabor metálico, medicinal, tipo yodo."}, "fatty-fatty-acid-caprylic": {"cat": "Fatty · Fatty Acid", "cat_es": "Graso", "origin": "Octanoic acid. Excreted by yeast during fermentation. Can be pleasant at low levels, but goaty/soapy at high levels.", "mixology": "A waxy, slightly goaty or soapy flavor.", "origin_es": "Ácido octanoico. Excretado por la levadura durante la fermentación. Puede ser agradable a niveles bajos, pero a cabra/jabonoso a niveles altos.", "mixology_es": "Un sabor ceroso, ligeramente a cabra o jabonoso."}, "fatty-fatty-acid-cheesy": {"cat": "Fatty · Fatty Acid", "cat_es": "Graso", "origin": "Usually Isovaleric acid. Associated with the use of highly oxidized, old hops (often used intentionally in lambics where the aroma ferments out).", "mixology": "A pungent aroma of old, hard cheese.", "origin_es": "Usualmente ácido isovalérico. Asociado al uso de lúpulos viejos muy oxidados (a menudo usados intencionalmente en las lambics, donde el aroma se fermenta hasta desaparecer).", "mixology_es": "Un aroma punzante de queso viejo y duro."}, "fatty-fatty-acid-isovaleric": {"cat": "Fatty · Fatty Acid", "cat_es": "Graso", "origin": "Oxidation product of hop alpha acids. A major off-flavor in standard beer styles, indicating degraded hops.", "mixology": "Smells like sweaty socks or aged cheese.", "origin_es": "Producto de oxidación de los ácidos alfa del lúpulo. Un sabor defectuoso mayor en los estilos de cerveza estándar, que indica lúpulos degradados.", "mixology_es": "Huele a calcetines sudados o queso añejo."}, "fatty-fatty-acid-butyric": {"cat": "Fatty · Fatty Acid", "cat_es": "Graso", "origin": "Butyric acid. Created by bacterial infection (Clostridium or Pediococcus) during wort chilling or sour mashing.", "mixology": "A sharply unpleasant aroma of rancid butter or baby vomit.", "origin_es": "Ácido butírico. Creado por infección bacteriana (Clostridium o Pediococcus) durante el enfriamiento del mosto o la maceración ácida.", "mixology_es": "Un aroma marcadamente desagradable de mantequilla rancia o vómito de bebé."}, "fatty-fatty-acid-diacetyl": {"cat": "Fatty · Fatty Acid", "cat_es": "Graso", "origin": "2,3-butanedione. A vicinal diketone (VDK) formed outside the yeast cell and reabsorbed. If present, indicates yeast stress, mutation, or rushed fermentation (lack of diacetyl rest).", "mixology": "A slick, artificial butter flavor, like movie theater popcorn.", "origin_es": "2,3-butanodiona. Una dicetona vecinal (VDK) formada fuera de la célula de levadura y reabsorbida. Si está presente, indica estrés de la levadura, mutación o una fermentación apresurada (falta de reposo de diacetilo).", "mixology_es": "Un sabor de mantequilla resbaladizo y artificial, como las palomitas de cine."}, "fatty-oily-rancid": {"cat": "Fatty · Oily", "cat_es": "Graso", "origin": "Oxidation of lipids (fats) from malt or adjuncts (like oats/nuts).", "mixology": "A stale, foul oil flavor, like old forgotten nuts in a pantry.", "origin_es": "Oxidación de los lípidos (grasas) de la malta o los adjuntos (como avena/nueces).", "mixology_es": "Un sabor de aceite rancio y fétido, como nueces viejas olvidadas en una alacena."}, "fatty-oily-vegetable-oil": {"cat": "Fatty · Oily", "cat_es": "Graso", "origin": "Lipid carryover into the beer. Kills head retention immediately.", "mixology": "A slick, greasy mouthfeel without much flavor.", "origin_es": "Transferencia de lípidos a la cerveza. Mata la retención de espuma de inmediato.", "mixology_es": "Una sensación en boca resbaladiza y grasosa sin mucho sabor."}, "fatty-oily-mineral-oil": {"cat": "Fatty · Oily", "cat_es": "Graso", "origin": "Machinery lubricant contamination during the brewing or canning process.", "mixology": "A petroleum-like, highly synthetic grease flavor.", "origin_es": "Contaminación por lubricante de maquinaria durante el proceso de elaboración o enlatado.", "mixology_es": "Un sabor de grasa muy sintético, tipo petróleo."}, "sulfury-sulfitic-striking-match": {"cat": "Sulfury · Sulfitic", "cat_es": "Sulfuroso", "origin": "Sulfur dioxide (SO2). Produced by yeast or added as a preservative (rare in modern beer, common in wine).", "mixology": "A sharp, burning aroma just like a newly lit match.", "origin_es": "Dióxido de azufre (SO₂). Producido por la levadura o añadido como conservador (raro en la cerveza moderna, común en el vino).", "mixology_es": "Un aroma agudo y ardiente, justo como un cerillo recién encendido."}, "sulfury-sulfidic-meaty": {"cat": "Sulfury · Sulfidic", "cat_es": "Sulfuroso", "origin": "Can occur from autolysis (yeast death/decay) yielding complex sulfuric amino acids.", "mixology": "A heavy, savory broth or soy-sauce flavor.", "origin_es": "Puede ocurrir por autólisis (muerte/descomposición de la levadura) que rinde aminoácidos sulfúricos complejos.", "mixology_es": "Un sabor pesado, sabroso, de caldo o salsa de soya."}, "sulfury-sulfidic-hydrogen-sulfide": {"cat": "Sulfury · Sulfidic", "cat_es": "Sulfuroso", "origin": "H2S. A byproduct of all yeast fermentation, usually scrubbed out by CO2 during a vigorous boil/fermentation. Common in young lagers.", "mixology": "A distinct aroma of rotten eggs.", "origin_es": "H₂S. Un subproducto de toda fermentación de levadura, usualmente eliminado por el CO₂ durante un hervor/fermentación vigorosa. Común en las lagers jóvenes.", "mixology_es": "Un aroma distintivo de huevo podrido."}, "sulfury-sulfidic-mercaptan": {"cat": "Sulfury · Sulfidic", "cat_es": "Sulfuroso", "origin": "Ethanethiol. Caused by yeast autolysis or severe bacterial infections.", "mixology": "Smells like natural gas or raw sewage.", "origin_es": "Etanotiol. Causado por la autólisis de la levadura o por infecciones bacterianas severas.", "mixology_es": "Huele a gas natural o aguas residuales crudas."}, "sulfury-sulfidic-garlic": {"cat": "Sulfury · Sulfidic", "cat_es": "Sulfuroso", "origin": "Often from specific hop varieties (Summit, Mosaic) high in certain sulfur compounds, especially if harvested late.", "mixology": "A pungent, savory garlic or onion aroma.", "origin_es": "A menudo de variedades de lúpulo específicas (Summit, Mosaic) altas en ciertos compuestos de azufre, especialmente si se cosechan tarde.", "mixology_es": "Un aroma punzante y sabroso de ajo o cebolla."}, "sulfury-sulfidic-lightstruck": {"cat": "Sulfury · Sulfidic", "cat_es": "Sulfuroso", "origin": "3-methyl-2-butene-1-thiol (MBT). Formed when UV/blue light cleaves iso-alpha acids, which then bind with sulfur proteins. Happens in minutes in clear/green glass.", "mixology": "A classic 'skunky' aroma. Common in imported beers in green bottles.", "origin_es": "3-metil-2-buteno-1-tiol (MBT). Se forma cuando la luz UV/azul rompe los ácidos iso-alfa, que luego se unen con proteínas de azufre. Sucede en minutos en vidrio claro/verde.", "mixology_es": "Un aroma clásico 'asoleado'. Común en las cervezas importadas en botellas verdes."}, "sulfury-sulfidic-autolysed": {"cat": "Sulfury · Sulfidic", "cat_es": "Sulfuroso", "origin": "Result of yeast cell death and rupturing, spilling internal enzymes and amino acids into the beer. Often happens when left on the yeast cake too long.", "mixology": "A sharp, muddy, Vegemite or soy sauce-like flavor.", "origin_es": "Resultado de la muerte y ruptura de las células de levadura, que derraman enzimas y aminoácidos internos en la cerveza. A menudo sucede al dejarla sobre la cama de levadura demasiado tiempo.", "mixology_es": "Un sabor agudo, turbio, tipo Vegemite o salsa de soya."}, "sulfury-sulfidic-burnt-rubber": {"cat": "Sulfury · Sulfidic", "cat_es": "Sulfuroso", "origin": "A severe mercaptan/sulfur off-flavor, often from highly stressed yeast or specific infections.", "mixology": "A harsh, acrid smell of burning tires.", "origin_es": "Un sabor defectuoso severo de mercaptano/azufre, a menudo de levadura muy estresada o de infecciones específicas.", "mixology_es": "Un olor áspero y acre de llantas quemándose."}, "sulfury-sulfidic-shrimp-like": {"cat": "Sulfury · Sulfidic", "cat_es": "Sulfuroso", "origin": "Extreme manifestation of sulfur compounds, occasionally linked to specific marine-like bacterial contamination.", "mixology": "An unsettling, fishy or briny sulfur smell.", "origin_es": "Manifestación extrema de compuestos de azufre, ocasionalmente vinculada a una contaminación bacteriana específica de tipo marino.", "mixology_es": "Un olor de azufre inquietante, a pescado o salobre."}, "sulfury-cooked-vegetable-parsnip-celery": {"cat": "Sulfury · Cooked Vegetable", "cat_es": "Sulfuroso", "origin": "Aldehydic or sulfuric compounds from aged hops or malt oxidation.", "mixology": "An earthy, root-vegetable flavor.", "origin_es": "Compuestos aldehídicos o sulfúricos de lúpulos viejos o de la oxidación de la malta.", "mixology_es": "Un sabor terroso, de verdura de raíz."}, "sulfury-cooked-vegetable-dimethyl-sulfide": {"cat": "Sulfury · Cooked Vegetable", "cat_es": "Sulfuroso", "origin": "DMS. Originates from SMM in pale malts. Usually driven off by a vigorous 60+ minute boil. A known, acceptable background note in some German Lagers.", "mixology": "Tastes like creamed corn or canned cooked vegetables.", "origin_es": "DMS. Se origina del SMM en las maltas pálidas. Usualmente se elimina con un hervor vigoroso de 60+ minutos. Una nota de fondo conocida y aceptable en algunas lagers alemanas.", "mixology_es": "Sabe a elote con crema o verduras cocidas enlatadas."}, "sulfury-cooked-vegetable-cooked-cabbage": {"cat": "Sulfury · Cooked Vegetable", "cat_es": "Sulfuroso", "origin": "A variation of DMS or other sulfur compounds, indicating a poor boil or slow wort chilling.", "mixology": "A heavy, sulfurous boiled vegetable aroma.", "origin_es": "Una variación del DMS u otros compuestos de azufre, que indica un mal hervor o un enfriamiento lento del mosto.", "mixology_es": "Un aroma pesado y sulfuroso de verdura hervida."}, "sulfury-cooked-vegetable-cooked-sweet-corn": {"cat": "Sulfury · Cooked Vegetable", "cat_es": "Sulfuroso", "origin": "The textbook descriptor for classic Dimethyl Sulfide (DMS).", "mixology": "Tastes exactly like the water from a can of sweet corn.", "origin_es": "El descriptor de manual del clásico sulfuro de dimetilo (DMS).", "mixology_es": "Sabe exactamente al agua de una lata de elote dulce."}, "sulfury-cooked-vegetable-cooked-tomato": {"cat": "Sulfury · Cooked Vegetable", "cat_es": "Sulfuroso", "origin": "Another DMS/sulfur variant, sometimes interacting with oxidation.", "mixology": "A savory, slightly acidic cooked vegetable note.", "origin_es": "Otra variante de DMS/azufre, que a veces interactúa con la oxidación.", "mixology_es": "Una nota de verdura cocida sabrosa y ligeramente ácida."}, "sulfury-cooked-vegetable-cooked-onion": {"cat": "Sulfury · Cooked Vegetable", "cat_es": "Sulfuroso", "origin": "Dimethyl trisulfide (DMTS) or derived from specific hop varieties (like Summit).", "mixology": "A savory, cooked onion or shallot flavor.", "origin_es": "Trisulfuro de dimetilo (DMTS) o derivado de variedades de lúpulo específicas (como Summit).", "mixology_es": "Un sabor sabroso de cebolla cocida o chalota."}, "sulfury-cooked-vegetable-yeasty": {"cat": "Sulfury · Cooked Vegetable", "cat_es": "Sulfuroso", "origin": "Suspended yeast in the beer. Intentional in Hefeweizens and hazy IPAs; a flaw in filtered lagers. Contributes b-vitamins and a doughy profile.", "mixology": "A bready, doughy flavor, like raw bread dough or yeast nutrient.", "origin_es": "Levadura en suspensión en la cerveza. Intencional en las Hefeweizen y las IPA turbias; un defecto en las lagers filtradas. Aporta vitaminas B y un perfil a masa.", "mixology_es": "Un sabor a pan y a masa, como masa de pan cruda o nutriente de levadura."}, "stale-stale-catty": {"cat": "Stale", "cat_es": "Rancio", "origin": "p-mentha-8-thiol-3-one. Found in certain hops (Simcoe, Citra) but can become pronounced and off-putting as the beer ages and oxidizes.", "mixology": "A sharp aroma that strongly resembles cat urine or a blackcurrant bush.", "origin_es": "p-menta-8-tiol-3-ona. Presente en ciertos lúpulos (Simcoe, Citra) pero puede volverse pronunciada y desagradable a medida que la cerveza envejece y se oxida.", "mixology_es": "Un aroma agudo que recuerda fuertemente a la orina de gato o a un arbusto de grosella negra."}, "stale-stale-papery": {"cat": "Stale", "cat_es": "Rancio", "origin": "Trans-2-nonenal. The classic hallmark of beer oxidation. Formed by the oxidation of malt lipids.", "mixology": "Tastes like chewing on wet cardboard or old newspaper.", "origin_es": "Trans-2-nonenal. El sello clásico de la oxidación de la cerveza. Formado por la oxidación de los lípidos de la malta.", "mixology_es": "Sabe a masticar cartón mojado o periódico viejo."}, "stale-stale-leathery": {"cat": "Stale", "cat_es": "Rancio", "origin": "Oxidation in dark beers. Often a combination of oxidized melanoidins and esters.", "mixology": "A dry, earthy flavor reminiscent of an old leather armchair. Can be pleasant in aged stouts.", "origin_es": "Oxidación en las cervezas oscuras. A menudo una combinación de melanoidinas y ésteres oxidados.", "mixology_es": "Un sabor seco y terroso reminiscente de un viejo sillón de cuero. Puede ser agradable en las stouts añejadas."}, "stale-moldy-earthy": {"cat": "Stale · Moldy", "cat_es": "Rancio", "origin": "Geosmin. Can come from damp storage conditions, contaminated brewing water, or specific traditional English hops (Fuggles).", "mixology": "Tastes like damp soil or a freshly dug garden.", "origin_es": "Geosmina. Puede provenir de condiciones de almacenamiento húmedas, agua de elaboración contaminada o lúpulos ingleses tradicionales específicos (Fuggles).", "mixology_es": "Sabe a tierra húmeda o a un jardín recién excavado."}, "stale-moldy-musty": {"cat": "Stale · Moldy", "cat_es": "Rancio", "origin": "TCA (Trichloroanisole) or mold in the brewery environment (e.g., damp malt storage or old barrels).", "mixology": "A dank, old basement or wet dog smell.", "origin_es": "TCA (tricloroanisol) o moho en el ambiente de la cervecería (p. ej., almacenamiento húmedo de malta o barricas viejas).", "mixology_es": "Un olor a sótano viejo y húmedo o perro mojado."}, "acidic-acidic-acetic": {"cat": "Acidic", "cat_es": "Ácido", "origin": "Acetic acid. Produced by Acetobacter in the presence of oxygen. A severe fault in most beers, but essential in Flanders Red Ales.", "mixology": "A sharp, harsh sourness exactly like white vinegar.", "origin_es": "Ácido acético. Producido por Acetobacter en presencia de oxígeno. Un defecto severo en la mayoría de las cervezas, pero esencial en las Flanders Red Ale.", "mixology_es": "Una acidez aguda y áspera, exactamente como el vinagre blanco."}, "acidic-acidic-sour": {"cat": "Acidic", "cat_es": "Ácido", "origin": "Lactic acid. Produced by Lactobacillus or Pediococcus. Provides clean sourness in Berliner Weisse, Gose, and Lambics.", "mixology": "A clean, tangy tartness similar to plain yogurt or lemon juice.", "origin_es": "Ácido láctico. Producido por Lactobacillus o Pediococcus. Aporta una acidez limpia en la Berliner Weisse, la Gose y las Lambic.", "mixology_es": "Una acidez limpia y tangosa, similar al yogur natural o el jugo de limón."}, "sweet-sweet-honey": {"cat": "Sweet", "cat_es": "Dulce", "origin": "Can be an adjunct, or a sign of oxidation (specifically in lighter beers like Pilsners) where aldehydes mimic honey notes.", "mixology": "A floral, rich sweetness like raw honey.", "origin_es": "Puede ser un adjunto, o un signo de oxidación (específicamente en cervezas más ligeras como las Pilsner) donde los aldehídos imitan notas de miel.", "mixology_es": "Un dulzor floral y rico, como la miel cruda."}, "sweet-sweet-jam-like": {"cat": "Sweet", "cat_es": "Dulce", "origin": "Complex, concentrated fruit esters interacting with sweet malts or actual fruit purees in modern sours.", "mixology": "A thick, cooked-fruit sweetness like strawberry or raspberry preserves.", "origin_es": "Ésteres de fruta complejos y concentrados interactuando con maltas dulces o con purés de fruta reales en las sours modernas.", "mixology_es": "Un dulzor espeso de fruta cocida, como la mermelada de fresa o frambuesa."}, "sweet-sweet-vanilla": {"cat": "Sweet", "cat_es": "Dulce", "origin": "Vanillin. Derived from oak barrel aging (especially American Oak) or specific wild yeast phenolic reactions.", "mixology": "A smooth, creamy dessert-like sweetness.", "origin_es": "Vainillina. Derivada del añejamiento en barrica de roble (especialmente roble americano) o de reacciones fenólicas específicas de la levadura silvestre.", "mixology_es": "Un dulzor suave, cremoso, tipo postre."}, "sweet-sweet-primings": {"cat": "Sweet", "cat_es": "Dulce", "origin": "The taste of unfermented bottling sugar (dextrose/sucrose) if a bottle-conditioned beer hasn't carbonated properly.", "mixology": "A simple, flat sugar-water taste.", "origin_es": "El sabor del azúcar de embotellado sin fermentar (dextrosa/sacarosa) si una cerveza acondicionada en botella no se ha carbonatado adecuadamente.", "mixology_es": "Un sabor simple y plano de agua azucarada."}, "sweet-sweet-syrupy": {"cat": "Sweet", "cat_es": "Dulce", "origin": "High residual sugar (high terminal gravity) often from unfermentable dextrins or stalled fermentation.", "mixology": "A heavy, cloying sweetness that coats the mouth like pancake syrup.", "origin_es": "Alto azúcar residual (alta densidad final), a menudo de dextrinas no fermentables o de una fermentación estancada.", "mixology_es": "Un dulzor pesado y empalagoso que recubre la boca como la miel para hotcakes."}, "sweet-sweet-oversweet": {"cat": "Sweet", "cat_es": "Dulce", "origin": "A lack of balancing hop bitterness (IBUs) relative to the malt backbone (Original Gravity).", "mixology": "A saccharine, unbalanced sweetness that becomes tiring to drink.", "origin_es": "Una falta de amargor de lúpulo (IBU) que equilibre, en relación con la columna de malta (densidad original).", "mixology_es": "Un dulzor sacarino y desequilibrado que se vuelve cansado de beber."}, "mouthfeel-mouthfeel-bitter": {"cat": "Mouthfeel", "cat_es": "Sensación En Boca", "origin": "Iso-alpha acids isomerized during the boil. Measured in IBUs. Provides critical balance to malt sweetness.", "mixology": "The sharp, dry sensation on the back of the tongue, similar to black coffee or bitter greens.", "origin_es": "Ácidos iso-alfa isomerizados durante el hervor. Medidos en IBU. Aportan un equilibrio crítico al dulzor de la malta.", "mixology_es": "La sensación aguda y seca en el fondo de la lengua, similar al café negro o las verduras amargas."}, "mouthfeel-mouthfeel-salty": {"cat": "Mouthfeel", "cat_es": "Sensación En Boca", "origin": "Sodium chloride. Rare in most beer styles. A stylistic requirement for the historical Gose style from Leipzig.", "mixology": "A slight saline, briny quality that makes the beer very thirst-quenching.", "origin_es": "Cloruro de sodio. Raro en la mayoría de los estilos de cerveza. Un requisito estilístico del histórico estilo Gose de Leipzig.", "mixology_es": "Una ligera cualidad salina y salobre que vuelve la cerveza muy quitased."}, "mouthfeel-mouthfeel-alkaline": {"cat": "Mouthfeel", "cat_es": "Sensación En Boca", "origin": "High pH in brewing water or excessive extraction of silicates from grain husks.", "mixology": "A soapy, slippery, or chalky mouthfeel.", "origin_es": "pH alto en el agua de elaboración o extracción excesiva de silicatos de las cascarillas del grano.", "mixology_es": "Una sensación en boca jabonosa, resbaladiza o de
