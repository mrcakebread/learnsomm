<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnSomm · Training Portal</title>
    
    <script src="https://unpkg.com/firebase@10.x/firebase-app-compat.js"></script>
    <script src="https://unpkg.com/firebase@10.x/firebase-auth-compat.js"></script>

    <script>
        // 1. Force black immediately
        document.write('<style>body { visibility: hidden !important; background: #14110c !important; }</style>');

        // 2. PASTE YOUR EXACT KEYS FROM LOGIN.HTML HERE
        const firebaseConfig = {
            apiKey: "AIza...", 
            authDomain: "...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        // 3. Auth Gate
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                console.log("LOGGED IN: Revealing content...");
                document.body.style.visibility = 'visible';
            } else {
                console.log("NOT LOGGED IN: Redirecting...");
                window.location.href = '/index.html';
            }
        });

        // 4. FAIL-SAFE: If it stays black for 3 seconds, reveal it so we can debug
        setTimeout(() => {
            if (document.body.style.visibility !== 'visible') {
                console.error("FAIL-SAFE: Firebase hung, forcing reveal.");
                document.body.style.visibility = 'visible';
            }
        }, 3000);
    </script>
</head>
<body style="background:#14110c">
    <iframe src="wine-aroma-wheel-demo-v9.html" style="width:100%; height:100vh; border:none;"></iframe>
</body>
</html>
