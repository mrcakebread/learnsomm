<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnSomm · Training Portal</title>
    
    <style id="security-gate">
        body { visibility: hidden !important; background: #14110c !important; }
    </style>

    <script src="https://unpkg.com/firebase@10.x/firebase-app-compat.js"></script>
    <script src="https://unpkg.com/firebase@10.x/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsmpFOWKhVaUZD4EQR24AtOpyKDX2JhGg",
            authDomain: "mark-s-wine-training.firebaseapp.com",
            projectId: "mark-s-wine-training",
            storageBucket: "mark-s-wine-training.firebasestorage.app",
            messagingSenderId: "424279465207",
            appId: "1:424279465207:web:7be6d1a760bc92d045c7f2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        // Security Gate
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                // Reveal body
                const gate = document.getElementById('security-gate');
                if (gate) gate.remove();
                document.body.style.visibility = 'visible';
            } else {
                // Redirect to root index
                window.location.replace('/index.html');
            }
        });
    </script>
</head>
<body style="margin:0; background:#14110c; overflow:hidden;">
    <iframe src="wine-aroma-wheel-demo-v9.html" style="width:100%; height:100vh; border:none; display:block;"></iframe>
</body>
</html>
