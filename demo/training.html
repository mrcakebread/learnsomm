<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnSomm · Free Training Wheel</title>
  <script src="https://unpkg.com/firebase@10.x/firebase-app-compat.js"></script>
<script src="https://unpkg.com/firebase@10.x/firebase-auth-compat.js"></script>
<script>
    document.write('<style>body { visibility: hidden !important; background: #14110c !important; }</style>');
    
    const firebaseConfig = { /* YOUR CONFIG */ };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            document.body.style.visibility = 'visible';
        } else {
            window.location.href = 'index.html'; // Bounce them to your splash/login page
        }
    });
</script>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#14110c}
  #wheel-frame{width:100%;height:100vh;border:none;display:block}
  /* lightweight loading veil until the demo paints */
  #veil{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;background:#14110c;
        font-family:'Optima','Candara','Gill Sans',sans-serif;color:#d4b276;letter-spacing:.18em;text-transform:uppercase;font-size:.8rem;transition:opacity .5s}
  #veil.gone{opacity:0;pointer-events:none}
</style>
</head>
<body>
  <div id="veil">Loading your tasting wheel…</div>
  <!-- The self-contained landing demo: docking, 5 free spins, walkthrough, switcher (wine/coffee/tea),
       draggable cheat sheet, notepad. It handles its own lockout & upgrade prompts. -->
  <iframe id="wheel-frame" src="wine-aroma-wheel-demo-v9.html" title="LearnSomm Free Training Wheel"
          allow="clipboard-write"></iframe>
  <script>
    // hide the veil once the demo frame loads
    document.getElementById('wheel-frame').addEventListener('load',function(){
      var v=document.getElementById('veil'); if(v){v.classList.add('gone');setTimeout(function(){v.style.display='none';},600);}
    });
    // light anti-copy (kept from the original portal)
    document.addEventListener('contextmenu',function(e){e.preventDefault();});
    document.addEventListener('keydown',function(e){
      if(e.key==='F12')e.preventDefault();
      if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['i','c','j'].indexOf(e.key.toLowerCase())>-1)e.preventDefault();
      if((e.ctrlKey||e.metaKey)&&['u','s'].indexOf(e.key.toLowerCase())>-1)e.preventDefault();
    });
  </script>
</body>
</html>
