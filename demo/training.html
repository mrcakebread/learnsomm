<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnSomm · Training Portal</title>
    
    <style>
        body { margin:0; background:#14110c; overflow:hidden; }
        #wheel-frame { width:100%; height:100vh; border:none; display:block; }
    </style>
</head>
<body>
    <iframe id="wheel-frame" src="wine-aroma-wheel-demo-v9.html"></iframe>
    
    <script>
        /* Anti-copy protections */
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            const k = e.key.toUpperCase();
            if (e.key === 'F12' || 
               ((e.ctrlKey || e.metaKey) && e.shiftKey && ['I','C','J'].includes(k)) ||
               ((e.ctrlKey || e.metaKey) && ['U','S'].includes(k))) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
