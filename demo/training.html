<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnSomm · Training Portal</title>
    
    <style id="security-gate">
        body { visibility: hidden !important; background: #14110c !important; }
    </style>

    <script src="https://unpkg.com/firebase@10.x/firebase-app-compat.js"></script>
    <script src="https://unpkg.com/firebase@10.x/firebase-auth-compat.js"></script>

    <script>
        // FAIL-SAFE: If the security script crashes, show the page anyway after 2 seconds
        // so you can see what is happening.
        setTimeout(() => {
            const gate = document.getElementById('security-gate');
            if (gate) {
                console.warn("Security gate failed, forcing reveal.");
                gate.remove();
                document.body.style.visibility = 'visible';
            }
        }, 2000);

        const firebaseConfig = {
            apiKey: "AIzaSyCsmpFOWKhVaUZD4EQR24AtOpyKDX2JhGg",
            authDomain: "mark-s-wine-training.firebaseapp.com",
            projectId: "mark-s-wine-training",
            storageBucket: "mark-s-wine-training.firebasestorage.app",
            messagingSenderId: "424279465207",
            appId: "1:424279465207:web:7be6d1a760bc92d045c7f2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                const gate = document.getElementById('security-gate');
                if (gate) gate.remove();
                document.body.style.visibility = 'visible';
            } else {
                // If not logged in, go to root index.html
                window.location.replace('/index.html'); 
            }
        });
    </script>
</head>
<body style="margin:0; background:#14110c; overflow:hidden;">
    <iframe src="wine-aroma-wheel-demo-v9.html" style="width:100%; height:100vh; border:none; display:block;"></iframe>
    
    <script>
        /* Anti-copy protections */
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            const k = e.key.toUpperCase();
            if (e.key === 'F12' || 
               ((e.ctrlKey || e.metaKey) && e.shiftKey && ['I','C','J'].includes(k)) ||
               ((e.ctrlKey || e.metaKey) && ['U','S'].includes(k))) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
