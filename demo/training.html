<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnSomm · Training Portal</title>
    
    <style>
        body { margin: 0; background: #14110c !important; overflow: hidden; }
        #wheel-frame { width: 100%; height: 100vh; border: none; display: block; }
    </style>

    <script src="https://unpkg.com/firebase@10.x/firebase-app-compat.js"></script>
    <script src="https://unpkg.com/firebase@10.x/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsmpFOWKhVaUZD4EQR24AtOpyKDX2JhGg",
            authDomain: "mark-s-wine-training.firebaseapp.com",
            projectId: "mark-s-wine-training",
            storageBucket: "mark-s-wine-training.firebasestorage.app",
            messagingSenderId: "424279465207",
            appId: "1:424279465207:web:7be6d1a760bc92d045c7f2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        // Security check
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                // User is authenticated
                console.log("Access Granted");
            } else {
                // Redirect if not logged in
                window.location.replace('/index.html');
            }
        });
    </script>
</head>
<body>
    <iframe id="wheel-frame" src="wine-aroma-wheel-demo-v9.html"></iframe>
    
    <script>
        // Anti-copy
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','C','J'].includes(e.key.toUpperCase()))) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
