function rowHTML(r){const pc=r.pair?" pair":"";const tag=lang==="es"?(r.tag_es||r.tag):r.tag;const txt=lang==="es"?(r.text_es||r.text):r.text;const st=r.pair?"":`style="background:${tc(r.tag)}"`;return `<div class="row${pc}"><span class="tag" ${st}>${tag}</span><span>${txt}</span></div>`;}
function renderScreen(){const t=UI[lang];$("langBtn").textContent=lang==="es"?"EN":"ES";$("docTitle").textContent=lang==="es"?TITLE_ES:TITLE_EN;$("docSub").textContent=t.sub;$("foldHint").innerHTML=t.fold;$("byline").innerHTML=t.byline;
$("sections").innerHTML=DATA.sections.map(s=>{const label=L(s,"label");const cards=s.cards.map(c=>{const title=L(c,"title");const badge=c.badge?(lang==="es"?(c.badge_es||c.badge):c.badge):null;return `<div class="card" data-slug="${(c.slug)||''}" data-title="${title}"><div class="card-header"><span class="card-title">${title}${badge?`<span class="badge">${badge}</span>`:""}</span><span class="chevron">\u25bc</span></div><div class="card-body"><div class="card-inner">${c.rows.map(rowHTML).join("")}</div></div></div>`;}).join("");return label?`<div class="section-label">${label}</div>${cards}`:cards;}).join("");
$("sections").onclick=ev=>{const c=ev.target.closest(".card");if(c)c.classList.toggle("active");};}
const FLAT=[];DATA.sections.forEach(s=>s.cards.forEach(c=>FLAT.push({sec:s,c})));
function sizes(n){const b=Math.floor(n/5),r=n%5;return Array.from({length:5},(_,i)=>b+(i<r?1:0));}
function pcard(f){const rows=f.c.rows.filter(r=>!r.pair).slice(0,2).map(r=>`<span class="pl">${lang==="es"?(r.text_es||r.text):r.text}</span>`).join("; ");return `<div class="pc"><span class="pn">${L(f.c,"title")}</span> — ${rows}</div>`;}
function renderPrint(){const t=UI[lang];const sz=sizes(FLAT.length);const packs=[];let i=0;sz.forEach(s=>{packs.push(FLAT.slice(i,i+s));i+=s;});const big=FLAT[0]?FLAT[0].c.qr:"";const TT=lang==="es"?TITLE_ES:TITLE_EN;
function cp(arr,cls){let html="",last=null;arr.forEach(f=>{const lbl=L(f.sec,"label")||TT;if(lbl!==last){html+=`<h4>${lbl}</h4>`;last=lbl;}html+=pcard(f);});const qr=arr[0]?arr[0].c.qr:"";return `<div class="panel ${cls}">${html}<div class="pqr">${qr}</div></div>`;}
const panels={1:`<div class="panel p1 pcover"><div class="ck">LearnSomm · Cheat Sheet</div><div class="ct">${TT}</div><div style="font-size:6pt;color:#a87f3d;margin-top:.05in">${t.cover}</div><div style="font-size:5.4pt;color:#888;margin-top:.5in">© 2026 LearnSomm.com</div></div>`,
2:cp(packs[0],"p2"),3:cp(packs[1],"p3"),4:cp(packs[2],"p4"),5:cp(packs[3],"p5"),6:cp(packs[4],"p6"),
7:`<div class="panel p7"><h4>${t.use}</h4><div class="pl">${t.useText}</div></div>`,
8:`<div class="panel p8 pback"><h4>${t.wheel}</h4><div style="text-align:center">${t.scan}</div><div class="bigqr">${big}</div><div style="text-align:center;font-size:5.4pt;color:#888">{{USER_EMAIL}}<br>© 2026 LearnSomm.com</div></div>`};
$("printsheet").innerHTML=[1,2,3,4,5,6,7,8].map(n=>panels[n]).join("");}
function renderAll(){renderScreen();renderPrint();}
$("langBtn").onclick=()=>{lang=lang==="es"?"en":"es";renderAll();};
$("themeBtn").onclick=()=>{const dk=document.body.getAttribute("data-theme")==="dark";document.body.setAttribute("data-theme",dk?"light":"dark");$("themeBtn").textContent=dk?"\u263e":"\u2600";};
$("printBtn").onclick=()=>window.print();renderAll();

function initSearch(){
  const inp=document.getElementById("searchInput"),clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){const q=inp.value.trim().toLowerCase();clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");if(!sect)return;let any=false;
    sect.querySelectorAll(".card").forEach(card=>{const show=!q||(card.textContent||"").toLowerCase().includes(q);card.style.display=show?"":"none";if(show)any=true;});
    sect.querySelectorAll(".section-label").forEach(lbl=>{let nx=lbl.nextElementSibling,vis=false;while(nx&&!nx.classList.contains("section-label")){if(nx.style.display!=="none")vis=true;nx=nx.nextElementSibling;}lbl.style.display=vis?"":"none";});
    let nr=document.querySelector(".no-results");if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}nr.style.display=any||!q?"none":"block";}
  inp.addEventListener("input",doFilter);clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});}
initSearch();

/* ── click-to-spin ── */
(function(){
  function norm(s){return (''+s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,'');}
  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}
  document.addEventListener('click',function(e){
    var card=e.target.closest&&e.target.closest('.card[data-slug],.card[data-title]');
    if(!card)return;
    var slug=card.getAttribute('data-slug')||'';
    var title=card.getAttribute('data-title')||'';
    send(slug||title);
    if(title&&title!==slug)send(title);
  });
  try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SHEET_READY'},'*');}}catch(e){}
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='LS_WHEEL_NAMES')return;
    var names=d.names||{};
    document.querySelectorAll('.card[data-slug],.card[data-title]').forEach(function(card){
      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */
