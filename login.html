<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnSomm | Secure Login</title>
    <style>
        body { 
            background: #000; color: #d4b276; display: flex; 
            align-items: center; justify-content: center; 
            height: 100vh; font-family: Georgia, serif; margin: 0; 
        }
        #login-container { 
            text-align: center; border: 1px solid #332; 
            padding: 40px; border-radius: 8px; background: #0a0602; 
        }
        h2 { letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 25px; }
        input { 
            display: block; width: 250px; padding: 10px; margin: 10px auto; 
            background: #1a1208; border: 1px solid #332; color: #fff; 
        }
        button { 
            background: #d4b276; color: #000; border: none; 
            padding: 10px 25px; margin-top: 15px; cursor: pointer; 
            text-transform: uppercase; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>LearnSomm Access</h2>
        <input type="email" id="email" placeholder="Sommelier Email">
        <input type="password" id="password" placeholder="Key">
        <button id="login-btn">Authenticate</button>
    </div>

    <script type="module">
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.x.x/firebase-auth.js";
        import { app } from "./firebase-config.js";

        const auth = getAuth(app);
        
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            signInWithEmailAndPassword(auth, email, pass)
                .then((userCredential) => {
                    // Success: Redirect to the hub
                    window.location.href = 'hub.html';
                })
                .catch((error) => {
                    // Fail: Show error
                    alert("Access Denied: " + error.message);
                });
        });
    </script>
</body>
</html>
