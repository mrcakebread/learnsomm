<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnSomm | Access</title>
    <script src="https://unpkg.com/firebase@10.x/firebase-app-compat.js"></script>
    <script src="https://unpkg.com/firebase@10.x/firebase-auth-compat.js"></script>
    <style>
        body { background: #000; color: #d4b276; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        #login-container { text-align: center; border: 1px solid #332; padding: 40px; background: #0a0602; }
        input { display: block; width: 250px; padding: 10px; margin: 10px auto; background: #1a1208; border: 1px solid #332; color: #fff; }
        button { background: #d4b276; padding: 10px 25px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-container">
        <h2>LearnSomm Access</h2>
        <input type="email" id="email" placeholder="Email" autocomplete="username">
        <input type="password" id="password" placeholder="Key" autocomplete="current-password">
        <button id="login-btn">Authenticate</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsmpFOWKhVaUZD4EQR24AtOpyKDX2JhGg",
            authDomain: "mark-s-wine-training.firebaseapp.com",
            projectId: "mark-s-wine-training",
            storageBucket: "mark-s-wine-training.firebasestorage.app",
            messagingSenderId: "424279465207",
            appId: "1:424279465207:web:7be6d1a760bc92d045c7f2"
        };

        // Initialize immediately
        firebase.initializeApp(firebaseConfig);

        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(() => window.location.href = 'hub.html')
                .catch(err => alert("Auth Error: " + err.message));
        });
    </script>
</body>
</html>
