<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LearnSomm · Chinese Cuisine Cheat Sheet</title>
<style>
:root{--bg:#faf8f3;--panel:#fffdf7;--ink:#2b2118;--muted:#8a7c66;--line:#e2dacb;--line2:#c9bfa6;--garnet:#6E1B2E;--gold:#C49A4A;--ui:'Jost',system-ui,sans-serif;--serif:'Cormorant Garamond',Georgia,serif;}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--ui);background:var(--bg);color:var(--ink);}
button,input,select,textarea,.card,.ct,.cn,.gcard,.ghead,#tierBar,.viewseg{font-family:var(--ui)!important;}
.wrap{max-width:1100px;margin:0 auto;padding:14px 14px 60px;}
.top{display:flex;flex-wrap:wrap;align-items:center;gap:.8rem;padding:.4rem 0 .8rem;}
h1{font-family:var(--serif);font-size:1.5rem;margin:0;font-weight:600;}
.sub{color:var(--muted);font-size:.82rem;}
#tierBar{display:inline-flex;align-items:center;gap:.4rem;background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:.32rem .5rem;}
#tierBar .tl{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:0 .3rem;}
#tierBar button{border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:14px;padding:.3rem .7rem;font-family:var(--ui);font-size:.8rem;cursor:pointer;}
#tierBar button.active{background:var(--garnet);color:#fff;border-color:var(--garnet);}
.viewseg{display:inline-flex;border:1px solid var(--line2);border-radius:14px;overflow:hidden;}
.viewseg button{border:none;background:transparent;color:var(--ink);font-size:.78rem;padding:.3rem .7rem;cursor:pointer;font-family:var(--ui);}
.viewseg button.active{background:var(--gold);color:#3a2a20;}
#search{flex:1 1 200px;min-width:160px;}
#search input{width:100%;padding:.5rem .7rem;border:1px solid var(--line2);border-radius:10px;font-family:var(--ui);font-size:.9rem;background:var(--panel);color:var(--ink);}
.grid{column-width:250px;column-gap:14px;}
.gcard{display:inline-block;width:100%;break-inside:avoid;margin:0 0 14px;background:var(--panel);border:1.5px solid var(--g);border-top:5px solid var(--g);border-radius:10px;padding:.6rem .7rem;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ghead{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g);margin:0 0 .5rem;}
.card{display:block;width:100%;text-align:left;border:1px solid color-mix(in srgb,var(--g) 35%,transparent);border-left:3px solid var(--g);background:color-mix(in srgb,var(--g) 8%,var(--bg));border-radius:7px;padding:.45rem .55rem;margin:0 0 .35rem;cursor:pointer;}
.card:hover{background:color-mix(in srgb,var(--g) 18%,var(--bg));}
.card .ct{font-weight:600;font-size:.9rem;}
.card .cn{font-size:.8rem;color:var(--muted);margin-top:.15rem;line-height:1.35;}
.card .badge{float:right;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line2);border-radius:8px;padding:.05rem .35rem;}
.card.spinnable .ct::after{content:' ↻';color:var(--gold);font-size:.8rem;}
.empty{color:var(--muted);font-style:italic;padding:1rem;}
#tierNote{font-size:.8rem;color:var(--muted);margin:.2rem 0 .8rem;}
</style></head>
<body><div class="wrap">
<div class="top">
  <div><h1>Chinese Cuisine</h1><div class="sub">Dishes, sauces & techniques · the all-in-one Italian cuisine reference</div></div>
  <div id="tierBar"><span class="tl">Tier</span>
    <button data-tier="1">Intro</button>
    <button data-tier="2" class="active">Next Level</button>
    <button data-tier="3">Master</button>
  </div>
  <div class="viewseg"><button data-view="all" class="active">All</button><button data-view="type">Types</button><button data-view="aroma">Aromas</button></div>
  <div id="search"><input id="q" type="search" placeholder="Search styles, terms, aromas…" autocomplete="off"></div>
</div>
<div id="tierNote"></div>
<div class="grid" id="grid"></div>
</div>
<script>
var CARDS=[{"name": "Cantonese", "tier": 1, "group": "Regional Cuisines", "note": "Guangdong; fresh, light, steaming & stir-fry, dim sum heartland.", "wheel": "type", "color": "#c0392b", "slug": "cn-cantonese"}, {"name": "Sichuan", "tier": 1, "group": "Regional Cuisines", "note": "Bold, numbing-spicy (málà) from Sichuan peppercorn & chili.", "wheel": "type", "color": "#c0392b", "slug": "cn-sichuan"}, {"name": "Hunan", "tier": 2, "group": "Regional Cuisines", "note": "Xiang cuisine; purely hot, sour, smoky — drier heat than Sichuan.", "wheel": "type", "color": "#c0392b", "slug": "cn-hunan"}, {"name": "Shandong", "tier": 3, "group": "Regional Cuisines", "note": "Lu cuisine; northern, savory, seafood & wheat, braises.", "wheel": "type", "color": "#c0392b", "slug": "cn-shandong"}, {"name": "Jiangsu", "tier": 3, "group": "Regional Cuisines", "note": "Huaiyang; refined knife work, sweet-savory, delicate braises.", "wheel": "type", "color": "#c0392b", "slug": "cn-jiangsu"}, {"name": "Fujian", "tier": 3, "group": "Regional Cuisines", "note": "Min cuisine; umami broths, seafood, 'Buddha Jumps Over the Wall'.", "wheel": "type", "color": "#c0392b", "slug": "cn-fujian"}, {"name": "Har Gow", "tier": 1, "group": "Dim Sum", "note": "Crystal shrimp dumpling with pleated translucent wrapper.", "wheel": "type", "color": "#e67e22", "slug": "cn-hargow"}, {"name": "Siu Mai", "tier": 1, "group": "Dim Sum", "note": "Open-topped pork-and-shrimp dumpling.", "wheel": "type", "color": "#e67e22", "slug": "cn-siumai"}, {"name": "Char Siu Bao", "tier": 1, "group": "Dim Sum", "note": "Fluffy steamed bun filled with sweet barbecue pork.", "wheel": "type", "color": "#e67e22", "slug": "cn-chasiubao"}, {"name": "Cheung Fun", "tier": 2, "group": "Dim Sum", "note": "Silky steamed rice-noodle rolls with soy.", "wheel": "type", "color": "#e67e22", "slug": "cn-cheungfun"}, {"name": "Lo Mai Gai", "tier": 2, "group": "Dim Sum", "note": "Sticky rice with chicken steamed in lotus leaf.", "wheel": "type", "color": "#e67e22", "slug": "cn-lomaigai"}, {"name": "Egg Tart", "tier": 2, "group": "Dim Sum", "note": "Dan tat; flaky or cookie crust with custard center.", "wheel": "type", "color": "#e67e22", "slug": "cn-eggtart"}, {"name": "Chow Mein", "tier": 1, "group": "Noodles & Rice", "note": "Stir-fried noodles, crisp or soft.", "wheel": "type", "color": "#d4a017", "slug": "cn-chowmein"}, {"name": "Lo Mein", "tier": 1, "group": "Noodles & Rice", "note": "Tossed soft wheat noodles in sauce.", "wheel": "type", "color": "#d4a017", "slug": "cn-lomein"}, {"name": "Dan Dan Noodles", "tier": 2, "group": "Noodles & Rice", "note": "Sichuan noodles in spicy sesame-chili sauce.", "wheel": "type", "color": "#d4a017", "slug": "cn-dandan"}, {"name": "Beef Chow Fun", "tier": 2, "group": "Noodles & Rice", "note": "Wide rice noodles with beef, 'wok hei' char.", "wheel": "type", "color": "#d4a017", "slug": "cn-chowfun"}, {"name": "Yangzhou Fried Rice", "tier": 1, "group": "Noodles & Rice", "note": "Classic fried rice with egg, shrimp, char siu, peas.", "wheel": "type", "color": "#d4a017", "slug": "cn-friedrice"}, {"name": "Congee", "tier": 2, "group": "Noodles & Rice", "note": "Savory rice porridge, comfort breakfast.", "wheel": "type", "color": "#d4a017", "slug": "cn-congee"}, {"name": "Zhajiangmian", "tier": 3, "group": "Noodles & Rice", "note": "Noodles in fermented soybean-pork sauce.", "wheel": "type", "color": "#d4a017", "slug": "cn-zhajiang"}, {"name": "Peking Duck", "tier": 1, "group": "Iconic Dishes", "note": "Lacquered roast duck, crisp skin, pancakes & hoisin.", "wheel": "type", "color": "#8e44ad", "slug": "cn-peking"}, {"name": "Kung Pao Chicken", "tier": 1, "group": "Iconic Dishes", "note": "Sichuan chicken with peanuts, chili, numbing pepper.", "wheel": "type", "color": "#8e44ad", "slug": "cn-kungpao"}, {"name": "Mapo Tofu", "tier": 1, "group": "Iconic Dishes", "note": "Tofu in spicy doubanjiang-and-pork sauce, numbing.", "wheel": "type", "color": "#8e44ad", "slug": "cn-mapo"}, {"name": "Sweet & Sour Pork", "tier": 2, "group": "Iconic Dishes", "note": "Battered pork with tangy red sauce.", "wheel": "type", "color": "#8e44ad", "slug": "cn-sweetsour"}, {"name": "Twice-Cooked Pork", "tier": 2, "group": "Iconic Dishes", "note": "Pork belly boiled then stir-fried with leeks & bean paste.", "wheel": "type", "color": "#8e44ad", "slug": "cn-twicecooked"}, {"name": "Hot Pot", "tier": 1, "group": "Iconic Dishes", "note": "Simmering communal broth for cooking at the table.", "wheel": "type", "color": "#8e44ad", "slug": "cn-hotpot"}, {"name": "Xiaolongbao", "tier": 2, "group": "Iconic Dishes", "note": "Shanghai soup dumplings with gelatin-rich filling.", "wheel": "type", "color": "#8e44ad", "slug": "cn-xlb"}, {"name": "Soy Sauce", "tier": 1, "group": "Seasonings & Sauces", "note": "Fermented soybean sauce; light (salty) vs dark (color).", "wheel": "type", "color": "#16a085", "slug": "cn-soy"}, {"name": "Oyster Sauce", "tier": 1, "group": "Seasonings & Sauces", "note": "Thick savory-sweet sauce from oyster extract.", "wheel": "type", "color": "#16a085", "slug": "cn-oyster"}, {"name": "Doubanjiang", "tier": 2, "group": "Seasonings & Sauces", "note": "Fermented broad-bean chili paste, soul of Sichuan.", "wheel": "type", "color": "#16a085", "slug": "cn-doubanjiang"}, {"name": "Hoisin", "tier": 2, "group": "Seasonings & Sauces", "note": "Sweet-savory soybean glaze.", "wheel": "type", "color": "#16a085", "slug": "cn-hoisin"}, {"name": "Shaoxing Wine", "tier": 2, "group": "Seasonings & Sauces", "note": "Aged rice wine for cooking depth.", "wheel": "type", "color": "#16a085", "slug": "cn-shaoxing"}, {"name": "Five-Spice", "tier": 2, "group": "Seasonings & Sauces", "note": "Star anise, fennel, clove, cinnamon, Sichuan pepper.", "wheel": "type", "color": "#16a085", "slug": "cn-fivespice"}, {"name": "Black Vinegar", "tier": 3, "group": "Seasonings & Sauces", "note": "Chinkiang; malty aged rice vinegar.", "wheel": "type", "color": "#16a085", "slug": "cn-blackvinegar"}, {"name": "Ginger", "tier": 1, "group": "Aromatics & Produce", "note": "Pungent rhizome, base aromatic.", "wheel": "type", "color": "#27ae60", "slug": "cn-ginger"}, {"name": "Scallion", "tier": 1, "group": "Aromatics & Produce", "note": "Green onion, finishing & aromatic.", "wheel": "type", "color": "#27ae60", "slug": "cn-scallion"}, {"name": "Garlic", "tier": 1, "group": "Aromatics & Produce", "note": "Foundational aromatic.", "wheel": "type", "color": "#27ae60", "slug": "cn-garlic"}, {"name": "Bok Choy", "tier": 2, "group": "Aromatics & Produce", "note": "Crisp mild brassica.", "wheel": "type", "color": "#27ae60", "slug": "cn-bokchoy"}, {"name": "Gai Lan", "tier": 2, "group": "Aromatics & Produce", "note": "Chinese broccoli, slightly bitter.", "wheel": "type", "color": "#27ae60", "slug": "cn-gailan"}, {"name": "Wood Ear", "tier": 3, "group": "Aromatics & Produce", "note": "Crunchy gelatinous fungus.", "wheel": "type", "color": "#27ae60", "slug": "cn-woodear"}, {"name": "Lotus Root", "tier": 3, "group": "Aromatics & Produce", "note": "Crisp, lacy-holed rhizome.", "wheel": "type", "color": "#27ae60", "slug": "cn-lotus"}, {"name": "Stir-Fry", "tier": 1, "group": "Techniques", "note": "Quick high-heat tossing in a wok.", "wheel": "type", "color": "#2980b9", "slug": "cn-stirfry"}, {"name": "Wok Hei", "tier": 2, "group": "Techniques", "note": "'Breath of the wok' — the smoky char of high-heat stir-fry.", "wheel": "type", "color": "#2980b9", "slug": "cn-wokhei"}, {"name": "Velveting", "tier": 2, "group": "Techniques", "note": "Marinating meat in starch/egg white for silkiness.", "wheel": "type", "color": "#2980b9", "slug": "cn-velveting"}, {"name": "Red Cooking", "tier": 2, "group": "Techniques", "note": "Slow braise in soy, sugar, wine (hong shao).", "wheel": "type", "color": "#2980b9", "slug": "cn-redcooking"}, {"name": "Double Steaming", "tier": 3, "group": "Techniques", "note": "Gentle steaming of a sealed vessel for soups.", "wheel": "type", "color": "#2980b9", "slug": "cn-doublesteam"}, {"name": "Oolong", "tier": 1, "group": "Tea & Sweets", "note": "Partially oxidized tea, floral to roasted.", "wheel": "type", "color": "#c39bd3", "slug": "cn-oolong"}, {"name": "Pu-erh", "tier": 2, "group": "Tea & Sweets", "note": "Fermented, aged dark tea, earthy.", "wheel": "type", "color": "#c39bd3", "slug": "cn-puerh"}, {"name": "Jasmine Tea", "tier": 1, "group": "Tea & Sweets", "note": "Green tea scented with jasmine.", "wheel": "type", "color": "#c39bd3", "slug": "cn-jasmine"}, {"name": "Mooncake", "tier": 2, "group": "Tea & Sweets", "note": "Dense pastry with lotus/red-bean for Mid-Autumn.", "wheel": "type", "color": "#c39bd3", "slug": "cn-mooncake"}, {"name": "Tangyuan", "tier": 3, "group": "Tea & Sweets", "note": "Glutinous rice balls in sweet broth.", "wheel": "type", "color": "#c39bd3", "slug": "cn-tangyuan"}, {"name": "Mango Pudding", "tier": 3, "group": "Tea & Sweets", "note": "Chilled creamy mango dessert.", "wheel": "type", "color": "#c39bd3", "slug": "cn-mango"}];
var TIER=2, VIEW='all', Q='';
var TIERNAME={1:'Intro',2:'Next Level',3:'Master'};
function visible(c){
  if(c.tier>TIER) return false;
  if(VIEW!=='all' && c.wheel!==VIEW) return false;
  if(Q){ var s=(c.name+' '+c.group+' '+c.note).toLowerCase(); if(s.indexOf(Q)<0) return false; }
  return true;
}
function slugify(s){ return s.toLowerCase().replace(/\(.*?\)/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function render(){
  var grid=document.getElementById('grid'); grid.innerHTML='';
  // group visible cards by group
  var groups={};
  CARDS.filter(visible).forEach(function(c){ (groups[c.group]=groups[c.group]||[]).push(c); });
  // Aromas & tasting notes always come first, then the other (type/style/service) groups.
  var order=Object.keys(groups).sort(function(a,b){
    var aw=(groups[a][0].wheel==='aroma')?0:1, bw=(groups[b][0].wheel==='aroma')?0:1;
    return aw-bw; // stable-ish: aroma groups (0) before type groups (1)
  });
  if(!order.length){ grid.innerHTML='<div class="empty">Nothing at this tier/filter.</div>'; updateNote(0); return; }
  var shown=0;
  order.forEach(function(g){
    var color=groups[g][0].color;
    var block=document.createElement('div'); block.className='gcard'; block.style.setProperty('--g',color);
    var head=document.createElement('div'); head.className='ghead'; head.textContent=g; block.appendChild(head);
    groups[g].forEach(function(c){
      shown++;
      var card=document.createElement('button'); card.type='button'; card.className='card';
      card.style.setProperty('--g',color);
      card.setAttribute('data-title', c.name); card.setAttribute('data-slug', slugify(c.name)); if(c.slug)card.setAttribute('data-wheelslug', c.slug);
      // per-card tier label removed — the tier toggle already conveys this
      card.innerHTML='<div class="ct">'+c.name+'</div><div class="cn">'+c.note+'</div>';
      block.appendChild(card);
    });
    grid.appendChild(block);
  });
  updateNote(shown);
  applyWheelNames();
}
function updateNote(n){
  var locked=CARDS.filter(function(c){return c.tier>TIER;}).length;
  var t=document.getElementById('tierNote');
  t.textContent=TIERNAME[TIER]+' view · '+n+' entries shown'+(locked? ' · '+locked+' more unlock at higher tiers':'');
}
// tier + view + search wiring
document.querySelectorAll('#tierBar button').forEach(function(b){ b.addEventListener('click',function(){
  document.querySelectorAll('#tierBar button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
  TIER=parseInt(b.getAttribute('data-tier')); render();
}); });
document.querySelectorAll('.viewseg button').forEach(function(b){ b.addEventListener('click',function(){
  document.querySelectorAll('.viewseg button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
  VIEW=b.getAttribute('data-view'); render();
}); });
document.getElementById('q').addEventListener('input',function(e){ Q=e.target.value.trim().toLowerCase(); render(); });

// ---- click-to-spin: tell the parent wheel to spin to this term (by NAME; wheel resolves) ----
function postSpin(name){ try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_SPIN_TO',slug:name},'*'); } }catch(e){} }
document.addEventListener('click',function(e){
  var card=e.target.closest&&e.target.closest('.card');
  if(card){ postSpin(card.getAttribute('data-wheelslug')||card.getAttribute('data-title')); }
});
// announce ready; receive wheel names to mark spinnable + resolve
try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({type:'LS_SHEET_READY'},'*'); } }catch(e){}
var WHEEL_NAMES={};
window.addEventListener('message',function(e){ var d=e.data; if(!d)return;
  if(d.type==='LS_WHEEL_NAMES'){ WHEEL_NAMES=d.names||{}; applyWheelNames(); }
  if(d.type==='LS_CMD' && d.cmd==='tier'){ var bt=document.querySelector('#tierBar [data-tier="'+(d.value||2)+'"]'); if(bt)bt.click(); }
});
function applyWheelNames(){
  document.querySelectorAll('.card').forEach(function(card){
    var title=(card.getAttribute('data-title')||'').toLowerCase().trim();
    var ws=null;
    if(WHEEL_NAMES[title]) ws=WHEEL_NAMES[title];
    else for(var nm in WHEEL_NAMES){ if(nm===title||(title&&(nm.indexOf(title)>=0||title.indexOf(nm)>=0))){ ws=WHEEL_NAMES[nm]; break; } }
    if(ws){ card.setAttribute('data-wheelslug',ws); card.classList.add('spinnable'); }
  });
}
render();
</script><script id="lsFontApply">
(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
</body></html>
