*{box-sizing:border-box}html,body{margin:0}body{background:var(--bg);color:var(--text);font-family:'Charter','Bitstream Charter','Cambria','Iowan Old Style',Georgia,serif;line-height:1.5;}

const DATA = {"sections": [{"label": null, "cards": [{"title": "Orchard & Stone Fruits", "title_es": "Frutas De Huerto Y Hueso", "badge": "6", "badge_es": "6", "color": "#b5384a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Apple, Pear, Peach, Plum, Cherry, Fig", "text_es": "Manzana, Pera, Durazno, Ciruela, Cereza, Higo", "color": "#b5384a"}, {"tag": "Peak Season", "tag_es": "Mejor Temporada", "text": "Late summer through fall — best eaten ripe, raw, or baked into desserts.", "text_es": "Fin de verano hasta otoño — mejor maduros, crudos o horneados en postres."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Apples and pears are 'pomes' — the part you eat is the swollen base of the flower, while the true fruit is the papery core around the seeds.", "text_es": "La manzana y la pera son 'pomos' — lo que comes es la base hinchada de la flor, mientras que el fruto real es el corazón apergaminado que rodea las semillas.", "pair": true}]}, {"title": "Citrus Fruits", "title_es": "Cítricos", "badge": "5", "badge_es": "5", "color": "#e08a1e", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Orange, Lemon, Lime, Grapefruit, Mandarin", "text_es": "Naranja, Limón, Lima, Toronja, Mandarina", "color": "#e08a1e"}, {"tag": "Peak Season", "tag_es": "Mejor Temporada", "text": "Winter — brighten up the darkest months with fresh juice, zest, and salads.", "text_es": "Invierno — iluminan los meses más oscuros con jugo fresco, ralladura y ensaladas."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Almost every citrus you buy is a hybrid of just a few wild ancestors — citron, pomelo, and mandarin — endlessly crossed into oranges, lemons, limes, and grapefruit.", "text_es": "Casi todo cítrico que compras es un híbrido de unos pocos ancestros silvestres — cidra, pomelo y mandarina — cruzados sin fin en naranjas, limones, limas y toronjas.", "pair": true}]}, {"title": "Tropical & Exotic Fruits", "title_es": "Frutas Tropicales Y Exóticas", "badge": "6", "badge_es": "6", "color": "#e0b020", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Banana, Mango, Pineapple, Papaya, Kiwi, Pomegranate", "text_es": "Plátano, Mango, Piña, Papaya, Kiwi, Granada", "color": "#e0b020"}, {"tag": "Peak Season", "tag_es": "Mejor Temporada", "text": "Available year-round from warm climates — best ripened at room temperature before eating.", "text_es": "Disponibles todo el año desde climas cálidos — mejor madurarlos a temperatura ambiente antes de comer."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Botanically the banana is a berry, and the plant is a giant herb, not a tree — its 'trunk' is just tightly packed leaf bases.", "text_es": "Botánicamente el plátano es una baya, y la planta es una hierba gigante, no un árbol — su 'tronco' son solo bases de hoja muy apretadas.", "pair": true}]}, {"title": "Melons & Rich Fruits", "title_es": "Melones Y Frutas Ricas", "badge": "4", "badge_es": "4", "color": "#d9536b", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Watermelon, Cantaloupe, Grape, Avocado", "text_es": "Sandía, Melón Cantalupo, Uva, Aguacate", "color": "#d9536b"}, {"tag": "Peak Season", "tag_es": "Mejor Temporada", "text": "Summer for melons and grapes — avocado is available year-round and ripens off the tree.", "text_es": "Verano para melones y uvas — el aguacate está disponible todo el año y madura fuera del árbol."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Avocados refuse to ripen on the tree — they only soften after picking, so growers use the tree as natural storage and harvest on demand.", "text_es": "El aguacate se niega a madurar en el árbol — solo se ablanda tras cortarse, así que los cultivadores usan el árbol como almacén natural y cosechan a demanda.", "pair": true}]}, {"title": "Leafy Greens", "title_es": "Hojas Verdes", "badge": "6", "badge_es": "6", "color": "#3a7d44", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Spinach, Kale, Swiss Chard, Arugula, Romaine Lettuce, Bok Choy", "text_es": "Espinaca, Col Rizada, Acelga, Rúcula, Lechuga Romana, Bok Choy", "color": "#3a7d44"}, {"tag": "Peak Season", "tag_es": "Mejor Temporada", "text": "Cool-season crops — best raw in salads or quickly wilted to preserve nutrients.", "text_es": "Cultivos de temporada fría — mejor crudas en ensaladas o apenas marchitadas para conservar nutrientes."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "A whole pan of raw spinach cooks down to almost nothing — the leaves are mostly water held in a thin structure that collapses the moment it hits heat.", "text_es": "Una sartén entera de espinaca cruda se reduce a casi nada — las hojas son casi todo agua en una estructura fina que se colapsa apenas toca el calor.", "pair": true}]}, {"title": "Cruciferous Vegetables", "title_es": "Verduras Crucíferas", "badge": "4", "badge_es": "4", "color": "#5a8a3a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Broccoli, Cauliflower, Brussels Sprouts, Cabbage", "text_es": "Brócoli, Coliflor, Coles de Bruselas, Repollo", "color": "#5a8a3a"}, {"tag": "Peak Season", "tag_es": "Mejor Temporada", "text": "Fall and winter — roasting at high heat brings out natural sweetness and reduces bitterness.", "text_es": "Otoño e invierno — asarlas a fuego alto resalta su dulzor natural y reduce el amargor."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Broccoli, cauliflower, cabbage, kale, and Brussels sprouts are all one species — centuries of breeding one wild mustard for different parts: flower, leaf, and bud.", "text_es": "El brócoli, la coliflor, el repollo, la col rizada y las coles de Bruselas son una sola especie — siglos criando una mostaza silvestre por partes distintas: flor, hoja y brote.", "pair": true}]}, {"title": "Roots, Bulbs & Tubers", "title_es": "Raíces, Bulbos Y Tubérculos", "badge": "7", "badge_es": "7", "color": "#a8652a", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Carrot, Beet, Sweet Potato, Potato, Radish, Onion, Garlic", "text_es": "Zanahoria, Remolacha, Batata, Papa, Rábano, Cebolla, Ajo", "color": "#a8652a"}, {"tag": "Peak Season", "tag_es": "Mejor Temporada", "text": "Fall harvest, but store well year-round — the backbone of soups, roasts, and sofrito.", "text_es": "Cosecha de otoño, pero se conservan bien todo el año — la base de sopas, asados y sofritos."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "The potato is a tuber — a swollen underground stem, not a root — which is why its 'eyes' can sprout whole new plants; keep it out of light, since green patches mean bitter solanine.", "text_es": "La papa es un tubérculo — un tallo subterráneo hinchado, no una raíz — por eso sus 'ojos' brotan plantas enteras; guárdala sin luz, pues las manchas verdes significan solanina amarga.", "pair": true}]}, {"title": "Peppers, Pods & Squash", "title_es": "Pimientos, Vainas Y Calabazas", "badge": "6", "badge_es": "6", "color": "#7aa030", "rows": [{"tag": "Includes", "tag_es": "Incluye", "text": "Bell Pepper, Tomato, Cucumber, Zucchini, Green Peas, Asparagus", "text_es": "Pimiento, Tomate, Pepino, Calabacín, Guisantes, Espárrago", "color": "#7aa030"}, {"tag": "Peak Season", "tag_es": "Mejor Temporada", "text": "Summer — at their peak raw or lightly cooked to preserve their fresh, crisp character.", "text_es": "Verano — en su mejor punto crudas o apenas cocidas para conservar su carácter fresco y crujiente."}, {"tag": "Fun Fact", "tag_es": "Dato Curioso", "text": "Tomatoes, cucumbers, peppers, and zucchini are all botanically fruits — they hold the seeds — even though the kitchen treats every one of them as a vegetable.", "text_es": "El tomate, el pepino, el pimiento y el calabacín son todos botánicamente frutos — guardan las semillas — aunque la cocina los trate a todos como verduras.", "pair": true}]}]}]};
const UI={"en":{"sub":"Seasons, uses & nutrition — pocket reference","use":"How to use","useText":"Tap a card to see what's in each category, how to use it, and a fun fact. The full Fruits & Vegetables Wheel (fruits-vegetables-wheel.html) has detailed notes for every individual item.","wheel":"The Wheel","scan":"Companion wheel file","cover":"Pocket guide","fold":"<b>Tip:</b> hit <b>Print fold-up</b> for a one-page pocket card — print one side, fold into eighths, one short center cut, and it becomes a little booklet.","byline":"Curated by Mark Lenington · Certified Sommelier · © 2026 LearnSomm.com"},"es":{"sub":"Temporadas, usos y nutrición — referencia de bolsillo","use":"Cómo usarla","useText":"Toca una tarjeta para ver qué incluye cada categoría, cómo usarla y un dato curioso. La Rueda de Frutas y Verduras completa (fruits-vegetables-wheel.html) tiene notas detalladas de cada elemento.","wheel":"La Rueda","scan":"Archivo de la rueda complementaria","cover":"Guía de bolsillo","fold":"<b>Tip:</b> pulsa <b>Imprimir plegable</b> para una tarjeta de bolsillo — imprime un lado, dobla en octavos, un corte corto al centro y se vuelve un folletito.","byline":"Creado por Mark Lenington · Sommelier Certificado · © 2026 LearnSomm.com"}};

const $=id=>document.getElementById(id);let lang="en";
function tc(t){return TC[t]||"#7a6a55";}

$("sections").innerHTML=DATA.sections.map(s=>{const label=s.label?L(s,"label"):null;const cards=s.cards.map(c=>{const title=L(c,"title");const badge=c.badge?(lang==="es"?(c.badge_es||c.badge):c.badge):null;return `<div class="card" data-slug="${((c.slug)||L(c,'title')||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}" data-title="${title}"><div class="card-header"><span class="card-title">${title}${badge?`<span class="badge" style="background:${c.color||'var(--gold)'}">${badge}</span>`:""}</span><span class="chevron">\u25bc</span></div><div class="card-body"><div class="card-inner">${c.rows.map(rowHTML).join("")}</div></div></div>`;}).join("");return label?`<div class="section-label">${label}</div>${cards}`:cards;}).join("");

function initSearch(){
  const inp=document.getElementById("searchInput");
  const clr=document.getElementById("searchClear");
  if(!inp)return;
  function doFilter(){
    const q=inp.value.trim().toLowerCase();
    clr.style.display=q?"inline":"none";
    const sect=document.getElementById("sections");
    if(!sect)return;
    let anyVisible=false;
    sect.querySelectorAll(".card").forEach(card=>{
      const txt=(card.textContent||"").toLowerCase();
      const show=!q||txt.includes(q);
      card.style.display=show?"":"none";
      if(show)anyVisible=true;
    });
    sect.querySelectorAll(".section-label").forEach(lbl=>{
      let next=lbl.nextElementSibling;let vis=false;
      while(next&&!next.classList.contains("section-label")){
        if(next.style.display!=="none")vis=true;
        next=next.nextElementSibling;
      }
      lbl.style.display=vis?"":"none";
    });
    let nr=document.querySelector(".no-results");
    if(!nr){nr=document.createElement("div");nr.className="no-results";nr.textContent="No cards match that search.";sect.after(nr);}
    nr.style.display=anyVisible||!q?"none":"block";
  }
  inp.addEventListener("input",doFilter);
  clr.addEventListener("click",()=>{inp.value="";clr.style.display="none";doFilter();inp.focus();});
}

initSearch();

/* ── click-to-spin ── */
(function(){
  function norm(s){return (''+s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/^ | $/g,'');}
  function send(key){if(!key)return;try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SPIN_TO',slug:key},'*');}}catch(e){}}
  document.addEventListener('click',function(e){
    var card=e.target.closest&&e.target.closest('.card[data-slug],.card[data-title]');
    if(!card)return;
    var slug=card.getAttribute('data-slug')||'';
    var title=card.getAttribute('data-title')||'';
    send(slug||title);
    if(title&&title!==slug)send(title);
  });
  try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'LS_SHEET_READY'},'*');}}catch(e){}
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='LS_WHEEL_NAMES')return;
    var names=d.names||{};
    document.querySelectorAll('.card[data-slug],.card[data-title]').forEach(function(card){
      var s=card.getAttribute('data-slug')||'';
      var t=norm(card.getAttribute('data-title')||'');
      if((s&&names[s])||(t&&names[t])){card.classList.add('spinnable');card.style.cursor='pointer';}
    });
  });
})();
/* data-spin-wired */

</script><script id="lsNoRightClick">
(function(){
  document.addEventListener('contextmenu',function(e){ e.preventDefault(); return false; },{capture:true});
  // also discourage drag-saving of images
  document.addEventListener('dragstart',function(e){ if(e.target&&e.target.tagName==='IMG'){ e.preventDefault(); } },{capture:true});
})();
</script>
<script id="lsFontApply">
(function(){ window.addEventListener('message',function(e){ var d=e.data; if(d&&d.type==='LS_CMD'&&d.cmd==='fontStack'&&d.value){ try{ ['--ui','--app-font','--display','--serif','--sans','--mono','--font','--font-ui','--font-display','--bgecho-font'].forEach(function(v){try{document.documentElement.style.setProperty(v,d.value);}catch(_){}}); try{document.body.style.fontFamily=d.value;}catch(_){}}catch(err){} } }); })();
</script>
