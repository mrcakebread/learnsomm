or wild fennel fronds. Dominated by trans-anethole (50–80% of essential oil) — the same compound responsible for the louche effect in absinthe and the anise character of Sambuca. Also contains fenchone (bitter, earthy). The sweet anise perception comes entirely from anethole.", "pairing": "Expands perceived sweetness without sugar additions. Natural pairing with anise and caraway in the anise-botanical family. Works with citrus oils to brighten the profile.", "mixology": "A natural companion in a white Negroni, Martinez variation, or highball with a fresh star anise garnish. Fennel-forward gins pair with Pastis-family modifiers for anise-amplified builds.", "cat_es": "Hierbas · Sabroso", "origin_es": "Semillas de hinojo (Foeniculum vulgare) o frondas de hinojo silvestre. Dominado por trans-anetol (50–80 % del aceite esencial) —el mismo compuesto responsable del efecto louche en la absenta y del carácter anisado de la sambuca—. También contiene fenchona (amarga, terrosa). La percepción de anís dulce proviene íntegramente del anetol.", "pairing_es": "Expande la dulzura percibida sin añadir azúcar. Maridaje natural con anís y alcaravea en la familia botánica del anís. Funciona con aceites cítricos para iluminar el perfil.", "mixology_es": "Acompañante natural en un White Negroni, una variación de Martinez o un highball con una guarnición de anís estrellado fresco. Las ginebras con hinojo maridan con modificadores de la familia del Pastis para construcciones amplificadas en anís."}, "pine-needle": {"cat": "Piney · Medicinal", "origin": "Freshly foraged pine or fir needles — Scots Pine (Pinus sylvestris) is most commonly used in gin production. Loaded with high concentrations of alpha-pinene and beta-pinene, delivering an ultra-crisp, refreshing alpine pine character. The specific species matters: Scots Pine is resinous and clean; Douglas Fir needles add a more citrus-like note.", "pairing": "Amplifies and elongates the natural core identity of juniper, establishing an intense alpine forest aesthetic. Resonates with spruce tip and frankincense in the resinous family.", "mixology": "Excellent in an ice-cold, bone-dry Martini. Use a premium dry vermouth (Dolin Dry or Noilly Prat) to allow intense pine notes center stage. A pine-needle-infused house vermouth is a compelling premium bar offering.", "cat_es": "Pino · Medicinal", "origin_es": "Agujas de pino o abeto recién recolectadas —el pino silvestre (Pinus sylvestris) es el más usado en producción de ginebra—. Cargadas de altas concentraciones de alfa-pineno y beta-pineno, aportando un carácter de pino alpino ultranítido y refrescante. La especie importa: el pino silvestre es resinoso y limpio; las agujas de abeto de Douglas añaden una nota más cítrica.", "pairing_es": "Amplifica y alarga la identidad central natural del enebro, estableciendo una estética intensa de bosque alpino. Resuena con la yema de abeto y el incienso en la familia resinosa.", "mixology_es": "Excelente en un Martini muy seco y helado. Usa un vermut seco premium (Dolin Dry o Noilly Prat) para dejar las intensas notas de pino en el centro. Un vermut casero infusionado con agujas de pino es una oferta de barra premium convincente."}, "juniper": {"cat": "Piney · Medicinal", "origin": "Juniperus communis berries — the legal, mandatory defining botanical of gin (EU Regulation 2019/787, which replaced 110/2008; US TTB standards). A ripe juniper berry is not a berry but a modified seed cone (galbulus). Primary active compounds: alpha-pinene, beta-pinene, sabinene, myrcene, and terpinen-4-ol. Macedonian and Tuscan juniper are considered premium; Balkan-sourced is most common. Provides the foundational piney, resinous, waxy, wood-spiced and mildly camphorous structure.", "pairing": "The mandatory centerpiece. All other botanicals are structurally balanced around the juniper baseline. Juniper must be the predominant flavor in any legally defined gin.", "mixology": "The baseline for everything. In London Dry, aggressive juniper expression demands premium high-bitter quinine tonics or dry French vermouths. Hendrick's-style (restrained juniper) opens to elderflower tonics and lighter modifiers.", "cat_es": "Pino · Medicinal", "origin_es": "Bayas de Juniperus communis —el botánico legal y obligatorio que define la ginebra (Reglamento UE 2019/787, que sustituyó al 110/2008; normas TTB de EE. UU.)—. Una baya de enebro madura no es una baya sino un cono de semilla modificado (gálbulo). Compuestos activos principales: alfa-pineno, beta-pineno, sabineno, mirceno y terpinen-4-ol. El enebro macedonio y toscano se consideran premium; el de los Balcanes es el más común. Aporta la estructura fundamental de pino, resina, cera, especia amaderada y ligero alcanfor.", "pairing_es": "El centro obligatorio. Todos los demás botánicos se equilibran estructuralmente en torno a la base de enebro. El enebro debe ser el sabor predominante en cualquier ginebra legalmente definida.", "mixology_es": "La base de todo. En London Dry, la expresión agresiva del enebro exige tónicas de quinina muy amargas o vermuts secos franceses. El estilo Hendrick's (enebro contenido) se abre a tónicas de saúco y modificadores más ligeros."}, "spruce-tip": {"cat": "Piney · Resinous", "origin": "Fresh spring spruce tips — young growth of Norway Spruce (Picea abies) or Sitka Spruce (Picea sitchensis). The bright citrus-pine character comes from bornyl acetate, camphene, and notably ascorbic acid (vitamin C) in the green tips. Adds a fresh resinous pine character with an unexpected citrus acidity note. Highly seasonal — spring harvesting only.", "pairing": "A compelling contemporary addition for hyper-regional, terroir-driven nordic or alpine style gins. Shares aromatic territory with juniper while adding citrus lift.", "mixology": "Brings crisp outdoor brightness to a Tom Collins or a complex alpine-style Gimlet. Spruce tip gin pairs superbly with cucumber water and a dill garnish in a Scandinavian-inspired bar program.", "cat_es": "Pino · Resinoso", "origin_es": "Yemas de abeto de primavera frescas —brotes jóvenes de abeto rojo (Picea abies) o de Sitka (Picea sitchensis)—. El carácter brillante de pino cítrico proviene del acetato de bornilo, el canfeno y, notablemente, el ácido ascórbico (vitamina C) de las yemas verdes. Añade un carácter de pino resinoso fresco con una inesperada nota de acidez cítrica. Muy estacional —solo cosecha de primavera—.", "pairing_es": "Una adición contemporánea convincente para ginebras hiperregionales de terroir, de estilo nórdico o alpino. Comparte territorio aromático con el enebro a la vez que añade realce cítrico.", "mixology_es": "Aporta una brillantez nítida de exterior a un Tom Collins o un Gimlet alpino complejo. La ginebra de yema de abeto marida de maravilla con agua de pepino y una guarnición de eneldo en un programa de barra de inspiración escandinava."}, "frankincense": {"cat": "Piney · Resinous", "origin": "The aromatic oleoresin of Boswellia trees (multiple species: B. sacra, B. carterii, B. serrata). Contains boswellic acids (non-volatile), plus highly volatile terpenes including alpha-pinene, limonene, and p-cymene in steam distillation. Yields a deeply complex, ancient, resinous, balsamic wood aroma with undertones of dark citrus oil and cool incense smoke.", "pairing": "Functions as a high-end fixative that grounds lighter floral and citrus elements for an extended finish. The incense-smoke character adds a meditative, contemplative dimension to spirit-forward profiles.", "mixology": "Stunning inside elite, slow-sipping, spirit-forward nightcaps, vintage Martinez builds, or wood-smoked Negroni presentations. Best in minimal garnish presentations — let the aroma carry.", "cat_es": "Pino · Resinoso", "origin_es": "La oleorresina aromática de los árboles de Boswellia (varias especies: B. sacra, B. carterii, B. serrata). Contiene ácidos boswélicos (no volátiles), más terpenos muy volátiles como alfa-pineno, limoneno y p-cimeno en la destilación de vapor. Da un aroma profundamente complejo, antiguo, resinoso y balsámico, con matices de aceite cítrico oscuro y humo de incienso frío.", "pairing_es": "Funciona como fijador de alta gama que ancla los elementos florales y cítricos más ligeros para un final prolongado. El carácter de humo de incienso añade una dimensión meditativa a los perfiles potentes.", "mixology_es": "Impresionante en nightcaps potentes de sorbo lento, construcciones vintage de Martinez o presentaciones de Negroni ahumado en madera. Mejor en presentaciones de guarnición mínima —deja que el aroma lleve la voz cantante—."}, "birch-sap": {"cat": "Sweet · Creamy", "origin": "Collected fresh from Silver Birch (Betula pendula) in early spring. Contains xylitol, fructose, glucose, malic acid, and trace minerals. Reduced into the still or cold-macerated. Introduces a delicate, mineral-rich wood sweetness and a naturally rounded, silky mouthfeel — the viscosity comes from naturally occurring polyols and trace proteins.", "pairing": "Softens the aggressive prickle of high-proof or heavily root-spiced gins. The mineral quality provides a clean, cool water-like finish.", "mixology": "The foundation for a velvety smooth Martini or exceptionally silky Gin Sour. Birch sap-forward gins are particularly popular in Nordic and Scottish artisanal expressions — a natural partner for spruce tip and meadowsweet.", "cat_es": "Dulce · Cremoso", "origin_es": "Recolectada fresca del abedul plateado (Betula pendula) a principios de primavera. Contiene xilitol, fructosa, glucosa, ácido málico y minerales traza. Reducida en el alambique o macerada en frío. Introduce una dulzura amaderada delicada y rica en minerales y una textura en boca naturalmente redonda y sedosa —la viscosidad proviene de polioles naturales y proteínas traza—.", "pairing_es": "Suaviza el cosquilleo agresivo de ginebras de alta graduación o muy especiadas de raíz. La cualidad mineral aporta un final limpio, fresco y acuoso.", "mixology_es": "La base de un Martini aterciopelado o un Gin Sour excepcionalmente sedoso. Las ginebras con savia de abedul son especialmente populares en expresiones artesanales nórdicas y escocesas —pareja natural de la yema de abeto y la reina de los prados—."}, "liquorice-root": {"cat": "Sweet · Creamy", "origin": "Root of Glycyrrhiza glabra. Contains glycyrrhizin — a triterpenoid saponin roughly 30–50 times sweeter than sucrose by weight. Critically: glycyrrhizin itself is non-volatile and does not transfer into the distillate. What carries over is the complex of volatile aromatic esters and anethole-family compounds that co-occur with glycyrrhizin, creating a perception of deep sweetness and rich, viscous texture.", "pairing": "A cornerstone structural fixative in London Dry and Old Tom styles. Binds volatile citrus top notes and provides the characteristic lingering sweetness of classic gin profiles.", "mixology": "Essential for rounding out dry, bitter elements in a Negroni. The perceived sweetness in the finish means less sugar modifier is needed. In Old Tom-style cocktails (Martinez, Tom Collins), liquorice root provides historical authenticity.", "cat_es": "Dulce · Cremoso", "origin_es": "Raíz de Glycyrrhiza glabra. Contiene glicirricina —una saponina triterpénica unas 30 a 50 veces más dulce que la sacarosa por peso—. Crucialmente: la glicirricina en sí es no volátil y no pasa al destilado. Lo que sí pasa es el complejo de ésteres aromáticos volátiles y compuestos de la familia del anetol que coexisten con la glicirricina, creando una percepción de dulzura profunda y una textura rica y viscosa.", "pairing_es": "Un fijador estructural fundamental en los estilos London Dry y Old Tom. Liga las notas altas cítricas volátiles y aporta la dulzura persistente característica de los perfiles de ginebra clásicos.", "mixology_es": "Esencial para redondear los elementos secos y amargos de un Negroni. La dulzura percibida en el final significa que se necesita menos modificador azucarado. En cócteles de estilo Old Tom (Martinez, Tom Collins), la raíz de regaliz aporta autenticidad histórica."}, "honeysuckle": {"cat": "Sweet · Buttery", "origin": "Fresh blossoms of common honeysuckle (Lonicera periclymenum). Delivers a decadent, honey-floral sweetness driven by linalool, geraniol, and various fatty acid esters that contribute a buttery, nectar-like quality. The 'buttery' classification comes from trace amounts of diacetyl and lactone compounds detected in honeysuckle distillates.", "pairing": "Pairs naturally with sweet citrus profiles and rich, buttery woody nuts. The linalool bridge connects honeysuckle to lavender, coriander seed, and rose.", "mixology": "Exceptional in a Bee's Knees, delicate summer spritzes, or an elegant Collins with elderflower tonic. The honeysuckle note intensifies when paired with a light honey syrup garnished with a dried honeysuckle flower.", "cat_es": "Dulce · Mantecoso", "origin_es": "Flores frescas de madreselva común (Lonicera periclymenum). Aporta una dulzura decadente de miel y flor impulsada por linalool, geraniol y diversos ésteres de ácidos grasos que contribuyen una cualidad mantecosa, de néctar. La clasificación 'mantecosa' proviene de trazas de diacetilo y lactonas detectadas en los destilados de madreselva.", "pairing_es": "Marida de forma natural con perfiles cítricos dulces y nueces ricas y mantecosas. El puente del linalool conecta la madreselva con la lavanda, el cilantro y la rosa.", "mixology_es": "Excepcional en un Bee's Knees, spritzes veraniegos delicados o un Collins elegante con tónica de saúco. La nota de madreselva se intensifica al maridar con un jarabe ligero de miel y guarnecer con una flor de madreselva seca."}, "vanilla": {"cat": "Sweet · Buttery", "origin": "Vanilla planifolia pods — typically introduced via post-distillation finishing or barrel/cask aging rather than in the still, as vanillin largely survives infusion but not always steam distillation at high temperatures. Driven by vanillin plus 4-hydroxybenzaldehyde, p-cresol, and various phenolics. Creates warm, comforting, creamy-buttery wood sweetness.", "pairing": "The hallmark indicator of barrel-aged or cask-finished gins. Harmonizes with oak tannins, orange peel, and dark spices (clove, cinnamon). Common in Old Tom and aged gin expressions.", "mixology": "A natural for complex winter cocktails, cold-brew coffee gin serves, or custom Old Fashioned-style gin variations. In upscale bar contexts, a vanilla-bean-garnished Flip or Sour communicates the flavor before the first sip.", "cat_es": "Dulce · Mantecoso", "origin_es": "Vainas de Vanilla planifolia —típicamente introducidas por acabado posdestilación o crianza en barrica/tonel, ya que la vainillina suele sobrevivir la infusión pero no siempre la destilación de vapor a altas temperaturas—. Impulsada por vainillina más 4-hidroxibenzaldehído, p-cresol y diversos fenólicos. Crea una dulzura amaderada cálida, reconfortante y cremosa-mantecosa.", "pairing_es": "El indicador distintivo de las ginebras criadas en barrica o con acabado en tonel. Armoniza con taninos de roble, piel de naranja y especias oscuras (clavo, canela). Común en las expresiones Old Tom y de ginebra añejada.", "mixology_es": "Natural para cócteles complejos de invierno, ginebras con café frío o variaciones personalizadas de estilo Old Fashioned. En contextos de barra de alto nivel, un Flip o Sour guarnecido con vaina de vainilla comunica el sabor antes del primer sorbo."}, "almond": {"cat": "Nutty · Rich", "origin": "Bitter almond (Prunus amygdalus var. amara) meal or sweet almond is added to the pot still — bitter almonds contain amygdalin, which breaks down to benzaldehyde and hydrogen cyanide; reputable producers use HCN-free FCC-grade benzaldehyde or natural sweet-almond/apricot-kernel sources processed to remove cyanide, never raw bitter almond at scale. Benzaldehyde — the principal character compound — provides deep, luxurious marzipan and amaretto-like character. Also contributes essential oils that enhance viscosity.", "pairing": "A historic component in classic London Dry recipes, working to anchor volatile juniper top notes and provide mid-palate structure.", "mixology": "Adds velvety marzipan depth to a Martinez, or beautiful texture to egg-white Gin Sours. In high-end bar programs, almond-forward gin is a natural base for a Japanese-style Highball with a spritz of aromatic bitters.", "cat_es": "Frutos Secos · Rico", "origin_es": "Harina de almendra amarga (Prunus amygdalus var. amara) o almendra dulce añadida al alambique —las almendras amargas contienen amigdalina traza (se metaboliza a benzaldehído y HCN), pero en concentraciones de destilación el HCN no pasa de forma significativa—. El benzaldehído —el compuesto de carácter principal— aporta un carácter profundo y lujoso de mazapán y amaretto. También contribuye aceites esenciales que realzan la viscosidad.", "pairing_es": "Un componente histórico en las recetas clásicas London Dry, que ancla las notas altas volátiles del enebro y aporta estructura en el centro del paladar.", "mixology_es": "Añade una profundidad aterciopelada de mazapán a un Martinez, o una textura preciosa a los Gin Sours con clara de huevo. En programas de alto nivel, la ginebra con almendra es una base natural para un highball de estilo japonés con un toque de bíter aromático."}, "hazelnut": {"cat": "Nutty · Rich", "origin": "Toasted hazelnut (Corylus avellana) infusion. Roasting develops rich, warm pyrazine compounds — particularly 2,3-diethylpyrazine and 2-acetylpyrazine — which deliver intensely comforting, roasted, buttery nut depth. Pyrazines have extremely low odor thresholds, meaning small quantities have large aromatic impact.", "pairing": "Pairs with deep, earthy spices (cassia, nutmeg) and barrel-aged gin expressions. The roasted pyrazines link naturally to coffee and chocolate modifiers.", "mixology": "Exceptional in winter cocktails, Alexander variations, or as a rich nutty modifier layer in a bold Negroni. A Hazelnut Sour with egg white and a bitter chocolate dust garnish is a premium dessert cocktail concept.", "cat_es": "Frutos Secos · Rico", "origin_es": "Infusión de avellana tostada (Corylus avellana). El tostado desarrolla compuestos ricos de pirazina —en particular 2,3-dietilpirazina y 2-acetilpirazina— que aportan una profundidad de nuez tostada, reconfortante y mantecosa. Las pirazinas tienen umbrales de olor extremadamente bajos, lo que significa que pequeñas cantidades tienen gran impacto aromático.", "pairing_es": "Marida con especias profundas y terrosas (casia, nuez moscada) y expresiones de ginebra criadas en barrica. Las pirazinas tostadas enlazan de forma natural con modificadores de café y chocolate.", "mixology_es": "Excepcional en cócteles de invierno, variaciones de Alexander o como capa modificadora de nuez en un Negroni potente. Un Hazelnut Sour con clara de huevo y un polvo de chocolate amargo es un concepto de cóctel de postre premium."}, "walnut": {"cat": "Nutty · Woody", "origin": "Black walnut (Juglans nigra) or English walnut (Juglans regia) shells or husks — hulls contain juglone, a naphthoquinone that provides a dark, slightly dry, tannic quality. Produces a deep, woody nuttiness with complex, darker, somewhat bitter oily layers. The tannic contribution survives distillation partially through the polyphenol-volatile aromatic interaction.", "pairing": "Integrates with heavy root botanicals (angelica, orris) and robust warming baking spices. The dry, tannic edge complements vermouth and bittersweet modifiers.", "mixology": "A natural choice for a spirit-forward complex nightcap, custom Black Negroni, or an artisanal walnut-and-bitter-orange highball. Also excellent in Old Fashioned-style gin builds.", "cat_es": "Frutos Secos · Amaderado", "origin_es": "Cáscaras o cortezas de nuez negra (Juglans nigra) o nuez común (Juglans regia) —las cáscaras contienen juglona, una naftoquinona que aporta una cualidad oscura, ligeramente seca y tánica—. Produce una nuez amaderada profunda con capas complejas, oscuras y aceitosas algo amargas. El aporte tánico sobrevive parcialmente a la destilación mediante la interacción polifenol-volátil.", "pairing_es": "Se integra con botánicos de raíz pesados (angélica, lirio) y especias robustas de repostería. El borde seco y tánico complementa el vermut y los modificadores agridulces.", "mixology_es": "Una elección natural para un nightcap potente y complejo, un Black Negroni personalizado o un highball artesanal de nuez y naranja amarga. También excelente en construcciones de ginebra de estilo Old Fashioned."}, "chestnut": {"cat": "Nutty · Woody", "origin": "Roasted sweet chestnuts (Castanea sativa). Yields a soft, rich, uniquely starchy-sweet woody nut flavor driven by furfuryl compounds (developed during roasting) alongside phenolic acids. The starchy quality creates a remarkable structural warmth and thickness in the mid-palate without the dryness of walnut.", "pairing": "Works alongside creamy, buttery sweet profiles — vanilla and liquorice root. Resonates with autumnal fruit profiles such as apple and pear.", "mixology": "Exceptional for cold-weather cocktail menus, hot toddies, or rich, complex Flip-style cocktails. A Chestnut Old Tom and Velvet Falernum combination creates a compelling winter aperitivo serve.", "cat_es": "Frutos Secos · Amaderado", "origin_es": "Castañas dulces tostadas (Castanea sativa). Da un sabor de nuez amaderada suave, rico y singularmente almidonado-dulce, impulsado por compuestos furfurílicos (desarrollados durante el tostado) junto a ácidos fenólicos. La cualidad almidonada crea una calidez y un grosor notables en el centro del paladar sin la sequedad de la nuez.", "pairing_es": "Funciona junto a perfiles dulces, cremosos y mantecosos —vainilla y raíz de regaliz—. Resuena con perfiles de fruta otoñal como la manzana y la pera.", "mixology_es": "Excepcional para cartas de cóctel de invierno, ponches calientes o Flips ricos y complejos. Una combinación de Old Tom de castaña y Velvet Falernum crea un aperitivo de invierno convincente."}, "nutmeg": {"cat": "Nutty · Robust", "origin": "The seed of Myristica fragrans (the mace is the seed's aril — a distinct flavoring). Rich in myristicin (psychoactive at very high doses; not a concern at culinary concentrations), elemicin, sabinene, and terpinen-4-ol. Delivers an intensely warm, highly robust, woody-aromatic spice punch with sweet-exotic undertones. Also contributes macelignan compounds that provide a slight numbing mouthfeel.", "pairing": "A classic baking spice element that adds immense depth to high-proof navy strength or cask-matured gins. Shares aromatic territory with mace (lighter, more floral), allowing creative substitution.", "mixology": "The definitive aromatic dusting requirement for a classic Gin Alexander or hot mulled gin punches. Freshly grated nutmeg over the surface of a finished drink is a standard Michelin-level service detail.", "cat_es": "Frutos Secos · Robusto", "origin_es": "La semilla de Myristica fragrans (el macis es el arilo de la semilla —un saborizante distinto—). Rica en miristicina (psicoactiva en dosis muy altas; no preocupante en concentraciones culinarias), elemicina, sabineno y terpinen-4-ol. Aporta un golpe de especia amaderada-aromática intensamente cálido y robusto con matices dulces y exóticos. También aporta compuestos macelignanos que dan un ligero adormecimiento en boca.", "pairing_es": "Un elemento clásico de especia de repostería que añade enorme profundidad a las ginebras navy strength de alta graduación o criadas en barrica. Comparte territorio aromático con el macis (más ligero, más floral), permitiendo sustitución creativa.", "mixology_es": "El espolvoreado aromático definitivo de un Gin Alexander clásico o ponches calientes de ginebra especiada. La nuez moscada recién rallada sobre la superficie de un trago terminado es un detalle de servicio estándar de nivel Michelin."}, "angelica": {"cat": "Rooty / Spicy · Dusty", "origin": "Angelica archangelica root — the cornerstone fixative of gin distillation. Contains phthalides, terpenes, and angelic acid, creating an earthy, musky, dry-woody profile. Acts as a molecular fixative: angelica's heavy phthalide fraction is substantive enough to form loose aromatic bonds with the lighter volatile juniper and citrus molecules, retaining them in the liquid longer and extending the finish.", "pairing": "The primary structural anchor alongside juniper and coriander seed. Its dry, musky character is essential to the classic London Dry profile. Without adequate angelica, a gin finishes short.", "mixology": "Provides the intense, lingering dry finish that defines a proper bone-dry Martini. Holds its structure against heavy vermouth additions. In high-volume Martini programs, angelica-forward gins allow a slightly wetter pour ratio.", "cat_es": "Raíz / Especia · Polvoriento", "origin_es": "Raíz de Angelica archangelica —el fijador fundamental de la destilación de ginebra—. Contiene ftálidos, terpenos y ácido angélico, creando un perfil terroso, almizclado y seco-amaderado. Actúa como fijador molecular: la fracción pesada de ftálidos de la angélica es lo bastante sustancial para formar enlaces aromáticos laxos con las moléculas más ligeras de enebro y cítrico, reteniéndolas más tiempo en el líquido y alargando el final.", "pairing_es": "El ancla estructural principal junto al enebro y la semilla de cilantro. Su carácter seco y almizclado es esencial para el perfil London Dry clásico. Sin suficiente angélica, una ginebra termina corta.", "mixology_es": "Aporta el final seco, intenso y persistente que define a un Martini muy seco. Mantiene su estructura frente a adiciones generosas de vermut. En programas de Martini de alto volumen, las ginebras con angélica permiten una proporción de vermut algo más generosa."}, "orris-root": {"cat": "Rooty / Spicy · Dusty", "origin": "Dried, aged rhizome of Iris germanica (Florentine iris) or Iris pallida. Requires 3–5 years of storage post-harvest to convert iridals into irones — the active aroma compounds responsible for the dusty, elegant violet-powder scent. Irones (alpha, beta, gamma isomers) are among the most expensive natural aroma compounds used in perfumery. Like angelica, orris functions as a fixative that binds lighter oils into the liquid matrix.", "pairing": "The second great anchor fixative of classic gin. Softens harsh alcohol burn by introducing a perceived powdery floral texture on the finish.", "mixology": "Crucial for high-end aromatic Martinis. Ensures delicate floral or citrus notes linger rather than flash off. A well-aged orris-rich gin will hold its aromatic integrity in a cocktail far longer than a low-fixative expression.", "cat_es": "Raíz / Especia · Polvoriento", "origin_es": "Rizoma seco y envejecido de Iris germanica (lirio florentino) o Iris pallida. Requiere de 3 a 5 años de almacenamiento tras la cosecha para convertir los iridales en irones —los compuestos aromáticos activos responsables del aroma polvoriento y elegante de polvo de violeta—. Las irones (isómeros alfa, beta, gamma) están entre los compuestos aromáticos naturales más caros de la perfumería. Como la angélica, el lirio funciona como fijador que liga los aceites más ligeros a la matriz líquida.", "pairing_es": "El segundo gran fijador ancla de la ginebra clásica. Suaviza el ardor áspero del alcohol introduciendo una textura floral pulverulenta percibida en el final.", "mixology_es": "Crucial para Martinis aromáticos de alto nivel. Asegura que las notas florales o cítricas delicadas persistan en lugar de evaporarse. Una ginebra rica en lirio bien envejecida mantiene su integridad aromática en un cóctel mucho más que una expresión baja en fijadores."}, "cassia-bark": {"cat": "Rooty / Spicy · Dusty", "origin": "Bark of Cinnamomum cassia (Chinese cinnamon) — distinct from true cinnamon (C. verum): cassia is thicker, more pungent, higher in cinnamaldehyde (80–95% of essential oil vs. ~65% in Ceylon cinnamon), and contains higher levels of coumarin. The pungent, sweet-hot, rustic character comes from this elevated cinnamaldehyde concentration. Cassia is far more commonly used in gin than true cinnamon.", "pairing": "Generates base-note warmth in traditional winter profiles or robust spiced gins. Interacts synergistically with clove's eugenol for a baking-spice platform.", "mixology": "Cuts aggressively through heavy citrus and sugar modifiers. Excellent in warm punch variations or a bold, fiery Martinez. In cold service, cassia-forward gins pair well with ginger beer — the shared spice heat creates a coherent flavor arc.", "cat_es": "Raíz / Especia · Polvoriento", "origin_es": "Corteza de Cinnamomum cassia (canela china) —distinta de la canela verdadera (C. verum): la casia es más gruesa, más punzante, más alta en cinamaldehído (80–95 % del aceite esencial frente al ~65 % de la canela de Ceilán) y contiene niveles más altos de cumarina—. El carácter punzante, dulce-cálido y rústico proviene de esta concentración elevada de cinamaldehído. La casia se usa en ginebra mucho más que la canela verdadera.", "pairing_es": "Genera calidez de fondo en perfiles invernales tradicionales o ginebras robustas especiadas. Interactúa sinérgicamente con el eugenol del clavo para una plataforma de especia de repostería.", "mixology_es": "Corta de forma agresiva los modificadores cargados de cítrico y azúcar. Excelente en variaciones de ponche caliente o un Martinez audaz y ardiente. En servicio frío, las ginebras con casia maridan bien con ginger beer —el calor de especia compartido crea un arco de sabor coherente—."}, "cinnamon": {"cat": "Rooty / Spicy · Warming", "origin": "True Ceylon cinnamon (Cinnamomum verum) — the quilled inner bark of a Sri Lankan laurel. Sweeter, more delicate, and significantly lower in coumarin than cassia. Cinnamaldehyde (~65%) is the primary active compound, alongside eugenol (2-4%), linalool, and various light aldehydes. The layered, elegant spice character comes from this compound complexity.", "pairing": "Brings a sophisticated aromatic tier to contemporary spiced or festive gin releases. Pairs naturally with orange peel, vanilla, and clove in a complete baking-spice arc.", "mixology": "Magnificent in apple or pear juice-based hot serves, complex toddies, or a spiced Negroni build. A cinnamon-dusted or cinnamon-stick garnish signals the flavor direction clearly to the guest.", "cat_es": "Raíz / Especia · Cálido", "origin_es": "Canela de Ceilán verdadera (Cinnamomum verum) —la corteza interna en rama de un laurel de Sri Lanka—. Más dulce, más delicada y mucho más baja en cumarina que la casia. El cinamaldehído (~65 %) es el compuesto activo principal, junto a eugenol (2–4 %), linalool y diversos aldehídos ligeros. El carácter de especia elegante y en capas proviene de esta complejidad de compuestos.", "pairing_es": "Aporta un nivel aromático sofisticado a lanzamientos contemporáneos especiados o festivos. Marida de forma natural con piel de naranja, vainilla y clavo en un arco completo de especia de repostería.", "mixology_es": "Magnífica en tragos calientes a base de zumo de manzana o pera, toddies complejos o un Negroni especiado. Una guarnición de canela espolvoreada o en rama señala la dirección del sabor con claridad al comensal."}, "clove": {"cat": "Rooty / Spicy · Warming", "origin": "Dried flower buds of Syzygium aromaticum. Dominated by eugenol (70–90% of essential oil) — a phenylpropanoid that provides the characteristic sharp, numbing, warming heat. Eugenol has a known topical anesthetic effect (historically used in dentistry). In distillation, clove must be used with precision: excess eugenol can inhibit yeast and strip other volatile compounds from the still.", "pairing": "Pairs naturally with sweet orange peel, vanilla, and oak-aged modifiers. The eugenol bridge connects it to bay laurel and allspice in a botanical pairing arc.", "mixology": "The aromatic engine for winter Flips, mulled wines, or hot gin toddies. A clove-studded orange peel garnish is a classic and communicative visual pairing.", "cat_es": "Raíz / Especia · Cálido", "origin_es": "Capullos florales secos de Syzygium aromaticum. Dominado por eugenol (70–90 % del aceite esencial) —un fenilpropanoide que aporta el calor punzante, adormecedor y cálido característico—. El eugenol tiene un conocido efecto anestésico tópico (usado históricamente en odontología). En la destilación, el clavo debe usarse con precisión: el exceso de eugenol puede inhibir la levadura y arrancar otros compuestos volátiles del alambique.", "pairing_es": "Marida de forma natural con piel de naranja dulce, vainilla y modificadores criados en roble. El puente del eugenol lo conecta con el laurel y la pimienta de Jamaica en un arco de maridaje botánico.", "mixology_es": "El motor aromático de los Flips de invierno, vinos calientes o toddies calientes de ginebra. Una guarnición de piel de naranja claveteada de clavo es un maridaje visual clásico y comunicativo."}, "cardamom": {"cat": "Rooty / Spicy · Warming", "origin": "Green cardamom pods (Elettaria cardamomum). Primary active compounds: 1,8-cineole (eucalyptol, 20–40%), alpha-terpinyl acetate (20–35%), and limonene (2–4%). This unique trio delivers a complex, bright, volatile aromatic blast of cooling eucalyptus, citrus, and warm green spice simultaneously. One of the most aromatic and volatile of gin botanicals — minimal quantity achieves significant impact.", "pairing": "A superstar in Contemporary/Western gins. Bridges the gap between piney, citrus, and sweet-spice categories. One of few botanicals that works coherently across all flavor families.", "mixology": "Sensational in a G&T with expressed grapefruit twist or a cardamom-spiced espresso martini. In fine dining bar programs, cardamom-forward gin is an ideal base for a digestif cocktail or a spiced milk punch.", "cat_es": "Raíz / Especia · Cálido", "origin_es": "Vainas de cardamomo verde (Elettaria cardamomum). Compuestos activos principales: 1,8-cineol (eucaliptol, 20–40 %), acetato de alfa-terpinilo (20–35 %) y limoneno (2–4 %). Este trío único aporta un estallido aromático complejo, brillante y volátil de eucalipto refrescante, cítrico y especia verde cálida a la vez. Uno de los botánicos más aromáticos y volátiles —una cantidad mínima logra un impacto significativo—.", "pairing_es": "Una superestrella en las ginebras Contemporáneas/Western. Tiende un puente entre las categorías de pino, cítrico y especia dulce. Uno de los pocos botánicos que funciona con coherencia en todas las familias de sabor.", "mixology_es": "Sensacional en un Gin Tonic con piel de toronja exprimida o un espresso martini especiado con cardamomo. En programas de barra de alta gastronomía, la ginebra con cardamomo es una base ideal para un cóctel digestivo o un milk punch especiado."}, "saffron": {"cat": "Rooty / Spicy · Pungent", "origin": "Dried stigmas of Crocus sativus — the world's most expensive spice by weight. Safranal (the volatile aromatic compound, derived from picrocrocin during drying) is responsible for the distinctive floral-honey-hay aroma. Crocin (responsible for the golden color) is non-volatile and requires post-distillation maceration for color transfer. Both functions are used in gin — distillation for aroma, maceration for color.", "pairing": "Establishes an elite, luxurious contemporary flavor line. Pairs naturally with honey, floral profiles, and savory spice elements. The metallic undertone connects to orris root and iris profiles.", "mixology": "Provides striking visual presentation (golden hue) and an earthy, exotic, honey-metallic undertone to ultra-premium custom Negronis or a gold-leaf Martini presentation.", "cat_es": "Raíz / Especia · Punzante", "origin_es": "Estigmas secos de Crocus sativus —la especia más cara del mundo por peso—. El safranal (el compuesto aromático volátil, derivado de la picrocrocina durante el secado) es responsable del aroma distintivo de flor, miel y heno. La crocina (responsable del color dorado) es no volátil y requiere maceración posdestilación para transferir el color. Ambas funciones se usan en ginebra —destilación para el aroma, maceración para el color—.", "pairing_es": "Establece una línea de sabor contemporánea de élite y lujosa. Marida de forma natural con miel, perfiles florales y elementos de especia salada. El matiz metálico conecta con perfiles de lirio.", "mixology_es": "Aporta una presentación visual llamativa (tono dorado) y un matiz terroso, exótico y de miel-metal a Negronis personalizados ultrapremium o una presentación de Martini con pan de oro."}, "cumin": {"cat": "Rooty / Spicy · Pungent", "origin": "Seeds of Cuminum cyminum. Cuminaldehyde (p-isopropylbenzaldehyde) is the principal compound at 25–35% of the essential oil, alongside gamma-terpinene and p-cymene. Cuminaldehyde is one of the most recognizably pungent aromatic compounds in botanical distillation — present in very small quantities in coriander seed as well, creating a chemical connection between the two.", "pairing": "A daring botanical choice for culinary-forward gins. The cuminaldehyde connection pairs naturally with coriander seed, creating a depth-on-depth effect.", "mixology": "The avant-garde weapon for a savory Gibson or a high-intensity Botanical Red Snapper. In a Michelin context, a cumin-forward gin with a celery brine wash and herb oil float is a technique-driven contemporary serve.", "cat_es": "Raíz / Especia · Punzante", "origin_es": "Semillas de Cuminum cyminum. El cuminaldehído (p-isopropilbenzaldehído) es el compuesto principal, al 25–35 % del aceite esencial, junto a gamma-terpineno y p-cimeno. El cuminaldehído es uno de los compuestos aromáticos más reconociblemente punzantes de la destilación botánica —presente en pequeñas cantidades también en la semilla de cilantro, creando una conexión química entre ambos—.", "pairing_es": "Una elección botánica atrevida para ginebras culinarias. La conexión del cuminaldehído marida de forma natural con la semilla de cilantro, creando un efecto de profundidad sobre profundidad.", "mixology_es": "El arma vanguardista para un Gibson salado o un Botanical Red Snapper de alta intensidad. En contexto Michelin, una ginebra con comino, un lavado de salmuera de apio y un toque de aceite de hierbas es un servicio contemporáneo guiado por la técnica."}, "anise": {"cat": "Rooty / Spicy · Pungent", "origin": "Aniseed (Pimpinella anisum) or star anise (Illicium verum) — both dominated by trans-anethole (80–90% of essential oil in aniseed; similar in star anise). Anethole is responsible for the louche (Ouzo effect) — the milky, opalescent cloudification when water is added — due to anethole's water insolubility at lower dilutions. Star anise has a slightly more complex profile with foeniculin and terpene contributors.", "pairing": "Works to elongate perceived sweetness and mouth-coating richness. Connects to fennel, liquorice root, and caraway in the anise-botanical family.", "mixology": "Excellent in Martinez builds or cocktails incorporating absinthe rinses, mint modifiers, or fresh lime (acid drives the louche). The louche effect, when triggered in a highball, is a compelling visual element.", "cat_es": "Raíz / Especia · Punzante", "origin_es": "Anís (Pimpinella anisum) o anís estrellado (Illicium verum) —ambos dominados por trans-anetol (80–90 % del aceite esencial en el anís; similar en el anís estrellado)—. El anetol es responsable del louche (efecto Ouzo) —la opalescencia lechosa al añadir agua— debido a la insolubilidad del anetol en agua a diluciones más bajas. El anís estrellado tiene un perfil algo más complejo con foeniculina y contribuyentes terpénicos.", "pairing_es": "Funciona para alargar la dulzura percibida y la riqueza que recubre la boca. Conecta con hinojo, raíz de regaliz y alcaravea en la familia botánica del anís.", "mixology_es": "Excelente en construcciones de Martinez o cócteles que incorporan enjuagues de absenta, modificadores de menta o lima fresca (el ácido impulsa el louche). El efecto louche, al activarse en un highball, es un elemento visual convincente."}, "grains-of-paradise": {"cat": "Rooty / Spicy · Curried", "origin": "Aframomum melegueta — seeds from West Africa, a botanical relative of ginger and cardamom in the Zingiberaceae family. Key active compounds: paradol (a related structure to gingerol and capsaicin), 6-shogaol, and various aromatic ketones. Paradol activates TRPV1 heat receptors similarly to capsaicin, but with a more complex, multi-dimensional heat including black pepper, lavender, and fresh cardamom citrus facets. Historically important in Medieval European cooking.", "pairing": "A foundational element in high-end contemporary gins. Expands mid-palate complexity and bridges spice and floral categories in a way no other botanical does alone.", "mixology": "Exceptional in a classic G&T — its complexity elevates the botanical without needing heavy garnishes. In fine-dining contexts, a Grains of Paradise-forward gin with a house-made spiced tonic syrup and soda creates a bespoke tableside serve.", "cat_es": "Raíz / Especia · Curry", "origin_es": "Aframomum melegueta —semillas de África Occidental, pariente botánico del jengibre y el cardamomo en la familia Zingiberaceae—. Compuestos activos clave: paradol (estructura emparentada con el gingerol y la capsaicina), 6-shogaol y diversas cetonas aromáticas. El paradol activa los receptores de calor TRPV1 de forma similar a la capsaicina, pero con un calor más complejo y multidimensional que incluye facetas de pimienta negra, lavanda y cítrico de cardamomo fresco. Históricamente importante en la cocina europea medieval.", "pairing_es": "Un elemento fundamental en las ginebras contemporáneas de alta gama. Expande la complejidad en el centro del paladar y tiende un puente entre las categorías de especia y floral como ningún otro botánico lo hace por sí solo.", "mixology_es": "Excepcional en un Gin Tonic clásico —su complejidad eleva el botánico sin necesidad de guarniciones pesadas—. En contextos de alta gastronomía, una ginebra con granos del paraíso, un jarabe de tónica especiado casero y soda crea un servicio en mesa a medida."}, "pepper": {"cat": "Rooty / Spicy · Curried", "origin": "Black (Piper nigrum, most common), white (same fruit, processed differently), or green peppercorns. Piperine is the primary heat compound and alkaloid. However, the aromatic character comes primarily from monoterpenes — beta-caryophyllene, limonene, sabinene — not from piperine, which is largely non-volatile. This means distilled pepper gin carries the aromatic complexity without the sharp piperine bite of fresh cracked pepper.", "pairing": "Cuts through heavy unctuous sweet profiles or oily botanical builds. The dry, wood-spiced heat works at both the top note (terpenes) and finish (residual piperine).", "mixology": "The definitive choice for a Red Snapper, or adding a dry peppery snap to a Dirty Martini. A cracked pepper rim on a savory gin cocktail is a standard presentation technique.", "cat_es": "Raíz / Especia · Curry", "origin_es": "Granos de pimienta negra (Piper nigrum, la más común), blanca (mismo fruto, procesado distinto) o verde. La piperina es el compuesto de calor y alcaloide principal. Sin embargo, el carácter aromático proviene sobre todo de monoterpenos —beta-cariofileno, limoneno, sabineno— no de la piperina, que es en gran parte no volátil. Esto significa que la ginebra de pimienta destilada porta la complejidad aromática sin el mordiente afilado de la piperina de la pimienta recién molida.", "pairing_es": "Corta los perfiles dulces, untuosos y pesados o las construcciones botánicas aceitosas. El calor seco y amaderado funciona tanto en la nota alta (terpenos) como en el final (piperina residual).", "mixology_es": "La elección definitiva para un Red Snapper, o para añadir un chasquido seco y picante a un Martini sucio. Un borde de pimienta molida en un cóctel de ginebra salado es una técnica de presentación estándar."}, "cubeb-berry": {"cat": "Rooty / Spicy · Earthy", "origin": "Piper cubeba — tail-bearing peppercorns from Java, Indonesia. Related to black pepper but with a distinctly different aromatic profile dominated by cubebene, cubebol (a sesquiterpene alcohol), and copaene. Provides a complex earthy pepper spice with cooling undertones of pine, allspice, and eucalyptus. The cooling effect is partly attributable to cubebol's mild menthol-receptor activity.", "pairing": "Often paired with bold gins to generate a long, multidimensional peppery finish. The cooling pine note creates an internal harmony with juniper, making cubeb a natural enhancer.", "mixology": "Magnificent in a Negroni or spirit-forward old-school cocktails where its cooling spice notes complement sweet vermouth. A cubeb-forward London Dry is a classic pairing for bone-dry Martinis with maximum aroma retention.", "cat_es": "Raíz / Especia · Terroso", "origin_es": "Piper cubeba —granos de pimienta con rabillo de Java, Indonesia—. Emparentada con la pimienta negra pero con un perfil aromático distinto dominado por cubebeno, cubebol (un alcohol sesquiterpénico) y copaeno. Aporta una especia de pimienta terrosa y compleja con matices refrescantes de pino, pimienta de Jamaica y eucalipto. El efecto refrescante se atribuye en parte a la leve actividad del cubebol sobre los receptores del mentol.", "pairing_es": "A menudo se combina con ginebras potentes para generar un final picante largo y multidimensional. La nota refrescante de pino crea armonía interna con el enebro, haciendo de la cubeba un potenciador natural.", "mixology_es": "Magnífica en un Negroni o cócteles potentes de la vieja escuela donde sus notas refrescantes de especia complementan el vermut dulce. Una London Dry con predominio de cubeba es un maridaje clásico para Martinis muy secos con máxima retención de aroma."}, "ginger": {"cat": "Rooty / Spicy · Fiery", "origin": "Fresh or dried rhizome of Zingiber officinale. Fresh ginger: dominated by gingerols (6-gingerol most abundant), providing a hot, sharp, bright fiery note. Dried ginger: gingerols dehydrate to shogaols, which are approximately twice as pungent as gingerols — so dried ginger provides a deeper, more persistent heat. Both activate TRPV1 heat receptors. Gin producers often specify fresh vs. dried for distinct effects.", "pairing": "Works synergistically with bright citrus profiles — lemon, lemongrass — to drive high-intensity freshness. Also connects with cardamom (shared Zingiberaceae family) and saffron.", "mixology": "The essential partner for highballs using premium ginger beer (Fever-Tree, Bundaberg, or house-made). In a Michelin context, a clarified ginger and lemon juice 'water' as a tonic substitute creates a contemporary non-carbonated long gin serve.", "cat_es": "Raíz / Especia · Ardiente", "origin_es": "Rizoma fresco o seco de Zingiber officinale. Jengibre fresco: dominado por gingeroles (el 6-gingerol es el más abundante), que aportan una nota caliente, afilada, brillante y ardiente. Jengibre seco: los gingeroles se deshidratan en shogaoles, aproximadamente el doble de punzantes —así que el jengibre seco aporta un calor más profundo y persistente—. Ambos activan los receptores de calor TRPV1. Los productores suelen especificar fresco o seco para efectos distintos.", "pairing_es": "Funciona sinérgicamente con perfiles cítricos brillantes —limón, hierba limón— para impulsar una frescura de alta intensidad. También conecta con el cardamomo (familia Zingiberaceae compartida) y el azafrán.", "mixology_es": "El acompañante esencial de highballs con ginger beer premium (Fever-Tree, Bundaberg o casera). En contexto Michelin, un 'agua' clarificada de jengibre y limón como sustituto de la tónica crea un trago largo de ginebra sin carbonatar contemporáneo."}, "coriander-seed": {"cat": "Rooty / Spicy · Piquant", "origin": "The most widely used secondary botanical in gin production globally — present in virtually all recognized gin styles. Dried coriander fruit (Coriandrum sativum). Dominated by linalool (60–70% of essential oil) — the same compound dominant in lavender, rose, and basil. Also contains geraniol, camphor, and cymene. This linalool content is what makes coriander seed the 'chemical bridge' of gin: it fuses deep pine notes (from juniper) with volatile citrus top notes into a cohesive aromatic arc.", "pairing": "Acts as the literal chemical bridge in the still. Without sufficient coriander seed, London Dry gins often present as disjointed — juniper on the nose, citrus in the mid-palate with no connecting thread.", "mixology": "Omnipresent across all gin cocktail formats. Essential for holding together the citrus-pine balance in a G&T. When tasting for education, a low-coriander gin vs. a high-coriander gin in the same cocktail is one of the most instructive comparative exercises available.", "cat_es": "Raíz / Especia · Picante", "origin_es": "El botánico secundario más usado en la producción de ginebra a nivel mundial —presente en prácticamente todos los estilos reconocidos—. Fruto seco de cilantro (Coriandrum sativum). Dominado por linalool (60–70 % del aceite esencial) —el mismo compuesto dominante en lavanda, rosa y albahaca—. También contiene geraniol, alcanfor y cimeno. Este contenido de linalool es lo que hace de la semilla de cilantro el 'puente químico' de la ginebra: fusiona las notas profundas de pino (del enebro) con las notas altas cítricas en un arco aromático cohesivo.", "pairing_es": "Actúa como el puente químico literal en el alambique. Sin suficiente semilla de cilantro, las ginebras London Dry suelen presentarse inconexas —enebro en nariz, cítrico en el centro del paladar sin hilo conector—.", "mixology_es": "Omnipresente en todos los formatos de cóctel de ginebra. Esencial para mantener unido el equilibrio cítrico-pino en un Gin Tonic. Al catar con fines didácticos, comparar una ginebra baja en cilantro con una alta en cilantro en el mismo cóctel es uno de los ejercicios comparativos más instructivos."}};

const FUN_FACTS = {"CITRUS": {"en": "Citrus peel — lemon, orange, grapefruit — is the backbone of classic London Dry gin. Bright citrus notes mean a gin built for a crisp G&T or a classic Martini.", "es": "La cáscara de cítricos — limón, naranja, toronja — es la columna vertebral del gin London Dry clásico. Las notas cítricas brillantes indican un gin pensado para un G&T nítido o un Martini clásico."}, "FLESHY FRUIT": {"en": "Stone-fruit notes like apricot, peach and fig add a soft, rounded sweetness — common in modern or 'New Western' style gins that lean less on juniper.", "es": "Las notas de fruta de hueso como chabacano, durazno e higo aportan un dulzor suave y redondeado — comunes en los gins de estilo moderno o 'Nuevo Occidental' que dependen menos del enebro."}, "FRESH FRUIT": {"en": "Crisp, juicy fruit — apple, pear, grape — gives a gin a fresh, almost orchard-like lift, often paired with floral or herbal botanicals.", "es": "La fruta nítida y jugosa — manzana, pera, uva — le da al gin un toque fresco, casi de huerto, a menudo combinado con botánicos florales o herbales."}, "RED FRUITS": {"en": "Berries — raspberry, strawberry, redcurrant — bring a delicate, slightly tart sweetness, often found in gins designed for fruity cocktails or gin-and-tonics with a twist.", "es": "Las bayas — frambuesa, fresa, grosella roja — aportan un dulzor delicado y ligeramente ácido, frecuente en gins pensados para cócteles afrutados o gin-tonics con un giro."}, "FLORAL": {"en": "Floral botanicals — rose, violet, elderflower — give gin its perfumed, aromatic lift. Heavy floral character usually signals a softer, more contemporary style.", "es": "Los botánicos florales — rosa, violeta, flor de saúco — le dan al gin su elevación perfumada y aromática. Un carácter floral intenso suele indicar un estilo más suave y contemporáneo."}, "GRASSY": {"en": "Grassy and leafy notes — fresh-cut grass, bay leaf, lemongrass — add a green, herbaceous freshness that bridges fruit and herbs.", "es": "Las notas herbáceas y de hoja — pasto recién cortado, laurel, citronela — añaden una frescura verde y herbal que tiende un puente entre la fruta y las hierbas."}, "HERBAL": {"en": "Herbs like rosemary, thyme, sage and coriander seed bring savoury, sometimes peppery complexity — a hallmark of contemporary craft gins.", "es": "Hierbas como romero, tomillo, salvia y semilla de cilantro aportan complejidad sabrosa, a veces picante — un sello de los gins artesanales contemporáneos."}, "PINEY": {"en": "Juniper itself, along with pine and resinous notes, is gin's legal and stylistic anchor — without juniper, it isn't gin. A piney profile signals a classic, juniper-forward style.", "es": "El enebro mismo, junto a notas de pino y resina, es el ancla legal y estilística del gin — sin enebro, no es gin. Un perfil de pino indica un estilo clásico, centrado en el enebro."}, "SWEET": {"en": "Creamy, buttery notes — vanilla, coconut, toffee — are unusual in gin and often point to barrel-aging or unconventional botanicals like cacao or oats.", "es": "Las notas cremosas y mantecosas — vainilla, coco, toffee — son inusuales en el gin y a menudo indican añejamiento en barrica o botánicos poco convencionales como cacao o avena."}, "NUTTY": {"en": "Nutty, woody, robust notes — almond, oak, tobacco — usually come from cask aging or roasted botanicals, giving a gin more weight and depth.", "es": "Las notas a frutos secos, madera y robustas — almendra, roble, tabaco — suelen venir del añejamiento en barrica o de botánicos tostados, dando al gin más peso y profundidad."}, "ROOTY / SPICY": {"en": "Root and spice botanicals — angelica, orris, cardamom, pepper, ginger — build gin's warming, structural backbone, the savory counterpart to its citrus top notes.", "es": "Los botánicos de raíz y especia — angélica, orris, cardamomo, pimienta, jengibre — construyen la columna estructural y cálida del gin, la contraparte sabrosa de sus notas cítricas superiores."}};

/* geometry */
function polarToCart(r,a){return[r*Math.cos(a),r*Math.sin(a)];}
function arcRing(r1,r2,a1,a2){const[sx1,sy1]=polarToCart(r1,a1),[ex1,ey1]=polarToCart(r1,a2),[sx2,sy2]=polarToCart(r2,a1),[ex2,ey2]=polarToCart(r2,a2);const lg=a2-a1>Math.PI?1:0;return `M ${sx1} ${sy1} A ${r1} ${r1} 0 ${lg} 1 ${ex1} ${ey1} L ${ex2} ${ey2} A ${r2} ${r2} 0 ${lg} 0 ${sx2} ${sy2} Z`;}
function arcLabelPath(r,a1,a2,rev){const lg=Math.abs(a2-a1)>Math.PI?1:0;if(rev){const[sx,sy]=polarToCart(r,a2),[ex,ey]=polarToCart(r,a1);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 0 ${ex} ${ey}`;}const[sx,sy]=polarToCart(r,a1),[ex,ey]=polarToCart(r,a2);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 1 ${ex} ${ey}`;}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function textOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)>150?'#1c2118':'#f3f3ee';}
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

const REGISTRY={};
const R_IN=62,R_CAT=140,R_SUB=210,R_OUT=300;
let defsEl,gEl;
function buildWheel(){
  const total=DATA.categories.reduce((n,c)=>n+c.sub.reduce((m,s)=>m+s.descriptors.length,0),0);
  const perItem=TWO_PI/total;
  defsEl=el('defs',{});svg.appendChild(defsEl);
  gEl=el('g',{id:'wheelG'});
  let a=-Math.PI/2,gradN=0;
  DATA.categories.forEach((cat,ci)=>{
    const catItems=cat.sub.reduce((m,s)=>m+s.descriptors.length,0);
    const catSpan=catItems*perItem,catStart=a,catEnd=a+catSpan,catMid=catStart+catSpan/2;
    gEl.appendChild(el('path',{d:arcRing(R_IN,R_CAT,catStart,catEnd),fill:cat.color,'class':'cell'}));
    cat._mid=catMid;cat._span=catSpan;
    cat.sub.forEach(sub=>{
      const subSpan=sub.descriptors.length*perItem,subStart=a,subEnd=a+subSpan,subMid=subStart+subSpan/2;
      if(!sub._implicit)gEl.appendChild(el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:sub.color,'class':'cell'}));
      else gEl.appendChild(el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:lighten(cat.color,8),'class':'cell'}));
      sub._mid=subMid;sub._span=subSpan;sub._cat=cat;
      sub.descriptors.forEach(desc=>{
        const s1=a,s2=a+perItem,m=a+perItem/2;
        const gid='pg'+(gradN++);
        const grad=el('radialGradient',{id:gid,gradientUnits:'userSpaceOnUse',cx:'0',cy:'0',r:R_OUT});
        grad.appendChild(el('stop',{offset:'55%','stop-color':lighten(sub.color,20)}));
        grad.appendChild(el('stop',{offset:'100%','stop-color':lighten(sub.color,44)}));
        defsEl.appendChild(grad);
        const p=el('path',{d:arcRing(R_SUB,R_OUT,s1,s2),fill:`url(#${gid})`,'class':'cell desc-seg','data-slug':desc.slug});
        p.addEventListener('click',()=>selectItem(desc.slug));
        gEl.appendChild(p);
        REGISTRY[desc.slug]={desc,sub,cat,segEl:p,chipEl:null,_mid:m,_fill:lighten(sub.color,30)};
        a+=perItem;
      });
    });
  });
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_IN,'class':'hub'}));
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_OUT+4,'class':'rim'}));
  const ys=['-19','-5','8','22'],fs=['7.5','10','7','6'];
  HUB.forEach((txt,i)=>{const a={'text-anchor':'middle',y:ys[i],'font-size':fs[i],'class':'hub-text','font-family':"var(--display)",'letter-spacing':i===3?'2.4':'.5'};if(i===0)a['font-style']='italic';if(i===1||i===2)a['font-weight']='bold';const tt=el('text',a);tt.textContent=txt;tt.style.pointerEvents='none';gEl.appendChild(tt);});
  svg.appendChild(gEl);
  renderLabels();
}

let labelEls=[];let descLabels=[];var READ_SIDE='right';
function renderLabels(){
  labelEls.forEach(e=>e.remove());labelEls=[];descLabels=[];
  DATA.categories.forEach((cat,ci)=>{
    const name=tx(cat,'name').toUpperCase();
    const labR=(R_IN+R_CAT)/2,arcLen=cat._span*labR,estW=name.length*5.0;
    if(arcLen>estW+8){
      const flip=Math.sin(cat._mid)>0,pid='catArc'+ci;
      const existing=defsEl.querySelector('#'+pid);if(existing)existing.remove();
      defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?labR-2:labR+2,cat._mid-cat._span/2,cat._mid+cat._span/2,flip)}));
      const tt=el('text',{'font-size':'7','letter-spacing':'1','font-family':"var(--display)",'font-weight':'bold',fill:cat.textColor||'#fff','dominant-baseline':'middle'});
      const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=name;
      tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }else{
      let deg=cat._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
      const[lx,ly]=polarToCart(labR,cat._mid);
      const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'5','letter-spacing':'.3',fill:cat.textColor||'#fff','font-family':"var(--display)",'font-weight':'bold',transform:`rotate(${deg},${lx},${ly})`});
      const w=name.split(' ');
      if(w.length>1){const t1=el('tspan',{x:lx,dy:'-2.6'});t1.textContent=w[0];const t2=el('tspan',{x:lx,dy:'5.2'});t2.textContent=w.slice(1).join(' ');tt.appendChild(t1);tt.appendChild(t2);}else tt.textContent=name;
      tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }
    cat.sub.forEach((sub,si)=>{
      if(!sub._implicit){
        const subName=tx(sub,'name').toUpperCase(),subLabR=(R_CAT+R_SUB)/2,subArc=sub._span*subLabR;
        if(subArc>subName.length*4+6){
          const flip=Math.sin(sub._mid)>0,pid='subArc'+ci+'_'+si;
          const ex=defsEl.querySelector('#'+pid);if(ex)ex.remove();
          defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?subLabR-1.5:subLabR+1.5,sub._mid-sub._span/2,sub._mid+sub._span/2,flip)}));
          const tt=el('text',{'font-size':'4.6','font-family':"var(--display)",fill:textOn(sub.color),'dominant-baseline':'middle'});
          const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=subName;
          tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }else{
          let deg=sub._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
          const[lx,ly]=polarToCart(subLabR,sub._mid);
          const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'4.2',fill:textOn(sub.color),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
          tt.textContent=subName;tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }
      }
      sub.descriptors.forEach(desc=>{
        const reg=REGISTRY[desc.slug];const m=reg._mid;
        const theta=m*180/Math.PI;                 // raw radial angle (0=3 o'clock)
        const deg=(READ_SIDE==='left')?theta+180:theta;  // flip whole wheel for left-read; reading side stays upright
        const[lx,ly]=polarToCart((R_SUB+R_OUT)/2,m);
        const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'6','letter-spacing':'.2',fill:textOn(reg._fill),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
        const nm=tx(desc,'name').toUpperCase();
        const availR=(R_OUT-R_SUB)-12;
        const fitFs=Math.max(3.4,Math.min(6,availR/(nm.length*0.56)));
        tt.setAttribute('font-size',fitFs.toFixed(2));
        tt.textContent=nm;
        tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        descLabels.push({el:tt,lx:lx,ly:ly,theta:theta});
      });
    });
  });
}

/* wiki */
function wikiUrl(slug,name){const t=WIKI_TITLES[name]||WIKI_TITLES[slug]||(name.charAt(0).toUpperCase()+name.slice(1).toLowerCase());const host=lang==='es'?'es.wikipedia.org':'en.wikipedia.org';return 'https://'+host+'/wiki/'+encodeURIComponent(t.replace(/ /g,'_'));}
function headingHtml(slug,name){return `<h2><a href="${wikiUrl(slug,name)}" target="_blank" rel="noopener noreferrer">${name}<span class="wiki-mark">↗</span></a></h2>`;}


function funFactFor(slug){
  const reg=REGISTRY[slug]; if(!reg) return null;
  const tryKeys=[reg.cat&&reg.cat.name, reg.sub&&reg.sub.name];
  for(const k of tryKeys){ if(k&&FUN_FACTS[k]) return FUN_FACTS[k]; }
  return null;
}

function showDetail(slug){
  currentSlug=slug;
  const d=DESCRIPTIONS[slug],reg=REGISTRY[slug];
  const name=reg?tx(reg.desc,'name'):slug;
  if(!d){detail.innerHTML=`${headingHtml(slug,name)}<div class="category-tag"></div><div class="body-text">${t('inProgress').replace('{n}',name)}</div>`;return;}
  const tag=tx(d,'cat');
  let html=headingHtml(slug,name)+`<div class="category-tag">${tag}</div>`;
  const ff=funFactFor(slug);
  if(ff){const fft=(lang==='es'&&ff.es)?ff.es:ff.en;html+=`<div class="funfact"><span class="ff-label">${lang==='es'?'Dato':'Fun Fact'}</span>${fft}</div>`;}
  const sec=(key,field)=>{const v=tx(d,field);if(v)html+=`<div class="section-title">${t(key)}</div><div class="body-text">${v}</div>`;};
  sec('origin','origin');sec('chemistry','chemistry');sec('pairing','pairing');sec('mixology','mixology');sec('examples','examples');
  const fl=tx(d,'flag');if(fl)html+=`<div class="flag-note">${fl}</div>`;

  detail.innerHTML=html;
}

function selectItem(slug){
  const e=REGISTRY[slug];if(!e)return;
  if(selectedPath)selectedPath.classList.remove('selected');
  document.querySelectorAll('.list-chip.selected').forEach(c=>c.classList.remove('selected'));
  if(e.segEl){e.segEl.classList.add('selected');selectedPath=e.segEl;}
  if(e.chipEl)e.chipEl.classList.add('selected');
  showDetail(slug);
}

/* list */
const wheelWrap=document.getElementById('wheelWrap'),listView=document.getElementById('listView'),listBody=document.getElementById('listBody'),listSearch=document.getElementById('listSearch'),noResults=document.getElementById('noResults'),sizeCtl=document.getElementById('sizeCtl'),viewWheelBtn=document.getElementById('viewWheel'),viewListBtn=document.getElementById('viewList');
function rebuildList(){listBody.innerHTML='';for(const k in REGISTRY)REGISTRY[k].chipEl=null;buildList();const q=listSearch.value;if(q){listSearch.dispatchEvent(new Event('input'));}}
function buildList(){
  DATA.categories.forEach(cat=>{
    const block=document.createElement('div');block.className='cat-block';
    const head=document.createElement('div');head.className='cat-head';
    const dot=document.createElement('span');dot.className='cat-dot';dot.style.background=cat.color;
    head.appendChild(dot);head.appendChild(document.createTextNode(tx(cat,'name')));block.appendChild(head);
    cat.sub.forEach(sub=>{
      const grp=document.createElement('div');grp.className='sub-group';
      const hdr=document.createElement('button');hdr.type='button';hdr.className='sub-toggle';
      const cnt=sub.descriptors.length;
      const hname=sub._implicit?(tx(cat,'name')+' \u00b7 '+cnt):(tx(sub,'name')+' \u00b7 '+cnt);
      hdr.innerHTML='<span class="sub-caret">\u25b8</span><span class="sub-name">'+hname+'</span>';
      hdr.addEventListener('click',()=>{grp.classList.toggle('expanded');});
      grp.appendChild(hdr);
      const row=document.createElement('div');row.className='chip-row';
      sub.descriptors.forEach(desc=>{
        const chip=document.createElement('button');chip.type='button';chip.className='list-chip';chip.textContent=tx(desc,'name');chip.dataset.slug=desc.slug;
        chip.dataset.search=(tx(desc,'name')+' '+tx(sub,'name')+' '+tx(cat,'name')).toLowerCase();
        chip.addEventListener('click',()=>selectItem(desc.slug));
        if(REGISTRY[desc.slug])REGISTRY[desc.slug].chipEl=chip;
        if(currentSlug===desc.slug){chip.classList.add('selected');grp.classList.add('expanded');}
        row.appendChild(chip);
      });
      grp.appendChild(row);block.appendChild(grp);
    });
    listBody.appendChild(block);
  });
}
listSearch.addEventListener('input',()=>{
  const q=listSearch.value.trim().toLowerCase();let any=false;
  listBody.classList.toggle('searching',!!q);
  listBody.querySelectorAll('.cat-block').forEach(block=>{let bHas=false;
    block.querySelectorAll('.sub-group').forEach(grp=>{let gHas=false;
      grp.querySelectorAll('.list-chip').forEach(ch=>{const show=!q||ch.dataset.search.includes(q);ch.style.display=show?'':'none';if(show)gHas=true;});
      grp.classList.toggle('hit',!!q&&gHas);
      grp.style.display=(q&&!gHas)?'none':'';if(gHas)bHas=true;});
    block.style.display=bHas?'':'none';if(bHas)any=true;});
  noResults.style.display=any?'none':'block';
});
function setView(v){
  const list=(v==='list');
  document.body.dataset.view=v;
  listView.classList.toggle('active',list);
  wheelWrap.style.display=list?'none':'';
  sizeCtl.style.display=list?'none':'flex';
  viewListBtn.classList.toggle('active',list);
  viewWheelBtn.classList.toggle('active',!list);
  
  // Set attribute on body to trigger the correct Fog Overlay
  document.body.setAttribute('data-view', v);

  if(list)listSearch.focus();
  try{localStorage.setItem(SUBJECT+'View',v);}catch(e){}
}
viewWheelBtn.addEventListener('click',()=>setView('wheel'));
viewListBtn.addEventListener('click',()=>setView('list'));

/* spin */
function getAngle(e,rect){const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;const x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;return Math.atan2(y-cy,x-cx);}
function applyRotation(){if(gEl)gEl.setAttribute('transform',`rotate(${rotation*180/Math.PI})`);}
function momentum(){
  if(!isDragging&&Math.abs(velocity)>0.001){
    rotation+=velocity;
    velocity*=0.96;
    applyRotation();
    animFrame=requestAnimationFrame(momentum);
  }
}

// User dragging/spinning is totally free! No point consumption.
svg.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('desc-seg'))return; 
  isDragging=true;
  const r=svg.getBoundingClientRect();lastAngle=getAngle(e,r);lastTime=Date.now();velocity=0;if(animFrame)cancelAnimationFrame(animFrame);
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const r=svg.getBoundingClientRect();const an=getAngle(e,r),dl=an-lastAngle,now=Date.now();velocity=dl/Math.max(1,now-lastTime)*16;
  rotation+=dl;lastAngle=an;lastTime=now;
  applyRotation();
});
window.addEventListener('mouseup',()=>{
  if(!isDragging)return;
  isDragging=false;
  animFrame=requestAnimationFrame(momentum);
});

svg.addEventListener('touchstart',e=>{
  if(e.touches.length===2){e.preventDefault();isDragging=false;pinching=true;pinchDist0=touchDist(e);pinchSize0=wheelSize;if(animFrame)cancelAnimationFrame(animFrame);return;}
  if(e.target.classList.contains('desc-seg'))return;
  e.preventDefault();
  isDragging=true;
  const r=svg.getBoundingClientRect();lastAngle=getAngle(e,r);lastTime=Date.now();velocity=0;if(animFrame)cancelAnimationFrame(animFrame);
},{passive:false});
svg.addEventListener('touchmove',e=>{
  if(pinching&&e.touches.length===2){e.preventDefault();setWheelSize(pinchSize0*touchDist(e)/Math.max(1,pinchDist0));return;}
  if(!isDragging)return;
  e.preventDefault();const r=svg.getBoundingClientRect();const an=getAngle(e,r),dl=an-lastAngle,now=Date.now();velocity=dl/Math.max(1,now-lastTime)*16;
  rotation+=dl;lastAngle=an;lastTime=now;
  applyRotation();
},{passive:false});
svg.addEventListener('touchend',e=>{
  if(e.touches.length<2)pinching=false;
  if(!isDragging)return;
  isDragging=false;
  animFrame=requestAnimationFrame(momentum);
});

/* sizing */
const zoomSlider=document.getElementById('zoomSlider');let wheelSize=1360,pinching=false,pinchDist0=1,pinchSize0=560;
function touchDist(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
function setWheelSize(px){wheelSize=Math.min(2200,Math.max(280,Math.round(px)));svg.setAttribute('width',wheelSize);svg.setAttribute('height',wheelSize);zoomSlider.value=wheelSize;}
document.getElementById('zoomIn').addEventListener('click',()=>setWheelSize(wheelSize*1.12));
document.getElementById('zoomOut').addEventListener('click',()=>setWheelSize(wheelSize*0.9));
document.getElementById('zoomReset').addEventListener('click',()=>setWheelSize(Math.max(980,Math.min(1520,Math.round(window.innerWidth*1.05)))));
zoomSlider.addEventListener('input',()=>setWheelSize(+zoomSlider.value));
svg.addEventListener('wheel',e=>{e.preventDefault();setWheelSize(wheelSize*(e.deltaY<0?1.07:0.93));},{passive:false});

/* movable panel */
const grip=document.getElementById('panelGrip'),dockBtn=document.getElementById('panelDock');let pDrag=null;
grip.addEventListener('pointerdown',e=>{if(e.target===dockBtn)return;const r=panel.getBoundingClientRect();if(!panel.classList.contains('floating')){panel.classList.add('floating');panel.style.left=r.left+'px';panel.style.top=r.top+'px';}pDrag={dx:e.clientX-r.left,dy:e.clientY-r.top};grip.setPointerCapture(e.pointerId);e.preventDefault();});
grip.addEventListener('pointermove',e=>{if(!pDrag)return;const w=panel.offsetWidth;const x=Math.min(Math.max(4,e.clientX-pDrag.dx),Math.max(4,window.innerWidth-w-4));const y=Math.min(Math.max(4,e.clientY-pDrag.dy),window.innerHeight-56);panel.style.left=x+'px';panel.style.top=y+'px';});
grip.addEventListener('pointerup',()=>{pDrag=null;});grip.addEventListener('pointercancel',()=>{pDrag=null;});
dockBtn.addEventListener('click',()=>{panel.classList.remove('floating');panel.style.left='';panel.style.top='';});
window.addEventListener('resize',()=>{if(panel.classList.contains('floating')){const r=panel.getBoundingClientRect();if(r.right>window.innerWidth||r.bottom>window.innerHeight){panel.style.left=Math.max(4,window.innerWidth-panel.offsetWidth-4)+'px';panel.style.top=Math.max(4,Math.min(parseFloat(panel.style.top)||4,window.innerHeight-80))+'px';}}});

const hubCenter=document.getElementById('hubCenter'),hubMirror=document.getElementById('hubMirror'),bgEcho=document.getElementById('bgEcho'),hubLogoImg=document.getElementById('hubLogo');
function applyLogo(){
  const th=document.documentElement.getAttribute('data-theme');
  const srcL=(th==='dark')?(LOGO_DARK||LOGO_DARK_FILE):(LOGO_LIGHT||LOGO_LIGHT_FILE);
  if(srcL){hubLogoImg.src=srcL;hubLogoImg.style.display='block';document.getElementById('svgContainer').classList.add('has-logo');}
  else{hubLogoImg.style.display='none';document.getElementById('svgContainer').classList.remove('has-logo');}
}
function splitTwo(n){
  const w=n.split(' ');if(w.length<2)return[n];
  const mid=Math.ceil(w.length/2);return[w.slice(0,mid).join(' '),w.slice(mid).join(' ')];
}
function sizeEcho(txt){var n=(txt||'').length;var e=document.getElementById('bgEcho');if(!e)return;e.classList.remove('len-s','len-m','len-l','len-xl');e.classList.add(n<=12?'len-s':n<=24?'len-m':n<=40?'len-l':'len-xl');}
function showMirror(slug){
  const reg=REGISTRY[slug];if(!reg)return;
  const nm=tx(reg.desc,'name');
  bgEcho.textContent=nm;sizeEcho(nm);bgEcho.classList.add('show');
}
function hideMirror(){
  if(currentSlug){showMirror(currentSlug);return;}
  bgEcho.classList.remove('show');
}
