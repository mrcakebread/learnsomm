<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gin Botanical Wheel — Mark Lenington</title>


<style>
:root{--display:'Optima','Candara','Gill Sans','Gill Sans MT','Segoe UI',sans-serif;--serif:'Avenir Next','Avenir','Century Gothic','Futura','Trebuchet MS',sans-serif;}
[data-theme="dark"]{--display:'Baskerville','Baskerville Old Face','Hoefler Text','Big Caslon','Palatino Linotype',serif;--serif:'Iowan Old Style','Palatino Linotype','Palatino','Book Antiqua','Cambria',Georgia,serif;}

*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#8a5a2a;--gold:#a87f3d;--sep:#faf8f3;--hub:#fffdf8;--hub-text:#6b573a;--badge-bg:#f4eee2;--badge-line:#d8cdb8;--shadow:0 8px 30px rgba(80,60,30,.14);}
[data-theme="dark"]{--bg:#16130e;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;--accent:#c9a96e;--gold:#d4b276;--sep:#16130e;--hub:#211c14;--hub-text:#d8c294;--badge-bg:#2a241a;--badge-line:#4a4030;--shadow:0 10px 34px rgba(0,0,0,.55);}
html{background:var(--bg);}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .25s,color .25s;}

.topbar{width:100%;max-width:1100px;display:flex;justify-content:flex-end;gap:.5rem;padding:.7rem 1rem 0;}
.topbar button{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:.75rem;border-radius:6px;padding:.35rem .7rem;cursor:pointer;}
.topbar button:hover{color:var(--text);border-color:var(--muted);}
h1{font-size:1.4rem;font-weight:400;letter-spacing:.04em;padding:.2rem 1rem .15rem;text-align:center;}
.byline{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.2rem;}
.byline em{color:var(--accent);font-style:italic;}
.spin-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:.55rem;}
.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;justify-content:center;border:1px solid var(--line);border-radius:8px;padding:.4rem .9rem;margin-bottom:1rem;max-width:96vw;background:var(--panel);}
.controls .ctl-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.controls button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.9rem;line-height:1;border-radius:6px;padding:.32rem .65rem;cursor:pointer;min-width:2.1rem;min-height:2.1rem;}
.controls button:hover{border-color:var(--gold);color:var(--accent);}
.controls button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.controls input[type=range]{width:150px;accent-color:var(--gold);cursor:pointer;}
.size-ctl{display:flex;align-items:center;gap:.55rem;}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.view-toggle button{border:none;border-radius:0;min-width:3.4rem;}
.view-toggle button.active{background:var(--badge-bg);color:var(--accent);font-weight:bold;}
.layout{display:flex;gap:0;width:100%;max-width:1180px;align-items:flex-start;padding:0 1rem 2.5rem;justify-content:center; position:relative;}
.wheel-wrap{flex:0 0 auto;display:flex;justify-content:center;}
#svgContainer { position: relative; line-height: 0; }

#wheelSvg{cursor:grab;user-select:none;touch-action:none;filter:drop-shadow(var(--shadow));}
#wheelSvg:active{cursor:grabbing;}
#wheelSvg .cell{stroke:var(--sep);stroke-width:1.5;}
#wheelSvg .desc-seg{cursor:pointer;transition:filter .15s;}
#wheelSvg .desc-seg:hover{filter:brightness(1.12) saturate(1.05);}
#wheelSvg .desc-seg.selected{stroke:var(--gold);stroke-width:2.4;}
#wheelSvg .hub{fill:var(--hub);stroke:var(--gold);stroke-width:1.4;}
#wheelSvg .hub-text{fill:var(--hub-text);}
#wheelSvg .rim{fill:none;stroke:var(--line);stroke-width:1;}
@media (prefers-reduced-motion:reduce){#wheelSvg .desc-seg{transition:none;}}

#listView{position: relative; display:none; flex:0 1 auto; width:min(720px,94vw); transition: opacity 0.3s, filter 0.3s;}
#listView.active{display:block;}
#listSearch{width:100%;padding:.55rem .85rem;font-family:inherit;font-size:.92rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);margin-bottom:1rem;}
#listSearch:focus{outline:none;border-color:var(--gold);}
.cat-block{margin-bottom:1rem;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.7rem .9rem;}
.cat-head{display:flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.cat-dot{width:.7rem;height:.7rem;border-radius:3px;flex:0 0 auto;}
.sub-group{margin-bottom:.5rem;}
.sub-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);opacity:.8;margin-bottom:.3rem;}
.chip-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.list-chip{font-size:.82rem;font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.32rem .62rem;cursor:pointer;color:var(--text);}
.list-chip:hover{border-color:var(--gold);color:var(--accent);}
.list-chip:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.list-chip.selected{border-color:var(--gold);background:var(--badge-bg);color:var(--accent);font-weight:bold;}
#noResults{display:none;color:var(--muted);font-style:italic;font-size:.88rem;padding:.4rem 0;}

.detail-panel{flex:1;min-width:280px;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:1.3rem 1.5rem;min-height:360px;margin-left:1.4rem; transition: opacity 0.3s; z-index:60; position:relative;}
.panel-header{display:flex;align-items:center;justify-content:space-between;gap:.6rem;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin:-1.3rem -1.5rem 1rem;padding:.5rem .9rem .45rem;border-bottom:1px solid var(--line);border-radius:9px 9px 0 0;}
.panel-header:active{cursor:grabbing;}
.panel-header .grip-title{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
.panel-header .grip-dots{color:var(--line);letter-spacing:2px;margin-right:.4rem;}
.panel-header button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.66rem;border-radius:5px;padding:.22rem .5rem;cursor:pointer;display:none;}
.panel-header button:hover{border-color:var(--gold);color:var(--accent);}
.detail-panel.floating{position:fixed;z-index:60;margin:0;width:min(380px,92vw);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow);border-color:var(--gold);}
.detail-panel.floating .panel-header{position:sticky;top:0;z-index:2;background:var(--panel);}
.detail-panel.floating .panel-header button{display:inline-block;}
.detail-panel h2{font-size:1.3rem;margin-bottom:.15rem;font-weight:400;font-style:italic;color:var(--accent);}
.detail-panel h2 a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--gold);}
.detail-panel h2 a:hover,.detail-panel h2 a:focus-visible{border-bottom-style:solid;color:var(--gold);outline:none;}
.wiki-mark{font-size:.6em;margin-left:.28rem;font-style:normal;color:var(--gold);vertical-align:super;}
.detail-panel .category-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.section-title{font-size:.66rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .25rem;font-weight:bold;border-bottom:1px solid var(--line);padding-bottom:2px;}
.body-text{font-size:.85rem;line-height:1.65;color:var(--text);}
.flag-note{font-size:.74rem;color:var(--gold);background:var(--badge-bg);border:1px solid var(--gold);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;line-height:1.5;}
.grid-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;}
.grid-badge{font-size:.74rem;background:var(--badge-bg);border:1px solid var(--gold);padding:.18rem .5rem;border-radius:4px;}
.placeholder{color:var(--muted);font-size:.95rem;margin-top:2.5rem;text-align:center;font-style:italic;}
@media(max-width:800px){.layout{flex-direction:column;align-items:center;}.detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}h1{font-size:1.15rem;}}

/* Hub center: logo + hover mirror */
#hubCenter{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18.5%;height:18.5%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
#hubLogo{max-width:88%;max-height:88%;opacity:1;transition:opacity .18s;display:none;}
#hubMirror{position:absolute;inset:-30% -55%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:var(--display);font-weight:bold;color:var(--hub-text);line-height:1.08;opacity:0;transition:opacity .15s;text-shadow:0 1px 6px var(--hub);}
#hubMirror.show{opacity:1;}
#hubCenter.mirroring #hubLogo{opacity:0;}
#svgContainer.has-logo .hub-text{opacity:0;}
/* Background echo: giant readable mirror, desktop only */
#bgEcho{position:fixed;top:.4rem;left:1rem;font-family:var(--display);font-weight:bold;font-size:clamp(2.4rem,7vw,5.8rem);color:var(--hub-text);opacity:0;transition:opacity .2s;pointer-events:none;z-index:0;line-height:1;max-width:55vw;letter-spacing:.02em;}
#bgEcho.show{opacity:.13;}
@media(max-width:800px){#bgEcho{display:none;}}

/* deploy: selection lockdown */
body{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
input,textarea{user-select:text;-webkit-user-select:text;-moz-user-select:text;}
</style>

<style id="enhancements">
/* pill controls */
.pill-btn{font-family:inherit;font-size:.82rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.32rem .7rem;cursor:pointer;color:var(--text);}
.pill-btn.on{background:var(--badge-bg);color:var(--accent);border-color:var(--gold);font-weight:bold;}
.mode-toggle button{min-width:2.7rem;}
/* label glow toggle */
#wheelSvg.label-glow text{filter:drop-shadow(0 0 1.3px var(--gold)) drop-shadow(0 0 3px var(--gold));}
/* hub-mirror glow (center hover) handled inline */
#hubMirror.glow{filter:drop-shadow(0 0 4px currentColor) drop-shadow(0 0 9px currentColor);}
/* ── docked wheel modes (desktop) ── */
body[data-view="wheel"][data-mode="dock-left"] .layout,
body[data-view="wheel"][data-mode="dock-right"] .layout{display:block;max-width:none;padding:0;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:fixed;top:130px;bottom:54px;width:60vw;display:flex;align-items:center;overflow:hidden;pointer-events:none;z-index:15;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap{left:0;justify-content:flex-start;}
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{right:0;justify-content:flex-end;}
body[data-view="wheel"][data-mode="dock-left"] #svgContainer{transform:translateX(-40%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:translateX(40%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel{position:fixed;top:130px;right:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:10px 0 0 10px;}
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:fixed;top:130px;left:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:0 10px 10px 0;}
/* read-point chip */
#readPoint{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:.3rem .65rem;font-weight:bold;font-family:var(--display);letter-spacing:.05em;box-shadow:var(--shadow);cursor:pointer;pointer-events:auto;max-width:26vw;text-align:center;transform:translate(-50%,-50%);}
#readPoint::before{content:"\25c0";opacity:.5;margin-right:.3rem;}
body[data-view="wheel"][data-mode="dock-right"] #readPoint::before{content:"\25b6";}
body[data-view="wheel"][data-mode="dock-left"] #readPoint,
body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:block;}
/* detached move handle */
#wheelMove{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.22rem .6rem;font-size:.74rem;color:var(--muted);cursor:move;pointer-events:auto;user-select:none;}
body[data-view="wheel"][data-mode="detached"] .wheel-move{display:block;}
#wheelMove2{padding:.22rem .5rem;}
/* ── collapsible list ── */
.sub-toggle{display:flex;align-items:center;gap:.45rem;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.34rem .6rem;cursor:pointer;color:var(--text);font-family:inherit;font-size:.82rem;margin:.18rem 0;}
.sub-toggle:hover{border-color:var(--gold);}
.sub-caret{display:inline-block;transition:transform .15s;color:var(--accent);font-size:.7rem;}
.sub-group.expanded .sub-caret{transform:rotate(90deg);}
.sub-group .chip-row{display:none;margin:.35rem 0 .2rem;}
.sub-group.expanded .chip-row{display:flex;}
#listBody.searching .sub-group .chip-row{display:flex;}
#listBody.searching .sub-caret{transform:rotate(90deg);}
#listBody.cols{column-width:250px;column-gap:1rem;}
#listBody.cols .cat-block{break-inside:avoid;}
/* contact */
.contact-bar{max-width:1100px;margin:0 auto 1.4rem;padding:.7rem 1rem;text-align:center;font-size:.85rem;color:var(--muted);border-top:1px solid var(--line);}
.contact-bar a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--gold);margin:0 .55rem;white-space:nowrap;}
.contact-bar a:hover{color:var(--gold);}
.contact-bar .lead{display:block;margin-bottom:.35rem;color:var(--text);font-style:italic;}
.detail-panel .contact{margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--line);font-size:.8rem;}
.detail-panel .contact a{display:inline-block;margin:.1rem .5rem .1rem 0;color:var(--accent);border-bottom:1px dotted var(--gold);text-decoration:none;}
.noob-fact{font-size:.92rem;line-height:1.5;}
/* responsive: docked falls back to centered/stacked on narrow screens */
@media (max-width:820px){
  body[data-view="wheel"][data-mode="dock-left"] .layout,
  body[data-view="wheel"][data-mode="dock-right"] .layout{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2.5rem;}
  body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
  body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:static;width:auto;overflow:visible;pointer-events:auto;}
  body[data-view="wheel"][data-mode="dock-left"] #svgContainer,
  body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:none;}
  body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
  body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:static;width:100%;max-width:95vw;margin-top:1rem;max-height:none;}
  body[data-view="wheel"][data-mode="dock-left"] #readPoint,
  body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:none;}
}
</style>

<style id="rev2">
.detail-panel h2{font-size:1.62rem;}
.detail-panel .category-tag{font-size:.8rem;}
.section-title{font-size:.82rem !important;}
.body-text{font-size:1.06rem;line-height:1.62;}
.noob-fact{font-size:1.0rem;}
.funfact{font-size:1.04rem;line-height:1.55;background:var(--badge-bg);border:1px solid var(--gold);border-left-width:4px;border-radius:8px;padding:.6rem .8rem;margin:.2rem 0 .9rem;}
.funfact .ff-label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:bold;margin-bottom:.25rem;}
/* bgEcho hover text: lighter in dark, darker in light */
[data-theme="dark"] #bgEcho{color:#efe6d4;opacity:.16;}
[data-theme="light"] #bgEcho{color:#3a2f20;opacity:.13;}
#bgEcho.show{opacity:var(--echo-op,.15);}
[data-theme="dark"] #bgEcho.show{opacity:.17;}
[data-theme="light"] #bgEcho.show{opacity:.14;}
/* center: logo only, mirror text removed */
#hubMirror{display:none !important;}
#hubLogo{display:block;}
/* spin tally chip */
#spinTally{font-size:.72rem;color:var(--muted);margin-left:.1rem;white-space:nowrap;}
/* context-sensitive control visibility handled by JS adding body[data-view] scoping */
body[data-view="list"] #spinBtn,
body[data-view="list"] #glowBtn,
body[data-view="list"] .mode-toggle,
body[data-view="list"] #spinTally{display:none;}
body[data-view="wheel"] #listLayoutBtn{display:none;}
</style>

<style id="rev3">
/* contact links pinned bottom-middle at all times */
.contact-bar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:70;
  margin:0;border-top:none;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;
  background:var(--panel);box-shadow:0 -2px 10px rgba(0,0,0,.08);padding:.45rem 1.1rem;max-width:96vw;white-space:nowrap;overflow-x:auto;}
.contact-bar .lead{display:inline;margin:0 .6rem 0 0;font-style:italic;color:var(--muted);font-size:.82rem;}
.contact-bar a{margin:0 .5rem;}
/* keep docked wheel + panel clear of the pinned contact bar */
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{bottom:52px;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{max-height:calc(100vh - 196px);}
.layout{padding-bottom:64px;}
/* topbar: lighter controls, larger focus button */
.topbar button{color:var(--muted);opacity:.72;border-color:var(--line);transition:opacity .15s,color .15s;}
.topbar button:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
#fsBtn{font-size:1.35rem !important;padding:.28rem .6rem !important;line-height:1;}
</style>

<style id="rev4">
/* hide old h1/title space; logo carries the name */
#h1title{display:none !important;}
.byline{text-align:center;font-size:.74rem;color:var(--muted);padding:.2rem 1rem .4rem;margin-top:2px;}
/* clear fixed top cluster */
body{padding-top:60px;}
/* ===== unified fixed top-right control cluster ===== */
.topctl{position:fixed;top:0;right:0;z-index:200;display:flex;flex-wrap:wrap;justify-content:flex-end;align-items:center;
  gap:.4rem;padding:.5rem .7rem;background:linear-gradient(to left,var(--panel) 70%,transparent);max-width:100vw;}
.topctl button{font-family:inherit;font-size:.8rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:.3rem .6rem;cursor:pointer;color:var(--text);}
.topctl .view-toggle button{border:none;border-radius:0;}
.topctl #langBtn,.topctl #themeBtn{color:var(--muted);opacity:.72;}
.topctl #langBtn:hover,.topctl #themeBtn:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
.topctl-div{width:1px;height:22px;background:var(--line);margin:0 .15rem;}
.size-ctl{display:flex;align-items:center;gap:.25rem;}
#zoomSlider{width:120px;}
/* Wheel Format dropdown */
.wf-wrap{position:relative;}
#wfMenu{position:absolute;top:calc(100% + 4px);right:0;background:var(--panel);border:1px solid var(--gold);border-radius:8px;
  box-shadow:var(--shadow);display:none;flex-direction:column;min-width:150px;overflow:hidden;z-index:210;}
#wfMenu.open{display:flex;}
#wfMenu button{border:none;border-radius:0;text-align:left;padding:.55rem .8rem;background:var(--panel);}
#wfMenu button:hover,#wfMenu button.on{background:var(--badge-bg);color:var(--accent);}
#wheelFormat.on{border-color:var(--gold);color:var(--accent);}
/* focus button (injected) sizing already handled; ensure it lands in cluster */
.topctl #fsBtn{font-size:1.3rem !important;padding:.2rem .55rem !important;line-height:1;}
/* ===== spins counter — top-right background ===== */
#spinsBg{position:fixed;top:3.2rem;right:1rem;z-index:0;pointer-events:none;font-family:var(--display);font-weight:bold;
  font-size:clamp(1.6rem,4.4vw,3.4rem);line-height:1;text-align:right;letter-spacing:.02em;opacity:0;transition:opacity .25s;}
#spinsBg.show{opacity:1;}
[data-theme="dark"] #spinsBg{color:#efe6d4;opacity:.13;}
[data-theme="light"] #spinsBg{color:#3a2f20;opacity:.11;}
[data-theme="dark"] #spinsBg.show{opacity:.16;}
[data-theme="light"] #spinsBg.show{opacity:.13;}
#spinsBg .sc-num{font-size:1.5em;}
[data-theme="dark"] #spinsBg.flash{opacity:.3 !important;}
[data-theme="light"] #spinsBg.flash{opacity:.26 !important;}
#spinsBg.flash{transition:opacity .12s;}
#spinsBg .sc-lab{display:block;font-size:.4em;letter-spacing:.18em;text-transform:uppercase;opacity:.8;}
/* ===== read-point magnifier +50% ===== */
#readPoint{font-size:1.5rem;padding:.45rem 1rem;border-width:2px;max-width:34vw;}
#readPoint::before{font-size:.8em;}
/* show read-point in FREE mode too (default right side) */
body[data-view="wheel"][data-mode="detached"] #readPoint{display:block;}
/* ===== tasting-notes card: larger by default + resizable when floating ===== */
.detail-panel{max-width:440px;min-width:320px;}
.body-text{font-size:1.14rem;line-height:1.66;}
.detail-panel h2{font-size:1.78rem;}
.funfact{font-size:1.1rem;}
.detail-panel.floating{resize:both;overflow:auto;width:min(440px,94vw);min-width:300px;min-height:280px;max-height:90vh;}
.detail-panel.floating::after{content:"\21F2";position:absolute;right:4px;bottom:2px;color:var(--muted);font-size:.85rem;pointer-events:none;}

body[data-view="wheel"][data-mode="dock-right"] #detailPanel{top:118px;}
@media(max-width:820px){ body{padding-top:96px;} }

<style id="rev5">
/* bgEcho: wrap + length-based sizing so any message fits */
#bgEcho{white-space:normal;max-width:46vw;line-height:1.05;}
#bgEcho.len-s{font-size:clamp(2.2rem,6.5vw,5.4rem);}      /* <=12 chars: big */
#bgEcho.len-m{font-size:clamp(1.5rem,4.2vw,3.3rem);}      /* 13-24 */
#bgEcho.len-l{font-size:clamp(1.05rem,2.8vw,2.1rem);}     /* 25-40 */
#bgEcho.len-xl{font-size:clamp(.85rem,2.1vw,1.5rem);}     /* >40 */
/* spins counter: always visible + proportionate (never huge, never clipped) */
#spinsBg{font-size:clamp(1.3rem,3vw,2.4rem);max-width:30vw;overflow:visible;}
[data-theme="dark"] #spinsBg{opacity:.26;}
[data-theme="light"] #spinsBg{opacity:.22;}
[data-theme="dark"] #spinsBg.show{opacity:.28;}
[data-theme="light"] #spinsBg.show{opacity:.24;}
#spinsBg .sc-num{font-size:1.35em;}
#spinsBg .sc-line{display:block;}
#spinsBg .sc-lab{display:block;font-size:.34em;letter-spacing:.16em;text-transform:uppercase;opacity:.85;margin-top:.1em;}
/* doubled-size controls: Reset, Language, Theme, Focus */
.topctl #zoomReset,.topctl #langBtn,.topctl #themeBtn,.topctl #fsBtn{
  font-size:1.5rem !important;padding:.5rem .85rem !important;line-height:1;border-radius:8px;}
.topctl #fsBtn{font-size:1.7rem !important;}
/* wheel-format menu separator */
.wf-sep{height:1px;background:var(--line);margin:.25rem 0;}
#freeSideBtn{font-size:.82rem;color:var(--accent);}
</style>
</head>

mado"}, {"name": "Fresh", "color": "#72589c", "descriptors": [{"name": "Lavender", "slug": "lavender", "name_es": "Lavanda"}, {"name": "Meadowsweet", "slug": "meadowsweet"}], "name_es": "Fresco"}, {"name": "Aromatic", "color": "#674d93", "descriptors": [{"name": "Chamomile", "slug": "chamomile", "name_es": "Manzanilla"}, {"name": "Elderflower", "slug": "elderflower", "name_es": "Flor de Saúco"}], "name_es": "Aromático"}], "name_es": "FLORAL"}, {"name": "GRASSY", "color": "#7ca655", "textColor": "#122b00", "sub": [{"name": "Fragrant", "color": "#8fb66a", "descriptors": [{"name": "Marigold", "slug": "marigold"}, {"name": "Earl Grey", "slug": "earl-grey"}], "name_es": "Fragante"}, {"name": "Leafy", "color": "#7ca655", "descriptors": [{"name": "Lemongrass", "slug": "lemongrass"}, {"name": "Hibiscus", "slug": "hibiscus"}], "name_es": "Foliáceo"}], "name_es": "HERBÁCEO"}, {"name": "HERBAL", "color": "#4e9652", "textColor": "#002402", "sub": [{"name": "Herbaceous", "color": "#64a868", "descriptors": [{"name": "Caraway", "slug": "caraway"}, {"name": "Mint", "slug": "mint", "name_es": "Menta"}, {"name": "Parsley", "slug": "parsley"}], "name_es": "Herbáceo"}, {"name": "Vegetal", "color": "#559e59", "descriptors": [{"name": "Thyme", "slug": "thyme", "name_es": "Tomillo"}, {"name": "Rosemary", "slug": "rosemary", "name_es": "Romero"}], "name_es": "Vegetal"}, {"name": "Savoury", "color": "#4e9652", "descriptors": [{"name": "Sage", "slug": "sage", "name_es": "Salvia"}, {"name": "Bay Laurel", "slug": "bay-laurel"}, {"name": "Fennel", "slug": "fennel", "name_es": "Hinojo"}], "name_es": "Sabroso"}], "name_es": "HIERBAS"}, {"name": "PINEY", "color": "#2d633b", "textColor": "#ffffff", "sub": [{"name": "Medicinal", "color": "#40784f", "descriptors": [{"name": "Pine Needle", "slug": "pine-needle"}, {"name": "Juniper", "slug": "juniper", "name_es": "Enebro"}], "name_es": "Medicinal"}, {"name": "Resinous", "color": "#2d633b", "descriptors": [{"name": "Spruce Tip", "slug": "spruce-tip"}, {"name": "Frankincense", "slug": "frankincense"}], "name_es": "Resinoso"}], "name_es": "PINO"}, {"name": "SWEET", "color": "#9e7652", "textColor": "#ffffff", "sub": [{"name": "Creamy", "color": "#b08b68", "descriptors": [{"name": "Birch Sap", "slug": "birch-sap"}, {"name": "Liquorice Root", "slug": "liquorice-root"}], "name_es": "Cremoso"}, {"name": "Buttery", "color": "#9e7652", "descriptors": [{"name": "Honeysuckle", "slug": "honeysuckle"}, {"name": "Vanilla", "slug": "vanilla", "name_es": "Vainilla"}], "name_es": "Mantecoso"}], "name_es": "DULCE"}, {"name": "NUTTY", "color": "#594230", "textColor": "#ffffff", "sub": [{"name": "Rich", "color": "#6e5643", "descriptors": [{"name": "Almond", "slug": "almond", "name_es": "Almendra"}, {"name": "Hazelnut", "slug": "hazelnut", "name_es": "Avellana"}], "name_es": "Rico"}, {"name": "Woody", "color": "#614a38", "descriptors": [{"name": "Walnut", "slug": "walnut", "name_es": "Nuez"}, {"name": "Chestnut", "slug": "chestnut", "name_es": "Castaña"}], "name_es": "Amaderado"}, {"name": "Robust", "color": "#594230", "descriptors": [{"name": "Nutmeg", "slug": "nutmeg", "name_es": "Nuez Moscada"}], "name_es": "Robusto"}], "name_es": "FRUTOS SECOS"}, {"name": "ROOTY / SPICY", "color": "#a63f30", "textColor": "#ffffff", "sub": [{"name": "Dusty", "color": "#ad4b3b", "descriptors": [{"name": "Angelica", "slug": "angelica", "name_es": "Angélica"}, {"name": "Orris Root", "slug": "orris-root"}, {"name": "Cassia Bark", "slug": "cassia-bark"}], "name_es": "Polvoriento"}, {"name": "Warming", "color": "#b85242", "descriptors": [{"name": "Cinnamon", "slug": "cinnamon", "name_es": "Canela"}, {"name": "Clove", "slug": "clove", "name_es": "Clavo"}, {"name": "Cardamom", "slug": "cardamom", "name_es": "Cardamomo"}], "name_es": "Cálido"}, {"name": "Pungent", "color": "#c25c4c", "descriptors": [{"name": "Saffron", "slug": "saffron", "name_es": "Azafrán"}, {"name": "Cumin", "slug": "cumin", "name_es": "Comino"}, {"name": "Anise", "slug": "anise", "name_es": "Anís"}], "name_es": "Punzante"}, {"name": "Curried", "color": "#cc6758", "descriptors": [{"name": "Grains of Paradise", "slug": "grains-of-paradise"}, {"name": "Pepper", "slug": "pepper", "name_es": "Pimienta"}], "name_es": "Curry"}, {"name": "Earthy", "color": "#d67263", "descriptors": [{"name": "Cubeb Berry", "slug": "cubeb-berry"}], "name_es": "Terroso"}, {"name": "Fiery", "color": "#e07e6f", "descriptors": [{"name": "Ginger", "slug": "ginger", "name_es": "Jengibre"}], "name_es": "Ardiente"}, {"name": "Piquant", "color": "#eb8b7b", "descriptors": [{"name": "Coriander Seed", "slug": "coriander-seed"}], "name_es": "Picante"}], "name_es": "RAÍZ / ESPECIA"}]};
const DESCRIPTIONS = {"lemon": {"cat": "Citrus · Acidic", "origin": "Derived from fresh or dried lemon peel (Citrus limon). Limonene is the dominant volatile terpene — typically 60–70% of the essential oil. Vapor infusion retains bright, high-toned volatile top notes; prolonged maceration risks extracting heavier bitter lipids from the pith (the albedo layer). Premium distillers cold-press peel before inclusion.", "pairing": "The essential backbone for London Dry style profiles. Bright limonene bridges cleanly with juniper's alpha-pinene compounds, creating a cohesive citrus-pine aromatic arc.", "mixology": "Amplifies the architecture of a Tom Collins or Gin Sour. When selecting tonics, standard Indian quinine tonics (lower free citric acid) help avoid astringent citrus-on-citrus overlap. Expressed peel garnish over the drink reinforces the nose.", "cat_es": "Cítricos · Ácido", "origin_es": "Procede de la cáscara de limón fresca o seca (Citrus limon). El limoneno es el terpeno volátil dominante —típicamente entre el 60 y 70 % del aceite esencial—. La infusión por vapor conserva las notas altas y brillantes; la maceración prolongada arriesga extraer los lípidos amargos del albedo. Los destiladores premium prensan la cáscara en frío antes de incorporarla.", "pairing_es": "La columna vertebral esencial del estilo London Dry. El limoneno brillante enlaza limpiamente con los compuestos de alfa-pineno del enebro, creando un arco aromático cítrico-pino cohesivo.", "mixology_es": "Amplifica la arquitectura de un Tom Collins o un Gin Sour. Al elegir tónicas, las tónicas de quinina estándar (menor acidez cítrica libre) evitan el solapamiento astringente de cítrico sobre cítrico. La cáscara exprimida sobre la copa refuerza la nariz."}, "lime": {"cat": "Citrus · Acidic", "origin": "Sourced via dried lime peel or whole dehydrated Persian lime (Citrus latifolia) or Key lime (Citrus aurantiifolia). Contains higher ratios of alpha-pinene and beta-pinene alongside limonene vs. lemon, lending a sharper, more piercing, slightly tropical citrus tone. The difference is pronounced in vapor infusion.", "pairing": "Frequently used in Contemporary and New Western style gins to accentuate crisp, exotic flavor lines. Complements cucumber, mint, and fresh ginger naturally.", "mixology": "Foundational to a Gimlet or a Gin & Tonic on ice. High natural acid cuts through resinous, high-proof navy strength gins as an effective counterweight.", "cat_es": "Cítricos · Ácido", "origin_es": "Se obtiene de cáscara de lima seca o de lima persa deshidratada entera (Citrus latifolia) o lima criolla (Citrus aurantiifolia). Contiene mayores proporciones de alfa-pineno y beta-pineno junto al limoneno frente al limón, aportando un tono cítrico más afilado, penetrante y ligeramente tropical. La diferencia se acentúa en la infusión por vapor.", "pairing_es": "Muy usada en ginebras de estilo Contemporáneo y New Western para acentuar líneas de sabor nítidas y exóticas. Complementa de forma natural el pepino, la menta y el jengibre fresco.", "mixology_es": "Fundamental en un Gimlet o un Gin Tonic con hielo. Su alta acidez natural corta las ginebras resinosas de alta graduación (navy strength) como contrapeso eficaz."}, "grapefruit": {"cat": "Citrus · Zesty", "origin": "Utilizes pink or white grapefruit peel (Citrus × paradisi). Two compounds matter: nootkatone (a sesquiterpene ketone) drives the bitterness, while the trace thiol 1-p-menthene-8-thiol drives the characteristic fresh-grapefruit aroma at sub-threshold levels. Also contains limonene, myrcene, and the sulfur compound 1-p-menthene-8-thiol at sub-threshold levels.", "pairing": "Bridges the gap between sharp citrus and deep root spices such as angelica and orris, due to its bitter and mildly sulfurous undertones. Excellent foil for cardamom.", "mixology": "Outstanding in a Negroni or Paloma variation. Provides structural complexity and a bitter lift to lower-ABV aperitivo builds. Grapefruit tonic is a natural pairing for gin-forward pours.", "cat_es": "Cítricos · Cáscara", "origin_es": "Emplea cáscara de toronja rosa o blanca (Citrus × paradisi). Dos compuestos importan: la nootkatona (una cetona sesquiterpénica) impulsa el amargor, mientras que el tiol traza 1-p-menteno-8-tiol impulsa el aroma característico a toronja fresca a niveles subumbral. También contiene limoneno y mirceno.", "pairing_es": "Tiende un puente entre el cítrico afilado y las raíces profundas como la angélica y el lirio, por sus matices amargos y ligeramente sulfurosos. Excelente contrapunto al cardamomo.", "mixology_es": "Sobresaliente en un Negroni o una variación de Paloma. Aporta complejidad estructural y un realce amargo a los combinados aperitivos de baja graduación. La tónica de toronja marida de forma natural."}, "orange": {"cat": "Citrus · Zesty", "origin": "Sweet orange (Citrus sinensis) yields warm, fleshy citrus notes; Seville bitter orange (Citrus aurantium) provides a sharper, more aromatic character valued in traditional London Dry recipes. Vapor infusion isolates ethereal top-note aromatics; maceration gives richer, oilier mid-palate depth.", "pairing": "Crucial for softening aggressive spice botanicals — ginger, clove, cassia. Warm orange oil creates a bridging effect with both sweet (vanilla, liquorice) and resinous (juniper, pine) profiles.", "mixology": "A primary aromatic driver in a Martinez or Hanky Panky. Magnificent with sweet vermouth. Expressed twist over the finished drink is always preferable to a slice for releasing volatile oils.", "cat_es": "Cítricos · Cáscara", "origin_es": "La naranja dulce (Citrus sinensis) da notas cítricas cálidas y carnosas; la naranja amarga de Sevilla (Citrus aurantium) aporta un carácter más afilado y aromático, valorado en las recetas tradicionales London Dry. La infusión por vapor aísla los aromas etéreos de cabeza; la maceración da profundidad más rica y aceitosa en boca.", "pairing_es": "Crucial para suavizar especias agresivas —jengibre, clavo, casia—. El aceite cálido de naranja crea un efecto puente tanto con perfiles dulces (vainilla, regaliz) como resinosos (enebro, pino).", "mixology_es": "Un motor aromático primario en un Martinez o un Hanky Panky. Magnífica con vermut dulce. La piel exprimida sobre la copa terminada siempre es preferible a la rodaja para liberar los aceites volátiles."}, "mango": {"cat": "Fleshy Fruit · Mellow", "origin": "Extracted via fresh fruit maceration or vacuum (cold) distillation to protect heat-sensitive esters. Rich in myrcene — a monoterpene terpene that acts as an effective aromatic fixative for lighter botanicals — alongside delta-3-carene and various fruity esters (ethyl butanoate, ethyl hexanoate).", "pairing": "Natural partner for spice-forward gins containing cubeb berry, grains of paradise, or fresh ginger. The tropical ester profile harmonizes with cardamom's citrus-spice arc.", "mixology": "Adds luscious tropical texture to contemporary punch builds, Clover Club variations, or modern highballs. A mango-forward gin pairs exceptionally well with a dry ginger beer long drink.", "cat_es": "Fruta Carnosa · Suave", "origin_es": "Se extrae por maceración de fruta fresca o destilación al vacío (en frío) para proteger los ésteres sensibles al calor. Rico en mirceno —un monoterpeno que actúa como fijador aromático eficaz para botánicos más ligeros— junto a delta-3-careno y diversos ésteres frutales (butanoato de etilo, hexanoato de etilo).", "pairing_es": "Pareja natural de ginebras con especias como pimienta de cubeba, granos del paraíso o jengibre fresco. El perfil de ésteres tropicales armoniza con el arco cítrico-especiado del cardamomo.", "mixology_es": "Añade una textura tropical lujosa a ponches contemporáneos, variaciones de Clover Club o highballs modernos. Una ginebra con mango marida excepcionalmente bien con un long drink de ginger beer seca."}, "apricot": {"cat": "Fleshy Fruit · Mellow", "origin": "Fresh or dried stone fruit (Prunus armeniaca) infusion. Driven by benzaldehyde (almond-like stone character from the kernel) and gamma-decalactone — a prominent peach/apricot lactone — giving an intense velvety fruit sweetness. Drying concentrates flavors without requiring proof adjustment.", "pairing": "Bridges floral profiles (elderflower, jasmine, rose) with soft woody notes beautifully. The stone-fruit lactones share chemical territory with vanillin, aiding cohesion with vanilla or barrel-aged expressions.", "mixology": "Excellent for balancing dry, tannic modifiers — dry vermouth, Lillet Blanc, or bitter amaro. A Corpse Reviver variation benefits from apricot-forward gin.", "cat_es": "Fruta Carnosa · Suave", "origin_es": "Infusión de fruta de hueso fresca o seca (Prunus armeniaca). Impulsada por el benzaldehído (carácter almendrado del hueso) y la gamma-decalactona —una lactona prominente de durazno/albaricoque— que da una dulzura frutal aterciopelada e intensa. El secado concentra los sabores sin requerir ajuste de graduación.", "pairing_es": "Tiende un puente precioso entre perfiles florales (saúco, jazmín, rosa) y notas amaderadas suaves. Las lactonas de fruta de hueso comparten territorio químico con la vainillina, ayudando a la cohesión con la vainilla o las expresiones criadas en barrica.", "mixology_es": "Excelente para equilibrar modificadores secos y tánicos —vermut seco, Lillet Blanc o amaro amargo—. Una variación de Corpse Reviver se beneficia de una ginebra con albaricoque."}, "peach": {"cat": "Fleshy Fruit · Mellow", "origin": "Infused via fresh flesh maceration (Prunus persica). Dominated by gamma-undecalactone and delta-decalactone — the classical stone fruit lactones — providing a soft, summer-forward sweetness. These lactones can soften the aggressive dry bite of high-alpha-pinene juniper expressions.", "pairing": "Pairs seamlessly with soft herbal gins — mint, parsley, lemongrass. Also works with elderflower and chamomile profiles.", "mixology": "A natural choice for elegant spritzes, refined summer Collins builds, or a Bellini-adjacent cocktail. Peach-forward gin in a Sour with egg white creates an exceptionally silky texture.", "cat_es": "Fruta Carnosa · Suave", "origin_es": "Se infusiona por maceración de pulpa fresca (Prunus persica). Dominada por gamma-undecalactona y delta-decalactona —las lactonas clásicas de fruta de hueso— que aportan una dulzura suave y veraniega. Estas lactonas suavizan el mordiente seco y agresivo de las expresiones de enebro con alto alfa-pineno.", "pairing_es": "Combina a la perfección con ginebras herbales suaves —menta, perejil, hierba limón—. También funciona con perfiles de saúco y manzanilla.", "mixology_es": "Una elección natural para spritzes elegantes, Collins veraniegos refinados o un cóctel cercano al Bellini. Una ginebra con durazno en un Sour con clara de huevo crea una textura excepcionalmente sedosa."}, "melon": {"cat": "Fleshy Fruit · Mellow", "origin": "Vacuum or cold-distilled melon flesh. Highly unstable under heat — relies on sub-atmospheric distillation to capture volatile aldehydes such as cis-6-nonenal and (Z)-3-nonen-1-ol, which provide crisp, watery, green-flesh sweetness. Found in Japanese-influenced contemporary gins.", "pairing": "Creates elegant presentation alongside fresh fruit or grassy gin profiles. The watery green character amplifies cucumber and lemongrass notes.", "mixology": "Outstanding in an exceptionally dry, chilled Martini. A Japanese highball format (gin, soda, ice, minimal garnish) is the ideal service for melon-dominant expressions.", "cat_es": "Fruta Carnosa · Suave", "origin_es": "Pulpa de melón destilada al vacío o en frío. Muy inestable al calor —depende de la destilación subatmosférica para capturar aldehídos volátiles como el cis-6-nonenal y el (Z)-3-nonen-1-ol, que aportan una dulzura nítida, acuosa y de pulpa verde—. Presente en ginebras contemporáneas de influencia japonesa.", "pairing_es": "Crea una presentación elegante junto a perfiles de fruta fresca o herbáceos. El carácter verde y acuoso amplifica las notas de pepino y hierba limón.", "mixology_es": "Sobresaliente en un Martini excepcionalmente seco y frío. El formato highball japonés (ginebra, soda, hielo, guarnición mínima) es el servicio ideal para expresiones dominadas por el melón."}, "cucumber": {"cat": "Fresh Fruit · Juicy", "origin": "Captured via post-distillation cold-maceration or gentle vacuum distillation. Driven by (E,Z)-2,6-nonadienal — the characteristic cucumber aldehyde — and (E)-2-nonenal, providing a uniquely cooling, refreshing, crisp character. Botanically a fruit (Cucumis sativus); the 'fresh fruit' classification here is flavor-profile based.", "pairing": "The signature aromatic of New Western and Contemporary gins. Pairs naturally with rose, mint, elderflower, and soft citrus. Extremely popular in the UK gin revival of the 2010s.", "mixology": "The gold standard in a premium afternoon Gin & Tonic garnished with fresh cucumber ribbons or thin slices. Fever-Tree or Fentimans Elderflower tonics amplify the freshness. A staple of hotel bar service.", "cat_es": "Fruta Fresca · Jugoso", "origin_es": "Se captura por maceración en frío posdestilación o destilación suave al vacío. Impulsada por el (E,Z)-2,6-nonadienal —el aldehído característico del pepino— y el (E)-2-nonenal, que aportan un carácter singularmente refrescante, frío y nítido. Botánicamente una fruta (Cucumis sativus); la clasificación de 'fruta fresca' aquí es por perfil de sabor.", "pairing_es": "El aroma distintivo de las ginebras New Western y Contemporáneas. Marida de forma natural con rosa, menta, saúco y cítrico suave. Muy popular en el renacimiento de la ginebra en el Reino Unido durante la década de 2010.", "mixology_es": "El estándar de oro en un Gin Tonic premium de tarde, guarnecido con cintas o láminas finas de pepino fresco. Las tónicas de saúco (Fever-Tree o Fentimans) amplifican la frescura. Un pilar del servicio de bar de hotel."}, "apple": {"cat": "Fresh Fruit · Juicy", "origin": "Fresh apple pomace or reduced cider added to the pot still base. Rich in hexyl acetate and 2-methylbutyl acetate (crisp, orchard ester notes) alongside malic acid, yielding an elegant fresh-apple profile. The acidity contribution is real but subtle after distillation.", "pairing": "Pairs with sweet baking spices — cinnamon, clove, nutmeg — invoking a comforting autumn depth. Also works with dry vermouth's natural apple/pear character.", "mixology": "Adds fruit depth to a Gin Sour or White Negroni. Works in highball formats with pressed apple juice and a light aromatic bitters float. Superb in hot toddies during cold-weather service.", "cat_es": "Fruta Fresca · Jugoso", "origin_es": "Orujo de manzana fresca o sidra reducida añadida a la base del alambique. Rica en acetato de hexilo y acetato de 2-metilbutilo (notas de éster frescas de huerto) junto al ácido málico, dando un perfil elegante de manzana fresca. El aporte de acidez es real pero sutil tras la destilación.", "pairing_es": "Marida con especias dulces de repostería —canela, clavo, nuez moscada— evocando una profundidad otoñal reconfortante. También funciona con el carácter natural de manzana/pera del vermut seco.", "mixology_es": "Añade profundidad frutal a un Gin Sour o un White Negroni. Funciona en formatos highball con zumo de manzana prensado y un toque de bíter aromático. Magnífica en ponches calientes durante el servicio de invierno."}, "grape": {"cat": "Fresh Fruit · Juicy", "origin": "Achieved by using neutral grape spirit (Vitis vinifera) as the base — common in French and Mediterranean gins — or by distilling fresh grape must directly. Features ethyl caproate (wine-like ester) and linalool, contributing a refined, vinous elegance distinct from grain-neutral spirit bases.", "pairing": "Creates a rounder, silkier mouthfeel that rounds off sharp London Dry botanicals. The vinous base aligns naturally with vermouth and wine-based modifiers.", "mixology": "A natural pairing for a classic French 75 or spirit-forward Martini with expressed lemon twist. Grape-base gins also respond well to champagne toppers in long serves.", "cat_es": "Fruta Fresca · Jugoso", "origin_es": "Se logra usando alcohol neutro de uva (Vitis vinifera) como base —común en ginebras francesas y mediterráneas— o destilando mosto de uva fresco directamente. Presenta caproato de etilo (éster vinoso) y linalool, aportando una elegancia vinosa y refinada distinta de las bases de alcohol neutro de grano.", "pairing_es": "Crea una textura en boca más redonda y sedosa que suaviza los botánicos afilados del London Dry. La base vinosa se alinea de forma natural con el vermut y los modificadores a base de vino.", "mixology_es": "Pareja natural de un French 75 clásico o un Martini potente con piel de limón exprimida. Las ginebras de base de uva también responden bien a los toppers de champán en tragos largos."}, "gooseberry": {"cat": "Red Fruits · Delicate", "origin": "Fresh gooseberry (Ribes uva-crispa) maceration. Contains methoxypyrazines — specifically isobutyl methoxypyrazine — which impart a Sauvignon Blanc-like aromatic character: grassy, green, slightly vegetal alongside the bright tartness. One of the more aromatic-crossover fruits in gin botanicals.", "pairing": "Combines naturally with elderflower, lemongrass, and sharp citrus. The methoxypyrazine link makes it particularly compatible with white-wine-based cocktail structures.", "mixology": "Brings crisp, vinous quality to a highball. Works wonderfully as a partial substitute for dry white wine in long cocktail builds. A Gooseberry Collins is a Michelin-level accessible serve.", "cat_es": "Frutos Rojos · Delicado", "origin_es": "Maceración de grosella espinosa fresca (Ribes uva-crispa). Contiene metoxipirazinas —en concreto la isobutil-metoxipirazina— que imparten un carácter aromático tipo Sauvignon Blanc: herbáceo, verde y ligeramente vegetal junto a la acidez brillante. Una de las frutas de mayor cruce aromático entre los botánicos de ginebra.", "pairing_es": "Se combina de forma natural con saúco, hierba limón y cítrico afilado. El vínculo de la metoxipirazina la hace especialmente compatible con estructuras de cóctel a base de vino blanco.", "mixology_es": "Aporta una cualidad nítida y vinosa a un highball. Funciona de maravilla como sustituto parcial del vino blanco seco en tragos largos. Un Gooseberry Collins es un servicio accesible de nivel Michelin."}, "redcurrant": {"cat": "Red Fruits · Delicate", "origin": "Maceration of whole fresh redcurrant berries (Ribes rubrum). Delivers a delicate, tart red berry acidity with a brilliant translucent color. High in organic acids (citric, malic) and anthocyanins, which color the spirit but largely do not survive distillation — requiring post-distillation maceration for color.", "pairing": "Complements bright citrus notes and provides a tartness that grounds dry, root-spiced botanical configurations. Pairs with rose and violet floral profiles.", "mixology": "Ideal for bright summer punches, Bramble adaptations, or adding crisp red-fruit lines to a dry spritz. Garnish with a small cluster of fresh redcurrants for visual impact.", "cat_es": "Frutos Rojos · Delicado", "origin_es": "Maceración de bayas enteras de grosella roja fresca (Ribes rubrum). Aporta una acidez delicada y ácida de fruto rojo con un color translúcido brillante. Alta en ácidos orgánicos (cítrico, málico) y antocianinas, que tiñen el destilado pero en su mayoría no sobreviven a la destilación —requiriendo maceración posdestilación para el color—.", "pairing_es": "Complementa las notas cítricas brillantes y aporta una acidez que ancla las configuraciones secas y especiadas de raíz. Marida con perfiles florales de rosa y violeta.", "mixology_es": "Ideal para ponches veraniegos brillantes, adaptaciones de Bramble o para añadir líneas nítidas de fruto rojo a un spritz seco. Guarnecer con un pequeño racimo de grosellas frescas para impacto visual."}, "sloe": {"cat": "Red Fruits · Bright", "origin": "The foundation of Sloe Gin, classed as a liqueur under EU Regulation 2019/787 rather than as a gin, though it is made by steeping fruit in gin. Blackthorn drupes (Prunus spinosa) are steeped in gin with sugar for a minimum of 3 months — traditionally after the first frost to soften the skin. Rich in anthocyanins, organic acids, and a benzaldehyde note from the pit.", "pairing": "The inherent stone-fruit bitterness and almond-like pit notes create natural harmony with dark spice and walnut profiles. Pairs with cherry and port-adjacent modifiers.", "mixology": "Star of the Sloe Gin Fizz. Can substitute as a sweet modifier or amaro analogue in complex builds. Excellent in winter aperitivo formats. The deep ruby color is a powerful visual tool.", "cat_es": "Frutos Rojos · Vivo", "origin_es": "La base del Sloe Gin, clasificado como licor bajo el Reglamento UE 2019/787 en lugar de como ginebra, aunque se elabora macerando fruta en ginebra. Las drupas de endrino (Prunus spinosa) se maceran en ginebra con azúcar durante un mínimo de 3 meses —tradicionalmente tras la primera helada para ablandar la piel—. Rica en antocianinas, ácidos orgánicos y una nota de benzaldehído del hueso.", "pairing_es": "El amargor inherente de fruta de hueso y las notas almendradas del hueso crean armonía natural con perfiles de especia oscura y nuez. Marida con cereza y modificadores cercanos al oporto.", "mixology_es": "Estrella del Sloe Gin Fizz. Puede sustituir a un modificador dulce o hacer de análogo de amaro en construcciones complejas. Excelente en formatos aperitivos de invierno. Su profundo color rubí es una poderosa herramienta visual."}, "cherry": {"cat": "Red Fruits · Bright", "origin": "Infused using sweet (Prunus avium) or sour/Morello (Prunus cerasus) cherry skins and flesh. Benzaldehyde — from the pits — is the dominant aromatic, introducing marzipan-like dark stone-fruit character. Morello cherries add pronounced tartness; sweet varieties deliver richer, jammy depth.", "pairing": "Aligns with dark baking spices, cacao, walnut, and robust oak-aged modifiers. Cherry benzaldehyde shares aromatic territory with almond, creating a cohesive dessert-adjacent profile.", "mixology": "A natural choice for a Martinez variation, complex winter Flips, or adding rich berry depth to spirit-forward cocktails. Morello-forward gins work beautifully in Negroni builds.", "cat_es": "Frutos Rojos · Vivo", "origin_es": "Se infusiona con piel y pulpa de cereza dulce (Prunus avium) o ácida/Morello (Prunus cerasus). El benzaldehído —de los huesos— es el aroma dominante, introduciendo un carácter de fruta de hueso oscura tipo mazapán. Las cerezas Morello añaden acidez pronunciada; las variedades dulces aportan profundidad más rica y mermelada.", "pairing_es": "Se alinea con especias oscuras de repostería, cacao, nuez y modificadores robustos criados en roble. El benzaldehído de la cereza comparte territorio aromático con la almendra, creando un perfil cohesivo cercano al postre.", "mixology_es": "Una elección natural para una variación de Martinez, Flips complejos de invierno o para añadir profundidad rica de baya a cócteles potentes. Las ginebras con predominio de Morello funcionan de maravilla en construcciones de Negroni."}, "rose": {"cat": "Floral · Perfumed", "origin": "Fresh rose petals (Rosa damascena or Rosa centifolia) via steam or vapor infusion — direct maceration risks extracting bitter green tannins from the base of petals. Primary active compounds are geraniol, nerol, and 2-phenylethanol (phenylethyl alcohol). Produces an intensely perfumed, Turkish-delight floral sweetness.", "pairing": "Core component in premium contemporary gins. Aligns with cucumber, elderflower, lychee, and soft tea profiles. The 2-phenylethanol provides a natural bridge to grape-spirit bases.", "mixology": "Elevates delicate Martinis, the classic Aviation, and floral-forward highball serves. Pair with light floral tonics (Fever-Tree Aromatic or similar) — heavy quinine tonics will mask the rose top notes.", "cat_es": "Floral · Perfumado", "origin_es": "Pétalos de rosa frescos (Rosa damascena o Rosa centifolia) por infusión de vapor —la maceración directa arriesga extraer taninos verdes amargos de la base del pétalo—. Los compuestos activos principales son geraniol, nerol y 2-feniletanol. Produce una dulzura floral intensamente perfumada, tipo delicia turca.", "pairing_es": "Componente central de las ginebras contemporáneas premium. Se alinea con pepino, saúco, lichi y perfiles suaves de té. El 2-feniletanol tiende un puente natural a las bases de alcohol de uva.", "mixology_es": "Eleva Martinis delicados, el clásico Aviation y highballs florales. Maridar con tónicas florales ligeras (Fever-Tree Aromatic o similar) —las tónicas pesadas de quinina enmascaran las notas altas de la rosa—."}, "violet": {"cat": "Floral · Perfumed", "origin": "Derived from violet flowers (Viola odorata) or violet leaves. Rich in ionone compounds — alpha-ionone and beta-ionone — providing an elusive, powdery floral character. Ionones are also present in raspberries and aged wines, explaining violet's fruity-floral crossover. Easily over-extracted; precision is critical.", "pairing": "Historically linked to traditional European botanical profiles. Bridges the gap between floral and red-fruit categories. Common in classic Martinez-era gins.", "mixology": "The ideal base for an authentic Aviation cocktail. Eliminates reliance on synthetic crème de violette for bars aiming at botanical integrity. A violet-forward gin Martini with a light lemon twist is elegant and distinctive.", "cat_es": "Floral · Perfumado", "origin_es": "Procede de flores de violeta (Viola odorata) u hojas de violeta. Rica en iononas —alfa-ionona y beta-ionona— que aportan un carácter floral pulverulento y esquivo. Las iononas también están presentes en frambuesas y vinos envejecidos, lo que explica el cruce frutal-floral de la violeta. Se sobreextrae con facilidad; la precisión es crítica.", "pairing_es": "Históricamente ligada a los perfiles botánicos europeos tradicionales. Tiende un puente entre las categorías floral y de fruto rojo. Común en las ginebras clásicas de la era Martinez.", "mixology_es": "La base ideal para un Aviation auténtico. Elimina la dependencia de la crème de violette sintética para barras que buscan integridad botánica. Un Martini de ginebra con violeta y un toque ligero de limón es elegante y distintivo."}, "lavender": {"cat": "Floral · Fresh", "origin": "Dried lavender buds (Lavandula angustifolia — true lavender, not Lavandin, which has a harsher camphor note). Primary active compounds: linalool (floral, relaxing) and linalyl acetate (light, bergamot-citrus). Provides intensely floral-herbaceous aroma with a subtle pine-camphorous finish. Requires careful dosing — lavender dominates at only slightly elevated concentrations.", "pairing": "Integrates best with bright lemon citrus and sweet honey profiles. Used sparingly, it can make juniper-forward gins feel softer and more approachable.", "mixology": "Adds aromatic dimension to Gin Sours, honey-sweetened Bee's Knees, or lavender syrup fizzes. A house-made lavender simple syrup as a modifier allows control over intensity. Always garnish: a single dried sprig on the rim is classic.", "cat_es": "Floral · Fresco", "origin_es": "Capullos de lavanda secos (Lavandula angustifolia —lavanda verdadera, no lavandín, que tiene una nota de alcanfor más áspera—). Compuestos activos principales: linalool (floral) y acetato de linalilo (ligero, cítrico-bergamota). Aporta un aroma intensamente floral-herbáceo con un final sutil a pino-alcanfor. Requiere dosificación cuidadosa —la lavanda domina con concentraciones solo ligeramente elevadas—.", "pairing_es": "Se integra mejor con cítrico de limón brillante y perfiles dulces de miel. Usada con moderación, hace que las ginebras con predominio de enebro se perciban más suaves y accesibles.", "mixology_es": "Añade dimensión aromática a Gin Sours, a un Bee's Knees endulzado con miel o a fizzes de jarabe de lavanda. Un jarabe casero de lavanda como modificador permite controlar la intensidad. Guarnecer siempre: una ramita seca en el borde es clásico."}, "meadowsweet": {"cat": "Floral · Fresh", "origin": "Wild meadowsweet flowers (Filipendula ulmaria). Contains methyl salicylate (wintergreen character), spiraeosides, and quercetin. Notably, meadowsweet (old genus name Spiraea) gave aspirin its name and was a historical source of salicylates related to it. Provides a sweet floral aroma with faint warm undertones of wintergreen, soft vanilla, and a distinctive dried-hay quality.", "pairing": "Excellent for establishing a wild, rustic meadow terroir in contemporary artisanal gins. Synergistic with chamomile, elderflower, and dry vermouth.", "mixology": "Pairs with dry, herbal vermouths inside an ultra-clean Martini garnished with a fresh herb sprig. A Meadowsweet Highball with pressed apple and soda showcases the meadow-terroir character well.", "cat_es": "Floral · Fresco", "origin_es": "Flores silvestres de reina de los prados (Filipendula ulmaria). Contiene salicilato de metilo (carácter de gaulteria), espireósidos y quercetina. Notablemente, la reina de los prados (antiguo nombre de género Spiraea) dio su nombre a la aspirina y fue fuente histórica de salicilatos emparentados con ella. Aporta un aroma floral dulce con matices cálidos de gaulteria, vainilla suave y heno seco.", "pairing_es": "Excelente para establecer un terroir de pradera silvestre y rústica en ginebras artesanales contemporáneas. Sinérgica con manzanilla, saúco y vermut seco.", "mixology_es": "Marida con vermuts secos y herbales dentro de un Martini ultralimpio guarnecido con una ramita de hierba fresca. Un highball de reina de los prados con manzana prensada y soda muestra bien el carácter de terroir de pradera."}, "chamomile": {"cat": "Floral · Aromatic", "origin": "Dried chamomile flowers — German (Matricaria chamomilla) is most common for distillation. Rich in bisabolol (soothing, gentle floral), chamazulene (anti-inflammatory compound that contributes blue color to steam distillate), and apigenin. Provides a soothing, gentle, apple-honey floral aroma with a remarkably smooth mouthfeel perception.", "pairing": "Acts as a textural and aromatic softening agent for aggressive juniper or sharp citrus-forward gins. The apple-like secondary note resonates with orchard fruit profiles.", "mixology": "Excellent in honey-based cocktails, a warm hot toddy, or an afternoon tea highball at low ABV with chamomile-infused simple syrup and tonic. Roman chamomile (Chamaemelum nobile) is sometimes substituted and carries a more apple-like top note.", "cat_es": "Floral · Aromático", "origin_es": "Flores de manzanilla secas —la alemana (Matricaria chamomilla) es la más común para destilar—. Rica en bisabolol (floral suave), camazuleno (compuesto que aporta color azul al destilado de vapor) y apigenina. Aporta un aroma floral suave y reconfortante de manzana y miel, con una percepción de textura notablemente sedosa.", "pairing_es": "Actúa como agente suavizante textural y aromático para ginebras de enebro agresivo o muy cítricas. La nota secundaria tipo manzana resuena con perfiles de fruta de huerto.", "mixology_es": "Excelente en cócteles a base de miel, un hot toddy cálido o un highball de té de tarde a baja graduación con jarabe de manzanilla y tónica. La manzanilla romana (Chamaemelum nobile) a veces se sustituye y aporta una nota alta más amanzanada."}, "elderflower": {"cat": "Floral · Aromatic", "origin": "Fresh elderflower blossoms (Sambucus nigra). Complex aromatic profile driven by linalool, hotrienol (a monoterpene giving tropical/floral lift), alpha-terpineol, and various monoterpene oxides. The heady, tropical-tinged floral note with hints of white grape and lychee is extremely volatile — fresh flowers must be distilled immediately or cold-macerated rapidly.", "pairing": "Harmonizes naturally with Sauvignon Blanc-style finishes, gooseberry, and pear modifiers. One of the most popular contemporary gin botanicals in the UK since 2010.", "mixology": "The definitive modifier for a French 75, floral spritzes, or upgrading a standard G&T. Elderflower tonic (Fever-Tree or Fentimans) creates a self-reinforcing floral experience. Used as a cordial modifier (St-Germain or house-made) in Martini and Spritz formats.", "cat_es": "Floral · Aromático", "origin_es": "Flores frescas de saúco (Sambucus nigra). Perfil aromático complejo impulsado por linalool, hotrienol (un monoterpeno que da realce tropical/floral), alfa-terpineol y diversos óxidos de monoterpeno. La nota floral con tinte tropical y matices de uva blanca y lichi es extremadamente volátil —las flores frescas deben destilarse de inmediato o macerarse en frío con rapidez—.", "pairing_es": "Armoniza de forma natural con finales tipo Sauvignon Blanc, grosella espinosa y modificadores de pera. Uno de los botánicos contemporáneos más populares en el Reino Unido desde 2010.", "mixology_es": "El modificador definitivo de un French 75, spritzes florales o la mejora de un Gin Tonic estándar. La tónica de saúco (Fever-Tree o Fentimans) crea una experiencia floral que se refuerza a sí misma. Usado como cordial modificador (St-Germain o casero) en formatos Martini y Spritz."}, "marigold": {"cat": "Grassy · Fragrant", "origin": "Dried petals from Tagetes minuta (Mexican/South American marigold, anise-like, citrus-herbal) or Calendula officinalis (pot marigold, more musky-hay, warm). These are botanically distinct plants with different aromatic profiles — Tagetes is more citrus-sharp; Calendula is more grassy and earthy. Gin producers typically specify Calendula. Contains sesquiterpenes, carotenoids, and flavonoids.", "pairing": "Adds rustic, artisanal, farm-fresh earthiness to warm, spice-driven gins. The Calendula profile resonates with chamomile and dry herbal notes.", "mixology": "A savory-floral element in dry Martinis or herbal aperitivo drinks. Best served simply — a G&T with a marigold petal garnish in a Copa glass is visually striking and aromatically honest.", "cat_es": "Herbáceo · Fragante", "origin_es": "Pétalos secos de Tagetes minuta (caléndula mexicana/sudamericana, anisada, cítrico-herbal) o Calendula officinalis (caléndula, más almizclada-heno, cálida). Son plantas botánicamente distintas con perfiles aromáticos diferentes —Tagetes es más cítrico-afilada; Calendula es más herbácea y terrosa—. Los productores suelen especificar Calendula. Contiene sesquiterpenos, carotenoides y flavonoides.", "pairing_es": "Añade una terrosidad rústica, artesanal y de granja a ginebras cálidas y especiadas. El perfil de Calendula resuena con la manzanilla y las notas herbales secas.", "mixology_es": "Un elemento salado-floral en Martinis secos o aperitivos herbales. Mejor servido con sencillez —un Gin Tonic con un pétalo de caléndula en copa balón es visualmente llamativo y aromáticamente honesto—."}, "earl-grey": {"cat": "Grassy · Fragrant", "origin": "Black tea leaves (typically Assam or Ceylon) scented with bergamot oil from Citrus bergamia — a citrus fruit grown primarily in Calabria, Italy. Combines deep, drying tea tannins with the volatile, high-toned citrus-floral shine of bergamot linalool and limonene. The tannic structure from tea polyphenols does not survive distillation directly — the aromatic compounds do.", "pairing": "Provides a dry, intellectual baseline for citrus and heavy spice profiles. The bergamot note shares linalool with lavender and coriander seed, creating internal harmony.", "mixology": "The backbone of a Chelsea Sidecar or cold-brew tea punch formats. Natural tea tannins in macerated gin (vs. distilled) yield a bone-dry finish that cuts through sweet liqueurs. Tea-washed gin is a related technique used in upscale bar programs.", "cat_es": "Herbáceo · Fragante", "origin_es": "Hojas de té negro (típicamente Assam o Ceilán) perfumadas con aceite de bergamota de Citrus bergamia —un cítrico cultivado principalmente en Calabria, Italia—. Combina taninos de té profundos y secantes con el brillo cítrico-floral alto y volátil del linalool y limoneno de la bergamota. La estructura tánica de los polifenoles del té no sobrevive directamente a la destilación —los compuestos aromáticos sí—.", "pairing_es": "Aporta una base seca e intelectual a perfiles cítricos y de especia pesada. La nota de bergamota comparte linalool con la lavanda y el cilantro, creando armonía interna.", "mixology_es": "La columna vertebral de un Chelsea Sidecar o formatos de ponche de té frío. Los taninos naturales del té en ginebra macerada (frente a destilada) dan un final muy seco que corta los licores dulces. La ginebra lavada con té es una técnica afín en programas de barra de alto nivel."}, "lemongrass": {"cat": "Grassy · Leafy", "origin": "Fresh or dried stalks of Cymbopogon citratus (West Indian) or Cymbopogon flexuosus (East Indian). Citral — a mixture of the isomers geranial and neral — is the dominant compound (70–85% of essential oil), delivering an intensely clean, grassy-citrus punch free from the bitter lipids present in citrus peels. Highly popular in Southeast Asian-inspired gins.", "pairing": "Foundational in Asian-inspired contemporary gins. Complements fresh ginger, kaffir lime leaf, Thai basil, and mint in a clean, culinary flavor arc.", "mixology": "Superb in a Southside, Eastside, or any highball using fresh mint or spicy premium ginger beer. In a Michelin context, a lemongrass-infused gin with hand-pressed coconut water and a lime oleo saccharum is a refined contemporary serve.", "cat_es": "Herbáceo · Foliáceo", "origin_es": "Tallos frescos o secos de Cymbopogon citratus (de las Indias Occidentales) o Cymbopogon flexuosus (de las Indias Orientales). El citral —una mezcla de los isómeros geranial y neral— es el compuesto dominante (70–85 % del aceite esencial), aportando un golpe cítrico-herbáceo intensamente limpio, libre de los lípidos amargos de las cáscaras cítricas. Muy popular en ginebras de inspiración del Sudeste Asiático.", "pairing_es": "Fundamental en ginebras contemporáneas de inspiración asiática. Complementa el jengibre fresco, la hoja de lima kafir, la albahaca tailandesa y la menta en un arco de sabor culinario y limpio.", "mixology_es": "Magnífica en un Southside, un Eastside o cualquier highball con menta fresca o ginger beer premium picante. En contexto Michelin, una ginebra infusionada con hierba limón, agua de coco prensada a mano y un oleo saccharum de lima es un servicio contemporáneo refinado."}, "hibiscus": {"cat": "Grassy · Leafy", "origin": "Dried calyces (not petals, technically) of Hibiscus sabdariffa — the Roselle plant. Rich in organic acids (hibiscus acid, citric, malic, tartaric) and anthocyanin pigments (primarily delphinidin-3-sambubioside). When used as a post-distillation macerate, produces a vibrant, deep ruby red color. Flavor is sharply tart, cranberry-adjacent. Note: botanically a calyx/fruit, not a grass; grouped here by flavor profile.", "pairing": "Blends well with red fruit profiles; a crisp counter to sweet citrus. The anthocyanin color is a powerful bar tool — hibiscus-macerated gin creates natural color-changing effects with tonic (the pH shift turns it pink-to-purple).", "mixology": "A visual and structural showstopper in premium spritzes, winter Bramble adaptations, or unique Clover Club riffs. The pH-reactive color change with tonic is a memorable table-side experience.", "cat_es": "Herbáceo · Foliáceo", "origin_es": "Cálices secos (no pétalos, técnicamente) de Hibiscus sabdariffa —la planta de la rosela—. Rica en ácidos orgánicos (ácido de hibisco, cítrico, málico, tartárico) y pigmentos de antocianina (principalmente delfinidina-3-sambubiósido). Usada como macerado posdestilación, produce un color rojo rubí vibrante y profundo. El sabor es marcadamente ácido, cercano al arándano rojo. Nota: botánicamente un cáliz/fruta, no una hierba; agrupado aquí por perfil de sabor.", "pairing_es": "Se combina bien con perfiles de fruto rojo; un contrapunto nítido al cítrico dulce. El color de la antocianina es una poderosa herramienta de barra —la ginebra macerada con hibisco crea efectos de cambio de color con la tónica (el cambio de pH la vira de rosa a púrpura)—.", "mixology_es": "Un espectáculo visual y estructural en spritzes premium, adaptaciones invernales de Bramble o riffs únicos de Clover Club. El cambio de color reactivo al pH con la tónica es una experiencia memorable en mesa."}, "caraway": {"cat": "Herbal · Herbaceous", "origin": "Seeds of Carum carvi. Carvone (specifically R-(-)-carvone) is the primary active compound at 50–65% of the essential oil, delivering a warm, highly aromatic, distinctively herbal profile with a savory sweet-rye bread character. Limonene is the secondary compound. Caraway is the defining botanical of Scandinavian Aquavit — its presence in gin signals a deliberate savory-herbal direction.", "pairing": "Establishes a bridge into intensely savory, culinary-forward gin styles. Pairs naturally with dill, fennel, and anise-adjacent botanicals.", "mixology": "Magnificent in a Red Snapper (Gin Bloody Mary) or an ultra-savory Gibson garnished with cocktail onions. In Nordic-inspired bar programs, caraway gin pairs with aquavit modifiers for a layered Scandinavian Sour.", "cat_es": "Hierbas · Herbáceo", "origin_es": "Semillas de Carum carvi. La carvona (en concreto la R-(-)-carvona) es el compuesto activo principal, al 50–65 % del aceite esencial, aportando un perfil cálido, muy aromático y distintivamente herbal con carácter de pan de centeno dulce y salado. El limoneno es el compuesto secundario. La alcaravea es el botánico definitorio del Aquavit escandinavo —su presencia en la ginebra señala una dirección salada-herbal deliberada—.", "pairing_es": "Establece un puente hacia estilos de ginebra intensamente salados y culinarios. Marida de forma natural con eneldo, hinojo y botánicos cercanos al anís.", "mixology_es": "Magnífica en un Red Snapper (Bloody Mary de ginebra) o un Gibson ultrasalado guarnecido con cebollitas. En programas de barra de inspiración nórdica, la ginebra de alcaravea marida con modificadores de aquavit para un Sour escandinavo en capas."}, "mint": {"cat": "Herbal · Herbaceous", "origin": "Fresh peppermint (Mentha × piperita) or spearmint (Mentha spicata) leaves. Peppermint is dominated by menthol (35–45%) and menthone; spearmint by R-(-)-carvone (shared with caraway) and less menthol. Menthol triggers TRPM8 cold-receptor activation — the cooling sensation is a physiological effect, not a temperature change. Dried mint loses volatile top notes rapidly; fresh is strongly preferred.", "pairing": "Provides exceptional lifting action for heavy pine juniper and sweet citrus lines. The menthol cooling opens olfactory receptors, making aromas more perceptible.", "mixology": "The engine behind the Southside and Eastside cocktails. Always express fresh mint over the glass before serving — this activates volatile oils separate from the gin's internal botanical. Never muddle harshly; a gentle smack releases oils without extracting bitter chlorophyll.", "cat_es": "Hierbas · Herbáceo", "origin_es": "Hojas frescas de hierbabuena (Mentha × piperita) o menta verde (Mentha spicata). La hierbabuena está dominada por mentol (35–45 %) y mentona; la menta verde por R-(-)-carvona (compartida con la alcaravea) y menos mentol. El mentol activa el receptor de frío TRPM8 —la sensación de frescor es un efecto fisiológico, no un cambio de temperatura—. La menta seca pierde las notas altas con rapidez; la fresca es muy preferible.", "pairing_es": "Aporta una acción elevadora excepcional a las líneas pesadas de enebro y al cítrico dulce. El frescor del mentol abre los receptores olfativos, haciendo los aromas más perceptibles.", "mixology_es": "El motor del Southside y el Eastside. Exprime siempre menta fresca sobre la copa antes de servir —esto activa los aceites volátiles—. Nunca macerar con fuerza; un golpe suave libera los aceites sin extraer la clorofila amarga."}, "parsley": {"cat": "Herbal · Herbaceous", "origin": "Fresh flat-leaf (Petroselinum crispum var. neapolitanum) or curly parsley (Petroselinum crispum). Contains apiol — a phenylpropanoid — along with myristicin and terpinolene, offering a clean, mineral-toned, crisp, slightly peppery green vegetable note. Evokes a fresh garden character. Note: apiol has historic medical uses (an emmenagogue) — relevant only as context, not a safety concern at culinary concentrations.", "pairing": "Integrates well with sage, thyme, and celery seed for a full garden herb profile.", "mixology": "Ideal in a green garden highball, Botanical Snapper, or crisp dry Gibson. A parsley oil garnish or a small parsley-stalk bouquet as a garnish communicates the ingredient visually to the guest.", "cat_es": "Hierbas · Herbáceo", "origin_es": "Perejil fresco de hoja plana (Petroselinum crispum var. neapolitanum) o rizado (Petroselinum crispum). Contiene apiol —un fenilpropanoide— junto a miristicina y terpinoleno, ofreciendo una nota verde y vegetal limpia, mineral, nítida y ligeramente picante. Evoca un carácter de jardín fresco.", "pairing_es": "Se integra bien con salvia, tomillo y semilla de apio para un perfil completo de hierba de jardín.", "mixology_es": "Ideal en un highball de jardín verde, un Botanical Snapper o un Gibson seco y nítido. Una guarnición de aceite de perejil o un pequeño ramillete de tallos comunica el ingrediente visualmente al comensal."}, "thyme": {"cat": "Herbal · Vegetal", "origin": "Fresh or dried common thyme (Thymus vulgaris). Thymol is the primary active phenol (20–50% of essential oil), supplying a pungent, warm, medicinal-herbal aroma with sweet earth undertones. Garden thyme (high thymol) differs from lemon thyme (higher geraniol, more citrus-floral) — gin producers sometimes specify for precise character.", "pairing": "Classic Mediterranean botanical pairing tier. Pairs with citrus oils, green olives, and rosemary for a Provençal profile.", "mixology": "Sensational in a G&T served with a bruised fresh thyme sprig and a Chartreuse rinse on the glass. A house-made thyme-infused vermouth or thyme simple syrup gives bar teams creative control over intensity.", "cat_es": "Hierbas · Vegetal", "origin_es": "Tomillo común fresco o seco (Thymus vulgaris). El timol es el fenol activo principal (20–50 % del aceite esencial), aportando un aroma punzante, cálido y medicinal-herbal con matices de tierra dulce. El tomillo de jardín (alto en timol) difiere del tomillo limón (más geraniol, más cítrico-floral) —los productores a veces especifican para un carácter preciso—.", "pairing_es": "Nivel clásico de maridaje botánico mediterráneo. Marida con aceites cítricos, aceitunas verdes y romero para un perfil provenzal.", "mixology_es": "Sensacional en un Gin Tonic servido con una ramita de tomillo fresco machacada y un enjuague de Chartreuse en la copa. Un vermut casero infusionado con tomillo o un jarabe de tomillo da al equipo de barra control creativo sobre la intensidad."}, "rosemary": {"cat": "Herbal · Vegetal", "origin": "Fresh rosemary needles (Salvia rosmarinus — reclassified from Rosmarinus officinalis in the late 2010s). Brimming with 1,8-cineole (eucalyptol), camphor, and alpha-pinene. Creates a high-impact, resinous, powerfully aromatic wood-herbal profile. The shared alpha-pinene with juniper creates a natural internal harmony.", "pairing": "Amplifies classic gin structure via the shared pinene backbone. Works with charred/smoked modifiers and bitter aperitivo profiles.", "mixology": "Outstanding in savory Negronis or charred-rosemary smoked highballs. Flame-activated rosemary sprig garnish is a Michelin-level service technique: torch the sprig briefly, cap the glass momentarily to capture the smoke, then serve.", "cat_es": "Hierbas · Vegetal", "origin_es": "Agujas frescas de romero (Salvia rosmarinus —reclasificado desde Rosmarinus officinalis a finales de la década de 2010—). Repleto de 1,8-cineol (eucaliptol), alcanfor y alfa-pineno. Crea un perfil amaderado-herbal de alto impacto, resinoso y potentemente aromático. El alfa-pineno compartido con el enebro crea armonía interna natural.", "pairing_es": "Amplifica la estructura clásica de la ginebra mediante la columna de pineno compartida. Funciona con modificadores ahumados/carbonizados y perfiles aperitivos amargos.", "mixology_es": "Sobresaliente en Negronis salados o highballs ahumados con romero quemado. La guarnición de ramita de romero activada con llama es una técnica de servicio de nivel Michelin: flamea la ramita brevemente, tapa la copa un instante para capturar el humo y sirve."}, "sage": {"cat": "Herbal · Savoury", "origin": "Dried common sage (Salvia officinalis). Contains thujone (alpha and beta isomers) — a GABA-A receptor antagonist at high doses; at culinary gin concentrations this is not a concern but explains sage's distinctively 'buzzy,' warming character. Also rich in camphor, 1,8-cineole, and borneol. Texture is velvet-heavy, savory-herbaceous.", "pairing": "Harmonizes with robust woody nuts, rich roots, and sweet citrus peels. The thujone note is softened by sweet botanicals and amplified by dry, tannic modifiers.", "mixology": "Ideal for spirit-forward winter cocktails, savory autumn Flips, or dirty Martinis with a sage leaf garnish floating on the surface. Clary sage (Salvia sclarea) is sometimes used instead — more floral, less camphorous.", "cat_es": "Hierbas · Sabroso", "origin_es": "Salvia común seca (Salvia officinalis). Contiene tujona (isómeros alfa y beta) —un antagonista del receptor GABA-A en dosis altas; en concentraciones culinarias no es preocupante, pero explica el carácter distintivamente 'vibrante' y cálido de la salvia—. También rica en alcanfor, 1,8-cineol y borneol. Textura aterciopelada, salada-herbácea.", "pairing_es": "Armoniza con nueces amaderadas robustas, raíces ricas y cáscaras cítricas dulces. La nota de tujona se suaviza con botánicos dulces y se amplifica con modificadores secos y tánicos.", "mixology_es": "Ideal para cócteles potentes de invierno, Flips otoñales salados o Martinis sucios con una hoja de salvia flotando en la superficie. A veces se usa salvia romana (Salvia sclarea) —más floral, menos alcanforada—."}, "bay-laurel": {"cat": "Herbal · Savoury", "origin": "Dried leaves of Laurus nobilis (Bay Laurel — not to be confused with California Bay, Umbellularia californica, which is far more pungent). Rich in 1,8-cineole (eucalyptol, up to 50%), eugenol, and alpha-terpinyl acetate. Contributes a sophisticated, warm, woody-herbal aroma with exotic undertones of sweet nutmeg and clove spice.", "pairing": "A binding agent that seamlessly unites bright volatile citrus top notes with heavy, oily root fixatives. A classic component in traditional European gin formulations.", "mixology": "Brings culinary complexity to high-end Martinis, savory punches, or herbal highballs. A bay-laurel-sprig garnish on a Dirty Martini communicates flavor expectation visually and aromatically.", "cat_es": "Hierbas · Sabroso", "origin_es": "Hojas secas de Laurus nobilis (laurel —no confundir con el laurel de California, Umbellularia californica, mucho más punzante—). Rica en 1,8-cineol (eucaliptol, hasta el 50 %), eugenol y acetato de alfa-terpinilo. Aporta un aroma sofisticado, cálido y amaderado-herbal con matices exóticos de nuez moscada dulce y clavo.", "pairing_es": "Un agente aglutinante que une sin costuras las notas altas cítricas y volátiles con los fijadores de raíz pesados y aceitosos. Un componente clásico en las formulaciones de ginebra europeas tradicionales.", "mixology_es": "Aporta complejidad culinaria a Martinis de alto nivel, ponches salados o highballs herbales. Una guarnición de ramita de laurel en un Martini sucio comunica la expectativa de sabor visual y aromáticamente."}, "fennel": {"cat": "Herbal · Savoury", "origin": "Fennel seeds (Foeniculum vulgare)
