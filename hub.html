<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnSomm | Command Center</title>
    <style>
        body, html { margin: 0; height: 100%; background: #000; color: #d4b276; font-family: Georgia, serif; overflow: hidden; }
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; }
        #nav-row { height: 45px; background: #0a0602; border-bottom: 1px solid #332; display: flex; align-items: center; padding: 0 15px; }
        #content-frame { width: 100%; height: calc(100vh - 45px); border: none; }
    </style>
</head>
<body>
    <div id="auth-overlay"></div>
    <div id="nav-row">
        <nav>
            <button onclick="load('wine-wheel.html')">Wine</button>
            <button onclick="load('beef-wheel.html')">Beef</button>
        </nav>
    </div>
    <iframe id="content-frame"></iframe>

    <script>
        // Manual script injection
        function loadScript(src) {
            const script = document.createElement('script');
            script.src = src;
            document.head.appendChild(script);
        }
        loadScript("https://unpkg.com/firebase@10.x/firebase-app-compat.js");
        loadScript("https://unpkg.com/firebase@10.x/firebase-auth-compat.js");

        // Polling function to wait for Firebase
        (function poll() {
            if (typeof firebase !== 'undefined' && firebase.auth) {
                initHub();
            } else {
                setTimeout(poll, 50);
            }
        })();

        function initHub() {
            const firebaseConfig = {
                apiKey: "AIzaSyCsmpFOWKhVaUZD4EQR24AtOpyKDX2JhGg",
                authDomain: "mark-s-wine-training.firebaseapp.com",
                projectId: "mark-s-wine-training",
                storageBucket: "mark-s-wine-training.firebasestorage.app",
                messagingSenderId: "424279465207",
                appId: "1:424279465207:web:7be6d1a760bc92d045c7f2"
            };
            firebase.initializeApp(firebaseConfig);

            firebase.auth().onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'login.html';
                } else {
                    document.getElementById('auth-overlay').style.display = 'none';
                }
            });
        }

        function load(url) { document.getElementById('content-frame').src = url; }
    </script>
</body>
</html>
