<!DOCTYPE html>
<!-- LearnSomm Wheel — Brandy — prod-07 — v1 (rename internal key later) -->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandy Aroma & Flavor Wheel — Mark Lenington</title>


<style>
:root{--display:'Optima','Candara','Gill Sans','Gill Sans MT','Segoe UI',sans-serif;--serif:'Avenir Next','Avenir','Century Gothic','Futura','Trebuchet MS',sans-serif;}
[data-theme="dark"]{--display:'Baskerville','Baskerville Old Face','Hoefler Text','Big Caslon','Palatino Linotype',serif;--serif:'Iowan Old Style','Palatino Linotype','Palatino','Book Antiqua','Cambria',Georgia,serif;}

*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#8a5a2a;--gold:#a87f3d;--sep:#faf8f3;--hub:#fffdf8;--hub-text:#6b573a;--badge-bg:#f4eee2;--badge-line:#d8cdb8;--shadow:0 8px 30px rgba(80,60,30,.14);}
[data-theme="dark"]{--bg:#16130e;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;--accent:#c9a96e;--gold:#d4b276;--sep:#16130e;--hub:#211c14;--hub-text:#d8c294;--badge-bg:#2a241a;--badge-line:#4a4030;--shadow:0 10px 34px rgba(0,0,0,.55);}
html{background:var(--bg);}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .25s,color .25s;}

.topbar{width:100%;max-width:1100px;display:flex;justify-content:flex-end;gap:.5rem;padding:.7rem 1rem 0;}
.topbar button{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:.75rem;border-radius:6px;padding:.35rem .7rem;cursor:pointer;}
.topbar button:hover{color:var(--text);border-color:var(--muted);}
h1{font-size:1.4rem;font-weight:400;letter-spacing:.04em;padding:.2rem 1rem .15rem;text-align:center;}
.byline{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.2rem;}
.byline em{color:var(--accent);font-style:italic;}
.spin-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:.55rem;}
.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;justify-content:center;border:1px solid var(--line);border-radius:8px;padding:.4rem .9rem;margin-bottom:1rem;max-width:96vw;background:var(--panel);}
.controls .ctl-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.controls button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.9rem;line-height:1;border-radius:6px;padding:.32rem .65rem;cursor:pointer;min-width:2.1rem;min-height:2.1rem;}
.controls button:hover{border-color:var(--gold);color:var(--accent);}
.controls button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.controls input[type=range]{width:150px;accent-color:var(--gold);cursor:pointer;}
.size-ctl{display:flex;align-items:center;gap:.55rem;}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.view-toggle button{border:none;border-radius:0;min-width:3.4rem;}
.view-toggle button.active{background:var(--badge-bg);color:var(--accent);font-weight:bold;}
.layout{display:flex;gap:0;width:100%;max-width:1180px;align-items:flex-start;padding:0 1rem 2.5rem;justify-content:center; position:relative;}
.wheel-wrap{flex:0 0 auto;display:flex;justify-content:center;}
#svgContainer { position: relative; line-height: 0; }

#wheelSvg{cursor:grab;user-select:none;touch-action:none;filter:drop-shadow(var(--shadow));}
#wheelSvg:active{cursor:grabbing;}
#wheelSvg .cell{stroke:var(--sep);stroke-width:1.5;}
#wheelSvg .desc-seg{cursor:pointer;transition:filter .15s;}
#wheelSvg .desc-seg:hover{filter:brightness(1.12) saturate(1.05);}
#wheelSvg .desc-seg.selected{stroke:var(--gold);stroke-width:2.4;}
#wheelSvg .hub{fill:var(--hub);stroke:var(--gold);stroke-width:1.4;}
#wheelSvg .hub-text{fill:var(--hub-text);}
#wheelSvg .rim{fill:none;stroke:var(--line);stroke-width:1;}
@media (prefers-reduced-motion:reduce){#wheelSvg .desc-seg{transition:none;}}

#listView{position: relative; display:none; flex:0 1 auto; width:min(720px,94vw); transition: opacity 0.3s, filter 0.3s;}
#listView.active{display:block;}
#listSearch{width:100%;padding:.55rem .85rem;font-family:inherit;font-size:.92rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);margin-bottom:1rem;}
#listSearch:focus{outline:none;border-color:var(--gold);}
.cat-block{margin-bottom:1rem;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.7rem .9rem;}
.cat-head{display:flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.cat-dot{width:.7rem;height:.7rem;border-radius:3px;flex:0 0 auto;}
.sub-group{margin-bottom:.5rem;}
.sub-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);opacity:.8;margin-bottom:.3rem;}
.chip-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.list-chip{font-size:.82rem;font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.32rem .62rem;cursor:pointer;color:var(--text);}
.list-chip:hover{border-color:var(--gold);color:var(--accent);}
.list-chip:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.list-chip.selected{border-color:var(--gold);background:var(--badge-bg);color:var(--accent);font-weight:bold;}
#noResults{display:none;color:var(--muted);font-style:italic;font-size:.88rem;padding:.4rem 0;}

.detail-panel{flex:1;min-width:280px;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:1.3rem 1.5rem;min-height:360px;margin-left:1.4rem; transition: opacity 0.3s; z-index:60; position:relative;}
.panel-header{display:flex;align-items:center;justify-content:space-between;gap:.6rem;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin:-1.3rem -1.5rem 1rem;padding:.5rem .9rem .45rem;border-bottom:1px solid var(--line);border-radius:9px 9px 0 0;}
.panel-header:active{cursor:grabbing;}
.panel-header .grip-title{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
.panel-header .grip-dots{color:var(--line);letter-spacing:2px;margin-right:.4rem;}
.panel-header button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.66rem;border-radius:5px;padding:.22rem .5rem;cursor:pointer;display:none;}
.panel-header button:hover{border-color:var(--gold);color:var(--accent);}
.detail-panel.floating{position:fixed;z-index:60;margin:0;width:min(380px,92vw);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow);border-color:var(--gold);}
.detail-panel.floating .panel-header{position:sticky;top:0;z-index:2;background:var(--panel);}
.detail-panel.floating .panel-header button{display:inline-block;}
.detail-panel h2{font-size:1.3rem;margin-bottom:.15rem;font-weight:400;font-style:italic;color:var(--accent);}
.detail-panel h2 a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--gold);}
.detail-panel h2 a:hover,.detail-panel h2 a:focus-visible{border-bottom-style:solid;color:var(--gold);outline:none;}
.wiki-mark{font-size:.6em;margin-left:.28rem;font-style:normal;color:var(--gold);vertical-align:super;}
.detail-panel .category-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.section-title{font-size:.66rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .25rem;font-weight:bold;border-bottom:1px solid var(--line);padding-bottom:2px;}
.body-text{font-size:.85rem;line-height:1.65;color:var(--text);}
.flag-note{font-size:.74rem;color:var(--gold);background:var(--badge-bg);border:1px solid var(--gold);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;line-height:1.5;}
.grid-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;}
.grid-badge{font-size:.74rem;background:var(--badge-bg);border:1px solid var(--gold);padding:.18rem .5rem;border-radius:4px;}
.placeholder{color:var(--muted);font-size:.95rem;margin-top:2.5rem;text-align:center;font-style:italic;}
@media(max-width:800px){.layout{flex-direction:column;align-items:center;}.detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}h1{font-size:1.15rem;}}

/* Hub center: logo + hover mirror */
#hubCenter{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18.5%;height:18.5%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
#hubLogo{max-width:88%;max-height:88%;opacity:1;transition:opacity .18s;display:none;}
#hubMirror{position:absolute;inset:-30% -55%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:var(--display);font-weight:bold;color:var(--hub-text);line-height:1.08;opacity:0;transition:opacity .15s;text-shadow:0 1px 6px var(--hub);}
#hubMirror.show{opacity:1;}
#hubCenter.mirroring #hubLogo{opacity:0;}
#svgContainer.has-logo .hub-text{opacity:0;}
/* Background echo: giant readable mirror, desktop only */
#bgEcho{position:fixed;top:.4rem;left:1rem;font-family:var(--display);font-weight:bold;font-size:clamp(2.4rem,7vw,5.8rem);color:var(--hub-text);opacity:0;transition:opacity .2s;pointer-events:none;z-index:0;line-height:1;max-width:55vw;letter-spacing:.02em;}
#bgEcho.show{opacity:.13;}
@media(max-width:800px){#bgEcho{display:none;}}

/* deploy: selection lockdown */
body{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
input,textarea{user-select:text;-webkit-user-select:text;-moz-user-select:text;}
</style>

<style id="enhancements">
/* pill controls */
.pill-btn{font-family:inherit;font-size:.82rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.32rem .7rem;cursor:pointer;color:var(--text);}
.pill-btn.on{background:var(--badge-bg);color:var(--accent);border-color:var(--gold);font-weight:bold;}
.mode-toggle button{min-width:2.7rem;}
/* label glow toggle */
#wheelSvg.label-glow text{filter:drop-shadow(0 0 1.3px var(--gold)) drop-shadow(0 0 3px var(--gold));}
/* hub-mirror glow (center hover) handled inline */
#hubMirror.glow{filter:drop-shadow(0 0 4px currentColor) drop-shadow(0 0 9px currentColor);}
/* ── docked wheel modes (desktop) ── */
body[data-view="wheel"][data-mode="dock-left"] .layout,
body[data-view="wheel"][data-mode="dock-right"] .layout{display:block;max-width:none;padding:0;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:fixed;top:130px;bottom:54px;width:60vw;display:flex;align-items:center;overflow:hidden;pointer-events:none;z-index:15;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap{left:0;justify-content:flex-start;}
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{right:0;justify-content:flex-end;}
body[data-view="wheel"][data-mode="dock-left"] #svgContainer{transform:translateX(-40%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:translateX(40%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel{position:fixed;top:130px;right:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:10px 0 0 10px;}
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:fixed;top:130px;left:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:0 10px 10px 0;}
/* read-point chip */
#readPoint{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:.3rem .65rem;font-weight:bold;font-family:var(--display);letter-spacing:.05em;box-shadow:var(--shadow);cursor:pointer;pointer-events:auto;max-width:26vw;text-align:center;transform:translate(-50%,-50%);}
#readPoint::before{content:"\25c0";opacity:.5;margin-right:.3rem;}
body[data-view="wheel"][data-mode="dock-right"] #readPoint::before{content:"\25b6";}
body[data-view="wheel"][data-mode="dock-left"] #readPoint,
body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:block;}
/* detached move handle */
#wheelMove{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.22rem .6rem;font-size:.74rem;color:var(--muted);cursor:move;pointer-events:auto;user-select:none;}
body[data-view="wheel"][data-mode="detached"] .wheel-move{display:block;}
#wheelMove2{padding:.22rem .5rem;}
/* ── collapsible list ── */
.sub-toggle{display:flex;align-items:center;gap:.45rem;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.34rem .6rem;cursor:pointer;color:var(--text);font-family:inherit;font-size:.82rem;margin:.18rem 0;}
.sub-toggle:hover{border-color:var(--gold);}
.sub-caret{display:inline-block;transition:transform .15s;color:var(--accent);font-size:.7rem;}
.sub-group.expanded .sub-caret{transform:rotate(90deg);}
.sub-group .chip-row{display:none;margin:.35rem 0 .2rem;}
.sub-group.expanded .chip-row{display:flex;}
#listBody.searching .sub-group .chip-row{display:flex;}
#listBody.searching .sub-caret{transform:rotate(90deg);}
#listBody.cols{column-width:250px;column-gap:1rem;}
#listBody.cols .cat-block{break-inside:avoid;}
/* contact */
.contact-bar{max-width:1100px;margin:0 auto 1.4rem;padding:.7rem 1rem;text-align:center;font-size:.85rem;color:var(--muted);border-top:1px solid var(--line);}
.contact-bar a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--gold);margin:0 .55rem;white-space:nowrap;}
.contact-bar a:hover{color:var(--gold);}
.contact-bar .lead{display:block;margin-bottom:.35rem;color:var(--text);font-style:italic;}
.detail-panel .contact{margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--line);font-size:.8rem;}
.detail-panel .contact a{display:inline-block;margin:.1rem .5rem .1rem 0;color:var(--accent);border-bottom:1px dotted var(--gold);text-decoration:none;}
.noob-fact{font-size:.92rem;line-height:1.5;}
/* responsive: docked falls back to centered/stacked on narrow screens */
@media (max-width:820px){
  body[data-view="wheel"][data-mode="dock-left"] .layout,
  body[data-view="wheel"][data-mode="dock-right"] .layout{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2.5rem;}
  body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
  body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:static;width:auto;overflow:visible;pointer-events:auto;}
  body[data-view="wheel"][data-mode="dock-left"] #svgContainer,
  body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:none;}
  body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
  body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:static;width:100%;max-width:95vw;margin-top:1rem;max-height:none;}
  body[data-view="wheel"][data-mode="dock-left"] #readPoint,
  body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:none;}
}
</style>

<style id="rev2">
.detail-panel h2{font-size:1.62rem;}
.detail-panel .category-tag{font-size:.8rem;}
.section-title{font-size:.82rem !important;}
.body-text{font-size:1.06rem;line-height:1.62;}
.noob-fact{font-size:1.0rem;}
.funfact{font-size:1.04rem;line-height:1.55;background:var(--badge-bg);border:1px solid var(--gold);border-left-width:4px;border-radius:8px;padding:.6rem .8rem;margin:.2rem 0 .9rem;}
.funfact .ff-label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:bold;margin-bottom:.25rem;}
/* bgEcho hover text: lighter in dark, darker in light */
[data-theme="dark"] #bgEcho{color:#efe6d4;opacity:.16;}
[data-theme="light"] #bgEcho{color:#3a2f20;opacity:.13;}
#bgEcho.show{opacity:var(--echo-op,.15);}
[data-theme="dark"] #bgEcho.show{opacity:.17;}
[data-theme="light"] #bgEcho.show{opacity:.14;}
/* center: logo only, mirror text removed */
#hubMirror{display:none !important;}
#hubLogo{display:block;}
/* spin tally chip */
#spinTally{font-size:.72rem;color:var(--muted);margin-left:.1rem;white-space:nowrap;}
/* context-sensitive control visibility handled by JS adding body[data-view] scoping */
body[data-view="list"] #spinBtn,
body[data-view="list"] #glowBtn,
body[data-view="list"] .mode-toggle,
body[data-view="list"] #spinTally{display:none;}
body[data-view="wheel"] #listLayoutBtn{display:none;}
</style>

<style id="rev3">
/* contact links pinned bottom-middle at all times */
.contact-bar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:70;
  margin:0;border-top:none;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;
  background:var(--panel);box-shadow:0 -2px 10px rgba(0,0,0,.08);padding:.45rem 1.1rem;max-width:96vw;white-space:nowrap;overflow-x:auto;}
.contact-bar .lead{display:inline;margin:0 .6rem 0 0;font-style:italic;color:var(--muted);font-size:.82rem;}
.contact-bar a{margin:0 .5rem;}
/* keep docked wheel + panel clear of the pinned contact bar */
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{bottom:52px;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{max-height:calc(100vh - 196px);}
.layout{padding-bottom:64px;}
/* topbar: lighter controls, larger focus button */
.topbar button{color:var(--muted);opacity:.72;border-color:var(--line);transition:opacity .15s,color .15s;}
.topbar button:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
#fsBtn{font-size:1.35rem !important;padding:.28rem .6rem !important;line-height:1;}
</style>

<style id="rev4">
/* hide old h1/title space; logo carries the name */
#h1title{display:none !important;}
.byline{text-align:center;font-size:.74rem;color:var(--muted);padding:.2rem 1rem .4rem;margin-top:2px;}
/* clear fixed top cluster */
body{padding-top:60px;}
/* ===== unified fixed top-right control cluster ===== */
.topctl{position:fixed;top:0;right:0;z-index:200;display:flex;flex-wrap:wrap;justify-content:flex-end;align-items:center;
  gap:.4rem;padding:.5rem .7rem;background:linear-gradient(to left,var(--panel) 70%,transparent);max-width:100vw;}
.topctl button{font-family:inherit;font-size:.8rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:.3rem .6rem;cursor:pointer;color:var(--text);}
.topctl .view-toggle button{border:none;border-radius:0;}
.topctl #langBtn,.topctl #themeBtn{color:var(--muted);opacity:.72;}
.topctl #langBtn:hover,.topctl #themeBtn:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
.topctl-div{width:1px;height:22px;background:var(--line);margin:0 .15rem;}
.size-ctl{display:flex;align-items:center;gap:.25rem;}
#zoomSlider{width:120px;}
/* Wheel Format dropdown */
.wf-wrap{position:relative;}
#wfMenu{position:absolute;top:calc(100% + 4px);right:0;background:var(--panel);border:1px solid var(--gold);border-radius:8px;
  box-shadow:var(--shadow);display:none;flex-direction:column;min-width:150px;overflow:hidden;z-index:210;}
#wfMenu.open{display:flex;}
#wfMenu button{border:none;border-radius:0;text-align:left;padding:.55rem .8rem;background:var(--panel);}
#wfMenu button:hover,#wfMenu button.on{background:var(--badge-bg);color:var(--accent);}
#wheelFormat.on{border-color:var(--gold);color:var(--accent);}
/* focus button (injected) sizing already handled; ensure it lands in cluster */
.topctl #fsBtn{font-size:1.3rem !important;padding:.2rem .55rem !important;line-height:1;}
/* ===== spins counter — top-right background ===== */
#spinsBg{position:fixed;top:3.2rem;right:1rem;z-index:0;pointer-events:none;font-family:var(--display);font-weight:bold;
  font-size:clamp(1.6rem,4.4vw,3.4rem);line-height:1;text-align:right;letter-spacing:.02em;opacity:0;transition:opacity .25s;}
#spinsBg.show{opacity:1;}
[data-theme="dark"] #spinsBg{color:#efe6d4;opacity:.13;}
[data-theme="light"] #spinsBg{color:#3a2f20;opacity:.11;}
[data-theme="dark"] #spinsBg.show{opacity:.16;}
[data-theme="light"] #spinsBg.show{opacity:.13;}
#spinsBg .sc-num{font-size:1.5em;}
[data-theme="dark"] #spinsBg.flash{opacity:.3 !important;}
[data-theme="light"] #spinsBg.flash{opacity:.26 !important;}
#spinsBg.flash{transition:opacity .12s;}
#spinsBg .sc-lab{display:block;font-size:.4em;letter-spacing:.18em;text-transform:uppercase;opacity:.8;}
/* ===== read-point magnifier +50% ===== */
#readPoint{font-size:1.5rem;padding:.45rem 1rem;border-width:2px;max-width:34vw;}
#readPoint::before{font-size:.8em;}
/* show read-point in FREE mode too (default right side) */
body[data-view="wheel"][data-mode="detached"] #readPoint{display:block;}
/* ===== tasting-notes card: larger by default + resizable when floating ===== */
.detail-panel{max-width:440px;min-width:320px;}
.body-text{font-size:1.14rem;line-height:1.66;}
.detail-panel h2{font-size:1.78rem;}
.funfact{font-size:1.1rem;}
.detail-panel.floating{resize:both;overflow:auto;width:min(440px,94vw);min-width:300px;min-height:280px;max-height:90vh;}

const DESCRIPTIONS = {"floral-floral-rose": {"cat": "Floral", "cat_es": "FLORAL", "origin": "Driven by terpene alcohols like <span class='highlight'>geraniol</span> and <span class='highlight'>beta-phenylethanol</span>. These delicate compounds evaporate early during wood extraction, meaning intense floral characteristics indicate minimized, hyper-judicious new oak contact or highly specialized micro-distallation curves.", "mixology": "Frame this for your guests as an elegant 'perfumed aromatic brightness' typical of single-distillate column entries or white grape focus. Beautiful for a floral variation on a French 75 or Sidecar.", "examples": "Commonly seen in exceptionally elegant Borderies Cognacs and young, floral Armagnacs from the Bas-Armagnac region."}, "floral-floral-potpourri": {"cat": "Floral", "cat_es": "FLORAL", "origin": "Indicates partial oxidative concentration of terpene pools interacting with minor levels of aldehydes over extended timeframes. It signals a complex evolution intermediate between direct floral bloom and oxidative dried fruit.", "mixology": "Describe this as a 'deep, dried botanical warmth.' Excellent for pairing tableside with lighter, fruit-driven dessert configurations.", "examples": "Often detected in complex, long-aged Grande Champagne Cognacs."}, "floral-muscat-hanepoot-grape": {"cat": "Floral · Muscat", "cat_es": "FLORAL · Moscatel", "origin": "Direct varietal carryover of free monoterpenes (<span class='highlight'>linalool</span> and <span class='highlight'>geraniol</span>). Unlike ugni blanc, which distills neutral, muscat-derived base wines hold high terpene fractions that survive pot-still execution without thermal breakdown.", "mixology": "An absolute winner for aromatic curiosity. Tell guests this delivers the rich, explicit perfume of fresh table grapes directly to the glass. Perfect baseline for an aromatic brandy punch.", "examples": "A distinctive marker in South African Pot Still Brandies, where Muscat d'Alexandrie (locally known as Hanepoot) is utilized."}, "floral-muscat-raisin": {"cat": "Floral · Muscat", "cat_es": "FLORAL · Moscatel", "origin": "Arises from the combination of grape-derived concentrated sugars and cask absorption of high-density residual sugar left behind in seasoned oak pores. Thermal changes in the copper still can also amplify light furfural-caramelization mirroring sun-dried fruit.", "mixology": "A very welcoming, accessible note. Tell guests it represents 'concentrated, sundried grape richness.' Instantly direct them to try it neat as a post-dinner replacement for sweet wines.", "examples": "Immensely typical in Spanish Brandy de Jerez aged in Pedro Ximénez casks."}, "fruity-fruity-esterry-synthetic-fruit": {"cat": "Fruity", "cat_es": "AFRUTADO", "origin": "An overproduction of volatile fatty acid esters, particularly <span class='highlight'>isoamyl acetate</span> (banana drop) and <span class='highlight'>ethyl butyrate</span> (pineapple candy). Often signals a lack of precise head cutting or temperature control during primary yeast conversions.", "mixology": "If a guest notes an artificial or 'bubblegum-like' fruit character, this is the compound. It brings a candy lift that works well when trying to cut through heavy syrups in high-volume crushed ice tiki modifications.", "examples": "Encountered in lower-tier continuous column distillates or high-speed, hot industrial fermentations."}, "fruity-fruity-fig": {"cat": "Fruity", "cat_es": "AFRUTADO", "origin": "A complex sign of micro-oxidation interacting with wood lactones over decades. This breakdown product of fatty acid structures mimics concentrated stone-and-seed fruits as the liquid concentrates inside porous oak.", "mixology": "Describe this as a rich, savory jamminess. Excellent option to recommend alongside charcuterie boards featuring cured duck or sheep's milk cheeses.", "examples": "Prominent in well-matured XO Cognacs and traditional, rancio-forward Armagnacs."}, "fruity-fruity-apple": {"cat : "Severe fault indicator. Pushed by highly advanced reduction setups or mercaptan conversions."}, "phenolic-tar-phenolic-tar": {"cat": "Phenolic / Tar · Phenolic · Fault", "cat_es": "FENÓLICO / BREA · Fenólico · Defecto", "origin": "Heavy, sharp organic compounds tracking over due to aggressive boiling speeds inside the pot still, confusing the heart cuts.", "mixology": "A heavy, chemical tar pitch. Overpowers all base grape notes and feels highly industrial and sharp on the back palate.", "examples": "Fault indicator. Tracks to over-heated, scorched pot still bottoms or industrial sealing failures."}, "phenolic-tar-tar-plastic": {"cat": "Phenolic / Tar · Tar · Fault", "cat_es": "FENÓLICO / BREA · Brea · Defecto", "origin": "High-proof spirit acting as a solvent on sub-standard industrial synthetic hoses, leaching polymer chemicals into the final liquid.", "mixology": "An industrial chemical fault. If a guest notes a 'synthetic plastic tupperware' flavor, it stems from chemical leaching. Do not serve.", "examples": "Fault indicator. Caused by improper storage lines or cheap plastic hose connections in production plants."}, "phenolic-tar-tar-metallic": {"cat": "Phenolic / Tar · Tar · Fault", "cat_es": "FENÓLICO / BREA · Brea · Defecto", "origin": "Spirit interaction with non-inert metal systems, picking up free iron ions that catalyze fast oxidation and leave a bloody taste.", "mixology": "A sharp, tinny, blood-like finish. It leaves a metallic weight on the sides of the tongue that destroys the entire mid-palate structure.", "examples": "Fault indicator. Stemming from prolonged storage in raw metal transit vats or old iron pipe setups."}, "phenolic-tar-tar-diesel": {"cat": "Phenolic / Tar · Tar · Fault", "cat_es": "FENÓLICO / BREA · Brea · Defecto", "origin": "Absorption of external heavy hydrocarbon vapors during the open vat wine stage, or complex ring-compound synthesis under heat.", "mixology": "Smells like raw machinery fuel or oily garage floors. A catastrophic production contamination flaw that requires discarding the bottle.", "examples": "Fault indicator. Tracks to exhaust gas leaks near open fermentation tanks or severe reduction paths."}, "phenolic-tar-tar-scorched": {"cat": "Phenolic / Tar · Tar · Fault", "cat_es": "FENÓLICO / BREA · Brea · Defecto", "origin": "Yeast sediment drops to the bottom of the copper kettle and bakes directly onto the hot metal, releasing bitter <span class='highlight'>furfurals</span> and acrid carbon notes.", "mixology": "A bitter, burnt, ash-tray finish. Signals a lack of technical care during the high-heat distillation phase by the distillery crew.", "examples": "Fault indicator. Caused by running direct-fired pot stills too fast without checking solids."}, "phenolic-tar-tar-rubbery": {"cat": "Phenolic / Tar · Tar · Fault", "cat_es": "FENÓLICO / BREA · Brea · Defecto", "origin": "Advanced synthesis of complex vulcanized rubber sulfides formed when heavy tail fractions interact with high heating elements.", "mixology": "Smells explicitly of burnt car tires or old elastic bands. A heavy, industrial distraction that completely ruins mixology balance.", "examples": "Fault indicator. A deep, heavy sulfur reduction error."}, "smooth-associated-smooth-associated-butter": {"cat": "Smooth associated · Fault", "cat_es": "NOTAS SUAVES · Notas Suaves", "origin": "Driven by <span class='highlight'>diacetyl</span> synthesis from lactic acid bacteria activity. Delightful in tiny traces for texture, but greasy if unmonitored.", "mixology": "A heavy, movie-popcorn butter quality. If it feels too slick or artificial, it will distract from clean cocktail acid structures.", "examples": "Can show up in white wine distillates that completed full Malolactic conversion."}, "smooth-associated-smooth-associated-oily": {"cat": "Smooth associated · Fault", "cat_es": "NOTAS SUAVES · Notas Suaves", "origin": "High percentage presence of fixed higher alcohols and essential fatty acid lipids that alter surface tension variables on the palate.", "mixology": "A thick, mouth-coating weight. Great if you want a bold texture to hold up to heavy modifiers, but cloying if served warm neat.", "examples": "Found in spirits with heavy tail collection limits or low-rectification column curves."}, "smooth-associated-smooth-associated-lees-oil": {"cat": "Smooth associated · Fault", "cat_es": "NOTAS SUAVES · Notas Suaves", "origin": "Advanced ester synthesis generated when fatty acids in dead yeast slurry undergo thermal binding with ethanol, creating rich lipid weights.", "mixology": "A unique, fatty, luxurious waxy fruitiness. Highly prized by spirits connoisseurs for adding deep, structural length to the finish.", "examples": "Classic secondary character in artisan charente pot still methods."}, "smooth-associated-smooth-associated-soapy": {"cat": "Smooth associated · Fault", "cat_es": "NOTAS SUAVES · Notas Suaves", "origin": "Hydrolysis of heavy fats generating free sodium-soap structures when high-proof elements interact with residue cleanser layers.", "mixology": "A flat, filmy, candle-wax or soap lather profile. It leaves a slick, flat clean taste that strips out any genuine flavor length.", "examples": "Fault indicator. Stemming from extreme tail extensions or bad tank washing setups."}};

const FUN_FACTS = {"FLORAL": {"en": "Floral notes — rose, potpourri, Muscat — come from the base wine and grape variety, and are most vivid in young, unaged brandies.", "es": "Las notas florales — rosa, popurrí, Moscatel — provienen del vino base y la variedad de uva, y son más vívidas en los brandies jóvenes y sin añejar."}, "FRUITY": {"en": "Fruity notes — apple, grape, dried apricot — are the fingerprint of the base wine. Fresh fruit suggests a younger spirit; dried or cooked fruit suggests barrel age.", "es": "Las notas afrutadas — manzana, uva, chabacano seco — son la huella digital del vino base. La fruta fresca sugiere un destilado más joven; la fruta seca o cocida sugiere añejamiento en barrica."}, "HERBACEOUS": {"en": "Herbaceous notes — mint, eucalyptus, hay — often come from the grape variety or herbs growing near the vineyard, and can also signal a still-spirity greenness in young brandy.", "es": "Las notas herbáceas — menta, eucalipto, heno — a menudo vienen de la variedad de uva o de hierbas cercanas al viñedo, y también pueden señalar un carácter verde y de destilado en un brandy joven."}, "WOODY": {"en": "Woody notes — oak, vanilla, cedar — are the clearest marker of barrel aging. The longer a brandy rests in cask, the more these notes build.", "es": "Las notas amaderadas — roble, vainilla, cedro — son el indicador más claro del añejamiento en barrica. Cuanto más tiempo descansa un brandy en barril, más se desarrollan estas notas."}, "TOASTED / NUTTY": {"en": "Toasted and nutty notes — coffee, hazelnut, almond, sherry-like 'flor' — come from barrel char and oxidative aging, common in older brandies aged in ex-sherry casks.", "es": "Las notas tostadas y de frutos secos — café, avellana, almendra, 'flor' tipo jerez — provienen del tostado de la barrica y del añejamiento oxidativo, comunes en brandies más viejos en barricas ex-jerez."}, "SWEET ASSOCIATED": {"en": "Sweet-associated notes — caramel, honey, chocolate, port-like jamminess — develop with extended barrel age as wood sugars and Maillard reactions build richness.", "es": "Las notas asociadas a lo dulce — caramelo, miel, chocolate, mermelada tipo Oporto — se desarrollan con un añejamiento prolongado en barrica, conforme los azúcares de la madera y las reacciones de Maillard aportan riqueza."}, "SPICES": {"en": "Spice notes — cinnamon, clove, nutmeg — come from oak compounds released during toasting, adding warmth and complexity to aged brandy.", "es": "Las notas de especia — canela, clavo, nuez moscada — provienen de los compuestos del roble liberados durante el tostado, y añaden calidez y complejidad al brandy añejado."}, "SOLVENT/CHEMICAL": {"en": "This whole group is a FAULT. Detergent, acetone, or nail-polish-like notes mean the distillation cut was poorly made or the spirit is unrested — they should be faint or absent in a well-made brandy.", "es": "Todo este grupo es un DEFECTO. Las notas a detergente, acetona o quitaesmalte significan que el corte de la destilación se hizo mal o que el destilado no ha reposado — deberían ser tenues o estar ausentes en un buen brandy."}, "SOUR ASSOCIATED": {"en": "Sour notes — vinegar, rancid butter, fusel oil — usually come from the 'heads' and 'feints' of distillation or microbial spoilage in the base wine. A little can add complexity; a lot is a fault.", "es": "Las notas ácidas — vinagre, mantequilla rancia, aceite de fusel — suelen provenir de las 'cabezas' y 'flemas' de la destilación o de un deterioro microbiano en el vino base. Un poco puede añadir complejidad; mucho es un defecto."}, "TAILS": {"en": "'Tails' notes — tobacco oil, fishy, lees — come from the heavier compounds collected at the end of distillation. A trace can add savory depth; too much is heavy and unpleasant.", "es": "Las notas de 'colas' — aceite de tabaco, a pescado, lías — provienen de los compuestos más pesados recogidos al final de la destilación. Un rastro puede añadir profundidad sabrosa; en exceso resulta pesado y desagradable."}, "MUSTY": {"en": "Musty notes — wet cardboard, mushroom, corked barrel — are FAULTS pointing to a contaminated cask or cork, and dull the brandy's fruit and aroma.", "es": "Las notas a humedad — cartón mojado, hongo, barrica con corcho defectuoso — son DEFECTOS que apuntan a un barril o corcho contaminado, y apagan la fruta y el aroma del brandy."}, "SULPHURY": {"en": "Sulphur notes — rotten egg, cooked cabbage, garlic — are FAULTS from fermentation stress or excess sulphur dioxide, and usually need to 'blow off' before tasting.", "es": "Las notas de azufre — huevo podrido, col cocida, ajo — son DEFECTOS de una fermentación estresada o un exceso de dióxido de azufre, y normalmente necesitan 'disiparse' antes de catar."}, "PHENOLIC / TAR": {"en": "Phenolic and tar notes — plastic, diesel, scorched, rubber — are FAULTS from over-toasted barrels or distillation problems, giving a harsh, industrial edge.", "es": "Las notas fenólicas y de brea — plástico, diésel, quemado, hule — son DEFECTOS de barricas demasiado tostadas o problemas de destilación, que dan un filo áspero e industrial."}, "SMOOTH ASSOCIATED": {"en": "Smooth-associated notes — butter, oil, soap — in small amounts add a silky mouthfeel from lees contact and oak fats; in excess they feel waxy or soapy.", "es": "Las notas asociadas a lo suave — mantequilla, aceite, jabón — en pequeñas cantidades añaden una textura sedosa por el contacto con las lías y las grasas del roble; en exceso se sienten cerosas o jabonosas."}};

/* geometry */
function polarToCart(r,a){return[r*Math.cos(a),r*Math.sin(a)];}
function arcRing(r1,r2,a1,a2){const[sx1,sy1]=polarToCart(r1,a1),[ex1,ey1]=polarToCart(r1,a2),[sx2,sy2]=polarToCart(r2,a1),[ex2,ey2]=polarToCart(r2,a2);const lg=a2-a1>Math.PI?1:0;return `M ${sx1} ${sy1} A ${r1} ${r1} 0 ${lg} 1 ${ex1} ${ey1} L ${ex2} ${ey2} A ${r2} ${r2} 0 ${lg} 0 ${sx2} ${sy2} Z`;}
function arcLabelPath(r,a1,a2,rev){const lg=Math.abs(a2-a1)>Math.PI?1:0;if(rev){const[sx,sy]=polarToCart(r,a2),[ex,ey]=polarToCart(r,a1);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 0 ${ex} ${ey}`;}const[sx,sy]=polarToCart(r,a1),[ex,ey]=polarToCart(r,a2);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 1 ${ex} ${ey}`;}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function textOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)>150?'#1c2118':'#f3f3ee';}
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

const REGISTRY={};
const R_IN=62,R_CAT=140,R_SUB=210,R_OUT=300;
let defsEl,gEl;
function buildWheel(){
  const total=DATA.categories.reduce((n,c)=>n+c.sub.reduce((m,s)=>m+s.descriptors.length,0),0);
  const perItem=TWO_PI/total;
  defsEl=el('defs',{});svg.appendChild(defsEl);
  gEl=el('g',{id:'wheelG'});
  let a=-Math.PI/2,gradN=0;
  DATA.categories.forEach((cat,ci)=>{
    const catItems=cat.sub.reduce((m,s)=>m+s.descriptors.length,0);
    const catSpan=catItems*perItem,catStart=a,catEnd=a+catSpan,catMid=catStart+catSpan/2;
    gEl.appendChild(el('path',{d:arcRing(R_IN,R_CAT,catStart,catEnd),fill:cat.color,'class':'cell'}));
    cat._mid=catMid;cat._span=catSpan;
    cat.sub.forEach(sub=>{
      const subSpan=sub.descriptors.length*perItem,subStart=a,subEnd=a+subSpan,subMid=subStart+subSpan/2;
      if(!sub._implicit)gEl.appendChild(el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:sub.color,'class':'cell'}));
      else gEl.appendChild(el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:lighten(cat.color,8),'class':'cell'}));
      sub._mid=subMid;sub._span=subSpan;sub._cat=cat;
      sub.descriptors.forEach(desc=>{
        const s1=a,s2=a+perItem,m=a+perItem/2;
        const gid='pg'+(gradN++);
        const grad=el('radialGradient',{id:gid,gradientUnits:'userSpaceOnUse',cx:'0',cy:'0',r:R_OUT});
        grad.appendChild(el('stop',{offset:'55%','stop-color':lighten(sub.color,20)}));
        grad.appendChild(el('stop',{offset:'100%','stop-color':lighten(sub.color,44)}));
        defsEl.appendChild(grad);
        const p=el('path',{d:arcRing(R_SUB,R_OUT,s1,s2),fill:`url(#${gid})`,'class':'cell desc-seg','data-slug':desc.slug});
        p.addEventListener('click',()=>selectItem(desc.slug));
        gEl.appendChild(p);
        REGISTRY[desc.slug]={desc,sub,cat,segEl:p,chipEl:null,_mid:m,_fill:lighten(sub.color,30)};
        a+=perItem;
      });
    });
  });
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_IN,'class':'hub'}));
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_OUT+4,'class':'rim'}));
  const ys=['-19','-5','8','22'],fs=['7.5','10','7','6'];
  HUB.forEach((txt,i)=>{const a={'text-anchor':'middle',y:ys[i],'font-size':fs[i],'class':'hub-text','font-family':"var(--display)",'letter-spacing':i===3?'2.4':'.5'};if(i===0)a['font-style']='italic';if(i===1||i===2)a['font-weight']='bold';const tt=el('text',a);tt.textContent=txt;tt.style.pointerEvents='none';gEl.appendChild(tt);});
  svg.appendChild(gEl);
  renderLabels();
}

let labelEls=[];let descLabels=[];var READ_SIDE='right';
function renderLabels(){
  labelEls.forEach(e=>e.remove());labelEls=[];descLabels=[];
  DATA.categories.forEach((cat,ci)=>{
    const name=tx(cat,'name').toUpperCase();
    const labR=(R_IN+R_CAT)/2,arcLen=cat._span*labR,estW=name.length*5.0;
    if(arcLen>estW+8){
      const flip=Math.sin(cat._mid)>0,pid='catArc'+ci;
      const existing=defsEl.querySelector('#'+pid);if(existing)existing.remove();
      defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?labR-2:labR+2,cat._mid-cat._span/2,cat._mid+cat._span/2,flip)}));
      const tt=el('text',{'font-size':'7','letter-spacing':'1','font-family':"var(--display)",'font-weight':'bold',fill:cat.textColor||'#fff','dominant-baseline':'middle'});
      const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=name;
      tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }else{
      let deg=cat._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
      const[lx,ly]=polarToCart(labR,cat._mid);
      const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'5','letter-spacing':'.3',fill:cat.textColor||'#fff','font-family':"var(--display)",'font-weight':'bold',transform:`rotate(${deg},${lx},${ly})`});
      const w=name.split(' ');
      if(w.length>1){const t1=el('tspan',{x:lx,dy:'-2.6'});t1.textContent=w[0];const t2=el('tspan',{x:lx,dy:'5.2'});t2.textContent=w.slice(1).join(' ');tt.appendChild(t1);tt.appendChild(t2);}else tt.textContent=name;
      tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }
    cat.sub.forEach((sub,si)=>{
      if(!sub._implicit){
        const subName=tx(sub,'name').toUpperCase(),subLabR=(R_CAT+R_SUB)/2,subArc=sub._span*subLabR;
        if(subArc>subName.length*4+6){
          const flip=Math.sin(sub._mid)>0,pid='subArc'+ci+'_'+si;
          const ex=defsEl.querySelector('#'+pid);if(ex)ex.remove();
          defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?subLabR-1.5:subLabR+1.5,sub._mid-sub._span/2,sub._mid+sub._span/2,flip)}));
          const tt=el('text',{'font-size':'4.6','font-family':"var(--display)",fill:textOn(sub.color),'dominant-baseline':'middle'});
          const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=subName;
          tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }else{
          let deg=sub._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
          const[lx,ly]=polarToCart(subLabR,sub._mid);
          const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'4.2',fill:textOn(sub.color),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
          tt.textContent=subName;tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }
      }
      sub.descriptors.forEach(desc=>{
        const reg=REGISTRY[desc.slug];const m=reg._mid;
        const theta=m*180/Math.PI;                 // raw radial angle (0=3 o'clock)
        const deg=(READ_SIDE==='left')?theta+180:theta;  // flip whole wheel for left-read; reading side stays upright
        const[lx,ly]=polarToCart((R_SUB+R_OUT)/2,m);
        const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'6','letter-spacing':'.2',fill:textOn(reg._fill),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
        const nm=tx(desc,'name').toUpperCase();
        const availR=(R_OUT-R_SUB)-12;
        const fitFs=Math.max(3.4,Math.min(6,availR/(nm.length*0.56)));
        tt.setAttribute('font-size',fitFs.toFixed(2));
        tt.textContent=nm;
        tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        descLabels.push({el:tt,lx:lx,ly:ly,theta:theta});
      });
    });
  });
}

/* wiki */
function wikiUrl(slug,name){const t=WIKI_TITLES[name]||WIKI_TITLES[slug]||(name.charAt(0).toUpperCase()+name.slice(1).toLowerCase());const host=lang==='es'?'es.wikipedia.org':'en.wikipedia.org';return 'https://'+host+'/wiki/'+encodeURIComponent(t.replace(/ /g,'_'));}
function headingHtml(slug,name){return `<h2><a href="${wikiUrl(slug,name)}" target="_blank" rel="noopener noreferrer">${name}<span class="wiki-mark">↗</span></a></h2>`;}


function funFactFor(slug){
  const reg=REGISTRY[slug]; if(!reg) return null;
  const tryKeys=[reg.cat&&reg.cat.name, reg.sub&&reg.sub.name];
  for(const k of tryKeys){ if(k&&FUN_FACTS[k]) return FUN_FACTS[k]; }
  return null;
}

function showDetail(slug){
  currentSlug=slug;
  const d=DESCRIPTIONS[slug],reg=REGISTRY[slug];
  const name=reg?tx(reg.desc,'name'):slug;
  if(!d){detail.innerHTML=`${headingHtml(slug,name)}<div class="category-tag"></div><div class="body-text">${t('inProgress').replace('{n}',name)}</div>`;return;}
  const tag=tx(d,'cat');
  let html=headingHtml(slug,name)+`<div class="category-tag">${tag}</div>`;
  const ff=funFactFor(slug);
  if(ff){const fft=(lang==='es'&&ff.es)?ff.es:ff.en;html+=`<div class="funfact"><span class="ff-label">${lang==='es'?'Dato':'Fun Fact'}</span>${fft}</div>`;}
  const sec=(key,field)=>{const v=tx(d,field);if(v)html+=`<div class="section-title">${t(key)}</div><div class="body-text">${v}</div>`;};
  sec('origin','origin');sec('chemistry','chemistry');sec('pairing','pairing');sec('mixology','mixology');sec('examples','examples');
  const fl=tx(d,'flag');if(fl)html+=`<div class="flag-note">${fl}</div>`;

  detail.innerHTML=html;
}

function selectItem(slug){
  const e=REGISTRY[slug];if(!e)return;
  if(selectedPath)selectedPath.classList.remove('selected');
  document.querySelectorAll('.list-chip.selected').forEach(c=>c.classList.remove('selected'));
  if(e.segEl){e.segEl.classList.add('selected');selectedPath=e.segEl;}
  if(e.chipEl)e.chipEl.classList.add('selected');
  showDetail(slug);
}

/* list */
const wheelWrap=document.getElementById('wheelWrap'),listView=document.getElementById('listView'),listBody=document.getElementById('listBody'),listSearch=document.getElementById('listSearch'),noResults=document.getElementById('noResults'),sizeCtl=document.getElementById('sizeCtl'),viewWheelBtn=document.getElementById('viewWheel'),viewListBtn=document.getElementById('viewList');
function rebuildList(){listBody.innerHTML='';for(const k in REGISTRY)REGISTRY[k].chipEl=null;buildList();const q=listSearch.value;if(q){listSearch.dispatchEvent(new Event('input'));}}
function buildList(){
  DATA.categories.forEach(cat=>{
    const block=document.createElement('div');block.className='cat-block';
    const head=document.createElement('div');head.className='cat-head';
    const dot=document.createElement('span');dot.className='cat-dot';dot.style.background=cat.color;
    head.appendChild(dot);head.appendChild(document.createTextNode(tx(cat,'name')));block.appendChild(head);
    cat.sub.forEach(sub=>{
      const grp=document.createElement('div');grp.className='sub-group';
      const hdr=document.createElement('button');hdr.type='button';hdr.className='sub-toggle';
      const cnt=sub.descriptors.length;
      const hname=sub._implicit?(tx(cat,'name')+' \u00b7 '+cnt):(tx(sub,'name')+' \u00b7 '+cnt);
      hdr.innerHTML='<span class="sub-caret">\u25b8</span><span class="sub-name">'+hname+'</span>';
      hdr.addEventListener('click',()=>{grp.classList.toggle('expanded');});
      grp.appendChild(hdr);
      const row=document.createElement('div');row.className='chip-row';
      sub.descriptors.forEach(desc=>{
        const chip=document.createElement('button');chip.type='button';chip.className='list-chip';chip.textContent=tx(desc,'name');chip.dataset.slug=desc.slug;
        chip.dataset.search=(tx(desc,'name')+' '+tx(sub,'name')+' '+tx(cat,'name')).toLowerCase();
        chip.addEventListener('click',()=>selectItem(desc.slug));
        if(REGISTRY[desc.slug])REGISTRY[desc.slug].chipEl=chip;
        if(currentSlug===desc.slug){chip.classList.add('selected');grp.classList.add('expanded');}
        row.appendChild(chip);
      });
      grp.appendChild(row);block.appendChild(grp);
    });
    listBody.appendChild(block);
  });
}
listSearch.addEventListener('input',()=>{
  const q=listSearch.value.trim().toLowerCase();let any=false;
  listBody.classList.toggle('searching',!!q);
  listBody.querySelectorAll('.cat-block').forEach(block=>{let bHas=false;
    block.querySelectorAll('.sub-group').forEach(grp=>{let gHas=false;
      grp.querySelectorAll('.list-chip').forEach(ch=>{const show=!q||ch.dataset.search.includes(q);ch.style.display=show?'':'none';if(show)gHas=true;});
      grp.classList.toggle('hit',!!q&&gHas);
      grp.style.display=(q&&!gHas)?'none':'';if(gHas)bHas=true;});
    block.style.display=bHas?'':'none';if(bHas)any=true;});
  noResults.style.display=any?'none':'block';
});
function setView(v){
  const list=(v==='list');
  document.body.dataset.view=v;
  listView.classList.toggle('active',list);
  wheelWrap.style.display=list?'none':'';
  sizeCtl.style.display=list?'none':'flex';
  viewListBtn.classList.toggle('active',list);
  viewWheelBtn.classList.toggle('active',!list);
  
  // Set attribute on body to trigger the correct Fog Overlay
  document.body.setAttribute('data-view', v);

  if(list)listSearch.focus();
  try{localStorage.setItem(SUBJECT+'View',v);}catch(e){}
}
viewWheelBtn.addEventListener('click',()=>setView('wheel'));
viewListBtn.addEventListener('click',()=>setView('list'));

/* spin */
function getAngle(e,rect){const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;const x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;return Math.atan2(y-cy,x-cx);}
function applyRotation(){if(gEl)gEl.setAttribute('transform',`rotate(${rotation*180/Math.PI})`);}
function momentum(){
  if(!isDragging&&Math.abs(velocity)>0.001){
    rotation+=velocity;
    velocity*=0.96;
    applyRotation();
    animFrame=requestAnimationFrame(momentum);
  }
}

// User dragging/spinning is totally free! No point consumption.
svg.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('desc-seg'))return; 
  isDragging=true;
  const r=svg.getBoundingClientRect();lastAngle=getAngle(e,r);lastTime=Date.now();velocity=0;if(animFrame)cancelAnimationFrame(animFrame);
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const r=svg.getBoundingClientRect();const an=getAngle(e,r),dl=an-lastAngle,now=Date.now();velocity=dl/Math.max(1,now-lastTime)*16;
  rotation+=dl;lastAngle=an;lastTime=now;
  applyRotation();
});
window.addEventListener('mouseup',()=>{
  if(!isDragging)return;
  isDragging=false;
  animFrame=requestAnimationFrame(momentum);
});

svg.addEventListener('touchstart',e=>{
  if(e.touches.length===2){e.preventDefault();isDragging=false;pinching=true;pinchDist0=touchDist(e);pinchSize0=wheelSize;if(animFrame)cancelAnimationFrame(animFrame);return;}
  if(e.target.classList.contains('desc-seg'))return;
  e.preventDefault();
  isDragging=true;
  const r=svg.getBoundingClientRect();lastAngle=getAngle(e,r);lastTime=Date.now();velocity=0;if(animFrame)cancelAnimationFrame(animFrame);
},{passive:false});
svg.addEventListener('touchmove',e=>{
  if(pinching&&e.touches.length===2){e.preventDefault();setWheelSize(pinchSize0*touchDist(e)/Math.max(1,pinchDist0));return;}
  if(!isDragging)return;
  e.preventDefault();const r=svg.getBoundingClientRect();const an=getAngle(e,r),dl=an-lastAngle,now=Date.now();velocity=dl/Math.max(1,now-lastTime)*16;
  rotation+=dl;lastAngle=an;lastTime=now;
  applyRotation();
},{passive:false});
svg.addEventListener('touchend',e=>{
  if(e.touches.length<2)pinching=false;
  if(!isDragging)return;
  isDragging=false;
  animFrame=requestAnimationFrame(momentum);
});

/* sizing */
const zoomSlider=document.getElementById('zoomSlider');let wheelSize=1360,pinching=false,pinchDist0=1,pinchSize0=560;
function touchDist(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
function setWheelSize(px){wheelSize=Math.min(2200,Math.max(280,Math.round(px)));svg.setAttribute('width',wheelSize);svg.setAttribute('height',wheelSize);zoomSlider.value=wheelSize;}
document.getElementById('zoomIn').addEventListener('click',()=>setWheelSize(wheelSize*1.12));
document.getElementById('zoomOut').addEventListener('click',()=>setWheelSize(wheelSize*0.9));
document.getElementById('zoomReset').addEventListener('click',()=>setWheelSize(Math.max(980,Math.min(1520,Math.round(window.innerWidth*1.05)))));
zoomSlider.addEventListener('input',()=>setWheelSize(+zoomSlider.value));
svg.addEventListener('wheel',e=>{e.preventDefault();setWheelSize(wheelSize*(e.deltaY<0?1.07:0.93));},{passive:false});

/* movable panel */
const grip=document.getElementById('panelGrip'),dockBtn=document.getElementById('panelDock');let pDrag=null;
grip.addEventListener('pointerdown',e=>{if(e.target===dockBtn)return;const r=panel.getBoundingClientRect();if(!panel.classList.contains('floating')){panel.classList.add('floating');panel.style.left=r.left+'px';panel.style.top=r.top+'px';}pDrag={dx:e.clientX-r.left,dy:e.clientY-r.top};grip.setPointerCapture(e.pointerId);e.preventDefault();});
grip.addEventListener('pointermove',e=>{if(!pDrag)return;const w=panel.offsetWidth;const x=Math.min(Math.max(4,e.clientX-pDrag.dx),Math.max(4,window.innerWidth-w-4));const y=Math.min(Math.max(4,e.clientY-pDrag.dy),window.innerHeight-56);panel.style.left=x+'px';panel.style.top=y+'px';});
grip.addEventListener('pointerup',()=>{pDrag=null;});grip.addEventListener('pointercancel',()=>{pDrag=null;});
dockBtn.addEventListener('click',()=>{panel.classList.remove('floating');panel.style.left='';panel.style.top='';});
window.addEventListener('resize',()=>{if(panel.classList.contains('floating')){const r=panel.getBoundingClientRect();if(r.right>window.innerWidth||r.bottom>window.innerHeight){panel.style.left=Math.max(4,window.innerWidth-panel.offsetWidth-4)+'px';panel.style.top=Math.max(4,Math.min(parseFloat(panel.style.top)||4,window.innerHeight-80))+'px';}}});

const hubCenter=document.getElementById('hubCenter'),hubMirror=document.getElementById('hubMirror'),bgEcho=document.getElementById('bgEcho'),hubLogoImg=document.getElementById('hubLogo');
function applyLogo(){
  const th=document.documentElement.getAttribute('data-theme');
  const srcL=(th==='dark')?(LOGO_DARK||LOGO_DARK_FILE):(LOGO_LIGHT||LOGO_LIGHT_FILE);
  if(srcL){hubLogoImg.src=srcL;hubLogoImg.style.display='block';document.getElementById('svgContainer').classList.add('has-logo');}
  else{hubLogoImg.style.display='none';document.getElementById('svgContainer').classList.remove('has-logo');}
}
function splitTwo(n){
  const w=n.split(' ');if(w.length<2)return[n];
  const mid=Math.ceil(w.length/2);return[w.slice(0,mid).join(' '),w.slice(mid).join(' ')];
}
function sizeEcho(txt){var n=(txt||'').length;var e=document.getElementById('bgEcho');if(!e)return;e.classList.remove('len-s','len-m','len-l','len-xl');e.classList.add(n<=12?'len-s':n<=24?'len-m':n<=40?'len-l':'len-xl');}
function showMirror(slug){
  const reg=REGISTRY[slug];if(!reg)return;
  const nm=tx(reg.desc,'name');
  bgEcho.textContent=nm;sizeEcho(nm);bgEcho.classList.add('show');
}
function hideMirror(){
  if(currentSlug){showMirror(currentSlug);return;}
  bgEcho.classList.remove('show');
}

      +'<a href="https://learnsomm.com" target="_blank" rel="noopener noreferrer">LearnSomm.com</a>'
      +'<a href="mailto:mrcakebread@gmail.com">Reach Mark Directly</a>'
      +'<a href="mailto:mrcakebread@gmail.com?subject='+encodeURIComponent('LearnSomm Feedback')+'&body='+fbBody+'">Feedback</a>';
  }
  function showPlaceholder(){
    detail.innerHTML='<div class="section-title">'+t('noobTitle')+'</div>'
      +'<div class="body-text noob-fact">'+t('noobFact')+'</div>'+contactHtml();
  }

  /* ---- GLOW toggle ---- */
  var glowOn=false; try{glowOn=localStorage.getItem(SUBJECT+'Glow')==='1';}catch(e){}
  function applyGlow(){wheelSvg.classList.toggle('label-glow',glowOn);glowBtn.classList.toggle('on',glowOn);}
  glowBtn.addEventListener('click',function(){glowOn=!glowOn;try{localStorage.setItem(SUBJECT+'Glow',glowOn?'1':'0');}catch(e){}applyGlow();});
  applyGlow();

  /* ---- LIST layout toggle (vertical / columns) ---- */
  var cols=false; try{cols=localStorage.getItem(SUBJECT+'ListCols')==='1';}catch(e){}
  function applyCols(){listBody.classList.toggle('cols',cols);llBtn.classList.toggle('on',cols);llBtn.textContent=cols?t('rows'):t('cols');}
  llBtn.addEventListener('click',function(){cols=!cols;try{localStorage.setItem(SUBJECT+'ListCols',cols?'1':'0');}catch(e){}applyCols();});
  applyCols();

  /* ---- VIEWING MODES (dock-left / dock-right / detached) ---- */
  var mode='dock-left'; try{mode=localStorage.getItem(SUBJECT+'Mode')||'dock-left';}catch(e){}
  var freeReadSide='right'; try{freeReadSide=localStorage.getItem(SUBJECT+'FreeSide')||'right';}catch(e){}
  function syncReadSide(){READ_SIDE=(mode==='dock-left')?'right':(mode==='dock-right')?'left':freeReadSide;if(typeof uprightLabels==='function')uprightLabels();}
  var movePos=null; // {left,top} for detached wheel
  function clearWheelInline(){svgC.style.position='';svgC.style.left='';svgC.style.top='';svgC.style.transform='';}
  function clearPanelInline(){panelEl.classList.remove('floating');panelEl.style.left='';panelEl.style.top='';}
  function readAngle(){return READ_SIDE==='left'?Math.PI:0;}
  function setMode(m){
    mode=m;document.body.setAttribute('data-mode',m);
    READ_SIDE=(m==='dock-left')?'right':(m==='dock-right')?'left':freeReadSide;
    try{localStorage.setItem(SUBJECT+'Mode',m);}catch(e){}
    dL.classList.toggle('on',m==='dock-left');dR.classList.toggle('on',m==='dock-right');dF.classList.toggle('on',m==='detached');
    clearWheelInline();clearPanelInline();
    if(m==='detached'){
      svgC.style.position='fixed';
      var p=movePos||{left:Math.round(window.innerWidth*0.06),top:140};
      svgC.style.left=p.left+'px';svgC.style.top=p.top+'px';movePos=p;
      syncMoveHandle();
    }
    updateReadPoint();
    if(typeof uprightLabels==='function')uprightLabels();
  }
  dL.addEventListener('click',function(){setMode('dock-left');});
  dR.addEventListener('click',function(){setMode('dock-right');});
  dF.addEventListener('click',function(){setMode('detached');});

  function syncMoveHandle(){
    if(mode!=='detached'){return;}
    var r=svgC.getBoundingClientRect();var ty=Math.max(58,r.top-22);
    wheelMove.style.left=(r.left)+'px';wheelMove.style.top=ty+'px';
    if(wheelMove2){wheelMove2.style.left=(r.right-46)+'px';wheelMove2.style.top=ty+'px';}
  }
  /* read-point: which descriptor sits at the read angle, drawn upright at the wheel rim */
  function updateReadPoint(){
    if(mode==='detached')syncMoveHandle();
    if(document.body.getAttribute('data-view')!=='wheel'){return;}
    if(window.innerWidth<=820){return;}
    var r=wheelSvg.getBoundingClientRect();if(!r.width){return;}
    var cx=r.left+r.width/2, cy=r.top+r.height/2, unit=r.width/668;
    var rr=((R_SUB+R_OUT)/2)*unit, ang=readAngle();
    readPoint.style.left=(cx+rr*Math.cos(ang))+'px';
    readPoint.style.top=(cy+rr*Math.sin(ang))+'px';
    var best=null,bd=99;
    for(var k in REGISTRY){var dd=Math.abs(norm(REGISTRY[k]._mid+rotation-ang));if(dd<bd){bd=dd;best=k;}}
    if(best){readPoint.textContent=UC(tx(REGISTRY[best].desc,'name'));readPoint.dataset.slug=best;readPoint.style.color=REGISTRY[best]._fill;}
  }
  readPoint.addEventListener('click',function(){if(readPoint.dataset.slug)selectItem(readPoint.dataset.slug);});

  /* hook applyRotation + setWheelSize so the read-point tracks spin & zoom */
  var _applyRotation=applyRotation;
  applyRotation=function(){_applyRotation();updateReadPoint();};
  var _setWheelSize=setWheelSize;
  setWheelSize=function(px){_setWheelSize(px);updateReadPoint();};
  window.addEventListener('resize',function(){updateReadPoint();});

  /* detached: drag the wheel by its handle */
  var wDrag=null;
  function wireMove(handle){ if(!handle)return;
    handle.addEventListener('pointerdown',function(e){var r=svgC.getBoundingClientRect();wDrag={dx:e.clientX-r.left,dy:e.clientY-r.top};handle.setPointerCapture(e.pointerId);e.preventDefault();});
    handle.addEventListener('pointermove',function(e){if(!wDrag)return;var L=Math.max(2,Math.min(e.clientX-wDrag.dx,window.innerWidth-80));var T=Math.max(58,Math.min(e.clientY-wDrag.dy,window.innerHeight-80));svgC.style.left=L+'px';svgC.style.top=T+'px';movePos={left:L,top:T};syncMoveHandle();});
    handle.addEventListener('pointerup',function(){wDrag=null;});
    handle.addEventListener('pointercancel',function(){wDrag=null;});
  }
  wireMove(wheelMove); wireMove(wheelMove2);

  /* ---- SPIN randomizer ---- */
  var spinning=false;
  spinBtn.addEventListener('click',function(){
    if(spinning)return;var keys=Object.keys(REGISTRY);if(!keys.length)return;
    var slug=keys[Math.floor(Math.random()*keys.length)];var reg=REGISTRY[slug];
    var target=readAngle()-reg._mid;                 // rotation that lands _mid at the read angle
    var turns=(3+Math.floor(Math.random()*3))*2*Math.PI;
    var end=target;while(end<rotation+turns)end+=2*Math.PI;
    var start=rotation,dur=1700,t0=Date.now();spinning=true;
    var prevHint=spinHint?spinHint.textContent:'';
    if(spinHint)spinHint.textContent=(lang==='es'?'Gira para aumentar tus probabilidades de aprender.':'Spin to increase your chances of learning.');
    if(typeof velocity!=='undefined')velocity=0;
    function ease(p){return 1-Math.pow(1-p,3);}
    function step(){var p=Math.min(1,(Date.now()-t0)/dur);rotation=start+(end-start)*ease(p);applyRotation();
      if(p<1){requestAnimationFrame(step);}else{rotation=end;applyRotation();spinning=false;selectItem(slug);if(spinHint)spinHint.textContent=prevHint;}}
    requestAnimationFrame(step);
  });

  /* ---- re-localize the new controls + placeholder on language switch ---- */
  function enhApplyLang(){
    spinBtn.textContent=t('spin');glowBtn.textContent=t('glow');llBtn.textContent=cols?t('rows'):t('cols');
    fillContactBar();
    if(!currentSlug)showPlaceholder(); else showDetail(currentSlug);
    updateReadPoint();
  }
  var _setLang=setLang;
  setLang=function(l){_setLang(l);enhApplyLang();};

  /* ---- init ---- */
  fillContactBar();
  if(!currentSlug)showPlaceholder();
  setMode(mode);
  /* keep placeholder when nothing is selected after a language toggle handled above */
  setTimeout(updateReadPoint,60);

  /* ---- F: keep descriptor labels screen-upright while docked (so they read right-side-up at the read side) ---- */
  function uprightLabels(){
    if(typeof descLabels==='undefined')return;
    for(var i=0;i<descLabels.length;i++){var o=descLabels[i];
      var deg=(READ_SIDE==='left')?o.theta+180:o.theta;
      o.el.setAttribute('transform','rotate('+deg+','+o.lx+','+o.ly+')');
    }
  }
  /* labels are glued radial; they rotate with the wheel group automatically */
  /* renderLabels rebuilds descLabels (on lang/theme/size) — re-apply upright after each rebuild */
  (function(){var _rl=renderLabels;renderLabels=function(){_rl();uprightLabels();};})();

  /* ---- H: spin tally (local, per-wheel) ---- */
  var spins=0; try{spins=parseInt(localStorage.getItem(SUBJECT+'Spins')||'0',10)||0;}catch(e){}
  var spinsBg=document.getElementById('spinsBg');
  var spinTally=document.getElementById('spinTally');
  var _scTimer=null;
  function renderTally(){
    if(spinsBg){spinsBg.innerHTML='<span class="sc-line"><span class="sc-num">'+spins+'</span> '+(lang==='es'?'Giros':'Spins')+'</span><span class="sc-lab">'+(lang==='es'?'en el Randomizador':'on the Randomizer')+'</span>';spinsBg.classList.add('show');}
    if(spinTally)spinTally.textContent=spins+(lang==='es'?' giros':' spins');
  }
  function flashSpins(){ if(!spinsBg)return; spinsBg.classList.add('flash'); if(_scTimer)clearTimeout(_scTimer); _scTimer=setTimeout(function(){spinsBg.classList.remove('flash');},900); }
  renderTally();
  spinBtn.addEventListener('click',function(){spins++;try{localStorage.setItem(SUBJECT+'Spins',String(spins));}catch(e){}renderTally();flashSpins();});

  /* ---- H: control visibility tied to view (Cols only in List; Spin/Glow/mode only in Wheel) ---- */
  (function(){var _sv=setView;setView=function(v){_sv(v);uprightLabels();updateReadPoint();};})();

  /* re-localize tally on language switch (chain after existing enhApplyLang via setLang wrap already present) */
  (function(){var _sl2=setLang;setLang=function(l){_sl2(l);renderTally();};})();

  /* apply upright + readpoint once after init settles */
  setMode(mode); syncReadSide(); setTimeout(function(){uprightLabels();updateReadPoint();},80);

  /* ---- Wheel Format dropdown ---- */
  var wfBtn=$('wheelFormat'), wfMenu=$('wfMenu');
  function wfClose(){wfMenu.classList.remove('open');wfBtn.classList.remove('on');wfBtn.setAttribute('aria-expanded','false');}
  function wfToggle(){var open=!wfMenu.classList.contains('open');wfMenu.classList.toggle('open',open);wfBtn.classList.toggle('on',open);wfBtn.setAttribute('aria-expanded',open?'true':'false');}
  wfBtn.addEventListener('click',function(e){e.stopPropagation();wfToggle();});
  document.addEventListener('click',function(e){if(!wfMenu.contains(e.target)&&e.target!==wfBtn)wfClose();});
  function markMode(){
    dL.classList.toggle('on',mode==='dock-left');dR.classList.toggle('on',mode==='dock-right');dF.classList.toggle('on',mode==='detached');
    var lab=mode==='dock-left'?'◧ Dock Left':(mode==='dock-right'?'◨ Dock Right':'⤢ Free Move');
    wfBtn.textContent=(lang==='es'?'\u25d1 Formato':'\u25d1 Format')+': '+lab+' \u25be';
  }
  [dL,dR,dF].forEach(function(b){b.addEventListener('click',function(){wfClose();setTimeout(markMode,0);});});
  var freeSideBtn=$('freeSideBtn');
  function markFreeSide(){var r=freeReadSide==='right';freeSideBtn.textContent=(lang==='es'?('↔ Libre lee: '+(r?'Derecha':'Izquierda')):('↔ Free reads: '+(r?'Right':'Left')));}
  freeSideBtn.addEventListener('click',function(e){e.stopPropagation();freeReadSide=(freeReadSide==='right')?'left':'right';try{localStorage.setItem(SUBJECT+'FreeSide',freeReadSide);}catch(e){}markFreeSide();if(mode==='detached'){syncReadSide();updateReadPoint();}});
  markFreeSide();
  markMode();
  /* re-label format button on language switch */
  (function(){var _sl3=setLang;setLang=function(l){_sl3(l);markMode();markFreeSide();};})();


  /* ---- top-left background message area: hover explanations for lang / theme / focus ---- */
  function echoMsg(txt){bgEcho.textContent=txt;sizeEcho(txt);bgEcho.classList.add('show');}
  function echoClear(){ if(currentSlug){showMirror(currentSlug);} else {bgEcho.classList.remove('show');} }
  function wireEcho(elm,fn){ if(!elm)return;
    elm.addEventListener('mouseenter',function(){echoMsg(fn());});
    elm.addEventListener('mouseleave',echoClear);
    elm.addEventListener('focus',function(){echoMsg(fn());});
    elm.addEventListener('blur',echoClear);
  }
  wireEcho($('langBtn'),function(){return lang==='es'?'Espa\u00f1ol / English':'English / Spanish';});
  wireEcho($('themeBtn'),function(){var dk=document.documentElement.getAttribute('data-theme')==='dark';return dk?'Dark / Light':'Light / Dark';});
  wireEcho($('spinBtn'),function(){return lang==='es'?'Aumenta Tus Probabilidades de Aprender al Azar':'Increase Your Odds of Randomly Learning';});
  wireEcho($('wheelFormat'),function(){return lang==='es'?'Formato de la Rueda':'Wheel Format';});
  (function(){var tries=0;var iv=setInterval(function(){var fb=document.getElementById('fsBtn');tries++;
    if(fb){clearInterval(iv);fb.setAttribute('title','Fully Focused Mode');
      wireEcho(fb,function(){return lang==='es'?'Modo Concentraci\u00f3n Total':'Fully Focused Mode';});}
    if(tries>40)clearInterval(iv);},50);})();

})();


</script>
