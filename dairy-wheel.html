<!DOCTYPE html>
<!-- LearnSomm Wheel — Dairy Training Wheel — prod-27 — v9 (reference wheel, rebuilt from legacy CATEGORIES schema) -->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dairy Training Wheel · learnsomm.com</title>


<style>
:root{--display:'Optima','Candara','Gill Sans','Gill Sans MT','Segoe UI',sans-serif;--serif:'Avenir Next','Avenir','Century Gothic','Futura','Trebuchet MS',sans-serif;}
[data-theme="dark"]{--display:'Baskerville','Baskerville Old Face','Hoefler Text','Big Caslon','Palatino Linotype',serif;--serif:'Iowan Old Style','Palatino Linotype','Palatino','Book Antiqua','Cambria',Georgia,serif;}

*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#8a5a2a;--gold:#a87f3d;--sep:#faf8f3;--hub:#fffdf8;--hub-text:#6b573a;--badge-bg:#f4eee2;--badge-line:#d8cdb8;--shadow:0 8px 30px rgba(80,60,30,.14);}
[data-theme="dark"]{--bg:#16130e;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;--accent:#c9a96e;--gold:#d4b276;--sep:#16130e;--hub:#211c14;--hub-text:#d8c294;--badge-bg:#2a241a;--badge-line:#4a4030;--shadow:0 10px 34px rgba(0,0,0,.55);}
html{background:var(--bg);}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .25s,color .25s;}

.topbar{width:100%;max-width:1100px;display:flex;justify-content:flex-end;gap:.5rem;padding:.7rem 1rem 0;}
.topbar button{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:.75rem;border-radius:6px;padding:.35rem .7rem;cursor:pointer;}
.topbar button:hover{color:var(--text);border-color:var(--muted);}
h1{font-size:1.4rem;font-weight:400;letter-spacing:.04em;padding:.2rem 1rem .15rem;text-align:center;}
.byline{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.2rem;}
.byline em{color:var(--accent);font-style:italic;}
.spin-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:.55rem;}
.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;justify-content:center;border:1px solid var(--line);border-radius:8px;padding:.4rem .9rem;margin-bottom:1rem;max-width:96vw;background:var(--panel);}
.controls .ctl-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.controls button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.9rem;line-height:1;border-radius:6px;padding:.32rem .65rem;cursor:pointer;min-width:2.1rem;min-height:2.1rem;}
.controls button:hover{border-color:var(--gold);color:var(--accent);}
.controls button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.controls input[type=range]{width:150px;accent-color:var(--gold);cursor:pointer;}
.size-ctl{display:flex;align-items:center;gap:.55rem;}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.view-toggle button{border:none;border-radius:0;min-width:3.4rem;}
.view-toggle button.active{background:var(--badge-bg);color:var(--accent);font-weight:bold;}
.layout{display:flex;gap:0;width:100%;max-width:1180px;align-items:flex-start;padding:0 1rem 2.5rem;justify-content:center; position:relative;}
.wheel-wrap{flex:0 0 auto;display:flex;justify-content:center;}
#svgContainer { position: relative; line-height: 0; }

#wheelSvg{cursor:grab;user-select:none;touch-action:none;filter:drop-shadow(var(--shadow));}
#wheelSvg:active{cursor:grabbing;}
#wheelSvg .cell{stroke:var(--sep);stroke-width:1.5;}
#wheelSvg .desc-seg{cursor:pointer;transition:filter .15s;}
#wheelSvg .desc-seg:hover{filter:brightness(1.12) saturate(1.05);}
#wheelSvg .desc-seg.selected{stroke:var(--gold);stroke-width:2.4;}
#wheelSvg .hub{fill:var(--hub);stroke:var(--gold);stroke-width:1.4;}
#wheelSvg .hub-text{fill:var(--hub-text);}
#wheelSvg .rim{fill:none;stroke:var(--line);stroke-width:1;}
@media (prefers-reduced-motion:reduce){#wheelSvg .desc-seg{transition:none;}}

#listView{position: relative; display:none; flex:0 1 auto; width:min(720px,94vw); transition: opacity 0.3s, filter 0.3s;}
#listView.active{display:block;}
#listSearch{width:100%;padding:.55rem .85rem;font-family:inherit;font-size:.92rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);margin-bottom:1rem;}
#listSearch:focus{outline:none;border-color:var(--gold);}
.cat-block{margin-bottom:1rem;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.7rem .9rem;}
.cat-head{display:flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.cat-dot{width:.7rem;height:.7rem;border-radius:3px;flex:0 0 auto;}
.sub-group{margin-bottom:.5rem;}
.sub-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);opacity:.8;margin-bottom:.3rem;}
.chip-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.list-chip{font-size:.82rem;font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.32rem .62rem;cursor:pointer;color:var(--text);}
.list-chip:hover{border-color:var(--gold);color:var(--accent);}
.list-chip:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.list-chip.selected{border-color:var(--gold);background:var(--badge-bg);color:var(--accent);font-weight:bold;}
#noResults{display:none;color:var(--muted);font-style:italic;font-size:.88rem;padding:.4rem 0;}

.detail-panel{flex:1;min-width:280px;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:1.3rem 1.5rem;min-height:360px;margin-left:1.4rem; transition: opacity 0.3s; z-index:60; position:relative;}
.panel-header{display:flex;align-items:center;justify-content:space-between;gap:.6rem;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin:-1.3rem -1.5rem 1rem;padding:.5rem .9rem .45rem;border-bottom:1px solid var(--line);border-radius:9px 9px 0 0;}
.panel-header:active{cursor:grabbing;}
.panel-header .grip-title{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
.panel-header .grip-dots{color:var(--line);letter-spacing:2px;margin-right:.4rem;}
.panel-header button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.66rem;border-radius:5px;padding:.22rem .5rem;cursor:pointer;display:none;}
.panel-header button:hover{border-color:var(--gold);color:var(--accent);}
.detail-panel.floating{position:fixed;z-index:60;margin:0;width:min(380px,92vw);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow);border-color:var(--gold);}
.detail-panel.floating .panel-header{position:sticky;top:0;z-index:2;background:var(--panel);}
.detail-panel.floating .panel-header button{display:inline-block;}
.detail-panel h2{font-size:1.3rem;margin-bottom:.15rem;font-weight:400;font-style:italic;color:var(--accent);}
.detail-panel h2 a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--gold);}
.detail-panel h2 a:hover,.detail-panel h2 a:focus-visible{border-bottom-style:solid;color:var(--gold);outline:none;}
.wiki-mark{font-size:.6em;margin-left:.28rem;font-style:normal;color:var(--gold);vertical-align:super;}
.detail-panel .category-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.section-title{font-size:.66rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .25rem;font-weight:bold;border-bottom:1px solid var(--line);padding-bottom:2px;}
.body-text{font-size:.85rem;line-height:1.65;color:var(--text);}
.flag-note{font-size:.74rem;color:var(--gold);background:var(--badge-bg);border:1px solid var(--gold);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;line-height:1.5;}
.grid-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;}
.grid-badge{font-size:.74rem;background:var(--badge-bg);border:1px solid var(--gold);padding:.18rem .5rem;border-radius:4px;}
.placeholder{color:var(--muted);font-size:.95rem;margin-top:2.5rem;text-align:center;font-style:italic;}
@media(max-width:800px){.layout{flex-direction:column;align-items:center;}.detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}h1{font-size:1.15rem;}}

/* Hub center: logo + hover mirror */
#hubCenter{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18.5%;height:18.5%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
#hubLogo{max-width:88%;max-height:88%;opacity:1;transition:opacity .18s;display:none;}
#hubMirror{position:absolute;inset:-30% -55%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:var(--display);font-weight:bold;color:var(--hub-text);line-height:1.08;opacity:0;transition:opacity .15s;text-shadow:0 1px 6px var(--hub);}
#hubMirror.show{opacity:1;}
#hubCenter.mirroring #hubLogo{opacity:0;}
#svgContainer.has-logo .hub-text{opacity:0;}
/* Background echo: giant readable mirror, desktop only */
#bgEcho{position:fixed;top:.4rem;left:1rem;font-family:var(--display);font-weight:bold;font-size:clamp(2.4rem,7vw,5.8rem);color:var(--hub-text);opacity:0;transition:opacity .2s;pointer-events:none;z-index:0;line-height:1;max-width:55vw;letter-spacing:.02em;}
#bgEcho.show{opacity:.13;}
@media(max-width:800px){#bgEcho{display:none;}}

/* deploy: selection lockdown */
body{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
input,textarea{user-select:text;-webkit-user-select:text;-moz-user-select:text;}
</style>

<style id="enhancements">
/* pill controls */
.pill-btn{font-family:inherit;font-size:.82rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.32rem .7rem;cursor:pointer;color:var(--text);}
.pill-btn.on{background:var(--badge-bg);color:var(--accent);border-color:var(--gold);font-weight:bold;}
.mode-toggle button{min-width:2.7rem;}
/* label glow toggle */
#wheelSvg.label-glow text{filter:drop-shadow(0 0 1.3px var(--gold)) drop-shadow(0 0 3px var(--gold));}
/* hub-mirror glow (center hover) handled inline */
#hubMirror.glow{filter:drop-shadow(0 0 4px currentColor) drop-shadow(0 0 9px currentColor);}
/* ── docked wheel modes (desktop) ── */
body[data-view="wheel"][data-mode="dock-left"] .layout,
body[data-view="wheel"][data-mode="dock-right"] .layout{display:block;max-width:none;padding:0;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:fixed;top:130px;bottom:54px;width:60vw;display:flex;align-items:center;overflow:hidden;pointer-events:none;z-index:15;}
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap{left:0;justify-content:flex-start;}
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{right:0;justify-content:flex-end;}
body[data-view="wheel"][data-mode="dock-left"] #svgContainer{transform:translateX(-40%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:translateX(40%);pointer-events:auto;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel{position:fixed;top:130px;right:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:10px 0 0 10px;}
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:fixed;top:130px;left:0;width:min(380px,38vw);max-height:calc(100vh - 150px);overflow:auto;z-index:30;margin:0;border-radius:0 10px 10px 0;}
/* read-point chip */
#readPoint{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:.3rem .65rem;font-weight:bold;font-family:var(--display);letter-spacing:.05em;box-shadow:var(--shadow);cursor:pointer;pointer-events:auto;max-width:26vw;text-align:center;transform:translate(-50%,-50%);}
#readPoint::before{content:"\25c0";opacity:.5;margin-right:.3rem;}
body[data-view="wheel"][data-mode="dock-right"] #readPoint::before{content:"\25b6";}
body[data-view="wheel"][data-mode="dock-left"] #readPoint,
body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:block;}
/* detached move handle */
#wheelMove{position:fixed;display:none;z-index:28;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:.22rem .6rem;font-size:.74rem;color:var(--muted);cursor:move;pointer-events:auto;user-select:none;}
body[data-view="wheel"][data-mode="detached"] .wheel-move{display:block;}
#wheelMove2{padding:.22rem .5rem;}
/* ── collapsible list ── */
.sub-toggle{display:flex;align-items:center;gap:.45rem;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.34rem .6rem;cursor:pointer;color:var(--text);font-family:inherit;font-size:.82rem;margin:.18rem 0;}
.sub-toggle:hover{border-color:var(--gold);}
.sub-caret{display:inline-block;transition:transform .15s;color:var(--accent);font-size:.7rem;}
.sub-group.expanded .sub-caret{transform:rotate(90deg);}
.sub-group .chip-row{display:none;margin:.35rem 0 .2rem;}
.sub-group.expanded .chip-row{display:flex;}
#listBody.searching .sub-group .chip-row{display:flex;}
#listBody.searching .sub-caret{transform:rotate(90deg);}
#listBody.cols{column-width:250px;column-gap:1rem;}
#listBody.cols .cat-block{break-inside:avoid;}
/* contact */
.contact-bar{max-width:1100px;margin:0 auto 1.4rem;padding:.7rem 1rem;text-align:center;font-size:.85rem;color:var(--muted);border-top:1px solid var(--line);}
.contact-bar a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--gold);margin:0 .55rem;white-space:nowrap;}
.contact-bar a:hover{color:var(--gold);}
.contact-bar .lead{display:block;margin-bottom:.35rem;color:var(--text);font-style:italic;}
.detail-panel .contact{margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--line);font-size:.8rem;}
.detail-panel .contact a{display:inline-block;margin:.1rem .5rem .1rem 0;color:var(--accent);border-bottom:1px dotted var(--gold);text-decoration:none;}
.noob-fact{font-size:.92rem;line-height:1.5;}
/* responsive: docked falls back to centered/stacked on narrow screens */
@media (max-width:820px){
  body[data-view="wheel"][data-mode="dock-left"] .layout,
  body[data-view="wheel"][data-mode="dock-right"] .layout{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2.5rem;}
  body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
  body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{position:static;width:auto;overflow:visible;pointer-events:auto;}
  body[data-view="wheel"][data-mode="dock-left"] #svgContainer,
  body[data-view="wheel"][data-mode="dock-right"] #svgContainer{transform:none;}
  body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
  body[data-view="wheel"][data-mode="dock-right"] #detailPanel{position:static;width:100%;max-width:95vw;margin-top:1rem;max-height:none;}
  body[data-view="wheel"][data-mode="dock-left"] #readPoint,
  body[data-view="wheel"][data-mode="dock-right"] #readPoint{display:none;}
}
</style>

<style id="rev2">
.detail-panel h2{font-size:1.62rem;}
.detail-panel .category-tag{font-size:.8rem;}
.section-title{font-size:.82rem !important;}
.body-text{font-size:1.06rem;line-height:1.62;}
.noob-fact{font-size:1.0rem;}
.funfact{font-size:1.04rem;line-height:1.55;background:var(--badge-bg);border:1px solid var(--gold);border-left-width:4px;border-radius:8px;padding:.6rem .8rem;margin:.2rem 0 .9rem;}
.funfact .ff-label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:bold;margin-bottom:.25rem;}
/* bgEcho hover text: lighter in dark, darker in light */
[data-theme="dark"] #bgEcho{color:#efe6d4;opacity:.16;}
[data-theme="light"] #bgEcho{color:#3a2f20;opacity:.13;}
#bgEcho.show{opacity:var(--echo-op,.15);}
[data-theme="dark"] #bgEcho.show{opacity:.17;}
[data-theme="light"] #bgEcho.show{opacity:.14;}
/* center: logo only, mirror text removed */
#hubMirror{display:none !important;}
#hubLogo{display:block;}
/* spin tally chip */
#spinTally{font-size:.72rem;color:var(--muted);margin-left:.1rem;white-space:nowrap;}
/* context-sensitive control visibility handled by JS adding body[data-view] scoping */
body[data-view="list"] #spinBtn,
body[data-view="list"] #glowBtn,
body[data-view="list"] .mode-toggle,
body[data-view="list"] #spinTally{display:none;}
body[data-view="wheel"] #listLayoutBtn{display:none;}
</style>

<style id="rev3">
/* contact links pinned bottom-middle at all times */
.contact-bar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:70;
  margin:0;border-top:none;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;
  background:var(--panel);box-shadow:0 -2px 10px rgba(0,0,0,.08);padding:.45rem 1.1rem;max-width:96vw;white-space:nowrap;overflow-x:auto;}
.contact-bar .lead{display:inline;margin:0 .6rem 0 0;font-style:italic;color:var(--muted);font-size:.82rem;}
.contact-bar a{margin:0 .5rem;}
/* keep docked wheel + panel clear of the pinned contact bar */
body[data-view="wheel"][data-mode="dock-left"] #wheelWrap,
body[data-view="wheel"][data-mode="dock-right"] #wheelWrap{bottom:52px;}
body[data-view="wheel"][data-mode="dock-left"] #detailPanel,
body[data-view="wheel"][data-mode="dock-right"] #detailPanel{max-height:calc(100vh - 196px);}
.layout{padding-bottom:64px;}
/* topbar: lighter controls, larger focus button */
.topbar button{color:var(--muted);opacity:.72;border-color:var(--line);transition:opacity .15s,color .15s;}
.topbar button:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
#fsBtn{font-size:1.35rem !important;padding:.28rem .6rem !important;line-height:1;}
</style>

<style id="rev4">
/* hide old h1/title space; logo carries the name */
#h1title{display:none !important;}
.byline{text-align:center;font-size:.74rem;color:var(--muted);padding:.2rem 1rem .4rem;margin-top:2px;}
/* clear fixed top cluster */
body{padding-top:60px;}
/* ===== unified fixed top-right control cluster ===== */
.topctl{position:fixed;top:0;right:0;z-index:200;display:flex;flex-wrap:wrap;justify-content:flex-end;align-items:center;
  gap:.4rem;padding:.5rem .7rem;background:linear-gradient(to left,var(--panel) 70%,transparent);max-width:100vw;}
.topctl button{font-family:inherit;font-size:.8rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:.3rem .6rem;cursor:pointer;color:var(--text);}
.topctl .view-toggle button{border:none;border-radius:0;}
.topctl #langBtn,.topctl #themeBtn{color:var(--muted);opacity:.72;}
.topctl #langBtn:hover,.topctl #themeBtn:hover{opacity:1;color:var(--accent);border-color:var(--gold);}
.topctl-div{width:1px;height:22px;background:var(--line);margin:0 .15rem;}
.size-ctl{display:flex;align-items:center;gap:.25rem;}
#zoomSlider{width:120px;}
/* Wheel Format dropdown */
.wf-wrap{position:relative;}
#wfMenu{position:absolute;top:calc(100% + 4px);right:0;background:var(--panel);border:1px solid var(--gold);border-radius:8px;
  box-shadow:var(--shadow);display:none;flex-direction:column;min-width:150px;overflow:hidden;z-index:210;}
#wfMenu.open{display:flex;}
#wfMenu button{border:none;border-radius:0;text-align:left;padding:.55rem .8rem;background:var(--panel);}
#wfMenu button:hover,#wfMenu button.on{background:var(--badge-bg);color:var(--accent);}
#wheelFormat.on{border-color:var(--gold);color:var(--accent);}
/* focus button (injected) sizing already handled; ensure it lands in cluster */
.topctl #fsBtn{font-size:1.3rem !important;padding:.2rem .55rem !important;line-height:1;}
/* ===== spins counter — top-right background ===== */
#spinsBg{position:fixed;top:3.2rem;right:1rem;z-index:0;pointer-events:none;font-family:var(--display);font-weight:bold;
  font-size:clamp(1.6rem,4.4vw,3.4rem);line-height:1;text-align:right;letter-spacing:.02em;opacity:0;transition:opacity .25s;}
#spinsBg.show{opacity:1;}
[data-theme="dark"] #spinsBg{color:#efe6d4;opacity:.13;}
[data-theme="light"] #spinsBg{color:#3a2f20;opacity:.11;}
[data-theme="dark"] #spinsBg.show{opacity:.16;}
[data-theme="light"] #spinsBg.show{opacity:.13;}
#spinsBg .sc-num{font-size:1.5em;}
[data-theme="dark"] #spinsBg.flash{opacity:.3 !important;}
[data-theme="light"] #spinsBg.flash{opacity:.26 !important;}
#spinsBg.flash{transition:opacity .12s;}
#spinsBg .sc-lab{display:block;font-size:.4em;letter-spacing:.18em;text-transform:uppercase;opacity:.8;}
/* ===== read-point magnifier +50% ===== */
#readPoint{font-size:1.5rem;padding:.45rem 1rem;border-width:2px;max-width:34vw;}
#readPoint::before{font-size:.8em;}
/* show read-point in FREE mode too (default right side) */
body[data-view="wheel"][data-mode="detached"] #readPoint{display:block;}
/* ===== tasting-notes card: larger by default + resizable when floating ===== */
.detail-panel{max-width:440px;min-width:320px;}
.body-text{font-size:1.14rem;line-height:1.66;}
.detail-panel h2{font-size:1.78rem;}
.funfact{font-size:1.1rem;}
.detail-panel.floating{resize:both;overflow:auto;width:min(440px,94vw);min-width:300px;min-height:280px;max-height:90vh;}

/* bgEcho: wrap + length-based sizing so any message fits */

ose sugar. Key tags: enzyme-treated, lactose intolerance, cow's milk.", "examples_es": "Leche de vaca normal tratada con la enzima lactasa, que predigiere el azúcar de la lactosa. Características: enzyme-treated, lactose intolerance, leche de vaca."}, "buttermilk": {"cat": "FLUID MILK", "cat_es": "LECHE LÍQUIDA", "origin": "Tart, tangy, and slightly thick. Acidic and refreshing.", "origin_es": "Ácido, fresco y algo espeso. Acídulo y refrescante.", "chemistry": "Slightly viscous and creamy despite low fat.", "chemistry_es": "Ligeramente viscoso y cremoso a pesar de su baja grasa.", "pairing": "Fried chicken, biscuits, ranch dressing base. Pairs with chives and dill.", "pairing_es": "Pollo frito, bizcochos, base de aderezo ranch. Combina con cebollino y eneldo.", "mixology": "Baking (activates baking soda), marinades, fried chicken batters, pancakes, salad dressings.", "mixology_es": "Repostería (activa el bicarbonato), marinados, rebozados de pollo frito, panqueques, aderezos.", "examples": "Modern buttermilk is cultured — low-fat milk inoculated with lactic acid bacteria. True churn-off buttermilk is rare commercially. Also known as: Cultured Buttermilk. Key tags: fermented, acidic, tangy.", "examples_es": "El suero de mantequilla moderno es cultivado — leche baja en grasa inoculada con bacterias del ácido láctico. El verdadero, residuo del batido, es raro a nivel comercial. También conocido como: Cultured Buttermilk. Características: fermentado, ácido, ácido y fresco."}, "yogurt": {"cat": "CULTURED & FERMENTED", "cat_es": "CULTIVADOS Y FERMENTADOS", "origin": "Tangy and bright, ranging from mild (whole milk) to sharp (low-fat). Slightly acidic.", "origin_es": "Ácido y vivo, de suave (leche entera) a intenso (bajo en grasa). Ligeramente ácido.", "chemistry": "Thick and creamy to spoonable. Greek-style is much denser due to whey removal.", "chemistry_es": "De espeso y cremoso a apto para cuchara. El estilo griego es mucho más denso por la extracción del suero.", "pai o: Strained Yogurt · Labneh (when pressed firm). Características: colado, alto en proteína, espeso."}, "kefir": {"cat": "CULTURED & FERMENTED", "cat_es": "CULTIVADOS Y FERMENTADOS", "origin": "Tangy, slightly yeasty, slightly effervescent. More complex than yogurt due to yeast co-fermentation.", "origin_es": "Ácido, ligeramente alevadurado y algo efervescente. Más complejo que el yogur por la co-fermentación con levadura.", "chemistry": "Pourable, thinner than yogurt. Slightly fizzy when fresh.", "chemistry_es": "Vertible, más fino que el yogur. Algo burbujeante cuando está fresco.", "pairing": "Berries, honey, granola. Works in any smoothie application.", "pairing_es": "Frutos rojos, miel, granola. Funciona en cualquier batido.", "mixology": "Drinking, smoothies, salad dressings. High probiotic content, digestive benefits.", "mixology_es": "Para beber, batidos, aderezos. Alto contenido probiótico y beneficios digestivos.", "examples": "Milk fermented with kefir grains — a symbiotic colony of bacteria and yeasts. Originated in the Caucasus region. Key tags: fermented, probiotic, drinkable.", "examples_es": "Leche fermentada con gránulos de kéfir — una colonia simbiótica de bacterias y levaduras. Originario de la región del Cáucaso. Características: fermentado, probiótico, bebible."}, "sour-cream": {"cat": "CULTURED & FERMENTED", "cat_es": "CULTIVADOS Y FERMENTADOS", "origin": "Tangy, creamy, mildly acidic. Less sharp than yogurt.", "origin_es": "Ácida, cremosa y suavemente acídula. Menos intensa que el yogur.", "chemistry": "Thick and rich, spoonable. Crème fraîche is even richer and more stable under heat.", "chemistry_es": "Espesa y rica, apta para cuchara. La crème fraîche es aún más rica y estable al calor.", "pairing": "Chives, smoked salmon, caviar, beets. Classic atop latkes or pierogies.", "pairing_es": "Cebollino, salmón ahumado, caviar, remolacha. Clásica sobre latkes o pierogi.", "mixology": "Dips, baked potatoes, tacos, borscht, stroganoff. Crème fraîche sauces (doesn't break under heat).", "mixology_es": "Dips, papas asadas, tacos, borscht, stroganoff. Salsas de crème fraîche (no se corta con el calor).", "examples": "Regular cream fermented with lactic acid bacteria. U.S. sour cream: ≥18% fat. Crème fraîche: 30–45% fat, less tangy. Also known as: Crème Fraîche (French variant, higher fat). Key tags: cultured cream, lactic acid, tangy.", "examples_es": "Nata fermentada con bacterias del ácido láctico. Crema agria de EE. UU.: ≥18 % de grasa. Crème fraîche: 30–45 % de grasa, menos ácida. También conocido como: Crème Fraîche (French variant, higher fat). Características: nata cultivada, ácido láctico, ácido y fresco."}, "heavy-cream": {"cat": "FATS & CREAMS", "cat_es": "GRASAS Y CREMAS", "origin": "Rich, sweet, and full. Neutral dairy sweetness. Takes on flavors it's cooked with.", "origin_es": "Rica, dulce y plena. Dulzor lácteo neutro. Adopta los sabores con los que se cocina.", "chemistry": "Pourable when cold, whips to stiff peaks due to high fat content.", "chemistry_es": "Vertible en frío; monta a picos firmes por su alto contenido graso.", "pairing": "Berries, vanilla, chocolate. Reduces beautifully into pasta sauces.", "pairing_es": "Frutos rojos, vainilla, chocolate. Reduce de maravilla en salsas para pasta.", "mixology": "Whipped cream, ganache, sauces (beurre blanc), soups, ice cream bases.", "mixology_es": "Nata montada, ganache, salsas (beurre blanc), sopas, bases de helado.", "examples": "Skimmed from the top of unhomogenized milk. Must be ≥36% milkfat to be labeled heavy cream in the U.S. Also known as: Heavy Whipping Cream. Key tags: ≥36% milkfat, whippable, rich.", "examples_es": "Se separa de la parte superior de la leche sin homogeneizar. Debe tener ≥36 % de grasa para etiquetarse como heavy cream en EE. UU. También conocido como: Heavy Whipping Cream. Características: ≥36% milkfat, montable, untuoso."}, "butter": {"cat": "FATS & CREAMS", "cat_es": "GRASAS Y CREMAS", "origin": "Rich, creamy, slightly sweet. Cultured butter adds tangy complexity. Browned butter = nutty and caramel.", "origin_es": "Rica, cremosa y ligeramente dulce. La cultivada aporta complejidad ácida. La tostada resulta a nuez y caramelo.", "chemistry": "Solid at room temp, pliable when warm, liquid when melted.", "chemistry_es": "Sólida a temperatura ambiente, maleable templada, líquida al fundirse.", "pairing": "Classic on bread, vegetables, pasta. Brown butter pairs with sage, hazelnuts, and fish.", "pairing_es": "Clásica en pan, verduras y pasta. La tostada combina con salvia, avellanas y pescado.", "mixology": "Cooking, baking, finishing sauces, spreading. Brown butter (beurre noisette) for nutty depth.", "mixology_es": "Cocinar, hornear, terminar salsas, untar. Mantequilla tostada (beurre noisette) para profundidad a nuez.", "examples": "Cream churned until fat globules clump together. Rinsed and worked until smooth. European butter: ≥82% fat. American: ≥80%. Also known as: European-Style Butter (higher fat) · Cultured Butter. Key tags: ≥80% milkfat, churned cream, emulsion.", "examples_es": "Nata batida hasta que los glóbulos de grasa se agrupan. Se enjuaga y amasa hasta quedar lisa. Europea: ≥82 % de grasa. Estadounidense: ≥80 %. También conocido como: European-Style Butter (higher fat) · Cultured Butter. Características: ≥80% milkfat, nata batida, emulsión."}, "ghee": {"cat": "FATS & CREAMS", "cat_es": "GRASAS Y CREMAS", "origin": "Deeply nutty and rich. Concentrated butter flavor without the dairy solids. Slightly caramel-like.", "origin_es": "Profundamente a nuez y rico. Sabor a mantequilla concentrado sin los sólidos lácteos. Levemente acaramelado.", "chemistry": "Liquid gold when melted, semi-solid at room temp. Smooth, no milk solids.", "chemistry_es": "Oro líquido al fundirse, semisólido a temperatura ambiente. Suave, sin sólidos lácteos.", "pairing": "Basmati rice, lentils, flatbreads. Excellent finishing fat for grilled proteins.", "pairing_es": "Arroz basmati, lentejas, panes planos. Excelente grasa de acabado para proteínas a la parrilla.", "mixology": "High-heat sautéing and frying, Indian cuisine (dal, biryani, rotis), finishing drizzle.", "mixology_es": "Saltear y freír a fuego alto, cocina india (dal, biryani, rotis), chorrito de acabado.", "examples": "Butter simmered slowly until water evaporates and milk solids separate and are removed. Higher smoke point than butter (~485°F vs ~350°F). Also known as: Clarified Butter · Drawn Butter. Key tags: clarified, high smoke point, lactose-free.", "examples_es": "Mantequilla cocida a fuego lento hasta que el agua se evapora y los sólidos lácteos se separan y se retiran. Punto de humo más alto que la mantequilla (~250 °C vs ~175 °C). También conocido como: Clarified Butter · Drawn Butter. Características: clarificada, alto punto de humo, sin lactosa."}, "mozzarella": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Mild, clean, milky. Fresh variants have a delicate lactic sweetness. Buffalo mozzarella has more tang.", "origin_es": "Suave, limpia y láctea. Las versiones frescas tienen un delicado dulzor láctico. La de búfala es más ácida.", "chemistry": "Elastic and springy when fresh. Melts into satisfying stretch. Bocconcini are egg-sized fresh balls.", "chemistry_es": "Elástica y mullida cuando es fresca. Funde con una hebra satisfactoria. Los bocconcini son bolas frescas del tamaño de un huevo.", "pairing": "Ripe tomato, basil, olive oil, prosciutto. Red: light Chianti, Pinot Noir.", "pairing_es": "Tomate maduro, albahaca, aceite de oliva, prosciutto. Tinto: Chianti ligero, Pinot Noir.", "mixology": "Pizza, Caprese salad, sandwiches, baked pasta. Low-moisture mozzarella best for pizza (less water release).", "mixology_es": "Pizza, ensalada Caprese, sándwiches, pasta al horno. La de baja humedad es la mejor para pizza (suelta menos agua).", "examples": "Pasta filata method — curds are kneaded and stretched in hot water. Traditionally buffalo milk (Italy); U.S. mostly cow's milk. Also known as: Fresh Mozzarella · Fior di Latte · Buffalo Mozzarella. Key tags: pasta filata, mild, stretchy, cow or buffalo.", "examples_es": "Método pasta filata — la cuajada se amasa y estira en agua caliente. Tradicionalmente de leche de búfala (Italia); en EE. UU., casi siempre de vaca. También conocido como: Fresh Mozzarella · Fior di Latte · Buffalo Mozzarella. Características: pasta filata, suave, elástico, vaca o búfala."}, "ricotta": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Mild, slightly sweet, delicate lactic flavor. Gentle and neutral.", "origin_es": "Suave, ligeramente dulce, de delicado sabor láctico. Gentil y neutra.", "chemistry": "Creamy yet grainy. Firm enough to hold shape in pasta but smooth enough to spread.", "chemistry_es": "Cremosa pero granulosa. Firme para mantener forma en pastas, pero suave para untar.", "pairing": "Honey, lemon zest, pistachios, fresh herbs. Whites: Pinot Grigio, Soave.", "pairing_es": "Miel, ralladura de limón, pistachos, hierbas frescas. Blancos: Pinot Grigio, Soave.", "mixology": "Lasagna, stuffed shells, cannoli, cheesecake, gnocchi. Excellent on toast with honey.", "mixology_es": "Lasaña, conchas rellenas, cannoli, tarta de queso, ñoquis. Excelente en tostada con miel.", "examples": "Made by re-cooking whey leftover from cheesemaking (ricotta = 'recooked'). Acid added to precipitate remaining proteins. Key tags: whey cheese, mild, slightly sweet, cow or sheep.", "examples_es": "Se hace recociendo el suero sobrante de la quesería (ricotta = 'recocida'). Se añade ácido para precipitar las proteínas restantes. Características: queso de suero, suave, ligeramente dulce, vaca u oveja."}, "cottage-cheese": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Mild, slightly salty, subtly acidic. Almost neutral.", "origin_es": "Suave, algo salado y sutilmente ácido. Casi neutro.", "chemistry": "Lumpy, creamy. Large-curd vs small-curd varieties. Not pressed, so remains moist.", "chemistry_es": "Grumoso y cremoso. Variedades de cuajada grande o pequeña. No prensado, así que se mantiene húmedo.", "pairing": "Fresh fruit (peaches, berries), cracked pepper, chives. Pairs well with everything mild.", "pairing_es": "Fruta fresca (melocotón, frutos rojos), pimienta recién molida, cebollino. Combina con todo lo suave.", "mixology": "On its own, with fruit, baking (pancakes, cheesecakes), casseroles, protein-dense eating.", "mixology_es": "Solo, con fruta, repostería (panqueques, tartas), guisos, alimentación rica en proteína.", "examples": "Curds cut and drained but not pressed or aged. Cream dressing added back for texture. Also known as: Curd Cheese. Key tags: high protein, mild, lumpy, low-fat option.", "examples_es": "Cuajada cortada y escurrida pero no prensada ni madurada. Se le reañade un aderezo de nata para dar textura. También conocido como: Curd Cheese. Características: alto en proteína, suave, grumoso, opción baja en grasa."}, "mascarpone": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Buttery, sweet, creamy. Richer than crème fraîche. Pure dairy luxury.", "origin_es": "Mantecoso, dulce y cremoso. Más rico que la crème fraîche. Puro lujo lácteo.", "chemistry": "Thick and spreadable. Luxurious and smooth — close to a solid cream.", "chemistry_es": "Espeso y untable. Lujoso y liso — cercano a una nata sólida.", "pairing": "Espresso, cocoa, amaretto, ripe figs, berries. Moscato d'Asti, dessert wines.", "pairing_es": "Espresso, cacao, amaretto, higos maduros, frutos rojos. Moscato d'Asti, vinos de postre.", "mixology": "Tiramisu, cheesecakes, pasta sauces, risotto finish, fruit dips.", "mixology_es": "Tiramisú, tartas de queso, salsas para pasta, acabado de risotto, dips de fruta.", "examples": "Heavy cream acidified with citric or tartaric acid, then drained. Very high fat content (70–75%). Key tags: high fat, Italian, spreadable, very rich.", "examples_es": "Nata espesa acidificada con ácido cítrico o tartárico y luego escurrida. Contenido graso muy alto (70–75 %). Características: alto en grasa, italiano, untable, muy untuoso."}, "cream-cheese": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Mild and slightly tangy. Creamy and neutral — absorbs surrounding flavors well.", "origin_es": "Suave y ligeramente ácido. Cremoso y neutro — absorbe bien los sabores que lo rodean.", "chemistry": "Soft, smooth, spreadable block. Melts into sauces.", "chemistry_es": "Bloque blando, liso y untable. Se funde en salsas.", "pairing": "Smoked salmon and capers, lox, everything bagels, jalapeño jelly.", "pairing_es": "Salmón ahumado y alcaparras, lox, bagels 'everything', jalea de jalapeño.", "mixology": "Bagels, frosting (carrot cake), cheesecake base, dips, stuffed proteins.", "mixology_es": "Bagels, glaseado (pastel de zanahoria), base de tarta de queso, dips, proteínas rellenas.", "examples": "Milk and cream standardized, then acidified and thickened. Must be ≥33% fat, ≤55% moisture. Key tags: spreadable, mild tang, cow's milk, American staple.", "examples_es": "Leche y nata estandarizadas, luego acidificadas y espesadas. Debe tener ≥33 % de grasa y ≤55 % de humedad. Características: untable, ligeramente ácido, leche de vaca, básico estadounidense."}, "burrata": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Mild, milky outer shell (mozzarella); creamy, rich, buttery center (stracciatella).", "origin_es": "Cáscara exterior suave y láctea (mozzarella); centro cremoso, rico y mantecoso (stracciatella).", "chemistry": "Firm outer shell gives way to flowing cream and shredded curd. Dramatic when cut.", "chemistry_es": "La cáscara firme da paso a una crema fluida y cuajada deshilachada. Espectacular al cortarla.", "pairing": "Heirloom tomatoes, basil, sea salt, good olive oil. Rosé, Vermentino.", "pairing_es": "Tomates heirloom, albahaca, sal marina, buen aceite de oliva. Rosado, Vermentino.", "mixology": "Served fresh, barely touched. With tomatoes, on pizza, flatbreads, antipasti.", "mixology_es": "Se sirve fresca, apenas manipulada. Con tomates, en pizza, panes planos, antipasti.", "examples": "Outer shell made from fresh mozzarella; filled with stracciatella (cream + mozzarella shreds) and sealed. Key tags: Italian, fresh, stracciatella center, ultra-rich.", "examples_es": "Cáscara exterior de mozzarella fresca; rellena de stracciatella (nata + hebras de mozzarella) y sellada. Características: italiano, fresco, stracciatella center, ultra untuoso."}, "feta": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Tangy, salty, and crumbly. Sharp lactic bite. PDO feta (sheep's milk) richer than cow's milk versions.", "origin_es": "Ácida, salada y desmenuzable. Mordida láctica intensa. La feta DOP (leche de oveja) es más rica que las de leche de vaca.", "chemistry": "Crumbly and slightly grainy. Doesn't melt — holds shape even under heat.", "chemistry_es": "Desmenuzable y algo granulosa. No se funde — mantiene su forma incluso con calor.", "pairing": "Olives, cucumber, red onion, oregano, watermelon. Assyrtiko (Santorini), dry rosé.", "pairing_es": "Aceitunas, pepino, cebolla roja, orégano, sandía. Assyrtiko (Santorini), rosado seco.", "mixology": "Greek salad, spanakopita, roasted vegetables, watermelon salad, stuffed peppers.", "mixology_es": "Ensalada griega, spanakopita, verduras asadas, ensalada de sandía, pimientos rellenos.", "examples": "PDO: ≥70% sheep's milk + up to 30% goat's milk. Brined and aged in brine. Protected geographical designation from Greece. Also known as: Feta PDO (Greece). Key tags: PDO, brine-cured, sheep or goat, Greek.", "examples_es": "DOP: ≥70 % leche de oveja + hasta 30 % de cabra. Curada y madurada en salmuera. Denominación geográfica protegida de Grecia. También conocido como: Feta PDO (Greece). Características: PDO, curado en salmuera, oveja o cabra, griego."}, "chevre": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Earthy, tangy, and bright. Distinctive 'goaty' character from capric acid. More acidic than cow's milk cheese.", "origin_es": "Terroso, ácido y vivo. Carácter 'caprino' distintivo por el ácido cáprico. Más ácido que el queso de vaca.", "chemistry": "Soft and spreadable when fresh. Becomes drier and more crumbly with age.", "chemistry_es": "Blando y untable cuando es fresco. Más seco y desmenuzable con la edad.", "pairing": "Beets, walnuts, arugula, honey, dried figs. Sancerre (Loire Sauvignon Blanc) — classic pairing.", "pairing_es": "Remolacha, nueces, rúcula, miel, higos secos. Sancerre (Sauvignon Blanc del Loira) — maridaje clásico.", "mixology": "Salads, crostini, flatbreads, stuffed chicken, beet salads, quiche.", "mixology_es": "Ensaladas, crostini, panes planos, pollo relleno, ensaladas de remolacha, quiche.", "examples": "Goat's milk inoculated with starter culture and rennet. Drained in cheesecloth. Often rolled in herbs or ash. Also known as: Fresh Goat Cheese. Key tags: goat's milk, tangy, earthy, spreadable.", "examples_es": "Leche de cabra inoculada con cultivo iniciador y cuajo. Escurrida en estameña. A menudo se rueda en hierbas o ceniza. También conocido como: Fresh Goat Cheese. Características: leche de cabra, ácido y fresco, terroso, untable."}, "halloumi": {"cat": "FRESH & UNRIPENED CHEESE", "cat_es": "QUESOS FRESCOS Y SIN MADURAR", "origin": "Salty, mild, and slightly squeaky when fresh. Develops a golden, savory crust when cooked.", "origin_es": "Salado, suave y algo chirriante cuando es fresco. Desarrolla una corteza dorada y sabrosa al cocinarse.", "chemistry": "Semi-firm, rubbery raw. Transforms when grilled — crispy outside, soft and yielding inside.", "chemistry_es": "Semifirme y gomoso en crudo. Se transforma a la parrilla — crujiente por fuera, blando por dentro.", "pairing": "Watermelon, mint, honey drizzle, grilled pita. Crisp whites: Vermentino, Grüner Veltliner.", "pairing_es": "Sandía, menta, chorrito de miel, pita a la parrilla. Blancos frescos: Vermentino, Grüner Veltliner.", "mixology": "Grilled, pan-fried, or baked. Middle Eastern and Mediterranean mezes. On salads while hot.", "mixology_es": "A la parrilla, a la sartén o al horno. Mezzes de Oriente Medio y el Mediterráneo. Sobre ensaladas mientras está caliente.", "examples": "Traditional Cyprus cheese: sheep's and goat's milk, sometimes cow's. Boiled in whey, then salted and brined. Very high melting point. Key tags: Cypriot, grill cheese, high melting point, sheep or goat.", "examples_es": "Queso tradicional de Chipre: leche de oveja y cabra, a veces de vaca. Hervido en suero, luego salado y puesto en salmuera. Punto de fusión muy alto. Características: chipriota, queso para asar, alto punto de fusión, oveja o cabra."}, "brie": {"cat": "SOFT / WHITE-MOLD CHEESE", "cat_es": "QUESOS BLANDOS / DE MOHO BLANCO", "origin": "Mild, buttery, mushroomy. Fruity and earthy. Becomes runnier and more pungent with age.", "origin_es": "Suave, mantecoso, a champiñón. Afrutado y terroso. Más fluido y penetrante con la edad.", "chemistry": "Soft paste inside, edible white rind outside. Flows at room temperature when ripe.", "chemistry_es": "Pasta blanda por dentro, corteza blanca comestible por fuera. Fluye a temperatura ambiente cuando está maduro.", "pairing": "Green apple, raspberry jam, honey, walnuts, baguette. Champagne, Chardonnay, light Pinot Noir.", "pairing_es": "Manzana verde, mermelada de frambuesa, miel, nueces, baguette. Champán, Chardonnay, Pinot Noir ligero.", "mixology": "Cheese boards, baked brie (with jam/honey), sandwiches, melted into sauces.", "mixology_es": "Tablas de queso, brie al horno (con mermelada/miel), sándwiches, fundido en salsas.", "examples": "Cow's milk inoculated with Penicillium camemberti on surface. Ripens from outside in. Rind is edible. Also known as: Brie de Meaux PDO · Brie de Melun PDO. Key tags: bloomy rind, French, cow's milk, soft-ripened.", "examples_es": "Leche de vaca inoculada en superficie con Penicillium camemberti. Madura de afuera hacia adentro. La corteza es comestible. También conocido como: Brie de Meaux PDO · Brie de Melun PDO. Características: corteza enmohecida, francés, leche de vaca, de maduración blanda."}, "camembert": {"cat": "SOFT / WHITE-MOLD CHEESE", "cat_es": "QUESOS BLANDOS / DE MOHO BLANCO", "origin": "Earthier and more pungent than Brie. Notes of mushroom, garlic, and barnyard. Stronger aroma.", "origin_es": "Más terroso y penetrante que el Brie. Notas de champiñón, ajo y establo. Aroma más fuerte.", "chemistry": "Runny and oozy when ripe. Firm when young, transforms with age.", "chemistry_es": "Fluido y goteante cuando está maduro. Firme de joven, se transforma con la edad.", "pairing": "Calvados (apple brandy), Cidre Normand, Champagne. Fresh figs, strawberries.", "pairing_es": "Calvados (aguardiente de manzana), sidra normanda, champán. Higos frescos, fresas.", "mixology": "Baked in its own box, cheese boards, with crusty bread.", "mixology_es": "Horneado en su propia caja, tablas de queso, con pan crujiente.", "examples": "Similar to Brie but traditionally ladled (not poured) into molds — creates a coarser paste. PDO version: raw Normandy milk. Also known as: Camembert de Normandie PDO. Key tags: bloomy rind, French, Normandy, more pungent than Brie.", "examples_es": "Similar al Brie pero tradicionalmente vertido a cucharón (no colado) en moldes — crea una pasta más gruesa. Versión DOP: leche cruda de Normandía. También conocido como: Camembert de Normandie PDO. Características: corteza enmohecida, francés, Normandía, more pungent than Brie."}, "havarti": {"cat": "SEMI-SOFT CHEESE", "cat_es": "QUESOS SEMIBLANDOS", "origin": "Buttery, slightly sweet, mildly tangy. Becomes sharper with age. Mild enough for wide appeal.", "origin_es": "Mantecoso, ligeramente dulce y suavemente ácido. Más intenso con la edad. Lo bastante suave para gustar a todos.", "chemistry": "Smooth, creamy, pliable. Small irregular holes throughout. Melts well.", "chemistry_es": "Liso, cremoso y maleable. Pequeños ojos irregulares por toda la pasta. Funde bien.", "pairing": "Sliced meats, pickled vegetables, light pilsner, Riesling.", "pairing_es": "Fiambres, verduras encurtidas, pilsner ligera, Riesling.", "mixology": "Sandwiches, burgers, melting applications, snacking, cheese boards.", "mixology_es": "Sándwiches, hamburguesas, fundidos, picoteo, tablas de queso.", "examples": "Danish washed-curd cheese. Curds washed with water to reduce acidity, creating milder flavor. Also known as: Havarti PGI (Denmark). Key tags: Danish, semi-soft, buttery, cow's milk.", "examples_es": "Queso danés de cuajada lavada. La cuajada se lava con agua para reducir la acidez y crear un sabor más suave. También conocido como: Havarti PGI (Denmark). Características: danés, semiblando, mantecoso, leche de vaca."}, "muenster": {"cat": "SEMI-SOFT CHEESE", "cat_es": "QUESOS SEMIBLANDOS", "origin": "American: mild, bland, creamy. French Munster: pungent, bold, washed-rind funk. Very different cheeses sharing a name.", "origin_es": "Estadounidense: suave, neutro y cremoso. Munster francés: penetrante, audaz, con el carácter de corteza lavada. Quesos muy distintos que comparten nombre.", "chemistry": "Soft, creamy, smooth. Melts exceptionally well.", "chemistry_es": "Blando, cremoso y liso. Funde excepcionalmente bien.", "pairing": "Riesling (both versions), dark bread, onion. American: beer and pub food.", "pairing_es": "Riesling (ambas versiones), pan oscuro, cebolla. El estadounidense: cerveza y comida de pub.", "mixology": "Grilled cheese, quesadillas, burgers, sandwiches. American muenster is the melt-friendly option.", "mixology_es": "Sándwich de queso a la plancha, quesadillas, hamburguesas, sándwiches. El muenster estadounidense es la opción fundente.", "examples": "American muenster: washed and colored exterior, mild interior. French Munster: true washed-rind, brined periodically. Also known as: American Muenster · Munster-Géromé (French original). Key tags: semi-soft, orange rind, washed rind (French), melting cheese.", "examples_es": "Muenster estadounidense: exterior lavado y coloreado, interior suave. Munster francés: corteza lavada de verdad, salada periódicamente. También conocido como: American Muenster · Munster-Géromé (French original). Características: semiblando, corteza naranja, corteza lavada (francés), queso fundente."}, "taleggio": {"cat": "SEMI-SOFT CHEESE", "cat_es": "QUESOS SEMIBLANDOS", "origin": "Strong aroma but surprisingly mild, fruity, and tangy flavor. Don't judge by the smell.", "origin_es": "Aroma fuerte pero sabor sorprendentemente suave, afrutado y ácido. No lo juzgues por el olor.", "chemistry": "Soft and creamy paste. Almost spreadable near the rind.", "chemistry_es": "Pasta blanda y cremosa. Casi untable cerca de la corteza.", "pairing": "Prosciutto, figs, walnuts, honey. Pinot Grigio, Barbera d'Asti.", "pairing_es": "Prosciutto, higos, nueces, miel. Pinot Grigio, Barbera d'Asti.", "mixology": "Risotto, polenta, melted on pizza, fondue, cheese boards.", "mixology_es": "Risotto, polenta, fundido en pizza, fondue, tablas de queso.", "examples": "Lombardy cheese washed in seawater during aging, creating its characteristic sticky orange rind and strong aroma. Also known as: Taleggio PDO (Italy). Key tags: Italian, washed rind, smelly, PDO.", "examples_es": "Queso de Lombardía lavado en agua de mar durante la maduración, lo que crea su característica corteza naranja pegajosa y su aroma fuerte. También conocido como: Taleggio PDO (Italy). Características: italiano, corteza lavada, de aroma fuerte, PDO."}, "provolone": {"cat": "SEMI-SOFT CHEESE", "cat_es": "QUESOS SEMIBLANDOS", "origin": "Young: mild, buttery, slightly sweet. Aged (piccante): sharp, tangy, piquant.", "origin_es": "Joven: suave, mantecoso, ligeramente dulce. Añejo (piccante): fuerte, ácido y picante.", "chemistry": "Smooth, firm, slightly elastic. Slices cleanly.", "chemistry_es": "Liso, firme y algo elástico. Se corta limpiamente.", "pairing": "Salami, roasted peppers, olives. Medium-bodied reds: Chianti, Montepulciano.", "pairing_es": "Salami, pimientos asados, aceitunas. Tintos de cuerpo medio: Chianti, Montepulciano.", "mixology": "Italian sandwiches (classic on a Philly), charcuterie boards, pizza, baked dishes.", "mixology_es": "Sándwiches italianos (clásico en el Philly), tablas de charcutería, pizza, platos al horno.", "examples": "Pasta filata (stretched-curd) technique. Aged from a few months to over a year. Often hung and aged in pear shape. Also known as: Provolone Valpadana PDO · Provolone del Monaco PDO. Key tags: Italian, pasta filata, semi-hard, smoked option.", "examples_es": "Técnica pasta filata (cuajada estirada). Madurado de unos meses a más de un año. A menudo colgado y madurado en forma de pera. También conocido como: Provolone Valpadana PDO · Provolone del Monaco PDO. Características: italiano, pasta filata, semiduro, versión ahumada."}, "cheddar": {"cat": "SEMI-HARD CHEESE", "cat_es": "QUESOS SEMIDUROS", "origin": "Mild: creamy, buttery, smooth. Sharp: tangy, pungent, complex. Extra sharp: intense, dry, crystalline.", "origin_es": "Suave: cremoso, mantecoso, liso. Fuerte: ácido, penetrante, complejo. Extrafuerte: intenso, seco, cristalino.", "chemistry": "Young: smooth and moist. Aged: dry, crumbly, may have tyrosine crystals.", "chemistry_es": "Joven: liso y húmedo. Añejo: seco, desmenuzable, con posibles cristales de tirosina.", "pairing": "Apple, chutney, pickles, dark bread. Cabernet Sauvignon, IPA, aged red ales.", "pairing_es": "Manzana, chutney, encurtidos, pan oscuro. Cabernet Sauvignon, IPA, ales rojas añejas.", "mixology": "Mac and cheese, grilled cheese, cheeseburgers, cheese boards, fondue.", "mixology_es": "Macarrones con queso, sándwich a la plancha, hamburguesas, tablas de queso, fondue.", "examples": "Unique 'cheddaring' process: cut curds stacked and flipped to expel whey, creating the dense texture. Aged 2 months–10+ years. Also known as: Cheddar (PDO Somerset/West Country). Key tags: English origin, most-consumed US cheese, sharp or mild, aging-driven flavor.", "examples_es": "Proceso único de 'cheddaring': la cuajada cortada se apila y voltea para expulsar el suero, creando su textura densa. Madurado de 2 meses a más de 10 años. También conocido como: Cheddar (PDO Somerset/West Country). Características: origen inglés, most-consumed US cheese, fuerte o suave, aging-driven flavor."}, "gouda": {"cat": "SEMI-HARD CHEESE", "cat_es": "QUESOS SEMIDUROS", "origin": "Young: mild, sweet, slightly nutty. Aged (2+ years): intensely caramel, butterscotch, crunchy crystals. Smoked: adds wood-smoke complexity.", "origin_es": "Joven: suave, dulce, algo a nuez. Añejo (2+ años): intensamente a caramelo y toffee, con cristales crujientes. Ahumado: suma complejidad de humo de leña.", "chemistry": "Young: smooth and semi-firm. Aged: hard and crystalline.", "chemistry_es": "Joven: liso y semifirme. Añejo: duro y cristalino.", "pairing": "Young: lager, Riesling. Aged: Bourbon, Port, dark chocolate. Smoked: BBQ and cured meats.", "pairing_es": "Joven: lager, Riesling. Añejo: bourbon, Oporto, chocolate negro. Ahumado: barbacoa y carnes curadas.", "mixology": "Snacking, cheese boards, sandwiches, fondue, grilled. Aged gouda: dessert cheese with fruit.", "mixology_es": "Picoteo, tablas de queso, sándwiches, fondue, a la plancha. Gouda añejo: queso de postre con fruta.", "examples": "Washed-curd process (like Havarti) reduces acidity. Coated in wax. Named for the city of Gouda, Netherlands. Also known as: Young Gouda · Aged Gouda (Gouda-belegen) · Smoked Gouda. Key tags: Dutch, wax-coated, caramel notes when aged, versatile.", "examples_es": "Proceso de cuajada lavada (como el Havarti) que reduce la acidez. Recubierto de cera. Lleva el nombre de la ciudad de Gouda, Países Bajos. También conocido como: Young Gouda · Aged Gouda (Gouda-belegen) · Smoked Gouda. Características: holandés, recubierto de cera, caramel notes when aged, versátil."}, "emmental": {"cat": "SEMI-HARD CHEESE", "cat_es": "QUESOS SEMIDUROS", "origin": "Mild, sweet, nutty, buttery. Slightly fruity. Less assertive than Gruyère.", "origin_es": "Suave, dulce, a nuez y mantecoso. Ligeramente afrutado. Menos contundente que el Gruyère.", "chemistry": "Firm, pliable, smooth. The iconic large holes (eyes) from CO₂ produced by Propionibacterium bacteria.", "chemistry_es": "Firme, maleable y liso. Los icónicos ojos grandes provienen del CO₂ producido por la bacteria Propionibacterium.", "pairing": "Ham, dijon mustard, pickled vegetables. Riesling, Swiss Chasselas, Pilsner.", "pairing_es": "Jamón, mostaza de Dijon, verduras encurtidas. Riesling, Chasselas suizo, pilsner.", "mixology": "Fondue (often with Gruyère), Reubens, croque monsieur, sandwiches.", "mixology_es": "Fondue (a menudo con Gruyère), Reuben, croque monsieur, sándwiches.", "examples": "Three-culture process including Propionibacterium which produces CO₂ as a byproduct, forming the holes. Swiss Emmentaler: AOC protected. Also known as: Emmentaler (Switzerland) · 'Swiss Cheese'. Key tags: Swiss, holes (eyes), CO₂ bubbles, nutty.", "examples_es": "Proceso de tres cultivos que incluye Propionibacterium, que produce CO₂ como subproducto y forma los ojos. Emmentaler suizo: protegido por AOC. También conocido como: Emmentaler (Switzerland) · 'Swiss Cheese'. Características: suizo, holes (eyes), burbujas de CO₂, a nuez."}, "gruyere": {"cat": "SEMI-HARD CHEESE", "cat_es": "QUESOS SEMIDUROS", "origin": "Nutty, savory, earthy, slightly salty. Fruity when young, more complex and assertive when aged.", "origin_es": "A nuez, sabroso, terroso y algo salado. Afrutado de joven; más complejo y contundente con la edad.", "chemistry": "Firm and dense. Small eyes (holes). Melts beautifully — superior melting cheese.", "chemistry_es": "Firme y denso. Ojos pequeños. Funde de maravilla — queso fundente superior.", "pairing": "Charcuterie, pickles, Dijon. Chardonnay, Côtes du Rhône, Swiss wines.", "pairing_es": "Charcutería, encurtidos, Dijon. Chardonnay, Côtes du Rhône, vinos suizos.", "mixology": "French onion soup (essential), fondue (the gold standard), quiche Lorraine, croque monsieur.", "mixology_es": "Sopa de cebolla francesa (esencial), fondue (el estándar de oro), quiche Lorraine, croque monsieur.", "examples": "Aged minimum 5 months (standard) to 18+ months (reserve). Rubbed with brine. Originates in Gruyères, Switzerland. Also known as: Gruyère PDO (Switzerland) · Le Gruyère. Key tags: Swiss/French border, PDO, nutty, cooking cheese.", "examples_es": "Madurado mínimo 5 meses (estándar) hasta 18+ meses (reserva). Frotado con salmuera. Originario de Gruyères, Suiza. También conocido como: Gruyère PDO (Switzerland) · Le Gruyère. Características: Swiss/French border, PDO, a nuez, cooking cheese."}, "manchego": {"cat": "SEMI-HARD CHEESE", "cat_es": "QUESOS SEMIDUROS", "origin": "Buttery, nutty, tangy. Slight grassy quality from Manchega sheep diet. More intense with age.", "origin_es": "Mantecoso, a nuez y ácido. Ligero matiz herbáceo por la dieta de la oveja manchega. Más intenso con la edad.", "chemistry": "Firm and smooth when young. Crumbly and crystalline when fully aged. Distinctive herringbone rind pattern.", "chemistry_es": "Firme y liso de joven. Desmenuzable y cristalino bien añejo. Patrón de corteza en espiga distintivo.", "pairing": "Quince paste (membrillo), Marcona almonds, cured meats. Tempranillo, Garnacha, Manzanilla sherry.", "pairing_es": "Dulce de membrillo, almendras Marcona, carnes curadas. Tempranillo, Garnacha, manzanilla.", "mixology": "Cheese boards, tapas, grated over salads, with jamón ibérico.", "mixology_es": "Tablas de queso, tapas, rallado sobre ensaladas, con jamón ibérico.", "examples": "Must come from La Mancha region, Spain. Made exclusively from Manchega breed sheep's milk. Aged 2 months (fresco) to 2+ years (curado/viejo). Also known as: Queso Manchego PDO. Key tags: PDO, Spanish, sheep's milk, La Mancha.", "examples_es": "Debe proceder de la región de La Mancha, España. Hecho exclusivamente con leche de oveja manchega. Madurado de 2 meses (fresco) a 2+ años (curado/viejo). También conocido como: Queso Manchego PDO. Características: PDO, español, leche de oveja, La Mancha."}, "parmigiano-reggiano": {"cat": "SEMI-HARD CHEESE", "cat_es": "QUESOS SEMIDUROS", "origin": "Complex, nutty, savory, deeply umami. Fruity and salty. Intensifies with age (24, 36 months).", "origin_es": "Complejo, a nuez, sabroso y profundamente umami. Afrutado y salado. Se intensifica con la edad (24, 36 meses).", "chemistry": "Hard, granular, crumbly. Crunchy tyrosine amino acid crystals in aged versions.", "chemistry_es": "Duro, granular y desmenuzable. Cristales crujientes de tirosina en las versiones añejas.", "pairing": "Aceto Balsamico Tradizionale, honey, walnuts, pears. Barbera d'Alba, Lambrusco, Barolo.", "pairing_es": "Aceto Balsamico Tradizionale, miel, nueces, peras. Barbera d'Alba, Lambrusco, Barolo.", "mixology": "Grated over pasta (essential), risotto, soups, salads. Young versions on boards. Rind in minestrone.", "mixology_es": "Rallado sobre pasta (esencial), risotto, sopas, ensaladas. Versiones jóvenes en tabla. La corteza en el minestrone.", "examples": "PDO: provinces of Parma, Reggio Emilia, Modena, Bologna, Mantua. Made from partially skimmed raw cow's milk. Aged minimum 12 months. Each wheel stamped with the Consorzio mark. Also known as: Parmesan · 'The King of Cheeses'. Key tags: PDO, Italian, hard, cow's milk, minimum 12 months.", "examples_es": "DOP: provincias de Parma, Reggio Emilia, Módena, Bolonia y Mantua. Leche de vaca parcialmente desnatada y cruda. Madurado mínimo 12 meses. Cada pieza lleva el sello del Consorzio. También conocido como: Parmesan · 'The King of Cheeses'. Características: PDO, italiano, duro, leche de vaca, mínimo 12 meses."}, "cotija": {"cat": "SEMI-HARD CHEESE", "cat_es": "QUESOS SEMIDUROS", "origin": "Salty and tangy, somewhat sharp. Mild and milky when fresh (fresco). More pungent when aged (añejado).", "origin_es": "Salado y ácido, algo fuerte. Suave y lácteo cuando es fresco; más penetrante cuando es añejo (añejado).", "chemistry": "Firm and crumbly. Does not melt — retains structure under heat.", "chemistry_es": "Firme y desmenuzable. No se funde — conserva su estructura con el calor.", "pairing": "Lime, chili, cilantro. Mexican lager, fresh salsa verde, guacamole.", "pairing_es": "Lima, chile, cilantro. Lager mexicana, salsa verde fresca, guacamole.", "mixology": "Elotes (street corn), tacos, enchiladas, black beans, soups. Crumbled over anything that needs a salty finish.", "mixology_es": "Elotes, tacos, enchiladas, frijoles negros, sopas. Desmenuzado sobre cualquier cosa que pida un toque salado.", "examples": "Mexican cheese from Michoacán and Jalisco states. Cow's milk, heavy salting. Named for town of Cotija. Also known as: Cotija de la Sierra. Key tags: Mexican, crumbling cheese, salty, aged.", "examples_es": "Queso mexicano de Michoacán y Jalisco. Leche de vaca, salado intenso. Lleva el nombre del pueblo de Cotija. También conocido como: Cotija de la Sierra. Características: mexicano, queso desmenuzable, salado, añejo."}, "roquefort": {"cat": "BLUE CHEESE", "cat_es": "QUESOS AZULES", "origin": "Sharp, tangy, salty, complex. Moist and crumbly with concentrated blue flavor. The archetypal blue.", "origin_es": "Fuerte, ácido, salado y complejo. Húmedo y desmenuzable con sabor azul concentrado. El azul arquetípico.", "chemistry": "Moist, crumbly, slightly sticky. Blue-green veins throughout ivory paste.", "chemistry_es": "Húmedo, desmenuzable y algo pegajoso. Vetas azul-verdosas por toda la pasta marfil.", "pairing": "Sauternes (the classic), Port, walnuts, honey, pear. Rich dessert wines complement the salt.", "pairing_es": "Sauternes (el clásico), Oporto, nueces, miel, pera. Los vinos dulces complementan la sal.", "mixology": "Salad dressings (Roquefort dressing), cheese boards, with steak, crumbled over salads.", "mixology_es": "Aderezos de ensalada (aderezo Roquefort), tablas de queso, con bistec, desmenuzado sobre ensaladas.", "examples": "Sheep's milk (Lacaune breed). Aged in Combalou caves of Roquefort-sur-Soulzon with natural Penicillium roqueforti mold. PDO protected. Also known as: Roquefort PDO · 'King of Cheeses' (French claim). Key tags: PDO, French, sheep's milk, cave-aged.", "examples_es": "Leche de oveja (raza Lacaune). Madurado en las cuevas de Combalou de Roquefort-sur-Soulzon con moho natural Penicillium roqueforti. Protegido por DOP. También conocido como: Roquefort PDO · 'King of Cheeses' (French claim). Características: PDO, francés, leche de oveja, madurado en cueva."}, "gorgonzola": {"cat": "BLUE CHEESE", "cat_es": "QUESOS AZULES", "origin": "Dolce: mild, creamy, buttery, gentle blue. Piccante: intense, sharp, crumbly, pungent.", "origin_es": "Dolce: suave, cremoso, mantecoso, azul gentil. Piccante: intenso, fuerte, desmenuzable, penetrante.", "chemistry": "Dolce: very creamy and spreadable. Piccante: firm, crumbly, dense.", "chemistry_es": "Dolce: muy cremoso y untable. Piccante: firme, desmenuzable, denso.", "pairing": "Honey, walnuts, pear, figs, radicchio. Amarone, Barolo, dessert wines, Port.", "pairing_es": "Miel, nueces, pera, higos, radicchio. Amarone, Barolo, vinos de postre, Oporto.", "mixology": "Risotto, pasta sauces, pizza, polenta, cheese boards. Dolce in dressings.", "mixology_es": "Risotto, salsas para pasta, pizza, polenta, tablas de queso. El dolce en aderezos.", "examples": "Lombardy and Piedmont, Italy. Cow's milk. Needled to create air channels for mold. PDO since 1996. One of the world's oldest blues. Also known as: Gorgonzola PDO · Dolce (young) · Piccante (aged). Key tags: PDO, Italian, cow's milk, Lombardy.", "examples_es": "Lombardía y Piamonte, Italia. Leche de vaca. Se perfora con agujas para crear canales de aire para el moho. DOP desde 1996. Uno de los azules más antiguos del mundo. También conocido como: Gorgonzola PDO · Dolce (young) · Piccante (aged). Características: PDO, italiano, leche de vaca, Lombardía."}, "stilton": {"cat": "BLUE CHEESE", "cat_es": "QUESOS AZULES", "origin": "Crumbly, complex, nutty, slightly sweet, tangy. Less aggressive than Roquefort. Earthy and rich.", "origin_es": "Desmenuzable, complejo, a nuez, ligeramente dulce y ácido. Menos agresivo que el Roquefort. Terroso y rico.", "chemistry": "Firm and crumbly. Dry compared to Gorgonzola. Fine blue veins.", "chemistry_es": "Firme y desmenuzable. Seco comparado con el Gorgonzola. Vetas azules finas.", "pairing": "Vintage Port (quintessential), pears, walnuts, crackers, celery. Oatmeal stout.", "pairing_es": "Oporto añejo (por excelencia), peras, nueces, galletas saladas, apio. Stout de avena.", "mixology": "Classic with Port at English Christmas. Cheese boards, crumbled over salads, in soups, on crackers.", "mixology_es": "Clásico con Oporto en la Navidad inglesa. Tablas de queso, desmenuzado sobre ensaladas, en sopas, sobre galletas.", "examples": "PDO: counties of Derbyshire, Leicestershire, Nottinghamshire. Must be made in a cylinder, not pressed, and have natural rind. Aged minimum 9 weeks. Also known as: Stilton PDO · 'King of English Cheeses'. Key tags: PDO, English, cow's milk, crumbly.", "examples_es": "DOP: condados de Derbyshire, Leicestershire y Nottinghamshire. Debe hacerse en cilindro, sin prensar, y tener corteza natural. Madurado mínimo 9 semanas. También conocido como: Stilton PDO · 'King of English Cheeses'. Características: PDO, inglés, leche de vaca, desmenuzable."}};

racter.", "es": "Muchos quesos semiblandos son de 'cuajada lavada' — la cuajada se enjuaga con agua para eliminar lactosa, lo que les da su carácter suave, elástico y fácil de fundir."}, "SEMI-HARD CHEESE": {"en": "The pleasant crunch in aged cheddar, gouda, and parmesan is tyrosine — an amino acid that crystallizes as proteins slowly break down over months of aging.", "es": "El agradable crujido del cheddar, el gouda y el parmesano añejos es tirosina — un aminoácido que cristaliza a medida que las proteínas se descomponen lentamente durante meses de maduración."}, "BLUE CHEESE": {"en": "The blue veins are Penicillium roqueforti mold; cheesemakers pierce the wheels with needles so air can reach the interior and let the mold bloom along the channels.", "es": "Las vetas azules son moho Penicillium roqueforti; los queseros perforan las piezas con agujas para que el aire llegue al interior y el moho florezca a lo largo de los canales."}};

/* geometry */
function polarToCart(r,a){return[r*Math.cos(a),r*Math.sin(a)];}
function arcRing(r1,r2,a1,a2){const[sx1,sy1]=polarToCart(r1,a1),[ex1,ey1]=polarToCart(r1,a2),[sx2,sy2]=polarToCart(r2,a1),[ex2,ey2]=polarToCart(r2,a2);const lg=a2-a1>Math.PI?1:0;return `M ${sx1} ${sy1} A ${r1} ${r1} 0 ${lg} 1 ${ex1} ${ey1} L ${ex2} ${ey2} A ${r2} ${r2} 0 ${lg} 0 ${sx2} ${sy2} Z`;}
function arcLabelPath(r,a1,a2,rev){const lg=Math.abs(a2-a1)>Math.PI?1:0;if(rev){const[sx,sy]=polarToCart(r,a2),[ex,ey]=polarToCart(r,a1);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 0 ${ex} ${ey}`;}const[sx,sy]=polarToCart(r,a1),[ex,ey]=polarToCart(r,a2);return `M ${sx} ${sy} A ${r} ${r} 0 ${lg} 1 ${ex} ${ey}`;}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function textOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)>150?'#1c2118':'#f3f3ee';}
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

const REGISTRY={};
const R_IN=62,R_CAT=140,R_SUB=210,R_OUT=300;
let defsEl,gEl;
function buildWheel(){
  const total=DATA.categories.reduce((n,c)=>n+c.sub.reduce((m,s)=>m+s.descriptors.length,0),0);
  const perItem=TWO_PI/total;
  defsEl=el('defs',{});svg.appendChild(defsEl);
  gEl=el('g',{id:'wheelG'});
  let a=-Math.PI/2,gradN=0;
  DATA.categories.forEach((cat,ci)=>{
    const catItems=cat.sub.reduce((m,s)=>m+s.descriptors.length,0);
    const catSpan=catItems*perItem,catStart=a,catEnd=a+catSpan,catMid=catStart+catSpan/2;
    gEl.appendChild(el('path',{d:arcRing(R_IN,R_CAT,catStart,catEnd),fill:cat.color,'class':'cell'}));
    cat._mid=catMid;cat._span=catSpan;
    cat.sub.forEach(sub=>{
      const subSpan=sub.descriptors.length*perItem,subStart=a,subEnd=a+subSpan,subMid=subStart+subSpan/2;
      if(!sub._implicit)gEl.appendChild(el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:sub.color,'class':'cell'}));
      else gEl.appendChild(el('path',{d:arcRing(R_CAT,R_SUB,subStart,subEnd),fill:lighten(cat.color,8),'class':'cell'}));
      sub._mid=subMid;sub._span=subSpan;sub._cat=cat;
      sub.descriptors.forEach(desc=>{
        const s1=a,s2=a+perItem,m=a+perItem/2;
        const gid='pg'+(gradN++);
        const grad=el('radialGradient',{id:gid,gradientUnits:'userSpaceOnUse',cx:'0',cy:'0',r:R_OUT});
        grad.appendChild(el('stop',{offset:'55%','stop-color':lighten(sub.color,20)}));
        grad.appendChild(el('stop',{offset:'100%','stop-color':lighten(sub.color,44)}));
        defsEl.appendChild(grad);
        const p=el('path',{d:arcRing(R_SUB,R_OUT,s1,s2),fill:`url(#${gid})`,'class':'cell desc-seg','data-slug':desc.slug});
        p.addEventListener('click',()=>selectItem(desc.slug));
        gEl.appendChild(p);
        REGISTRY[desc.slug]={desc,sub,cat,segEl:p,chipEl:null,_mid:m,_fill:lighten(sub.color,30)};
        a+=perItem;
      });
    });
  });
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_IN,'class':'hub'}));
  gEl.appendChild(el('circle',{cx:0,cy:0,r:R_OUT+4,'class':'rim'}));
  const ys=['-19','-5','8','22'],fs=['7.5','10','7','6'];
  HUB.forEach((txt,i)=>{const a={'text-anchor':'middle',y:ys[i],'font-size':fs[i],'class':'hub-text','font-family':"var(--display)",'letter-spacing':i===3?'2.4':'.5'};if(i===0)a['font-style']='italic';if(i===1||i===2)a['font-weight']='bold';const tt=el('text',a);tt.textContent=txt;tt.style.pointerEvents='none';gEl.appendChild(tt);});
  svg.appendChild(gEl);
  renderLabels();
}

let labelEls=[];let descLabels=[];var READ_SIDE='right';
function renderLabels(){
  labelEls.forEach(e=>e.remove());labelEls=[];descLabels=[];
  DATA.categories.forEach((cat,ci)=>{
    const name=tx(cat,'name').toUpperCase();
    const labR=(R_IN+R_CAT)/2,arcLen=cat._span*labR,estW=name.length*5.0;
    if(arcLen>estW+8){
      const flip=Math.sin(cat._mid)>0,pid='catArc'+ci;
      const existing=defsEl.querySelector('#'+pid);if(existing)existing.remove();
      defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?labR-2:labR+2,cat._mid-cat._span/2,cat._mid+cat._span/2,flip)}));
      const tt=el('text',{'font-size':'7','letter-spacing':'1','font-family':"var(--display)",'font-weight':'bold',fill:cat.textColor||'#fff','dominant-baseline':'middle'});
      const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=name;
      tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }else{
      let deg=cat._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
      const[lx,ly]=polarToCart(labR,cat._mid);
      const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'5','letter-spacing':'.3',fill:cat.textColor||'#fff','font-family':"var(--display)",'font-weight':'bold',transform:`rotate(${deg},${lx},${ly})`});
      const w=name.split(' ');
      if(w.length>1){const t1=el('tspan',{x:lx,dy:'-2.6'});t1.textContent=w[0];const t2=el('tspan',{x:lx,dy:'5.2'});t2.textContent=w.slice(1).join(' ');tt.appendChild(t1);tt.appendChild(t2);}else tt.textContent=name;
      tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
    }
    cat.sub.forEach((sub,si)=>{
      if(!sub._implicit){
        const subName=tx(sub,'name').toUpperCase(),subLabR=(R_CAT+R_SUB)/2,subArc=sub._span*subLabR;
        if(subArc>subName.length*4+6){
          const flip=Math.sin(sub._mid)>0,pid='subArc'+ci+'_'+si;
          const ex=defsEl.querySelector('#'+pid);if(ex)ex.remove();
          defsEl.appendChild(el('path',{id:pid,d:arcLabelPath(flip?subLabR-1.5:subLabR+1.5,sub._mid-sub._span/2,sub._mid+sub._span/2,flip)}));
          const tt=el('text',{'font-size':'4.6','font-family':"var(--display)",fill:textOn(sub.color),'dominant-baseline':'middle'});
          const tp=el('textPath',{startOffset:'50%','text-anchor':'middle'});tp.setAttribute('href','#'+pid);tp.textContent=subName;
          tt.appendChild(tp);tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }else{
          let deg=sub._mid*180/Math.PI;const dN=((deg%360)+360)%360;if(dN>90&&dN<270)deg+=180;
          const[lx,ly]=polarToCart(subLabR,sub._mid);
          const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'4.2',fill:textOn(sub.color),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
          tt.textContent=subName;tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        }
      }
      sub.descriptors.forEach(desc=>{
        const reg=REGISTRY[desc.slug];const m=reg._mid;
        const theta=m*180/Math.PI;                 // raw radial angle (0=3 o'clock)
        const deg=(READ_SIDE==='left')?theta+180:theta;  // flip whole wheel for left-read; reading side stays upright
        const[lx,ly]=polarToCart((R_SUB+R_OUT)/2,m);
        const tt=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':'6','letter-spacing':'.2',fill:textOn(reg._fill),'font-family':"var(--display)",transform:`rotate(${deg},${lx},${ly})`});
        const nm=tx(desc,'name').toUpperCase();
        const availR=(R_OUT-R_SUB)-12;
        const fitFs=Math.max(3.4,Math.min(6,availR/(nm.length*0.56)));
        tt.setAttribute('font-size',fitFs.toFixed(2));
        tt.textContent=nm;
        tt.style.pointerEvents='none';gEl.appendChild(tt);labelEls.push(tt);
        descLabels.push({el:tt,lx:lx,ly:ly,theta:theta});
      });
    });
  });
}

/* wiki */
function wikiUrl(slug,name){const t=WIKI_TITLES[name]||WIKI_TITLES[slug]||(name.charAt(0).toUpperCase()+name.slice(1).toLowerCase());const host=lang==='es'?'es.wikipedia.org':'en.wikipedia.org';return 'https://'+host+'/wiki/'+encodeURIComponent(t.replace(/ /g,'_'));}
function headingHtml(slug,name){return `<h2><a href="${wikiUrl(slug,name)}" target="_blank" rel="noopener noreferrer">${name}<span class="wiki-mark">↗</span></a></h2>`;}


function funFactFor(slug){
  const reg=REGISTRY[slug]; if(!reg) return null;
  const tryKeys=[reg.cat&&reg.cat.name, reg.sub&&reg.sub.name];
  for(const k of tryKeys){ if(k&&FUN_FACTS[k]) return FUN_FACTS[k]; }
  return null;
}

function showDetail(slug){
  currentSlug=slug;
  const d=DESCRIPTIONS[slug],reg=REGISTRY[slug];
  const name=reg?tx(reg.desc,'name'):slug;
  if(!d){detail.innerHTML=`${headingHtml(slug,name)}<div class="category-tag"></div><div class="body-text">${t('inProgress').replace('{n}',name)}</div>`;return;}
  const tag=tx(d,'cat');
  let html=headingHtml(slug,name)+`<div class="category-tag">${tag}</div>`;
  const ff=funFactFor(slug);
  if(ff){const fft=(lang==='es'&&ff.es)?ff.es:ff.en;html+=`<div class="funfact"><span class="ff-label">${lang==='es'?'Dato':'Fun Fact'}</span>${fft}</div>`;}
  const sec=(key,field)=>{const v=tx(d,field);if(v)html+=`<div class="section-title">${t(key)}</div><div class="body-text">${v}</div>`;};
  sec('origin','origin');sec('chemistry','chemistry');sec('pairing','pairing');sec('mixology','mixology');sec('examples','examples');
  const fl=tx(d,'flag');if(fl)html+=`<div class="flag-note">${fl}</div>`;

  detail.innerHTML=html;
}

function selectItem(slug){
  const e=REGISTRY[slug];if(!e)return;
  if(selectedPath)selectedPath.classList.remove('selected');
  document.querySelectorAll('.list-chip.selected').forEach(c=>c.classList.remove('selected'));
  if(e.segEl){e.segEl.classList.add('selected');selectedPath=e.segEl;}
  if(e.chipEl)e.chipEl.classList.add('selected');
  showDetail(slug);
}

/* list */
const wheelWrap=document.getElementById('wheelWrap'),listView=document.getElementById('listView'),listBody=document.getElementById('listBody'),listSearch=document.getElementById('listSearch'),noResults=document.getElementById('noResults'),sizeCtl=document.getElementById('sizeCtl'),viewWheelBtn=document.getElementById('viewWheel'),viewListBtn=document.getElementById('viewList');
function rebuildList(){listBody.innerHTML='';for(const k in REGISTRY)REGISTRY[k].chipEl=null;buildList();const q=listSearch.value;if(q){listSearch.dispatchEvent(new Event('input'));}}
function buildList(){
  DATA.categories.forEach(cat=>{
    const block=document.createElement('div');block.className='cat-block';
    const head=document.createElement('div');head.className='cat-head';
    const dot=document.createElement('span');dot.className='cat-dot';dot.style.background=cat.color;
    head.appendChild(dot);head.appendChild(document.createTextNode(tx(cat,'name')));block.appendChild(head);
    cat.sub.forEach(sub=>{
      const grp=document.createElement('div');grp.className='sub-group';
      const hdr=document.createElement('button');hdr.type='button';hdr.className='sub-toggle';
      const cnt=sub.descriptors.length;
      const hname=sub._implicit?(tx(cat,'name')+' \u00b7 '+cnt):(tx(sub,'name')+' \u00b7 '+cnt);
      hdr.innerHTML='<span class="sub-caret">\u25b8</span><span class="sub-name">'+hname+'</span>';
      hdr.addEventListener('click',()=>{grp.classList.toggle('expanded');});
      grp.appendChild(hdr);
      const row=document.createElement('div');row.className='chip-row';
      sub.descriptors.forEach(desc=>{
        const chip=document.createElement('button');chip.type='button';chip.className='list-chip';chip.textContent=tx(desc,'name');chip.dataset.slug=desc.slug;
        chip.dataset.search=(tx(desc,'name')+' '+tx(sub,'name')+' '+tx(cat,'name')).toLowerCase();
        chip.addEventListener('click',()=>selectItem(desc.slug));
        if(REGISTRY[desc.slug])REGISTRY[desc.slug].chipEl=chip;
        if(currentSlug===desc.slug){chip.classList.add('selected');grp.classList.add('expanded');}
        row.appendChild(chip);
      });
      grp.appendChild(row);block.appendChild(grp);
    });
    listBody.appendChild(block);
  });
}
listSearch.addEventListener('input',()=>{
  const q=listSearch.value.trim().toLowerCase();let any=false;
  listBody.classList.toggle('searching',!!q);
  listBody.querySelectorAll('.cat-block').forEach(block=>{let bHas=false;
    block.querySelectorAll('.sub-group').forEach(grp=>{let gHas=false;
      grp.querySelectorAll('.list-chip').forEach(ch=>{const show=!q||ch.dataset.search.includes(q);ch.style.display=show?'':'none';if(show)gHas=true;});
      grp.classList.toggle('hit',!!q&&gHas);

}
